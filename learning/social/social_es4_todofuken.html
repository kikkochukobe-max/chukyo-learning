<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="only light">
<title>都道府県・県庁所在地マスター｜社会・小4｜中京個別指導学院</title>
<!-- 本番(Heteml)ではサブセット自己ホストに差し替え -->
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

<script src="/assets/divp-core.js" defer></script>
<script src="/assets/divp-header.js" defer></script>
<!-- 小学生も使う社会ツールなので、正解時は星＋「正解！」演出（es系） -->
<script src="/assets/divp-correct.js" defer></script>
<!--
  日本地図SVGは Geolonia「日本の白地図」(https://github.com/geolonia/japanese-prefectures) を利用。
  MITライセンス（© Geolonia Inc.）。各都道府県は <g data-code="1〜47"> で、47=沖縄〜1=北海道。
-->
<style>
:root{
  --paper:#eef4f8;       /* 背景（うすい空色） */
  --sea:#cfe6f5;         /* 海 */
  --card:#ffffff;
  --ink:#233240;         /* 墨 */
  --sub:#7c8a97;         /* 薄墨 */
  --line:#dbe6ee;
  --land:#bfe0c9;        /* ふつうの県（やわらかい緑） */
  --land-edge:#ffffff;   /* 県ざかいの白線 */
  --accent:#ef6a35;      /* 出題中の県（オレンジ） */
  --accent-d:#d8531f;
  --blue:#2c7fb8;        /* リンク・関東等 */
  --green:#16a06a;       /* 正解 */
  --red:#e5484d;         /* まちがい */
  --gold:#e0a92e;        /* 連続・XP */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:var(--paper);color:var(--ink);
  min-height:100%;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
h1,h2,h3,.maru{font-family:'Zen Maru Gothic',sans-serif;}

/* ── アプリのタイトルバー（divp-header の下に置く） ── */
.appbar{
  background:linear-gradient(135deg,#2c7fb8,#3aa0d6);
  color:#fff;padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  box-shadow:0 2px 10px rgba(44,127,184,.28);
}
.appbar .ttl{display:flex;align-items:center;gap:9px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:16px;letter-spacing:.02em}
.appbar .ttl .em{font-size:20px}
.appbar .home{
  background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);
  color:#fff;border-radius:999px;padding:5px 13px;font-size:12.5px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.appbar .home:active{transform:scale(.96)}

.wrap{max-width:680px;margin:0 auto;padding:14px 12px 40px}

/* ── 画面切り替え ── */
.screen{display:none}
.screen.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── スタート画面 ── */
.hero{
  background:var(--card);border-radius:18px;padding:13px 16px;
  box-shadow:0 6px 22px rgba(35,50,64,.08);border:1px solid var(--line);
  text-align:center;margin-bottom:12px;
}
.hero h2{font-size:19px;margin-bottom:3px}
.hero .lead{color:var(--sub);font-size:12.5px;line-height:1.55}
.hero .jp-emoji{font-size:30px;display:block;margin-bottom:2px}

.sec-label{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:13.5px;color:var(--ink);margin:12px 4px 7px;display:flex;align-items:center;gap:7px}
.sec-label .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

.range-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.range-grid .r-btn{
  background:var(--card);border:2px solid var(--line);border-radius:12px;
  padding:8px 10px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:14.5px;
  color:var(--ink);cursor:pointer;transition:.12s;
}
.range-grid .r-btn small{display:block;font-family:'Zen Kaku Gothic New';font-weight:500;font-size:10.5px;color:var(--sub);margin-top:1px}
.range-grid .r-btn.sel{border-color:var(--accent);background:#fff5f0;box-shadow:0 3px 10px rgba(239,106,53,.18)}
.range-grid .r-btn.all{grid-column:1 / -1;background:linear-gradient(135deg,#fff,#f3f9fd)}
.range-grid .r-btn.all.sel{background:#fff5f0}

.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.mode-btn{
  border:none;border-radius:15px;padding:12px 12px;cursor:pointer;color:#fff;
  font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15.5px;
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:.12s;
  box-shadow:0 5px 16px rgba(35,50,64,.16);
}
.mode-btn .big{font-size:26px;line-height:1}
.mode-btn small{font-family:'Zen Kaku Gothic New';font-weight:500;font-size:11px;opacity:.92;line-height:1.35}
.mode-btn.map{background:linear-gradient(135deg,#ef6a35,#f59331)}
.mode-btn.quiz{background:linear-gradient(135deg,#2c7fb8,#3aa0d6)}
.mode-btn:active{transform:translateY(2px)}

/* ── ゲーム画面 ── */
.hud{
  display:flex;gap:8px;align-items:stretch;margin-bottom:9px;
}
.hud .cell{
  flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:7px 4px;text-align:center;box-shadow:0 2px 8px rgba(35,50,64,.05);
}
.hud .cell .k{font-size:10.5px;color:var(--sub);font-weight:600}
.hud .cell .v{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:19px;line-height:1.2}
.hud .cell.correct .v{color:var(--green)}
.hud .cell.streak .v{color:var(--gold)}

.progress-bar{height:7px;background:#e3edf4;border-radius:99px;overflow:hidden;margin-bottom:9px}
.progress-bar > span{display:block;height:100%;background:linear-gradient(90deg,#2c7fb8,#3aa0d6);border-radius:99px;transition:width .3s}

/* 地図パネル */
.map-panel{
  background:var(--sea);border-radius:16px;border:1px solid #b9dcf0;
  position:relative;overflow:hidden;margin-bottom:9px;
  box-shadow:inset 0 2px 10px rgba(35,80,120,.12);
}
.map-panel svg{display:block;width:100%;height:auto;max-height:34vh}
.map-panel .region-tag{
  position:absolute;top:8px;left:10px;
  background:rgba(255,255,255,.92);border-radius:999px;padding:4px 12px;
  font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:12.5px;color:var(--blue);
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}
.map-panel .zoom-btn{
  position:absolute;top:8px;right:10px;
  background:rgba(255,255,255,.92);border:none;border-radius:999px;padding:5px 12px;
  font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:12px;color:var(--ink);cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}
.map-panel .zoom-btn:active{transform:scale(.95)}

/* SVG 県の見た目（CSSは presentation属性より優先されるので fill を上書きできる） */
#jpmap .prefecture{fill:var(--land);stroke:var(--land-edge);stroke-width:1.1px;transition:fill .25s}
#jpmap .prefecture.is-target{fill:var(--accent);stroke:#fff;stroke-width:1.4px}
#jpmap .prefecture.dim{opacity:.55}
#jpmap .boundary-line{stroke:#a9cfe6;stroke-width:2px}
/* 出題中の県をやさしく点滅させる */
@keyframes glow{0%,100%{fill:var(--accent)}50%{fill:#ffb27a}}
#jpmap .prefecture.is-target{animation:glow 1.5s ease-in-out infinite}

/* ヒントカード（地図なしの実力チェック用） */
.hint-card{
  background:linear-gradient(135deg,#fff,#f4f9fd);border:2px dashed #bcd6e8;border-radius:16px;
  padding:16px 14px;text-align:center;margin-bottom:12px;
}
.hint-card .tag{font-size:12px;color:var(--blue);font-weight:700;margin-bottom:6px}
.hint-card .main{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:30px;line-height:1.15}
.hint-card .sub{font-size:13px;color:var(--sub);margin-top:2px}

/* 問い */
.prompt{
  font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:16px;
  text-align:center;margin:2px 4px 9px;line-height:1.4;
}
.prompt b{color:var(--accent-d)}

/* 選択肢 */
.options{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.opt{
  background:var(--card);border:2px solid var(--line);border-radius:13px;
  padding:8px 8px;cursor:pointer;text-align:center;transition:.1s;
  display:flex;flex-direction:column;align-items:center;gap:0;min-height:46px;justify-content:center;
}
.opt .opt-main{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:16px;line-height:1.25}
.opt .opt-sub{font-size:10.5px;color:var(--sub)}
.opt:active{transform:scale(.97)}
.opt.done{cursor:default}
.opt.is-correct{border-color:var(--green);background:#e9f8f1}
.opt.is-correct .opt-main{color:var(--green)}
.opt.is-wrong{border-color:var(--red);background:#fdecec}
.opt.is-wrong .opt-main{color:var(--red)}
.opt.done:not(.is-correct):not(.is-wrong){opacity:.5}

/* フィードバック＆つぎへ */
.feedback{min-height:30px;text-align:center;margin-top:14px}
.feedback .msg{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:16px}
.feedback .msg.good{color:var(--green)}
.feedback .msg.bad{color:var(--red)}
.feedback .msg .ans{color:var(--ink)}
.nextbtn{
  margin-top:12px;width:100%;border:none;border-radius:14px;padding:15px;
  background:linear-gradient(135deg,#2c7fb8,#3aa0d6);color:#fff;cursor:pointer;
  font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:17px;
  box-shadow:0 5px 14px rgba(44,127,184,.32);
}
.nextbtn:active{transform:translateY(2px)}

/* 結果画面 */
.result{
  background:var(--card);border-radius:20px;padding:26px 20px;text-align:center;
  box-shadow:0 6px 22px rgba(35,50,64,.1);border:1px solid var(--line);
}
.result .emo{font-size:52px}
.result h2{font-size:22px;margin:6px 0 2px}
.result .score{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:40px;margin:10px 0 2px}
.result .score b{color:var(--green)}
.result .rate{color:var(--sub);font-size:14px;margin-bottom:4px}
.result .cheer{color:var(--ink);font-size:14.5px;margin:10px 0 18px;line-height:1.7}
.result .btns{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.result .btns button{
  border:none;border-radius:14px;padding:15px;cursor:pointer;
  font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15px;
}
.result .again{background:linear-gradient(135deg,#ef6a35,#f59331);color:#fff}
.result .tohome{background:#eef2f6;color:var(--ink);border:1px solid var(--line)!important}
.result .btns button:active{transform:translateY(2px)}

/* フッター */
.foot{text-align:center;padding:22px 12px 8px;color:var(--sub);font-size:11.5px;line-height:1.8}
.foot a{color:var(--blue);text-decoration:none;font-weight:700}
.foot .credit{font-size:10px;opacity:.8;margin-top:6px}

@media(min-width:520px){
  .options{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

    <div class="credit">地図：<a href="https://github.com/geolonia/japanese-prefectures" target="_blank" rel="noopener">Geolonia 日本の白地図</a>（MIT License）</div>

<script>
(function(){
  "use strict";
  var UNIT_KEY = "social_es4_todofuken";
  var $ = function(id){ return document.getElementById(id); };

  /* ───────── 47都道府県データ ─────────
     [コード, 都道府県名, よみ, 県庁所在地, よみ, 地方グループ]
     地方グループ: ht=北海道・東北 / kt=関東 / cb=中部 / ki=近畿 / cs=中国・四国 / ky=九州・沖縄 */
  var PREF = [
    [1,"北海道","ほっかいどう","札幌市","さっぽろし","ht"],
    [2,"青森県","あおもりけん","青森市","あおもりし","ht"],
    [3,"岩手県","いわてけん","盛岡市","もりおかし","ht"],
    [4,"宮城県","みやぎけん","仙台市","せんだいし","ht"],
    [5,"秋田県","あきたけん","秋田市","あきたし","ht"],
    [6,"山形県","やまがたけん","山形市","やまがたし","ht"],
    [7,"福島県","ふくしまけん","福島市","ふくしまし","ht"],
    [8,"茨城県","いばらきけん","水戸市","みとし","kt"],
    [9,"栃木県","とちぎけん","宇都宮市","うつのみやし","kt"],
    [10,"群馬県","ぐんまけん","前橋市","まえばしし","kt"],
    [11,"埼玉県","さいたまけん","さいたま市","さいたまし","kt"],
    [12,"千葉県","ちばけん","千葉市","ちばし","kt"],
    [13,"東京都","とうきょうと","東京（新宿区）","とうきょう","kt"],
    [14,"神奈川県","かながわけん","横浜市","よこはまし","kt"],
    [15,"新潟県","にいがたけん","新潟市","にいがたし","cb"],
    [16,"富山県","とやまけん","富山市","とやまし","cb"],
    [17,"石川県","いしかわけん","金沢市","かなざわし","cb"],
    [18,"福井県","ふくいけん","福井市","ふくいし","cb"],
    [19,"山梨県","やまなしけん","甲府市","こうふし","cb"],
    [20,"長野県","ながのけん","長野市","ながのし","cb"],
    [21,"岐阜県","ぎふけん","岐阜市","ぎふし","cb"],
    [22,"静岡県","しずおかけん","静岡市","しずおかし","cb"],
    [23,"愛知県","あいちけん","名古屋市","なごやし","cb"],
    [24,"三重県","みえけん","津市","つし","ki"],
    [25,"滋賀県","しがけん","大津市","おおつし","ki"],
    [26,"京都府","きょうとふ","京都市","きょうとし","ki"],
    [27,"大阪府","おおさかふ","大阪市","おおさかし","ki"],
    [28,"兵庫県","ひょうごけん","神戸市","こうべし","ki"],
    [29,"奈良県","ならけん","奈良市","ならし","ki"],
    [30,"和歌山県","わかやまけん","和歌山市","わかやまし","ki"],
    [31,"鳥取県","とっとりけん","鳥取市","とっとりし","cs"],
    [32,"島根県","しまねけん","松江市","まつえし","cs"],
    [33,"岡山県","おかやまけん","岡山市","おかやまし","cs"],
    [34,"広島県","ひろしまけん","広島市","ひろしまし","cs"],
    [35,"山口県","やまぐちけん","山口市","やまぐちし","cs"],
    [36,"徳島県","とくしまけん","徳島市","とくしまし","cs"],
    [37,"香川県","かがわけん","高松市","たかまつし","cs"],
    [38,"愛媛県","えひめけん","松山市","まつやまし","cs"],
    [39,"高知県","こうちけん","高知市","こうちし","cs"],
    [40,"福岡県","ふくおかけん","福岡市","ふくおかし","ky"],
    [41,"佐賀県","さがけん","佐賀市","さがし","ky"],
    [42,"長崎県","ながさきけん","長崎市","ながさきし","ky"],
    [43,"熊本県","くまもとけん","熊本市","くまもとし","ky"],
    [44,"大分県","おおいたけん","大分市","おおいたし","ky"],
    [45,"宮崎県","みやざきけん","宮崎市","みやざきし","ky"],
    [46,"鹿児島県","かごしまけん","鹿児島市","かごしまし","ky"],
    [47,"沖縄県","おきなわけん","那覇市","なはし","ky"]
  ];
  // オブジェクト化
  var DATA = {}, ALL_CODES = [];
  PREF.forEach(function(p){
    DATA[p[0]] = { c:p[0], n:p[1], y:p[2], cap:p[3], cy:p[4], g:p[5] };
    ALL_CODES.push(p[0]);
  });
  function byCode(c){ return DATA[+c]; }

  var GROUP_LABEL = { all:"全国", ht:"北海道・東北", kt:"関東", cb:"中部", ki:"近畿", cs:"中国・四国", ky:"九州・沖縄" };
  var RANGES = [
    { key:"all", label:"全国",      sub:"47都道府県ぜんぶ", cls:"all" },
    { key:"ht",  label:"北海道・東北", sub:"7道県" },
    { key:"kt",  label:"関東",       sub:"1都6県" },
    { key:"cb",  label:"中部",       sub:"9県" },
    { key:"ki",  label:"近畿",       sub:"2府5県" },
    { key:"cs",  label:"中国・四国",  sub:"9県" },
    { key:"ky",  label:"九州・沖縄",  sub:"8県" }
  ];
  function groupCodes(g){ return ALL_CODES.filter(function(c){ return DATA[c].g === g; }); }

  /* ───────── 状態 ───────── */
  var state = {
    range: "all",
    mode: "map",     // "map" | "quiz" | "retry"
    steps: [],       // { key, code, showMap }
    idx: 0,
    total: 0, correct: 0, streak: 0,
    locked: false
  };

  var MAP_ITEMS = 8;   // 地図モード：出題する都道府県の数（×2問）
  var QUIZ_ITEMS = 10; // 実力チェック：問題数

  /* ───────── ユーティリティ ───────── */
  function shuffle(a){
    for (var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }
  function sample(pool, n, exclude){
    var p = pool.filter(function(c){ return c !== exclude; });
    shuffle(p);
    return p.slice(0, n);
  }
  function answerTypeOf(key){ return key === "capital_from_pref" ? "cap" : "pref"; }

  /* ───────── 画面切り替え ───────── */
  function show(screenId){
    ["startScreen","gameScreen","resultScreen"].forEach(function(id){
      $(id).classList.toggle("active", id === screenId);
    });
    $("homeBtn").style.display = (screenId === "startScreen") ? "none" : "";
    window.scrollTo(0,0);
  }

  /* ───────── スタート画面 ───────── */
  function renderRanges(){
    var grid = $("rangeGrid");
    grid.innerHTML = "";
    RANGES.forEach(function(r){
      var b = document.createElement("button");
      b.type = "button";
      b.className = "r-btn" + (r.cls ? " "+r.cls : "") + (r.key === state.range ? " sel" : "");
      b.innerHTML = r.label + "<small>" + r.sub + "</small>";
      b.addEventListener("click", function(){
        state.range = r.key;
        renderRanges();
      });
      grid.appendChild(b);
    });
  }

  /* ───────── 出題ステップの生成 ───────── */
  function poolForRange(){
    return state.range === "all" ? ALL_CODES.slice() : groupCodes(state.range);
  }
  function pickTargets(count){
    var pool = shuffle(poolForRange().slice());
    var out = [];
    while (out.length < count){
      if (pool.length === 0) pool = shuffle(poolForRange().slice());
      out.push(pool.shift());
    }
    return out;
  }
  function buildMapSteps(){
    var targets = pickTargets(MAP_ITEMS);
    var steps = [];
    targets.forEach(function(code){
      steps.push({ key:"pref_from_map",     code:code, showMap:true });
      steps.push({ key:"capital_from_pref", code:code, showMap:true });
    });
    return steps;
  }
  function buildQuizSteps(){
    var targets = pickTargets(QUIZ_ITEMS);
    return targets.map(function(code){
      var key = Math.random() < 0.5 ? "capital_from_pref" : "pref_from_capital";
      return { key:key, code:code, showMap:false };
    });
  }

  function startGame(mode){
    state.mode = mode;
    state.idx = 0; state.total = 0; state.correct = 0; state.streak = 0;
    state.steps = (mode === "map") ? buildMapSteps() : buildQuizSteps();
    $("hudTotal").textContent = state.steps.length;
    show("gameScreen");
    renderStep();
  }

  /* ───────── 地図：ハイライト＆ズーム ───────── */
  var svg = $("jpmap");
  var VIEW_FULL = null;   // 全国のviewBox（初回計算してキャッシュ）
  var curView = { x:0, y:0, w:1000, h:1000 };
  var viewIsFull = false;
  var curGroupForZoom = null;

  function clearHighlight(){
    var els = svg.querySelectorAll(".prefecture.is-target,.prefecture.dim");
    Array.prototype.forEach.call(els, function(el){ el.classList.remove("is-target","dim"); });
  }
  function highlight(code){
    clearHighlight();
    var el = svg.querySelector('.prefecture[data-code="'+code+'"]');
    if (el) el.classList.add("is-target");
  }

  // 指定コード群のバウンディングボックスを viewBox 座標系で求める。
  // getCTM() は viewBox の拡縮を含んだ「ピクセル空間」を返すため、
  // ルートSVGの getScreenCTM() の逆行列を掛けて viewBox 座標系へ戻す。
  function unionBBox(codes){
    var rootCTM = svg.getScreenCTM(); if (!rootCTM) return null;
    var inv = rootCTM.inverse();
    var x0=1e9,y0=1e9,x1=-1e9,y1=-1e9, found=false;
    codes.forEach(function(c){
      var g = svg.querySelector('.prefecture[data-code="'+c+'"]');
      if (!g) return;
      var b; try { b = g.getBBox(); } catch(e){ return; }
      if (!b || (!b.width && !b.height)) return;
      var sm = g.getScreenCTM(); if (!sm) return;
      var m = inv.multiply(sm); // 県ローカル座標 → viewBox座標
      var corners = [[b.x,b.y],[b.x+b.width,b.y],[b.x,b.y+b.height],[b.x+b.width,b.y+b.height]];
      corners.forEach(function(p){
        var X = m.a*p[0] + m.c*p[1] + m.e;
        var Y = m.b*p[0] + m.d*p[1] + m.f;
        if (X<x0) x0=X; if (Y<y0) y0=Y; if (X>x1) x1=X; if (Y>y1) y1=Y;
        found = true;
      });
    });
    if (!found) return null;
    return { x:x0, y:y0, w:x1-x0, h:y1-y0 };
  }
  function padBox(b, ratio){
    var px = b.w * ratio, py = b.h * ratio;
    // 最低限の余白（狭い県が大きくなりすぎないように）
    px = Math.max(px, 18); py = Math.max(py, 18);
    return { x:b.x-px, y:b.y-py, w:b.w+px*2, h:b.h+py*2 };
  }

  function setViewBox(v){
    curView = v;
    svg.setAttribute("viewBox", v.x+" "+v.y+" "+v.w+" "+v.h);
  }
  function tweenViewBox(to, ms){
    var from = { x:curView.x, y:curView.y, w:curView.w, h:curView.h };
    var t0 = performance.now();
    function frame(now){
      var t = Math.min(1, (now - t0) / ms);
      var e = 1 - Math.pow(1-t, 3); // ease-out
      setViewBox({
        x: from.x + (to.x-from.x)*e,
        y: from.y + (to.y-from.y)*e,
        w: from.w + (to.w-from.w)*e,
        h: from.h + (to.h-from.h)*e
      });
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function zoomToGroup(g, animate){
    curGroupForZoom = g;
    viewIsFull = false;
    $("zoomBtn").textContent = "日本全体";
    var box = unionBBox(groupCodes(g));
    if (!box) return;
    box = padBox(box, 0.12);
    if (animate) tweenViewBox(box, 500); else setViewBox(box);
  }
  function zoomToFull(animate){
    viewIsFull = true;
    $("zoomBtn").textContent = "拡大にもどす";
    if (!VIEW_FULL){
      var box = unionBBox(ALL_CODES);
      VIEW_FULL = box ? padBox(box, 0.03) : { x:0,y:0,w:1000,h:1000 };
    }
    if (animate) tweenViewBox(VIEW_FULL, 500); else setViewBox(VIEW_FULL);
  }
  $("zoomBtn").addEventListener("click", function(){
    if (viewIsFull) { if (curGroupForZoom) zoomToGroup(curGroupForZoom, true); }
    else zoomToFull(true);
  });

  /* ───────── 選択肢の生成 ───────── */
  function optionsFor(step){
    var p = byCode(step.code);
    var distractors = sample(groupCodes(p.g), 5, p.c);
    // グループが5未満のときは全国から補う（実際は全グループ7以上なので通常不要）
    if (distractors.length < 5){
      var extra = sample(ALL_CODES, 5 - distractors.length, p.c)
        .filter(function(c){ return distractors.indexOf(c) === -1; });
      distractors = distractors.concat(extra);
    }
    var codes = shuffle([p.c].concat(distractors));
    var at = answerTypeOf(step.key);
    return codes.map(function(c){
      var q = byCode(c);
      return {
        code: c,
        main: at === "cap" ? q.cap : q.n,
        sub:  at === "cap" ? q.cy  : q.y,
        correct: c === p.c
      };
    });
  }

  function promptFor(step){
    var p = byCode(step.code);
    if (step.key === "pref_from_map")     return "ひかっている 都道府県は どれ？";
    if (step.key === "capital_from_pref") return "<b>"+p.n+"</b> の 県庁所在地は？";
    if (step.key === "pref_from_capital") return "県庁所在地が「<b>"+p.cap+"</b>」なのは？";
    return "";
  }
  function questionText(step){
    var p = byCode(step.code);
    if (step.key === "pref_from_map")     return "地図で光っている都道府県の名前";
    if (step.key === "capital_from_pref") return p.n + "の県庁所在地";
    if (step.key === "pref_from_capital") return "県庁所在地が「"+p.cap+"」の都道府県";
    return "";
  }

  /* ───────── ステップ描画 ───────── */
  function renderStep(){
    var step = state.steps[state.idx];
    var p = byCode(step.code);
    state.locked = false;

    // 地図 or ヒントカード
    if (step.showMap){
      $("mapPanel").style.display = "";
      $("hintCard").style.display = "none";
      var g = (state.range === "all") ? p.g : state.range;
      $("regionTag").textContent = GROUP_LABEL[g] || "全国";
      highlight(step.code);
      zoomToGroup(g, true);
    } else {
      $("mapPanel").style.display = "none";
      $("hintCard").style.display = "";
      if (step.key === "capital_from_pref"){
        $("hintTag").textContent = "この都道府県の 県庁所在地は？";
        $("hintMain").textContent = p.n;
        $("hintSub").textContent = p.y;
      } else { // pref_from_capital
        $("hintTag").textContent = "この都市が 県庁所在地の 都道府県は？";
        $("hintMain").textContent = p.cap;
        $("hintSub").textContent = p.cy;
      }
    }

    $("prompt").innerHTML = promptFor(step);

    // 選択肢
    var opts = optionsFor(step);
    var wrap = $("options");
    wrap.innerHTML = "";
    opts.forEach(function(o){
      var b = document.createElement("button");
      b.type = "button";
      b.className = "opt";
      b.dataset.code = o.code;
      b.innerHTML = '<span class="opt-main">'+o.main+'</span><span class="opt-sub">'+o.sub+'</span>';
      b.addEventListener("click", function(){ choose(o, step, b); });
      wrap.appendChild(b);
    });

    $("feedback").innerHTML = "";
    renderHud();
  }

  function renderHud(){
    $("hudDone").textContent = state.idx;      // これまでに答えた数
    $("hudCorrect").textContent = state.correct;
    $("hudStreak").textContent = state.streak;
    var pct = state.steps.length ? Math.round(state.idx / state.steps.length * 100) : 0;
    $("progFill").style.width = pct + "%";
  }

  function choose(o, step, btn){
    if (state.locked) return;
    state.locked = true;
    var p = byCode(step.code);
    var at = answerTypeOf(step.key);
    var correctText = at === "cap" ? p.cap : p.n;
    var ok = o.correct;

    // ボタンの見た目
    Array.prototype.forEach.call($("options").children, function(b){
      b.classList.add("done");
      if (+b.dataset.code === p.c) b.classList.add("is-correct");
      else if (b === btn) b.classList.add("is-wrong");
    });

    state.total++;
    if (ok){ state.correct++; state.streak++; } else { state.streak = 0; }

    // 学習記録（ログイン時のみ動作 / 未組み込み環境では黙ってスキップ）
    if (window.Divp && typeof window.Divp.answer === "function"){
      window.Divp.answer(ok, {
        question_key: step.key,
        question_params: { code: p.c },
        question_text: questionText(step),
        correct_answer: correctText,
        wrong_answer: ok ? null : o.main
      });
    }

    // フィードバック
    if (ok){
      if (window.Divp && Divp.correct){ try { Divp.correct(); } catch(e){} }
      $("feedback").innerHTML = '<div class="msg good">せいかい！ 🎯</div>';
    } else {
      $("feedback").innerHTML =
        '<div class="msg bad">ざんねん… こたえは <span class="ans">「'+correctText+'」</span></div>';
    }
    var nb = document.createElement("button");
    nb.type = "button";
    nb.className = "nextbtn";
    nb.textContent = (state.idx >= state.steps.length - 1) ? "けっかを見る" : "つぎへ →";
    nb.addEventListener("click", next);
    $("feedback").appendChild(nb);
    renderHud();
  }

  function next(){
    state.idx++;
    if (state.idx >= state.steps.length){ showResult(); return; }
    renderStep();
  }

  /* ───────── 結果画面 ───────── */
  function showResult(){
    var total = state.total, correct = state.correct;
    var rate = total ? Math.round(correct/total*100) : 0;
    $("resCorrect").textContent = correct;
    $("resTotal").textContent = total;
    $("resRate").textContent = "正答率 " + rate + "%";
    var emo, title, cheer;
    if (rate === 100){ emo="🏆"; title="パーフェクト！"; cheer="ぜんもん正解！ 都道府県マスターだね！"; }
    else if (rate >= 80){ emo="🎉"; title="すごい！"; cheer="よくできました！ この調子でどんどん覚えよう。"; }
    else if (rate >= 50){ emo="😊"; title="いいちょうし！"; cheer="半分いじょう正解！ まちがえた県をもう一度やってみよう。"; }
    else { emo="💪"; title="つぎはできる！"; cheer="くりかえせば必ず覚えられるよ。もう一度チャレンジ！"; }
    $("resEmo").textContent = emo;
    $("resTitle").textContent = title;
    $("resCheer").textContent = cheer;
    show("resultScreen");
  }

  /* ───────── 解き直し（?retry=1） ───────── */
  function startRetry(steps){
    state.mode = "retry";
    state.idx = 0; state.total = 0; state.correct = 0; state.streak = 0;
    state.steps = steps;
    $("hudTotal").textContent = steps.length;
    show("gameScreen");
    renderStep();
  }

  /* ───────── イベント ───────── */
  Array.prototype.forEach.call(document.querySelectorAll(".mode-btn"), function(b){
    b.addEventListener("click", function(){ startGame(b.dataset.mode); });
  });
  $("homeBtn").addEventListener("click", function(){ show("startScreen"); });
  $("toHomeBtn").addEventListener("click", function(){ show("startScreen"); });
  $("againBtn").addEventListener("click", function(){
    if (state.mode === "retry") show("startScreen");
    else startGame(state.mode);
  });

  /* ───────── 初期化 ───────── */
  renderRanges();

  function boot(){
    if (window.Divp && typeof Divp.init === "function"){
      try { Divp.init(UNIT_KEY); } catch(e){}
    }
    if (/[?&]retry=1/.test(location.search) &&
        window.Divp && typeof Divp.getRetries === "function"){
      Divp.getRetries().then(function(items){
        var steps = [];
        (items || []).forEach(function(it){
          var key = it.question_key;
          var code = it.question_params && it.question_params.code;
          if (!code || !byCode(code)) return;
          if (["pref_from_map","capital_from_pref","pref_from_capital"].indexOf(key) === -1) return;
          steps.push({ key:key, code:+code, showMap: key === "pref_from_map" });
        });
        if (steps.length) startRetry(shuffle(steps));
      }).catch(function(){});
    }
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
