<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熟語四択問題</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1EADA;
    --paper-deep:#E6DCC4;
    --paper-line:#D8CBA9;
    --ink:#221F1A;
    --ink-soft:#5C574B;
    --seal:#AE3428;
    --seal-deep:#8C271E;
    --bamboo:#5E7A5A;
    --bamboo-deep:#496048;
    --shadow: 0 10px 30px rgba(34,31,26,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.35), transparent 60%),
      repeating-linear-gradient(135deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 2px, transparent 2px, transparent 5px),
      var(--paper);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 60px;
  }
  .mincho{ font-family:'Shippori Mincho', serif; }
  #app{ width:100%; max-width:640px; }

  .brand{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; padding-bottom:14px;
    border-bottom:2px solid var(--paper-line);
    gap:12px;
  }
  .brand-name{ font-family:'Shippori Mincho', serif; font-weight:700; font-size:20px; letter-spacing:0.06em; }
  .brand-name small{ display:block; font-family:'Zen Kaku Gothic New',sans-serif; font-size:11px; color:var(--ink-soft); letter-spacing:0.15em; font-weight:400; margin-top:2px; }
  .brand-right{ display:flex; align-items:center; gap:14px; }
  .brand-progress{ font-family:'Shippori Mincho', serif; font-size:14px; color:var(--ink-soft); white-space:nowrap; }
  .brand-progress b{ color:var(--seal); font-size:18px; }
  .quit-btn{
    display:flex; align-items:center; gap:5px;
    background:none; border:1.5px solid var(--paper-line); border-radius:5px;
    padding:6px 12px; font-family:'Zen Kaku Gothic New', sans-serif; font-size:12.5px; font-weight:700;
    color:var(--ink-soft); cursor:pointer; white-space:nowrap;
    transition:border-color .15s, color .15s, background .15s;
  }
  .quit-btn:hover{ border-color:var(--seal); color:var(--seal-deep); background:rgba(174,52,40,0.06); }

  .card{
    background:#FBF8F0;
    border:1px solid var(--paper-line);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:40px 32px;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg, var(--seal), var(--bamboo));
  }

  /* ---------- START SCREEN ---------- */
  .hero-kanji{ font-family:'Shippori Mincho', serif; font-size:96px; line-height:1; text-align:center; color:var(--ink); margin:6px 0 4px; }
  .title-jp{ text-align:center; font-family:'Shippori Mincho', serif; font-weight:700; font-size:24px; margin:0 0 6px; }
  .subtitle{ text-align:center; color:var(--ink-soft); font-size:13.5px; margin:0 0 30px; line-height:1.85; }
  .subtitle .rule{ display:block; }

  .section-label{
    font-family:'Shippori Mincho', serif; font-size:13px; color:var(--bamboo-deep);
    letter-spacing:0.15em; margin:0 0 10px; display:flex; align-items:center; gap:8px;
  }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--paper-line); }

  .example-box{
    background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:5px;
    padding:16px 18px; margin-bottom:26px; font-size:13.5px; line-height:2;
  }
  .example-box .ex-sentence{ font-family:'Shippori Mincho', serif; font-size:16px; }
  .example-box .ex-blank{ display:inline-block; padding:0 4px; border-bottom:2px dotted var(--seal); color:var(--seal-deep); font-weight:700; }
  .example-box .ex-choices{ margin-top:8px; color:var(--ink-soft); }
  .example-box .ex-choices b{ color:var(--ink); }

  .option-row{ display:flex; gap:10px; margin-bottom:26px; flex-wrap:wrap; }
  .opt-btn{
    flex:1; min-width:70px; padding:14px 10px;
    background:#FBF8F0; border:1.5px solid var(--paper-line); border-radius:5px;
    font-family:'Zen Kaku Gothic New', sans-serif; font-weight:700; font-size:14px; color:var(--ink);
    cursor:pointer; text-align:center; transition:border-color .15s, background .15s, transform .1s;
  }
  .opt-btn:hover{ border-color:var(--bamboo); transform:translateY(-1px); }
  .opt-btn.active{ background:var(--bamboo); border-color:var(--bamboo-deep); color:#fff; }
  .opt-btn small{ display:block; font-weight:400; font-size:11px; margin-top:3px; opacity:0.85; }
  .opt-btn:disabled{ opacity:0.35; cursor:not-allowed; }

  .start-btn-wrap{ display:flex; justify-content:center; margin-top:8px; gap:16px; flex-wrap:wrap; }
  .seal-btn{
    width:150px; height:150px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #C1483B, var(--seal) 55%, var(--seal-deep) 100%);
    border:none; color:#fff; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif; font-size:22px; font-weight:700; letter-spacing:0.1em;
    box-shadow:0 8px 22px rgba(174,52,40,0.45), inset 0 0 0 3px rgba(255,255,255,0.25);
    transition:transform .15s, box-shadow .15s;
  }
  .seal-btn:hover{ transform:scale(1.04); box-shadow:0 10px 26px rgba(174,52,40,0.55), inset 0 0 0 3px rgba(255,255,255,0.3); }
  .seal-btn:active{ transform:scale(0.97); }
  .seal-btn small{ font-family:'Zen Kaku Gothic New',sans-serif; font-weight:400; font-size:10.5px; margin-top:4px; letter-spacing:0.2em; opacity:0.9; }

  .seal-btn.secondary{
    background:radial-gradient(circle at 35% 30%, #6f8a6a, var(--bamboo) 55%, var(--bamboo-deep) 100%);
    box-shadow:0 8px 22px rgba(94,122,90,0.4), inset 0 0 0 3px rgba(255,255,255,0.25);
  }
  .seal-btn.secondary:hover{ box-shadow:0 10px 26px rgba(94,122,90,0.5), inset 0 0 0 3px rgba(255,255,255,0.3); }
  .seal-btn:disabled{ opacity:0.35; cursor:not-allowed; transform:none !important; box-shadow:none; }

  /* ---------- QUIZ SCREEN ---------- */
  .quiz-lead{ font-size:12.5px; color:var(--ink-soft); text-align:center; margin-bottom:22px; letter-spacing:0.04em; }

  .sentence-box{
    text-align:center; font-family:'Shippori Mincho', serif; font-size:24px; line-height:1.9;
    padding:26px 14px; margin-bottom:30px;
    background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:5px;
  }
  .blank-tag{
    display:inline-block; padding:0 8px; margin:0 2px;
    border-bottom:3px dotted var(--seal);
    color:var(--seal-deep); font-weight:700;
  }

  .choices-list{ display:flex; flex-direction:column; gap:10px; }
  .choice-btn{
    display:flex; align-items:center; gap:16px;
    padding:16px 18px;
    background:#FBF8F0; border:1.5px solid var(--paper-line); border-radius:5px;
    cursor:pointer; transition:border-color .15s, transform .08s, background .15s;
    position:relative;
  }
  .choice-btn:hover:not(.locked){ border-color:var(--bamboo); transform:translateX(3px); }
  .choice-btn.locked{ cursor:default; }
  .choice-num{
    font-family:'Shippori Mincho', serif; font-size:15px; font-weight:700;
    width:28px; height:28px; border-radius:50%;
    border:1.5px solid var(--ink-soft); color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .choice-kanji{ font-family:'Shippori Mincho', serif; font-size:28px; flex:1; }
  .choice-btn.correct{ background:rgba(94,122,90,0.16); border-color:var(--bamboo); }
  .choice-btn.correct .choice-num{ border-color:var(--bamboo); color:var(--bamboo-deep); }
  .choice-btn.wrong{ background:rgba(174,52,40,0.10); border-color:var(--seal); }
  .choice-btn.wrong .choice-num{ border-color:var(--seal); color:var(--seal-deep); }
  .choice-btn.dim{ opacity:0.45; }

  .stamp{
    position:absolute; top:-12px; right:-8px;
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif; font-weight:700; font-size:19px;
    transform:rotate(-14deg) scale(0.4); opacity:0;
    animation:stampIn .32s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  .stamp.ok{ background:var(--seal); color:#fff; box-shadow:0 4px 10px rgba(174,52,40,0.4), inset 0 0 0 2px rgba(255,255,255,0.35); }
  .stamp.ng{ background:#4a4a44; color:#fff; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
  @keyframes stampIn{ to{ transform:rotate(-14deg) scale(1); opacity:1; } }

  .feedback-panel{
    margin-top:26px; padding-top:20px; border-top:1px dashed var(--paper-line);
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .feedback-text{ font-size:13.5px; color:var(--ink-soft); line-height:1.7; }
  .feedback-text b{ color:var(--ink); font-family:'Shippori Mincho', serif; font-size:16px; }
  .next-btn{
    background:var(--ink); color:#F1EADA; border:none; border-radius:4px;
    padding:12px 26px; font-family:'Shippori Mincho', serif; font-size:15px;
    letter-spacing:0.08em; cursor:pointer; white-space:nowrap;
    transition:background .15s, transform .1s;
  }
  .next-btn:hover{ background:#3a352c; transform:translateY(-1px); }

  /* ---------- RESULT SCREEN ---------- */
  .result-score{ text-align:center; margin:6px 0 4px; }
  .result-score .num{ font-family:'Shippori Mincho', serif; font-size:72px; line-height:1; color:var(--seal); }
  .result-score .denom{ font-family:'Shippori Mincho', serif; font-size:28px; color:var(--ink-soft); }
  .result-comment{ text-align:center; font-family:'Shippori Mincho', serif; font-size:18px; margin:10px 0 32px; }

  .review-list{ display:flex; flex-direction:column; gap:10px; margin:0 0 30px; max-height:520px; overflow-y:auto; padding-right:4px; }
  .review-item{
    background:var(--paper-deep); border:1px solid var(--paper-line); border-radius:5px;
    padding:14px 16px;
  }
  .review-item .rv-sentence{ font-family:'Shippori Mincho', serif; font-size:16px; margin-bottom:6px; }
  .review-item .rv-sentence b{ color:var(--seal-deep); }
  .review-item .rv-info{ font-size:12.5px; color:var(--ink-soft); line-height:1.6; }
  .review-item .rv-info b{ color:var(--ink); font-size:14px; }
  .review-empty{ text-align:center; color:var(--ink-soft); font-size:13px; padding:10px 0 30px; }

  .hidden{ display:none !important; }

  /* ---------- CONFIRM MODAL ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(34,31,26,0.45);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal-box{
    background:#FBF8F0; border:1px solid var(--paper-line); border-radius:6px;
    padding:28px 26px; max-width:340px; width:100%; box-shadow:var(--shadow); text-align:center;
  }
  .modal-box p{ font-size:14px; color:var(--ink); line-height:1.7; margin:0 0 22px; }
  .modal-actions{ display:flex; gap:10px; justify-content:center; }
  .modal-btn{
    flex:1; padding:11px 14px; border-radius:5px; font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700; font-size:13.5px; cursor:pointer; border:1.5px solid var(--paper-line);
    background:#FBF8F0; color:var(--ink); transition:background .15s, border-color .15s;
  }
  .modal-btn.danger{ background:var(--seal); color:#fff; border-color:var(--seal-deep); }
  .modal-btn.danger:hover{ background:var(--seal-deep); }
  .modal-btn:not(.danger):hover{ border-color:var(--bamboo); }

  @media (max-width:420px){
    .card{ padding:28px 18px; }
    .sentence-box{ font-size:19px; }
    .choice-kanji{ font-size:24px; }
    .seal-btn{ width:130px; height:130px; font-size:19px; }
    .brand-name{ font-size:17px; }
  }

  @media (prefers-reduced-motion: reduce){
    .stamp{ animation:none; opacity:1; transform:rotate(-14deg) scale(1); }
    .seal-btn, .choice-btn, .opt-btn, .next-btn{ transition:none; }
  }

  button:focus-visible, .opt-btn:focus-visible, .choice-btn:focus-visible{
    outline:3px solid var(--bamboo); outline-offset:2px;
  }
</style>
</head>
<body>
<div id="app">

  <div class="brand">
    <div class="brand-name">熟語四択問題<small id="totalLabel">QUESTIONS</small></div>
    <div class="brand-right">
      <div class="brand-progress hidden" id="progressLabel"></div>
      <button class="quit-btn hidden" id="quitBtn">← やめる</button>
    </div>
  </div>

  <!-- START SCREEN -->
  <div class="card" id="startScreen">
    <div class="hero-kanji">熟</div>
    <div class="title-jp">文中の空欄に合う漢字を選ぶ</div>
    <p class="subtitle">
      <span class="rule" id="rangeLabel">出題範囲は常用漢字のみ。ランダムに出題されます。</span>
      <span class="rule">同じ読みを持つ4つの漢字の中から、文意に合う一字を選びます。</span>
    </p>

    <div class="section-label">出題例</div>
    <div class="example-box">
      <div class="ex-sentence">亀の歩みは緩<span class="ex-blank">マン</span>である。</div>
      <div class="ex-choices">① 万　② 満　③ 漫　④ <b>慢</b>（正解）</div>
    </div>

    <div class="section-label">問題数</div>
    <div class="option-row" id="countRow">
      <div class="opt-btn" data-count="10">10問</div>
      <div class="opt-btn active" data-count="25">25問</div>
      <div class="opt-btn" data-count="50">50問</div>
      <div class="opt-btn" data-count="100">100問</div>
    </div>

    <div class="start-btn-wrap">
      <button class="seal-btn" id="startBtn">はじめる<small>START</small></button>
      <button class="seal-btn secondary hidden" id="retryWrongBtn">やり直す<small>WRONG ONLY</small></button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="card hidden" id="quizScreen">
    <p class="quiz-lead">空欄に当てはまる正しい漢字を選びなさい</p>
    <div class="sentence-box" id="sentenceBox"></div>
    <div class="choices-list" id="choicesList"></div>
    <div class="feedback-panel hidden" id="feedbackPanel">
      <div class="feedback-text" id="feedbackText"></div>
      <button class="next-btn" id="nextBtn">次へ →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="card hidden" id="resultScreen">
    <div class="section-label" style="justify-content:center; border:none;">結果</div>
    <div class="result-score"><span class="num" id="resultNum">0</span><span class="denom" id="resultDenom">/ 0</span></div>
    <div class="result-comment" id="resultComment"></div>

    <div class="section-label" id="reviewLabel">復習リスト</div>
    <div class="review-list" id="reviewList"></div>
    <div class="review-empty hidden" id="reviewEmpty">全問正解でした。復習の必要はありません。</div>

    <div class="start-btn-wrap">
      <button class="seal-btn secondary hidden" id="resultRetryWrongBtn">間違えた問題<small>だけやり直す</small></button>
      <button class="seal-btn" id="retryBtn">もう一度<small>RETRY</small></button>
    </div>
  </div>

</div>

<!-- CONFIRM MODAL (for quitting mid-quiz) -->
<div class="modal-overlay hidden" id="confirmOverlay">
  <div class="modal-box">
    <p>ここでやめますか？<br>現在の解答結果は保存されません。</p>
    <div class="modal-actions">
      <button class="modal-btn" id="cancelQuitBtn">続ける</button>
      <button class="modal-btn danger" id="confirmQuitBtn">やめる</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   GROUPS: 読み(オンヨミ) -> 同じ読みを持つ常用漢字のプール
   QUESTIONS_RAW: 熟語四択問題データ（sentence に {BLANK} を含む）

answer": "処", "word": "対処", "meaning": "事態に応じてうまく処置すること"}, {"sentence": "消防{BLANK}に電話する。", "reading": "ショ", "answer": "署", "word": "消防署", "meaning": "消防に関する仕事を行う役所"}];

document.getElementById('totalLabel').textContent = QUESTIONS_RAW.length + ' QUESTIONS';

/* ============================================================
   状態管理
   ============================================================ */
let settings = { count: 25 };
let quiz = { questions: [], index: 0, score: 0, wrong: [], locked: false, mode: 'normal' };
let lastWrongPool = []; // persists across "retry wrong only" chains

const $ = (id) => document.getElementById(id);
const screens = { start: $('startScreen'), quiz: $('quizScreen'), result: $('resultScreen') };

function showScreen(name){
  Object.values(screens).forEach(s => s.classList.add('hidden'));
  screens[name].classList.remove('hidden');
  $('progressLabel').classList.toggle('hidden', name !== 'quiz');
  $('quitBtn').classList.toggle('hidden', name !== 'quiz');
}

document.querySelectorAll('#countRow .opt-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#countRow .opt-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    settings.count = parseInt(btn.dataset.count, 10);
  });
});

$('startBtn').addEventListener('click', ()=> startQuiz('normal'));
$('retryBtn').addEventListener('click', ()=> showScreen('start'));
$('nextBtn').addEventListener('click', nextQuestion);
$('retryWrongBtn').addEventListener('click', ()=> startQuiz('wrongOnly'));
$('resultRetryWrongBtn').addEventListener('click', ()=> startQuiz('wrongOnly'));

// ---- quit / back button with confirmation ----
$('quitBtn').addEventListener('click', ()=> $('confirmOverlay').classList.remove('hidden'));
$('cancelQuitBtn').addEventListener('click', ()=> $('confirmOverlay').classList.add('hidden'));
$('confirmQuitBtn').addEventListener('click', ()=>{
  $('confirmOverlay').classList.add('hidden');
  showScreen('start');
  updateStartScreenState();
});

function updateStartScreenState(){
  const hasWrong = lastWrongPool.length > 0;
  $('retryWrongBtn').classList.toggle('hidden', !hasWrong);
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildChoices(q){
  const pool = GROUPS[q.reading] || [q.answer];
  const others = pool.filter(k => k !== q.answer);
  const distractors = shuffle(others).slice(0, 3);
  while(distractors.length < 3){
    distractors.push(q.answer);
  }
  return shuffle([q.answer, ...distractors]);
}

function startQuiz(mode){
  quiz.mode = mode;
  let sourcePool;
  if(mode === 'wrongOnly'){
    sourcePool = lastWrongPool;
  } else {
    const n = Math.min(settings.count, QUESTIONS_RAW.length);
    sourcePool = shuffle(QUESTIONS_RAW).slice(0, n);
  }
  quiz.questions = shuffle(sourcePool).map(q => ({...q, choices: buildChoices(q)}));
  quiz.index = 0;
  quiz.score = 0;
  quiz.wrong = [];
  showScreen('quiz');
  renderQuestion();
}

const CIRCLED = ['①','②','③','④'];

function renderQuestion(){
  quiz.locked = false;
  const q = quiz.questions[quiz.index];
  $('progressLabel').innerHTML = `問題 <b>${quiz.index+1}</b> / ${quiz.questions.length}`;

  const parts = q.sentence.split('{BLANK}');
  $('sentenceBox').innerHTML = parts.join(`<span class="blank-tag">${q.reading}</span>`);

  const list = $('choicesList');
  list.innerHTML = '';
  q.choices.forEach((choice, i)=>{
    const btn = document.createElement('div');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${CIRCLED[i]}</span><span class="choice-kanji">${choice}</span>`;
    btn.addEventListener('click', ()=> selectAnswer(choice, btn));
    list.appendChild(btn);
  });

  $('feedbackPanel').classList.add('hidden');
}

function selectAnswer(choice, btnEl){
  if(quiz.locked) return;
  quiz.locked = true;
  const q = quiz.questions[quiz.index];
  const isCorrect = choice === q.answer;

  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.classList.add('locked');
    const kanjiText = b.querySelector('.choice-kanji').textContent;
    if(kanjiText === q.answer){
      b.classList.add('correct');
      const s = document.createElement('div');
      s.className = 'stamp ok';
      s.textContent = '○';
      b.appendChild(s);
    } else if(b === btnEl){
      b.classList.add('wrong');
      const s = document.createElement('div');
      s.className = 'stamp ng';
      s.textContent = '✕';
      b.appendChild(s);
    } else {
      b.classList.add('dim');
    }
  });

  if(isCorrect){ quiz.score++; } else { quiz.wrong.push(q); }

  const filled = q.sentence.replace('{BLANK}', q.answer);
  $('feedbackText').innerHTML = isCorrect
    ? `<b>正解</b><br>${filled}<br>「${q.word}」— ${q.meaning}`
    : `<b>不正解</b><br>正しくは「${q.answer}」。${filled}<br>「${q.word}」— ${q.meaning}`;
  $('feedbackPanel').classList.remove('hidden');
  $('nextBtn').textContent = (quiz.index === quiz.questions.length-1) ? '結果を見る →' : '次へ →';
}

function nextQuestion(){
  quiz.index++;
  if(quiz.index >= quiz.questions.length){ showResult(); } else { renderQuestion(); }
}

function showResult(){
  showScreen('result');
  const total = quiz.questions.length;
  $('resultNum').textContent = quiz.score;
  $('resultDenom').textContent = `/ ${total}`;

  const ratio = quiz.score / total;
  let comment;
  if(ratio === 1) comment = '素晴らしい！全問正解です。';
  else if(ratio >= 0.8) comment = 'よくできました！';
  else if(ratio >= 0.5) comment = 'もう少し。復習してみましょう。';
  else comment = '復習リストで見直してみましょう。';
  $('resultComment').textContent = comment;

  // strip generated 'choices' before storing for a future wrong-only retry
  lastWrongPool = quiz.wrong.map(({choices, ...rest}) => rest);
  $('resultRetryWrongBtn').classList.toggle('hidden', lastWrongPool.length === 0);

  const list = $('reviewList');
  list.innerHTML = '';
  if(quiz.wrong.length === 0){
    $('reviewEmpty').classList.remove('hidden');
  } else {
    $('reviewEmpty').classList.add('hidden');
    quiz.wrong.forEach(q=>{
      const filled = q.sentence.replace('{BLANK}', `<b>${q.answer}</b>`);
      const row = document.createElement('div');
      row.className = 'review-item';
      row.innerHTML = `
        <div class="rv-sentence">${filled}</div>
        <div class="rv-info"><b>${q.word}</b>（${q.reading}）— ${q.meaning}</div>
      `;
      list.appendChild(row);
    });
  }
}
</script>
