<!DOCTYPE html>
<html lang="ja">
<!--
  english_js1_invader.html  英単語インベーダー（中1英語：並べかえ × 動詞の形変化）
  配置先: /learning/english/ （命名規約に合わせて製作者コードを付ける場合はリネーム）
  unit_key: english_js1_invader （ファイル名・パスとは独立の論理ID）
  依存: /assets/divp-correct-jh.js（正解演出ハンコ。未ロードでも単体で完全動作）
        中ボスBGM: /assets/bgm/boss.mp3（未配置なら合成音にフォールバック）
        ※共通ヘッダー(divp-header.js)は使わない。ロゴ「中京個別GAMES」を表示。
  正解演出: jh用ハンコ (divp-correct-jh.js) を流用。星エフェクト(es用)は不使用。
  調整パラメータ: 下部 <script> 冒頭の CONFIG にまとめてある
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>英単語インベーダー｜中1英語｜中京個別指導学院</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --divp-bg:#bfe9ff;
  --divp-panel:#ffffff;
  --divp-border:#7cc4f0;
  --divp-accent:#ff6f9c;
  --divp-accent2:#ff9b2f;
  --divp-text:#1f3a5c;
  --divp-sub:#5a7ea6;
  --divp-overlay:rgba(240,250,255,.93);
}
body.divp-dark{
  --divp-bg:#07000d;
  --divp-panel:#150a20;
  --divp-border:#41205e;
  --divp-accent:#b57bff;
  --divp-accent2:#ff4d6d;
  --divp-text:#e9d5ff;
  --divp-sub:#9a7bc0;
  --divp-overlay:rgba(5,0,12,.9);
}
/* manipulation＝スクロール(パン)は許可・ダブルタップ拡大は無効（iOSはこの値でのみ確実に切れる。pan-y/noneだと双打ズームが残る個体がある）。
   ピンチはCSS上は許容されるが、JS(gesture*・2本指touch)で抑止する。
   ゲーム面(#divp-canvas)だけは個別にnoneで全ジェスチャー抑止（スクロール不要）。 */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
html,body{margin:0;padding:0;height:100%;touch-action:manipulation;}
body{
  background:var(--divp-bg);
  color:var(--divp-text);
  font-family:'DotGothic16','Zen Maru Gothic',sans-serif;
  transition:background .8s;
  overscroll-behavior:none;
  position:fixed;width:100%;height:100%;overflow:hidden; /* ページ自体をスクロールさせない */
}
#divp-game-wrap{
  max-width:540px;margin:0 auto;
  padding:4px 8px max(10px, env(safe-area-inset-bottom));
  height:100vh;height:100svh;   /* Safariバー分を除いた実表示高さ。svh固定（dvhだとバー開閉で伸縮）。svh非対応の旧環境はvhにフォールバック */
  display:flex;flex-direction:column;gap:4px;
  overflow:hidden;
}
#divp-canvas-box{flex:1 1 auto;min-height:0;} /* 残り高さをキャンバスが吸収 */
#divp-brand{
  text-align:center;font-size:22px;letter-spacing:1px;
  color:var(--divp-accent);
  text-shadow:2px 2px 0 var(--divp-accent2), 3px 3px 0 rgba(0,0,0,.25);
  padding:2px 0 2px;line-height:1;flex:0 0 auto;
  transition:color .8s;
}
#divp-brand span{color:var(--divp-accent2);text-shadow:2px 2px 0 rgba(0,0,0,.2);}
body.divp-dark #divp-brand{color:var(--divp-accent);text-shadow:2px 2px 0 #7b2fff,3px 3px 0 rgba(0,0,0,.4);}
body.divp-dark #divp-brand span{color:#ff4d6d;}
#divp-top-row{display:flex;gap:6px;align-items:stretch;flex:0 0 auto;}
#divp-ja-bar{
  flex:1;
  background:var(--divp-panel);
  border:2px solid var(--divp-accent);
  border-radius:6px;
  padding:8px 10px;
  font-size:17px;
  line-height:1.4;
  min-height:48px;
  display:flex;align-items:center;
  transition:border-color .8s, box-shadow .8s;
}
body.divp-dark #divp-ja-bar{box-shadow:0 0 14px rgba(181,123,255,.35);}
/* メニュー画面(タイトル/ストーリー/あそびかた説明)では、英文枠・英文チップ枠・操作2ボタン・一時停止を隠す（サウンドボタンだけ右に残す） */
body.divp-menu #divp-ja-bar,
body.divp-menu #divp-sentence-bar,
body.divp-menu #divp-controls,
body.divp-menu #divp-btn-pause{display:none;}
body.divp-menu #divp-btn-sound{margin-left:auto;}
/* 単語練習モード：変形ボタンは不要なので隠し、操作ボタンを1列に */
body.divp-spell #divp-btn-morph{display:none;}
body.divp-spell #divp-controls{grid-template-columns:1fr;}
#divp-btn-sound,#divp-btn-pause{
  width:48px;background:var(--divp-panel);
  border:2px solid var(--divp-border);border-radius:6px;
  color:var(--divp-text);font-size:20px;cursor:pointer;
}
#divp-btn-pause{border-color:var(--divp-accent);color:var(--divp-accent);}
/* 一時停止：全画面を覆って英文を完全に隠す */
#divp-pause{
  position:fixed;inset:0;z-index:9999;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:22px;
  background:var(--divp-bg);color:var(--divp-text);text-align:center;padding:24px;
  font-family:'DotGothic16','Zen Maru Gothic',sans-serif;
}
#divp-pause.divp-show{display:flex;}
.divp-pause-logo{font-size:clamp(28px,10vw,44px);color:var(--divp-accent);text-shadow:3px 3px 0 var(--divp-accent2),4px 4px 0 rgba(0,0,0,.2);letter-spacing:2px;line-height:1.1;}
.divp-pause-sub{font-size:14px;color:var(--divp-sub);line-height:1.8;}
.divp-pause-mark{font-size:64px;color:var(--divp-accent2);}
#divp-canvas-box{position:relative;border:2px solid var(--divp-border);border-radius:6px;overflow:hidden;background:#9fdcff;flex:1 1 auto;min-height:0;}
/* キャンバスは object-fit:contain なので枠の余白(レターボックス)が見える。
   暗い段階で枠の水色が「明るい縦線」に見えるのを防ぐため、段階の空色に合わせる */
body.divp-boss #divp-canvas-box{background:#1b2a6b;}
body.divp-dark #divp-canvas-box{background:#07000d;}
body.divp-hidden #divp-canvas-box{background:#000;}
#divp-canvas{display:block;width:100%;height:100%;object-fit:contain;image-rendering:pixelated;touch-action:none;}
#divp-scanlines{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,0) 0 2px,rgba(0,0,0,.06) 2px 3px);
  mix-blend-mode:multiply;
}
body.divp-dark #divp-scanlines{
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,0) 0 2px,rgba(0,0,0,.18) 2px 3px);
}
#divp-overlay{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;
  background:var(--divp-overlay);text-align:center;padding:12px;
  overflow-y:auto;
}
#divp-overlay.divp-show{display:flex;}
.divp-panel-in{max-width:96%;max-height:100%;overflow-y:auto;}
.divp-title-logo{font-size:clamp(22px,7vw,32px);color:var(--divp-accent);text-shadow:3px 3px 0 #ffd76e;letter-spacing:1px;line-height:1.1;white-space:nowrap;}
.divp-title-sub{font-size:14px;color:var(--divp-accent);margin:6px 0 10px;}
/* プロローグ（ストーリー） */
.divp-story{max-width:340px;margin:0 auto;text-align:center;}
.divp-story-eyebrow{font-size:12px;letter-spacing:.34em;color:var(--divp-sub);}
.divp-story-title{font-size:24px;color:var(--divp-accent);text-shadow:2px 2px 0 #ffd76e;margin:2px 0 10px;}
.divp-story-body{text-align:left;font-size:13.5px;line-height:1.6;color:var(--divp-text);}
.divp-story-body p{margin:0 0 9px;animation:divp-story-in .5s ease both;}
.divp-story-body p:nth-child(1){animation-delay:.05s;}
.divp-story-body p:nth-child(2){animation-delay:.35s;}
.divp-story-body p:nth-child(3){animation-delay:.65s;}
.divp-story-body p:nth-child(4){animation-delay:.95s;}
.divp-story-no{display:inline-block;min-width:2.1em;color:var(--divp-accent2);font-weight:700;}
.divp-story-enemy{color:#e0322b;font-weight:700;text-shadow:0 0 8px rgba(224,50,43,.45);letter-spacing:1px;}
.divp-story-body b{color:var(--divp-accent);}
@keyframes divp-story-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.divp-story-body p{animation:none;}}
.divp-howto{font-size:12px;color:var(--divp-sub);line-height:1.7;text-align:left;display:inline-block;margin-bottom:10px;}
.divp-big-btn{
  font-family:inherit;font-size:18px;padding:12px 34px;cursor:pointer;
  background:var(--divp-accent2);color:#fff;border:0;border-radius:4px;
  box-shadow:0 4px 0 #b96a12;
}
.divp-big-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b96a12;}
.divp-sub-btn{
  display:block;margin:10px auto 0;font-family:inherit;font-size:13px;
  padding:8px 18px;cursor:pointer;color:var(--divp-accent);
  background:transparent;border:2px solid var(--divp-accent);border-radius:4px;
}
.divp-sub-btn:active{transform:translateY(2px);}
.divp-rank-letter{font-size:64px;line-height:1;margin:6px 0;text-shadow:4px 4px 0 rgba(0,0,0,.5);}
.divp-result-stats{font-size:14px;line-height:2;color:var(--divp-text);margin-bottom:14px;}
.divp-model{
  display:inline-block;margin-top:2px;padding:8px 14px;
  border:2px dashed var(--divp-accent);border-radius:6px;
  font-size:19px;color:var(--divp-text);background:var(--divp-panel);
}
.divp-warning{font-size:34px;color:#ff3355;animation:divp-blink .35s steps(1) infinite;letter-spacing:4px;}
@keyframes divp-blink{50%{opacity:.15;}}
/* 裏ボス エンカウント：画面全体が激しく揺れる */
@keyframes divp-encshake{
  0%,100%{transform:translate(0,0);}
  12%{transform:translate(-8px,6px);}
  24%{transform:translate(9px,-7px);}
  36%{transform:translate(-10px,-5px);}
  48%{transform:translate(8px,8px);}
  60%{transform:translate(-7px,6px);}
  72%{transform:translate(9px,-8px);}
  84%{transform:translate(-6px,5px);}
}
#divp-canvas-box.divp-encshake{animation:divp-encshake .24s linear infinite;}
.divp-extra-title{font-size:26px;color:#b57bff;text-shadow:0 0 12px #7b2fff;margin-top:10px;}
.divp-boss-title{font-size:26px;color:#ffb547;text-shadow:0 0 14px #ff8c3a;letter-spacing:2px;}
body.divp-boss #divp-ja-bar{border-color:#ffb547;box-shadow:0 0 12px rgba(255,140,58,.55);}
.divp-hidden-title{font-size:30px;color:#ff2200;text-shadow:0 0 16px #8a0000;letter-spacing:3px;animation:divp-blink .5s steps(1) infinite;}
body.divp-hidden{background:#000!important;}
body.divp-hidden #divp-ja-bar{border-color:#8a0000;box-shadow:0 0 14px rgba(170,0,0,.6);color:#ff6666;}
body.divp-hidden #divp-brand{color:#8a0000;text-shadow:2px 2px 0 #300,3px 3px 0 rgba(0,0,0,.6);}
body.divp-hidden #divp-brand span{color:#c0392b;}
.divp-unit-label{font-size:11px;color:var(--divp-sub);margin-bottom:5px;}
#divp-unit-gram{font-size:12px;color:var(--divp-accent2);min-height:16px;margin-bottom:10px;line-height:1.5;}
.divp-mode-select{
  font-family:inherit;font-size:16px;padding:9px 12px;cursor:pointer; /* 16px未満だとiOSがタップ時に自動ズームする */
  border:2px solid var(--divp-accent);border-radius:6px;
  background:var(--divp-panel);color:var(--divp-text);
  display:block;margin:0 auto 8px;max-width:94%;width:auto;
}
.divp-unitrow{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.divp-unit{
  font-family:inherit;font-size:12px;padding:8px 10px;cursor:pointer;
  border:2px solid var(--divp-border);border-radius:6px;
  background:var(--divp-panel);color:var(--divp-text);
}
.divp-unit.divp-sel{background:var(--divp-accent);border-color:var(--divp-accent);color:#fff;}
#divp-sentence-bar{
  height:72px;background:var(--divp-panel);   /* 高さ固定：チップ増減で下段が伸縮→キャンバスが再レイアウト（横幅が細くなる）のを防ぐ */
  border:2px solid var(--divp-border);border-radius:6px;
  padding:6px 8px;flex:0 0 auto;
  display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;
  font-size:15px;overflow-y:auto;
}
.divp-chip{
  background:#e6f4ff;border:1px solid var(--divp-accent);
  border-radius:3px;padding:2px 7px;color:var(--divp-text);
}
body.divp-dark .divp-chip{background:#241233;}
.divp-cursor{display:inline-block;width:10px;height:18px;background:var(--divp-accent);animation:divp-blink .8s steps(1) infinite;}
#divp-progress{margin-left:auto;font-size:12px;color:var(--divp-sub);}
#divp-controls{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:0 0 auto;
}
.divp-ctrl{
  font-family:inherit;height:60px;border-radius:8px;cursor:pointer;
  font-size:15px;line-height:1.2;color:var(--divp-text);
  border:3px solid var(--divp-border);background:var(--divp-panel);
  user-select:none;touch-action:none;
  opacity:.45;filter:grayscale(.35);
  transition:opacity .18s, box-shadow .18s, font-size .12s, filter .18s;
}
.divp-ctrl span{font-size:10px;color:var(--divp-sub);display:block;}
.divp-ctrl:active{transform:translateY(2px);}
#divp-btn-morph{border-color:#00c2a8;color:#007a68;}
#divp-btn-shoot{border-color:#ff4d88;color:#d81b60;}
#divp-btn-morph.divp-active{background:#00c2a8;border-color:#00c2a8;color:#fff;}
#divp-btn-shoot.divp-active{background:#ff4d88;border-color:#ff4d88;color:#fff;}
/* 選択中のモードをはっきり大きく見せる */
.divp-ctrl.divp-active{
  opacity:1;filter:none;font-size:19px;font-weight:700;
  box-shadow:0 0 0 4px rgba(255,255,255,.5), 0 6px 16px rgba(0,0,0,.3);
}
.divp-ctrl.divp-active::before{content:'✓ ';}
.divp-ctrl.divp-active span{color:rgba(255,255,255,.9);font-weight:400;}
.divp-tut-glow{animation:divp-tutglow .7s ease-in-out infinite;}
@keyframes divp-tutglow{0%,100%{box-shadow:0 0 0 0 rgba(255,210,63,.7);}50%{box-shadow:0 0 0 6px rgba(255,210,63,0);}}
body.divp-dark #divp-btn-morph{border-color:#b57bff;color:#dcbaff;}
body.divp-dark #divp-btn-shoot{border-color:#ff4d6d;color:#ff8fa3;}
body.divp-dark #divp-btn-morph.divp-active{background:#7b2fff;border-color:#7b2fff;color:#fff;}
body.divp-dark #divp-btn-shoot.divp-active{background:#ff4d6d;border-color:#ff4d6d;color:#fff;}
</style>
</head>
<body data-unit-key="english_js1_invader" data-theme="retro" data-access="student">

<div id="divp-game-wrap">
  <div id="divp-brand">中京個別<span>GAMES</span></div>
  <div id="divp-top-row">
    <div id="divp-ja-bar">よみこみ中…</div>
    <button id="divp-btn-pause" type="button" aria-label="一時停止">⏸</button>
    <button id="divp-btn-sound" type="button" aria-label="サウンド切替">♪</button>
  </div>

  <div id="divp-canvas-box">
    <canvas id="divp-canvas" width="480" height="520"></canvas>
    <div id="divp-scanlines"></div>
    <div id="divp-overlay"><div class="divp-panel-in" id="divp-overlay-in"></div></div>
  </div>

  <div id="divp-sentence-bar"><span class="divp-cursor"></span><span id="divp-progress"></span></div>

  <div id="divp-controls">
    <button class="divp-ctrl" id="divp-btn-morph" type="button">かたちをかえる<span>[ Z ]</span></button>
    <button class="divp-ctrl" id="divp-btn-shoot" type="button">じゅんばんをきめる<span>[ X ]</span></button>
  </div>
</div>

<div id="divp-pause">
  <div class="divp-pause-mark">⏸</div>
  <div class="divp-pause-logo">一時停止中</div>
  <div class="divp-pause-sub">きゅうけい中… もんだいは かくれています。<br>じゅんびが できたら つづけよう！</div>
  <button class="divp-big-btn" id="divp-btn-resume" type="button">▶ つづける</button>
</div>

<script src="/assets/divp-correct-jh.js" defer></script>
<script>
(function(){
'use strict';

/* ================= CONFIG（調整はここ） ================= */
var CONFIG={
  UNIT_KEY:'english_js1_invader',
  TEST_MODE:false,          // ★動作確認用：各段階を短縮（下のSEQ_TESTを使用）。本番は false
  MISS_PENALTY:20,          // 1ミスあたりの減点
  BASE_SCORE:100,           // 通常問題の基礎点
  TIME_BONUS_MAX:150,       // 通常のタイムボーナス上限
  BOSS_BASE:200,            // 中ボスの基礎点
  LAST_BASE:300,            // ラスボスの基礎点（減点なし）
  LAST_BONUS_MAX:300,       // ラスボスのタイムボーナス上限
  HIDDEN_BASE:500,          // 裏ボスの基礎点（減点なし）
  PAR_PER_WORD:2.5,         // パー時間 = 4 + 単語数×これ（秒）
  RETRY_DELAY:3,            // ミスした問題を何問後に再出題するか
  INVADER_SPEED:16,         // 群れの初速(px/s)（通常・中ボス）
  LAST_SPEED:21,            // ラスボスの初速（加速しない分、初めから少し速く）
  HIDDEN_SPEED:25,          // 裏ボスの初速（ラスボスよりわずかに速く）
  INVADER_ACCEL:0,          // 経過秒ごとの加速（0＝加速なし・一定速度）
  INVADER_SPEED_MAX:70,
  INVADER_STEP:14,          // 折り返し時の降下量
  RETREAT_PER_WORD:7,       // 1単語正解ごとに群れが後退（上に戻る）する量
  RETREAT_MAX_UP:-40,       // 後退の上限（スタート位置より上へ行き過ぎない下限grpY）
  MULTIROW_SPEED_MUL:0.6,   // 2行（ラスボス等）は落下速度を落とす
  MULTIROW_STEP_MUL:0.7,    // 2行は折り返しの降下量も小さく
  TRIPLEROW_SPEED_MUL:0.42, // 3行以上はさらにゆっくり
  TRIPLEROW_STEP_MUL:0.55,  // 3行以上は降下量もさらに小さく
  BULLET_SPEED:520,
  SHIP_SPEED:280
};
/* 本番の進行シーケンス（各段階：種類×問数）。ノーミス継続で次段階へ。
   normal=通常, boss=中ボス, last=ラスボス, hidden=裏ボス */
var SEQ=[
  {kind:'normal',n:10},                 /* ウォームアップ：ミスOK */
  {kind:'boss',  n:2},                  /* 中ボス：2連続ノーミス（ミスで全体リスタート） */
  {kind:'normal',n:5, noMiss:true},     /* 通常5問だが「ノーミス5連続」ゲート（ミスで全体リスタート） */
  {kind:'boss',  n:2},
  {kind:'last',  n:2},                  /* ラスボス：2連続ノーミス→裏ボス（ミスでおしまい） */
  {kind:'hidden',n:1}                   /* 裏ボス：完全ノーミス（ミス/突破で全体リスタート） */
];
/* 動作確認用の短縮シーケンス */
var SEQ_TEST=[
  {kind:'normal',n:2},
  {kind:'boss',  n:2},
  {kind:'normal',n:2, noMiss:true},
  {kind:'boss',  n:2},
  {kind:'last',  n:2},
  {kind:'hidden',n:1}
];
function seq(){return CONFIG.TEST_MODE?SEQ_TEST:SEQ;}

/* ================= 問題データ ================= */
var B=['be','am','is','are'], Bc=['Be','Am','Is','Are'];
var D=['do','does'],          Dc=['Do','Does'];

/* ===== 既出語レジストリ（作文の検算用） =====
   各Unitで「新しく出す語」を登録。Unit1は既存データ全体を基準(baseline)とする。
   後のUnitで過去の語(often/want to/draw…)は自由に再利用してよい。
   Unit3以降を作るときは NEW_WORDS[3]=[…] のようにその号の新出語を足すだけ。
   起動時(TEST_MODE)に各Unitの文が「そのUnitまでの語」で作れているかconsoleで検算する。 */
var NEW_WORDS={
  2:['class','our','Canada','America','Ms','Mr','he','she','new','teacher','cool','at','good',
     'Chinese','cannot','some','parent','parents','China','food','father','can','make','makes',
     'very','well','that','read','reads','really','see','this','your','thank','it','bird','pen','English',
     'excuse','oops','here','welcome','totem','pole','thunderbird','come','comes','Jun',
     'gyoza','shumai','hiragana','kanji','curry','cook','cooks','run','runs','fast','swim',
     'wolf','fox','panda','koala','banana','kiwi','fruit','dancer','friendly','singing',
     'usually','comic','cooking','playing','much','book','books','team',
     'on','and','but','too','friend','sing','Mary','dance','dancing',
     'rainy','today','days','fans'] /* ＋ラスボス改訂の新出語(rainy/today/days/fans) */
  /* 3:[…], 4:[…] と足していく */
};
/* あるUnitの通常/中ボス/ラスボスで使う英単語の集合（小文字・記号/数字は除外）。
   裏ボス(HIDDEN)は「習っていない言葉の戦い」＝わざと未習語を使う設計なので検算対象外。 */
function invaderWords(unit){
  var out={},d=UNIT_DATA[unit];
  ['NORMAL','BOSS','EXTRA'].forEach(function(k){
    (d[k]||[]).forEach(function(q){
      var list=q.w.slice(); if(q.d)list=list.concat(q.d);
      list.forEach(function(tk){tk.f.forEach(function(s){
        var w=String(s).toLowerCase();
        if(/[a-z]/.test(w)&&!/[0-9]/.test(w))out[w]=1; /* 英字を含み数字を含まない語だけ（記号・"1-1"等は無視） */
      });});
    });
  });
  return out;
}
function validateUnits(){
  var allowed={},base=invaderWords(1),w;
  for(w in base)allowed[w]=1;                       /* Unit1=基準 */
  Object.keys(UNIT_DATA).map(Number).sort(function(a,b){return a-b;}).forEach(function(u){
    if(NEW_WORDS[u])NEW_WORDS[u].forEach(function(x){allowed[x.toLowerCase()]=1;}); /* 新出語を積み上げ */
    var used=invaderWords(u),missing=[];
    for(w in used)if(!allowed[w])missing.push(w);
    if(missing.length)console.warn('[invader] Unit'+u+' 未登録/先出しの語 → '+missing.join(', ')+'  （NEW_WORDS['+u+'] に追記を）');
    else console.log('[invader] Unit'+u+' 語彙OK');
  });
}

var BOSS_DECOY_POOL=['am','are','is','do','does','a','an','the','in','on','not','and','but','too','my','from','like','play','soccer','rugby','club','music','art','fan','you','the'];
var BOSS_MIN_TILES=10; /* 中ボスは不要語込みで必ずこの数以上のタイルにする */

function padBossDecoys(q){
  var have=q.w.length+(q.d?q.d.length:0);
  if(have>=BOSS_MIN_TILES)return q;
  var used={};
  q.w.forEach(function(t){t.f.forEach(function(s){used[String(s).toLowerCase()]=1;});});
  if(q.d)q.d.forEach(function(t){t.f.forEach(function(s){used[String(s).toLowerCase()]=1;});});
  var pool=BOSS_DECOY_POOL.filter(function(w){return !used[w.toLowerCase()];});
  shuffle(pool);
  var extra=q.d?q.d.slice():[];
  for(var i=0;i<pool.length&&(q.w.length+extra.length)<BOSS_MIN_TILES;i++){
    if(used[pool[i].toLowerCase()])continue;
    extra.push(W(pool[i]));used[pool[i].toLowerCase()]=1;
  }
  return {ja:q.ja,w:q.w,d:extra}; /* 元の問題は壊さずクローンを返す */

  var letters=entry.en.split(''),w=[],have={},i;
  for(i=0;i<letters.length;i++){w.push(W(letters[i]));have[letters[i].toLowerCase()]=1;}
  var alpha='abcdefghijklmnopqrstuvwxyz'.split(''),pool=[];
  for(i=0;i<alpha.length;i++)if(!have[alpha[i]])pool.push(alpha[i]);
  shuffle(pool);
  var d=[],want=decoyN;

var ac=null,master=null,muted=false,noiseBuf=null;
var mix=null,rev=null,distCurve=null,ps1Out=null; /* PS1級音源用 */

function initAudio(){
  if(ac)return;
  var AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return;
  ac=new AC();
  master=ac.createGain();master.gain.value=0.5;master.connect(ac.destination);
  var len=ac.sampleRate*0.5;
  noiseBuf=ac.createBuffer(1,len,ac.sampleRate);
  var d=noiseBuf.getChannelData(0);
  for(var i=0;i<len;i++)d[i]=Math.random()*2-1;
  /* PS1級音源チェーン（中ボス用）：コンプ＋リバーブ＋歪みカーブ */
  ps1Out=ac.createGain();ps1Out.gain.value=0.8;ps1Out.connect(master);
  mix=ac.createDynamicsCompressor();
  mix.threshold.value=-16;mix.knee.value=20;mix.ratio.value=6;
  mix.attack.value=0.004;mix.release.value=0.18;
  mix.connect(ps1Out);
  var isec=1.8,ilen=Math.floor(ac.sampleRate*isec);
  var imp=ac.createBuffer(2,ilen,ac.sampleRate);
  for(var ch2=0;ch2<2;ch2++){
    var dd=imp.getChannelData(ch2);
    for(var ii=0;ii<ilen;ii++)dd[ii]=(Math.random()*2-1)*Math.pow(1-ii/ilen,2.4);
  }
  rev=ac.createConvolver();rev.buffer=imp;
  var rg=ac.createGain();rg.gain.value=0.4;rev.connect(rg);rg.connect(mix);
  var kk=70,nn=1024;distCurve=new Float32Array(nn);
  for(ii=0;ii<nn;ii++){var xx=ii*2/nn-1;distCurve[ii]=(1+kk)*xx/(1+kk*Math.abs(xx));}
}
function nf(n){return 440*Math.pow(2,(n-69)/12);}
function tone(t,f,dur,type,vol,slideTo){
  if(!ac||muted)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(master);
  o.start(t);o.stop(t+dur+0.02);
}
function noiseHit(t,dur,vol,freq){
  if(!ac||muted)return;
  var s=ac.createBufferSource();s.buffer=noiseBuf;s.loop=true;
  var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=freq||6000;f.Q.value=0.8;
  var g=ac.createGain();
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  s.connect(f);f.connect(g);g.connect(master);
  s.start(t);s.stop(t+dur+0.02);
}
/* ===== PS1級音源（中ボス用ボイス） ===== */
function ps1Pan(node,p,revAmt){
  if(ac.createStereoPanner&&p){
    var pn=ac.createStereoPanner();pn.pan.value=Math.max(-1,Math.min(1,p));
    node.connect(pn);pn.connect(mix);
  }else{node.connect(mix);}
  if(revAmt){var sg=ac.createGain();sg.gain.value=revAmt;node.connect(sg);sg.connect(rev);}
}
function ps1Env(t,dur,vol,atk){
  var g=ac.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol,t+(atk||0.008));
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  return g;
}
function supersaw(t,f,dur,vol,det,nv,p,revAmt,cutoff){
  if(!ac||muted)return;
  var g=ps1Env(t,dur,vol,0.01);
  var flt=ac.createBiquadFilter();flt.type='lowpass';flt.Q.value=1;
  flt.frequency.setValueAtTime(cutoff,t);
  flt.frequency.exponentialRampToValueAtTime(Math.max(500,cutoff*0.22),t+dur);
  flt.connect(g);ps1Pan(g,p,revAmt);
  for(var i=0;i<nv;i++){
    var o=ac.createOscillator();o.type='sawtooth';
    o.frequency.value=f;o.detune.value=(i-(nv-1)/2)*det;
    o.connect(flt);o.start(t);o.stop(t+dur+0.05);
  }
}
function distTone(t,fs,dur,vol,p){
  if(!ac||muted)return;
  var g=ps1Env(t,dur,vol,0.012);
  var flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=2800;flt.Q.value=0.7;
  var sh=ac.createWaveShaper();sh.curve=distCurve;sh.oversample='2x';
  sh.connect(flt);flt.connect(g);ps1Pan(g,p,0.25);
  for(var i=0;i<fs.length;i++){
    for(var dtn=-6;dtn<=6;dtn+=12){
      var o=ac.createOscillator();o.type='sawtooth';
      o.frequency.value=fs[i];o.detune.value=dtn;
      o.connect(sh);o.start(t);o.stop(t+dur+0.05);
    }
  }
}
function stabChord(t,notes,sd){
  for(var i=0;i<notes.length;i++)
    supersaw(t,nf(notes[i]),sd*1.3,0.028,10,2,(i-1)*0.25,0.3,3200);
}
function bassMono(t,f,dur,vol,cut){
  if(!ac||muted)return;
  var g=ps1Env(t,dur,vol,0.006);
  var flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=cut;flt.Q.value=1.2;
  var o=ac.createOscillator();o.type='sawtooth';o.frequency.value=f;
  o.connect(flt);flt.connect(g);g.connect(mix);
  o.start(t);o.stop(t+dur+0.05);
}
function noiseShot(t,dur,vol,freq,p,revAmt,hp){
  if(!ac||muted)return;
  var src=ac.createBufferSource();src.buffer=noiseBuf;src.loop=true;
  var f=ac.createBiquadFilter();f.type=hp?'highpass':'bandpass';f.frequency.value=freq;f.Q.value=0.9;
  var g=ac.createGain();
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(f);f.connect(g);ps1Pan(g,p,revAmt||0);
  src.start(t);src.stop(t+dur+0.02);
}
function ps1Kick(t,v){
  if(!ac||muted)return;
  var o=ac.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(165,t);
  o.frequency.exponentialRampToValueAtTime(44,t+0.11);
  var g=ac.createGain();
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.17);
  o.connect(g);g.connect(mix);o.start(t);o.stop(t+0.22);
  noiseShot(t,0.015,v*0.3,3500,0);
}
function ps1Snare(t,v){
  if(!ac||muted)return;
  noiseShot(t,0.14,v,1900,0.05,0.3);

  var g=ac.createGain();
  g.gain.setValueAtTime(v*0.7,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.08);
  o.connect(g);g.connect(mix);o.start(t);o.stop(t+0.1);
}
function ps1Hat(t,v,open,p){noiseShot(t,open?0.24:0.045,v,8500,p||0.3,0,true);}
/* FM音源（鐘・エレピ・重低音） */
function fmTone(t,f,dur,vol,ratio,index,p,revAmt,modDecay){
  if(!ac||muted)return;
  var car=ac.createOscillator();car.frequency.value=f;
  var mod=ac.createOscillator();mod.frequency.value=f*ratio;
  var mg=ac.createGain();
  mg.gain.setValueAtTime(f*index,t);
  mg.gain.exponentialRampToValueAtTime(0.5,t+modDecay);
  mod.connect(mg);mg.connect(car.frequency);
  var g=ps1Env(t,dur,vol,0.006);
  car.connect(g);ps1Pan(g,p,revAmt);
  car.start(t);car.stop(t+dur+0.05);
  mod.start(t);mod.stop(t+dur+0.05);
}
/* 聖歌隊風パッド */
function choir(t,notes,dur,vol,p){
  if(!ac||muted)return;

function bgmStep(mode,step,t,stepDur){

    if(step%8===4)noiseHit(t,0.09,0.05,2500);
  }else if(mode==='boss'){
    /* 中ボス：ロックマン3ボス戦風（A8移植・PS1級音源・178bpm） */
    var sd=stepDur;
    if(BOSSM[step]){
      distTone(t,[nf(BOSSM[step])],sd*1.4,0.05,0.15);
      supersaw(t,nf(BOSSM[step]),sd*1.2,0.02,8,2,-0.2,0.3,5000);
    }
    if(step%8===0||step%8===6)stabChord(t,BOSSC,sd);
    if(BOSSB[step])bassMono(t,nf(BOSSB[step]-12),sd*0.85,0.18,800);
    if(step%2===0)ps1Kick(t,0.95);
    if(step%8===3)ps1Kick(t,0.6);
    ps1Hat(t,(step%2?0.07:0.045),false,0.3);
    ps1Hat(t+sd/2,0.03,false,-0.3);
    if(step%8===4)ps1Snare(t,0.5);
    if(step===30||step===31){ps1Snare(t,0.32);ps1Snare(t+sd/2,0.32);}
  }else if(mode==='title'){
    /* タイトル：ポップなチップチューン */
    if(TITLE_MEL[step])tone(t,nf(TITLE_MEL[step]),0.12,'square',0.06);
    if(TITLE_BAS[step])tone(t,nf(TITLE_BAS[step]-12),0.16,'triangle',0.10);
    if(step%4===0)noiseHit(t,0.05,0.035,2500);  /* キック */
    if(step%2===1)noiseHit(t,0.02,0.02,9000);   /* ハット */
  }else{
    /* EXTRA=ラスボスL2：混声コーラスの儀式（PS1級音源・100bpm） */
    var sd=stepDur;
    if(EXB[step]){
      bassMono(t,nf(EXB[step]-12),sd*0.8,0.17,900);
      supersaw(t,nf(EXB[step]),sd*0.8,0.02,8,2,0.1,0.3,2500);

    if(EXM[step])bellDark(t,nf(EXM[step]),sd*4,0.06,0.25);
    if(step%8===0)timpani(t,0.45);

    if(step%4===3)noiseShot(t,0.05,0.04,3000,(step%8===3?0.4:-0.4),0.3);
    if(step===28)riser(t,sd*4,0.05);
  }
}

function mystHarp(t,f,dur,vol,p){
  /* ハープ/チェレスタ風のやわらかいプラック（三角波＋1オクターブ上のサイン） */
  var o=ac.createOscillator();o.type='triangle';o.frequency.value=f;

function bgmStepMystic(step,t,sd){
  var c=(step<16)?0:1;   /* 16ステップごとにコード交代（I→vi） */
  var s=step%16;         /* 0..15：前半8で上行、後半8で下行 */
  var up=MYST_UP[c];
  var note=(s<8)?up[s]:up[15-s];
  mystHarp(t,nf(note),sd*2.4,0.22,((s%2)?0.26:-0.26)); /* アルペジオのみ（パッド・低音なし）。音量アップ 0.1→0.22 */

function bgmStart(mode){
  if(!ac)return;
  bgmStop();

  if(mode==='boss'){bgmStartFile(BOSS_BGM_URL,0.72,false);return;}   /* 中ボス：一定テンポ（加速しない） */
  if(mode==='hidden'){bgmStartFile(HIDDEN_BGM_URL,0.8,false);return;} /* 裏ボス：加速しない */
  bgm.step=0;bgm.next=ac.currentTime+0.06;
  bgm.timer=setInterval(function(){
    if(!ac||muted)return;
    var baseDur=(bgm.mode==='normal')?(60/132/2):(bgm.mode==='mystic'?(60/160/2):(bgm.mode==='title'?(60/140/2):(60/100/2)));
    var stepDur=(bgm.mode==='mystic'||bgm.mode==='title')?baseDur:baseDur/tempoMul; /* mystic/titleは一定テンポ、他はインベーダー接近でテンポUP */
    while(bgm.next<ac.currentTime+0.14){
      if(bgm.mode==='mystic')bgmStepMystic(bgm.step,bgm.next,stepDur);
      else bgmStep(bgm.mode,bgm.step,bgm.next,stepDur);
      bgm.next+=stepDur;
      bgm.step=(bgm.step+1)%32;
    }
  },30);
}
/* ---- ファイルBGMのループ再生（中ボス/裏ボス共通） ---- */
function bgmStartFile(url,vol,followTempo){
  var wantMode=bgm.mode;
  var startNow=function(buf){
    if(bgm.mode!==wantMode||!buf)return; /* すでに別モードへ移っていたら鳴らさない */
    var src=ac.createBufferSource();
    src.buffer=buf;src.loop=true;
    var g=ac.createGain();g.gain.value=muted?0:vol;
    src.connect(g);g.connect(master);
    if(followTempo)src.playbackRate.value=tempoMul;
    src.start();
    bgm.src=src;bgm.gain=g;bgm.follow=followTempo;
  };
  if(fileBufs[url]){startNow(fileBufs[url]);return;}
  if(bgm.loading)return;
  bgm.loading=true;
  fetch(url).then(function(r){return r.arrayBuffer();})
    .then(function(ab){return ac.decodeAudioData(ab);})
    .then(function(buf){fileBufs[url]=buf;bgm.loading=false;startNow(buf);})
    .catch(function(){bgm.loading=false;if(wantMode==='boss')bgmStartSynthBoss();}); /* 中ボスだけ合成フォールバック */
}
function bgmStartSynthBoss(){
  /* MP3が読めない環境用：合成A8を178bpmで鳴らす */
  if(bgm.mode!=='boss')return;
  bgm.step=0;bgm.next=ac.currentTime+0.06;
  bgm.timer=setInterval(function(){
    if(!ac||muted)return;
    var stepDur=(60/178/2); /* 中ボスは加速しない（tempoMulを使わない） */
    while(bgm.next<ac.currentTime+0.14){
      bgmStep('boss',bgm.step,bgm.next,stepDur);
      bgm.next+=stepDur;
      bgm.step=(bgm.step+1)%32;
    }
  },30);
}
function bgmStop(){

}

function tileWidth(word){

function spawnQuestion(q,isRetry){
  curQ=q;progress=0;built=[];misses=0;
  tiles=[];bullets=[];grpX=0;grpY=0;grpDir=1;tempoMul=1;bell=null;fireSeq=0;
  ctx.font=TILE_FONT;
  var list=q.w.slice();
  if(q.d)for(var k=0;k<q.d.length;k++)list.push(q.d[k]); /* 不要語デコイ */
  var order=[];
  for(var i=0;i<list.length;i++)order.push(i);
  shuffle(order);
  var gap=12,rowH=62,avail=CW-24,rows=[[]],rw=0;
  for(i=0;i<order.length;i++){
    var wd=list[order[i]];

    rows[rows.length-1].push({wd:wd,w:tw});
    rw+=tw+gap;
  }

    var totalW=-gap;

    var x=(CW-totalW)/2;

/* ================= 判定 ================= */
function calcScore(sec,missN,n){
  var par=4+CONFIG.PAR_PER_WORD*n;
  if(isHiddenMode){
    /* 裏ボス：減点なし・超高得点 */
    return CONFIG.HIDDEN_BASE+Math.max(0,Math.round(400*(1-sec/(par*2.2))));
  }
  if(isExtraMode){
    /* ラスボス：減点なし */
    return CONFIG.LAST_BASE+Math.max(0,Math.round(CONFIG.LAST_BONUS_MAX*(1-sec/(par*2))));
  }
  if(isBossMode){
    var bb=Math.max(0,Math.round(200*(1-sec/(par*1.8))));
    return Math.max(20,CONFIG.BOSS_BASE+bb-CONFIG.MISS_PENALTY*missN);
  }
  var bonus=Math.max(0,Math.round(CONFIG.TIME_BONUS_MAX*(1-sec/(par*1.8))));
  return Math.max(10,CONFIG.BASE_SCORE+bonus-CONFIG.MISS_PENALTY*missN);
}
function onShootHit(tile){
  var exp=curQ.w[progress];
  var expTxt=exp.f[exp.c];
  var cur=tile.word.f[tile.fi];
  if(cur===expTxt){
    tile.alive=false;
    combo++;if(combo>maxCombo)maxCombo=combo;
    explode(tile.bx+grpX+tile.w/2,tile.by+grpY+tile.h/2,palette().bullet);
    built.push(cur);progress++;renderSentence();sfxHit(combo);
    if(!isExtraMode&&!isHiddenMode)grpY=Math.max(CONFIG.RETREAT_MAX_UP,grpY-CONFIG.RETREAT_PER_WORD); /* 1単語正解ごとに群れがわずかに後退（ラスボス・裏ボスは後退なし） */
    addFloat(tile.bx+grpX+tile.w/2,tile.by+grpY,'OK',palette().morphDot);
    if(isTutorial){
      if(progress===curQ.w.length){correctEffect();sfxClear();tutFinish();return;}
      tutAdvance();return;
    }
    if(progress===curQ.w.length)questionClear();
  }else{
    var formWrong=(tile.word===exp)||(tile.word.f.indexOf(expTxt)>=0&&tile.word.f.length>1);
    miss(tile,formWrong?'かたちがちがう！':'じゅんばんがちがう！');
  }
}

  isHiddenMode=(k==='hidden');
  document.body.classList.toggle('divp-boss',k==='boss');
  document.body.classList.toggle('divp-dark',k==='last');
  document.body.classList.toggle('divp-hidden',k==='hidden');
}

function questionClear(){
  state='wait';
  var ms=performance.now()-qStart;
  var basePts=calcScore(ms/1000,misses,curQ.w.length);
  var mult=comboMult();
  var pts=Math.round(basePts*mult);
  if(fx.doubleQ){pts*=2;fx.doubleQ=false;addFloat(CW/2,CH/2-14,'ベルこうか ×2！','#ff6f9c');}
  score+=pts;
  correctEffect();sfxClear();
  addFloat(CW/2,CH/2-40,'+'+pts+(mult>1?'（コンボ×'+mult.toFixed(1)+'）':''),palette().bullet);
  divpLogAnswer(curQ,true,pts,ms,misses);
  var noMiss=(misses===0);
  if(noMiss)noMissStreak++; else{noMissStreak=0;if(phaseKind()==='normal'||phaseKind()==='boss')queueRetry(curQ);}
  qCount++;setScore+=pts;
  if(phaseKind()==='hidden')hiddenScore+=pts;
  setTimeout(function(){advancePhase(noMiss);},1400);
}
function questionFail(){
  state='wait';
  shake=0.6;sfxFail();
  explode(ship.x,SHIP_Y,'#ff5566');explode(ship.x-20,SHIP_Y+8,'#ffaa33');explode(ship.x+20,SHIP_Y+8,'#ffaa33');
  noMissStreak=0;combo=0;
  divpLogAnswer(curQ,false,0,performance.now()-qStart,misses);
  qCount++;
  if(phaseKind()==='normal'||phaseKind()==='boss')queueRetry(curQ);
  setTimeout(showFailAnswer,900);
}

/* ===== 段階進行の中枢 =====
   noMiss: 直前の問題をノーミスでクリアしたか
   ボス系(boss/last/hidden)はノーミスが突破条件。ミスすると同じ段階を最初からやり直す。
   通常は n 問こなしたら次段階へ（ミスしても段階内カウントは進むが、次のボス条件は別途）。 */
function advancePhase(noMiss){
  var p=curPhase();
  if(!p){ // 全段階クリア＝ゲーム完走
    showFinalResult();return;
  }
  var k=p.kind;

  if(k==='normal'){
    if(p.noMiss&&!noMiss){showRestartRun();return;} /* ノーミス必須の通常ゲートでミス→ゲーム全体を初めから */
    phaseDone++;
    if(phaseDone>=p.n){
      // 規定問数クリア→結果発表→次段階へ
      phaseDone=0;
      showStageResult(function(){goNextPhase();});
    }else{
      state='play';spawnPhaseQuestion();
    }
    return;
  }

  // ラスボス：ノーミスで n(=2) 回連続クリアで裏ボス出現。
  // ミスがあったら、その問題をクリアした時点で「おしまい」（裏ボスに行かず終了→通常/タイトルへ）。やり直しはしない。
  if(k==='last'){
    if(!noMiss){showFinalResult();return;}                                    // ミスあり → 終了（裏ボスなし）
    phaseDone++;
    if(phaseDone>=p.n){phaseDone=0;showLastResult(function(){goNextPhase();});return;} // 2連続ノーミス → 裏ボスへ
    state='play';spawnPhaseQuestion();                                        // 1問目ノーミス → 2問目へ
    return;
  }

  // 中ボス：2連続ノーミスで突破。ミスがあったら「ゲーム全体を初めから」やり直し（やりこみ要素）
  if(k==='boss'){
    if(!noMiss){showRestartRun();return;}
    phaseDone++;
    if(phaseDone>=p.n){phaseDone=0;goNextPhase();}
    else{state='play';spawnPhaseQuestion();}
    return;
  }

  // 裏ボス(hidden)：完全ノーミスでクリアが条件。ミス/突破されたら → ゲーム全体を初めから
  if(!noMiss){showRestartRun();return;}
  phaseDone++;
  if(phaseDone>=p.n){phaseDone=0;showHiddenResult();return;}
  state='play';spawnPhaseQuestion();
}
/* 中ボス失敗：ゲーム全体を初めからやり直し（同じモード・Unitのまま） */
function showRestartRun(){
  state='result';bgmStop();
  document.body.classList.remove('divp-boss','divp-dark','divp-hidden');
  overlayIn.innerHTML=

    '<button class="divp-big-btn" id="divp-btn-restart" type="button">▶ はじめから</button>';
  overlay.classList.add('divp-show');
  document.getElementById('divp-btn-restart').addEventListener('click',function(){
    overlay.classList.remove('divp-show');restartRun();

function restartRun(){
  phaseIdx=0;phaseDone=0;
  score=0;qCount=0;combo=0;maxCombo=0;noMissStreak=0;
  setScore=0;setMiss=0;retryQ=[];hiddenScore=0;

}
function goNextPhase(){
  phaseIdx++;phaseDone=0;
  var p=curPhase();
  if(!p){showFinalResult();return;}
  // BGM/見た目を段階に合わせて切替
  if(p.kind==='normal'){
    isBossMode=isExtraMode=isHiddenMode=false;
    document.body.classList.remove('divp-boss','divp-dark','divp-hidden');
    bgmStop();bgmStart('normal');
    state='play';spawnPhaseQuestion();
    if(p.noMiss)announce={t:'ここから '+p.n+'問 ノーミス！ ミスで はじめから',life:3.2}; /* ノーミスゲートの警告 */
  }else{

}

/* ================= エフェクト ================= */
function explode(x,y,color){
  for(var i=0;i<16;i++){
    var a=Math.random()*Math.PI*2,sp=60+Math.random()*160;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.5+Math.random()*0.3,color:color,size:2+Math.random()*3});
  }
}
function sparkle(x,y,color){
  for(var i=0;i<7;i++){
    var a=Math.random()*Math.PI*2,sp=30+Math.random()*70;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-40,life:0.35,color:color,size:2});
  }
}
function addFloat(x,y,txt,color){floats.push({x:x,y:y,t:txt,life:1.1,color:color});}

/* ================= 更新 ================= */
function update(dt){
  if(paused)return; /* 一時停止中は一切進めない（英文は全画面オーバーレイで隠す） */
  if(shake>0)shake-=dt;
  if(encounterFx>0)encounterFx=Math.max(0,encounterFx-dt*1.2);
  cdShoot-=dt;cdMorph-=dt;
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=260*dt;
  }
  for(i=floats.length-1;i>=0;i--){
    floats[i].life-=dt;floats[i].y-=26*dt;
    if(floats[i].life<=0)floats.splice(i,1);
  }
  if(flashMsg){flashMsg.life-=dt;if(flashMsg.life<=0)flashMsg=null;}
  if(announce){announce.life-=dt;if(announce.life<=0)announce=null;}
  for(i=0;i<stars.length;i++){
    stars[i].y+=stars[i].s*dt;
    if(stars[i].y>CH)stars[i].y=0;
  }
  for(i=0;i<clouds.length;i++){
    clouds[i].x+=clouds[i].v*dt;
    if(clouds[i].x-clouds[i].s*2>CW)clouds[i].x=-clouds[i].s*2;
  }
  if(state!=='play')return;

  /* ベル効果タイマー・雲クールダウン */
  fx.slowT=Math.max(0,fx.slowT-dt);
  fx.hintT=Math.max(0,fx.hintT-dt);
  for(i=0;i<clouds.length;i++)clouds[i].cd=Math.max(0,(clouds[i].cd||0)-dt);

  /* 自機 */
  if(moveL)ship.x-=CONFIG.SHIP_SPEED*dt;
  if(moveR)ship.x+=CONFIG.SHIP_SPEED*dt;
  if(ship.tx!==null){
    var d=ship.tx-ship.x;
    ship.x+=Math.max(-CONFIG.SHIP_SPEED*1.6*dt,Math.min(CONFIG.SHIP_SPEED*1.6*dt,d));
    if(Math.abs(d)<2&&tapSlide){ship.tx=null;tapSlide=false;}
  }
  ship.x=Math.max(20,Math.min(CW-20,ship.x));

  /* ベル落下・キャッチ */
  if(bell){
    bell.t+=dt;
    bell.vy=Math.min(60,bell.vy+90*dt);
    bell.y+=bell.vy*dt;
    bell.x+=Math.sin(bell.t*2.6)*24*dt;
    if(bell.vy>0&&bell.y>SHIP_Y-26&&Math.abs(bell.x-ship.x)<34){
      applyBell(bell.ci);bell=null;
    }else if(bell.y>CH-30){
      bell=null;
    }
  }

  /* 群れの移動 */
  var elapsed=(performance.now()-qStart)/1000;
  var base=CONFIG.INVADER_SPEED; /* 全モード共通の落下初速（ラスボス/裏ボスも通常と同じ速度に統一） */
  var spd=Math.min(CONFIG.INVADER_SPEED_MAX,base+elapsed*CONFIG.INVADER_ACCEL);
  /* 行数が多い（＝読む時間がいる）ほど落下を遅く。3行以上はさらにゆっくり */
  var spdMul=1,stepMul=1;
  if(curRows>=3){spdMul=CONFIG.TRIPLEROW_SPEED_MUL;stepMul=CONFIG.TRIPLEROW_STEP_MUL;}
  else if(curRows>=2){spdMul=CONFIG.MULTIROW_SPEED_MUL;stepMul=CONFIG.MULTIROW_STEP_MUL;}
  spd*=spdMul;
  if(fx.slowT>0)spd*=0.45; /* ベル：スロー */
  if(isTutorial)spd=0; /* チュートリアルは降下停止 */
  grpX+=grpDir*spd*dt;
  var stepDown=CONFIG.INVADER_STEP*stepMul;
  var minX=1e9,maxX=-1e9,maxB=-1e9;
  for(i=0;i<tiles.length;i++){
    var tl=tiles[i];if(!tl.alive)continue;
    if(tl.flash>0)tl.flash-=dt;
    if(tl.bx+grpX<minX)minX=tl.bx+grpX;
    if(tl.bx+tl.w+grpX>maxX)maxX=tl.bx+tl.w+grpX;
    if(tl.by+tl.h+grpY>maxB)maxB=tl.by+tl.h+grpY;
  }
  if(maxX>CW-8&&grpDir>0){grpDir=-1;grpY+=stepDown;}
  if(minX<8&&grpDir<0){grpDir=1;grpY+=stepDown;}
  var zone0=HUD_H+180;
  tempoMul=1+0.7*Math.max(0,Math.min(1,(maxB-zone0)/(DANGER_Y-zone0)));
  if(bgm.src&&bgm.follow)bgm.src.playbackRate.value=tempoMul; /* 中ボスのみ接近で加速 */
  if(maxB>=DANGER_Y){questionFail();return;}

  /* 弾：着弾は必ず発射順（seqが最小の弾から）。近い的でも、先に撃った遠い弾が着くまで待つ */
  var minSeq=Infinity;
  for(i=0;i<bullets.length;i++){var bs=bullets[i];if(typeof bs.seq==='number'&&bs.seq<minSeq)minSeq=bs.seq;}
  for(i=bullets.length-1;i>=0;i--){
    var b=bullets[i];
    var ttx,tty;
    if(b.tBell){
      if(!bell){bullets.splice(i,1);continue;}
      ttx=bell.x;tty=bell.y;
    }else if(b.tCloud){
      ttx=b.tCloud.x;tty=b.tCloud.y;
    }else if(b.target){
      if(!b.target.alive){bullets.splice(i,1);continue;}
      ttx=b.target.bx+grpX+b.target.w/2;
      tty=b.target.by+grpY+b.target.h/2;
    }else{
      /* まっすぐ上（キーボード用） */
      b.y-=CONFIG.BULLET_SPEED*dt;
      if(b.y<HUD_H){bullets.splice(i,1);continue;}
      var hit=null,hy=-1e9;
      for(var j=0;j<tiles.length;j++){
        var t=tiles[j];if(!t.alive)continue;
        var tx=t.bx+grpX,ty=t.by+grpY;
        if(b.x>=tx&&b.x<=tx+t.w&&b.y>=ty&&b.y<=ty+t.h){
          if(ty>hy){hy=ty;hit=t;}
        }
      }
      if(hit){
        bullets.splice(i,1);
        applyHit(b,hit);
        if(state!=='play')break;
      }
      continue;
    }
    /* ホーミング処理（単語・雲・ベル共通） */
    var dx=ttx-b.x,dy=tty-b.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var stp=CONFIG.BULLET_SPEED*dt;
    if(dist<=stp+12){
      /* 発射順の待機：まだ先に撃った弾が飛んでいるなら、的の上で待つ */
      if(typeof b.seq==='number'&&b.seq!==minSeq){b.x=ttx;b.y=tty;continue;}
      bullets.splice(i,1);
      if(b.tBell){bellFlip();}
      else if(b.tCloud){popCloud(b.tCloud);}
      else{applyHit(b,b.target);if(state!=='play')break;}
      continue;
    }
    b.x+=dx/dist*stp;b.y+=dy/dist*stp;
  }
}
function applyHit(b,hit){
  if(b.type==='m'){
    if(hit.word.f.length>1){
      hit.fi=(hit.fi+1)%hit.word.f.length;
      sfxMorph();
      sparkle(hit.bx+grpX+hit.w/2,hit.by+grpY+hit.h/2,palette().morphB);
      if(isTutorial){
        var st=tutCur();
        /* 目的の形(am)になったら次へ。ちがう形なら「もう一回」促し */
        if(st&&st.want==='morph'){
          if(hit.word.f[hit.fi]==='am'){addFloat(hit.bx+grpX+hit.w/2,hit.by+grpY,'できた！',palette().morphDot);tutAdvance();}
          else{addFloat(hit.bx+grpX+hit.w/2,hit.by+grpY,'"am"にしよう','#ff9b2f');}
        }
      }
    }else{
      sfxDud();
      addFloat(hit.bx+grpX+hit.w/2,hit.by+grpY,'かわらない',palette().hud);
    }
  }else{
    onShootHit(hit);
  }
}

/* ================= 描画 ================= */
function draw(){
  var p=palette();
  var grad=ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,p.bg1);grad.addColorStop(1,p.bg2);
  ctx.fillStyle=grad;ctx.fillRect(0,0,CW,CH);
  ctx.save();

var mode='order';   /* 'order'＝順番を決める / 'morph'＝形を変える */

function tutNudge(){tutPulse=0.01;shake=0.12;sfxDud();} /* 誤操作は軽く弾く */

function fireAt(tile){

  cdShoot=0.18;
  var cx=tile.bx+grpX+tile.w/2;
  ship.tx=Math.max(20,Math.min(CW-20,cx));

  bullets.push({x:ship.x,y:SHIP_Y-20,type:(mode==='morph'?'m':'s'),target:tile,seq:fireSeq++});
  if(mode==='morph')sfxMorphShot();else sfxShoot();

function fireStraight(){
  if(state!=='play'||cdShoot>0)return;
  cdShoot=0.18;

document.addEventListener('keydown',function(e){
  if(e.repeat&&e.key!==' ')return;
  if(e.key==='ArrowLeft'||e.key==='a'){moveL=true;e.preventDefault();}
  else if(e.key==='ArrowRight'||e.key==='d'){moveR=true;e.preventDefault();}
  else if(e.key===' '||e.key==='Enter'){fireStraight();e.preventDefault();}
  else if(e.key==='z'||e.key==='Z'){setMode('morph');e.preventDefault();}
  else if(e.key==='x'||e.key==='X'){setMode('order');e.preventDefault();}
});
document.addEventListener('keyup',function(e){

/* キャンバス：単語タップ＝そこへ発射、空タップ＝自機移動 */
function canvasPos(e){
  var r=cv.getBoundingClientRect();
  /* object-fit:contain の実描画矩形を求めて座標を逆算 */
  var scale=Math.min(r.width/CW,r.height/CH);
  var dw=CW*scale,dh=CH*scale;
  var ox=(r.width-dw)/2,oy=(r.height-dh)/2;
  var x=(e.clientX-r.left-ox)/scale;
  var y=(e.clientY-r.top-oy)/scale;
  return {x:x,y:y};
}
function tileAt(x,y){
  for(var j=tiles.length-1;j>=0;j--){
    var t=tiles[j];if(!t.alive)continue;
    var tx=t.bx+grpX,ty=t.by+grpY;
    if(x>=tx-4&&x<=tx+t.w+4&&y>=ty-6&&y<=ty+t.h+6)return t;
  }

function bellAt(x,y){return !!(bell&&Math.abs(x-bell.x)<24&&Math.abs(y-bell.y)<26);}
function cloudAt(x,y){
  if(isExtraMode||isHiddenMode)return null;
  for(var i=0;i<clouds.length;i++){
    var cl=clouds[i];
    if(cl.cd>0)continue;
    var dx=x-cl.x,dy=y-cl.y;
    if(dx*dx+dy*dy<cl.s*cl.s*1.6)return cl;
  }
  return null;
}

  if(!bell)return;
  bell.ci=(bell.ci+1)%BELLS.length;
  bell.vy=-110;
  sparkle(bell.x,bell.y,BELLS[bell.ci].c);
  sfxBellFlip();

function applyBell(ci){
  var bl=BELLS[ci];
  sfxBellGet();
  sparkle(ship.x,SHIP_Y-24,bl.c);
  if(bl.fx==='score'){score+=100;addFloat(ship.x,SHIP_Y-46,'+100','#d4a017');}
  else if(bl.fx==='shield'){fx.shield=Math.min(3,fx.shield+1);addFloat(ship.x,SHIP_Y-46,'バリア！','#888888');}
  else if(bl.fx==='slow'){fx.slowT=8;addFloat(ship.x,SHIP_Y-46,'スロー！','#2a7fb8');}
  else if(bl.fx==='hint'){fx.hintT=8;addFloat(ship.x,SHIP_Y-46,'ヒント！','#2fb56a');}

cv.addEventListener('pointerdown',function(e){
  e.preventDefault();
  var p=canvasPos(e);
  if(state==='play'){
    var t=tileAt(p.x,p.y);
    if(isTutorial){
      /* チュートリアル：許可タイルのみ発射、他は弾く。雲/ベル/自機移動は無効 */
      if(t&&tutAllowTap(t)){fireAt(t);}
      else{tutNudge();}
      return;
    }
    if(t){fireAt(t);return;}
    if(bellAt(p.x,p.y)){fireAtBell();return;}
    var cl=cloudAt(p.x,p.y);
    if(cl){fireAtCloud(cl);return;}
  }
  ship.tx=p.x;tapSlide=false;

cv.addEventListener('pointermove',function(e){if(ship.tx!==null&&!tapSlide)ship.tx=canvasPos(e).x;});

},{passive:false});
document.addEventListener('touchstart',function(e){
  if(e.touches&&e.touches.length>1)e.preventDefault(); /* ピンチの起点(2本目の指)を掴んだ時点で無効化。touchmoveだけだとズームが始まってしまう */
},{passive:false});
document.addEventListener('touchmove',function(e){
  if(e.touches&&e.touches.length>1)e.preventDefault(); /* 2本指ピンチを無効化 */
},{passive:false});
/* 自動再生できないので、最初のユーザー操作で音を解錠し、タイトル中ならポップBGMを開始 */
document.addEventListener('pointerdown',function(){
  initAudio();
  if(ac&&ac.state==='suspended')ac.resume();
  if(state==='title'&&!muted)bgmStart('title');
},{once:true});
setMode('morph'); /* 初期は「かたちをかえる」モード */
/* サウンド切替 */
document.getElementById('divp-btn-sound').addEventListener('click',function(){
  initAudio();
  muted=!muted;
  if(master)master.gain.value=muted?0:0.5;
  if(bgm.gain)bgm.gain.gain.value=muted?0:0.85;
  this.textContent=muted?'×':'♪';
});
/* 一時停止：全画面オーバーレイで英文を隠し、ゲームを凍結 */
var pauseEl=document.getElementById('divp-pause');
function pauseGame(){
  if(state!=='play'||paused)return;
  paused=true;pauseStart=performance.now();
  pauseEl.classList.add('divp-show');
  bgmStop(); /* BGMも止める（再開時に鳴らし直す） */
}
function resumeGame(){
  if(!paused)return;
  paused=false;
  pauseEl.classList.remove('divp-show');
  var d=performance.now()-pauseStart;
  qStart+=d; /* 停止していた分は経過時間に数えない（タイムボーナス・⏱を公平に） */
  last=performance.now(); /* 再開直後のdtが跳ねないように */
  if(ac&&!muted&&bgm.mode)bgmStart(bgm.mode);
}
document.getElementById('divp-btn-pause').addEventListener('click',pauseGame);
document.getElementById('divp-btn-resume').addEventListener('click',resumeGame);

/* ================= チュートリアル ================= */
function startTutorial(){
  isTutorial=true;isExtraMode=false;isBossMode=false;isHiddenMode=false;isSpellMode=false;
  document.body.classList.remove('divp-dark','divp-boss','divp-hidden','divp-menu','divp-spell'); /* 練習中は操作ボタン等を表示（文章モードで説明） */
  score=0;qCount=0;combo=0;maxCombo=0;noMissStreak=0;
  setScore=0;setMiss=0;retryQ=[];
  fx={slowT:0,hintT:0,doubleQ:false,shield:0};
  overlay.classList.remove('divp-show');
  initAudio();
  if(ac&&ac.state==='suspended')ac.resume();
  bgmStart('normal');
  /* 題材: I am a student.（be→am へ変形させる） */
  var q={ja:'私は 学生です。',w:[W('I'),M(['be','am','is','are'],1),W('a'),W('student'),W('.')]};
  TUT_STEPS=[
   {want:'morph',token:'be',msg:'■のついた単語は形をかえる。画面左下の緑ボタンが選択されている状態で単語をタップ！形がかわるよ！'},
   {want:'setmode_order',msg:'かたちがamになった！つぎは画面右下のピンクのボタン「じゅんばんをきめる」をおしてモードを切りかえよう！'},
   {want:'tap',token:'I',msg:'ここからは、単語を和訳どおりにタップしていこう！Iをタップしてみて！'},
   {want:'tap',token:'am',msg:'つぎは "am" をタップして2ばんめにきめる！'},
   {want:'tap',token:'a',msg:'つぎは "a" をタップ！'},
   {want:'tap',token:'student',msg:'"student" をタップ！'},
   {want:'tap',token:'.',msg:'さいごに "." （ピリオド）をタップ！ 自動さいてん！'}
  ];
  tutStep=0;
  spawnQuestion(q,false);
  ship.x=CW/2;ship.tx=null;
  setMode('morph');  /* まず形をととのえる流れに合わせて morph から */
  tutSync();
  state='play';
}
function tutCur(){return TUT_STEPS&&TUT_STEPS[tutStep];}
function tutFindTile(token){
  for(var i=0;i<tiles.length;i++){
    var t=tiles[i];if(!t.alive)continue;
    if(t.word.f.indexOf(token)>=0)return t;
  }
  return null;
}
function tutSync(){
  var st=tutCur();
  if(!st){tutMsg='';tutArrow=null;return;}
  tutMsg=st.msg;tutPulse=0;
  if(st.want==='tap'||st.want==='morph'){
    tutArrow={type:'tile',token:st.token};
  }else if(st.want==='morph_setmode'){
    tutArrow={type:'btn',which:'morph'};
  }else if(st.want==='setmode_order'){
    tutArrow={type:'btn',which:'order'};
  }
}
function tutAllowTap(tile){
  var st=tutCur();if(!st)return false;
  if(st.want==='tap'&&mode==='order')return tile&&tile.word.f[tile.fi]===st.token;
  if(st.want==='morph'&&mode==='morph')return tile&&tile.word.f.indexOf(st.token)>=0&&tile.word.f.length>1;
  return false;
}
function tutAllowMode(m){
  var st=tutCur();if(!st)return false;
  if(st.want==='morph_setmode')return m==='morph';
  if(st.want==='setmode_order')return m==='order';
  return false;
}
function tutAdvance(){
  tutStep++;
  if(!tutCur()){tutMsg='';tutArrow=null;}
  else tutSync();
}
function tutFinish(){
  state='wait';
  isTutorial=false;TUT_STEPS=null;tutArrow=null;
  overlayIn.innerHTML=
    '<div class="divp-title-logo" style="font-size:clamp(20px,6vw,28px)">TUTORIAL CLEAR!</div>'+
    '<div class="divp-result-stats" style="margin-top:12px">かたちのかえ方と じゅんばんの決め方を おぼえたね！<br>本番であそんでみよう！</div>'+
    '<button class="divp-big-btn" id="divp-btn-tutend" type="button">タイトルへ ▶</button>';
  overlay.classList.add('divp-show');
  document.getElementById('divp-btn-tutend').addEventListener('click',function(){
    overlay.classList.remove('divp-show');
    bgmStop();showTitle();
  });
}

/* ================= タイトル・開始 ================= */
function showTitle(){
  state='title';
  document.body.classList.add('divp-menu'); /* メニュー中は英文枠・操作ボタンを隠す */

  overlayIn.innerHTML=
    '<div class="divp-title-logo">WORD INVADERS</div>'+
    '<div class="divp-title-sub">— 中1英語 ならべかえ —</div>'+
    '<div class="divp-howto">'+
    '❶「じゅんばん」で和訳どおり単語をタップ／❷ ■つきは「かたち」で変形（be→am/is/are・ニセ形注意）／❸ ．？で自動さいてん<br>'+
    '☁雲でベル出現・はやいほど高得点／ミス -'+CONFIG.MISS_PENALTY+'点／中ボス→ラスボス→…？</div>'+
    '<select class="divp-mode-select" id="divp-unit-select" aria-label="ユニットをえらぶ">'+
      '<option value="1"'+(curUnit===1?' selected':'')+'>Unit 1「Hello, Everyone!」</option>'+
      '<option value="2"'+(curUnit===2?' selected':'')+'>Unit 2「Our New Teacher」</option>'+
    '</select>'+
    '<select class="divp-mode-select" id="divp-gamemode-select" aria-label="モードをえらぶ">'+
      '<option value="sentence">📖 ぶんを ならべる モード</option>'+
      '<option value="spell">🔤 単語を つづる モード</option>'+
    '</select>'+
    '<button class="divp-big-btn" id="divp-btn-start" type="button">GAME START</button>'+
    '<button class="divp-sub-btn" id="divp-btn-story" type="button">📖 ストーリーを みる</button>'+
    '<button class="divp-sub-btn" id="divp-btn-tut" type="button">▶ あそびかた（テストプレイ）</button>';
  overlay.classList.add('divp-show');
  bgmStart('title'); /* ポップなタイトルBGM。ac未生成(初回)はno-op→最初のタップで鳴り始める */
  var uSel=document.getElementById('divp-unit-select');
  if(uSel)uSel.addEventListener('change',function(){setUnit(parseInt(this.value,10));});
  document.getElementById('divp-btn-start').addEventListener('click',function(){
    initAudio();
    if(ac&&ac.state==='suspended')ac.resume();
    setUnit(uSel?parseInt(uSel.value,10):1); /* 選択中Unitを確定 */
    var gmSel=document.getElementById('divp-gamemode-select');
    isSpellMode=!!(gmSel&&gmSel.value==='spell'); /* モード確定 */
    document.body.classList.toggle('divp-spell',isSpellMode);
    divpSessionStart();
    overlay.classList.remove('divp-show');
    document.body.classList.remove('divp-menu'); /* 英文枠・操作ボタンを表示 */
    /* 段階進行の初期化 */
    phaseIdx=0;phaseDone=0;
    score=0;qCount=0;combo=0;maxCombo=0;noMissStreak=0;
    setScore=0;setMiss=0;retryQ=[];hiddenScore=0;
    isBossMode=isExtraMode=isHiddenMode=false;
    document.body.classList.remove('divp-boss','divp-dark','divp-hidden');
    bgmStart('normal');
    state='play';
    spawnPhaseQuestion();
  });
  document.getElementById('divp-btn-tut').addEventListener('click',showTutorialIntro);
  document.getElementById('divp-btn-story').addEventListener('click',showStory);
}
/* ===== テストプレイ前：ゲーム全体像の説明 ===== */

/* ================= メインループ ================= */
for(var i=0;i<60;i++)stars.push({x:Math.random()*CW,y:Math.random()*CH,s:8+Math.random()*26});
for(i=0;i<7;i++)clouds.push({x:Math.random()*CW,y:HUD_H+20+Math.random()*(CH-160),s:18+Math.random()*24,v:6+Math.random()*12,cd:0});
var last=performance.now();
function loop(now){
  var dt=Math.min(0.2,(now-last)/1000); /* 上限0.2s(5fps相当)。Safari等でfpsが落ちても実時間どおりの速度を保つ（0.1だと10fps未満でスロー再生になっていた）。インベーダーは低速なので大ジャンプの心配なし */
  last=now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
function boot(){
  if(CONFIG.TEST_MODE){try{validateUnits();}catch(e){}} /* 開発時のみ語彙を検算（本番=TEST_MODE:falseでは走らない） */
  showTitle();
  requestAnimationFrame(loop);
}
if(document.fonts&&document.fonts.load){
  document.fonts.load("15px 'DotGothic16'").then(boot,boot);
}else{
  boot();
}
})();
