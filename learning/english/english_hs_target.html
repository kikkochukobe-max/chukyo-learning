<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TARGET 1900+</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f4f0;min-height:100vh;font-size:15px}
:root{--red:#E8253A;--red2:#c0182c;--redl:#fff0f1;--blue:#1a5fb4;--bluel:#e8f0fc;--green:#2e7d32;--greenl:#e8f5e9;--amber:#b45309;--gray:#555;--gray2:#888;--gray3:#ddd;--gray4:#f5f4f0}
/* Nav — モード選択は「TARGET 1900+」の下に出る折り畳み式（既定=開）。
   横スクロールだとスマホで存在に気づけないため、全モードを一覧表示にした。
   共通ヘッダー(divp-header, sticky top:0 / z-index:100 / 高さ78px)を最前面に。
   このバーはその下(top:78px)に、背面(z-index:50)で貼り付ける */
#nav{background:#fff;border-bottom:2px solid var(--red);display:block;position:sticky;top:78px;z-index:50}
.nav-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 14px}
#nav-title{font-size:16px;font-weight:700;color:var(--red);flex-shrink:0;white-space:nowrap}
#nav-title span{color:#1a1a1a}
.mode-toggle{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;background:var(--redl);color:var(--red);border:1.5px solid var(--red);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.mode-caret{font-size:10px;transition:transform .2s}
#nav.collapsed .mode-caret{transform:rotate(-180deg)}
.tab-list{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 12px}
#nav.collapsed .tab-list{display:none}
.tab-btn{padding:9px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid var(--gray3);background:#fff;color:var(--gray);white-space:nowrap;transition:all .15s;flex:1 1 auto}
.tab-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
/* Panels */
.panel{display:none;padding:16px;max-width:840px;margin:0 auto}
.panel.active{display:block}
/* Section title */
.section-title{font-weight:800;font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:4px;height:18px;background:var(--red);border-radius:2px}
/* Search */
#search-input{width:100%;padding:8px 14px;border-radius:18px;border:1.5px solid var(--gray3);font-size:13px;outline:none;margin-bottom:8px}
#search-input:focus{border-color:var(--red)}
#search-count{font-size:12px;color:var(--gray2);margin-bottom:10px}
/* Word list */
#word-list{display:flex;flex-direction:column;gap:4px}
.word-item{background:#fff;border-radius:8px;border:1px solid var(--gray3);padding:9px 14px;display:flex;align-items:center;gap:10px}
.word-num{font-size:11px;color:var(--gray2);min-width:34px;font-weight:600}
.word-en{font-size:15px;font-weight:700;flex:1}
.word-jp{font-size:13px;color:var(--gray);flex:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Flashcard */
.fc-controls{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.ctrl-btn{padding:5px 12px;border-radius:6px;border:1.5px solid var(--gray3);background:#fff;color:var(--gray);cursor:pointer;font-size:12px;font-weight:500}
.ctrl-btn.active{border-color:var(--red);background:var(--red);color:#fff}
.fc-counter{font-size:12px;color:var(--gray2);margin-left:auto}
.fc-wrap{perspective:1000px;max-width:500px;margin:0 auto}
.fc-inner{width:100%;height:220px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform 0.4s}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;border-radius:13px;border:2px solid var(--red);background:#fff;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.fc-back{background:var(--redl);transform:rotateY(180deg)}
.fc-num{position:absolute;top:10px;right:12px;font-size:10px;color:var(--gray2);font-weight:600}
.fc-front-word{font-size:32px;font-weight:800;line-height:1.1;margin-bottom:5px}
.fc-hint{font-size:11px;color:var(--gray2);position:absolute;bottom:10px;right:12px}
.fc-back-jp{font-size:18px;color:var(--red2);font-weight:700;line-height:1.5}
.fc-back-en{font-size:12px;color:var(--gray);margin-top:6px}
.fc-nav{display:flex;gap:9px;justify-content:center;margin-top:12px;align-items:center}
.fc-ok-btn,.fc-ng-btn{width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:17px}
.fc-ng-btn{border:2px solid var(--red);background:var(--redl);color:var(--red)}
.fc-ok-btn{border:2px solid var(--green);background:var(--greenl);color:var(--green)}
.fc-scores{font-size:13px;color:var(--gray2);display:flex;gap:14px}
.fc-btn-row{display:flex;gap:6px;justify-content:center;margin-top:8px}
/* Challenge */
.chal-start,.chal-result{padding:16px;text-align:center;padding-top:40px}
.big-emoji{font-size:38px;margin-bottom:7px}
.chal-title{font-size:21px;font-weight:800;margin-bottom:7px}
.chal-desc{color:var(--gray);font-size:13px;margin-bottom:5px}
.chal-note{color:var(--gray2);font-size:12px;margin-bottom:16px}
.start-btn{padding:10px 22px;border-radius:26px;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:700}
.chal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:7px}
.chal-stat{text-align:center}
.chal-stat-label{font-size:11px;color:var(--gray2);font-weight:600}
.chal-stat-val{font-size:38px;font-weight:800}
.chal-stat-val.timer-low{color:#ff6666}
.combo-msg{font-size:12px;color:var(--amber);font-weight:700;text-align:center;margin-bottom:3px}
.question-box{background:#fff;border-radius:12px;padding:20px;text-align:center;border:2px solid var(--gray3);margin-bottom:11px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative}
.q-num{font-size:11px;color:var(--gray2);font-weight:600}
.q-word{font-size:32px;font-weight:800;line-height:1.1}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:11px}
.opt-btn{padding:10px 8px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;line-height:1.4;cursor:pointer;transition:all .15s;border:2px solid var(--gray3);background:#fff;color:var(--gray)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{border-color:var(--green);background:var(--greenl);color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:var(--redl);color:var(--red)}
.feedback{font-size:13px;font-weight:700;text-align:center;margin-top:4px}
.feedback.ok{color:var(--green)}
.feedback.ng{color:var(--red)}
.result-stats{display:flex;gap:9px;justify-content:center;margin-bottom:11px;flex-wrap:wrap}
.result-stat{background:#fff;border-radius:8px;border:1px solid var(--gray3);padding:8px 14px;text-align:center}
.result-stat-val{font-size:19px;font-weight:800}
.result-stat-label{font-size:11px;color:var(--gray2)}
.score-display{font-size:52px;font-weight:800;color:var(--red);margin:9px 0;position:relative}
.diff-float{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:16px;font-weight:700;pointer-events:none;transition:opacity 0.6s}
/* Quiz */
.quiz-start{padding:16px;text-align:center;padding-top:40px}
.qnum-btns{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.qnum-label{font-size:12px;color:var(--gray)}
.progress-bar-wrap{height:5px;background:var(--gray3);border-radius:3px;overflow:hidden;margin-bottom:14px}
.progress-bar{height:100%;background:var(--red);border-radius:3px;transition:width .3s}
.quiz-header{font-size:12px;color:var(--gray2);margin-bottom:10px;display:flex;justify-content:space-between}
.quiz-correct-count{color:var(--red);font-weight:700}
.quiz-circle{width:100px;height:100px;border-radius:50%;border:5px solid var(--red);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:11px auto}
.quiz-circle-score{font-size:28px;font-weight:800;color:var(--red)}
.quiz-circle-total{font-size:11px;color:var(--gray2)}
.result-rank{font-size:13px;font-weight:700;margin:6px 0;color:var(--blue)}
.history-list{display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto}
.history-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:7px;background:#fff;border:1px solid var(--gray3);border-left:4px solid var(--green);text-align:left}
.history-item.ng{border-left-color:var(--red)}
.history-mark{font-size:13px;flex-shrink:0}
.history-en{font-weight:700;font-size:13px}
.history-jp{font-size:11px;color:var(--gray)}
.history-wrong{font-size:11px;color:var(--red)}


.speak-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 4px;border-radius:5px;line-height:1;flex-shrink:0;opacity:0.7;transition:opacity .15s}
.speak-btn:hover{opacity:1}
.fc-speak-btn{position:absolute;bottom:10px;left:12px;background:rgba(0,0,0,0.06);border:none;border-radius:20px;padding:4px 10px;cursor:pointer;font-size:13px;z-index:10}
.fc-speak-btn:hover{background:rgba(0,0,0,0.12)}

.range-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.range-label{font-size:12px;color:var(--gray);white-space:nowrap}
.range-input{width:72px;padding:6px 8px;border:1.5px solid var(--gray3);border-radius:8px;font-size:13px;font-family:inherit;outline:none;text-align:center}
.range-input:focus{border-color:var(--red)}
.range-sep{font-size:13px;color:var(--gray)}
.range-count{font-size:12px;color:var(--gray2);margin-left:4px}
.range-error{font-size:11px;color:var(--red);margin-top:3px;display:none}
</style>
</head>
<body>

<!-- 共通モジュール（ヘッダー＋ログイン窓 / 中学・高校用 正解スタンプ / 学習記録クライアント）-->
<script src="/assets/divp-header.js"></script>
<script src="/assets/divp-correct-jh.js"></script>
<script src="/assets/divp-core.js"></script>
<script>Divp.init('english_hs_target');</script>

<div id="nav">
  <div class="nav-bar">
    <a href="https://chukyokobetsu.com/" target="_blank" style="text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <div id="nav-title">TARGET <span>1900+</span></div>
    </a>
    <button id="mode-toggle" class="mode-toggle" type="button" onclick="toggleModes()" aria-expanded="true" aria-controls="tab-list">モードを選ぶ<span class="mode-caret">▲</span></button>
  </div>
  <div class="tab-list" id="tab-list">
    <button class="tab-btn active" onclick="switchTab('list')">📋 単語一覧</button>
    <button class="tab-btn" onclick="switchTab('flash')">🃏 フラッシュカード</button>
    <button class="tab-btn" onclick="switchTab('challenge')">⚡ 1分間チャレンジ</button>
    <button class="tab-btn" onclick="switchTab('quiz')">📝 確認テスト</button>
  </div>
</div>

<!-- Word List -->
<div id="panel-list" class="panel active">
  <div class="section-title">単語一覧</div>
  <input type="text" id="search-input" placeholder="単語・意味で検索..." oninput="filterWords()">
  <div id="search-count"></div>
  <div id="word-list"></div>
</div>

<!-- Flashcard -->
<div id="panel-flash" class="panel">
  <div class="section-title">フラッシュカード</div>
  <div class="fc-controls">
    <button class="ctrl-btn active" id="btn-en2jp" onclick="setMode('en2jp')">英→日</button>
    <button class="ctrl-btn" id="btn-jp2en" onclick="setMode('jp2en')">日→英</button>
    <button class="ctrl-btn" onclick="fcShuffle()">🔀 シャッフル</button>
    <button class="ctrl-btn" onclick="fcReset()">↺ リセット</button>
    <span class="fc-counter" id="fc-counter"></span>
  </div>
  <div class="fc-wrap">
    <div class="fc-inner" id="fc-card" onclick="fcFlip()">
      <div class="fc-face fc-front">
        <span class="fc-num" id="fc-num"></span>
        <div class="fc-front-word" id="fc-front"></div>
        <div class="fc-hint">タップで答えを確認</div>
        <button class="fc-speak-btn" id="fc-speak-front" onclick="event.stopPropagation();fcSpeakCurrent()">🔊 発音</button>
      </div>
      <div class="fc-face fc-back">
        <div class="fc-back-jp" id="fc-back-jp"></div>
        <div class="fc-back-en" id="fc-back-en"></div>
        <button class="fc-speak-btn" onclick="event.stopPropagation();fcSpeakCurrent()">🔊 発音</button>
      </div>
    </div>
  </div>
  <div class="fc-nav">
    <button class="fc-ng-btn" onclick="fcAnswer(false)">✕</button>
    <div class="fc-scores">
      <div>知ってる: <span id="fc-ok" style="color:var(--green);font-weight:700">0</span></div>
      <div>知らない: <span id="fc-ng" style="color:var(--red);font-weight:700">0</span></div>
    </div>
    <button class="fc-ok-btn" onclick="fcAnswer(true)">○</button>
  </div>
  <div class="fc-btn-row">
    <button class="ctrl-btn" onclick="fcGo(-1)">← 前へ</button>
    <button class="ctrl-btn" onclick="fcGo(1)">次へ →</button>
  </div>
</div>

<!-- Challenge -->
<div id="panel-challenge" class="panel">
  <div id="chal-start-screen" class="chal-start">
    <div class="big-emoji">⚡</div>
    <h2 class="chal-title">1分間チャレンジ</h2>
    <p class="chal-desc">60秒間、できるだけ多くの単語を答えよう！</p>
    <p class="chal-note">正解 <span style="color:var(--green);font-weight:700">+10点</span>　連続ボーナスあり　不正解 <span style="color:var(--red);font-weight:700">-5〜-15点</span></p>
    <button class="start-btn" onclick="chalStart()">スタート！</button>
  </div>
  <div id="chal-game-screen" style="display:none">
    <div class="chal-header">
      <div class="chal-stat"><div class="chal-stat-label">タイム</div><div class="chal-stat-val" id="chal-time">60</div></div>
      <div class="chal-stat"><div class="chal-stat-label">スコア</div><div class="score-display"><span id="chal-score">0</span><span class="diff-float" id="chal-diff" style="opacity:0"></span></div></div>
      <div class="chal-stat"><div class="chal-stat-label">正解</div><div class="chal-stat-val" id="chal-correct">0</div></div>
    </div>
    <div class="combo-msg" id="chal-combo" style="display:none"></div>
    <div class="question-box">
      <div class="q-num" id="chal-qnum"></div>
      <div class="q-word" id="chal-qword" onclick="chalWord&&speak(chalWord.english)" style="cursor:pointer;user-select:none;" title="タップで再発音"></div>
    </div>
    <div class="opts-grid" id="chal-opts"></div>
    <div class="feedback" id="chal-feedback"></div>
    <div style="text-align:center;font-size:11px;color:var(--gray2);margin-top:2px">🔊 単語をタップで再発音</div>
  </div>
  <div id="chal-result-screen" class="chal-result" style="display:none">
    <div class="big-emoji">🏆</div>
    <h2 class="chal-title">タイムアップ！</h2>
    <div class="score-display" id="chal-final-score">0</div>
    <div style="font-size:12px;color:var(--gray2);margin-bottom:12px">ポイント</div>
    <div class="result-stats" id="chal-result-stats"></div>
    <div class="result-rank" id="chal-rank"></div>
    <button class="start-btn" onclick="chalRestart()">もう一度！</button>
  </div>
</div>

<!-- Quiz -->
<div id="panel-quiz" class="panel">
  <div id="quiz-start-screen" class="quiz-start">
    <div class="big-emoji">📝</div>
    <h2 class="chal-title">確認テスト（4択）</h2>
    <p class="chal-desc" style="margin-bottom:11px">英単語の日本語訳を4択で答えよう</p>
    <div class="range-row">
      <span class="range-label">No. 範囲:</span>
      <input class="range-input" id="range-from" type="number" min="1" max="1900" placeholder="1" oninput="updateRangeCount()">
      <span class="range-sep">〜</span>
      <input class="range-input" id="range-to" type="number" min="1" max="1900" placeholder="1900" oninput="updateRangeCount()">
      <span class="range-count" id="range-count">全1900語</span>
    </div>
    <div class="range-error" id="range-error">※ 開始番号は終了番号以下にしてください</div>
    <div class="qnum-btns">
      <span class="qnum-label">問題数:</span>
      <button class="ctrl-btn active" id="qn-10" onclick="setQn(10)">10問</button>
      <button class="ctrl-btn" id="qn-20" onclick="setQn(20)">20問</button>
      <button class="ctrl-btn" id="qn-50" onclick="setQn(50)">50問</button>
    </div>
    <button class="start-btn" onclick="quizStart()">テスト開始</button>
  </div>
  <div id="quiz-game-screen" style="display:none">
    <div class="quiz-header">
      <span id="quiz-progress"></span>
      <span class="quiz-correct-count">正解: <span id="quiz-correct-count">0</span></span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="quiz-progress-bar"></div></div>
    <div class="question-box">
      <div class="q-num" id="quiz-qnum"></div>
      <div class="q-word" id="quiz-qword"></div>
      <div style="font-size:11px;color:var(--gray2)">日本語の意味を選んでください</div>
    </div>
    <div class="opts-grid" id="quiz-opts"></div>
  </div>
  <div id="quiz-result-screen" style="display:none;padding:16px;text-align:center">
    <h2 style="font-size:20px;font-weight:800;margin-bottom:7px">テスト結果</h2>
    <div class="quiz-circle"><div class="quiz-circle-score" id="quiz-final-score"></div><div class="quiz-circle-total" id="quiz-final-total"></div></div>
    <div class="result-rank" id="quiz-rank"></div>
    <button class="start-btn" onclick="quizRestart()" style="margin-bottom:16px">もう一度</button>
    <div class="section-title">解答確認</div>
    <div class="history-list" id="quiz-history"></div>
  </div>
</div>

<script>

// ===== 音声読み上げ =====
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.9;u.pitch=1;
  // 英語ボイスを優先選択
  const voices=window.speechSynthesis.getVoices();
  const en=voices.find(v=>v.lang.startsWith('en-')&&v.localService)||voices.find(v=>v.lang.startsWith('en-'));
  if(en)u.voice=en;
  window.speechSynthesis.speak(u);
}
// ボイスリスト読み込み
if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();


// ===== 学習記録（共通モジュール divp-core.js 経由でヘテムルDBへ記録）=====
// ログインは divp-header.js のログイン窓に一本化（このファイルにログインUIは持たない）。
// 生徒管理・成績閲覧は teacher.php / mypage.php が担うので、ツール内の名前入力・管理画面は廃止。
// 正誤判定の直後に safeDivpAnswer() を1行呼ぶだけで answer_logs へ記録される。
// 未ログイン・ローカル起動(file://)・API未疎通では黙ってスキップする（ツールは壊れない）。
function safeDivpAnswer(ok, info){
  if(window.Divp && typeof Divp.answer==='function'){ try{ Divp.answer(ok, info); }catch(e){} }
}
function safeDivpCorrect(selector){
  if(window.Divp && typeof Divp.correct==='function'){ try{ Divp.correct(selector); }catch(e){} }
}
function safeDivpIncorrect(selector){
  if(window.Divp && typeof Divp.incorrect==='function'){ try{ Divp.incorrect(selector); }catch(e){} }
}
// カードを使い回すので、次の問題を出す前に前回のスタンプ／バッジを消す
function safeDivpClear(selector){
  const card=document.querySelector(selector);
  if(card){ card.querySelectorAll('.divp-hanko, .divp-nice').forEach(el=>el.remove()); }
}

// ─ Utilities ─────────────────────────────────────────────
function trunc(s, n=22){
  const base=(s||'').split('；')[0].trim();
  const clean=base.replace(/^（[^）]*）\s*/,'').trim();
  return (clean||base).slice(0,n);
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function chalNextQ(){
  chalWord=ALL_WORDS[Math.floor(Math.random()*ALL_WORDS.length)];
  const wr=shuffle(ALL_WORDS.filter(x=>x.id!==chalWord.id)).slice(0,3);
  const opts=shuffle([chalWord,...wr]);
  document.getElementById('chal-qnum').textContent=chalWord.num?'No.'+chalWord.num:'';
  document.getElementById('chal-qword').textContent=chalWord.english;
  speak(chalWord.english);
  document.getElementById('chal-feedback').textContent='';
  document.getElementById('chal-feedback').className='feedback';
  const g=document.getElementById('chal-opts');
  g.innerHTML=opts.map(o=>`<button class="opt-btn" onclick="chalAnswer(${o.id})">${trunc(o.japanese)}</button>`).join('');
  chalAnswered=false;
}

function chalAnswer(wid){
  if(chalAnswered)return;
  chalAnswered=true;
  const ok=chalWord.id===wid;
  const btns=document.querySelectorAll('#chal-opts .opt-btn');
  document.querySelectorAll('#chal-opts .opt-btn').forEach(b=>b.disabled=true);
  // highlight correct
  document.querySelectorAll('#chal-opts .opt-btn').forEach((b,i)=>{
    // re-render with classes - we'll do it differently
  });
  // show correct answer highlighted
  const g=document.getElementById('chal-opts');
  const opts_data=Array.from(g.querySelectorAll('button')).map(b=>b.textContent);
  
  if(ok){
    chalCorrect++;
    chalCombo++;
    safeDivpAnswer(true, {
      question_key: 'challenge',
      question_params: { num: chalWord.num, en: chalWord.english },
      question_text: chalWord.english,
      correct_answer: chalWord.japanese,
      wrong_answer: '',
    });
    if(chalCombo>chalMaxCombo)chalMaxCombo=chalCombo;
    const bn=chalCombo>=5?20:chalCombo>=3?10:0;
    const pt=10+bn;
    chalScore+=pt;
    document.getElementById('chal-score').textContent=chalScore;
    document.getElementById('chal-correct').textContent=chalCorrect;
    showDiff('+'+pt,true);
    const fb=document.getElementById('chal-feedback');
    fb.textContent=chalCombo>=3?'🔥 '+chalCombo+'連続！+'+bn+'！':'✓ 正解！';
    fb.className='feedback ok';
  }else{
    chalWrong++;
    const chalChosen = ALL_WORDS.find(w=>w.id===wid);
    safeDivpAnswer(false, {
      question_key: 'challenge',
      question_params: { num: chalWord.num, en: chalWord.english },
      question_text: chalWord.english,
      correct_answer: chalWord.japanese,
      wrong_answer: chalChosen ? chalChosen.japanese : '',
    });
    const pn=chalCombo>=3?-15:chalCombo>=1?-10:-5;
    chalScore=Math.max(0,chalScore+pn);
    chalCombo=0;
    document.getElementById('chal-score').textContent=chalScore;
    showDiff(String(pn),false);
    const fb=document.getElementById('chal-feedback');
    fb.textContent='✗ 正解: '+trunc(chalWord.japanese,30);
    fb.className='feedback ng';
  }
  
  const combo=document.getElementById('chal-combo');
  if(chalCombo>=2){combo.style.display='';combo.textContent='🔥 '+chalCombo+'連続正解中！';}
  else{combo.style.display='none';}
  
  // Mark correct option
  const allBtns=document.querySelectorAll('#chal-opts .opt-btn');
  // We need to re-identify which button corresponds to the correct word
  // Since we already rendered them, we'll just call chalNextQ after delay
  setTimeout(chalNextQ,1400);
}

let quizQn=10, quizWords=[], quizIdx=0, quizCorrect=0, quizHistory=[], quizOpts=[], quizAnswered=false, quizChosenId=null;

function getQuizPool(){
  const fromVal=parseInt(document.getElementById('range-from').value)||1;
  const toVal=parseInt(document.getElementById('range-to').value)||1900;
  const from=Math.max(1,Math.min(fromVal,1900));
  const to=Math.max(from,Math.min(toVal,1900));
  return ALL_WORDS.filter(w=>w.num>=from&&w.num<=to);
}

function updateRangeCount(){
  const pool=getQuizPool();
  const fromVal=parseInt(document.getElementById('range-from').value)||1;
  const toVal=parseInt(document.getElementById('range-to').value)||1900;
  const errEl=document.getElementById('range-error');
  if(fromVal>toVal){errEl.style.display='';} else {errEl.style.display='none';}
  document.getElementById('range-count').textContent=pool.length+'語';
  // 問題数ボタンを範囲に合わせて調整
  [10,20,50].forEach(n=>{
    const btn=document.getElementById('qn-'+n);
    btn.disabled=pool.length<n;
    btn.style.opacity=pool.length<n?'0.4':'1';
  });
  if(quizQn>pool.length)setQn(Math.min(pool.length,10));
}

function setQn(n){
  quizQn=n;
  [10,20,50].forEach(x=>document.getElementById('qn-'+x).classList.toggle('active',x===n));
}

function makeQuizOpts(w){
  // pool内から不正解選択肢を選ぶ（poolが少ない場合はALL_WORDSからも補充）
  const pool=getQuizPool();
  const poolOthers=pool.filter(x=>x.id!==w.id);
  const others=poolOthers.length>=3
    ? shuffle(poolOthers).slice(0,3)
    : shuffle([...poolOthers,...ALL_WORDS.filter(x=>x.id!==w.id&&!poolOthers.find(p=>p.id===x.id))]).slice(0,3);
  return shuffle([w,...others]);
}

function quizStart(){
  const pool=getQuizPool();
  if(pool.length===0){alert('指定したNo.範囲に単語がありません');return;}
  quizWords=shuffle(pool).slice(0,Math.min(quizQn,pool.length));
  quizIdx=0;quizCorrect=0;quizHistory=[];quizAnswered=false;quizChosenId=null;
  document.getElementById('quiz-start-screen').style.display='none';
  document.getElementById('quiz-result-screen').style.display='none';
  document.getElementById('quiz-game-screen').style.display='';
  quizRenderQ();
}

function quizRenderQ(){
  const w=quizWords[quizIdx];
  safeDivpClear('#quiz-game-screen .question-box');
  quizOpts=makeQuizOpts(w);
  document.getElementById('quiz-progress').textContent=(quizIdx+1)+' / '+quizWords.length+'問';
  document.getElementById('quiz-correct-count').textContent=quizCorrect;
  document.getElementById('quiz-progress-bar').style.width=Math.round(quizIdx/quizWords.length*100)+'%';
  document.getElementById('quiz-qnum').textContent=w.num?'No.'+w.num:'';
  document.getElementById('quiz-qword').textContent=w.english;
  const g=document.getElementById('quiz-opts');
  g.innerHTML=quizOpts.map(o=>`<button class="opt-btn" onclick="quizAnswer(${o.id})">${trunc(o.japanese,24)}</button>`).join('');
  quizAnswered=false;quizChosenId=null;
}

function quizAnswer(wid){
  if(quizAnswered)return;
  quizAnswered=true;quizChosenId=wid;
  const w=quizWords[quizIdx];
  const ok=w.id===wid;
  if(ok)quizCorrect++;
  const quizChosen = quizOpts.find(o=>o.id===wid);
  safeDivpAnswer(ok, {
    question_key: 'quiz',
    question_params: { num: w.num, en: w.english },
    question_text: w.english,
    correct_answer: w.japanese,
    wrong_answer: ok ? '' : (quizChosen ? quizChosen.japanese : ''),
  });
  if(ok) safeDivpCorrect('#quiz-game-screen .question-box');
  else safeDivpIncorrect('#quiz-game-screen .question-box');
  quizHistory.push({word:w,correct:ok,chosenId:wid});
  // Highlight options
  document.querySelectorAll('#quiz-opts .opt-btn').forEach((btn,i)=>{
    const o=quizOpts[i];
    btn.disabled=true;
    if(o.id===w.id)btn.classList.add('correct');
    else if(o.id===wid)btn.classList.add('wrong');
  });
  document.getElementById('quiz-correct-count').textContent=quizCorrect;
  setTimeout(()=>{
    const ni=quizIdx+1;
    if(ni>=quizWords.length){quizShowResult();return;}
    quizIdx=ni;quizRenderQ();
  },1100);
}

function quizShowResult(){
  document.getElementById('quiz-game-screen').style.display='none';
  document.getElementById('quiz-result-screen').style.display='';
  document.getElementById('quiz-final-score').textContent=quizCorrect;
  document.getElementById('quiz-final-total').textContent='/ '+quizWords.length+'問';
  const pct=Math.round(quizCorrect/quizWords.length*100);
  const ranks=[{p:90,r:'🏆 優秀！'},{p:70,r:'⭐ よく頑張りました'},{p:50,r:'👍 合格！'},{p:0,r:'💪 復習しよう！'}];
  document.getElementById('quiz-rank').textContent=ranks.find(r=>pct>=r.p)?.r||'';
  const hist=document.getElementById('quiz-history');
  hist.innerHTML=quizHistory.map(h=>{
    const ch=ALL_WORDS.find(w=>w.id===h.chosenId);
    return `<div class="history-item ${h.correct?'':'ng'}">
      <div class="history-mark">${h.correct?'○':'✕'}</div>
      <div>
        <div class="history-en">${h.word.english}</div>
        <div class="history-jp">${h.word.japanese}</div>
        ${!h.correct&&ch?`<div class="history-wrong">選択: ${trunc(ch.japanese,24)}</div>`:''}</div>
    </div>`;
  }).join('');
}
function quizRestart(){
  document.getElementById('quiz-result-screen').style.display='none';
  document.getElementById('quiz-start-screen').style.display='';
  updateRangeCount();
}
</script>
