<!DOCTYPE html>
<html lang="ja">
<head>

{
  "@context": "https://schema.org",
  "@type": "LearningResource",
  "name": "文字式マスター",
  "educationalLevel": "小学6年生",
  "learningResourceType": "練習問題",
  "teaches": "文字を使った式（xを使った式・xとyの関係・面積の式）",
  "provider": {
    "@type": "EducationalOrganization",
    "name": "中京個別指導学院",

<style>
:root{
  color-scheme:only light;
  --brand:#16386b;
  --brand-dark:#0f2a52;
  --accent:#3e8bcf;          /* 文字式アクセント（青） */
  --accent2:#7d3c98;         /* 文字 x の紫 */
  --ink:#23303a;
  --paper:#fbf8f1;
  --grid:#ece3d1;
  --correct:#2f9e5b;
  --wrong:#e0533d;
  --soft:#fff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{margin:0;padding:0;min-height:100%;background:linear-gradient(var(--paper),var(--paper)) fixed;}
body{margin:0;padding:0;}
body{
  font-family:"Zen Maru Gothic",system-ui,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:var(--ink);
  min-height:100dvh;
  background:
    linear-gradient(var(--grid) 1px,transparent 1px) 0 0/22px 22px,
    linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/22px 22px,
    linear-gradient(var(--paper),var(--paper));
  -webkit-text-size-adjust:100%;
}

main{max-width:560px;margin:0 auto;padding:12px clamp(8px,3vw,16px) 40px;}
.tool-title{margin:2px 2px 10px;font-size:clamp(16px,4.6vw,19px);font-weight:900;color:var(--brand);display:flex;align-items:center;gap:8px;}
.tool-title::before{content:"";width:9px;height:20px;background:var(--accent);border-radius:3px;flex:0 0 auto;}
.tool-title #btnPrint{
  margin-left:auto;flex:0 0 auto;font-family:inherit;font-weight:900;
  font-size:12px;padding:7px 13px;border-radius:999px;cursor:pointer;
  background:#fff;color:var(--brand);border:1.5px solid #d9ccb2;
  box-shadow:0 2px 0 #e7dcc6;transition:.12s;white-space:nowrap;
}
.tool-title #btnPrint:active{transform:translateY(1px);box-shadow:0 1px 0 #e7dcc6;}

/* ===== 設定パネル ===== */
.panel{
  background:var(--soft);border:1.5px solid #e7dcc6;border-radius:16px;
  padding:11px 12px;margin-bottom:12px;box-shadow:0 2px 0 #efe6d4;
}
.panel h2{margin:0 0 9px;font-size:13px;font-weight:700;color:var(--brand);
  display:flex;align-items:center;gap:6px;}
.panel h2::before{content:"";width:7px;height:16px;background:var(--accent);border-radius:3px;}
.panel-h{cursor:pointer;-webkit-user-select:none;user-select:none;}
.fold-hint{margin-left:auto;font-size:11px;font-weight:700;color:#9a8b6f;display:inline-flex;align-items:center;gap:4px;}
.chev{display:inline-block;transition:transform .15s ease;}
.panel.collapsed h2{margin-bottom:0;}
.panel.collapsed .panel-body{display:none;}
.panel.collapsed .chev{transform:rotate(-90deg);}
.row{display:flex;flex-wrap:wrap;gap:7px 8px;align-items:center;margin-bottom:9px;}
.row:last-child{margin-bottom:0;}
.row .lab{font-size:12px;font-weight:700;color:#6b5d44;min-width:62px;}
.seg{display:inline-flex;flex-wrap:wrap;background:#f2ead9;border-radius:10px;padding:3px;gap:2px;}
.seg button{
  border:0;background:transparent;color:#7a6a4d;font-family:inherit;font-weight:700;
  font-size:13px;padding:6px 11px;border-radius:8px;cursor:pointer;transition:.12s;
}
.seg button.on{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(0,0,0,.12);}
.seg.acc button.on{background:var(--accent);color:#fff;}

/* ===== スコア ===== */
.scorebar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 2px 10px;font-size:12.5px;font-weight:700;color:#6b5d44;}
.scorebar b{color:var(--correct);font-size:14px;}
.streak{background:linear-gradient(135deg,#ef7d3e,#f0b03e);color:#fff;font-size:11px;font-weight:900;padding:2px 9px;border-radius:999px;}

/* ===== 問題カード ===== */
.problem{
  background:var(--soft);border:1.5px solid #e7dcc6;border-radius:18px;
  padding:10px 12px 14px;box-shadow:0 2px 0 #efe6d4;
}
.qhead{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.qno{font-size:12px;font-weight:700;color:#fff;background:var(--brand);padding:3px 10px;border-radius:999px;}
.qbadge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;}
.qb-noy{background:#e3eefb;color:#1d5b9e;}
.qb-y{background:#fdeede;color:#b5601f;}
.qb-val{background:#e3f5ea;color:#1e7a45;}
.qb-area{background:#f0e6f7;color:#6b2f8a;}
.qtext{font-size:clamp(14px,4.2vw,16px);font-weight:700;line-height:1.8;margin:2px 2px 8px;}
.qtext .qemoji{font-size:22px;margin-right:6px;vertical-align:-2px;}
.q-fml{font-weight:900;font-size:clamp(15px,4.6vw,18px);color:var(--brand);background:#f3f7fc;
  border:1.5px solid #cfe0f0;border-radius:10px;padding:8px 12px;margin:6px 0;text-align:center;letter-spacing:.05em;}
.q-sub{font-size:14px;font-weight:800;color:#555;text-align:center;margin:4px 0 8px;}
.q-note{font-size:11px;color:#8a7a5e;line-height:1.6;margin:0 2px 8px;}
.q-note .hx{color:var(--wrong);font-weight:800;}
.q-note .vx{color:var(--accent2);font-weight:800;font-style:italic;font-family:Georgia,"Times New Roman",serif;}
.fig{display:flex;justify-content:center;margin:2px 0 10px;}
.fig svg{max-width:min(100%,320px);height:auto;}

/* ===== 選択肢 ===== */
.choices{display:flex;flex-direction:column;gap:7px;}
.ch{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  background:#fff;border:2px solid #d9e5ef;border-radius:12px;padding:10px 12px;
  cursor:pointer;font-family:inherit;transition:.12s;box-shadow:0 2px 0 #edf2f7;
}
.ch:not([disabled]):active{transform:translateY(1px);box-shadow:none;}
.ch .cno{flex:0 0 auto;width:26px;height:26px;display:grid;place-items:center;border-radius:8px;
  background:var(--accent);color:#fff;font-weight:900;font-size:13px;}
.ch .ctext{font-weight:800;font-size:clamp(13px,4vw,15px);letter-spacing:.05em;color:var(--ink);}
.ch[disabled]{cursor:default;}
.ch.ok{background:#e7f6ec;border-color:var(--correct);}
.ch.ok .cno{background:var(--correct);}
.ch.ng{background:#fdecea;border-color:var(--wrong);animation:shake .3s ease;}
.ch.ng .cno{background:var(--wrong);}
.ch.dim{opacity:.45;box-shadow:none;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ===== ヒント・判定 ===== */
.hintbtn{width:100%;margin-top:9px;background:#fdf6e8;border:1.5px dashed #d8c49a;border-radius:10px;
  padding:8px;font-size:12.5px;font-weight:700;color:#8a6b2f;cursor:pointer;font-family:inherit;}
.hintshow{margin-top:9px;background:#fdf6e8;border:1px solid #ecd9ae;border-radius:10px;
  padding:9px 12px;font-size:12.5px;color:#6d5424;line-height:1.7;}
.verdict{min-height:26px;text-align:center;margin-top:10px;font-weight:900;font-size:15px;}
.verdict.good{color:var(--correct);}
.verdict.bad{color:var(--wrong);}
.verdict .small{display:block;font-weight:700;font-size:12.5px;color:#8a7a5e;margin-top:3px;}
.verdict .small b{color:var(--correct);letter-spacing:.04em;}
.next-wrap{display:flex;justify-content:flex-end;margin-top:10px;}
.btn{
  border:0;border-radius:13px;font-family:inherit;font-weight:900;
  font-size:15px;padding:11px 20px;cursor:pointer;transition:.12s;
  box-shadow:0 3px 0 rgba(0,0,0,.16);
}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.16);}
.btn.primary{background:var(--accent);color:#fff;}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none;filter:grayscale(.5);}

/* ===== 印刷 ===== */
.print-area{display:none;}
@media print{
  @page{size:A4 portrait;margin:10mm 9mm;}
  .divp-header,main{display:none !important;}
  body,html{background:#fff;min-height:0 !important;}
  .print-area{display:block !important;}
  .sheet{position:relative;page-break-after:always;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sheet:last-child{page-break-after:auto;}
  .p-head{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid #16386b;padding-bottom:4px;margin-bottom:6px;}
  .p-school{font-size:12px;font-weight:800;color:#16386b;}
  .p-title{font-weight:900;font-size:21px;color:#16386b;margin-top:1px;}
  .p-sub{font-size:11px;color:#555;}
  .p-name{font-size:12px;white-space:nowrap;}
  .p-name span{display:inline-block;border-bottom:1px solid #000;min-width:180px;margin-left:6px;}
  .p-inst{position:relative;z-index:1;font-size:12px;color:#222;margin:0 0 8px;}
  .p-grid{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:5mm 8mm;}
  .p-item{position:relative;z-index:1;padding:2px 4px;box-sizing:border-box;overflow:hidden;break-inside:avoid;}
  .p-no{font-weight:900;font-size:13px;background:#000;color:#fff;border-radius:5px;padding:1px 8px;display:inline-block;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .p-q{font-size:11.5px;line-height:1.7;margin:4px 0 3px;min-height:16mm;}
  .p-figwrap{display:flex;justify-content:center;}
  .p-figwrap svg{max-width:52mm;height:auto;}
  .p-ansline{border-bottom:1px solid #333;height:9mm;margin-top:2mm;}
  .p-anslabel{font-size:9.5px;color:#555;}
  .ans .p-item{min-height:auto;}
  .a-line{font-size:12px;margin:3px 0;line-height:1.6;}
  .a-line b{font-size:13px;}
}
</style>

<script>
"use strict";

/* ===================== 共通ヘルパー ===================== */
function rN(a,b){ a=a||2;b=b||10;return Math.floor(Math.random()*(b-a+1))+a; }
function ri(n){ return Math.floor(Math.random()*n); }
function pickA(a){ return a[ri(a.length)]; }
function shuffle(a){ a=[...a];for(let i=a.length-1;i>0;i--){const j=ri(i+1);[a[i],a[j]]=[a[j],a[i]];}return a; }
function rPaid(){ return [500,1000,1500,2000][ri(4)]; }
function rPrice(){ return 300+ri(21)*10; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
// 演算子のスペースを統一（5x→5 × x、x÷2→x ÷ 2）
function fmtExpr(s){
  if(!s)return s;
  s=s.replace(/(\d)×x/g,'$1 × x');
  s=s.replace(/(\d)x/g,'$1 × x');
  s=s.replace(/([x\d])÷(\d)/g,'$1 ÷ $2');
  return s;
}

/* ===================== 図形SVG（面積の式） =====================
 * 寸法線は hdim/vdim ヘルパーで統一:
 *   両端に目盛線＋内向き矢印、ラベルは白フチ付きで線と重なっても読める。
 * 文字 x は紫のイタリック（数学書体）、高さは赤の点線で示す。 */
const C1="#7db8e0", C2="#c9e2f3", C3="#e6f1f9", CS="#2b6a99";
const HGT="#e0533d", DIM="#8a7a5e";
function isX(v){ return String(v).indexOf('x')>=0; }

function lbl(x,y,v,o){
  o=o||{};
  const sz=o.sz||19;
  const fill=isX(v)?"#7d3c98":(o.h?HGT:"#16386b");
  const it=isX(v)?'font-style="italic" font-family="Georgia,\'Times New Roman\',serif"':'';
  return `<text x="${x}" y="${y}" text-anchor="${o.anc||'middle'}" font-size="${sz}" font-weight="bold" fill="${fill}" ${it} style="paint-order:stroke;stroke:#fff;stroke-width:4px;stroke-linejoin:round;">${esc(v)}</text>`;
}
function guide(x,y,t,anc){ return `<text x="${x}" y="${y}" text-anchor="${anc||'start'}" font-size="10" fill="#9a8b6f">${t}</text>`; }

// 水平寸法線: x1〜x2、高さy。ラベルは線の上（o.below=trueで下）
function hdim(x1,x2,y,v,o){
  o=o||{};
  const a=6, sz=o.sz||18;
  const ly=o.below?y+sz+3:y-7;
  return `<g stroke="${DIM}" stroke-width="1.4" fill="${DIM}">`
    +`<line x1="${x1}" y1="${y-6}" x2="${x1}" y2="${y+6}"/>`
    +`<line x1="${x2}" y1="${y-6}" x2="${x2}" y2="${y+6}"/>`
    +`<line x1="${x1+1.5}" y1="${y}" x2="${x2-1.5}" y2="${y}"/>`
    +`<polygon points="${x1+1},${y} ${x1+1+a},${y-3.2} ${x1+1+a},${y+3.2}" stroke="none"/>`
    +`<polygon points="${x2-1},${y} ${x2-1-a},${y-3.2} ${x2-1-a},${y+3.2}" stroke="none"/>`
    +`</g>`+lbl((x1+x2)/2,ly,v,{sz:sz,h:o.h});
}
// 垂直寸法線: y1〜y2、位置x。ラベルは右側（o.left=trueで左側）
function vdim(x,y1,y2,v,o){
  o=o||{};
  const a=6, sz=o.sz||18;
  const lx=o.left?x-10:x+10;
  const anc=o.left?'end':'start';
  return `<g stroke="${DIM}" stroke-width="1.4" fill="${DIM}">`
    +`<line x1="${x-6}" y1="${y1}" x2="${x+6}" y2="${y1}"/>`
    +`<line x1="${x-6}" y1="${y2}" x2="${x+6}" y2="${y2}"/>`
    +`<line x1="${x}" y1="${y1+1.5}" x2="${x}" y2="${y2-1.5}"/>`
    +`<polygon points="${x},${y1+1} ${x-3.2},${y1+1+a} ${x+3.2},${y1+1+a}" stroke="none"/>`
    +`<polygon points="${x},${y2-1} ${x-3.2},${y2-1-a} ${x+3.2},${y2-1-a}" stroke="none"/>`
    +`</g>`+lbl(lx,(y1+y2)/2+6,v,{sz:sz,anc:anc,h:o.h});
}
// 高さの赤点線＋直角マーク
function heightLine(x,y1,y2,dir){ // dir: 直角マークの向き -1=左 1=右
  dir=dir||-1;
  return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="${HGT}" stroke-width="2" stroke-dasharray="6,5"/>`
    +`<polyline points="${x},${y2-12} ${x+12*dir},${y2-12} ${x+12*dir},${y2}" fill="none" stroke="${HGT}" stroke-width="2"/>`;
}
function svgWrap(vb,inner){ return `<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`; }

const SHAPES = {
  triangle(d){
    return svgWrap("-10 20 280 220",
      `<polygon points="25,180 235,180 130,50" fill="${C1}" stroke="${CS}" stroke-width="2.5" stroke-linejoin="round"/>`
      +heightLine(130,50,180,-1)
      +hdim(25,235,198,d.base,{below:true})
      +vdim(148,50,180,d.height,{h:true})
      +guide(160,56,"高さ")+guide(25,234,"底辺"));
  },
  parallelogram(d){
    return svgWrap("0 30 290 200",
      `<polygon points="25,178 210,178 255,63 70,63" fill="${C1}" stroke="${CS}" stroke-width="2.5" stroke-linejoin="round"/>`
      +heightLine(210,63,178,-1)
      +hdim(25,210,196,d.base,{below:true})
      +vdim(226,63,178,d.height,{h:true})
      +guide(238,70,"高さ")+guide(25,230,"底辺"));
  },
  rhombus(d){
    return svgWrap("0 15 265 200",
      `<polygon points="32,105 132,35 233,105 132,175" fill="${C1}" stroke="${CS}" stroke-width="2.5" stroke-linejoin="round"/>`
      +`<line x1="32" y1="105" x2="233" y2="105" stroke="${HGT}" stroke-width="2" stroke-dasharray="6,5"/>`
      +`<line x1="132" y1="35" x2="132" y2="175" stroke="${HGT}" stroke-width="2" stroke-dasharray="6,5"/>`
      +lbl(96,99,d.d1,{h:true})+lbl(148,136,d.d2,{h:true})
      +guide(36,97,"対角線①")+guide(140,32,"対角線②"));
  },
  compound(d){
    const SC=18, DEF=5;
    const vw1=isX(d.w1)?DEF:parseInt(d.w1), vh1=isX(d.h1)?DEF:parseInt(d.h1);
    const vw2=isX(d.w2)?DEF:parseInt(d.w2);
    const vh2=isX(d.h2)?Math.min(DEF,vh1-1):Math.min(parseInt(d.h2),vh1-1);
    const ox=40, oy=44;
    const x0=ox, x1=ox+vw1*SC, x2=ox+(vw1+vw2)*SC;
    const y0=oy, y1=oy+(vh1-vh2)*SC, y2=oy+vh1*SC;
    const vbW=(vw1+vw2)*SC+150, vbH=vh1*SC+96;
    return svgWrap(`-55 0 ${vbW} ${vbH}`,
      `<rect x="${x0}" y="${y0}" width="${x1-x0}" height="${y2-y0}" fill="${C1}"/>`
      +`<rect x="${x1}" y="${y1}" width="${x2-x1}" height="${y2-y1}" fill="${C2}"/>`
      +`<polygon points="${x0},${y0} ${x1},${y0} ${x1},${y1} ${x2},${y1} ${x2},${y2} ${x0},${y2}" fill="none" stroke="${CS}" stroke-width="2.5" stroke-linejoin="round"/>`
      +hdim(x0,x1,y0-14,d.w1,{sz:17})
      +hdim(x1,x2,y2+16,d.w2,{sz:17,below:true})
      +vdim(x0-17,y0,y2,d.h1,{sz:17,left:true,h:true})
      +vdim(x2+17,y1,y2,d.h2,{sz:17,h:true}));
  },
  compound_sub(d){
    const SC=18, DEF=5;
    const vw1=isX(d.w1)?DEF:parseInt(d.w1);
    const vTotal=isX(d.totalW)?DEF*2+2:parseInt(d.totalW);
    const vh1=isX(d.h1)?DEF:parseInt(d.h1);
    const vh2=isX(d.h2)?Math.min(DEF,vh1-1):Math.min(parseInt(d.h2),vh1-1);
    const vw2=Math.max(1,vTotal-vw1);
    const ox=40, oy=44;
    const x0=ox, x1=ox+vw1*SC, x2=ox+(vw1+vw2)*SC;
    const y0=oy, y1=oy+(vh1-vh2)*SC, y2=oy+vh1*SC;
    const vbW=(vw1+vw2)*SC+150, vbH=vh1*SC+96;
    return svgWrap(`-55 0 ${vbW} ${vbH}`,
      `<rect x="${x0}" y="${y0}" width="${x1-x0}" height="${y2-y0}" fill="${C1}"/>`

/* ===================== 面積問題ジェネレータ ===================== */
function genArea(forceType){
  const ALL=["triangle","parallelogram","rhombus","rhombus_rect","rhombus_formula","compound","compound_sub","para_decomp","trapezoid","trapezoid_std","trapezoid_para","trap_para","rhombus_decomp","tri_half_base","tri_rect"];
  const type=forceType||ALL[ri(ALL.length)];
  let dims,correct,wrongs,name,hint;

  if(type==="triangle"){
    const bv=rN(2,15),hv=rN(2,15);
    const [base,height]=Math.random()<.5?["x",String(hv)]:[String(bv),"x"];
    dims={base,height};name="三角形";hint="底辺 × 高さ ÷ 2 だよ！";
    correct=`${base} × ${height} ÷ 2`;
    wrongs=shuffle([`${base} × ${height}`,`(${base} + ${height}) × 2`,`(${base} + ${height}) ÷ 2`,`${base} ÷ 2 + ${height} ÷ 2`]);

  } else if(type==="parallelogram"){
    const bv=rN(2,15),hv=rN(2,15);
    const [base,height]=Math.random()<.5?["x",String(hv)]:[String(bv),"x"];
    dims={base,height};name="平行四辺形";hint="底辺 × 高さ だよ！";
    correct=`${base} × ${height}`;
    wrongs=shuffle([`${base} × ${height} ÷ 2`,`(${base} + ${height}) × 2`,`${base} + ${height} × 2`,`${base} × ${height} × 2`]);

  } else if(type==="rhombus"){
    const v1=rN(2,15),v2=rN(2,15);
    const [d1,d2]=Math.random()<.5?["x",String(v2)]:[String(v1),"x"];
    dims={d1,d2};name="ひし形";hint="対角線① × 対角線② ÷ 2 だよ！";
    correct=`${d1} × ${d2} ÷ 2`;
    wrongs=shuffle([`${d1} × ${d2}`,`(${d1} + ${d2}) × 2`,`(${d1} + ${d2}) ÷ 2`,`${d1} ÷ 2 + ${d2} ÷ 2`]);

  } else if(type==="compound"){
    const w1v=rN(3,9),h1v=rN(5,14),w2v=rN(3,9),h2v=rN(2,Math.max(2,h1v-2));
    const ls=[String(w1v),String(h1v),String(w2v),String(h2v)];
    ls[ri(4)]="x";
    const [w1,h1,w2,h2]=ls;
    dims={w1,h1,w2,h2};name="長方形を2つくっつけた形";
    hint=`左の面積（${w1}×${h1}）と右の面積（${w2}×${h2}）を足すよ！`;
    correct=`${w1} × ${h1} + ${w2} × ${h2}`;
    wrongs=shuffle([`(${w1} + ${w2}) × (${h1} + ${h2})`,`${w1} × ${h2} + ${w2} × ${h1}`,`${w1} × ${h1} × ${w2} × ${h2}`,`(${w1} + ${w2}) × ${h1}`]);

  } else if(type==="compound_sub"){
    const w1v=rN(3,8),w2v=rN(2,7),h1v=rN(5,12),h2v=rN(2,h1v-1),twv=w1v+w2v;
    const ls=[String(w1v),String(twv),String(h1v),String(h2v)];
    ls[ri(4)]="x";
    const [w1,totalW,h1,h2]=ls;
    dims={w1,totalW,h1,h2};name="長方形を2つくっつけた形";
    hint=`左の面積（${w1}×${h1}）＋右の面積（(${totalW}−${w1})×${h2}）だよ！右の横幅は全体（${totalW}）から左（${w1}）を引くよ！`;
    correct=`${w1} × ${h1} + (${totalW} - ${w1}) × ${h2}`;
    wrongs=shuffle([`${w1} × ${h1} + ${totalW} × ${h2}`,`${totalW} × ${h1} + ${w1} × ${h2}`,`${totalW} × (${h1} + ${h2})`,`(${totalW} - ${w1}) × (${h1} + ${h2})`]);

  } else if(type==="rhombus_rect"){
    const v1=rN(2,14),v2=rN(2,14);
    const [d1,d2]=Math.random()<.5?["x",String(v2)]:[String(v1),"x"];
    dims={d1,d2};name="ひし形（長方形の半分）";
    hint="ひし形は対角線①×対角線②の長方形のちょうど半分だよ！だから ÷2 するよ！";
    correct=`${d1} × ${d2} ÷ 2`;
    wrongs=shuffle([`${d1} × ${d2}`,`(${d1} + ${d2}) × 2`,`(${d1} + ${d2}) ÷ 2`,`${d1} ÷ 2 + ${d2} ÷ 2`]);

  } else if(type==="rhombus_formula"){
    const d1v=rN(2,7)*2,d2v=rN(2,7)*2;
    const useXForD1=Math.random()<0.5;
    const d1=useXForD1?"x":String(d1v);
    const d2=useXForD1?String(d2v):"x";
    const halfD1=useXForD1?"x÷2":String(d1v/2);
    const halfD2=useXForD1?String(d2v/2):"x÷2";
    const variant=Math.random()<0.5?1:2;
    const hd1f=isX(halfD1)?"(x ÷ 2)":halfD1;
    const hd2f=isX(halfD2)?"(x ÷ 2)":halfD2;
    const fs=[`${d1} × ${d2} ÷ 2`,`${d1} × ${hd2f}`,`${hd1f} × ${d2}`];
    correct=fs[variant];
    wrongs=fs.filter((_,i)=>i!==variant);
    dims={d1,d2,halfD1,halfD2,variant};
    name="ひし形";
    hint=variant===1
      ?`色の長方形の縦は対角線÷2 だよ！だから ${d1}×(${d2}÷2) と表すよ！`
      :`色の長方形の横は対角線÷2 だよ！だから (${d1}÷2)×${d2} と表すよ！`;

  } else if(type==="para_decomp"){
    const bv=rN(2,15),hv=rN(2,15);
    const [base,height]=Math.random()<.5?["x",String(hv)]:[String(bv),"x"];
    dims={base,height};name="平行四辺形（三角形2つ）";
    hint="対角線で2つの三角形に分けると、それぞれ 底辺×高さ÷2 だよ！";
    correct=`2 × (${base} × ${height} ÷ 2)`;
    wrongs=shuffle([`${base} × ${height} ÷ 2`,`2 × ${base} × ${height}`,`2 × (${base} + ${height} ÷ 2)`,`(${base} × ${height}) × 2 ÷ 2`]);

  } else if(type==="trapezoid"){
    const tv=rN(2,8),sv=rN(1,4),hv=rN(2,10);
    const ls=[String(tv),String(sv),String(hv)];
    ls[ri(3)]="x";
    const [top,side,height]=ls;
    dims={top,side,height};name="台形（長方形＋三角形×2）";
    hint=`長方形（${top}×${height}）＋左△（${side}×${height}÷2）＋右△（${side}×${height}÷2）を足すよ！`;
    correct=`${top} × ${height} + 2 × (${side} × ${height} ÷ 2)`;
    wrongs=shuffle([`${top} × ${height} + ${side} × ${height} ÷ 2`,`${top} × ${height} + 2 × ${side} × ${height}`,`(${top} + ${side}) × ${height}`,`(${top} + ${side} × 2) × ${height} ÷ 2`]);

  } else if(type==="trapezoid_std"){
    const topV=rN(2,8),extraV=rN(1,4),bottomV=topV+2*extraV,hV=rN(2,12);
    const ls=[String(topV),String(bottomV),String(hV)];
    ls[ri(3)]="x";
    const [top,bottom,height]=ls;
    dims={top,bottom,height};name="台形";
    hint=`（上底＋下底）×高さ÷2 だよ！（${top}＋${bottom}）×${height}÷2 を計算しよう！`;
    correct=`(${top} + ${bottom}) × ${height} ÷ 2`;
    wrongs=shuffle([`(${top} + ${bottom}) × ${height}`,`${top} × ${height} ÷ 2`,`${top} × ${height} + ${bottom} × ${height}`,`(${top} + ${bottom}) × ${height} × 2`]);

  } else if(type==="trapezoid_para"){
    const topV=rN(2,8),extraV=rN(1,4),bottomV=topV+2*extraV,hV=rN(2,12);
    const ls=[String(topV),String(bottomV),String(hV)];
    ls[ri(3)]="x";
    const [top,bottom,height]=ls;
    dims={top,bottom,height};name="台形（平行四辺形＋△）";
    hint=`平行四辺形（${top}×${height}）＋三角形（(${bottom}−${top})×${height}÷2）を足すよ！`;
    correct=`${top} × ${height} + (${bottom} - ${top}) × ${height} ÷ 2`;
    wrongs=shuffle([`${top} × ${height} + ${bottom} × ${height} ÷ 2`,`${top} × ${height} + (${bottom} - ${top}) × ${height}`,`(${top} + ${bottom}) × ${height}`,`${bottom} × ${height} + ${top} × ${height} ÷ 2`]);

  } else if(type==="trap_para"){
    const topV=rN(2,7),bottomV=rN(topV+2,14),heightV=rN(2,7)*2;
    const ls=[String(topV),String(bottomV),String(heightV)];
    ls[ri(3)]="x";
    const [top,bottom,height]=ls;
    dims={top,bottom,height};name="台形（平行四辺形に変形）";
    hint=`上底と下底を合わせた底辺・高さを半分にした平行四辺形に変形するよ！（${top}＋${bottom}）×（${height}÷2）だよ！`;
    const halfHf=isX(height)?"(x ÷ 2)":String(parseInt(height)/2);
    correct=`(${top} + ${bottom}) × ${halfHf}`;
    wrongs=shuffle([`(${top} + ${bottom}) × ${height}`,`(${top} - ${bottom}) × ${halfHf}`,`(${top} × ${bottom}) × ${halfHf}`,`(${top} + ${bottom}) × ${isX(height)?`${height} × 2`:String(parseInt(height)*2)}`]);

  } else if(type==="rhombus_decomp"){
    const hd1v=rN(1,7),hd2v=rN(1,7);
    const [halfD1,halfD2]=Math.random()<.5?["x",String(hd2v)]:[String(hd1v),"x"];
    dims={halfD1,halfD2};name="ひし形（直角三角形×4）";
    hint="2本の対角線で直角三角形4つに分けると、それぞれ 底辺×高さ÷2 だよ！";
    correct=`4 × (${halfD1} × ${halfD2} ÷ 2)`;
    wrongs=shuffle([`2 × (${halfD1} × ${halfD2} ÷ 2)`,`4 × ${halfD1} × ${halfD2}`,`(${halfD1} × ${halfD2}) ÷ 2`,`4 × (${halfD1} + ${halfD2}) ÷ 2`]);

  } else if(type==="tri_half_base"){
    const halfBaseV=rN(2,10),baseV=halfBaseV*2,hV=rN(2,12);
    const useXForBase=Math.random()<0.5;
    const base=useXForBase?"x":String(baseV);
    const height=useXForBase?String(hV):"x";
    const halfF=useXForBase?"(x ÷ 2)":String(halfBaseV);
    dims={base,height};name="三角形（底辺÷2の長方形）";
    hint=useXForBase
      ?`底辺がxなので半分は(x÷2)！長方形の面積は (x÷2)×${hV} だよ！`
      :`底辺（${baseV}）を半分にすると${halfBaseV}！長方形の面積は ${halfBaseV}×x だよ！`;
    correct=`${halfF} × ${height}`;
    wrongs=shuffle([`${base} × ${height}`,`${halfF} × ${height} ÷ 2`,`(${base} + ${height}) × 2`,`${halfF} + ${height}`]);

  } else { // tri_rect

    let base,halfH,fullHStr;

      wrongs=shuffle([`x × ${halfH} ÷ 2`,`x × ${halfH} × 2`,`(x + ${halfH}) × 2`,`x ÷ 2 × ${halfH}`]);
    } else {
      base=String(bv);halfH="x ÷ 2";fullHStr="x";
      correct=`${base} × (x ÷ 2)`;
      wrongs=shuffle([`${base} × x`,`${base} × x × 2`,`(${base} + x) × 2`,`${base} ÷ x × 2`]);
    }
    dims={base,halfH,fullH:fullHStr};name="三角形（長方形に変形）";
    hint=xCase===2
      ?`三角形の高さがxなら、長方形の縦は x÷2 だよ！だから面積は ${base} × (x ÷ 2) だよ！`
      :`三角形を折り返すと底辺×（高さ÷2）の長方形になるよ！`;
  }

  return {cat:"area",type,dims,name,hint,c:correct,choices:shuffle([correct,...wrongs.slice(0,2)])};
}

function genWord(cat){
  const pool=cat==='noy'?NOY:cat==='y'?YT:VAL;
  const p=pool[ri(pool.length)]();
  p.cat=cat;
  p.c=fmtExpr(p.c);
  p.w=p.w.map(fmtExpr);
  p.choices=shuffle([p.c,...p.w]);
  return p;
}

/* ===================== メイン ===================== */
const CIR=['①','②','③','④'];
const CAT_BADGE={
  noy:['qb-noy','📘 xを使って式で表そう'],
  y:['qb-y','📙 xとyの関係を式で表そう'],
  val:['qb-val','🔢 代入して値を求めよう'],
  area:['qb-area','📐 面積を文字式で表そう'],
};
let S={mode:'mix',qno:0,score:0,total:0,streak:0,q:null,sel:null,hint:false};

function newQ(){
  let cat=S.mode;
  if(cat==='mix') cat=pickA(['noy','noy','y','y','val','area','area']);
  S.q = cat==='area' ? genArea() : genWord(cat);
  S.sel=null; S.hint=false; S.qno++;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderScore(){
  const rate=S.total>0?Math.round(S.score/S.total*100):null;
  document.getElementById('scorebar').innerHTML=
    `<span>✅ <b>${S.score}</b> 問正解</span><span>／ ${S.total} 問</span>`
    +(rate!==null?`<span>正答率 ${rate}%</span>`:'')
    +(S.streak>=3?`<span class="streak">🔥 ${S.streak}連続！</span>`:'');
}

function render(){
  renderScore();
  const q=S.q, answered=S.sel!==null, ok=answered&&S.sel===q.c;
  const [bcls,btxt]=CAT_BADGE[q.cat];
  let body='';

  if(q.cat==='area'){
    body+=`<div class="qtext">次の図形は<strong style="color:var(--brand)">「${q.name}」</strong>です。`
      +(q.type==='rhombus_formula'?'色のついた長方形の考え方を表す式を選びましょう。':'面積を求める正しい式を選びましょう。')+`</div>`
      +`<div class="q-note">※赤い点線は<span class="hx">高さ</span>、<span class="vx">x</span> は長さを表す文字です。`
      +(q.type==='tri_rect'?'<span style="color:#27ae60"> 緑の枠＝変形後の長方形</span>':'')+`</div>`
      +`<div class="fig">${SHAPES[q.type](q.dims)}</div>`;
  } else {
    body+=`<div class="qtext"><span class="qemoji">${q.e}</span>${esc(q.q).replace(/\n/g,'<br>')}</div>`
      +(q.qfml?`<div class="q-fml">${esc(q.qfml)}</div>`:'')
      +(q.sub?`<div class="q-sub">${esc(q.sub)}</div>`:'');
  }

  body+='<div class="choices">'+q.choices.map((ch,i)=>{
    let cls='ch',mark=CIR[i];
    if(answered){
      if(ch===q.c){cls='ch ok';mark='○';}
      else if(ch===S.sel){cls='ch ng';mark='✕';}
      else cls='ch dim';
    }
    return `<button type="button" class="${cls}" data-i="${i}" ${answered?'disabled':''}><span class="cno">${mark}</span><span class="ctext">${esc(ch)}</span></button>`;
  }).join('')+'</div>';

  if(!answered){
    body+=S.hint
      ?`<div class="hintshow">💡 ${esc(q.hint||q.h).replace(/\n/g,'<br>')}</div>`
      :`<button type="button" class="hintbtn" id="btnHint">💡 ヒントを見る</button>`;
  } else {
    let v='';
    if(ok){ v=`<div class="verdict good">🎉 正解！よくできました！</div>`; }
    else {
      v=`<div class="verdict bad">ざんねん…<span class="small">正解は ${CIR[q.choices.indexOf(q.c)]}　<b>${esc(q.c)}</b></span></div>`;
    }
    v+=`<div class="hintshow">💡 ${esc(q.hint||q.h).replace(/\n/g,'<br>')}`
      +(q.fml?`<br>📐 <b>${esc(q.fml)}</b>`:'')
      +(q.fmlNote?`<br>${esc(q.fmlNote)}`:'')+`</div>`;
    body+=v;
    body+=`<div class="next-wrap"><button type="button" class="btn primary" id="btnNext">次の問題へ →</button></div>`;
  }

  document.getElementById('problemCard').innerHTML=
    `<div class="qhead"><span class="qno">第${S.qno}もん</span><span class="qbadge ${bcls}">${btxt}</span></div>`+body;

  // イベント
  document.querySelectorAll('#problemCard .ch:not([disabled])').forEach(b=>{
    b.addEventListener('click',()=>pickChoice(q.choices[+b.dataset.i]));
  });
  const hb=document.getElementById('btnHint');
  if(hb) hb.addEventListener('click',()=>{S.hint=true;render();});
  const nb=document.getElementById('btnNext');
  if(nb) nb.addEventListener('click',newQ);
}

function pickChoice(ch){
  if(S.sel!==null) return;
  S.sel=ch; S.total++;
  const ok=ch===S.q.c;
  if(ok){S.score++;S.streak++;}
  else S.streak=0;
  // 学習記録（未ログイン・ローカル時は divp-core 側で黙ってスキップ）
  try{
    if(window.Divp && Divp.answer){
      Divp.answer(ok,{
        question_key:S.q.cat,
        question_params:{cat:S.q.cat, type:S.q.type||null},
        question_text:S.q.cat==='area'?`${S.q.name}の面積の式`:(S.q.q+(S.q.sub?'\n'+S.q.sub:'')),
        correct_answer:S.q.c,
        wrong_answer:ok?null:ch,
      });
    }
  }catch(_){}
  render();
}

  function toggle(){const c=p.classList.toggle('collapsed');t.setAttribute('aria-expanded',String(!c));}
  t.addEventListener('click',toggle);
  t.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}});
})();

/* ===== 印刷 ===== */
function buildPrint(){
  const today=new Date();
  const dateStr=`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
  // 文章題6問＋面積2問
  const words=[];
  for(let i=0;i<3;i++) words.push(genWord('noy'));
  for(let i=0;i<2;i++) words.push(genWord('y'));
  words.push(genWord('val'));
  const areas=[genArea(),genArea()];
  const items=[...words,...areas];

  const head=(sub)=>`<div class="p-head"><div><div class="p-school">中京個別指導学院</div><div class="p-title">文字式マスター</div><div class="p-sub">${sub}</div></div><div class="p-name">${dateStr}　名前<span></span></div></div>`;
  const wm=window.ChukyoPrint?ChukyoPrint.img():'';

  let qhtml='';
  items.forEach((q,i)=>{
    let inner='';
    if(q.cat==='area'){
      inner=`<div class="p-q">次の図形は「${q.name}」です。面積を求める式を書きましょう。（xは長さを表す文字）</div>`
        +`<div class="p-figwrap">${SHAPES[q.type](q.dims)}</div>`;
    } else {
      inner=`<div class="p-q">${esc(q.q).replace(/\n/g,'<br>')}`
        +(q.qfml?`<br><b>${esc(q.qfml)}</b>`:'')+(q.sub?`<br>${esc(q.sub)}`:'')+`</div>`;
    }
    qhtml+=`<div class="p-item"><span class="p-no">${i+1}</span>${inner}<div class="p-anslabel">答え</div><div class="p-ansline"></div></div>`;
  });

  let ahtml='';
  items.forEach((q,i)=>{
    ahtml+=`<div class="a-line"><span class="p-no">${i+1}</span>　<b>${esc(q.c)}</b></div>`;
  });

  return `<div class="sheet">${wm}${head('問題プリント')}<p class="p-inst">次の問いに答えましょう。文字式で表すときは x を使いましょう。</p><div class="p-grid">${qhtml}</div></div>`
    +`<div class="sheet ans">${wm}${head('答え')}<div>${ahtml}</div></div>`;
}
document.getElementById('btnPrint').addEventListener('click',()=>{
  const wmCss=window.ChukyoPrint?'<style>'+ChukyoPrint.css({zIndex:0})+'.wm{position:fixed;}</style>':'';
  document.getElementById('printArea').innerHTML=wmCss+buildPrint();
  window.print();
});

/* ===== 起動 ===== */
newQ();
</script>
