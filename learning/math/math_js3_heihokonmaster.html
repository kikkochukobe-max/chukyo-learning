<style>
  :root {
    --navy: #0a1628;
    --blue: #1a3a6e;
    --accent: #e8a020;
    --gold: #f5c842;
    --light: #f0f4ff;
    --white: #ffffff;
    --correct: #22c55e;
    --wrong: #ef4444;
    --card-bg: #ffffff;
    --shadow: 0 8px 32px rgba(10,22,40,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    color: var(--navy);
    background-image:
      radial-gradient(ellipse at 20% 10%, #1a3a6e55 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, #e8a02022 0%, transparent 50%);
  }

  /* HEADER: 共通ヘッダー divp-header.js が自前のCSSを注入するため、ここでは定義しない */

  /* MAIN */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 12px 16px 32px;
  }

  .quiz-title {
    text-align: center;
    margin-bottom: 10px;
    position: relative;
  }
  .title-print-btn {
    position: absolute;
    top: 50%;
    right: 2px;
    transform: translateY(-50%);
    width: 42px;
    height: 42px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    background: #ffffff14;
    border: 1px solid #ffffff2e;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    transition: all 0.18s;
    z-index: 5;
    padding: 0;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .title-print-btn .pi { font-size: 15px; line-height: 1; }
  .title-print-btn .pl { font-size: 9px; line-height: 1; font-weight: 700; letter-spacing: 0.02em; }
  .title-print-btn:hover { background: #ffffff28; }
  .title-print-btn:active { transform: translateY(-50%) scale(0.94); }

  .quiz-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 5vw, 32px);
    color: var(--white);
    letter-spacing: 0.08em;
    line-height: 1;
  }

  .quiz-title .subtitle {
    font-size: 10px;
    color: var(--accent);
    margin-top: 2px;
    letter-spacing: 0.12em;
    font-weight: 500;
  }

  /* SCORE BAR */
  .score-bar {
    background: #ffffff10;
    border: 1px solid #ffffff20;
    border-radius: 12px;
    padding: 8px 16px;
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
    backdrop-filter: blur(8px);
  }

  .score-item {
    text-align: center;
  }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--white);
    line-height: 1;
  }

  .score-num.correct-color { color: var(--correct); }
  .score-num.wrong-color { color: var(--wrong); }

  .score-label {
    font-size: 10px;
    color: #ffffff80;
    margin-top: 1px;
    letter-spacing: 0.08em;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: slideUp 0.35s ease;
    position: relative;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .q-num {
    background: var(--navy);
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }

  .q-type-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }

  .badge-select-correct {
    background: #dbeafe;
    color: #1d4ed8;
  }

  .badge-select-wrong {
    background: #fee2e2;
    color: #dc2626;
  }

  .question-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 20px;
    line-height: 1.6;
    border-left: 4px solid var(--accent);
    padding-left: 14px;
  }

  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    background: #f8fafc;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--navy);
    transition: all 0.18s;
    text-align: left;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: #eff6ff;
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--blue);
    background: #dbeafe;
  }

  .option-btn.result-correct {
    border-color: var(--correct);
    background: #dcfce7;
  }

  .option-btn.result-wrong {
    border-color: var(--wrong);
    background: #fee2e2;
  }

  .option-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    color: #64748b;
    background: white;
    transition: all 0.18s;
  }

  .option-btn.selected .option-icon {
    border-color: var(--blue);
    background: var(--blue);
    color: white;
  }

  .option-btn.result-correct .option-icon {
    border-color: var(--correct);
    background: var(--correct);
    color: white;
  }

  .option-btn.result-wrong .option-icon {
    border-color: var(--wrong);
    background: var(--wrong);
    color: white;
  }

  /* KaTeX — simplify mode only */
  .simplify-question-rad .katex { font-size: 2em !important; }
  .simplify-opt .katex { font-size: 1.15em !important; }
  .explanation .katex { font-size: 0.95em !important; }
  /* Inline KaTeX wrapper — prevents vertical overflow */
  .kw {
    display: inline-block;
    vertical-align: middle;
    line-height: 1;
  }


  /* ACTION BUTTONS */
  .action-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn {
    padding: 14px 24px;
    border-radius: 12px;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    flex: 1;
    letter-spacing: 0.04em;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--navy);
  }

  .btn-primary:hover { background: var(--gold); transform: translateY(-2px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-next {
    background: var(--navy);
    color: var(--white);
  }

  .btn-next:hover { background: var(--blue); transform: translateY(-2px); }

  /* EXPLANATION */
  .explanation {
    margin-top: 16px;
    padding: 16px;
    background: #f0f9ff;
    border-left: 4px solid #0ea5e9;
    border-radius: 0 12px 12px 0;
    font-size: 13px;
    line-height: 1.7;
    color: #0c4a6e;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .explanation strong { color: var(--navy); }

  /* RESULT SCREEN */
  .result-screen {
    text-align: center;
    padding: 40px 24px;
    background: var(--card-bg);
    border-radius: 20px;
    box-shadow: var(--shadow);
    animation: slideUp 0.4s ease;
  }

  .result-grade {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-msg {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--navy);
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 28px;
  }

  .result-item {
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
  }

  .result-item.c { background: #dcfce7; color: #166534; }
  .result-item.w { background: #fee2e2; color: #991b1b; }

  .btn-retry {
    background: var(--accent);
    color: var(--navy);
    font-size: 16px;
    padding: 16px 40px;
    border-radius: 14px;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.06em;
  }

  .btn-retry:hover { background: var(--gold); transform: translateY(-3px); }
  .btn-retry-wrong {
    display: block; width: 100%; margin-top: 10px; padding: 14px;
    background: #3b82f6; color: #fff; border: none; border-radius: 14px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.18s, transform 0.18s;
  }
  .btn-retry-wrong:hover { background: #2563eb; transform: translateY(-2px); }

  /* PROGRESS BAR */
  .progress-wrap {
    height: 4px;
    background: #ffffff20;
    border-radius: 3px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .hint-multi {
    font-size: 12px;
    color: #64748b;
    margin-top: 8px;
    font-style: italic;
  }

  .card-reset-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    color: #94a3b8;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 9px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.18s;
  }
  .card-reset-btn:hover {
    background: #e2e8f0;
    color: #475569;
  }
  .card-print-btn {
    position: absolute;
    top: 14px;
    left: 14px;
    background: #eef2ff;
    border: 1px solid #c7d2fe;
    border-radius: 8px;
    color: #4f46e5;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 9px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.18s;
    z-index: 6;
  }
  .card-print-btn:hover { background: #e0e7ff; color:#3730a3; }
  /* HANKO STAMP: 共通モジュール divp-correct-jh.js が自前のCSSを注入するため、ここでは定義しない */

  /* MULDIV MODE */
  .term-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
    justify-content: center;
  }
  .term-btn {
    padding: 7px 18px;
    border: 2px solid #e2e8f0;
    border-radius: 20px;
    background: #f8fafc;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    color: #64748b;
    transition: all 0.18s;
  }
  .term-btn.active {
    border-color: var(--blue);
    background: #dbeafe;
    color: var(--navy);
  }
  .term-btn.frac-toggle { border-style: dashed; }
  .term-btn.frac-toggle.active { border-color: #f59e0b; background: #fef3c7; color: #92400e; }
  .muldiv-problem {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 24px 16px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: slideUp 0.35s ease;
    position: relative;
    text-align: center;
  }
  .muldiv-expr { font-size: 1em; margin: 16px 0 20px; min-height: 60px; display:flex; align-items:center; justify-content:center; }
  .muldiv-expr .katex { font-size: 2em !important; }
  .muldiv-opts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .muldiv-opt {
    padding: 14px 8px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    background: #f8fafc;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .muldiv-opt .katex { font-size: 1.1em !important; }
  .muldiv-opts.opts-wide { grid-template-columns: 1fr; }
  .opts-wide .muldiv-opt { padding: 12px 12px; }
  .opts-wide .muldiv-opt .katex { font-size: 0.92em !important; }
  .muldiv-opt:hover:not(:disabled) { border-color: var(--blue); background: #eff6ff; transform: scale(1.02); }
  .muldiv-opt.result-correct { border-color: var(--correct); background: #dcfce7; }
  .muldiv-opt.result-wrong   { border-color: var(--wrong);   background: #fee2e2; }
  .muldiv-opt.sel    { border-color: #2563eb; background: #eff6ff; }
  .muldiv-opt.missed { border-color: #f5c842; background: #fffbeb; }
  .muldiv-opt.missed::after { content:" ◯"; color:#b45309; font-weight:700; }
  /* 選択中（答え合わせ前）の強調 */
  .muldiv-opt.picking, .simplify-opt.picking {
    border-color:#2563eb; background:#dbeafe;
    box-shadow:0 0 0 3px rgba(37,99,235,0.22);
  }
  .confirm-btn { width:100%; }
  /* スマホ1画面に収める（狭幅で余白・文字を圧縮） */
  @media (max-width: 480px) {
    .muldiv-problem, .simplify-problem, .question-card { padding:16px 10px 14px; border-radius:16px; margin-bottom:14px; }
    .muldiv-expr { min-height:42px; margin:10px 0 12px; }
    .muldiv-expr .katex { font-size:1.5em !important; }
    .muldiv-opts { gap:8px; }
    .muldiv-opt { padding:11px 6px; font-size:16px; }
    .simplify-options { gap:8px; }
    .simplify-opt { padding:11px 6px; }
    .options { gap:8px; }
    .option-btn { padding:10px 10px; }
    .term-selector { gap:5px; margin-bottom:10px; }
    .term-btn { padding:5px 8px; font-size:11px; }
    .action-row { margin-top:12px; gap:8px; }
    .btn { padding:12px 16px; font-size:13px; }
  }

  .frac {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    font-size: 0.9em;
    line-height: 1.2;
    margin: 0 2px;
  }
  .frac-num {
    border-bottom: 1px solid currentColor;
    padding: 0 4px 1px;
    text-align: center;
    min-width: 1em;
  }
  .frac-den {
    padding: 1px 4px 0;
    text-align: center;
    min-width: 1em;
  }
  .mode-toggle {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff14;
    border: 1px solid #ffffff1f;
    border-radius: 12px;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 11px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .mode-toggle:hover { background: #ffffff22; }
  .mode-toggle .chev { font-size: 11px; opacity: 0.8; }
  .mode-switcher {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
    background: #ffffff10;
    border-radius: 14px;
    padding: 5px;
    overflow: hidden;
  }
  .mode-switcher.collapsed { display: none; }
  .mode-btn {
    flex: 1 1 90px;
    min-width: 90px;
    padding: 8px 8px;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: #ffffff80;
    background: transparent;
    letter-spacing: 0.03em;
    line-height: 1.4;
  }
  .mode-btn.active {
    background: var(--accent);
    color: var(--navy);
    box-shadow: 0 2px 8px rgba(232,160,32,0.4);
  }

  /* APPROX MODE */
  .near-given {
    background: #f0f6ff;
    border: 2px dashed var(--blue);
    border-radius: 12px;
    padding: 10px 12px;
    margin: 0 0 4px;
  }
  .near-given-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .near-given-vals {
    display: flex;
    gap: 22px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .near-given-vals .katex { font-size: 1.3em !important; }
  .near-ask {
    font-size: 13px;
    color: #64748b;
    font-weight: 700;
    margin: 10px 0 -4px;
  }

  /* SIMPLIFY MODE */
  .simplify-problem {
    text-align: center;
    padding: 28px 16px 20px;
    background: var(--card-bg);
    border-radius: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: slideUp 0.35s ease;
    position: relative;
  }
  .simplify-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 12px;
  }
  .simplify-question {
    font-size: 48px;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .simplify-sub {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 4px;
  }
  .simplify-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }
  .simplify-opt {
    padding: 18px 8px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    background: #f8fafc;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;

<script>
// ====== MATH RENDERING ======
// K() wraps KaTeX in inline-block to prevent vertical overflow
function K(latex) {
  if (typeof katex === 'undefined') return latex;
  const html = katex.renderToString(latex, { throwOnError: false, displayMode: false });
  return '<span class="kw">' + html + '</span>';
}

// Convert math token string to LaTeX
function toLatex(token) {
  // (－√n)² or (-√n)²
  let m = token.match(/^\([-－]√([\d.]+)\)²$/);
  if (m) return '(-\\sqrt{' + m[1] + '})^2';
  // (√n)²
  m = token.match(/^\(√([\d.]+)\)²$/);
  if (m) return '(\\sqrt{' + m[1] + '})^2';
  // ±√n
  m = token.match(/^±√([\d.]+)$/);
  if (m) return '\\pm\\sqrt{' + m[1] + '}';
  // a√b
  m = token.match(/^(\d+)√([\d.]+)$/);
  if (m) return m[1] + '\\sqrt{' + m[2] + '}';
  // [-－]√n
  m = token.match(/^[-－]√([\d.]+)$/);
  if (m) return '-\\sqrt{' + m[1] + '}';
  // √(n/d)
  m = token.match(/^√\((\d+)\/(\d+)\)$/);
  if (m) return '\\sqrt{\\dfrac{' + m[1] + '}{' + m[2] + '}}';
  // F(a/b) — standalone fraction
  m = token.match(/^F\((\d+)\/(\d+)\)$/);
  if (m) return '\\dfrac{' + m[1] + '}{' + m[2] + '}';
  // [-－]√((-n)²)  例: -√((-3)²)
  m = token.match(/^[-－]√\(\(-(\d+)\)²\)$/);
  if (m) return '-\\sqrt{(-' + m[1] + ')^2}';
  // √((-n)²)  例: √((-3)²)
  m = token.match(/^√\(\(-(\d+)\)²\)$/);
  if (m) return '\\sqrt{(-' + m[1] + ')^2}';
  // √n
  m = token.match(/^√([\d.]+)$/);
  if (m) return '\\sqrt{' + m[1] + '}';
  return token;
}

function renderMath(str) {
  // Split into math tokens and plain text, render each separately
  // Longest/most specific patterns first to avoid partial matches
  const mathRe = /[-－]√\(\(-\d+\)²\)|√\(\(-\d+\)²\)|\([-－]√[\d.]+\)²|\(√[\d.]+\)²|√\(\d+\/\d+\)|±√[\d.]+|\d+√[\d.]+|[-－]√[\d.]+|√[\d.]+|F\(\d+\/\d+\)/g;
  let result = '';
  let lastIdx = 0;
  let match;
  while ((match = mathRe.exec(str)) !== null) {
    // Plain text before this match (convert minus sign)
    const text = str.slice(lastIdx, match.index).replace(/(?<!\d)-([\d])/g, '－$1');
    result += text;
    // Math token → KaTeX wrapped in inline-block
    result += K(toLatex(match[0]));
    lastIdx = match.index + match[0].length;
  }
  // Remaining plain text
  result += str.slice(lastIdx).replace(/(?<!\d)-([\d])/g, '－$1');
  return result;
}

// ====== STATEMENT GENERATORS ======
// Returns { text, isTrue, explanation }

const statementGenerators = [

  // 1. nの平方根はXである（正解: ±√n or ±k）
  () => {

  () => {

  () => {
    const pairs = [[2,3],[3,5],[5,7],[7,10],[2,5],[3,7],[5,10],[2,7]];

  // 23. √nの整数部分（√400まで）
  () => {
    const perfect = new Set([1,4,9,16,25,36,49,64,81,100,121,144,169,196,225,256,289,324,361,400]);
    let n;
    do { n = Math.floor(Math.random() * 399) + 2; } while (perfect.has(n));
    const k = Math.floor(Math.sqrt(n));
    const k2 = k * k;
    const k1_2 = (k + 1) * (k + 1);
    const variants = [
      { claimed: k,   correct: true  },
      { claimed: k+1, correct: false },
      { claimed: Math.max(1, k-1), correct: false },
    ];
    const v = pick(variants);
    return {
      text: `√${n}の整数部分は${v.claimed}である`,
      isTrue: v.correct,
      exp: `√${k2} < √${n} < √${k1_2}、つまり、${k} < √${n} < ${k+1}。${k}と${k+1}の間にあるということは整数部分は${k}となる。`
    };
  },

  // 24. √nの整数部分の範囲確認
  () => {
    const perfect = new Set([1,4,9,16,25,36,49,64,81,100,121,144,169,196,225,256,289,324,361,400]);
    let n;
    do { n = Math.floor(Math.random() * 399) + 2; } while (perfect.has(n));
    const k = Math.floor(Math.sqrt(n));
    const k2 = k * k;
    const k1_2 = (k + 1) * (k + 1);
    const variants = [
      { text: `√${n}は${k}以上${k+1}未満である`, isTrue: true,
        exp: `√${k2} < √${n} < √${k1_2}、つまり、${k} < √${n} < ${k+1}なので${k}以上${k+1}未満。正しい。` },
      { text: `√${n}は${k-1}以上${k}未満である`, isTrue: false,
        exp: `√${k2} < √${n} < √${k1_2}、つまり、${k} < √${n} < ${k+1}。整数部分は${k}なので${k-1}以上${k}未満は誤り。` },
      { text: `√${n}は${k+1}以上${k+2}未満である`, isTrue: false,
        exp: `√${k2} < √${n} < √${k1_2}、つまり、${k} < √${n} < ${k+1}。${k+1}以上ではない。` },

];

// ====== QUESTION BUILDER ======
function generateStatement() {
  const gen = pick(statementGenerators);
  return gen();
}

function generateQuestion(qIndex) {
  // Decide mode: select-correct or select-wrong
  const mode = Math.random() < 0.5 ? 'correct' : 'wrong'; // 'correct'=正しいものを選べ, 'wrong'=誤りを選べ

  // Generate 4 unique statements
  const statements = [];
  const usedTexts = new Set();
  let attempts = 0;
  while (statements.length < 4 && attempts < 60) {
    const s = generateStatement();
    if (!usedTexts.has(s.text)) {
      usedTexts.add(s.text);
      statements.push(s);
    }
    attempts++;
  }
  // Ensure at least 1 and at most 3 answers per mode
  let targetSet = mode === 'correct'
    ? statements.filter(s => s.isTrue)
    : statements.filter(s => !s.isTrue);

  if (targetSet.length === 0 || targetSet.length === 4) {
    // regenerate once
    return generateQuestion(qIndex);
  }

  return { mode, statements, qIndex };
}

// ====== STATE ======
let questions = [];
let currentQ = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let selectedOptions = new Set();
const TOTAL = 10;

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function initQuiz() {
  _tfRetryQueue=null; _tfRetryTotal=TOTAL; tfWrongQs=[];
  questions = [];
  for (let i = 0; i < TOTAL; i++) {
    questions.push(generateQuestion(i));
  }
  currentQ = 0;
  correctCount = 0;
  wrongCount = 0;
  answered = false;
  selectedOptions = new Set();
  updateScoreBar();
  renderQuestion();
}

function updateScoreBar() {
  document.getElementById('q-count').textContent = Math.min(currentQ + 1, TOTAL);
  document.getElementById('score-correct').textContent = correctCount;
  document.getElementById('score-wrong').textContent = wrongCount;
  document.getElementById('progress-fill').style.width = (currentQ / TOTAL * 100) + '%';
}

// Store current question's answer data in module-level vars (avoids onclick attribute injection)
let currentCorrectAnswers = [];
let currentExplanations = [];

function renderQuestion() {
  const _tfTotal = _tfRetryQueue !== null ? _tfRetryTotal : TOTAL;
  if (currentQ >= _tfTotal) {
    renderResult();
    return;
  }
  answered = false;
  selectedOptions = new Set();
  updateScoreBar();
  const q = (_tfRetryQueue && _tfRetryQueue.length > 0)
    ? (() => { const qq = _tfRetryQueue.shift(); questions[currentQ] = qq; return qq; })()
    : questions[currentQ];
  const modeLabel = q.mode === 'correct' ? '正しいものをすべて選べ' : '誤っているものをすべて選べ';
  const badgeClass = q.mode === 'correct' ? 'badge-select-correct' : 'badge-select-wrong';

  currentCorrectAnswers = q.mode === 'correct'
    ? q.statements.map((s,i) => s.isTrue ? i : -1).filter(i => i >= 0)
    : q.statements.map((s,i) => !s.isTrue ? i : -1).filter(i => i >= 0);
  currentExplanations = q.statements.map(s => s.exp);

  const labels = ['ア','イ','ウ','エ'];

  let optionsHTML = q.statements.map((s, i) => `
    <button class="option-btn" id="opt-${i}" data-idx="${i}">
      <span class="option-icon" id="icon-${i}">${labels[i]}</span>
      <span>${renderMath(s.text)}</span>
    </button>
  `).join('');

  document.getElementById('quiz-area').innerHTML = `
    <div class="question-card">
      <button class="card-reset-btn" id="card-reset-btn">↩ 最初へ</button>
      <div class="question-meta">
        <span class="q-num">Q${currentQ + 1}</span>
        <span class="q-type-badge ${badgeClass}">${modeLabel}</span>
      </div>
      <div class="question-text">次の選択肢の中から、<strong>${modeLabel}</strong>。（複数選択可）</div>
      <div class="options" id="options-wrap">${optionsHTML}</div>
      <div class="hint-multi">※ 該当するものをすべて選んで「答え合わせ」を押してください</div>
      <div class="action-row">
        <button class="btn btn-primary" id="check-btn">答え合わせ</button>
      </div>
    </div>
  `;

  // Attach events via JS (not onclick attributes)
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleOption(parseInt(btn.dataset.idx)));
  });
  document.getElementById('check-btn').addEventListener('click', checkAnswer);
  document.getElementById('card-reset-btn').addEventListener('click', () => {
    if (currentMode === 'truefalse') initQuiz(); else initSimplify();
  });
}

function toggleOption(i) {
  if (answered) return;
  const labels = ['ア','イ','ウ','エ'];
  if (selectedOptions.has(i)) {
    selectedOptions.delete(i);
    document.getElementById(`opt-${i}`).classList.remove('selected');
    document.getElementById(`icon-${i}`).textContent = labels[i];
  } else {
    selectedOptions.add(i);
    document.getElementById(`opt-${i}`).classList.add('selected');
    document.getElementById(`icon-${i}`).textContent = '✓';
  }
}

function checkAnswer() {
  if (answered) return;
  if (selectedOptions.size === 0) {
    alert('選択肢を選んでください。');
    return;
  }
  answered = true;

  const correctAnswers = currentCorrectAnswers;
  const explanations = currentExplanations;
  const correctSet = new Set(correctAnswers);
  const userSet = selectedOptions;

  let isCorrect = correctSet.size === userSet.size;
  if (isCorrect) {
    for (const v of correctSet) {
      if (!userSet.has(v)) { isCorrect = false; break; }
    }
  }

  if (isCorrect) { correctCount++; safeDivpCorrect('.question-card'); }
  else { wrongCount++; tfWrongQs.push(questions[currentQ]); safeDivpIncorrect('.question-card'); }
  Divp.answer(isCorrect, {
    question_key: 'truefalse',
    question_params: { mode: questions[currentQ].mode, statements: questions[currentQ].statements },
    question_text: questions[currentQ].statements.map((s, i) => ['ア','イ','ウ','エ'][i] + '. ' + s.text).join(' / '),
    correct_answer: correctAnswers.map(i => ['ア','イ','ウ','エ'][i]).join('・'),
    wrong_answer: [...userSet].map(i => ['ア','イ','ウ','エ'][i]).join('・'),
  });

  const labels = ['ア','イ','ウ','エ'];

  // Apply result styles
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`opt-${i}`);
    const icon = document.getElementById(`icon-${i}`);
    btn.disabled = true;
    btn.classList.remove('selected');
    const userPicked = userSet.has(i);
    const isCorrectOpt = correctSet.has(i);

    if (isCorrectOpt) {
      btn.classList.add('result-correct');
      icon.textContent = '○';
    } else {
      btn.classList.add('result-wrong');
      icon.textContent = '×';
    }

    // ユーザーが選んだ選択肢にバッジを表示
    if (userPicked) {
      const badge = document.createElement('span');
      badge.textContent = '▶ あなたの選択';
      badge.style.cssText = `
        font-size: 10px;
        font-weight: 700;
        margin-left: auto;
        padding: 2px 7px;
        border-radius: 10px;
        white-space: nowrap;
        background: ${isCorrectOpt ? '#166534' : '#991b1b'};
        color: #fff;
        letter-spacing: 0.04em;
      `;
      btn.appendChild(badge);
    }
  }

  const resultMsg = isCorrect
    ? `<span style="color:#166534;font-weight:700;">✓ 正解！</span>`
    : `<span style="color:#991b1b;font-weight:700;">✗ 不正解</span>（正解：${correctAnswers.map(i => labels[i]).join('・')}）`;

  // Build explanation div
  const expDiv = document.createElement('div');
  expDiv.className = 'explanation';
  let expInner = resultMsg + '<br><br>';
  explanations.forEach((e, i) => {
    expInner += `<div><strong>【${labels[i]}】</strong> ${renderMath(e)}</div>`;
    if (i < explanations.length - 1) expInner += '<br>';
  });
  expDiv.innerHTML = expInner;

  // Build next button row
  const nextRow = document.createElement('div');
  nextRow.className = 'action-row';
  nextRow.style.marginTop = '12px';
  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-next';
  nextBtn.textContent = '次の問題へ →';
  nextBtn.addEventListener('click', nextQuestion);
  nextRow.appendChild(nextBtn);

  const card = document.querySelector('.question-card');
  document.getElementById('check-btn').remove();

function fitToWidth() {
  requestAnimationFrame(() => {
    // 選択肢ボタン内の数式
    document.querySelectorAll('.muldiv-opt').forEach(btn => {
      const inner = btn.querySelector('.kw');
      if (!inner) return;
      inner.style.transform = '';
      inner.style.display = 'inline-block';
      inner.style.whiteSpace = 'nowrap';
      const avail = btn.clientWidth - 20;
      if (inner.scrollWidth > avail && avail > 0) {
        const ratio = Math.max(0.45, avail / inner.scrollWidth);
        inner.style.transform = `scale(${ratio})`;
        inner.style.transformOrigin = 'center';
      }
    });
    // メイン問題式
    const exprWrap = document.querySelector('.muldiv-expr');
    const expr = exprWrap?.querySelector('.kw');
    if (expr && exprWrap) {
      expr.style.transform = '';
      expr.style.display = 'inline-block';
      expr.style.whiteSpace = 'nowrap';
      exprWrap.style.overflow = 'visible';
      const avail = exprWrap.clientWidth - 16;
      if (expr.scrollWidth > avail && avail > 0) {
        const ratio = Math.max(0.35, avail / expr.scrollWidth);
        expr.style.transform = `scale(${ratio})`;
        expr.style.transformOrigin = 'center';
      }
    }
  });
}
// ===== 選択→「答え合わせ」で確定する共通フロー（単一選択モード） =====
// optSelector の選択肢はクリックで「選ぶ」だけ（.picking で強調）。カード末尾に
// 「答え合わせ」ボタンを差し込み、押したときに初めて gradeFn(選んだidx) を呼んで採点する。
function bindSingleConfirm(optSelector, cardSelector, gradeFn){
  const card = document.querySelector(cardSelector);
  if (!card) return;
  const btns = Array.from(card.querySelectorAll(optSelector));
  let sel = -1;
  const idxOf = (btn) => (btn.dataset.idx !== undefined ? parseInt(btn.dataset.idx) : btns.indexOf(btn));
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      sel = idxOf(btn);
      btns.forEach(b => b.classList.remove('picking'));
      btn.classList.add('picking');
      const cb = card.querySelector('.confirm-btn');
      if (cb) cb.disabled = false;
    });
  });
  const row = document.createElement('div');
  row.className = 'action-row confirm-row';
  row.style.marginTop = '14px';
  row.innerHTML = '<button class="btn btn-primary confirm-btn" disabled>答え合わせ</button>';
  card.appendChild(row);
  row.querySelector('.confirm-btn').addEventListener('click', () => {
    if (sel < 0) return;
    btns.forEach(b => b.classList.remove('picking'));
    row.remove();
    gradeFn(sel);
  });
}

function makeWrongOptions(s) {
  const wrongs = new Set();
  const candidates = [
    { a: s.a + 1, b: s.b },
    { a: s.a - 1, b: s.b },
    { a: s.a,     b: s.b + 1 },
    { a: s.a,     b: s.b + 2 },
    { a: s.a * 2, b: s.b },
    { a: s.a,     b: s.b * 2 },
    { a: s.a + 2, b: s.b },
    { a: s.b,     b: s.a },
  ].filter(c => c.a > 0 && c.b > 0 && !(c.a === s.a && c.b === s.b));

  const shuffled = candidates.sort(() => Math.random() - 0.5);
  const result = [];
  for (const c of shuffled) {
    const key = `${c.a}-${c.b}`;
    if (!wrongs.has(key)) { wrongs.add(key); result.push(c); }
    if (result.length >= 3) break;
  }
  return result;
}

  const _sTotal = _sRetryQueue !== null ? _sRetryTotal : S_TOTAL;

// ====== MULDIV MODE ======
let mdTerms = 2;
let mdFrac = false;
let mdCurrentQ = 0;
let mdCorrect = 0;
let mdWrong = 0;
const MD_TOTAL = 10;

function gcdFn(a, b) { return b === 0 ? a : gcdFn(b, a % b); }

// √n を {c, r} に簡略化
function simpRad(n) {
  let c = 1, r = n;
  for (let i = 2; i * i <= r; i++) {
    while (r % (i * i) === 0) { c *= i; r = Math.round(r / (i * i)); }
  }
  return { c, r };
}

// LaTeX文字列生成
function radLatex(c, r) {
  if (r === 1) return String(c);
  if (c === 1) return `\\sqrt{${r}}`;
  return `${c}\\sqrt{${r}}`;
}
function rationLatex(nc, nr, den) {
  const num = nc === 1 ? `\\sqrt{${nr}}` : `${nc}\\sqrt{${nr}}`;
  return den === 1 ? num : `\\dfrac{${num}}{${den}}`;
}

// 誤答生成（通常計算用）
function mdWrongAnswers(ac, ar) {
  const seen = new Set([`${ac}|${ar}`]);
  const cands = [];
  const push = (c, r) => {
    if (c > 0 && r > 0) { const k = `${c}|${r}`; if (!seen.has(k)) { seen.add(k); cands.push({ latex: radLatex(c,r), key: k }); } }
  };
  for (let d = -3; d <= 5; d++) { if (d !== 0) push(ac + d, ar); }
  for (const nr of [ar-2,ar-1,ar+1,ar+2,ar+3,ar*2]) { if (nr>0) { push(ac, nr); const {c,r}=simpRad(nr); push(c,r); } }
  for (const n of [2,3,5,6,7,8,10,12,15,18,20,24,27,45,50]) { const {c,r}=simpRad(n); push(c,r); }
  cands.sort(() => Math.random() - 0.5);
  const res = cands.slice(0, 5);
  while (res.length < 5) { const k=`x${res.length}`; res.push({ latex: String(res.length+2), key: k }); }
  return res;
}

// 有理化の誤答生成
function rationWrongAnswers(nc, nr, den, a, b) {
  const seen = new Set([`${nc}|${nr}|${den}`]);
  const cands = [];
  const push = (n,r,d) => {
    if (n>0&&r>0&&d>0) { const k=`${n}|${r}|${d}`; if (!seen.has(k)) { seen.add(k); cands.push({ latex: rationLatex(n,r,d), key: k }); } }
  };
  // Wrong denominators
  push(nc, nr, den===1 ? 2 : den-1); push(nc, nr, den+1); push(nc, nr, den*2);
  // Unsimplified
  if (gcdFn(a,b)>1) push(a, b, b); // unsimplified form
  // Wrong numerator coeff
  push(nc+1, nr, den); push(Math.max(1,nc-1), nr, den);
  // Wrong radicand
  push(nc, nr+1, den); push(nc, nr-1>0?nr-1:nr+2, den);
  // Common distractors
  push(1, nr, b); push(a, nr, b); push(nc, b, den);
  cands.sort(() => Math.random() - 0.5);
  const res = cands.slice(0, 5);
  while (res.length < 5) { res.push({ latex: rationLatex(res.length+1, nr, den+res.length), key: `x${res.length}` }); }
  return res;
}

// 問題生成
function genMultiplication2() {
  const pool = [2,3,5,6,7,10,11,13,15];
  for (let att = 0; att < 100; att++) {
    const [a, b] = [pick(pool), pick(pool)];
    const product = a * b;
    if (product > 500) continue;
    const {c,r} = simpRad(product);
    if (c > 20 || r > 60) continue;
    return { type:'calc', nums:[a,b], ops:['×'], product, ac:c, ar:r,
      latex:`\\sqrt{${a}} \\times \\sqrt{${b}}` };
  }
}

function genDivision2() {
  const pool = [2,3,5,6,7,10,11,13,15];
  for (let att = 0; att < 100; att++) {
    const b = pick(pool);
    const mult = pick(pool);
    const a = b * mult;
    if (a > 300) continue;
    const product = mult;
    const {c,r} = simpRad(product);
    if (c > 15 || r > 50) continue;
    return { type:'calc', nums:[a,b], ops:['÷'], product, ac:c, ar:r,
      latex:`\\sqrt{${a}} \\div \\sqrt{${b}}` };
  }
  return genMultiplication2();
}

// 係数付き汎用ラテックス生成
function termLatex(c, r) {
  return c === 1 ? `\\sqrt{${r}}` : `${c}\\sqrt{${r}}`;
}

// 2項 統合ジェネレーター（掛け算・割り算、係数あり/なし）
function gen2Term() {
  const radPool  = [2,3,5,6,7,10];
  const cPool    = [1,1,1,2,3,4,5]; // 1を重めに

  for (let att = 0; att < 400; att++) {
    const c1 = pick(cPool), r1 = pick(radPool);
    const c2 = pick(cPool), r2 = pick(radPool);
    const op = Math.random() < 0.55 ? '×' : '÷';
    const t1 = termLatex(c1, r1);
    const t2 = termLatex(c2, r2);

    if (op === '×') {
      const radProd = r1 * r2;
      if (radProd > 300) continue;
      const {c, r} = simpRad(radProd);
      const ac = c1 * c2 * c, ar = r;
      if (ac > 60 || ar > 30) continue;
      return { type:'coeff', c1,r1,c2,r2,
        totalCoeff: c1*c2, totalRad: radProd, ac, ar,
        latex: `${t1} \\times ${t2}` };

    } else { // ÷
      if (r1 === r2) continue; // 全く同じは単純すぎ
      if (r1 % r2 === 0) {
        // 割り切れる割り算 c1√r1 ÷ c2√r2
        const radQ = r1 / r2;
        const {c:rc, r:rr} = simpRad(radQ);
        // 係数：c1÷c2。整数になる場合のみ
        const g = gcdFn(c1, c2);
        const cNum = c1/g, cDen = c2/g;
        if (cDen !== 1) continue;
        const ac = cNum * rc, ar = rr;
        if (ac > 30 || ar > 30) continue;
        return { type:'div_coeff', c1,r1,c2,r2, ac, ar,
          latex: `${t1} \\div ${t2}` };
      } else {
        // 有理化が必要: c1√r1 ÷ c2√r2 = (c1√(r1r2)) / (c2·r2)
        const radProd = r1 * r2;
        if (radProd > 200) continue;
        const {c:rc, r:rr} = simpRad(radProd);
        // 分子: c1·rc√rr  分母: c2·r2
        const numC = c1 * rc;
        const denC = c2 * r2;
        const g = gcdFn(numC, denC);
        const nc = numC/g, dn = denC/g;
        if (dn <= 1 || rr > 50 || nc > 20 || dn > 20) continue;
        return { type:'div_rat_coeff', c1,r1,c2,r2, nc, nr:rr, den:dn,
          probLatex: `${t1} \\div ${t2}`,
          key: `${nc}|${rr}|${dn}` };
      }
    }
  }
  return genMultiplication2();
}

// 3〜4項 統合ジェネレーター（係数あり/なし、乗除混合・有理化対応）
function genMultiTermFull(numTerms) {
  const radPool = [2,3,5,6,7];
  const cPool   = [1,1,1,2,3,4,5];

  for (let att = 0; att < 300; att++) {
    const nums   = Array.from({length:numTerms}, () => pick(radPool));
    const coeffs = Array.from({length:numTerms}, () => pick(cPool));
    if (!coeffs.some(c=>c>1)) coeffs[Math.floor(Math.random()*numTerms)] = pick([2,3,4,5]);

    const ops = [];
    let radNumer = nums[0];
    let radDenom = 1;
    let cNumer   = coeffs[0];
    let valid    = true;

    for (let i = 1; i < numTerms; i++) {
      const n = nums[i];
      const doDiv = Math.random() < 0.45;
      if (doDiv) {
        ops.push('÷');
        coeffs[i] = 1; // 割り算の項は係数なし
        radDenom *= n;
      } else {
        ops.push('×');
        radNumer *= n;
        cNumer   *= coeffs[i];
      }
      if (radNumer > 400 || cNumer > 60) { valid = false; break; }
    }
    if (!valid) continue;

    const latex = nums.map((n,i) =>
      (i===0?'':(ops[i-1]==='÷'?' \\div ':' \\times ')) + termLatex(coeffs[i], n)
    ).join('');

    if (radDenom === 1 || radNumer % radDenom === 0) {
      // 割り切れる（または割り算なし）
      const radQ = radDenom > 1 ? radNumer / radDenom : radNumer;
      const {c, r} = simpRad(radQ);
      const ac = cNumer * c;
      if (ac > 60 || r > 30) continue;
      return { type:'coeff_multi', nums, coeffs, ops, radProd:radQ, cProd:cNumer, ac, ar:r, latex };
    } else {
      // 有理化が必要
      const radProd = radNumer * radDenom;
      if (radProd > 400) continue;
      const {c, r} = simpRad(radProd);
      const numC = cNumer * c;
      const g = gcdFn(numC, radDenom);
      const nc = numC / g, den = radDenom / g;
      if (den <= 1 || r > 50 || nc > 20 || den > 20) continue;
      return { type:'coeff_multi_rat', nums, coeffs, ops, nc, nr:r, den, latex, key:`${nc}|${r}|${den}` };
    }
  }
  return genMultiplication2();
}


// ===== 負の数（符号）対応ヘルパー =====
function signStr(sign){ return sign < 0 ? '-' : ''; }
function radLatexSigned(sign, c, r){ return signStr(sign) + radLatex(c, r); }
function rationLatexSigned(sign, nc, nr, den){ return signStr(sign) + rationLatex(nc, nr, den); }

function mdTermsOps(prob){
  if (prob.type==='coeff') return {terms:[{c:prob.c1,r:prob.r1},{c:prob.c2,r:prob.r2}], ops:['×']};
  if (prob.type==='div_coeff'||prob.type==='div_rat_coeff') return {terms:[{c:prob.c1,r:prob.r1},{c:prob.c2,r:prob.r2}], ops:['÷']};
  if (prob.coeffs && prob.nums) return {terms:prob.nums.map((n,i)=>({c:prob.coeffs[i],r:n})), ops:(prob.ops||[]).slice()};
  if (prob.nums && prob.ops) return {terms:prob.nums.map(n=>({c:1,r:n})), ops:prob.ops.slice()};
  return null;
}

function mdSignedQuestionLatex(prob, signs){
  const t = mdTermsOps(prob);
  if (!t) return prob.latex || prob.probLatex || '';
  let s = '';
  t.terms.forEach((term,i)=>{
    const base = termLatex(term.c, term.r);
    if (i===0){ s += (signs[i]<0 ? '-'+base : base); }
    else {
      const opL = t.ops[i-1]==='÷' ? ' \\div ' : ' \\times ';
      s += opL + (signs[i]<0 ? '\\left(-'+base+'\\right)' : base);
    }
  });
  return s;
}

function mdApplySigns(prob){
  if (!prob) return prob;
  const t = mdTermsOps(prob);
  const n = t ? t.terms.length : 0;
  let signs = new Array(Math.max(n,1)).fill(1);
  if (n>0 && Math.random() < 0.75){
    for (let k=0;k<25;k++){
      signs = Array.from({length:n}, ()=> Math.random()<0.5 ? -1 : 1);
      if (signs.some(s=>s<0)) break;
    }
    if (!signs.some(s=>s<0)) signs[0] = -1;
  }
  prob._signs = signs;
  prob._resultSign = signs.reduce((a,b)=>a*b, 1);
  prob._signedQuestionLatex = mdSignedQuestionLatex(prob, signs);
  return prob;
}

function mdSignedAnswerLatex(prob){
  const rs = prob._resultSign || 1;
  if (['div_rat_coeff','div_rationalize','rationalize','coeff_multi_rat'].includes(prob.type))
    return rationLatexSigned(rs, prob.nc, prob.nr, prob.den);
  return radLatexSigned(rs, prob.ac, prob.ar);
}

function mdSignWrongs(wrongs, correctKey){
  const seen = new Set([correctKey]);
  const out = [];
  for (const w of wrongs){
    let sg = Math.random()<0.5 ? -1 : 1;
    let key = (sg<0?'-':'') + w.key;
    if (seen.has(key)){ sg = -sg; key = (sg<0?'-':'') + w.key; }
    if (seen.has(key)) continue;
    seen.add(key);
    out.push({ latex:(sg<0?'-':'')+w.latex, key, correct:false });
  }
  return out;
}

// ===== 乗除「分数」：分母/分子に√を含む乗除（有理化して簡約） =====
function _mdFracBuild(probLatex, midLatex, Knum, Kden, R){
  const rterm=(co,ra)=> ra===1 ? String(co) : (co===1?`\\sqrt{${ra}}`:`${co}\\sqrt{${ra}}`);
  const frac=(co,ra,d)=> d===1 ? rterm(co,ra) : `\\dfrac{${rterm(co,ra)}}{${d}}`;
  const {c:g, r:rr} = simpRad(R);
  let p=Knum*g, q=Kden; const gg=gcdFn(p,q); p/=gg; q/=gg;
  const ansLatex = frac(p, rr, q);
  const combined = frac(Knum, R, Kden);
  const steps=[`${probLatex} = ${midLatex}`];
  if(midLatex!==combined) steps.push(`= ${combined}`);
  if(g>1){ const simp=frac(Knum*g, rr, Kden); if(simp!==combined) steps.push(`= ${simp}`); }
  if(steps[steps.length-1].replace(/^.*?=\s*/,'')!==ansLatex) steps.push(`= ${ansLatex}`);
  const okClean = (q===1 && rr<=30 && p<=40 && p>=1);
  const okFrac  = (q>1 && q<=9 && p<=20 && rr>1 && rr<=30);
  let prob;
  if(q===1) prob={type:'coeff',_frac:true,_resultSign:1,ac:p,ar:rr,latex:probLatex};
  else prob={type:'div_rat_coeff',_frac:true,_resultSign:1,nc:p,nr:rr,den:q,key:`${p}|${rr}|${q}`,latex:probLatex};
  prob.fracSteps=steps; prob._fracAns=ansLatex; prob._ok=(okClean||okFrac);
  return prob;
}
function genMDFrac(){
  const rp=[2,3,5,6,7], bp=[2,3,5,6], cp=[2,3,4];
  for(let att=0; att<500; att++){
    const t=pick([1,1,2,3]); let prob;
    if(t===1){ // (a/√b) × √c
      const a=pick([2,3,4,5,6]), b=pick(bp), c=pick(rp); if(b===c) continue;
      const mid=`\\dfrac{${a}\\sqrt{${c}}}{\\sqrt{${b}}}`;
      prob=_mdFracBuild(`\\dfrac{${a}}{\\sqrt{${b}}} \\times \\sqrt{${c}}`, mid, a, b, b*c);
    } else if(t===2){ // √a ÷ (b/√c)
      const a=pick(rp), b=pick(cp), c=pick(bp);
      const mid=`\\sqrt{${a}} \\times \\dfrac{\\sqrt{${c}}}{${b}}`;
      prob=_mdFracBuild(`\\sqrt{${a}} \\div \\dfrac{${b}}{\\sqrt{${c}}}`, mid, 1, b, a*c);
    } else { // (√a/b) × √c
      const a=pick(rp), b=pick(cp), c=pick(rp); if(a===c && b===1) continue;
      const mid=`\\dfrac{\\sqrt{${a}}\\times\\sqrt{${c}}}{${b}}`;
      prob=_mdFracBuild(`\\dfrac{\\sqrt{${a}}}{${b}} \\times \\sqrt{${c}}`, mid, 1, b, a*c);
    }
    if(prob && prob._ok) return prob;
  }
  return gen2Term();
}

function genMDFracMulti(N){
  const rp=[2,3,5,6,7], frb=[2,3,5,6];
  for(let att=0; att<700; att++){
    let coeffNum=1, Rnum=1, Rden=1, fracCount=0; const parts=[];
    for(let i=0;i<N;i++){
      const isFrac = (i===N-1 && fracCount===0) ? true : (Math.random()<0.5);
      if(isFrac){
        fracCount++;
        const k=pick([1,1,2,2,3]), m=pick(frb);
        coeffNum*=k; Rden*=m;
        parts.push(k===1?'\\dfrac{1}{\\sqrt{'+m+'}}':'\\dfrac{'+k+'}{\\sqrt{'+m+'}}');
      } else {
        const cc=pick([1,1,1,2]), r=pick(rp);
        coeffNum*=cc; Rnum*=r;
        parts.push(cc===1?'\\sqrt{'+r+'}':cc+'\\sqrt{'+r+'}');
      }
    }
    if(fracCount===0) continue;
    const numTex = Rnum===1 ? String(coeffNum) : (coeffNum===1?'\\sqrt{'+Rnum+'}':coeffNum+'\\sqrt{'+Rnum+'}');
    const mid = '\\dfrac{'+numTex+'}{\\sqrt{'+Rden+'}}';
    const prob = _mdFracBuild(parts.join(' \\times '), mid, coeffNum, Rden, Rnum*Rden);
    if(prob && prob._ok) return prob;
  }
  return genMDFrac();
}

function genMDProblem(numTerms) {
  const p = (numTerms === 2) ? gen2Term() : genMultiTermFull(numTerms);
  return mdApplySigns(p);
}

// ===== 共通：選択肢ビルダー（乗除・加減・公式すべて対応） =====
function buildOptsFor(prob){
  if (prob.type === 'adv'){
    const fw = advWrongs(prob.ans).slice(0,3);
    const o = [{latex: reLatex(prob.ans), key: prob.key, correct:true}, ...fw.map(w=>({latex:w.latex, key:w.key, correct:false}))];
    o.sort(()=>Math.random()-0.5);
    return o;
  }
  let opts;
  if (prob.type === 'formula'){
    const fw = formulaWrongs(prob);
    opts = [{latex: binLatex(prob.p, prob.q, prob.m), key: prob.key, correct:true}, ...fw.map(w=>({...w, correct:false}))];
  } else {
    const rs = prob._resultSign || 1;
    const isRat = ['rationalize','div_rationalize','div_rat_coeff','coeff_multi_rat'].includes(prob.type);
    let baseKey, correctLatex, oppLatex, wrongsRaw;
    if (isRat){
      baseKey = prob.key || `${prob.nc}|${prob.nr}|${prob.den}`;
      correctLatex = rationLatexSigned(rs, prob.nc, prob.nr, prob.den);
      oppLatex = rationLatexSigned(-rs, prob.nc, prob.nr, prob.den);
      wrongsRaw = rationWrongAnswers(prob.nc, prob.nr, prob.den, prob.c1 || 1, prob.r2 || prob.den || 2);
    } else {
      baseKey = `${prob.ac}|${prob.ar}`;
      correctLatex = radLatexSigned(rs, prob.ac, prob.ar);
      oppLatex = radLatexSigned(-rs, prob.ac, prob.ar);
      wrongsRaw = (prob.type === 'addsub') ? asWrongAnswers(prob.ac, prob.ar, prob) : mdWrongAnswers(prob.ac, prob.ar);
    }
    const correctKey = signStr(rs) + baseKey;
    const correct = {latex: correctLatex, key: correctKey, correct:true};
    const strong  = {latex: oppLatex, key: signStr(-rs)+baseKey, correct:false};
    const signedWrongs = mdSignWrongs(wrongsRaw, correctKey);
    const combo = [strong, ...signedWrongs].filter((o,i,a)=>a.findIndex(x=>x.key===o.key)===i && o.key!==correctKey).slice(0,5);
    opts = [correct, ...combo];
  }
  opts.sort(()=>Math.random()-0.5);
  return opts;
}

// ===== 共通：解説ビルダー =====
function formulaExpBody(prob){
  return prob.steps.map(s=>`<div style="margin-bottom:6px;">${K(s)}</div>`).join('')
    + `<div style="font-size:12px;color:#64748b;margin-top:4px;">答え：${K(binLatex(prob.p, prob.q, prob.m))}</div>`;
}
function asExpBody(prob){
  let expLines = '';
  const hasSimpNeeded = prob.terms.some(t=>t.sq>1);
  if (hasSimpNeeded) {
    const simpSteps = prob.terms.filter(t=>t.sq>1).map(t=>{
      const disp = t.a===1?`\\sqrt{${t.dispRad}}`:`${t.a}\\sqrt{${t.dispRad}}`;
      const simp = t.simpCoeff===1?`\\sqrt{${t.r}}`:`${t.simpCoeff}\\sqrt{${t.r}}`;
      return K(`${disp} = ${simp}`);
    }).join('　');
    expLines += `<div style="margin-bottom:6px;">${simpSteps}</div>`;
  }
  const addStep = prob.terms.map((t,i)=>{
    const c = t.simpCoeff===1?`\\sqrt{${t.r}}`:`${t.simpCoeff}\\sqrt{${t.r}}`;
    if (i===0) return (t.lead<0?'-':'') + c;
    return ` ${t.op} ` + c;
  }).join('') + ' = ' + mdSignedAnswerLatex(prob);
  expLines += `<div>${K(addStep)}</div>`;
  return expLines;
}
function mdExpBody(prob){
  if(prob._frac){
    return prob.fracSteps.map(s=>`<div style="margin-bottom:6px;">${K(s)}</div>`).join('')
      + `<div style="font-size:12px;color:#64748b;margin-top:4px;">答え：${K(prob._fracAns)}</div>`;
  }
  let expHtml = '';
  if (prob.type === 'div_rat_coeff' || prob.type === 'div_rationalize') {
    const t1 = termLatex(prob.c1||1, prob.r1||prob.a||1);
    const t2 = termLatex(prob.c2||1, prob.r2||prob.b||2);
    const ab = (prob.r1||prob.a) * (prob.r2||prob.b);
    const step1 = K(`${t1} \\div ${t2} = \\dfrac{${t1}}{${t2}} = \\dfrac{${t1} \\times ${termLatex(1,prob.r2||prob.b)}}{${t2} \\times ${termLatex(1,prob.r2||prob.b)}} = \\dfrac{${(prob.c1||1)===1?`\\sqrt{${ab}}`:`${prob.c1||1}\\sqrt{${ab}}`}}{${(prob.c2||1) * (prob.r2||prob.b)}}`);
    const finalL = mdSignedAnswerLatex(prob);
    expHtml = `<div style="margin-bottom:8px;">${step1}</div>`
      + `<div style="margin-bottom:4px;">${K(`= ${finalL}`)}</div>`
      + `<div style="font-size:12px;color:#64748b;margin-top:4px;">分母の根号を消すため分子・分母に${K(`\\sqrt{${prob.r2||prob.b}}`)}をかけて有理化</div>`;
  } else if (prob.type === 'div_coeff') {
    const t1 = termLatex(prob.c1, prob.r1);
    const t2 = termLatex(prob.c2, prob.r2);
    const step1 = K(`${t1} \\div ${t2} = \\dfrac{${prob.c1}}{${prob.c2}} \\times \\sqrt{\\dfrac{${prob.r1}}{${prob.r2}}} = ${prob.c1/prob.c2===1?'':prob.c1/gcdFn(prob.c1,prob.c2)}\\sqrt{${prob.r1/prob.r2}}`);
    expHtml = `<div style="margin-bottom:8px;">${step1}</div>`
      + (prob.ac > 1 && prob.ar !== prob.r1/prob.r2 ? `<div style="margin-bottom:4px;">${K(`= ${radLatex(prob.ac,prob.ar)}`)}</div>` : '')
      + `<div style="font-size:12px;color:#64748b;margin-top:4px;">答え：${K(mdSignedAnswerLatex(prob))}</div>`;
  } else if (prob.type === 'rationalize') {
    const numStr = prob.a===1 ? `\\sqrt{${prob.b}}` : `${prob.a}\\sqrt{${prob.b}}`;
    const step1 = `\\dfrac{${prob.a===1?1:prob.a}}{\\sqrt{${prob.b}}} = \\dfrac{${prob.a===1?1:prob.a} \\times \\sqrt{${prob.b}}}{\\sqrt{${prob.b}} \\times \\sqrt{${prob.b}}} = \\dfrac{${numStr}}{${prob.b}}`;
    const finalL = mdSignedAnswerLatex(prob);
    const step2 = prob.den < prob.b ? `\\dfrac{${numStr}}{${prob.b}} = ${finalL}` : '';
    expHtml = `<div style="margin-bottom:8px;">${K(step1)}</div>`
      + (step2 ? `<div style="margin-bottom:4px;">${K(step2)}</div>` : '')
      + `<div style="font-size:12px;color:#64748b;margin-top:4px;">分母・分子に${K(`\\sqrt{${prob.b}}`)}をかけて有理化</div>`;
  } else {
    let step1Html, step2Html = '';
    if (prob.type === 'coeff') {
      const _c1 = prob.c1 ?? prob.a1 ?? 1;
      const _r1 = prob.r1;
      const _c2 = prob.c2 ?? prob.a2 ?? 1;
      const _r2 = prob.r2;
      const mid = K(`${termLatex(_c1,_r1)} \\times ${termLatex(_c2,_r2)} = (${_c1}\\times${_c2})\\sqrt{${_r1}\\times${_r2}} = ${prob.totalCoeff}\\sqrt{${prob.totalRad}}`);
      step1Html = `<div style="margin-bottom:8px;">${mid}</div>`;
      if (prob.ac !== prob.totalCoeff || prob.ar !== prob.totalRad) {
        const {c: sc, r: sr} = simpRad(prob.totalRad);
        step2Html = sr === 1
          ? K(`${prob.totalCoeff}\\sqrt{${prob.totalRad}} = ${prob.totalCoeff} \\times ${sc} = ${prob.ac}`)
          : K(`${prob.totalCoeff}\\sqrt{${prob.totalRad}} = ${prob.totalCoeff} \\times ${sc}\\sqrt{${sr}} = ${prob.ac}\\sqrt{${prob.ar}}`);
      }
    } else if (prob.type === 'coeff_multi_rat') {
      step1Html = `<div style="margin-bottom:8px;">${K((prob._signedQuestionLatex||prob.latex) + ' = ' + mdSignedAnswerLatex(prob))}</div>`;
      expHtml = step1Html + `<div style="font-size:12px;color:#64748b;margin-top:4px;">答え：${K(mdSignedAnswerLatex(prob))}</div>`;
    } else if (prob.type === 'coeff_multi') {
      const exprStr = prob.nums.map((n,i) =>
        (i===0?'':((prob.ops||[])[i-1]==='÷'?' \\div ':' \\times ')) + termLatex(prob.coeffs[i], n)
      ).join('');
      step1Html = `<div style="margin-bottom:8px;">${K(`${exprStr} = ${prob.cProd}\\sqrt{${prob.radProd}}`)}</div>`;
      if (prob.ac !== prob.cProd || prob.ar !== prob.radProd) {
        const {c: sc, r: sr} = simpRad(prob.radProd);
        step2Html = sr === 1
          ? K(`${prob.cProd}\\sqrt{${prob.radProd}} = ${prob.cProd} \\times ${sc} = ${prob.ac}`)
          : K(`${prob.cProd}\\sqrt{${prob.radProd}} = ${prob.cProd} \\times ${sc}\\sqrt{${sr}} = ${prob.ac}\\sqrt{${prob.ar}}`);
      }
    } else {
      const steps = prob.nums.map((n,i) => (i===0?'':(prob.ops[i-1]==='÷'?' \\div ':' \\times '))+`\\sqrt{${n}}`).join('');
      step1Html = `<div style="margin-bottom:8px;">${K(`${steps} = \\sqrt{${prob.product}}`)}</div>`;
      if (prob.ac > 1) {
        const c2 = prob.ac * prob.ac;
        step2Html = prob.ar === 1
          ? K(`\\sqrt{${prob.product}} = \\sqrt{${prob.ac}^2} = ${prob.ac}`)
          : K(`\\sqrt{${prob.product}} = \\sqrt{${c2} \\times ${prob.ar}} = \\sqrt{${prob.ac}^2 \\times ${prob.ar}} = ${prob.ac}\\sqrt{${prob.ar}}`);
      }
    }
    const finalAns = K(mdSignedAnswerLatex(prob));
    expHtml = step1Html
      + (step2Html ? `<div style="margin-bottom:4px;">${step2Html}</div>` : '')
      + `<div style="font-size:12px;color:#64748b;margin-top:4px;">答え：${finalAns}</div>`;
  }
  const _hasNeg = prob._signs && prob._signs.some(s=>s<0);
  const _negCount = prob._signs ? prob._signs.filter(s=>s<0).length : 0;
  const _banner = _hasNeg ? `<div style="margin-bottom:8px;">${K((prob._signedQuestionLatex||'') + ' = \\,?')}</div>` : '';

// ====== ADDSUB MODE ======
let asTerms = 2;
let asFrac = false;
let asCurrentQ = 0;
let asCorrect = 0;
let asWrong = 0;
const AS_TOTAL = 10;

function genAddSubProblem(numTerms) {
  const baseRads = [2,3,5,7];
  const sqFactors = [1,1,1,4,9]; // 1=すでに簡略、4=2²、9=3²
  const coeffs = [1,1,2,3];

  for (let att = 0; att < 200; att++) {
    const r = pick(baseRads);
    const terms = [];
    let total = 0;

    for (let i = 0; i < numTerms; i++) {
      const sq = pick(sqFactors);
      const k = Math.sqrt(sq); // simplification factor
      const a = sq > 1 ? 1 : pick(coeffs); // 簡略化が必要な項は係数なし
      const dispRad = sq === 1 ? r : sq * r;
      const simpCoeff = a * k;  // coefficient after simplification
      const lead = i === 0 ? (Math.random() < 0.4 ? -1 : 1) : 1; // 先頭項に負を許可
      const op = i === 0 ? '' : (Math.random() < 0.5 ? '+' : '-');
      if (i === 0) total = lead * simpCoeff;
      else if (op === '+') total += simpCoeff;
      else total -= simpCoeff;
      terms.push({ op, lead, a, dispRad, simpCoeff, sq, k, r });
    }

    if (total === 0) continue; // 答えが0は除外（負はOK）

    // 打ち消し合う項ペアを除外（例: +2√3 と -2√3）。全項同じ√rなので
    // 符号付きの係数が +v と -v で揃うと実質項数が減って簡単になる。
    const signed = terms.map((t, i) =>
      i === 0 ? t.lead * t.simpCoeff : (t.op === '+' ? t.simpCoeff : -t.simpCoeff)
    );
    let hasCancelPair = false;
    for (let x = 0; x < signed.length && !hasCancelPair; x++) {
      for (let y = x + 1; y < signed.length; y++) {
        if (signed[x] + signed[y] === 0) { hasCancelPair = true; break; }
      }
    }
    if (hasCancelPair) continue;

    // 見た目が同じ項（＝簡略化前の形が一致する同値項）を除外（例: 2√3 + 2√3、√12 + √12）。
    // ただし「簡略化前(√12)」と「簡略化後(2√3)」のように表示形が違えば同値でもOK
    // （それが加減算で係数をそろえる練習そのものなので）。
    const shapes = terms.map(t => t.a + '_' + t.dispRad);
    if (new Set(shapes).size !== shapes.length) continue;

    // 少なくとも1項が簡略化必要（なければ確率50%でリトライ）
    const hasSimpNeeded = terms.some(t => t.sq > 1);
    if (!hasSimpNeeded && Math.random() < 0.5) continue;

    // LaTeX表示
    const latex = terms.map((t, i) => {
      const base = t.a === 1 ? `\\sqrt{${t.dispRad}}` : `${t.a}\\sqrt{${t.dispRad}}`;
      if (i === 0) return (t.lead < 0 ? '-' : '') + base;
      return ` ${t.op} ` + base;
    }).join('');

    return { type:'addsub', terms, r, total, ac:Math.abs(total), ar:r, _resultSign: total < 0 ? -1 : 1, latex };
  }
  return null;
}

function asWrongAnswers(ac, ar, prob) {
  const seen = new Set([`${ac}|${ar}`]);
  const priority = []; // 必ず入れたい間違い（計算ミス系）
  const others  = []; // 補充用

  const pushTo = (arr, c, r) => {
    if (c>0 && r>0) {
      const k=`${c}|${r}`;
      if (!seen.has(k)) { seen.add(k); arr.push({latex:radLatex(c,r), key:k}); }
    }
  };

  // ★ 優先：根号の中を符号通りに計算した間違い（例: √18-√8 → √10, √5+√20 → √25 or 5）
  if (prob) {
    let wrongRad = prob.terms[0].dispRad;
    for (let i=1; i<prob.terms.length; i++) {
      wrongRad = prob.terms[i].op==='+' ? wrongRad+prob.terms[i].dispRad : wrongRad-prob.terms[i].dispRad;
    }
    if (wrongRad > 0) {
      pushTo(priority, 1, wrongRad);           // √30 など（根号の中だけ足し引き）
      const {c,r}=simpRad(wrongRad);
      pushTo(priority, c, r);                  // 簡略化後
      // 係数をそのまま使って根号の中を足すミス（例: 3√3+√27 → 3√30, 4√30）
      const sumCoeff = prob.terms.reduce((s,t)=>s+t.a, 0);
      pushTo(priority, sumCoeff, wrongRad);    // 4√30
      pushTo(priority, prob.terms[0].a, wrongRad); // 3√30
    }
    // 係数の合計だけを係数にした間違い
    const sumCoeff = prob.terms.reduce((s,t)=>s+t.a, 0);
    pushTo(priority, sumCoeff, ar);
    // ★ 係数を掛けてしまうミス（例: 2√3+3√3 → 6√3）
    const prodCoeff = prob.terms.reduce((s,t)=>s*t.a, 1);
    pushTo(priority, prodCoeff, ar);
    // ★ 係数を掛けて根号の中も掛けるミス（例: 2√3+3√3 → 6√9=18）
    const prodRad = prob.terms.reduce((s,t)=>s*t.dispRad, 1);
    const {c:pc,r:pr}=simpRad(prodRad);
    pushTo(priority, prodCoeff*pc, pr);
    // 一部しか簡略化しない
    if (prob.terms.length>=2) {
      pushTo(priority, prob.terms[0].simpCoeff, ar);
      pushTo(priority, prob.terms[0].simpCoeff + prob.terms[1].a, ar);
    }
  }

  // 補充：係数違い・根号違い
  for (let d=-4;d<=6;d++) { if(d!==0) pushTo(others, ac+d, ar); }
  for (const nr of [2,3,5,6,7]) {
    if (nr!==ar) { pushTo(others,ac,nr); pushTo(others,ac+1,nr); pushTo(others,Math.max(1,ac-1),nr); }
  }
  for (const n of [2,3,5,6,7,10,12,14,15]) { const {c,r}=simpRad(n); pushTo(others,c,r); }

  // priority を先に並べ、残りを others からシャッフルして補充
  priority.sort(()=>Math.random()-0.5);
  others.sort(()=>Math.random()-0.5);
  const res = [...priority, ...others].slice(0, 5);
  while (res.length<5) res.push({latex:radLatex(res.length+2, ar), key:`x${res.length}`});
  return res;
}

// ===== 乗法公式（中3：平方根の展開） =====
function fRoot(n){ return '\\sqrt{'+n+'}'; }
function binLatex(p, q, m){
  if (q === 0) return String(p);
  const rad = (Math.abs(q)===1 ? '' : Math.abs(q)) + `\\sqrt{${m}}`;
  if (p === 0) return (q<0?'-':'') + rad;
  return `${p} ${q<0?'-':'+'} ${rad}`;
}
function genFormulaProblem(){
  const rads=[2,3,5,6,7], ints=[1,2,3,4];
  for(let att=0;att<200;att++){
    const kind=pick(['diffprod_rr','diffprod_ri','square_rr','square_ri','xab']);
    let qLatex,p,q,m,steps,altSum=0,dm=1,dq=0;
    if(kind==='diffprod_rr'){
      const A=pick(rads),B=pick(rads); if(A===B)continue;
      p=A-B;q=0;m=1; altSum=A+B; const cr=simpRad(A*B); dm=cr.r; dq=2*cr.c;
      qLatex=`(${fRoot(A)}+${fRoot(B)})(${fRoot(A)}-${fRoot(B)})`;
      steps=[`(${fRoot(A)})^2 - (${fRoot(B)})^2`, `= ${A} - ${B} = ${A-B}`];
    } else if(kind==='diffprod_ri'){
      const A=pick(rads),b=pick(ints); if(b*b===A)continue;
      p=A-b*b;q=0;m=1; altSum=A+b*b; dm=A; dq=2*b;
      qLatex=`(${fRoot(A)}+${b})(${fRoot(A)}-${b})`;
      steps=[`(${fRoot(A)})^2 - ${b}^2`, `= ${A} - ${b*b} = ${A-b*b}`];
    } else if(kind==='square_rr'){
      const A=pick(rads),B=pick(rads); if(A===B)continue;
      const minus=Math.random()<0.5,sg=minus?-1:1; const cr=simpRad(A*B);
      let pp=A+B,qq=2*cr.c*sg,mm=cr.r; if(mm===1){pp+=qq;qq=0;}
      p=pp;q=qq;m=mm;
      qLatex=`(${fRoot(A)}${minus?'-':'+'}${fRoot(B)})^2`;
      steps=[`(${fRoot(A)})^2 ${minus?'-':'+'} 2\\cdot${fRoot(A)}\\cdot${fRoot(B)} + (${fRoot(B)})^2`,
             `= ${A} ${minus?'-':'+'} 2${fRoot(A*B)} + ${B}`, `= ${binLatex(pp,qq,mm)}`];
    } else if(kind==='square_ri'){
      const A=pick(rads),b=pick(ints); const minus=Math.random()<0.5,sg=minus?-1:1;
      const pp=A+b*b,qq=2*b*sg,mm=A; p=pp;q=qq;m=mm;
      qLatex=`(${fRoot(A)}${minus?'-':'+'}${b})^2`;
      steps=[`(${fRoot(A)})^2 ${minus?'-':'+'} 2\\cdot${b}\\cdot${fRoot(A)} + ${b}^2`,
             `= ${A} ${minus?'-':'+'} ${2*b}${fRoot(A)} + ${b*b}`, `= ${binLatex(pp,qq,mm)}`];
    } else {
      const A=pick(rads),b=pick(ints),c=pick(ints);
      const pp=A+b*c,qq=b+c,mm=A; p=pp;q=qq;m=mm;
      qLatex=`(${fRoot(A)}+${b})(${fRoot(A)}+${c})`;
      steps=[`(${fRoot(A)})^2 + (${b}+${c})${fRoot(A)} + ${b}\\times${c}`,
             `= ${A} + ${b+c}${fRoot(A)} + ${b*c}`, `= ${binLatex(pp,qq,mm)}`];
    }
    if(Math.abs(p)>60||Math.abs(q)>20)continue;
    const key=`${p}|${q}|${q===0?1:m}`;
    return {type:'formula',kind,qLatex,latex:qLatex,p,q,m,key,steps,altSum,dm,dq};
  }
  return null;
}
function formulaWrongs(prob){
  const {p,q,m,key}=prob;
  const seen=new Set([key]); const out=[];
  const push=(P,Q,M)=>{
    const MM=(Q===0)?1:M;
    if(Math.abs(P)>99||Math.abs(Q)>30) return;
    const k=`${P}|${Q}|${MM}`;
    if(seen.has(k)) return; seen.add(k);
    out.push({latex:binLatex(P,Q,MM),key:k});
  };
  if(q!==0){
    push(p,-q,m); push(p,0,m);
    push(p,q+1,m); push(p,q-1,m); push(p,q+2,m); push(p,q-2,m);
    push(p+1,q,m); push(p-1,q,m); push(p+2,q,m); push(p-2,q,m);
  } else {
    push(-p,0,1); push(prob.altSum,0,1);
    push(p,prob.dq,prob.dm); push(prob.altSum,prob.dq,prob.dm);
    push(p+1,0,1); push(p-1,0,1); push(p+2,0,1); push(p-2,0,1); push(p+3,0,1);
  }
  out.sort(()=>Math.random()-0.5);
  const res=out.slice(0,5);
  let g=2; while(res.length<5){ const k='g'+g; if(!seen.has(k)){seen.add(k);res.push({latex:binLatex(p+g,q,(q===0?1:m)),key:k});} g++; }
  return res;
}

// 加減算「分数」用：単純項 or 分数項（どちらも c√r に簡約）
function mixTermSF(r){
  if(Math.random()<0.5){
    const coeff=pick([1,2,2,3,4]),k=pick([1,1,1,2]),d=k*k*r,a=coeff*k*r;
    if(a<=99&&a!==d) return {coeff,display:`\\dfrac{${a}}{\\sqrt{${d}}}`,simp:coeff===1?`\\sqrt{${r}}`:`${coeff}\\sqrt{${r}}`,needSimp:true,isFrac:true};
  }
  const k=pick([1,2,2,3]),sq=k*k,a=pick([1,1,2,3]),coeff=a*k;
  return {coeff,display:a===1?`\\sqrt{${sq*r}}`:`${a}\\sqrt{${sq*r}}`,simp:coeff===1?`\\sqrt{${r}}`:`${coeff}\\sqrt{${r}}`,needSimp:sq>1,isFrac:false};
}
function genAddSubFracProblem(N){
  for(let att=0;att<200;att++){
    const r=pick(RADS_MIX);
    const terms=[]; for(let i=0;i<N;i++) terms.push(mixTermSF(r));
    if(!terms.some(t=>t.isFrac)) continue;
    const signs=terms.map((u,i)=> i===0?(Math.random()<0.35?-1:1):(Math.random()<0.5?1:-1));
    const total=terms.reduce((s,u,i)=>s+signs[i]*u.coeff,0); if(total===0||Math.abs(total)>30) continue;
    const latex=terms.map((u,i)=> i===0?(signs[0]<0?'-':'')+u.display:(signs[i]<0?' - ':' + ')+u.display).join('');

function renderASQuestion() {
  const _asTotal = _asRetryQueue !== null ? _asRetryTotal : AS_TOTAL;
  if (asCurrentQ >= _asTotal) { renderASResult(); return; }
  document.getElementById('q-count').textContent = Math.min(asCurrentQ+1,AS_TOTAL);
  document.getElementById('score-correct').textContent = asCorrect;
  document.getElementById('score-wrong').textContent = asWrong;
  document.getElementById('progress-fill').style.width = (asCurrentQ/AS_TOTAL*100)+'%';

  let prob = null;
  if (_asRetryQueue && _asRetryQueue.length > 0) {
    prob = _asRetryQueue.shift();
  } else {
    const _asN = asTerms === 0 ? pick([2,3,4]) : asTerms;
    if (asFrac) { for (let i=0; i<60; i++) { prob=genAddSubFracProblem(_asN); if(prob) break; } }
    else { for (let i=0; i<30; i++) { prob=genAddSubProblem(_asN); if(prob) break; } }
  }
  if (!prob) { asCurrentQ++; renderASQuestion(); return; }

  const opts = buildOptsFor(prob);

  const optBtns = opts.map((o,i)=>`
    <button class="muldiv-opt" id="asopt-${i}" data-idx="${i}">${K(o.latex)}</button>`).join('');

  document.getElementById('quiz-area').innerHTML = `
    <div class="muldiv-problem">
      <button class="card-reset-btn" id="card-reset-btn">↩ 最初へ</button>

const MIX_TOTAL = 10;

function reAdd(e,rad,coeff){ if(coeff===0)return; const s=simpRad(rad); e[s.r]=(e[s.r]||0)+coeff*s.c; if(e[s.r]===0)delete e[s.r]; }

function genT3(){ const a=pick([2,3,5]); let c=pick([2,3,5,7]); while(c===a)c=pick([2,3,5,7]); const k=pick([1,2,3,4]);
  const m=pick([1,2])*pick([1,-1]); const n=pick([1,2,3])*pick([1,-1]);
  const f1=[[1,a],[k,1],[m,c]], f2=[[1,a],[k,1],[n,c]];

// (√r + 整数) 型の二項式（例: √3 + 4）
function binomRI(){ const r=pick([2,3,5,6,7]); const s=pick([1,1,2])*pick([1,-1]); const b=pick([2,3,4,5])*pick([1,-1]); const terms=[[s,r],[b,1]]; return {terms, re:reFrom(terms), tex:paren(terms)}; }
// 展開結果 prod に係数を掛ける。整数[2,3]、または答えが整数に収まる分数(1/2,1/3,2/3)。
// 分数は「展開後の全係数の最大公約数」で割り切れるときだけ採用し、答えは必ず整数になる。
function applyCoef(prod){

  for(const d of [2,3]){ if(g%d===0){ for(const num of [1,2]){ if(num<d && gcdFn(num,d)===1) fracOpts.push([num,d]); } } }
  if(fracOpts.length && Math.random()<0.5){
    const [num,d]=pick(fracOpts); const ans={};

// 係数付きの乗法公式（発展）: 係数 ×（平方 / 和と差の積 / (x+a)(x+b)）

    prod=reMul(reFrom(t1),reFrom(t2)); body=`${paren(t1)}${paren(t2)}`;

    while(d===b) d=pick([1,2,3])*pick([1,-1]); // b=d は平方になるので避ける
    const t1=[[1,a],[b,1]],t2=[[1,a],[d,1]];
    prod=reMul(reFrom(t1),reFrom(t2)); body=`${paren(t1)}${paren(t2)}`;

function genAdv(){ for(let i=0;i<30;i++){ const g=pick([genT1,genT1,genT2,genT3,genT4,genT4])(); if(g&&Object.keys(g.ans).length>0) return {type:'adv',kind:g.kind,latex:g.tex,ans:g.ans,key:reKey(g.ans)}; }
  const g=genT1(); return {type:'adv',kind:'T1',latex:g.tex,ans:g.ans,key:reKey(g.ans)}; }
function advWrongs(ans){ const correctKey=reKey(ans); const seen=new Set([correctKey]); const out=[]; const ks=Object.keys(ans).map(Number);
  const push=(e)=>{ const k2=reKey(e); if(seen.has(k2))return; if(Object.keys(e).length===0)return; for(const k in e){ if(Math.abs(e[k])>140)return; } seen.add(k2); out.push({latex:reLatex(e),key:k2}); };
  for(const k of ks){ for(const d of [1,-1,2,-2]){ const e=reClone(ans); e[k]=(e[k]||0)+d; if(e[k]===0)delete e[k]; push(e); } { const e=reClone(ans); e[k]=-e[k]; push(e); } { const e=reClone(ans); delete e[k]; push(e); } }
  for(let i=out.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [out[i],out[j]]=[out[j],out[i]]; }
  const res=out.slice(0,5); let g=3; while(res.length<5){ const e=reClone(ans); const k0=ks[0]; e[k0]=(e[k0]||0)+g; const kk=reKey(e); if(!seen.has(kk)){ seen.add(kk); res.push({latex:reLatex(e),key:kk}); } g++; } return res; }
function advExpBody(prob){ return `<div style="margin-bottom:6px;">${K(prob.latex + ' = ' + reLatex(prob.ans))}</div>`
  + `<div style="font-size:12px;color:#64748b;margin-top:4px;">乗法公式で展開し、同じ根号どうしをまとめる（置き換えを使うと速い）</div>`; }

// ===== 四則混合（項数＝＋−で区切られた項。√2×√3 は1項。分数項あり） =====
function _isSq(n){ const s=Math.round(Math.sqrt(n)); return s*s===n; }
function _divisors(n){ const d=[]; for(let i=1;i*i<=n;i++){ if(n%i===0){ d.push(i); if(i!==n/i) d.push(n/i);} } return d; }
function _sqFree(n){ return simpRad(n).c===1; }
const RADS_MIX=[2,3,5,6,7,10];
function mixTerm(r){
  const types=['simple','simple','mult_coeff','frac','frac','mult_rad','div_rad'];
  for(let att=0;att<40;att++){
    const ty=pick(types);
    if(ty==='simple'){
      const k=pick([1,2,2,3]),sq=k*k,a=pick([1,1,2,3]),coeff=a*k;
      return {coeff,display:a===1?`\\sqrt{${sq*r}}`:`${a}\\sqrt{${sq*r}}`,simp:coeff===1?`\\sqrt{${r}}`:`${coeff}\\sqrt{${r}}`,needSimp:sq>1};
    }
    if(ty==='mult_coeff'){
      const k=pick([2,3]),sq=k*k,b=pick([2,3]),coeff=b*k;
      return {coeff,display:`\\sqrt{${sq*r}} \\times ${b}`,simp:`${coeff}\\sqrt{${r}}`,needSimp:true};
    }
    if(ty==='frac'){
      const coeff=pick([1,2,2,3,4]),k=pick([1,1,1,2]),d=k*k*r,a=coeff*k*r;
      if(a>99||a===d) continue;
      return {coeff,display:`\\dfrac{${a}}{\\sqrt{${d}}}`,simp:coeff===1?`\\sqrt{${r}}`:`${coeff}\\sqrt{${r}}`,needSimp:true};
    }
    if(ty==='mult_rad'){

function genMixCalcProblem(N){
  for(let att=0;att<200;att++){
    const r=pick(RADS_MIX);
    const terms=[]; for(let i=0;i<N;i++) terms.push(mixTerm(r));
    const signs=terms.map((u,i)=> i===0?(Math.random()<0.3?-1:1):(Math.random()<0.5?1:-1));
    const total=terms.reduce((s,u,i)=>s+signs[i]*u.coeff,0); if(total===0||Math.abs(total)>30) continue;
    const latex=terms.map((u,i)=> i===0?(signs[0]<0?'-':'')+u.display:(signs[i]<0?' - ':' + ')+u.display).join('');

function mixcalcExpBody(prob){
  const simps = prob.terms.map(t=> t.needSimp ? K(`${t.display} = ${t.simp}`) : null).filter(Boolean);
  let html = '';
  if (simps.length) html += `<div style="margin-bottom:6px;">${simps.join('　')}</div>`;
  const combined = prob.terms.map((t,i)=> i===0 ? (prob.signs[0]<0?'-':'')+t.simp : (prob.signs[i]<0?' - ':' + ')+t.simp).join('') + ' = ' + mdSignedAnswerLatex(prob);
  html += `<div>${K(combined)}</div>`;
  return html;
}

function genMixProblem(){
  if (mixKind === 'formula'){
    for(let i=0;i<40;i++){ const p=genFormulaProblem(); if(p) return p; }
    return genFormulaProblem();
  }
  if (mixKind === 'adv'){ for(let i=0;i<40;i++){ const p=genAdv(); if(p) return p; } return genAdv(); }
  const nt = (mixKind === 'long') ? pick([3,4]) : pick([2,3]);
  for(let i=0;i<60;i++){ const p=genMixCalcProblem(nt); if(p) return p; }
  return genMixCalcProblem(nt);
}

function initMix(){
  _mixRetryQueue=null; _mixRetryTotal=MIX_TOTAL;
  mixCurrentQ=0; mixCorrect=0; mixWrong=0; mixWrongProbs=[];
  document.getElementById('q-count').textContent=1;
  document.getElementById('score-correct').textContent=0;
  document.getElementById('score-wrong').textContent=0;
  document.getElementById('progress-fill').style.width='0%';
  renderMixQuestion();
}

function renderMixQuestion(){
  const _t = _mixRetryQueue !== null ? _mixRetryTotal : MIX_TOTAL;
  if (mixCurrentQ >= _t) { renderMixResult(); return; }
  document.getElementById('q-count').textContent = Math.min(mixCurrentQ+1, _t);
  document.getElementById('score-correct').textContent = mixCorrect;
  document.getElementById('score-wrong').textContent = mixWrong;
  document.getElementById('progress-fill').style.width = (mixCurrentQ/_t*100)+'%';

  let prob = (_mixRetryQueue && _mixRetryQueue.length>0) ? _mixRetryQueue.shift() : genMixProblem();
  if (!prob) { mixCurrentQ++; renderMixQuestion(); return; }

  const opts = buildOptsFor(prob);

// ====== APPROX (近似値) MODE ======
const APPROX_BASES = [
  { a: 6, va: 2.449, ten: 60, v10a: 7.746 },  // √6, √60
  { a: 3, va: 1.732, ten: 30, v10a: 5.477 },  // √3, √30
  { a: 2, va: 1.414, ten: 20, v10a: 4.472 },  // √2, √20
  { a: 5, va: 2.236, ten: 50, v10a: 7.071 },  // √5, √50
];
const APX_TOTAL = 10;
let apxCurrentQ = 0, apxCorrect = 0, apxWrong = 0;
let apxWrongProbs = [];
let _apxRetryQueue = null, _apxRetryTotal = APX_TOTAL;

function apxFmt(x){
  let s = (Math.round(x*1e4)/1e4).toFixed(4);
  s = s.replace(/0+$/,'').replace(/\.$/,'');
  return s;
}
function apxDec(x){ return (Math.round(x*1e6)/1e6).toString(); }

// ある基準ペアで作れる全テンプレートを返す
function apxInstances(base){
  const { a, va, ten, v10a } = base;
  const sa = '\\sqrt{'+a+'}', sten = '\\sqrt{'+ten+'}';
  const list = [];
  const add = (qLatex, ans, lines, tag) => list.push({ qLatex, ans, lines, tag, base });

  // T1 √(k²a)=k√a
  for (const k of [2,3,4,5]){
    const rad=k*k*a;
    add('\\sqrt{'+rad+'}', k*va,
      ['\\sqrt{'+rad+'}=\\sqrt{'+k+'^2\\times '+a+'}='+k+sa,
       '='+k+'\\times '+va+'='+apxFmt(k*va)], 'mulA');
  }
  // T2 √(k²·10a)=k√(10a)
  for (const k of [2,3]){
    const rad=k*k*ten;
    add('\\sqrt{'+rad+'}', k*v10a,
      ['\\sqrt{'+rad+'}=\\sqrt{'+k+'^2\\times '+ten+'}='+k+sten,
       '='+k+'\\times '+v10a+'='+apxFmt(k*v10a)], 'mulB');
  }
  // T3 √(10a/k²)=√(10a)/k （割り切れる場合のみ）
  for (const k of [2,3,4,5]){
    if (ten % (k*k) !== 0) continue;
    const rad=ten/(k*k);
    add('\\sqrt{'+rad+'}', v10a/k,
      ['\\sqrt{'+rad+'}=\\sqrt{\\dfrac{'+ten+'}{'+k+'^2}}=\\dfrac{'+sten+'}{'+k+'}',
       '=\\dfrac{'+v10a+'}{'+k+'}='+apxFmt(v10a/k)], 'divB');
  }
  // T4 a/√a=√a
  add('\\dfrac{'+a+'}{'+sa+'}', va,
    ['\\dfrac{'+a+'}{'+sa+'}=\\dfrac{'+a+'\\times '+sa+'}{'+sa+'\\times '+sa+'}=\\dfrac{'+a+sa+'}{'+a+'}',
     '='+sa+'='+va], 'ratA');
  // T5 (ka)/√a=k√a
  for (const k of [2,3]){
    const num=k*a;
    add('\\dfrac{'+num+'}{'+sa+'}', k*va,
      ['\\dfrac{'+num+'}{'+sa+'}=\\dfrac{'+num+'\\times '+sa+'}{'+a+'}='+k+sa,
       '='+k+'\\times '+va+'='+apxFmt(k*va)], 'ratA2');
  }
  // T6 10a/√(10a)=√(10a)
  add('\\dfrac{'+ten+'}{'+sten+'}', v10a,
    ['\\dfrac{'+ten+'}{'+sten+'}=\\dfrac{'+ten+'\\times '+sten+'}{'+ten+'}='+sten,
     '='+v10a], 'ratB');
  // T7 √(a/100)=√a/10
  add('\\sqrt{'+apxDec(a/100)+'}', va/10,
    ['\\sqrt{'+apxDec(a/100)+'}=\\sqrt{\\dfrac{'+a+'}{100}}=\\dfrac{'+sa+'}{10}',
     '=\\dfrac{'+va+'}{10}='+apxFmt(va/10)], 'decA');
  // T8 √(10a/100)=√(10a)/10
  add('\\sqrt{'+apxDec(ten/100)+'}', v10a/10,
    ['\\sqrt{'+apxDec(ten/100)+'}=\\sqrt{\\dfrac{'+ten+'}{100}}=\\dfrac{'+sten+'}{10}',
     '=\\dfrac{'+v10a+'}{10}='+apxFmt(v10a/10)], 'decB');
  // T9 √(100a)=10√a
  add('\\sqrt{'+(100*a)+'}', 10*va,
    ['\\sqrt{'+(100*a)+'}=\\sqrt{100\\times '+a+'}=10'+sa,
     '=10\\times '+va+'='+apxFmt(10*va)], 'bigA');
  // T10 √(1000a)=10√(10a)
  add('\\sqrt{'+(1000*a)+'}', 10*v10a,
    ['\\sqrt{'+(1000*a)+'}=\\sqrt{100\\times '+ten+'}=10'+sten,
     '=10\\times '+v10a+'='+apxFmt(10*v10a)], 'bigB');
  // T11 √(k²a/100)=k√a/10
  {
    const k=2, dec=(k*k*a)/100;
    add('\\sqrt{'+apxDec(dec)+'}', k*va/10,
      ['\\sqrt{'+apxDec(dec)+'}=\\sqrt{\\dfrac{'+(k*k*a)+'}{100}}=\\dfrac{'+k+sa+'}{10}',
       '=\\dfrac{'+k+'\\times '+va+'}{10}='+apxFmt(k*va/10)], 'decA2');
  }
  return list;
}

// 紛らわしい誤答を4つ生成
function apxDistractors(ans, base){
  const { va, v10a } = base;
  const pool = [
    va, v10a, va/10, v10a/10, va*10, v10a*10,
    2*va, 3*va, 4*va, 2*v10a, 3*v10a,
    va/2, v10a/2, ans*10, ans/10, ans*2, ans/2,
  ];
  const ansR = Math.round(ans*1e4)/1e4;
  const seen = new Set([apxFmt(ans)]);
  const out = [];
  for (const v of pool){
    const r = Math.round(v*1e4)/1e4;
    if (r <= 0) continue;
    if (Math.abs(r-ansR) < 1e-4) continue;
    const key = apxFmt(r);
    if (seen.has(key)) continue;
    seen.add(key); out.push(key);
  }
  for (let i=out.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[out[i],out[j]]=[out[j],out[i]];}
  let res = out.slice(0,4);
  let pad=1;
  while(res.length<4){ const k=apxFmt(ans+pad*0.137); if(!seen.has(k)){seen.add(k);res.push(k);} pad++; }
  return res;
}

let _apxRecent = [];
function genApxProblem(){
  for (let att=0; att<60; att++){
    const base = pick(APPROX_BASES);
    const insts = apxInstances(base);
    const it = pick(insts);
    const sig = base.a + '|' + it.qLatex;
    if (_apxRecent.includes(sig)) continue;
    _apxRecent.push(sig);
    if (_apxRecent.length > 6) _apxRecent.shift();
    return it;
  }
  const base = pick(APPROX_BASES);
  return pick(apxInstances(base));
}
