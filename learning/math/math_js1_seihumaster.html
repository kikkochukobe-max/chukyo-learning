<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --blue: #1a3a6e;
    --accent: #e8a020;
    --gold: #f5c842;
    --light: #f0f4ff;
    --white: #ffffff;
    --correct: #22c55e;
    --wrong: #ef4444;
    --card-bg: #ffffff;
    --shadow: 0 8px 32px rgba(10,22,40,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    color: var(--navy);
    background-image:
      radial-gradient(ellipse at 20% 10%, #1a3a6e55 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, #e8a02022 0%, transparent 50%);
  }

  /* HEADER: 共通ヘッダー divp-header.js が自前のCSSを注入するため、ここでは定義しない */

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 12px 16px 32px;
  }

  .quiz-title { text-align: center; margin-bottom: 10px; position: relative; }
  .title-print-btn {
    position: absolute; top: 50%; right: 2px; transform: translateY(-50%);
    width: 42px; height: 42px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    background: #ffffff14; border: 1px solid #ffffff2e; border-radius: 10px;
    color: #fff; cursor: pointer; transition: all 0.18s; z-index: 5; padding: 0;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .title-print-btn .pi { font-size: 15px; line-height: 1; }
  .title-print-btn .pl { font-size: 9px; line-height: 1; font-weight: 700; letter-spacing: 0.02em; }
  .title-print-btn:hover { background: #ffffff28; }
  .title-print-btn:active { transform: translateY(-50%) scale(0.94); }

  .quiz-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 5vw, 32px);
    color: var(--white);
    letter-spacing: 0.08em;
    line-height: 1;
  }
  .quiz-title .subtitle {
    font-size: 10px; color: var(--accent); margin-top: 2px;
    letter-spacing: 0.12em; font-weight: 500;
  }

  /* MODE SWITCHER */
  .mode-toggle {
    width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    background: #ffffff14; border: 1px solid #ffffff1f; border-radius: 12px;
    color: #fff; font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; font-weight: 700; padding: 11px 16px;
    cursor: pointer; margin-bottom: 8px; transition: background 0.18s;
  }
  .mode-toggle:hover { background: #ffffff22; }
  .mode-toggle .chev { font-size: 11px; opacity: 0.8; }
  .mode-switcher {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
    background: #ffffff10; border-radius: 14px; padding: 5px; overflow: hidden;
  }
  .mode-switcher.collapsed { display: none; }
  .mode-btn {
    flex: 1 1 90px; min-width: 90px; padding: 8px 8px;
    border: none; border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    color: #ffffff80; background: transparent;
  }
  .mode-btn.active {
    background: var(--accent); color: var(--navy);
    box-shadow: 0 2px 8px rgba(232,160,32,0.4);
  }

  /* 数の種類セレクタ */
  .numtype-bar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px;
    background: #ffffff10; border: 1px solid #ffffff20;
    border-radius: 12px; padding: 8px 14px;
  }
  .nt-label { font-size: 11px; color: #ffffff80; font-weight: 700; letter-spacing: 0.08em; }
  .nt-chip {
    padding: 7px 18px; border-radius: 99px;
    border: 1.5px solid #ffffff30; background: transparent;
    color: #ffffffb0; font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;
  }
  .nt-chip:hover { border-color: #fff; color: #fff; }
  .nt-chip.on { background: var(--accent); border-color: var(--accent); color: var(--navy); }

  /* SCORE BAR */
  .score-bar {
    background: #ffffff10; border: 1px solid #ffffff20; border-radius: 12px;
    padding: 8px 16px; display: flex; justify-content: space-around;
    margin-bottom: 10px; backdrop-filter: blur(8px);
  }
  .score-item { text-align: center; }
  .score-num {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    color: var(--white); line-height: 1;
  }
  .score-num.correct-color { color: var(--correct); }
  .score-num.wrong-color { color: var(--wrong); }
  .score-label { font-size: 10px; color: #ffffff80; margin-top: 1px; letter-spacing: 0.08em; }

  /* PROGRESS BAR */
  .progress-wrap {
    height: 4px; background: #ffffff20; border-radius: 3px;
    margin-bottom: 12px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent); border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 24px 20px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: slideUp 0.35s ease;
    position: relative;
    text-align: center;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question-meta {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 14px;
  }
  .q-num {
    background: var(--navy); color: var(--white);
    font-family: 'Bebas Neue', sans-serif; font-size: 14px;
    padding: 4px 12px; border-radius: 20px; letter-spacing: 0.08em;
  }
  .q-type-badge {
    font-size: 11px; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; letter-spacing: 0.06em;
    background: #dbeafe; color: #1d4ed8;
  }
  .q-retry-badge {
    font-size: 11px; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; letter-spacing: 0.06em;
    background: #fef3c7; color: #b45309;
  }

  /* 式の表示（トークンを均等ギャップで並べる） */
  #expr-card { width: 100%; min-height: 84px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
  #expr {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
    column-gap: 0.36em; row-gap: 0.18em; width: 100%; overflow: hidden;
    font-family: 'Fira Mono', 'Noto Sans JP', monospace;
    font-size: clamp(1.5rem, 4.7vw, 2.1rem);
    color: var(--navy); line-height: 1.25;
  }
  #expr.show { animation: exprIn 0.26s cubic-bezier(0.2,0.7,0.2,1); }
  @keyframes exprIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
  .tok { display: inline-block; flex: 0 0 auto; }
  #expr sup, .p-ex sup { font-size: 0.56em; vertical-align: super; line-height: 0; }
  .grp { display: inline-flex; align-items: center; column-gap: 0.36em; }
  .gtok { display: inline-block; flex: 0 0 auto; }

  /* 分数 */
  .fr { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; font-size: 0.82em; line-height: 1.1; position: relative; top: -0.04em; }
  .fr .fn { border-bottom: 1.6px solid currentColor; padding: 0 0.3em 1px; min-width: 0.7em; }
  .fr .fd { padding: 1px 0.3em 0; min-width: 0.7em; }

  /* 解答入力列 */
  .ans-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .eq { font-family: 'Fira Mono', monospace; font-size: 1.7rem; color: #94a3b8; align-self: center; }
  .sign-btn {
    width: 52px; height: 52px; border-radius: 12px; border: 2px solid;
    font-family: 'Fira Mono', monospace; font-size: 1.5rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; align-self: center; background: #fff;
    -webkit-tap-highlight-color: transparent;
  }
  .sign-btn.pos { color: #2563eb; border-color: #93c5fd; background: #eff6ff; }
  .sign-btn.neg { color: #dc2626; border-color: #fca5a5; background: #fef2f2; }
  .sign-btn:active { transform: scale(0.92); }
  .frac-input { display: flex; flex-direction: column; align-items: center; align-self: center; }
  .inp-field {
    min-width: 92px; height: 52px;
    background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fira Mono', monospace; font-size: 1.45rem; color: var(--navy);
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    padding: 0 10px; user-select: none;
  }
  .inp-field.active { border-color: #2563eb; }
  .inp-field.ok { border-color: var(--correct); background: #f0fdf4; }
  .inp-field.ng { border-color: var(--wrong); background: #fef2f2; }
  .frac-div { width: 100%; height: 2px; background: var(--navy); margin: 5px 0; border-radius: 1px; }
  .frac-div.ok { background: var(--correct); }
  .frac-div.ng { background: var(--wrong); }
  .cur { display: inline-block; width: 2px; height: 1.05em; background: #2563eb; margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: middle; }
  .inp-field:not(.active) .cur { display: none; }
  .locked .cur { display: none !important; }
  @keyframes blink { 50% { opacity: 0; } }
  .hide { display: none !important; }

  .input-tip { font-size: 10px; color: #94a3b8; letter-spacing: 0.03em; margin-bottom: 8px; }
  .fb { font-size: 0.9rem; min-height: 28px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }

  @keyframes shakeX { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes pulseOk { 0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 70%{box-shadow:0 0 0 14px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
  .shaking { animation: shakeX 0.35s ease; }
  .pulsing { animation: pulseOk 0.5s ease; }

  /* ACTION BUTTONS */
  .action-row { display: flex; gap: 12px; margin: 4px 0 16px; justify-content: center; }
  .btn {
    padding: 13px 24px; border-radius: 12px; border: none;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.18s; letter-spacing: 0.04em;
    min-width: 130px;
  }
  .btn-primary { background: var(--accent); color: var(--navy); }
  .btn-primary:hover { background: var(--gold); transform: translateY(-2px); }
  .btn-next { background: var(--navy); color: var(--white); }
  .btn-next:hover { background: var(--blue); transform: translateY(-2px); }
  .btn-skip { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
  .btn-skip:hover { background: #e2e8f0; color: #475569; }

  /* KEYPAD */
  .kpad-hint { font-size: 10px; color: #94a3b8; text-align: center; margin-bottom: 6px; letter-spacing: 0.06em; }
  .keypad {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    width: 100%; max-width: 340px; margin: 0 auto;
  }
  .kpad-off { opacity: 0.35; pointer-events: none; }
  .kbtn {
    height: 52px; border-radius: 10px; border: 1.5px solid #cbd5e1; background: #f8fafc;
    color: var(--navy);
    font-family: 'Fira Mono', monospace; font-size: 1.2rem; font-weight: 700;
    cursor: pointer; transition: background 0.12s, border-color 0.12s, transform 0.08s;
    user-select: none; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .kbtn:active { transform: scale(0.92); }
  .kbtn:hover { background: #eff6ff; border-color: #2563eb; }
  .kbtn.slash { color: #b45309; border-color: #fcd34d; background: #fffbeb; font-size: 0.72rem; font-family: 'Noto Sans JP', sans-serif; }
  .kbtn.slash.active { color: #1d4ed8; border-color: #93c5fd; background: #eff6ff; font-size: 0.8rem; }
  .kbtn.dot { color: #1d4ed8; border-color: #93c5fd; background: #eff6ff; }
  .kbtn.back { color: #94a3b8; font-size: 1rem; }
  .kbtn.back:hover { color: var(--navy); }
  .kbtn.clear { color: #94a3b8; font-size: 0.72rem; font-family: 'Noto Sans JP', sans-serif; }
  .kbtn.clear:hover { color: var(--navy); }
  .kbtn.zero { grid-column: span 2; }
  .kbtn.kdis { opacity: 0.28; pointer-events: none; }

  /* RESULT SCREEN */
  .result-screen {
    text-align: center; padding: 40px 24px;
    background: var(--card-bg); border-radius: 20px;
    box-shadow: var(--shadow); animation: slideUp 0.4s ease;
  }
  .result-grade { font-family: 'Bebas Neue', sans-serif; font-size: 80px; line-height: 1; margin-bottom: 8px; }
  .result-msg { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--navy); }
  .result-breakdown { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
  .result-item { padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 700; }
  .result-item.c { background: #dcfce7; color: #166534; }
  .result-item.w { background: #fee2e2; color: #991b1b; }
  .btn-retry {
    background: var(--accent); color: var(--navy);
    font-size: 16px; padding: 16px 40px; border-radius: 14px; border: none;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 700;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.06em;
  }
  .btn-retry:hover { background: var(--gold); transform: translateY(-3px); }
  .btn-retry-wrong {
    display: block; width: 100%; margin-top: 10px; padding: 14px;
    background: #3b82f6; color: #fff; border: none; border-radius: 14px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.18s, transform 0.18s;
  }
  .btn-retry-wrong:hover { background: #2563eb; transform: translateY(-2px); }

  @media (max-width: 480px) {
    #expr { font-size: 1.5rem; }
    .kbtn { height: 46px; font-size: 1.1rem; }
    .sign-btn { width: 46px; height: 46px; font-size: 1.4rem; }
    .inp-field { min-width: 80px; height: 46px; font-size: 1.3rem; }
  }

  /* HANKO STAMP: 共通モジュール divp-correct-jh.js が自前のCSSを注入するため、ここでは定義しない */

  /* ===== 印刷（A4・10問＋解答） ===== */
  #print-area { display: none; }
  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
    #print-area .fr { color: #111 !important; }
    @page { size: A4 portrait; margin: 14mm 12mm; }
  }
  .p-sheet { font-family: 'Noto Sans JP', sans-serif; color: #111; }
  .p-sheet .ph-head { display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 2px solid #111; padding-bottom: 6px; margin-bottom: 12px; }
  .p-sheet .ph-title { font-weight: 800; font-size: 18px; }
  .p-sheet .ph-school { font-size: 12px; color: #444; }
  .p-sheet .ph-meta { display: flex; justify-content: space-between; font-size: 14px; margin: 0; align-items: center; }
  .p-sheet .ph-meta span { border-bottom: 1px solid #999; min-width: 130px; display: inline-block; padding-bottom: 2px; }
  .p-sheet .ph-meta .ph-name { min-width: 260px; height: 42px; border: 1px solid #999; border-radius: 5px; display: inline-flex; align-items: center; justify-content: flex-start; padding: 0 14px; }
  .p-grid { display: flex; flex-direction: column; justify-content: space-between; margin-top: 12mm; min-height: 216mm; }
  .p-item { display: flex; align-items: baseline; gap: 12px; font-size: 17px; padding-bottom: 3mm; font-family: 'Fira Mono', monospace; }
  .p-item .no { font-weight: 800; width: 30px; flex: 0 0 auto; }
  .p-ex { display: inline-flex; flex-wrap: wrap; align-items: center; column-gap: 0.3em; row-gap: 0.1em; }
  .p-keypage { page-break-before: always; }
  .p-kgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 26px; font-size: 14px; font-family: 'Fira Mono', monospace; }
  .p-kgrid div { padding: 5px 0; border-bottom: 1px dotted #ccc; }
  .p-kgrid .no { font-weight: 800; }
</style>
</head>
<body>

<script src="/assets/divp-header.js"></script>
<script src="/assets/divp-correct-jh.js"></script>
<script src="/assets/divp-core.js"></script>
<script>Divp.init('math_js1_seihu');</script>

<main>
  <div class="quiz-title">
    <h1 id="main-title">正負の数 加法（同符号）</h1>
    <div class="subtitle" id="main-subtitle">ADDITION: SAME SIGNS</div>
    <button class="title-print-btn" id="title-print-btn" type="button" title="プリント" aria-label="印刷"><span class="pi">🖨</span><span class="pl">印刷</span></button>
  </div>

  <button class="mode-toggle" id="mode-toggle" type="button">
    <span id="mode-toggle-label">モードを選ぶ</span>
    <span class="chev" id="mode-toggle-chev">▲</span>
  </button>
  <div class="mode-switcher" id="mode-switcher">
    <button class="mode-btn active" id="mode-dofugo">
      ① 同符号のたし算<br><span style="font-weight:400;font-size:10px;">(−3)＋(−5) かっこあり2項</span>
    </button>
    <button class="mode-btn" id="mode-ifugo">
      ② 異符号のたし算<br><span style="font-weight:400;font-size:10px;">(＋3)＋(−5) かっこあり2項</span>
    </button>
    <button class="mode-btn" id="mode-genpo">
      ③ ひき算<br><span style="font-weight:400;font-size:10px;">(＋3)−(−5) かっこあり2項</span>
    </button>
    <button class="mode-btn" id="mode-kagenkakko">
      ④ 加減 かっこあり<br><span style="font-weight:400;font-size:10px;">3〜5項 全部かっこ</span>
    </button>
    <button class="mode-btn" id="mode-kagennashi">
      ⑤ 加減 かっこなし<br><span style="font-weight:400;font-size:10px;">−3＋5−7 の形</span>
    </button>
    <button class="mode-btn" id="mode-kagenichibu">
      ⑥ 加減 一部かっこ<br><span style="font-weight:400;font-size:10px;">3〜5項 まざった形</span>
    </button>
    <button class="mode-btn" id="mode-kakezan">
      ⑦ 乗法<br><span style="font-weight:400;font-size:10px;">2項のかけ算</span>
    </button>
    <button class="mode-btn" id="mode-ruijo">
      ⑧ 累乗<br><span style="font-weight:400;font-size:10px;">(−3)²と−3²のちがい</span>
    </button>
    <button class="mode-btn" id="mode-warizan">
      ⑨ 除法<br><span style="font-weight:400;font-size:10px;">2項のわり算</span>
    </button>
    <button class="mode-btn" id="mode-muldiv">
      ⑩ 乗除（指数あり）<br><span style="font-weight:400;font-size:10px;">×÷だけ 3〜5項</span>

<script>
"use strict";

// ============================================================
// 有理数演算（分子n / 分母d の既約分数で厳密計算）
// ============================================================
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { var t = b; b = a % b; a = t; } return a || 1; }
function R(n, d) { d = (d === undefined) ? 1 : d; if (d < 0) { n = -n; d = -d; } var g = gcd(n, d); return { n: n / g, d: d / g }; }
function rAdd(x, y) { return R(x.n * y.d + y.n * x.d, x.d * y.d); }
function rSub(x, y) { return R(x.n * y.d - y.n * x.d, x.d * y.d); }
function rMul(x, y) { return R(x.n * y.n, x.d * y.d); }
function rDvd(x, y) { return R(x.n * y.d, x.d * y.n); }
function rPow(x, e) { var r = R(1, 1); for (var i = 0; i < e; i++) r = rMul(r, x); return r; }

function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

function divisors(n) { n = Math.abs(n); var ds = []; for (var d = 1; d <= n; d++) if (n % d === 0) ds.push(d); return ds; }

// 評価（累乗は生成時に確定済み → ×÷ → ＋−）
function evalOps(ops, opers) {
  var vals = [ops[0].r], add2 = [];
  for (var i = 0; i < opers.length; i++) {
    var o = opers[i];
    if (o === '*' || o === '/') vals[vals.length - 1] = (o === '*') ? rMul(vals[vals.length - 1], ops[i + 1].r) : rDvd(vals[vals.length - 1], ops[i + 1].r);
    else { add2.push(o); vals.push(ops[i + 1].r); }
  }
  var res = vals[0];
  for (var j = 0; j < add2.length; j++) res = (add2[j] === '+') ? rAdd(res, vals[j + 1]) : rSub(res, vals[j + 1]);
  return res;
}

// ============================================================
// オペランド生成
// ============================================================
function intOp(lo, hi) { var v = ri(lo || 1, hi || 9); if (Math.random() < 0.5) v = -v; return { r: R(v, 1), disp: 'int' }; }
function nz(lo, hi) { var v = ri(lo, hi); if (Math.random() < 0.5) v = -v; return { r: R(v, 1), disp: 'int' }; }
function decOp() { var v = pick([-3, -2.5, -2, -1.5, -1, -0.5, 0.5, 1, 1.5, 2, 2.5, 3, 0.2, 0.4, 0.6, 0.8, -0.2, -0.4, -0.8]); return { r: floatToR(v), disp: 'dec', dispVal: v }; }
// 整数値を含まない小数専用（加減・分数小数モード用）
function decOpStrict() { var v = pick([-2.5, -1.5, -0.5, 0.5, 1.5, 2.5, 0.2, 0.4, 0.6, 0.8, 1.2, 1.4, -0.2, -0.4, -0.6, -0.8, -1.2, 3.5, -3.5]); return { r: floatToR(v), disp: 'dec', dispVal: v }; }
function fracOp() { var den = pick([2, 3, 4, 5, 6]), num = ri(-6, 6); if (num === 0) num = pick([-1, 1, 2, 3]); return { r: R(num, den), disp: 'frac' }; }
// 分母ファミリー：和の分母が必ず12以下になる組（多項でもきれいに）
var FAM = {
  mix:   { dens: [2, 3, 4, 6], pows: [[1, 2, 2], [3, 2, 2], [-1, 2, 2], [-3, 2, 2]] },
  two:   { dens: [2, 4, 8],    pows: [[1, 2, 2], [3, 2, 2], [-1, 2, 2], [-3, 2, 2], [1, 2, 3], [-1, 2, 3], [3, 2, 3], [-3, 2, 3]] },
  three: { dens: [3, 9],       pows: [[1, 3, 2], [2, 3, 2], [4, 3, 2], [-1, 3, 2], [-2, 3, 2], [-4, 3, 2]] }
};
function fracOpFam(fam) { var den = pick(FAM[fam].dens), num = ri(-5, 5); if (num === 0) num = pick([-1, 1, 2, 3]); return { r: R(num, den), disp: 'frac' }; }
function fracPowOpFam(fam) { var s = pick(FAM[fam].pows); return { r: rPow(R(s[0], s[1]), s[2]), disp: 'fracpow', bn: s[0], bd: s[1], exp: s[2] }; }
// 「整数 ÷ 分数」が必ず整数になるペア
function mkDivFrac() {
  var f = pick([[1, 2], [1, 3], [2, 3], [1, 4], [3, 4], [1, 5], [2, 5], [3, 5], [1, 6], [5, 6]]);
  var n = f[0], d = f[1], km = Math.max(1, Math.floor(8 / n)), k = ri(-km, km); if (k === 0) k = pick([-1, 1, 2, -2]);
  return { intOp: { r: R(n * k, 1), disp: 'int' }, fracOp: { r: R(n, d), disp: 'frac' } };
}
function powOp() { var e = pick([2, 2, 2, 3]), b; if (e === 2) b = pick([-5, -4, -3, -2, 2, 3, 4, 5]); else b = pick([-3, -2, 2, 3]); return { r: rPow(R(b, 1), e), disp: 'pow', base: b, exp: e }; }
function nPowOp() { var e = pick([2, 2, 3]), b; if (e === 2) b = pick([2, 3, 4, 5]); else b = pick([2, 3]); return { r: R(-Math.pow(b, e), 1), disp: 'npow', base: b, exp: e }; }
function decPowOp() { var e = (Math.random() < 0.7) ? 2 : 3; var b = pick(e === 2 ? [0.5, -0.5, 1.5, -1.5, 2.5, -2.5, 0.2, -0.2, 0.4, -0.4, 0.3, -0.3] : [0.5, -0.5, 0.2, -0.2, 1.5, -1.5]); return { r: rPow(floatToR(b), e), disp: 'decpow', baseVal: b, exp: e }; }

// 整数の乗除チェーン（結果が必ず整数になる）
function intChain(maxF) {
  var m = ri(1, maxF), ops = [], opers = [];
  var first = ri(-9, 9); if (first === 0) first = pick([-2, 2, 3, 4]);
  ops.push({ r: R(first, 1), disp: 'int' }); var prod = first;
  for (var i = 1; i < m; i++) {
    var useDiv = (Math.random() < 0.5) && (Math.abs(prod) > 1);
    var ds = useDiv ? divisors(prod).filter(function (d) { return d > 1 && d < Math.abs(prod); }) : [];
    if (useDiv && ds.length > 0) { var d = pick(ds); if (Math.random() < 0.5) d = -d; ops.push({ r: R(d, 1), disp: 'int' }); opers.push('/'); prod = prod / d; }
    else { var f = ri(2, 6); if (Math.random() < 0.5) f = -f; ops.push({ r: R(f, 1), disp: 'int' }); opers.push('*'); prod *= f; }
  }
  return { ops: ops, opers: opers };
}

// 累乗（発展・四則用の小さめの底）
function powOpSmall() { var e = pick([2, 2, 3]), b; if (e === 2) b = pick([-4, -3, -2, 2, 3, 4]); else b = pick([-2, 2]); return { r: rPow(R(b, 1), e), disp: 'pow', base: b, exp: e }; }
function nPowOpSmall() { var e = pick([2, 2, 3]), b; if (e === 2) b = pick([2, 3, 4]); else b = 2; return { r: R(-Math.pow(b, e), 1), disp: 'npow', base: b, exp: e }; }
// 底が負の累乗（かっこ付きになる → 外側は中かっこ）
function negPowOp() { var e = pick([2, 2, 3]); var b = (e === 2) ? pick([-2, -3, -4]) : -2; return { r: rPow(R(b, 1), e), disp: 'pow', base: b, exp: e }; }
// 累乗（分数・自由な底）
function fracPowOpAny() {
  var den = pick([2, 2, 3, 3, 4, 5]);
  var e = (den <= 3) ? pick([2, 2, 3]) : 2;
  var num = ri(1, den + 2); if (gcd(num, den) !== 1) num = 1;
  if (Math.random() < 0.5) num = -num;
  return { r: rPow(R(num, den), e), disp: 'fracpow', bn: num, bd: den, exp: e };
}

// ============================================================
// 数の種類（設定チップ）: int / frac / dec / random
// ============================================================
var NT_LABEL = { int: '整数', frac: '分数', dec: '小数', random: 'ランダム' };
var cfgNumType = 'int';
function ntPick() { return cfgNumType === 'random' ? pick(['int', 'frac', 'dec']) : cfgNumType; }

// ============================================================
// 生成の共通部品
// ============================================================
// 加減用の項（符号ランダム）
function addTerm(nt, fam) {
  if (nt === 'frac') return fracOpFam(fam);
  if (nt === 'dec') return decOpStrict();
  var v = ri(1, 15); if (Math.random() < 0.5) v = -v;
  return { r: R(v, 1), disp: 'int' };
}
function setSign(o, s) { o.r = R(s * Math.abs(o.r.n), o.r.d); return o; }
function isPowOperand(o) { return o.disp === 'pow' || o.disp === 'npow' || o.disp === 'decpow' || o.disp === 'fracpow'; }
function leafHasFrac(o) { if (o.disp === 'group') return o.gops.some(leafHasFrac); return o.r.d > 1; }
// 分数モードで約分により全項整数になっていないか
function fracOk(nt, ops) { return nt !== 'frac' || ops.some(leafHasFrac); }
function hasNegative(ops, opers) { return ops.some(function (o) { return o.r.n < 0; }) || opers.indexOf('-') >= 0; }
function countLeaves(ops) { return ops.reduce(function (s, o) { return s + (o.disp === 'group' ? countLeaves(o.gops) : 1); }, 0); }

// 答えのきれいさチェック（モード種別ごと）
function cleanAdd(nt, ans) {
  if (!isFinite(ans.n) || !isFinite(ans.d)) return false;
  if (Math.abs(ans.n / ans.d) > 40) return false;
  if (nt === 'int') return ans.d === 1;
  if (ans.d === 1) return true;
  if (nt === 'frac') return ans.d <= 12 && Math.abs(ans.n) <= 99;
  return termFactors(ans.d) === 1 && (100 % ans.d === 0);
}
function cleanMul(nt, ans) {
  if (!isFinite(ans.n) || !isFinite(ans.d)) return false;
  if (nt === 'int') return ans.d === 1 && Math.abs(ans.n) <= 200;
  if (Math.abs(ans.n / ans.d) > 100) return false;
  if (ans.d === 1) return true;
  if (nt === 'frac') return ans.d <= 30 && Math.abs(ans.n) <= 99;
  return termFactors(ans.d) === 1 && (1000 % ans.d === 0);   // 小数第3位まで
}
function cleanShisoku(nt, ans) {
  if (!isFinite(ans.n) || !isFinite(ans.d)) return false;
  if (Math.abs(ans.n / ans.d) > 200) return false;
  if (nt === 'int') return ans.d === 1;
  if (ans.d === 1) return true;
  if (nt === 'frac') return ans.d <= 12 && Math.abs(ans.n) <= 99;
  return termFactors(ans.d) === 1 && (100 % ans.d === 0);
}
function hasZeroDivide(ops, opers) {
  for (var z = 0; z < opers.length; z++) if (opers[z] === '/' && ops[z + 1].r.n === 0) return true;
  return false;
}

// ============================================================
// モード別 問題生成 → {ops, opers, ans, flavor, mixSec}
// flavor には選ばれた数の種類（int/frac/dec）が入り、答えの表示形式を決める
// ============================================================

// 加減系モード: ランダム選択時は項ごとに 整数/分数/小数 を混ぜてよい
function addTermNT(fam) {
  var nt = (cfgNumType === 'random') ? pick(['int', 'frac', 'dec']) : cfgNumType;
  return addTerm(nt, fam);
}
// 項の種類から答えの表示形式ときれいさ判定キーを決める（分数と小数が混ざったら答えは分数で）
function addFlavor(ops) {
  var hasF = ops.some(function (o) { return o.disp === 'frac'; });
  var hasD = ops.some(function (o) { return o.disp === 'dec'; });
  if (hasF && hasD) return { flavor: 'mix', mixSec: 'frac', clean: 'frac' };
  if (hasF) return { flavor: 'frac', mixSec: null, clean: 'frac' };
  if (hasD) return { flavor: 'dec', mixSec: null, clean: 'dec' };
  return { flavor: 'int', mixSec: null, clean: 'int' };
}

// ①②③ かっこあり2項の加法・減法
// kind: 'same'=同符号の加法 / 'diff'=異符号の加法 / 'sub'=減法（同符号・異符号まぜて）
function gen2(kind) {
  for (var a = 0; a < 400; a++) {
    var fam = pick(['mix', 'two', 'three']);
    var t1 = addTermNT(fam), t2 = addTermNT(fam);
    var s1 = Math.random() < 0.5 ? -1 : 1, s2;
    if (kind === 'same') s2 = s1; else if (kind === 'diff') s2 = -s1; else s2 = (Math.random() < 0.5 ? -1 : 1);
    setSign(t1, s1); setSign(t2, s2);
    t1.sgnParen = true; t2.sgnParen = true;
    var ops = [t1, t2], opers = [kind === 'sub' ? '-' : '+'];
    if (!fracOk(cfgNumType, ops)) continue;
    var fl = addFlavor(ops);
    var ans = evalOps(ops, opers);
    if (!cleanAdd(fl.clean, ans)) continue;
    if (kind !== 'same' && ans.n === 0 && Math.random() < 0.7) continue;   // 答え0の問題は少なめに
    return { flavor: fl.flavor, mixSec: fl.mixSec, ops: ops, opers: opers, ans: ans };
  }
  var f1 = { r: R(-3, 1), disp: 'int', sgnParen: true }, f2 = { r: R(-5, 1), disp: 'int', sgnParen: true };
  var fop = [kind === 'sub' ? '-' : '+'];
  return { flavor: 'int', mixSec: null, ops: [f1, f2], opers: fop, ans: evalOps([f1, f2], fop) };
}

// ④⑤⑥ 3〜5項の加減（style: 'kakko'=全部かっこ / 'nashi'=かっこなし / 'ichibu'=一部かっこ）
function genKagenN(style) {
  for (var a = 0; a < 500; a++) {
    var fam = pick(['mix', 'mix', 'two', 'three']);
    var K = ri(3, 5), ops = [], opers = [], styles = [];
    for (var i = 0; i < K; i++) {
      var t = addTermNT(fam);
      var brk = (style === 'kakko') ? true : (style === 'nashi') ? false : (Math.random() < 0.5);
      if (i === 0) {
        if (brk) t.sgnParen = true;     // かっこなしの先頭は −5 … の形のまま
      } else if (brk) {
        opers.push(Math.random() < 0.5 ? '+' : '-');
        t.sgnParen = true;
      } else {
        opers.push(t.r.n < 0 ? '-' : '+');   // 符号を演算子に吸収して裸の項にする
        setSign(t, 1);
      }
      ops.push(t);
      styles.push(brk);
    }
    if (style === 'ichibu') {
      var hasB = false, hasN = false;
      styles.forEach(function (b) { if (b) hasB = true; else hasN = true; });
      if (!hasB || !hasN) continue;       // かっこあり・なしが必ず混ざる
    }
    if (!fracOk(cfgNumType, ops)) continue;
    if (!hasNegative(ops, opers)) continue;
    var fl = addFlavor(ops);
    var ans = evalOps(ops, opers);
    if (!cleanAdd(fl.clean, ans)) continue;
    return { flavor: fl.flavor, mixSec: fl.mixSec, ops: ops, opers: opers, ans: ans };
  }
  var fo = [{ r: R(-3, 1), disp: 'int' }, { r: R(5, 1), disp: 'int' }, { r: R(7, 1), disp: 'int' }];
  return { flavor: 'int', mixSec: null, ops: fo, opers: ['+', '-'], ans: evalOps(fo, ['+', '-']) };
}

// ⑥ 2項の乗法
function genKakezan() {
  for (var a = 0; a < 500; a++) {
    var nt = ntPick(), ops;
    if (nt === 'int') {
      var x = nz(2, 9), y = nz(2, 9);
      if (x.r.n > 0 && y.r.n > 0) setSign(pick([x, y]), -1);
      ops = [x, y];
    } else if (nt === 'frac') {
      var f1 = fracOp(), f2 = (Math.random() < 0.3) ? nz(2, 5) : fracOp();
      ops = (Math.random() < 0.5) ? [f1, f2] : [f2, f1];
    } else {
      var d1 = decOpStrict(), d2 = (Math.random() < 0.3) ? nz(2, 5) : decOpStrict();
      ops = (Math.random() < 0.5) ? [d1, d2] : [d2, d1];
    }
    var opers = ['*'];
    if (!ops.some(function (o) { return o.r.n < 0; })) continue;
    if (!fracOk(nt, ops)) continue;
    var ans = evalOps(ops, opers);
    if (!cleanMul(nt, ans)) continue;
    return { flavor: nt, mixSec: null, ops: ops, opers: opers, ans: ans };
  }
  var fo = [{ r: R(-3, 1), disp: 'int' }, { r: R(4, 1), disp: 'int' }];
  return { flavor: 'int', mixSec: null, ops: fo, opers: ['*'], ans: R(-12, 1) };
}

// ⑦ 累乗（1項だけ）
function genRuijo() {
  for (var a = 0; a < 300; a++) {
    var nt = ntPick(), op;
    if (nt === 'int') op = (Math.random() < 0.45) ? nPowOp() : powOp();
    else if (nt === 'frac') op = fracPowOpAny();
    else op = decPowOp();
    var ans = op.r;
    if (nt === 'frac' && (ans.d > 99 || Math.abs(ans.n) > 99)) continue;
    if (nt === 'dec' && !(termFactors(ans.d) === 1 && 1000 % ans.d === 0)) continue;
    return { flavor: nt, mixSec: null, ops: [op], opers: [], ans: ans };
  }
  var f = { r: R(9, 1), disp: 'pow', base: -3, exp: 2 };
  return { flavor: 'int', mixSec: null, ops: [f], opers: [], ans: R(9, 1) };
}

// ⑧ 2項の除法
function genWarizan() {
  for (var a = 0; a < 800; a++) {
    var nt = ntPick(), ops;
    if (nt === 'int') {
      var b = nz(2, 9), q = ri(1, 9); if (Math.random() < 0.5) q = -q;
      ops = [{ r: R(q * b.r.n, 1), disp: 'int' }, b];
    } else if (nt === 'frac') {
      if (Math.random() < 0.35) { var dp = mkDivFrac(); ops = [dp.intOp, dp.fracOp]; }
      else { var f1 = fracOp(), f2 = fracOp(); if (f2.r.n === 0) continue; ops = [f1, f2]; }
    } else {
      var x = decOpStrict(), y = decOpStrict();
      var dividend = rMul(x.r, y.r);
      if (!(termFactors(dividend.d) === 1 && 100 % dividend.d === 0)) continue;
      if (Math.abs(dividend.n / dividend.d) > 30) continue;
      ops = [{ r: dividend, disp: 'dec' }, y];
    }
    var opers = ['/'];
    if (ops[1].r.n === 0) continue;
    if (!ops.some(function (o) { return o.r.n < 0; })) continue;
    if (!fracOk(nt, ops)) continue;
    var ans = evalOps(ops, opers);
    if (!cleanMul(nt, ans)) continue;
    return { flavor: nt, mixSec: null, ops: ops, opers: opers, ans: ans };
  }
  var fo = [{ r: R(-12, 1), disp: 'int' }, { r: R(3, 1), disp: 'int' }];
  return { flavor: 'int', mixSec: null, ops: fo, opers: ['/'], ans: R(-4, 1) };
}

// ⑨ 指数あり乗除（×÷だけ 3〜5項）
function genMulDivPow() {
  for (var a = 0; a < 1200; a++) {
    var nt = ntPick(), ops = [], opers = [];
    if (nt === 'int') {
      var K = ri(3, 5), p = ri(0, K - 1), prod = 1;

        var ds = divisors(prod).filter(function (d) { return d > 1; });
        if (i !== p && Math.random() < 0.45 && ds.length > 0) {
          var d = pick(ds); if (Math.random() < 0.5) d = -d;
          opers.push('/'); ops.push({ r: R(d, 1), disp: 'int' }); prod = prod / d;
        } else { opers.push('*'); ops.push(op); prod = prod * op.r.n; }

      var K2 = ri(3, 4), pp = ri(0, K2 - 1), fam = pick(['mix', 'two', 'three']);
      for (var j = 0; j < K2; j++) {
        if (j > 0) opers.push(Math.random() < 0.6 ? '*' : '/');
        ops.push((j === pp) ? fracPowOpFam(fam) : ((Math.random() < 0.35) ? nz(2, 4) : fracOp()));
      }
    } else {
      var K3 = 3, p3 = ri(0, 2);
      for (var m = 0; m < K3; m++) {
        if (m > 0) opers.push(Math.random() < 0.6 ? '*' : '/');
        ops.push((m === p3) ? decPowOp() : ((Math.random() < 0.4) ? nz(2, 4) : decOpStrict()));
      }
    }
    if (hasZeroDivide(ops, opers)) continue;
    if (!ops.some(isPowOperand)) continue;
    if (!fracOk(nt, ops)) continue;
    var ans = evalOps(ops, opers);
    if (!cleanMul(nt, ans)) continue;
    return { flavor: nt, mixSec: null, ops: ops, opers: opers, ans: ans };
  }
  var fo = [{ r: R(4, 1), disp: 'pow', base: -2, exp: 2 }, { r: R(3, 1), disp: 'int' }, { r: R(2, 1), disp: 'int' }];
  return { flavor: 'int', mixSec: null, ops: fo, opers: ['*', '/'], ans: R(6, 1) };
}

// ⑩⑪ 指数あり四則（Kmin〜Kmax項、＋−と×÷が両方入る）
function genShisokuPow(Kmin, Kmax) {
  for (var a = 0; a < 1500; a++) {
    var nt = ntPick(), K = ri(Kmin, Kmax), ops = [], opers = [], used = 0;
    var fam = pick(['mix', 'two', 'three']);
    while (used < K) {
      var rem = K - used;
      if (used > 0) opers.push(Math.random() < 0.5 ? '+' : '-');
      if (nt === 'int') {
        var r0 = Math.random();
        if (r0 < 0.3) { ops.push((used === 0 && Math.random() < 0.35) ? nPowOpSmall() : powOpSmall()); used++; }
        else if (rem >= 2 && r0 < 0.75) {
          var ch = intChain(2);
          ops.push(ch.ops[0]);
          for (var ci = 1; ci < ch.ops.length; ci++) { opers.push(ch.opers[ci - 1]); ops.push(ch.ops[ci]); }
          used += ch.ops.length;
        } else { ops.push(nz(1, 9)); used++; }
      } else if (nt === 'frac') {
        var r1 = Math.random();
        if (r1 < 0.3) { ops.push(fracPowOpFam(fam)); used++; }
        else if (rem >= 2 && r1 < 0.55) { var dp = mkDivFrac(); ops.push(dp.intOp); opers.push('/'); ops.push(dp.fracOp); used += 2; }
        else if (rem >= 2 && r1 < 0.75) { ops.push(nz(2, 5)); opers.push('*'); ops.push(fracOpFam(fam)); used += 2; }
        else { ops.push(fracOpFam(fam)); used++; }
      } else {
        var r2 = Math.random();
        if (r2 < 0.35) { ops.push(decPowOp()); used++; }
        else if (rem >= 2 && r2 < 0.6) { ops.push(decOpStrict()); opers.push('*'); ops.push(nz(2, 4)); used += 2; }
        else { ops.push(decOpStrict()); used++; }
      }
    }
    if (!ops.some(isPowOperand)) continue;                                      // 指数が必ず入る
    if (!opers.some(function (o) { return o === '+' || o === '-'; })) continue; // ＋−が入る
    if (!opers.some(function (o) { return o === '*' || o === '/'; })) continue; // ×÷が入る
    if (hasZeroDivide(ops, opers)) continue;
    if (!fracOk(nt, ops)) continue;
    var ans = evalOps(ops, opers);
    if (!cleanShisoku(nt, ans)) continue;
    return { flavor: nt, mixSec: null, ops: ops, opers: opers, ans: ans };
  }
  var fo = [{ r: R(9, 1), disp: 'pow', base: 3, exp: 2 }, { r: R(2, 1), disp: 'int' }, { r: R(5, 1), disp: 'int' }];
  return { flavor: 'int', mixSec: null, ops: fo, opers: ['-', '*'], ans: R(-1, 1) };
}

// ⑫ 発展：中かっこ＋指数あり四則（4〜6項）
function mkCurlyPowGroup() {
  for (var t = 0; t < 80; t++) {
    var k = ri(2, 3), pp = ri(0, k - 1), gops = [], gopers = [];
    for (var i = 0; i < k; i++) {
      if (i > 0) gopers.push(Math.random() < 0.5 ? '+' : '-');
      if (i === pp) gops.push((i === 0 && Math.random() < 0.35) ? nPowOpSmall() : negPowOp());
      else { var v = (i === 0) ? ri(-9, 9) : ri(1, 9); if (v === 0) v = 3; gops.push({ r: R(v, 1), disp: 'int' }); }
    }
    var r = evalOps(gops, gopers);
    if (r.n === 0 || Math.abs(r.n) > 40) continue;
    return { disp: 'group', bk: 'curly', gops: gops, gopers: gopers, r: r };
  }
  var fo = [negPowOp(), { r: R(6, 1), disp: 'int' }], fp = ['-'];
  return { disp: 'group', bk: 'curly', gops: fo, gopers: fp, r: evalOps(fo, fp) };
}
function genHattenN() {
  for (var a = 0; a < 1000; a++) {
    var nt = ntPick(), g = mkCurlyPowGroup(), ops, opers;
    if (nt === 'int') {
      var t = Math.random();
      if (t < 0.35) {
        var n1 = nz(2, 6);
        ops = (Math.random() < 0.5) ? [n1, g] : [g, n1]; opers = ['*'];
      } else if (t < 0.6) {
        var ds = divisors(g.r.n).filter(function (d) { return d > 1; }); if (!ds.length) continue;
        var dd = pick(ds); if (Math.random() < 0.5) dd = -dd;
        ops = [g, { r: R(dd, 1), disp: 'int' }]; opers = ['/'];
      } else if (Math.random() < 0.5) {
        ops = [nz(2, 6), g, nz(1, 9)]; opers = ['*', pick(['+', '-'])];   // n × {…} ± m
      } else {
        ops = [nz(1, 9), nz(2, 6), g]; opers = [pick(['+', '-']), '*'];   // m ± n × {…}
      }
    } else if (nt === 'frac') {
      var f = fracOp(); if (f.r.d === 1) continue;
      ops = (Math.random() < 0.5) ? [f, g] : [g, f]; opers = ['*'];
      if (Math.random() < 0.4) { opers.push(pick(['+', '-'])); ops.push(fracOpFam(pick(['mix', 'two']))); }
    } else {
      var dm = decOpStrict();
      ops = (Math.random() < 0.5) ? [dm, g] : [g, dm]; opers = ['*'];
      if (Math.random() < 0.4) { opers.push(pick(['+', '-'])); ops.push(decOpStrict()); }
    }
    var L = countLeaves(ops);
    if (L < 4 || L > 6) continue;
    if (hasZeroDivide(ops, opers)) continue;
    var ans = evalOps(ops, opers);
    if (!cleanShisoku(nt, ans)) continue;
    return { flavor: nt, mixSec: null, ops: ops, opers: opers, ans: ans };
  }
  var g2 = { disp: 'group', bk: 'curly', gops: [{ r: R(4, 1), disp: 'pow', base: -2, exp: 2 }, { r: R(7, 1), disp: 'int' }], gopers: ['-'], r: R(-3, 1) };
  return { flavor: 'int', mixSec: null, ops: [{ r: R(5, 1), disp: 'int' }, g2], opers: ['*'], ans: R(-15, 1) };
}

// ============================================================
// 表示（トークン分割：各数字・記号を均等ギャップで配置）
// ============================================================
var OPSYM = { '+': '＋', '-': '−', '*': '×', '/': '÷' };
function fracHTML(n, d) { return '<span class="fr"><span class="fn">' + n + '</span><span class="fd">' + d + '</span></span>'; }
function decStr(r, mag) {
  var neg = (r.n < 0) && !mag, n = Math.abs(r.n);
  var th = Math.round(n * 1000 / r.d), ip = Math.floor(th / 1000), rem = th % 1000, s = '' + ip;
  if (rem > 0) { var f = ('00' + rem).slice(-3).replace(/0+$/, ''); s += '.' + f; }
  return (neg ? '−' : '') + s;
}
function decMag(o) { if (o.dispVal !== undefined) return '' + Math.abs(o.dispVal); return decStr(o.r, true); }
function powBase(sg, mag, exp) { return '<span class="grp"><span>(</span>' + sg + '<span>' + mag + '</span><span>)</span></span><sup>' + exp + '</sup>'; }
function opMag(o) {
  if (o.disp === 'frac') return (o.r.d === 1) ? ('' + Math.abs(o.r.n)) : fracHTML(Math.abs(o.r.n), o.r.d);
  if (o.disp === 'dec') return decMag(o);
  return '' + Math.abs(o.r.n);
}
function isPlain(o) { return o.disp === 'int' || o.disp === 'dec' || o.disp === 'frac'; }
// 先頭の負号は独立トークンにして、引き算と同じ間隔で並べる
function headTok(o, cls) {
  if (o.sgnParen) return '<span class="' + cls + '">' + operandInner(o, true, false) + '</span>';
  if (isPlain(o) && o.r.n < 0) return '<span class="' + cls + '">−</span><span class="' + cls + '">' + opMag(o) + '</span>';
  if (o.disp === 'npow') return '<span class="' + cls + '">−</span><span class="' + cls + '">' + o.base + '<sup>' + o.exp + '</sup></span>';
  return '<span class="' + cls + '">' + operandInner(o, true, false) + '</span>';
}
function groupInner(gops, gopers) {
  var s = headTok(gops[0], 'gtok');
  for (var i = 0; i < gopers.length; i++) {
    s += '<span class="gtok">' + OPSYM[gopers[i]] + '</span>';
    s += '<span class="gtok">' + operandInner(gops[i + 1], false, gopers[i] === '/') + '</span>';
  }
  return s;
}
function operandInner(o, first, afterDiv) {
  // かっこ＋明示符号つきの項: (＋3) / (−3/4) — 加減の基礎モードで使う
  if (o.sgnParen && isPlain(o)) {
    var sg2 = (o.r.n < 0) ? '−' : '＋';
    return '<span class="grp"><span>(</span><span>' + sg2 + '</span><span>' + opMag(o) + '</span><span>)</span></span>';
  }
  if (o.disp === 'group') {
    var lb = (o.bk === 'curly') ? '{' : '(', rb = (o.bk === 'curly') ? '}' : ')';
    return '<span class="grp"><span>' + lb + '</span>' + groupInner(o.gops, o.gopers) + '<span>' + rb + '</span></span>';
  }
  if (o.disp === 'npow') return '<span>−</span>' + o.base + '<sup>' + o.exp + '</sup>';
  if (o.disp === 'pow') {
    var b = o.base;
    if (b < 0) return powBase('<span>−</span>', '' + Math.abs(b), o.exp);
    return '' + b + '<sup>' + o.exp + '</sup>';
  }
  if (o.disp === 'decpow') { var bv = o.baseVal; return powBase(bv < 0 ? '<span>−</span>' : '', '' + Math.abs(bv), o.exp); }
  if (o.disp === 'fracpow') { return powBase(o.bn < 0 ? '<span>−</span>' : '', fracHTML(Math.abs(o.bn), o.bd), o.exp); }
  var r = o.r, neg = r.n < 0, bd;
  if (o.disp === 'frac') bd = (r.d === 1) ? ('' + Math.abs(r.n)) : fracHTML(Math.abs(r.n), r.d);
  else if (o.disp === 'dec') bd = decMag(o);
  else bd = '' + Math.abs(r.n);
  if (neg) return first ? ('<span>−</span>' + bd) : ('<span class="grp"><span>(</span><span>−</span><span>' + bd + '</span><span>)</span></span>');
  // ÷ の除数が分数・小数のときは括弧をつける（例：3 ÷ (1/2)）
  if (afterDiv && r.d > 1) return '<span class="grp"><span>(</span><span>' + bd + '</span><span>)</span></span>';
  return bd;
}
function exprHTML(ops, opers) {
  var s = headTok(ops[0], 'tok');
  for (var i = 0; i < opers.length; i++) {
    s += '<span class="tok">' + OPSYM[opers[i]] + '</span>';
    s += '<span class="tok">' + operandInner(ops[i + 1], false, opers[i] === '/') + '</span>';
  }
  return s;
}

// プレーンテキスト版（answer_logs の question_text / 講師画面表示用）
var SUP = { 2: '²', 3: '³' };
function operandText(o, first, afterDiv) {
  if (o.sgnParen && isPlain(o)) {
    var mag0;
    if (o.disp === 'dec') mag0 = decMag(o);
    else if (o.disp === 'frac' && o.r.d > 1) mag0 = Math.abs(o.r.n) + '/' + o.r.d;
    else mag0 = '' + Math.abs(o.r.n);
    return '(' + (o.r.n < 0 ? '−' : '＋') + mag0 + ')';
  }
  if (o.disp === 'group') {
    var lb = (o.bk === 'curly') ? '{' : '(', rb = (o.bk === 'curly') ? '}' : ')';
    var s = operandText(o.gops[0], true, false);
    for (var i = 0; i < o.gopers.length; i++) s += ' ' + OPSYM[o.gopers[i]] + ' ' + operandText(o.gops[i + 1], false, o.gopers[i] === '/');
    return lb + s + rb;
  }
  if (o.disp === 'npow') return '−' + o.base + (SUP[o.exp] || '^' + o.exp);
  if (o.disp === 'pow') return (o.base < 0 ? '(−' + Math.abs(o.base) + ')' : '' + o.base) + (SUP[o.exp] || '^' + o.exp);
  if (o.disp === 'decpow') return (o.baseVal < 0 ? '(−' + Math.abs(o.baseVal) + ')' : '' + o.baseVal) + (SUP[o.exp] || '^' + o.exp);
  if (o.disp === 'fracpow') return '(' + (o.bn < 0 ? '−' : '') + Math.abs(o.bn) + '/' + o.bd + ')' + (SUP[o.exp] || '^' + o.exp);
  var neg = o.r.n < 0, mag;
  if (o.disp === 'dec') mag = decMag(o);
  else if (o.disp === 'frac' && o.r.d > 1) mag = Math.abs(o.r.n) + '/' + o.r.d;
  else mag = '' + Math.abs(o.r.n);
  if (neg) return first ? ('−' + mag) : ('(−' + mag + ')');
  if (afterDiv && o.r.d > 1) return '(' + mag + ')';
  return mag;
}
function exprText(ops, opers) {
  var s = operandText(ops[0], true, false);
  for (var i = 0; i < opers.length; i++) s += ' ' + OPSYM[opers[i]] + ' ' + operandText(ops[i + 1], false, opers[i] === '/');
  return s;
}

// 正解の表示（flavor に合わせて 分数/小数/整数）
function ansHTML(p) {
  var a = p.ans;
  if (a.d === 1) return (a.n < 0 ? '−' : '') + Math.abs(a.n);
  var wantDec = (p.flavor === 'dec') || (p.flavor === 'mix' && p.mixSec === 'dec');
  if (wantDec) return decStr(a, false);
  return (a.n < 0 ? '<span>−</span>' : '') + fracHTML(Math.abs(a.n), a.d);
}
function ansText(p) {
  var a = p.ans;
  if (a.d === 1) return (a.n < 0 ? '−' : '') + Math.abs(a.n);
  var wantDec = (p.flavor === 'dec') || (p.flavor === 'mix' && p.mixSec === 'dec');
  if (wantDec) return decStr(a, false);
  return (a.n < 0 ? '−' : '') + Math.abs(a.n) + '/' + a.d;
}

    +   '<button class="kbtn slash" id="k-slash" onclick="kSlash()">分数入力</button>'
    +   '<button class="kbtn" onclick="kNum(\'1\')">1</button>'
    +   '<button class="kbtn" onclick="kNum(\'2\')">2</button>'
    +   '<button class="kbtn" onclick="kNum(\'3\')">3</button>'
    +   '<button class="kbtn dot" id="k-dot" onclick="kDot()">・</button>'
    +   '<button class="kbtn clear" onclick="kClear()">クリア</button>'
    +   '<button class="kbtn zero" onclick="kNum(\'0\')">0</button>'
    +   '<button class="kbtn back" onclick="kBack()">⌫</button>'
    + '</div>'
    + '</div>';
}

// ===== 入力UI =====
function updateInput() {
  $('num-txt').textContent = iNum;
  $('den-txt').textContent = iDen;
  $('f-num').className = 'inp-field' + (activeField === 'num' ? ' active' : '');
  $('f-den').className = 'inp-field' + (isFrac ? '' : ' hide') + (activeField === 'den' ? ' active' : '');
  $('f-div').className = 'frac-div' + (isFrac ? '' : ' hide');
  $('k-dot').className = 'kbtn dot' + ((isFrac || activeField === 'den') ? ' kdis' : '');
  var sb = $('k-slash');
  if (isFrac) { sb.className = 'kbtn slash active'; sb.textContent = '戻す'; }
  else { sb.className = 'kbtn slash' + (iNum.indexOf('.') >= 0 ? ' kdis' : ''); sb.textContent = '分数入力'; }
}
function setActiveField(f) { if (locked) return; if (f === 'den' && !isFrac) return; activeField = f; updateInput(); }
function toggleSign() {
  if (locked) return;
  iSign = (iSign === '+') ? '-' : '+';
  var b = $('sign-btn'); b.textContent = (iSign === '+') ? '＋' : '−';
  b.className = 'sign-btn ' + (iSign === '+' ? 'pos' : 'neg');
}
function kNum(ch) {
  if (locked) return;
  if (activeField === 'num') {
    if (iNum.replace(/[^0-9]/g, '').length >= 6) return;
    if (ch === '0' && iNum === '' && !isFrac) { iNum = '0'; updateInput(); return; }
    iNum += ch;
  } else {
    if (iDen.length >= 2) return;
    if (ch === '0' && iDen === '') return;
    iDen += ch;
  }
  updateInput();
}
function kSlash() {
  if (locked || iNum.indexOf('.') >= 0) return;
  if (isFrac) { isFrac = false; iDen = ''; activeField = 'num'; updateInput(); return; }
  isFrac = true; activeField = (iNum === '') ? 'num' : 'den'; updateInput();
}
function kDot() {
  if (locked || isFrac || activeField === 'den') return;
  if (iNum.indexOf('.') >= 0) return;
  if (iNum === '') iNum = '0';
  iNum += '.'; updateInput();
}
function kBack() {
  if (locked) return;
  if (activeField === 'den') { if (iDen.length > 0) iDen = iDen.slice(0, -1); else { isFrac = false; activeField = 'num'; } }
  else { if (iNum.length > 0) iNum = iNum.slice(0, -1); }
  updateInput();
}
function kClear() {
  if (locked) return;
  iSign = '+'; iNum = ''; iDen = ''; isFrac = false; activeField = 'num';
  var b = $('sign-btn'); b.textContent = '＋'; b.className = 'sign-btn pos';
  updateInput();
}
function getAnswer() {
  if (iNum === '' || iNum === '.' || iNum === '0.') return null;
  var s = (iSign === '-') ? -1 : 1;
  if (isFrac) {
    if (iDen === '') return null;
    var n = parseInt(iNum, 10), d = parseInt(iDen, 10);
    if (isNaN(n) || isNaN(d) || d === 0) return null;
    return R(s * n, d);
  }
  if (iNum.indexOf('.') >= 0) {
    var p = iNum.split('.');
    if (p.length !== 2 || !/^[0-9]*$/.test(p[0]) || !/^[0-9]+$/.test(p[1])) return null;
    var den = Math.pow(10, p[1].length), ip = p[0] === '' ? 0 : parseInt(p[0], 10);
    return R(s * (ip * den + parseInt(p[1], 10)), den);
  }
  if (!/^[0-9]+$/.test(iNum)) return null;
  return R(s * parseInt(iNum, 10), 1);
}
function getAnswerText() {
  var sgn = (iSign === '-') ? '−' : '';
  if (isFrac) return sgn + iNum + '/' + iDen;
  return sgn + iNum;
}

// ===== 式の自動フィット =====
function fitExpr() {
  var el = $('expr'); if (!el) return;
  el.style.fontSize = ''; el.style.flexWrap = 'nowrap'; el.style.justifyContent = 'flex-start';
  var avail = el.clientWidth, content = el.scrollWidth;
  if (avail > 0 && content > avail + 1) {
    var base = parseFloat(getComputedStyle(el).fontSize), target = base * (avail / content) * 0.96, min = 15;
    if (target < min) { el.style.fontSize = min + 'px'; el.style.flexWrap = 'wrap'; }
    else { el.style.fontSize = target + 'px'; }
  }
  el.style.justifyContent = '';
}

// ===== 進行 =====
function updateScoreBar() {
  $('q-count').textContent = Math.min(qIndex + 1, roundTotal);
  $('q-total').textContent = roundTotal;
  $('score-correct').textContent = correctCount;
  $('score-wrong').textContent = wrongCount;
  $('progress-fill').style.width = (qIndex / roundTotal * 100) + '%';
}

function newProblem() {
  if (retryQueue && retryQueue.length > 0) cur = retryQueue.shift();
  else cur = GENERATORS[currentMode]();
  locked = false;
  var el = $('expr');
  el.innerHTML = exprHTML(cur.ops, cur.opers);
  fitExpr();
  el.className = ''; void el.offsetWidth; el.className = 'show';
  $('card-qnum').textContent = qIndex + 1;
  $('card-badge').textContent = MODES[currentMode].name;
  iSign = '+'; iNum = ''; iDen = ''; isFrac = false; activeField = 'num';
  var sb = $('sign-btn'); sb.textContent = '＋'; sb.className = 'sign-btn pos';
  $('ans-row').className = 'ans-row';
  $('f-num').className = 'inp-field active';
  $('f-den').className = 'inp-field hide';
  $('f-div').className = 'frac-div hide';
  updateInput();
  $('fb').innerHTML = '';
  $('btn-chk').classList.remove('hide');
  $('btn-nxt').classList.add('hide');
  $('btn-skip').classList.remove('hide');
  $('keypad').classList.remove('kpad-off');
  $('kpad-hint').classList.remove('hide');
  updateScoreBar();
}

function checkAnswer() {
  if (locked) return;
  var ua = getAnswer();
  if (!ua) { $('fb').innerHTML = '<span style="color:#b45309">⚠ 答えを入力してください</span>'; return; }
  locked = true;
  var a = cur.ans, ok = (ua.n === a.n && ua.d === a.d);

  if (ok) { correctCount++; safeDivpCorrect('#q-card'); }
  else { wrongCount++; wrongProbs.push(cur); }

  Divp.answer(ok, {
    question_key: currentMode,
    question_params: { ops: cur.ops, opers: cur.opers, ans: cur.ans, flavor: cur.flavor, mixSec: cur.mixSec || null },
    question_text: exprText(cur.ops, cur.opers) + ' =',
    correct_answer: ansText(cur),
    wrong_answer: getAnswerText()
  });

  $('ans-row').className = 'ans-row locked';
  var nf = $('f-num'), df = $('f-den'), dv = $('f-div');
  if (ok) {
    nf.className = 'inp-field ok pulsing';
    if (isFrac) { df.className = 'inp-field ok'; dv.className = 'frac-div ok'; }
    setTimeout(function () { nf.className = 'inp-field ok'; }, 600);
    $('fb').innerHTML = '<span style="color:#166534;font-weight:700;font-size:1.05rem">✓ 正解！</span>';
  } else {
    nf.className = 'inp-field ng shaking';
    if (isFrac) { df.className = 'inp-field ng'; dv.className = 'frac-div ng'; }
    setTimeout(function () { nf.className = 'inp-field ng'; }, 400);
    $('fb').innerHTML = '<span style="color:#dc2626;font-weight:700">✗ 不正解</span>'
      + '<span style="color:#94a3b8">　正解：</span>'
      + '<span style="color:#166534;font-weight:700;font-family:\'Fira Mono\',monospace;display:inline-flex;align-items:center;gap:2px;">' + ansHTML(cur) + '</span>';
  }

  $('btn-chk').classList.add('hide');
  $('btn-skip').classList.add('hide');
  var nxt = $('btn-nxt');
  nxt.textContent = (qIndex + 1 >= roundTotal) ? '結果を見る →' : '次の問題 →';
  nxt.classList.remove('hide');
  $('keypad').classList.add('kpad-off');
  $('kpad-hint').classList.add('hide');
  updateScoreBar();
}

function nextProblem() {
  qIndex++;
  if (qIndex >= roundTotal) { showResult(); return; }
  newProblem();
}

function skipProblem() {
  if (locked) return;
  // スキップは不正解あつかいにせず問題だけ差し替える（解き直し中は後ろに回す）
  if (retryQueue) retryQueue.push(cur);
  if (retryQueue && retryQueue.length > 0) cur = retryQueue.shift();
  else cur = GENERATORS[currentMode]();
  var el = $('expr');
  el.innerHTML = exprHTML(cur.ops, cur.opers);
  fitExpr();
  el.className = ''; void el.offsetWidth; el.className = 'show';
}

function showResult() {
  $('progress-fill').style.width = '100%';
  var rate = roundTotal > 0 ? Math.round(correctCount / roundTotal * 100) : 0;
  var grade, color, msg;
  if (rate === 100) { grade = 'S'; color = '#f5c842'; msg = 'パーフェクト！すばらしい！'; }
  else if (rate >= 80) { grade = 'A'; color = '#22c55e'; msg = 'よくできました！'; }
  else if (rate >= 60) { grade = 'B'; color = '#3b82f6'; msg = 'あと少し！くり返し練習しよう'; }
  else { grade = 'C'; color = '#ef4444'; msg = 'まちがえた問題を解き直そう'; }

  var wrongBtn = (wrongProbs.length > 0)
    ? '<button class="btn-retry-wrong" id="btn-wrong-retry">✍ まちがえた問題を解き直す（' + wrongProbs.length + '問）</button>'
    : '';

  $('quiz-area').innerHTML =
    '<div class="result-screen">'
    + '<div class="result-grade" style="color:' + color + '">' + grade + '</div>'
    + '<div class="result-msg">' + msg + '</div>'
    + '<div class="result-breakdown">'
    +   '<div class="result-item c">正解 ' + correctCount + '問</div>'
    +   '<div class="result-item w">不正解 ' + wrongCount + '問</div>'
    + '</div>'
    + '<button class="btn-retry" id="btn-again">もう一度 ' + ROUND_N + '問</button>'
    + wrongBtn
    + '</div>';

  $('btn-again').addEventListener('click', function () { startRound(null, false); });
  if (wrongProbs.length > 0) {
    var probs = wrongProbs.slice();
    $('btn-wrong-retry').addEventListener('click', function () { startRound(probs, false); });
  }
}

function startRound(queue, dbRetry) {
  retryQueue = queue ? queue.slice() : null;
  isDbRetry = !!dbRetry;
  roundTotal = retryQueue ? retryQueue.length : ROUND_N;
  qIndex = 0; correctCount = 0; wrongCount = 0; wrongProbs = [];
  renderCard();
  newProblem();
}

// ===== モード切替 =====
function switchMode(mode) {
  currentMode = mode;
  MODE_KEYS.forEach(function (m) {
    var b = $('mode-' + m); if (b) b.classList.toggle('active', mode === m);
  });
  $('main-title').textContent = MODES[mode].title;
  $('main-subtitle').textContent = MODES[mode].sub;
  startRound(null, false);
}
MODE_KEYS.forEach(function (m) {
  $('mode-' + m).addEventListener('click', function () { switchMode(m); });
});

// モード一覧の開閉
(function () {
  var sw = $('mode-switcher'), tg = $('mode-toggle');
  function refresh() {
    var collapsed = sw.classList.contains('collapsed');
    $('mode-toggle-label').textContent = collapsed ? ('モード：' + MODES[currentMode].name + '（タップで変更）') : 'モードを選ぶ';
    $('mode-toggle-chev').textContent = collapsed ? '▼' : '▲';
  }
  tg.addEventListener('click', function () { sw.classList.toggle('collapsed'); refresh(); });
  sw.addEventListener('click', function (e) {
    if (e.target.closest('.mode-btn')) { sw.classList.add('collapsed'); refresh(); }
  });
  refresh();
})();

// ===== キーボード =====
document.addEventListener('keydown', function (e) {
  if (!$('f-num')) return;   // 結果画面など
  var k = e.key;
  if (locked) { if (k === 'Enter') nextProblem(); return; }
  if (k === 'Enter') { checkAnswer(); e.preventDefault(); return; }
  if (k === 'Backspace') { kBack(); e.preventDefault(); return; }
  if (k === 'Delete') { kClear(); return; }
  if (k === '-' || k === '−' || k === '+') { toggleSign(); return; }
  if (k === '/') { kSlash(); return; }
  if (k === '.') { kDot(); return; }
  if (/^[0-9]$/.test(k)) { kNum(k); e.preventDefault(); }
});
window.addEventListener('resize', fitExpr);

// ===== 印刷（A4・現在モード10問＋解答） =====
function openPrint() {
  var items = '', keys = '';
  for (var i = 1; i <= 10; i++) {
    var p = GENERATORS[currentMode]();
    items += '<div class="p-item"><span class="no">(' + i + ')</span><span class="p-ex">' + exprHTML(p.ops, p.opers) + '</span></div>';
    keys += '<div><span class="no">(' + i + ')</span> &nbsp;' + ansHTML(p) + '</div>';
  }
  $('print-area').innerHTML =
    '<div class="p-sheet"><div class="ph-head"><div class="ph-title">正負の数マスター　' + MODES[currentMode].title + '（' + NT_LABEL[cfgNumType] + '）</div>'
    + '<div class="ph-school">中京個別指導学院　www.chukyokobetsu.com</div></div>'
    + '<div class="ph-meta"><span class="ph-name">名前：</span><span>得点：　　／10</span></div>'
    + '<div class="p-grid">' + items + '</div>'
    + '<div class="p-keypage p-sheet"><div class="ph-head"><div class="ph-title">解答</div><div class="ph-school">中京個別指導学院</div></div>'
    + '<div class="p-kgrid">' + keys + '</div></div></div>';
  window.print();
}
$('title-print-btn').addEventListener('click', openPrint);

// ===== DB解き直し（?retry=1 で開いたとき） =====
function startDbRetry(key, items) {
  currentMode = key;
  MODE_KEYS.forEach(function (m) {
    var b = $('mode-' + m); if (b) b.classList.toggle('active', key === m);
  });
  $('main-title').textContent = MODES[key].title;
  $('main-subtitle').textContent = MODES[key].sub;
  var probs = items.map(function (it) {
    var p = it.question_params;
    return { flavor: p.flavor, mixSec: p.mixSec || null, ops: p.ops, opers: p.opers, ans: p.ans };
  });
  startRound(probs, true);
}

// ===== 数の種類チップ =====
document.querySelectorAll('.nt-chip').forEach(function (btn) {
  btn.addEventListener('click', function () {
    if (cfgNumType === btn.dataset.nt) return;
    cfgNumType = btn.dataset.nt;
    document.querySelectorAll('.nt-chip').forEach(function (b) { b.classList.toggle('on', b === btn); });
    startRound(null, false);   // 数の種類を変えたらラウンドを仕切り直す
  });
});

// ===== 初期化 =====
switchMode('dofugo');

Divp.getRetries().then(function (items) {
  if (!items || !items.length) return;
  var byKey = {};
  items.forEach(function (it) {
    if (!MODES[it.question_key]) return;
    if (!validParams(it.question_params)) return;   // 古い形式は再出題不可
    (byKey[it.question_key] = byKey[it.question_key] || []).push(it);
  });
  var keys = Object.keys(byKey);
  if (!keys.length) return;

  var btns = keys.map(function (k) {
    return '<button class="btn-retry-wrong" data-retry-key="' + k + '">'
      + '🔁 ' + MODES[k].name + ' の解き直し（' + byKey[k].length + '問）</button>';
  }).join('');

  $('quiz-area').innerHTML =
    '<div class="result-screen">'
    + '<div style="font-size:14px;color:#64748b;letter-spacing:0.1em;margin-bottom:8px;">RETRY</div>'
    + '<div style="font-size:20px;font-weight:900;color:#0a1628;margin-bottom:4px;">きょうの解き直し</div>'
    + '<div style="font-size:13px;color:#64748b;">まちがえた問題と全く同じ問題が出ます。<br>2回連続で正解すると「マスター」になります。</div>'
    + btns
    + '<button class="btn-retry" id="retry-cancel-btn" style="margin-top:16px;">ふつうに練習する</button>'
    + '</div>';

  document.querySelectorAll('[data-retry-key]').forEach(function (btn) {
    btn.addEventListener('click', function () { startDbRetry(btn.dataset.retryKey, byKey[btn.dataset.retryKey]); });
  });
  $('retry-cancel-btn').addEventListener('click', function () { startRound(null, false); });
});
</script>
