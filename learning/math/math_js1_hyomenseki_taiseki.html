<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{

<script id="main">
'use strict';
/* 学習記録システムの単元ID（＝ファイル名と一致）。ファイルパスから自動生成しない */
const UNIT_KEY='math_js1_hyomenseki_taiseki';
/* ================= utils ================= */
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const pick=a=>a[ri(0,a.length-1)];
const SUP2='<sup>2</sup>',SUP3='<sup>3</sup>';
function piWrap(k){return (k===1?'':k)+'π';}
function fmtAns(a){const p=[];if(a.pi)p.push(piWrap(a.pi));if(a.num)p.push(String(a.num));if(!p.length)p.push('0');return p.join('＋');}
function ansVal(a){return a.pi*Math.PI+a.num;}
function parseExpr(s){
  if(!s)return null;
  const parts=s.split('＋');let pi=0,num=0;
  for(const p of parts){
    if(!p)return null;
    const m=p.match(/^([0-9]*)π$/);
    if(m){pi+=(m[1]===''?1:parseInt(m[1],10));continue;}
    if(/^[0-9]+$/.test(p)){num+=parseInt(p,10);continue;}
    return null;
  }
  return {pi,num};
}
/* ================= 問題ジェネレータ ================= */
/* --- 体積 --- */
function genVolCube(){const a=ri(3,6),v=a*a*a;return{key:'vol_cube',unit:'cm³',xp:10,ans:{pi:0,num:v},
 text:`1辺が <b>${a}cm</b> の立方体の<b>体積</b>を求めましょう。`,
 expl:`体積 ＝ 1辺 × 1辺 × 1辺<br>＝ ${a} × ${a} × ${a} ＝ <b>${v} cm${SUP3}</b>`,
 fig:{t:'solid',kind:'cube',d:{a}}};}
function genVolCuboid(){const a=ri(2,6),b=ri(2,6),c=ri(2,6),v=a*b*c;return{key:'vol_cuboid',unit:'cm³',xp:10,ans:{pi:0,num:v},
 text:`縦 <b>${a}cm</b>、横 <b>${b}cm</b>、高さ <b>${c}cm</b> の直方体の<b>体積</b>を求めましょう。`,
 expl:`体積 ＝ 縦 × 横 × 高さ<br>＝ ${a} × ${b} × ${c} ＝ <b>${v} cm${SUP3}</b>`,
 fig:{t:'solid',kind:'box',d:{w:b,h:c,dp:a}}};}
function genVolTriPrism(){const s=pick([[3,4,5],[6,8,10]]),p=s[0],q=s[1],hy=s[2],L=ri(3,7);const base=p*q/2,v=base*L;
 return{key:'vol_triprism',unit:'cm³',xp:10,ans:{pi:0,num:v},
 text:`底面が直角三角形（直角をはさむ2辺が <b>${p}cm</b> と <b>${q}cm</b>）で、高さが <b>${L}cm</b> の三角柱の<b>体積</b>を求めましょう。`,
 expl:`底面積 ＝ ${q} × ${p} ÷ 2 ＝ ${base} (cm${SUP2})<br>体積 ＝ 底面積 × 高さ ＝ ${base} × ${L} ＝ <b>${v} cm${SUP3}</b>`,
 fig:{t:'solid',kind:'prism',d:{p,q,hy,L}}};}
function genVolCyl(){const r=ri(2,4),h=ri(3,7),k=r*r*h;return{key:'vol_cyl',unit:'cm³',xp:10,ans:{pi:k,num:0},
 text:`底面の半径が <b>${r}cm</b>、高さが <b>${h}cm</b> の円柱の<b>体積</b>を求めましょう。`,
 expl:`底面積 ＝ π × ${r} × ${r} ＝ ${piWrap(r*r)} (cm${SUP2})<br>体積 ＝ 底面積 × 高さ ＝ ${piWrap(r*r)} × ${h} ＝ <b>${piWrap(k)} cm${SUP3}</b>`,
 fig:{t:'solid',kind:'cyl',d:{r,h}}};}
function genVolPyr(){const a=ri(3,6),h=pick([3,6]),v=a*a*h/3;return{key:'vol_pyr',unit:'cm³',xp:10,ans:{pi:0,num:v},
 text:`底面が1辺 <b>${a}cm</b> の正方形で、高さが <b>${h}cm</b> の正四角錐の<b>体積</b>を求めましょう。`,
 expl:`錐（すい）の体積 ＝ <b>1/3</b> × 底面積 × 高さ<br>＝ 1/3 × ${a*a} × ${h} ＝ <b>${v} cm${SUP3}</b>`,
 fig:{t:'solid',kind:'pyr',d:{a,h,showH:true}}};}
function genVolCone(){const r=ri(2,5),h=pick([3,6]),k=r*r*h/3;return{key:'vol_cone',unit:'cm³',xp:10,ans:{pi:k,num:0},
 text:`底面の半径が <b>${r}cm</b>、高さが <b>${h}cm</b> の円錐の<b>体積</b>を求めましょう。`,
 expl:`錐（すい）の体積 ＝ <b>1/3</b> × 底面積 × 高さ<br>＝ 1/3 × ${piWrap(r*r)} × ${h} ＝ <b>${piWrap(k)} cm${SUP3}</b>`,
 fig:{t:'solid',kind:'cone',d:{r,h,showH:true}}};}
function genVolSphere(){const r=pick([3,6]),k=4*r*r*r/3;return{key:'vol_sphere',unit:'cm³',xp:10,ans:{pi:k,num:0},
 text:`半径が <b>${r}cm</b> の球の<b>体積</b>を求めましょう。`,
 expl:`球の体積 ＝ <b>4/3</b> × π × 半径 × 半径 × 半径<br>＝ 4/3 × π × ${r}³ ＝ 4/3 × ${piWrap(r*r*r)} ＝ <b>${piWrap(k)} cm${SUP3}</b>`,
 fig:{t:'solid',kind:'sphere',d:{r}}};}
/* --- 表面積 --- */
function genSurfCube(){const a=ri(3,7),v=6*a*a;return{key:'surf_cube',unit:'cm²',xp:10,ans:{pi:0,num:v},
 text:`1辺が <b>${a}cm</b> の立方体の<b>表面積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【展開】ボタンで展開図が見られるよ</span>`,
 expl:`正方形の面が6つ。<br>1つの面 ＝ ${a} × ${a} ＝ ${a*a} (cm${SUP2})<br>表面積 ＝ ${a*a} × 6 ＝ <b>${v} cm${SUP2}</b>`,
 fig:{t:'solid',kind:'cube',d:{a}}};}
function genSurfCuboid(){const a=ri(2,6),b=ri(2,6),c=ri(2,6),v=2*(a*b+b*c+c*a);return{key:'surf_cuboid',unit:'cm²',xp:10,ans:{pi:0,num:v},
 text:`縦 <b>${a}cm</b>、横 <b>${b}cm</b>、高さ <b>${c}cm</b> の直方体の<b>表面積</b>を求めましょう。`,
 expl:`同じ形の面が2つずつ3組ある。<br>(${a}×${b} ＋ ${b}×${c} ＋ ${c}×${a}) × 2<br>＝ (${a*b} ＋ ${b*c} ＋ ${c*a}) × 2 ＝ <b>${v} cm${SUP2}</b>`,
 fig:{t:'solid',kind:'box',d:{w:b,h:c,dp:a}}};}
function genSurfTriPrism(){const s=pick([1,2]),p=3*s,q=4*s,hy=5*s,L=ri(3,7);const base=p*q/2,side=(p+q+hy)*L,v=base*2+side;
 return{key:'surf_triprism',unit:'cm²',xp:10,ans:{pi:0,num:v},
 text:`底面が直角三角形（3辺が <b>${p}cm</b>・<b>${q}cm</b>・<b>${hy}cm</b>）で、高さが <b>${L}cm</b> の三角柱の<b>表面積</b>を求めましょう。`,
 expl:`底面（直角三角形）2つ ＝ ${q}×${p}÷2 × 2 ＝ ${base*2} (cm${SUP2})<br>展開すると側面は「縦${L}cm・横(${p}＋${q}＋${hy})cm」の長方形。<br>側面積 ＝ ${p+q+hy} × ${L} ＝ ${side} (cm${SUP2})<br>表面積 ＝ ${base*2} ＋ ${side} ＝ <b>${v} cm${SUP2}</b>`,
 fig:{t:'solid',kind:'prism',d:{p,q,hy,L,showHy:true}}};}
function genSurfCyl(){const r=ri(2,4),h=ri(3,7),k=2*r*r+2*r*h;return{key:'surf_cyl',unit:'cm²',xp:10,ans:{pi:k,num:0},
 text:`底面の半径が <b>${r}cm</b>、高さが <b>${h}cm</b> の円柱の<b>表面積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【展開】ボタンで確かめてみよう</span>`,
 expl:`展開すると、側面は「縦＝高さ、横＝底面の円周」の長方形。<br>底面の円周 ＝ 2 × π × ${r} ＝ ${piWrap(2*r)} (cm)<br>側面積 ＝ ${h} × ${piWrap(2*r)} ＝ ${piWrap(2*r*h)} (cm${SUP2})<br>底面2つ ＝ ${piWrap(r*r)} × 2 ＝ ${piWrap(2*r*r)} (cm${SUP2})<br>表面積 ＝ ${piWrap(2*r*h)} ＋ ${piWrap(2*r*r)} ＝ <b>${piWrap(k)} cm${SUP2}</b>`,
 fig:{t:'solid',kind:'cyl',d:{r,h}}};}
function genSurfPyr(){const s=pick([[6,5,4],[8,5,3],[12,10,8]]),a=s[0],m=s[1],h=s[2];const v=a*a+2*a*m;
 return{key:'surf_pyr',unit:'cm²',xp:10,ans:{pi:0,num:v},
 text:`底面が1辺 <b>${a}cm</b> の正方形で、側面の二等辺三角形の高さが <b>${m}cm</b> の正四角錐の<b>表面積</b>を求めましょう。`,
 expl:`底面 ＝ ${a} × ${a} ＝ ${a*a} (cm${SUP2})<br>側面の三角形1つ ＝ ${a} × ${m} ÷ 2 ＝ ${a*m/2} (cm${SUP2})<br>それが4つ ＝ ${a*m/2} × 4 ＝ ${2*a*m} (cm${SUP2})<br>表面積 ＝ ${a*a} ＋ ${2*a*m} ＝ <b>${v} cm${SUP2}</b>`,
 fig:{t:'solid',kind:'pyr',d:{a,h,m,showM:true}}};}
function genSurfCone(){const s=pick([[3,4,5],[6,8,10],[8,6,10],[4,3,5]]),r=s[0],h=s[1],l=s[2];const k=r*(r+l);
 return{key:'surf_cone',unit:'cm²',xp:10,ans:{pi:k,num:0},
 text:`底面の半径が <b>${r}cm</b>、母線の長さが <b>${l}cm</b> の円錐の<b>表面積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【展開】ボタンでおうぎ形を確かめよう</span>`,
 expl:`展開すると、側面は半径${l}cm（母線）のおうぎ形。弧の長さ＝底面の円周 ＝ ${piWrap(2*r)} (cm)<br>おうぎ形の面積 ＝ 1/2 × 弧 × 半径 ＝ 1/2 × ${piWrap(2*r)} × ${l} ＝ ${piWrap(r*l)} (cm${SUP2})<br>底面 ＝ ${piWrap(r*r)} (cm${SUP2})<br>表面積 ＝ ${piWrap(r*l)} ＋ ${piWrap(r*r)} ＝ <b>${piWrap(k)} cm${SUP2}</b>`,
 fig:{t:'solid',kind:'cone',d:{r,h,l,showL:true}}};}
function genSurfSphere(){const r=ri(2,5),k=4*r*r;return{key:'surf_sphere',unit:'cm²',xp:10,ans:{pi:k,num:0},
 text:`半径が <b>${r}cm</b> の球の<b>表面積</b>を求めましょう。`,
 expl:`球の表面積 ＝ <b>4</b> × π × 半径 × 半径<br>＝ 4 × π × ${r} × ${r} ＝ <b>${piWrap(k)} cm${SUP2}</b>`,
 fig:{t:'solid',kind:'sphere',d:{r}}};}
/* --- 回転体 --- */
function genKaiCyl(){const r=ri(2,4),h=ri(3,6),isV=Math.random()<0.5;
 const fig={t:'lathe',pts:[[0,0],[r,0],[r,h],[0,h]],labels:[{x:r/2,y:-0.6,text:r+'cm'},{x:r+0.7,y:h/2,text:h+'cm'}]};
 if(isV){const k=r*r*h;return{key:'kai_cyl_v',unit:'cm³',xp:15,ans:{pi:k,num:0},fig,
  text:`図の長方形（横 <b>${r}cm</b>・縦 <b>${h}cm</b>）を、直線ℓを軸として1回転させます。できる立体の<b>体積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【回転】ボタンで確かめられるよ</span>`,
  expl:`できる立体は、底面の半径${r}cm・高さ${h}cmの<b>円柱</b>。<br>体積 ＝ π × ${r}² × ${h} ＝ <b>${piWrap(k)} cm${SUP3}</b>`};}
 const k=2*r*r+2*r*h;return{key:'kai_cyl_s',unit:'cm²',xp:15,ans:{pi:k,num:0},fig,
  text:`図の長方形（横 <b>${r}cm</b>・縦 <b>${h}cm</b>）を、直線ℓを軸として1回転させます。できる立体の<b>表面積</b>を求めましょう。`,
  expl:`できる立体は、底面の半径${r}cm・高さ${h}cmの<b>円柱</b>。<br>側面積 ＝ ${h} × 2π×${r} ＝ ${piWrap(2*r*h)}、底面2つ ＝ ${piWrap(2*r*r)}<br>表面積 ＝ ${piWrap(2*r*h)} ＋ ${piWrap(2*r*r)} ＝ <b>${piWrap(k)} cm${SUP2}</b>`};}
function genKaiCone(){const s=pick([[3,4,5],[4,3,5],[6,8,10],[8,6,10]]),r=s[0],h=s[1],l=s[2],isV=Math.random()<0.5;
 const fig={t:'lathe',pts:[[0,0],[r,0],[0,h]],labels:[{x:r/2,y:-0.6,text:r+'cm'},{x:-0.8,y:h/2,text:h+'cm'},{x:r/2+0.6,y:h/2+0.3,text:l+'cm'}]};
 if(isV){const k=r*r*h/3;return{key:'kai_cone_v',unit:'cm³',xp:15,ans:{pi:k,num:0},fig,
  text:`図の直角三角形（底辺 <b>${r}cm</b>・高さ <b>${h}cm</b>・斜辺 <b>${l}cm</b>）を、直線ℓを軸として1回転させます。できる立体の<b>体積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【回転】ボタンで確かめられるよ</span>`,
  expl:`できる立体は、底面の半径${r}cm・高さ${h}cmの<b>円錐</b>。<br>体積 ＝ 1/3 × π × ${r}² × ${h} ＝ 1/3 × ${piWrap(r*r*h)} ＝ <b>${piWrap(k)} cm${SUP3}</b>`};}
 const k=r*(r+l);return{key:'kai_cone_s',unit:'cm²',xp:15,ans:{pi:k,num:0},fig,
  text:`図の直角三角形（底辺 <b>${r}cm</b>・高さ <b>${h}cm</b>・斜辺 <b>${l}cm</b>）を、直線ℓを軸として1回転させます。できる立体の<b>表面積</b>を求めましょう。`,
  expl:`できる立体は、底面の半径${r}cm・母線${l}cmの<b>円錐</b>。<br>側面積 ＝ 1/2 × 弧(＝${piWrap(2*r)}) × ${l} ＝ ${piWrap(r*l)}、底面 ＝ ${piWrap(r*r)}<br>表面積 ＝ ${piWrap(r*l)} ＋ ${piWrap(r*r)} ＝ <b>${piWrap(k)} cm${SUP2}</b>`};}
function genKaiSphere(){const r=pick([3,6]),isV=Math.random()<0.5;
 const pts=[];for(let i=0;i<=24;i++){const t=Math.PI*i/24;pts.push([r*Math.sin(t),r-r*Math.cos(t)]);}
 const fig={t:'lathe',pts,labels:[{x:r/2,y:r+0.45,text:r+'cm'}],lines:[{a:[0,r],b:[r,r]}]};
 if(isV){const k=4*r*r*r/3;return{key:'kai_sphere_v',unit:'cm³',xp:15,ans:{pi:k,num:0},fig,
  text:`図の半円（半径 <b>${r}cm</b>）を、直線ℓを軸として1回転させます。できる立体の<b>体積</b>を求めましょう。`,
  expl:`できる立体は半径${r}cmの<b>球</b>。<br>体積 ＝ 4/3 × π × ${r}³ ＝ <b>${piWrap(k)} cm${SUP3}</b>`};}
 const k=4*r*r;return{key:'kai_sphere_s',unit:'cm²',xp:15,ans:{pi:k,num:0},fig,
  text:`図の半円（半径 <b>${r}cm</b>）を、直線ℓを軸として1回転させます。できる立体の<b>表面積</b>を求めましょう。`,
  expl:`できる立体は半径${r}cmの<b>球</b>。<br>表面積 ＝ 4 × π × ${r}² ＝ <b>${piWrap(k)} cm${SUP2}</b>`};}
function genKaiPipe(){const d=ri(1,2),w=ri(1,2),h=ri(3,6),R=d+w,isV=Math.random()<0.55;
 const fig={t:'lathe',pts:[[d,0],[R,0],[R,h],[d,h]],closed:true,
  labels:[{x:d/2,y:-0.75,text:d+'cm'},{x:d+w/2,y:-1.55,text:w+'cm'},{x:R+0.7,y:h/2,text:h+'cm'}],
  lines:[{a:[0,-0.35],b:[d,-0.35]},{a:[d,-1.15],b:[R,-1.15]}]};
 if(isV){const k=(R*R-d*d)*h;return{key:'kai_pipe_v',unit:'cm³',xp:15,ans:{pi:k,num:0},fig,
  text:`図の長方形（横 <b>${w}cm</b>・縦 <b>${h}cm</b>）は、直線ℓから <b>${d}cm</b> 離れています。直線ℓを軸として1回転させてできる立体の<b>体積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【回転】ボタンで確かめられるよ</span>`,
  expl:`できる立体は、大きい円柱から小さい円柱をくり抜いた<b>パイプ形</b>。<br>大きい円柱：半径${R}cm → ${piWrap(R*R)}×${h} ＝ ${piWrap(R*R*h)}<br>小さい円柱：半径${d}cm → ${piWrap(d*d)}×${h} ＝ ${piWrap(d*d*h)}<br>体積 ＝ ${piWrap(R*R*h)} − ${piWrap(d*d*h)} ＝ <b>${piWrap(k)} cm${SUP3}</b>`};}
 const k=2*R*h+2*d*h+2*(R*R-d*d);return{key:'kai_pipe_s',unit:'cm²',xp:15,ans:{pi:k,num:0},fig,
  text:`図の長方形（横 <b>${w}cm</b>・縦 <b>${h}cm</b>）は、直線ℓから <b>${d}cm</b> 離れています。直線ℓを軸として1回転させてできる立体の<b>表面積</b>を求めましょう。`,
  expl:`できる立体は<b>パイプ形</b>。表面は「外側の側面・内側の側面・上下のドーナツ形2つ」。<br>外側 ＝ 2π×${R}×${h} ＝ ${piWrap(2*R*h)}<br>内側 ＝ 2π×${d}×${h} ＝ ${piWrap(2*d*h)}<br>ドーナツ形2つ ＝ (${piWrap(R*R)}−${piWrap(d*d)})×2 ＝ ${piWrap(2*(R*R-d*d))}<br>表面積 ＝ <b>${piWrap(k)} cm${SUP2}</b>`};}
function genKaiStep(){const R=pick([3,4]),r=ri(1,R-1),h1=ri(2,4),h2=ri(2,4),isV=Math.random()<0.5;
 const fig={t:'lathe',pts:[[0,0],[R,0],[R,h1],[r,h1],[r,h1+h2],[0,h1+h2]],
  labels:[{x:R/2,y:-0.6,text:R+'cm'},{x:r/2,y:h1+h2+0.55,text:r+'cm'},{x:R+0.7,y:h1/2,text:h1+'cm'},{x:r+0.7,y:h1+h2/2,text:h2+'cm'}],
  lines:[{a:[0,h1+h2+0.25],b:[r,h1+h2+0.25]}],rings:[{y:h1,r:R},{y:h1,r:r}]};
 if(isV){const k=R*R*h1+r*r*h2;return{key:'kai_step_v',unit:'cm³',xp:15,ans:{pi:k,num:0},fig,
  text:`図の形を、直線ℓを軸として1回転させます。できる立体の<b>体積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【回転】ボタンで確かめられるよ</span>`,
  expl:`できる立体は、円柱の上に円柱が乗った<b>2段の形</b>。<br>下の円柱 ＝ ${piWrap(R*R)}×${h1} ＝ ${piWrap(R*R*h1)}<br>上の円柱 ＝ ${piWrap(r*r)}×${h2} ＝ ${piWrap(r*r*h2)}<br>体積 ＝ ${piWrap(R*R*h1)} ＋ ${piWrap(r*r*h2)} ＝ <b>${piWrap(k)} cm${SUP3}</b>`};}
 const k=2*R*h1+2*r*h2+2*R*R;return{key:'kai_step_s',unit:'cm²',xp:15,ans:{pi:k,num:0},fig,
  text:`図の形を、直線ℓを軸として1回転させます。できる立体の<b>表面積</b>を求めましょう。（★工夫して求めよう）`,
  expl:`側面：下の段 ＝ 2π×${R}×${h1} ＝ ${piWrap(2*R*h1)}、上の段 ＝ 2π×${r}×${h2} ＝ ${piWrap(2*r*h2)}<br>★上下の面の工夫：<b>真上から見ても真下から見ても、半径${R}cmの円</b>に見える！<br>→ 上下の面の合計 ＝ ${piWrap(R*R)} × 2 ＝ ${piWrap(2*R*R)}<br>表面積 ＝ ${piWrap(2*R*h1)} ＋ ${piWrap(2*r*h2)} ＋ ${piWrap(2*R*R)} ＝ <b>${piWrap(k)} cm${SUP2}</b>`};}
function genKaiConeCyl(){const r=ri(2,4),h1=ri(2,5),h2=pick([3,6]);const k=r*r*h1+r*r*h2/3;
 const fig={t:'lathe',pts:[[0,0],[r,0],[r,h1],[0,h1+h2]],
  labels:[{x:r/2,y:-0.6,text:r+'cm'},{x:r+0.7,y:h1/2,text:h1+'cm'},{x:r/2+0.7,y:h1+h2/2+0.3,text:h2+'cm'}],rings:[{y:h1,r:r}]};
 return{key:'kai_conecyl_v',unit:'cm³',xp:15,ans:{pi:k,num:0},fig,
  text:`図の形を、直線ℓを軸として1回転させます。できる立体の<b>体積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【回転】ボタンで確かめられるよ</span>`,
  expl:`できる立体は、円柱の上に円錐が乗った形。<br>円柱 ＝ ${piWrap(r*r)}×${h1} ＝ ${piWrap(r*r*h1)}<br>円錐 ＝ 1/3 × ${piWrap(r*r)}×${h2} ＝ ${piWrap(r*r*h2/3)}<br>体積 ＝ ${piWrap(r*r*h1)} ＋ ${piWrap(r*r*h2/3)} ＝ <b>${piWrap(k)} cm${SUP3}</b>`};}
function genKaiBicone(){const isV=Math.random()<0.5;
 if(isV){const r=pick([3,6]),h1=ri(2,6),h2=ri(2,6),k=r*r*(h1+h2)/3;
  const fig={t:'lathe',pts:[[0,0],[r,h1],[0,h1+h2]],
   labels:[{x:r/2+0.5,y:h1+0.25,text:r+'cm'},{x:-0.8,y:h1/2,text:h1+'cm'},{x:-0.8,y:h1+h2/2,text:h2+'cm'}],
   lines:[{a:[0,h1],b:[r,h1]}],rings:[{y:h1,r:r}]};
  return{key:'kai_bicone_v',unit:'cm³',xp:15,ans:{pi:k,num:0},fig,
   text:`図の三角形を、直線ℓを軸として1回転させます。できる立体（<b>円錐が2つくっついた形</b>）の<b>体積</b>を求めましょう。<br><span style="font-size:.85em;color:#6a5f52">【回転】ボタンで確かめられるよ</span>`,
   expl:`上下2つの円錐に分けて考える（底面はどちらも半径${r}cmの円）。<br>下の円錐 ＝ 1/3×${piWrap(r*r)}×${h1} ＝ ${piWrap(r*r*h1/3)}<br>上の円錐 ＝ 1/3×${piWrap(r*r)}×${h2} ＝ ${piWrap(r*r*h2/3)}<br>体積 ＝ 1/3×${piWrap(r*r)}×(${h1}＋${h2}) ＝ <b>${piWrap(k)} cm${SUP3}</b>`};}
 const s=pick([[3,4,5],[4,3,5],[6,8,10]]),r=s[0],h=s[1],l=s[2],k=2*r*l;
 const fig={t:'lathe',pts:[[0,0],[r,h],[0,2*h]],
  labels:[{x:-0.8,y:h,text:r+'cm'},{x:r/2+0.6,y:h/2,text:l+'cm'}],
  lines:[{a:[0,h],b:[r,h]}],rings:[{y:h,r:r}]};

    }
    geo.attributes.position.needsUpdate=true;geo.computeVertexNormals();
    rebuildRim();
    const i0=cols+1,i1=cols+1+cols;
    seamA.geometry.setFromPoints([new THREE.Vector3(0,h,0),new THREE.Vector3(pa[i0*3],pa[i0*3+1],pa[i0*3+2])]);
    seamB.geometry.setFromPoints([new THREE.Vector3(0,h,0),new THREE.Vector3(pa[i1*3],pa[i1*3+1],pa[i1*3+2])]);

    piv.rotation.z=-Math.PI*t;

function buildSolid(fig){
  const d=fig.d;
  switch(fig.kind){
    case 'cube':return buildBoxSolid(d.a,d.a,d.a,{labels:[{text:d.a+'cm',x:0,y:-0.45,z:d.a/2+0.2}]});
    case 'box':return buildBoxSolid(d.w,d.h,d.dp,{color:true});
    case 'prism':return buildTriPrism(d.p,d.q,d.hy,d.L,d.showHy);
    case 'cyl':return buildCylinder(d.r,d.h);

    case 'cone':return buildCone(d.r,d.h,{showH:d.showH,showL:d.showL,l:d.l});

function makeProfileGroup(fig,color,op){

  for(let i=1;i<fig.pts.length;i++)shape.lineTo(fig.pts[i][0],fig.pts[i][1]);

function faceShape2(shape,color,op){

function buildLathe(fig){
  const g=new THREE.Group();
  const ys=fig.pts.map(p=>p[1]),xs=fig.pts.map(p=>p[0]);
  const maxY=Math.max.apply(null,ys),minY=Math.min.apply(null,ys);
  const ax=lineSeg([[0,minY-1.4,0],[0,maxY+1.4,0]],true,COL.ink);
  g.add(ax);
  addLabel(g,'ℓ',0.45,maxY+1.25,0);
  const prof=makeProfileGroup(fig,COL.top,0.95);g.add(prof);
  const endCap=makeProfileGroup(fig,COL.top,0.95);endCap.visible=false;g.add(endCap);
  if(fig.lines)fig.lines.forEach(L=>{g.add(lineSeg([[L.a[0],L.a[1],0.01],[L.b[0],L.b[1],0.01]],false,COL.red));});
  if(fig.labels)fig.labels.forEach(L=>addLabel(g,L.text,L.x,L.y,0));
  const ringLines=[];
  const ringTube=Math.max(0.028,Math.max(maxY,Math.max.apply(null,xs))*0.006);
  if(fig.rings)fig.rings.forEach(function(rg){
    const m=new THREE.Mesh(new THREE.TorusGeometry(rg.r,ringTube,6,8,0.01),new THREE.MeshBasicMaterial({color:0x2e2b45}));
    m.rotation.x=-Math.PI/2;m.position.y=rg.y;m.visible=false;m.userData.noBounds=true;m.renderOrder=3;
    g.add(m);ringLines.push({y:rg.y,r:rg.r,tube:ringTube,mesh:m});
  });
  const pts2=fig.pts.map(p=>new THREE.Vector2(p[0],p[1]));
  if(fig.closed)pts2.push(pts2[0].clone());
  let latheMesh=null;
  function setSweep(phi){
    CUR.sweepPhi=phi;
    if(latheMesh){g.remove(latheMesh);latheMesh.geometry.dispose();latheMesh.material.dispose();latheMesh=null;}
    endCap.visible=(phi>0.03&&phi<Math.PI*2-0.03);
    endCap.rotation.y=phi;
    if(phi>0.03){
      const segs=Math.max(4,Math.round(64*phi/(Math.PI*2)));
      const lg=new THREE.LatheGeometry(pts2,segs,Math.PI/2,phi);
      latheMesh=new THREE.Mesh(lg,faceMat(COL.side));
      g.add(latheMesh);
    }
    ringLines.forEach(function(rl){
      rl.mesh.visible=(phi>0.03);
      if(phi<=0.03)return;
      const seg=Math.max(3,Math.round(64*phi/(Math.PI*2)));
      rl.mesh.geometry.dispose();
      rl.mesh.geometry=new THREE.TorusGeometry(rl.r,rl.tube,6,seg,phi);
    });
  }
  return{group:g,setSweep:setSweep};
}

const R2={anim:null,prog:0,trace:null};
function polyInit(n,a,q){
  if(n===3)return[[0,0],[a,0],[a/2,a*Math.sqrt(3)/2]];
  q=q||a;
  return[[0,0],[a,0],[a,q],[0,q]];
}
function rotPt(p,c,ang){
  const s=Math.sin(ang),co=Math.cos(ang);
  const dx=p[0]-c[0],dy=p[1]-c[1];
  return[c[0]+dx*co-dy*s,c[1]+dx*s+dy*co];
}
function bottomRight(pts){
  let best=null;
  for(const p of pts){if(Math.abs(p[1])<1e-4){if(!best||p[0]>best[0])best=p;}}
  return best||pts[0];
}
function polyState(n,a,g,q){
  let pts=polyInit(n,a,q);
  const th=-2*Math.PI/n;
  const gg=Math.max(0,Math.min(g,n));
  const k=Math.floor(Math.min(gg,n-1e-9)),f=gg-k;
  for(let i=0;i<k;i++){
    const piv=bottomRight(pts);
    pts=pts.map(p=>rotPt(p,piv,th)).map(p=>[p[0],Math.abs(p[1])<1e-6?0:p[1]]);
  }
  if(f>1e-9){
    const piv=bottomRight(pts);
    pts=pts.map(p=>rotPt(p,piv,th*f));
  }
  return pts;
}
function buildTrace(n,a,q){
  const N=n*80,S2=[];
  for(let j=0;j<=N;j++)S2.push(polyState(n,a,j/80,q)[0]);
  return S2;
}
function coutTotal(l,w,r){return 2*(l+w)+2*Math.PI*r;}
function coutPoint(l,w,r,s){
  const q=Math.PI*r/2;
  const segs=[
    {len:l,f:function(u){return[u,-r];}},
    {len:q,c:[l,0],a0:-Math.PI/2},
    {len:w,f:function(u){return[l+r,u];}},
    {len:q,c:[l,w],a0:0},
    {len:l,f:function(u){return[l-u,w+r];}},
    {len:q,c:[0,w],a0:Math.PI/2},
    {len:w,f:function(u){return[-r,w-u];}},
    {len:q,c:[0,0],a0:Math.PI}
  ];
  let rem=Math.max(0,Math.min(s,coutTotal(l,w,r)));
  for(const sg of segs){
    if(rem<=sg.len+1e-9){
      if(sg.f)return sg.f(rem);
      const ang=sg.a0+rem/r;
      return[sg.c[0]+r*Math.cos(ang),sg.c[1]+r*Math.sin(ang)];
    }
    rem-=sg.len;
  }
  return[0,-r];
}
function cinPoint(l,w,r,s){
  const L1=l-2*r,W1=w-2*r;
  const segs=[
    {len:L1,f:function(u){return[r+u,r];}},
    {len:W1,f:function(u){return[l-r,r+u];}},
    {len:L1,f:function(u){return[l-r-u,w-r];}},
    {len:W1,f:function(u){return[r,w-r-u];}}
  ];
  let rem=Math.max(0,Math.min(s,2*(L1+W1)));
  for(const sg of segs){
    if(rem<=sg.len+1e-9)return sg.f(rem);
    rem-=sg.len;
  }
  return[r,r];
}
function draw2D(){

  if(!cv||!st)return;
  const w=st.clientWidth,h=st.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  if(cv.width!==Math.round(w*dpr)||cv.height!==Math.round(h*dpr)){cv.width=Math.round(w*dpr);cv.height=Math.round(h*dpr);}
  const x=cv.getContext('2d');
  x.setTransform(dpr,0,0,dpr,0,0);
  x.clearRect(0,0,w,h);
  const A=R2.anim;if(!A)return;

  if(A.type==='poly'){
    const tr=R2.trace||[];const big=Math.max(A.a,A.q||A.a);
    let mxx=(A.n+1)*A.a,mxy=1.3*A.a,mnx=0;
    if(tr.length){mnx=1e9;mxx=-1e9;mxy=0;for(const pt of tr){if(pt[0]<mnx)mnx=pt[0];if(pt[0]>mxx)mxx=pt[0];if(pt[1]>mxy)mxy=pt[1];}}
    bx0=mnx-0.5;bx1=mxx+big*0.5+0.5;by0=-0.4;by1=mxy+0.6;
  }
  else if(A.type==='cline'){const W2=2*Math.PI*A.r*A.n;bx0=-A.r-0.6;bx1=W2+A.r+0.6;by0=-0.9;by1=2*A.r+0.9;}
  else if(A.type==='cout'){bx0=-2*A.r-0.6;bx1=A.l+2*A.r+0.6;by0=-2*A.r-0.6;by1=A.w+2*A.r+0.6;}
  else{bx0=-0.6;bx1=A.l+0.6;by0=-0.6;by1=A.w+0.6;}
  const sc=Math.min((w-36)/(bx1-bx0),(h-108)/(by1-by0));
  const ox=(w-(bx1-bx0)*sc)/2-bx0*sc;

  x.lineJoin='round';x.lineCap='round';x.textBaseline='alphabetic';
  let legend='';

    x.font='italic 700 16px serif';x.fillStyle=INK;x.fillText('ℓ',w-22,Y(0)+20);
    const tr=R2.trace||[];
    const cur=Math.max(0,Math.round(R2.prog*(tr.length-1)));
    if(A.area&&cur>1){
      x.beginPath();x.moveTo(X(tr[0][0]),Y(tr[0][1]));
      for(let i=1;i<=cur;i++)x.lineTo(X(tr[i][0]),Y(tr[i][1]));
      x.lineTo(X(tr[cur][0]),Y(0));x.lineTo(X(tr[0][0]),Y(0));
      x.closePath();x.fillStyle='rgba(201,85,107,0.20)';x.fill();
    }
    if(A.area){
      // 補助線：各回転の中心(ピボット)から頂点Aの弧の両端へ半径を引き、おうぎ形に分ける
      const g=R2.prog*A.n;

  }else if(A.type==='cout'){

function resize3d(){
  if(!threeOK)return;

function setupDrag(cv){
  const P=new Map();let lastD=0,downXY=null,moved=0;
  const ray=new THREE.Raycaster();
  function tryTap(e){
    if(!threeOK||!CUR.taps||!CUR.taps.length||CUR.unfoldT<0.9)return;
    const rect=cv.getBoundingClientRect();
    const ndc=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
    ray.setFromCamera(ndc,camera);
    for(const tp of CUR.taps){if(ray.intersectObject(tp.mesh,false).length){tp.play();break;}}
  }
  cv.addEventListener('pointerdown',function(e){cv.setPointerCapture(e.pointerId);P.set(e.pointerId,[e.clientX,e.clientY]);if(P.size===1){downXY=[e.clientX,e.clientY];moved=0;}});
  cv.addEventListener('pointermove',function(e){
    if(!P.has(e.pointerId))return;
    const prev=P.get(e.pointerId);P.set(e.pointerId,[e.clientX,e.clientY]);
    if(P.size===1){
      moved+=Math.abs(e.clientX-prev[0])+Math.abs(e.clientY-prev[1]);
      spinG.rotation.y+=(e.clientX-prev[0])*0.008;
      tiltG.rotation.x=Math.max(-0.6,Math.min(1.15,tiltG.rotation.x+(e.clientY-prev[1])*0.006));
    }else if(P.size===2){
      const pts=Array.from(P.values());
      const d=Math.hypot(pts[0][0]-pts[1][0],pts[0][1]-pts[1][1]);
      if(lastD>0)VIEW.distT=Math.max(4,Math.min(140,VIEW.distT*lastD/d));
      lastD=d;
    }
  });
  const up=function(e){
    if(P.size===1&&downXY&&moved<7)tryTap(e);
    P.delete(e.pointerId);lastD=0;
  };
  cv.addEventListener('pointerup',up);
  cv.addEventListener('pointercancel',up);
  cv.addEventListener('wheel',function(e){e.preventDefault();
    VIEW.distT=Math.max(4,Math.min(140,VIEW.distT*(1+e.deltaY*0.001)));},{passive:false});
}
function boundsOf(){
  const box=new THREE.Box3();let any=false;
  spinG.traverse(function(n){
    if(n.userData&&n.userData.noBounds)return;
    if((n.isMesh||n.isLine||n.isLineSegments)&&n.geometry){
      n.geometry.computeBoundingBox();
      const bb=n.geometry.boundingBox;
      if(bb&&isFinite(bb.min.x)&&isFinite(bb.max.x)){
        box.union(bb.clone().applyMatrix4(n.matrixWorld));any=true;
      }
    }
  });
  return any?box:null;
}
function fitCamera(pad,opts){
  if(!threeOK)return null;
  pad=pad||1;opts=opts||{};
  spinG.updateWorldMatrix(true,true);
  const box=boundsOf();if(!box)return null;
  const sp=box.getBoundingSphere(new THREE.Sphere());
  VIEW.cyT=sp.center.y;
  VIEW.distT=Math.max(6,sp.radius*2.6*pad);
  if(opts.center){VIEW.cxT=sp.center.x;VIEW.czT=sp.center.z;}
  else{VIEW.cxT=0;VIEW.czT=0;}
  return sp;
}

function addShadow(rad){
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const x=c.getContext('2d');
  const gr=x.createRadialGradient(64,64,4,64,64,62);
  gr.addColorStop(0,'rgba(70,58,40,0.20)');gr.addColorStop(1,'rgba(70,58,40,0)');
  x.fillStyle=gr;x.fillRect(0,0,128,128);
  const tex=new THREE.CanvasTexture(c);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(rad*2.4,rad*2.4),
    new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false}));
  m.rotation.x=-Math.PI/2;m.position.y=-0.03;
  m.userData.noBounds=true;m.renderOrder=-1;
  if(CUR.obj)CUR.obj.add(m);

function showFigure(fig,opts){
  opts=opts||{};

  if(opts.keepView&&threeOK){keepYaw=spinG.rotation.y;keepTilt=tiltG.rotation.x;}
  clearFigure();

  const is2d=!!(fig&&fig.t==='roll');
  $('c3d').style.display=is2d?'none':'block';

    R2.anim=fig.anim;R2.prog=0;R2.trace=null;

  if(CUR.setUnfold){
    const b=$('btnUnfold');b.classList.remove('hidden');b.textContent='▤ 展開する';}

    scaleLabels(spinG,Math.max(0.8,Math.min(2.4,sp.radius/4.5)));

function toggleUnfold(){
  if(!CUR.setUnfold||!CUR.obj)return;
  const target=CUR.unfoldTarget>0.5?0:1;
  CUR.unfoldTarget=target;
  const from=CUR.unfoldT;
  $('btnUnfold').textContent=target===1?'▣ 組み立てる':'▤ 展開する';
  if(target===1){VIEW.distT=VIEW.distT*1.8;VIEW.elevT=CUR.netFront?0.06:1.45;}
  else{VIEW.elevT=0.42;}
  const fromYaw=spinG.rotation.y,fromTilt=tiltG.rotation.x;
  const toYaw=target===1?(CUR.unfoldYaw||0):DEF_YAW,toTilt=target===1?0:DEF_TILT;
  tween(1200,function(k){
    CUR.unfoldT=from+(target-from)*k;
    if(CUR.setUnfold)CUR.setUnfold(CUR.unfoldT);
    spinG.rotation.y=fromYaw+(toYaw-fromYaw)*k;
    tiltG.rotation.x=fromTilt+(toTilt-fromTilt)*k;
  },function(){fitCamera(target===1?1.12:1.08,{center:target===1});});
}
function toggleSweep(){
  if(!CUR.setSweep)return;

    CUR.sweepOn=true;

  S.lastKey=q.key;S.q=q;S.expr='';S.answered=false;S.qcount++;
  $('qno').textContent=(label||('【'+(MODENAME[S.mode]||'練習')+'】'))+'第'+S.qcount+'問';

  $('expl').classList.add('hidden');$('expl').innerHTML='';
  $('checkbtn').disabled=false;
  $('nextbtn').classList.add('hidden');

  try{$('stage').querySelectorAll('.divp-hanko,.divp-nice').forEach(function(e){e.remove();});}catch(e){}
  showFigure(q.fig);

function newQuestion(){
  /* 解き直しキュー（?retry=1）があれば、pendingを同一問題で消化する */
  if(S.retryQueue&&S.retryQueue.length){renderQ(S.retryQueue.shift(),'【解き直し】');return;}
  const gens=GENS[S.mode];if(!gens)return;
  let q=pick(gens)();
  for(let i=0;i<8&&q.key===S.lastKey;i++)q=pick(gens)();
  renderQ(q);
}
/* ?retry=1 で開いたとき、api/list_retries.php の pending を question_params から
   完全復元して出題する。&focus=<params_hash> 付きなら その1問だけ（mypageの今日の1問用）。*/
function initRetry(){
  const focus=(location.search.match(/[?&]focus=([a-f0-9]{64})/i)||[])[1];
  Divp.getRetries().then(function(items){
    let use=(items||[]).filter(function(it){return it&&it.question_params&&it.question_params.fig&&it.question_params.ans&&it.question_params.key;});
    if(focus)use=use.filter(function(it){return it.params_hash===focus;});
    if(!use.length)return;              /* 対象なし → 通常の学ぶモード表示のまま */
    S.retryQueue=use.map(function(it){return it.question_params;});
    openAcc('quiz');                    /* → setMode → newQuestion がキューを消化 */
  }).catch(function(){});
}
function renderExpr(){
  const d=$('ansdisp');

  else{d.textContent='？';d.classList.add('ph');}
}
function buildTenkey(){
  const keys=['1','2','3','4','5','6','7','8','9','0','π','＋','⌫','C'];
  const tk=$('tenkey');
  keys.forEach(function(k){
    const b=document.createElement('button');
    b.type='button';b.textContent=k;b.className='tk';
    if(k==='π')b.classList.add('pi');
    if(k==='＋')b.classList.add('op');

  if(S.answered)return;
  if(k==='C')S.expr='';

function feedbackMsg(t,cls){const f=$('feedback');f.textContent=t;f.className=cls;}
function shakeAns(){const b=$('ansbox');b.classList.remove('err');void b.offsetWidth;b.classList.add('err');}
function renderStreak(){$('streak').textContent=S.streak>=2?'🔥×'+S.streak:'';}
function onCheck(){
  if(!S.q||S.answered)return;
  if(!S.expr){feedbackMsg('答えを入力してね','');return;}
  const p=parseExpr(S.expr);
  if(!p){feedbackMsg('式の形を確かめてね（例：12π＋16）','ng');shakeAns();return;}
  const ok=Math.abs(ansVal(p)-ansVal(S.q.ans))<1e-6;
  S.answered=true;
  $('checkbtn').disabled=true;
  $('nextbtn').classList.remove('hidden');
  const correct=fmtAns(S.q.ans)+' '+S.q.unit;
  if(ok){
    S.streak++;
    feedbackMsg('⭕ 正解！','ok');
    safeCorrect();
  }else{
    S.streak=0;
    feedbackMsg('✖ 残念…　正解は '+correct,'ng');
    shakeAns();
    safeIncorrect();
  }
  renderStreak();
  $('expl').innerHTML='<div class="ehead">解説</div>'+S.q.expl;
  $('expl').classList.remove('hidden');
  /* 学習記録システムへ送信（判定直後に1行）。question_params は再出題用の完全表現 */
  safeAnswer(ok,{
    question_key:S.q.key,
    question_params:qParams(S.q),
    question_text:$('qtext').textContent,
    correct_answer:correct,
    wrong_answer:ok?null:(S.expr+' '+S.q.unit)
  });
}

   rows:['頂点Aが描く線の長さ ＝ おうぎ形3つ ≒ <b>'+fmtNum(Math.PI*(2+Math.sqrt(2))/2*a)+' cm</b> <span class="labtag">対角線に√2（中3）</span>',
         '頂点Aと直線ℓで囲まれた面積 ＝ <b>'+fmtPi(a*a)+'＋'+fmtNum(a*a)+' cm²</b>']};}},
 roll_rect:{name:'長方形の転がし',note:'頂点Aはおうぎ形の弧を描く（回転の角はいつも90°）。囲まれた図形＝おうぎ形3つ（半径は 縦・対角線・横）＋直角三角形2つ（＝長方形1つぶん）。［▶転がす］',
  params:[{k:'p',label:'横',min:2,max:8,val:5},{k:'q',label:'縦',min:2,max:8,val:3}],
  compute:function(v){const p=v.p,q=v.q;return{
   fig:{t:'roll',anim:{type:'poly',n:4,a:p,q:q,area:true}},
   rows:['頂点Aと直線ℓで囲まれた面積 ＝ おうぎ形3つ＋長方形1つ ＝ <b>'+fmtPi((p*p+q*q)/2)+'＋'+fmtNum(p*q)+' cm²</b>',
         '頂点Aが描く線の長さ ＝ おうぎ形3つ ≒ <b>'+fmtNum(Math.PI/2*(p+q+Math.sqrt(p*p+q*q)))+' cm</b> <span class="labtag">対角線に√（中3）</span>']};}},
 roll_cline:{name:'円の直線転がし',note:'すべらず1回転すると円周ぶん進む。中心Oはℓと平行にまっすぐ動く。［▶転がす］',
  params:[{k:'r',label:'半径',min:1,max:5,val:2},{k:'n',label:'回転数',min:1,max:4,val:2,unit:'回'}],
  compute:function(v){const r=v.r,n=v.n;return{
   fig:{t:'roll',anim:{type:'cline',r:r,n:n}},
   rows:['中心Oが描く線の長さ ＝ 2π×'+r+'×'+n+' ＝ <b>'+fmtPi(2*r*n)+' cm</b>']};}},
 roll_cout:{name:'円が長方形の外側を1周',note:'辺にそう部分＋角の弧。4つの角でOは半径＝円の半径の弧を描き、合わせて円1個ぶん。［▶転がす］',
  params:[{k:'l',label:'横',min:4,max:9,val:6},{k:'w',label:'縦',min:3,max:8,val:5},{k:'r',label:'円の半径',min:1,max:2,val:2}],
  compute:function(v){const l=v.l,w=v.w,r=v.r;return{
   fig:{t:'roll',anim:{type:'cout',l:l,w:w,r:r,area:true}},
   rows:['中心Oが描く線の長さ ＝ <b>'+fmtPi(2*r)+'＋'+fmtNum(2*(l+w))+' cm</b>',
         '円が通った部分の面積 ＝ <b>'+fmtPi(4*r*r)+'＋'+fmtNum(4*r*(l+w))+' cm²</b>']};}},
 roll_cin:{name:'円が長方形の内側を1周',note:'中心Oはどの辺からも半径ぶん内側を動く。角はぴったり曲がるので、なんと πは出てこない！［▶転がす］',
  params:[{k:'l',label:'横',min:6,max:10,val:8},{k:'w',label:'縦',min:5,max:9,val:6},{k:'r',label:'円の半径',min:1,max:2,val:1}],
  compute:function(v){const l=v.l,w=v.w,r=v.r;return{
   fig:{t:'roll',anim:{type:'cin',l:l,w:w,r:r}},
   rows:['中心Oが描く線の長さ ＝ ('+(l-2*r)+'＋'+(w-2*r)+')×2 ＝ <b>'+fmtNum(2*((l-2*r)+(w-2*r)))+' cm</b>']};}}
};
const LABV={};
(function(){for(const kind in LABDEF){LABV[kind]={};LABDEF[kind].params.forEach(function(p){LABV[kind][p.k]=p.val;});}})();
function valStr(o,pi,sup){
  const pre=o.approx?'≒ ':'';
  const val=pi?fmtPi(o.k):fmtNum(o.val);
  return o.f+' ＝ <b>'+pre+val+' cm'+sup+'</b>';
}
let labRAF=0;
function scheduleLab(){if(labRAF)return;labRAF=requestAnimationFrame(function(){labRAF=0;renderLab();});}
function renderLab(){
  const kind=S.lab,def=LABDEF[kind],c=def.compute(LABV[kind]);
  showFigure(c.fig,{keepView:true});
  let h='<span class="fname">'+def.name+'</span>';
  if(c.extra)h+='<div class="labextra">'+c.extra+'</div>';
  if(c.rows){c.rows.forEach(function(r){h+='<div class="labline">'+r+'</div>';});}
  else{
    h+='<div class="labline">体積　'+valStr(c.V,c.pi,'³')+'</div>';
    h+='<div class="labline">表面積　'+valStr(c.S,c.pi,'²')+'</div>';
  }
  h+='<div class="labnote">'+def.note+'</div>';
  $('labvals').innerHTML=h;
}
function autoSpin(){
  if(!threeOK)return;
  for(let i=TW.length-1;i>=0;i--)if(TW[i].spin)TW.splice(i,1);
  const from=spinG.rotation.y;
  TW.push({t0:performance.now(),dur:1500,linear:true,spin:true,fn:function(k){spinG.rotation.y=from+2*Math.PI*k;}});
}
function buildSliders(kind){
  const def=LABDEF[kind],box=$('labsliders');
  box.innerHTML='';
  def.params.forEach(function(p){
    const unit=p.unit||'cm';
    const row=document.createElement('div');row.className='slrow';
    const lab=document.createElement('span');lab.className='sllabel';
    lab.innerHTML=p.label+' <b>'+LABV[kind][p.k]+'</b>'+unit;
    const inp=document.createElement('input');
    inp.type='range';inp.min=p.min;inp.max=p.max;inp.step=1;inp.value=LABV[kind][p.k];
    inp.addEventListener('input',function(){
      LABV[kind][p.k]=parseInt(inp.value,10);
      lab.innerHTML=p.label+' <b>'+LABV[kind][p.k]+'</b>'+unit;
      scheduleLab();
      if(p.spinOnChange)autoSpin();
    });
    row.appendChild(lab);row.appendChild(inp);box.appendChild(row);
  });
}
function showLab(kind){
  S.lab=kind;
  document.querySelectorAll('#labchips .chip').forEach(function(b){
    b.classList.toggle('on',b.dataset.solid===kind);});
  buildSliders(kind);
  renderLab();
}
function setMode(m){
  S.mode=m;
  if(m!=='lab')S.lastQuiz=m;
  document.querySelectorAll('#accQuiz .chip').forEach(function(b){
    b.classList.toggle('on',b.dataset.mode===m);});
  const lab=(m==='lab');
  $('labpick').classList.toggle('hidden',!lab);
  $('labinfo').classList.toggle('hidden',!lab);
  $('qcard').classList.toggle('hidden',lab);
  $('anscard').classList.toggle('hidden',lab);
  if(lab){S.lastKey='';if(threeOK){spinG.rotation.y=DEF_YAW;tiltG.rotation.x=DEF_TILT;}showLab(S.lab);}
  else{S.qcount=0;newQuestion();}
}
function openAcc(which){
  // 同じパネルの矢印をもう一度押したら閉じる（モード・出題は維持したままメニューだけ畳む）
  if(S.openPanel===which){
    S.openPanel=null;
    $('accLearn').classList.remove('open');
    $('accQuiz').classList.remove('open');
    return;
  }
  S.openPanel=which;
  const learn=(which==='learn');
  $('accLearn').classList.toggle('open',learn);
  $('accQuiz').classList.toggle('open',!learn);
  // モードが実際に変わるときだけ出題し直す（畳んで開き直しただけなら今の問題を保つ）
  const wantMode=learn?'lab':(S.lastQuiz||'vol');
  if(S.mode!==wantMode)setMode(wantMode);
}
/* ---- メインループ ---- */
function loop(){
  requestAnimationFrame(loop);
  runTweens(performance.now());
  VIEW.dist+=(VIEW.distT-VIEW.dist)*0.12;
  VIEW.cy+=(VIEW.cyT-VIEW.cy)*0.12;
  VIEW.cx+=(VIEW.cxT-VIEW.cx)*0.12;
  VIEW.cz+=(VIEW.czT-VIEW.cz)*0.12;
  VIEW.elev+=(VIEW.elevT-VIEW.elev)*0.12;
  if(threeOK&&$('c3d').style.display!=='none'){
    const elev=VIEW.elev;
    camera.position.set(VIEW.cx,VIEW.cy+Math.sin(elev)*VIEW.dist,VIEW.cz+Math.cos(elev)*VIEW.dist);
    camera.lookAt(VIEW.cx,VIEW.cy,VIEW.cz);
    renderer.render(scene,camera);
  }
  if($('c2d').style.display==='block')draw2D();
}
function boot(){
  buildTenkey();
  renderStreak();
  initThree();
  document.querySelectorAll('.acc-head').forEach(function(b){
    b.addEventListener('click',function(){openAcc(b.dataset.acc);});});
  document.querySelectorAll('#accQuiz .chip').forEach(function(b){
    b.addEventListener('click',function(){setMode(b.dataset.mode);});});
  document.querySelectorAll('#labchips .chip').forEach(function(b){
    b.addEventListener('click',function(){showLab(b.dataset.solid);});});
  $('checkbtn').addEventListener('click',onCheck);
  $('nextbtn').addEventListener('click',newQuestion);
  $('btnUnfold').addEventListener('click',toggleUnfold);
  $('btnSweep').addEventListener('click',toggleSweep);
  $('btnRoll').addEventListener('click',playRoll);
  $('btnView').addEventListener('click',function(){
    if(!threeOK)return;
    const unfolded=CUR.unfoldTarget>0.5;
    const toYaw=unfolded?(CUR.unfoldYaw||0):DEF_YAW,toTilt=unfolded?0:DEF_TILT;
    const fy=spinG.rotation.y,fx=tiltG.rotation.x;
    tween(500,function(k){spinG.rotation.y=fy+(toYaw-fy)*k;tiltG.rotation.x=fx+(toTilt-fx)*k;});
    VIEW.elevT=unfolded?(CUR.netFront?0.06:1.45):0.42;
    fitCamera(CUR.setSweep?1.45:(unfolded?1.12:1),{center:unfolded});
  });
  window.addEventListener('resize',resize3d);
  openAcc('learn');
  /* ---- 学習記録システム連携（未ログイン/ローカル起動時は黙ってスキップ） ---- */
  if(window.Divp&&typeof Divp.init==='function'){try{Divp.init(UNIT_KEY);}catch(e){}}
  if(/[?&]retry=1/.test(location.search)&&window.Divp&&typeof Divp.getRetries==='function'){
    try{initRetry();}catch(e){}
  }
  loop();
}
if(typeof window!=='undefined'&&typeof document!=='undefined'){
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
  else boot();
}
</script>
