  <div class="type-grid">
    <button class="type-btn active" data-m="all"    >
      <span class="t-icon">🔀</span><span class="t-label">ランダム</span><span class="t-desc">全種ミックス</span>
    </button>
    <button class="type-btn" data-m="abs2num">
      <span class="t-icon">🎯</span><span class="t-label">絶対値→数</span><span class="t-desc">絶対値から数を選ぶ</span>
    </button>
    <button class="type-btn" data-m="num2abs">
      <span class="t-icon">🔢</span><span class="t-label">数→絶対値</span><span class="t-desc">数の絶対値を答える</span>
    </button>
    <button class="type-btn" data-m="range">
      <span class="t-icon">📏</span><span class="t-label">範囲の整数</span><span class="t-desc">条件を満たす整数</span>
    </button>
    <button class="type-btn" data-m="count">
      <span class="t-icon">⚠️</span><span class="t-label">個数問題</span><span class="t-desc">ひっかけ注意！</span>
    </button>
    <button class="type-btn" data-m="sort">
      <span class="t-icon">🔃</span><span class="t-label">大小順に並べる</span><span class="t-desc">タップして並べ替え</span>
    </button>
  </div>

  <div class="prog-wrap">
    <div class="prog-info"><span>正答率</span><span id="prog-pct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0"></div></div>
  </div>

  <div id="q-area"><div class="empty">↑ 上で設定を選ぶと問題が始まります</div></div>
</div>

</div><!-- /#zettaichi-app -->

<script>(function(){
'use strict';

const S={mode:'all',diff:'easy',correct:0,wrong:0,total:0,answered:false};
const DCFG={
  easy:  {maxInt:5,  denoms:[2,3,4,5],       decPl:1},
  normal:{maxInt:10, denoms:[2,3,4,5,6,8],   decPl:2},
  hard:  {maxInt:20, denoms:[2,3,4,5,6,8,10],decPl:2},
};
const DC=()=>DCFG[S.diff];
const M=()=>DC().maxInt;

const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuf=a=>[...a].sort(()=>Math.random()-.5);
const _$=id=>document.getElementById(id);
const rd=(v,p)=>{const f=10**p;return Math.round(v*f)/f};

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b]}return a;}
function reduce(n,d){
  if(d<0){n=-n;d=-d;}
  const g=gcd(Math.abs(n),d);
  return {n:n/g, d:d/g};
}
function genReducedFrac(sign){
  const denoms=DC().denoms;
  let n,d,r;
  let tries=0;
  do{
    d=pick(denoms);
    n=ri(1,d*M());
    r=reduce(n,d);
    tries++;
  }while(r.d===1 && tries<50);
  return {n:sign*r.n, d:r.d, val:sign*r.n/r.d};
}

function setDiff(d){dbRetryQueue=null;S.diff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.d===d));gen();}
function setMode(m){dbRetryQueue=null;S.mode=m;document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));gen();}
function upScore(){
  _$('sc').textContent=S.correct;_$('sw').textContent=S.wrong;_$('st').textContent=S.total;
  const pct=S.total?Math.round(S.correct/S.total*100):0;
  _$('prog-pct').textContent=pct+'%';_$('prog-fill').style.width=pct+'%';
}
function pickKind(){return pick(['integer','integer','decimal','frac']);}

function fracHTML(n,d){
  const isNeg=n<0;
  const an=Math.abs(n);
  const inner=`<span class="frac"><span class="fn">${an}</span><span class="fd">${d}</span></span>`;
  if(isNeg){
    return `<span class="frac-wrap"><span class="frac-sign">−</span>${inner}</span>`;
  }
  return `<span class="frac-wrap">${inner}</span>`;
}
function trimDec(val, places){ return String(rd(val, places)); }

function valHTML(kind,val,n,d){
  if(kind==='frac') return fracHTML(n,d);
  if(kind==='decimal') return `<span class="num-box">${trimDec(val,DC().decPl)}</span>`;
  return `<span class="num-box">${val}</span>`;
}
function makeKey(kind,val,n,d){
  if(kind==='frac') return `${n}/${d}`;
  if(kind==='decimal') return trimDec(val,DC().decPl);
  return String(val);
}
function itemBtnHTML(it){
  const esc=it.key.replace(/"/g,'&quot;');
  if(it.kind==='frac'){
    const isNeg=it.n<0;
    const an=Math.abs(it.n);
    const signSpan=isNeg?`<span class="btn-frac-sign">−</span>`:'';
    return `<button class="ch-btn frac-btn" data-k="${esc}" data-sel="0" onclick="ZA_onChoice(this)">
      ${signSpan}
      <span class="btn-frac">
        <span class="fn">${an}</span>
        <span class="fd">${it.d}</span>
      </span>
    </button>`;
  }
  const label=it.kind==='decimal'?trimDec(it.val,DC().decPl):String(it.val);
  return `<button class="ch-btn plain-btn" data-k="${esc}" data-sel="0" onclick="ZA_onChoice(this)">${label}</button>`;
}

function dummyOf(kind,keySet,count){
  const out=[];let tries=0;
  while(out.length<count&&tries<300){
    tries++;
    let item;
    if(kind==='integer'){
      const v=ri(-M(),M());
      const k=String(v);
      if(keySet.has(k))continue;
      keySet.add(k);item={kind,val:v,n:null,d:null,key:k};
    }else if(kind==='decimal'){
      const p=DC().decPl;const f=10**p;
      const v=rd((ri(0,M()*2*f)-M()*f)/f,p);
      const k=trimDec(v,p);
      if(keySet.has(k))continue;
      keySet.add(k);item={kind,val:v,n:null,d:null,key:k};
    }else{
      const sign=pick([-1,1]);
      const fr=genReducedFrac(sign);
      const k=makeKey('frac',fr.val,fr.n,fr.d);
      if(keySet.has(k))continue;
      keySet.add(k);item={kind:'frac',val:fr.val,n:fr.n,d:fr.d,key:k};
    }
    out.push(item);
  }
  return out;
}

function decToFrac(val){
  const p=DC().decPl;
  const f=10**p;
  const n=Math.round(val*f);
  if(n===0)return null;
  const r=reduce(n,f);
  if(r.d===1)return null;
  return r;
}
function fracToDec(n,d){
  const p=DC().decPl;
  const v=n/d;
  const rounded=rd(v,p);
  if(Math.abs(v-rounded)>1e-9)return null;
  return rounded;
}

function makeItem(kind,val,n,d){
  const p=DC().decPl;
  const key=kind==='frac'?`${n}/${d}`:kind==='decimal'?trimDec(val,p):String(val);
  return {kind,val,n:n??null,d:d??null,key};
}

function mkAbs2Num(){
  const kind=pickKind();
  const p=DC().decPl;
  let absV, posItems=[], negItems=[], absDisp, hint;

  if(kind==='integer'){
    absV=ri(1,M());
    posItems=[makeItem('integer',absV,null,null)];
    negItems=[makeItem('integer',-absV,null,null)];
    absDisp=`<span class="num-box">${absV}</span>`;
    hint='プラスとマイナス、両方考えよう！';
  }else if(kind==='decimal'){
    const f=10**p;
    absV=rd(ri(1,M()*f)/f,p);
    posItems=[makeItem('decimal',absV,null,null)];
    negItems=[makeItem('decimal',-absV,null,null)];
    absDisp=`<span class="num-box">${trimDec(absV,p)}</span>`;
    hint='小数でもプラスとマイナスがあります！';
    if(Math.random()<0.5){
      const fr=decToFrac(absV);
      if(fr){
        posItems.push(makeItem('frac',absV,fr.n,fr.d));
        negItems.push(makeItem('frac',-absV,-fr.n,fr.d));
        hint='小数と同じ大きさの分数も正解です！';
      }
    }
  }else{
    const fr=genReducedFrac(1);
    absV=fr.val;
    posItems=[makeItem('frac',fr.val,fr.n,fr.d)];
    negItems=[makeItem('frac',-fr.val,-fr.n,fr.d)];
    absDisp=fracHTML(fr.n,fr.d);
    hint='分数でもプラスとマイナスの両方を考えよう！';
    if(Math.random()<0.5){
      const dv=fracToDec(fr.n,fr.d);
      if(dv!==null){
        posItems.push(makeItem('decimal',dv,null,null));
        negItems.push(makeItem('decimal',-dv,null,null));
        hint='分数と同じ大きさの小数も正解です！';
      }
    }
  }

  const ansKeys=[...posItems.map(i=>i.key),...negItems.map(i=>i.key)];
  const keySet=new Set(ansKeys);
  const dummies=dummyOf(kind,keySet,Math.max(2,5-ansKeys.length));
  const allItems=shuf([...posItems,...negItems,...dummies]);

  return {
    tp:'abs2num',multi:true,kind,
    stamp:'絶対値\n→数',sc:'st1',
    label:'TYPE 1 ─ 絶対値から数を選ぶ',
    qhtml:`絶対値が ${absDisp} となる数をすべて選んでください。`,
    qtext:`絶対値が ${posItems[0].key} となる数をすべて選んでください。`,
    hint,
    items:allItems,ans:ansKeys,
    nl:{hiVals:[...posItems.map(i=>i.val),...negItems.map(i=>i.val)],
        rMin:-Math.ceil(absV+1.5),rMax:Math.ceil(absV+1.5)},
  };
}

function mkNum2Abs(){
  const kind=pickKind();
  const p=DC().decPl;
  let aVal,aN,aD,absV,items,correctKeys,hint;

  if(kind==='integer'){
    aVal=-ri(1,M()); absV=Math.abs(aVal);
    const correct=makeItem('integer',absV,null,null);
    const trap=makeItem('integer',aVal,null,null);
    correctKeys=[correct.key];
    const keySet=new Set([correct.key,trap.key]);
    const dummies=dummyOf('integer',keySet,3);
    items=shuf([correct,trap,...dummies]);
    hint='負の数の絶対値は符号を外した値。元のマイナスの数を選ばないように！';
  }else if(kind==='decimal'){
    aVal=rd(-ri(1,M()*(10**p))/(10**p),p); absV=Math.abs(aVal);
    const correct=makeItem('decimal',absV,null,null);
    const trap=makeItem('decimal',aVal,null,null);
    correctKeys=[correct.key];
    hint='負の小数の絶対値は符号を外した値です！';
    if(Math.random()<0.5){
      const fr=decToFrac(absV);
      if(fr){
        const correctFrac=makeItem('frac',absV,fr.n,fr.d);
        correctKeys=[correct.key,correctFrac.key];
        const trapFrac=makeItem('frac',-absV,-fr.n,fr.d);
        const keySet=new Set([correct.key,correctFrac.key,trap.key,trapFrac.key]);
        const dummies=dummyOf('frac',keySet,1);
        items=shuf([correct,correctFrac,trap,trapFrac,...dummies]);
        hint='この小数と同じ大きさの分数も正解です！';
      }else{
        const keySet=new Set([correct.key,trap.key]);
        const dummies=dummyOf('decimal',keySet,3);
        items=shuf([correct,trap,...dummies]);
      }
    }else{
      const keySet=new Set([correct.key,trap.key]);
      const dummies=dummyOf('decimal',keySet,3);
      items=shuf([correct,trap,...dummies]);
    }
  }else{
    const fr=genReducedFrac(-1);
    aVal=fr.val; aN=fr.n; aD=fr.d;
    absV=Math.abs(fr.val);
    const absN=Math.abs(fr.n), absD=fr.d;
    const correct=makeItem('frac',absV,absN,absD);
    const trap=makeItem('frac',fr.val,fr.n,fr.d);
    correctKeys=[correct.key];
    hint='負の分数の絶対値は符号を外した値。元のマイナス分数を選ばないように！';
    if(Math.random()<0.5){
      const dv=fracToDec(absN,absD);
      if(dv!==null){
        const correctDec=makeItem('decimal',dv,null,null);
        const trapDec=makeItem('decimal',-dv,null,null);
        correctKeys=[correct.key,correctDec.key];
        const keySet=new Set([correct.key,correctDec.key,trap.key,trapDec.key]);
        const dummies=dummyOf('frac',keySet,1);
        items=shuf([correct,correctDec,trap,trapDec,...dummies]);
        hint='この分数と同じ大きさの小数も正解です！';
      }else{
        const keySet=new Set([correct.key,trap.key]);
        const dummies=dummyOf('frac',keySet,3);
        items=shuf([correct,trap,...dummies]);
      }
    }else{
      const keySet=new Set([correct.key,trap.key]);
      const dummies=dummyOf('frac',keySet,3);
      items=shuf([correct,trap,...dummies]);
    }
  }

  const aHTML=valHTML(kind,aVal,aN,aD);
  const isMulti=correctKeys.length>1;

  return {
    tp:'num2abs',multi:isMulti,kind,
    stamp:'数\n→絶対値',sc:'st2',
    label:'TYPE 2 ─ 数から絶対値を答える',
    qhtml:`${aHTML} の絶対値はいくつですか？${isMulti?'（複数ある場合はすべて選んでください）':''}`,
    qtext:`${kind==='frac'?`${aN}/${aD}`:kind==='decimal'?trimDec(aVal,p):String(aVal)} の絶対値はいくつですか？${isMulti?'（複数ある場合はすべて選ぶ）':''}`,
    hint,
    items,ans:correctKeys,
    nl:{hiVals:[aVal],rMin:-Math.ceil(absV+1.5),rMax:Math.ceil(absV+1.5),showAbs:true,absLabel:correctKeys[0]},
  };
}

function mkRange(){
  const ALLOW_INF = Math.random() < 0.03;
  let op;
  if(ALLOW_INF){
    op = pick(['以上','より大きい']);
  } else {
    op = pick(['以下','以下','未満','未満','より小さい','より小さい','より小さい']);
  }
  const INF=op==='以上'||op==='より大きい';
  const bkind=pickKind();
  const p=DC().decPl;
  let n,nHTML,nStr;

  if(bkind==='integer'){
    n=ri(1,M());nHTML=`<strong>${n}</strong>`;nStr=String(n);
  }else if(bkind==='decimal'){
    const f=10**p;
    let tries=0,raw;
    do{ raw=rd(ri(1,M()*f)/f,p); tries++; }while(Number.isInteger(raw)&&tries<50);
    if(Number.isInteger(raw)){
      n=raw; nHTML=`<strong>${n}</strong>`; nStr=String(n);
    }else{
      n=raw; nStr=trimDec(n,p); nHTML=`<strong><span class="num-box">${nStr}</span></strong>`;
    }
  }else{
    const fr=genReducedFrac(1);
    n=fr.val;nStr=`${fr.n}/${fr.d}`;nHTML=fracHTML(fr.n,fr.d);
  }
  function calcInts(op,n){
    const res=[];
    for(let i=-(M()+4);i<=M()+4;i++){
      const av=Math.abs(i);
      if(op==='以下'&&av<=n)res.push(i);
      if(op==='未満'&&av<n) res.push(i);
      if(op==='以上'&&av>=n)res.push(i);
      if(op==='より大きい'&&av>n)res.push(i);
      if(op==='より小さい'&&av<n)res.push(i);
    }
    return res;
  }
  const allInts=calcInts(op,n);
  const VARIANTS = INF ? ['all'] : ['all','all','positive','negative'];
  const variant = pick(VARIANTS);

  let ints, qSuffix, hintExtra='';
  if(variant==='positive'){
    ints=allInts.filter(v=>v>0);
    qSuffix='のうち、<strong>正の整数</strong>をすべて答えてください。';
    hintExtra='0 は正の整数でも負の整数でもありません。';
  }else if(variant==='negative'){
    ints=allInts.filter(v=>v<0);
    qSuffix='のうち、<strong>負の整数</strong>をすべて答えてください。';
    hintExtra='0 は正の整数でも負の整数でもありません。';
  }else{
    ints=allInts;
    qSuffix='となる整数を、<strong>${orderLabel}</strong>すべて答えてください。';
  }

  const ORDER = INF ? 'asc' : (ints.length<=1 ? 'none' : pick(['asc','desc']));
  const orderLabel = ORDER==='asc' ? '小さい順に' : ORDER==='desc' ? '大きい順に' : '';
  const qSuffixFinal = variant==='all'
    ? (ORDER==='none'
        ? 'となる整数をすべて答えてください。'
        : `となる整数を、<strong>${orderLabel}</strong>すべて答えてください。`)
    : variant==='positive'
    ? (ORDER==='none'
        ? 'のうち、<strong>正の整数</strong>をすべて答えてください。'
        : `のうち、<strong>正の整数</strong>を<strong>${orderLabel}</strong>すべて答えてください。`)
    : (ORDER==='none'
        ? 'のうち、<strong>負の整数</strong>をすべて答えてください。'
        : `のうち、<strong>負の整数</strong>を<strong>${orderLabel}</strong>すべて答えてください。`);

  const isNonIntBoundary = !Number.isInteger(n);
  let hint='';
  if(INF){ hint='条件を満たす整数は無限にあります。「…」を使って表しましょう。'; }
  else if(ints.length===0){ hint='条件を満たす整数がなければ「なし」と入力しましょう。'; }
  else if(variant==='positive'){ hint=ORDER==='asc'?'正の整数は 1, 2, 3, … と大きくなります。小さい方から並べよう！':'正の整数は 1, 2, 3, … と大きくなります。大きい方から並べよう！'; }
  else if(variant==='negative'){ hint=ORDER==='asc'?'負の整数は 0 に近いほど大きい数。小さい順 ＝ 0 から遠い順に並べよう！':'負の整数は 0 に近いほど大きい数。大きい順 ＝ 0 に近い順に並べよう！'; }
  else if(isNonIntBoundary){ hint='境界値が小数・分数のとき、どの整数が範囲に入るかをよく確認しよう！'; }
  else{ hint='プラス側とマイナス側、両方の整数を忘れずに！'; }
  if(hintExtra) hint+=' '+hintExtra;

  return {
    tp:'range',INF,op,n,nStr,ints,allInts,variant,kind:bkind,order:ORDER,
    orderLabel, placeholder:'',
    stamp:'範囲\n整数',sc:'st3',
    label:'TYPE 3 ─ 条件を満たす整数をすべて答える',
    qhtml:`絶対値が ${nHTML} ${op} ${qSuffixFinal}`,
    qtext:`絶対値が ${nStr} ${op} ${qSuffixFinal.replace(/<[^>]+>/g,'')}`,
    hint, max:M(),
  };
}

function mkCount(){
  const ALLOW_SPECIAL = Math.random() < 0.03;
  let op, INF;
  if(ALLOW_SPECIAL && Math.random() < 0.5){
    op = pick(['以上','より大きい']); INF = true;
  } else {
    op = pick(['以下','以下','以下','未満','未満','未満']); INF = false;
  }

  const bkind=pickKind();
  const p=DC().decPl;
  let n,nHTML,nStr;

  if(bkind==='integer'){
    n=ri(1,M());nHTML=`<strong>${n}</strong>`;nStr=String(n);
  }else if(bkind==='decimal'){
    const f=10**p;
    let tries=0,raw;
    do{ raw=rd(ri(1,M()*f)/f,p); tries++; }while(Number.isInteger(raw)&&tries<50);
    if(Number.isInteger(raw)){
      n=raw; nHTML=`<strong>${n}</strong>`; nStr=String(n);
    }else{
      n=raw; nStr=trimDec(n,p); nHTML=`<strong><span class="num-box">${nStr}</span></strong>`;
    }
  }else{
    const fr=genReducedFrac(1);
    n=fr.val;nStr=`${fr.n}/${fr.d}`;nHTML=fracHTML(fr.n,fr.d);
  }
  function calcAll(op,n){
    const res=[];
    for(let i=-(M()+8);i<=M()+8;i++){
      const av=Math.abs(i);
      if(op==='以下'&&av<=n)res.push(i);
      if(op==='未満'&&av<n) res.push(i);
      if(op==='以上'&&av>=n)res.push(i);
      if(op==='より大きい'&&av>n)res.push(i);
    }
    return res;
  }

  let variant;
  if(INF){ variant = 'all'; }
  else if(ALLOW_SPECIAL){ variant = pick(['all','all','positive','negative']); }
  else {
    const allInts = calcAll(op, n);
    const safeVariants = ['all','all'];
    if(allInts.filter(v=>v>0).length > 0) safeVariants.push('positive','positive');
    if(allInts.filter(v=>v<0).length > 0) safeVariants.push('negative','negative');
    variant = pick(safeVariants);
  }

  let count, qSuffix, hintExtra='';
  if(INF){
    count=Infinity; qSuffix='となる整数は何個ありますか？';
  }else{
    const allInts=calcAll(op,n);
    if(variant==='positive'){
      count=allInts.filter(v=>v>0).length;
      qSuffix='のうち、<strong>正の整数</strong>は何個ありますか？';
      hintExtra='0 は正の整数ではありません。';
    }else if(variant==='negative'){
      count=allInts.filter(v=>v<0).length;
      qSuffix='のうち、<strong>負の整数</strong>は何個ありますか？';
      hintExtra='0 は負の整数ではありません。';
    }else{
      count=allInts.length; qSuffix='となる整数は何個ありますか？';
    }
  }

  const correctAns=INF?'無限':`${count}個`;
  let trapNote='';
  if(INF){ trapNote=`絶対値が ${nStr} ${op} となる整数は、正の側にも負の側にも無限に存在します！`; }
  else if(variant==='positive'){ trapNote=`正の整数のみを数えます。0 は含まないので ${count}個。`; }
  else if(variant==='negative'){ trapNote=`負の整数のみを数えます。0 は含まないので ${count}個。`; }
  else if(op==='以下'){
    const fl=Math.floor(n);
    trapNote=`絶対値が ${nStr} 以下の整数は −${fl} から ${fl} まで（0 も含む）の <strong>${count}個</strong>。0 を忘れずに！`;
  }else{
    const fl=Math.ceil(n)-1;
    trapNote=`絶対値が ${nStr} 未満の整数は −${fl} から ${fl} まで（0 も含む）の <strong>${count}個</strong>。${nStr} 自体は含まない！`;
  }

  const isNonIntBoundary=!Number.isInteger(n);

  return {
    tp:'count',INF,op,n,nStr,correctAns,trapNote,kind:bkind,variant,
    stamp:'個数\n注意!',sc:'st4',isTrap:true,
    label:'TYPE 4 ─ 個数を答える（ひっかけ注意）',
    qtext:`絶対値が ${nStr} ${op} ${qSuffix.replace(/<[^>]+>/g,'')}`,
    qhtml:`絶対値が ${nHTML} ${op} ${qSuffix}<br>
      <small style="color:var(--muted);font-size:.78rem">※ 無限の場合は「無限」と入力してください</small>`,
    hint:(INF?'整数が無限にある場合があります。正の側・負の側それぞれ確認しよう。':
         isNonIntBoundary?`境界値 ${nStr} は整数でないので、含まれる整数の範囲が変わります。`:
         'プラス・マイナス・0 を丁寧に数えよう。答えには「個」をつけること！')
         +(hintExtra?' '+hintExtra:''),
  };
}

function gen(){
  S.answered=false;
  // DB解き直しキュー（?retry=1）があれば、保存時と全く同じ問題を優先して再出題
  if(dbRetryQueue&&dbRetryQueue.length){
    const p=dbRetryQueue.shift();
    if(p.diff&&DCFG[p.diff])S.diff=p.diff;
    window._currentQ=p;
    render(p);
    return;
  }
  const modes=['abs2num','num2abs','range','count','sort'];
  const m=S.mode==='all'?pick(modes):S.mode;
  const q=m==='abs2num'?mkAbs2Num()
          :m==='num2abs'?mkNum2Abs()
          :m==='range'  ?mkRange()
          :m==='count'  ?mkCount()
          :               mkSort();
  q.diff=S.diff;   // 再出題時に同じ難易度で表示するため question_params に含める
  window._currentQ=q;
  render(q);
}

/* ---------- Divp 学習記録連携 ---------- */
// question_params には問題オブジェクトqを丸ごと保存する（qは全てJSON化できる値のみ）。
// 解き直し時は保存したparamsをそのまま render し、そのまま送り返すことで
// params_hash が一致して2連続正解のmastered判定が成立する。
// ※このJSON形式を変えると既存pending行のハッシュと合わなくなる点に注意
let dbRetryQueue=null;
const ZA_TYPES=['abs2num','num2abs','range','count','sort'];
function safeDivpCorrect(sel){
  if(window.Divp&&typeof Divp.correct==='function'){try{Divp.correct(sel);}catch(e){}}
}
function dbParams(q){
  if(!q._dbParams){
    const c={};for(const k in q){if(k.charAt(0)!=='_')c[k]=q[k];}
    q._dbParams=c;
  }
  return q._dbParams;
}
function divpLog(ok,correctStr,wrongStr){
  try{
    const q=window._currentQ;
    if(!(window.Divp&&typeof Divp.answer==='function'))return;
    Divp.answer(ok,{
      question_key:q.tp,
      question_params:dbParams(q),
      question_text:q.qtext||'',
      correct_answer:correctStr,
      wrong_answer:wrongStr,
    });
  }catch(e){/* オフラインでも演習は継続 */}
}
// list_retries.php の pending から question_params を取り出し再出題キューに積む
function startDbRetry(){
  if(!/[?&]retry=1/.test(location.search))return;
  if(!(window.Divp&&typeof Divp.getRetries==='function'))return;
  Divp.getRetries().then(items=>{
    const queue=[];
    (items||[]).forEach(it=>{
      const p=it.question_params;
      if(!p||!p.qhtml||!ZA_TYPES.includes(p.tp))return;   // 未知/古い形式は再出題不可
      p._dbParams=Object.assign({},p);   // 保存時と同一のparamsを送り返す（params_hash一致のため）
      queue.push(p);
    });
    if(queue.length){dbRetryQueue=queue;gen();}
  });
}

function render(q){
  let h=`<div class="q-card">`;
  h+=`<div class="badge-stamp ${q.sc}">${q.stamp}</div>`;
  h+=`<div class="type-label">${q.label}${q.isTrap?'<span class="trap-mark">⚠ ひっかけ</span>':''}</div>`;
  h+=`<div class="q-text">${q.qhtml}</div>`;
  if(q.hint){
    h+=`<button class="hint-btn" onclick="ZA_toggleHint(this)">💡 ヒントを見る</button>`;
    h+=`<div class="hint-box">${q.hint}</div>`;
  }
  if(q.nl) h+=renderNL(q.nl);
  if(q.items && q.tp!=='sort'){
    h+=`<div class="choices" id="choices">`;
    q.items.forEach(it=>{ h+=itemBtnHTML(it); });
    h+=`</div>`;
    if(q.multi){
      h+=`<div class="multi-hint">※ 複数選択できます（該当するものをすべて選んでください）</div>`;
      h+=`<button class="confirm-btn" id="confirm-btn" onclick="ZA_checkMulti()">答えを確認する</button>`;
    }
  }
  if(q.tp==='range'){
    h+=`<div class="input-row">
      <input class="ans-input" id="ans-inp" type="text" placeholder="" autocomplete="off"
        onkeydown="if(event.key==='Enter')ZA_checkRange()">
      <button class="submit-btn" onclick="ZA_checkRange()">確認</button>
    </div>`;
    if(!q.INF){
      h+=`<div class="chips-wrap"><div class="chips-label">整数チップ（答え合わせ後に色が変わります）</div><div class="chips-row" id="chips">`;
      for(let i=-(q.max+2);i<=q.max+2;i++) h+=`<span class="chip" id="chip${i}">${i}</span>`;
      h+=`</div></div>`;
    }
  }
  if(q.tp==='sort'){
    h+=`<div class="sort-area">`;
    h+=`<div class="sort-label">答え欄（タップした順に並びます。もう一度タップすると取り消し）</div>`;
    h+=`<div class="sort-slots" id="sort-slots"></div>`;
    h+=`<div class="sort-label" style="margin-top:4px">選択肢</div>`;
    h+=`<div class="sort-pool" id="sort-pool">`;
    q.items.forEach((it,idx)=>{ h+=poolBtnHTML(it,idx); });
    h+=`</div>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">`;
    h+=`<button class="sort-undo" onclick="ZA_undoSort()">← 1つ戻る</button>`;
    h+=`<button class="sort-reset" onclick="ZA_resetSort()">↩ リセット</button>`;
    h+=`<button class="confirm-btn" id="confirm-btn" onclick="ZA_checkSort()">答えを確認する</button>`;
    h+=`</div></div>`;
  }
  if(q.tp==='count'){
    h+=`<div class="input-row">
      <input class="ans-input" id="ans-inp" type="text" placeholder="" autocomplete="off"
        onkeydown="if(event.key==='Enter')ZA_checkCount()">
      <button class="submit-btn" onclick="ZA_checkCount()">確認</button>
    </div>
    <div class="unit-hint">※ 個数は「○個」と単位をつけて答えてください（無限の場合は「無限」）</div>`;
  }
  h+=`<div id="fb"></div>`;
  h+=`<button class="next-btn" id="next-btn" style="display:none" onclick="ZA_gen()">次の問題 →</button>`;
  h+=`</div>`;

}

function toggleHint(btn){
  const box=btn.nextElementSibling;
  const showing=box.classList.toggle('show');
  btn.textContent=showing?'💡 ヒントを隠す':'💡 ヒントを見る';
}

function renderNL(nl){
  const{hiVals,rMin,rMax,showAbs,absLabel}=nl;
  const W=520,H=78,PD=42;
  const tx=v=>PD+(v-rMin)/(rMax-rMin)*(W-2*PD);
  let s=`<div class="numline-wrap"><svg class="numline-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<line x1="${PD}" y1="44" x2="${W-PD}" y2="44" stroke="#ccc" stroke-width="1.5"/>`;
  for(let i=Math.ceil(rMin);i<=Math.floor(rMax);i++){
    const x=tx(i);const maj=i%5===0||Math.abs(rMax-rMin)<=12;
    s+=`<line x1="${x}" y1="${maj?36:39}" x2="${x}" y2="${maj?52:49}" stroke="#bbb" stroke-width="${maj?1.5:1}"/>`;
    if(maj||Math.abs(rMax-rMin)<=8)
      s+=`<text x="${x}" y="${H-2}" text-anchor="middle" fill="#aaa" font-size="9" font-family="Space Mono">${i}</text>`;
  }
  const ox=tx(0);
  s+=`<circle cx="${ox}" cy="44" r="4" fill="#b8860b" opacity=".8"/>`;
  if(showAbs&&hiVals.length===1){
    const px=tx(hiVals[0]);
    s+=`<line x1="${Math.min(px,ox)}" y1="44" x2="${Math.max(px,ox)}" y2="44" stroke="#1a5276" stroke-width="3" opacity=".32"/>`;
    const mid=(px+ox)/2;
    s+=`<text x="${mid}" y="28" text-anchor="middle" fill="#1a5276" font-size="9" font-family="Space Mono">距離=${absLabel||''}</text>`;
  }
  hiVals.forEach(v=>{
    const x=tx(v);
    s+=`<circle cx="${x}" cy="44" r="9" fill="#1a6644" opacity=".85"/>`;
    const lbl=String(v).length<=5?v:'●';
    s+=`<text x="${x}" y="48" text-anchor="middle" fill="#fff" font-size="8" font-family="Space Mono" font-weight="bold">${lbl}</text>`;
  });
  s+=`</svg></div>`;
  return s;
}

function keyToHTML(k){
  const m=k.match(/^(-?\d+)\/(\d+)$/);
  if(m) return fracHTML(parseInt(m[1]),parseInt(m[2]));
  return `<span class="fb-ans">${k}</span>`;
}
function fbAns(k){
  const m=k.match(/^(-?\d+)\/(\d+)$/);
  if(m) return `<span class="fb-ans" style="font-family:inherit">${fracHTML(parseInt(m[1]),parseInt(m[2]))}</span>`;
  return `<span class="fb-ans">${k}</span>`;
}

function onChoice(btn){
  if(S.answered)return;
  const q=window._currentQ;
  if(q.multi){
    const sel=btn.dataset.sel==='1';
    btn.dataset.sel=sel?'0':'1';
    btn.classList.toggle('selected',!sel);
    return;
  }
  S.answered=true;S.total++;
  const key=btn.dataset.k;
  const ok=key===q.ans[0];
  document.querySelectorAll('.ch-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.k===q.ans[0])b.classList.add('reveal');
  });
  btn.classList.add(ok?'ans-ok':'ans-ng');
  if(ok){S.correct++;safeDivpCorrect('.q-card');}else S.wrong++;
  divpLog(ok,q.ans[0],key);
  showFB(ok,ok?`正解！ 絶対値は ${fbAns(q.ans[0])} ですね。`
              :`不正解。正しくは ${fbAns(q.ans[0])} です。`);
  upScore();_$('next-btn').style.display='block';
}

function checkMulti(){
  if(S.answered)return;
  const q=window._currentQ;
  S.answered=true;S.total++;
  const sel=[...document.querySelectorAll('.ch-btn[data-sel="1"]')].map(b=>b.dataset.k);
  const ans=q.ans;
  const ok=sel.length===ans.length&&ans.every(a=>sel.includes(a));
  document.querySelectorAll('.ch-btn').forEach(b=>{
    b.disabled=true;
    if(ans.includes(b.dataset.k))b.classList.add('reveal');
    else if(b.dataset.sel==='1')b.classList.add('ans-ng');
  });
  _$('confirm-btn').disabled=true;
  if(ok){S.correct++;safeDivpCorrect('.q-card');}else S.wrong++;
  divpLog(ok,ans.join(', '),sel.join(', '));
  const ansHTML=ans.map(k=>fbAns(k)).join(' と ');
  const ansHTMLng=ans.map(k=>fbAns(k)).join('、');
  showFB(ok,ok?`正解！ 答えは ${ansHTML} です。`
              :`不正解。正しくは ${ansHTMLng} です。`);
  upScore();_$('next-btn').style.display='block';
}

function checkRange(){
  if(S.answered)return;
  const q=window._currentQ;
  const inp=_$('ans-inp');
  const raw=inp.value.trim();if(!raw)return;
  S.answered=true;S.total++;
  let ok=false,msg='';
  if(q.INF){
    ok=raw.includes('...')||raw.includes('…')||raw.includes('無限')||raw.toLowerCase().includes('inf');
    msg=ok?`正解！ 条件を満たす整数は<strong>無限</strong>に存在します。`
          :`不正解。この条件を満たす整数は<strong>無限</strong>にあります（整数は ±∞ まで続くため）。`;
  }else if(q.ints.length===0){
    const r=raw.replace(/\s/g,'');
    ok=r==='なし'||r==='ない'||r==='0個'||r==='０個'||r==='0'||r==='なし。';
    msg=ok?`正解！ この条件を満たす整数は<strong>存在しません</strong>。`
          :`不正解。この条件を満たす整数は<strong>存在しません</strong>。「なし」と入力してください。`;
  }else{
    const entered=raw.split(/[,、\s　]+/).map(s=>s.trim()).filter(Boolean)
                     .map(Number).filter(v=>!isNaN(v)&&Number.isInteger(v));
    const correct=[...q.ints].sort((a,b)=>a-b);
    const correctDesc=[...correct].reverse();
    const expected=q.order==='desc'?correctDesc:correct;
    const enteredSorted=[...entered].sort((a,b)=>a-b);
    const valuesOk=JSON.stringify(enteredSorted)===JSON.stringify(correct);
    const orderOk=q.order==='none' ? true : JSON.stringify(entered)===JSON.stringify(expected);
    ok=valuesOk&&orderOk;
    const ansInts=q.ints;
    ansInts.forEach(n=>{const c=document.getElementById('chip'+n);if(c)c.classList.add('in');});
    for(let i=-(q.max+2);i<=q.max+2;i++){
      if(!ansInts.includes(i)){const c=document.getElementById('chip'+i);if(c)c.classList.add('out');}
    }
    const variantLabel=q.variant==='positive'?'正の整数':q.variant==='negative'?'負の整数':'整数';
    if(ok){
      msg=`正解！ 答えは <span class="fb-ans">${expected.join(', ')}</span>（${correct.length}個）です。`;
    }else if(valuesOk&&!orderOk){
      msg=`不正解。数は合っていますが順番が違います。<strong>${q.orderLabel}</strong>並べましょう。正しくは <span class="fb-ans">${expected.join(', ')}</span> です。`;
    }else{
      msg=`不正解。正しくは <span class="fb-ans">${expected.join(', ')}</span>（${correct.length}個）です。`;
      if(q.variant!=='all') msg+=`<br><small>0 は${variantLabel}ではありません。</small>`;
      else if(q.kind!=='integer') msg+=`<br><small>境界値が小数・分数の場合、どの整数が入るかを確認しましょう。</small>`;
    }
  }
  inp.classList.add(ok?'ok':'ng');
  if(ok){S.correct++;safeDivpCorrect('.q-card');}else S.wrong++;
  const rangeCorrect=q.INF?'無限':(q.ints.length===0?'なし':(q.order==='desc'?[...q.ints].sort((a,b)=>b-a):[...q.ints].sort((a,b)=>a-b)).join(', '));
  divpLog(ok,rangeCorrect,raw);
  showFB(ok,msg);upScore();_$('next-btn').style.display='block';
}

function checkCount(){
  if(S.answered)return;
  const q=window._currentQ;
  const inp=_$('ans-inp');
  const raw=inp.value.trim();if(!raw)return;
  S.answered=true;S.total++;
  const r=raw.replace(/\s/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  let ok=false;
  if(q.INF){
    ok=r.includes('無限')||r.includes('∞')||r.toLowerCase().includes('inf');
  }else{
    const m=r.match(/^(\d+)個$/);
    ok= m!==null && m[1]===String(q.correctAns.replace('個',''));
  }
  inp.classList.add(ok?'ok':'ng');
  if(ok){S.correct++;safeDivpCorrect('.q-card');}else S.wrong++;
  divpLog(ok,q.correctAns,raw);
  let msg='';
  if(!ok){
    if(!q.INF && !r.includes('個') && !r.includes('無限')){
      msg=`不正解。答えには「個」をつけてください。正しくは <span class="fb-ans">${q.correctAns}</span> です。<br><small>${q.trapNote}</small>`;
    }else{
      msg=`不正解。正しくは <span class="fb-ans">${q.correctAns}</span> です。<br><small>${q.trapNote}</small>`;
    }
  }else{
    msg=`正解！ ${q.trapNote}`;
  }
  showFB(ok,msg);upScore();_$('next-btn').style.display='block';
}

function mkSort(){
  const ORDER=pick(['asc','desc']);
  const orderLabel=ORDER==='asc'?'絶対値が小さい順':'絶対値が大きい順';
  if(S.diff==='normal' && Math.random()<0.2){
    const fixedVals=[
      {kind:'decimal', val:-0.01, n:null, d:null, absV:0.01, label:'-0.01'},
      {kind:'decimal', val: 0.1,  n:null, d:null, absV:0.1,  label:'0.1'},
      {kind:'integer', val: 1,    n:null, d:null, absV:1,    label:'1'},
      {kind:'decimal', val: 1.01, n:null, d:null, absV:1.01, label:'1.01'},
      {kind:'decimal', val:-1.11, n:null, d:null, absV:1.11, label:'-1.11'},
    ];
    fixedVals.forEach(it=>{ it.key=it.label; });
    const correctOrder=[...fixedVals].sort((a,b)=>ORDER==='asc'?a.absV-b.absV:b.absV-a.absV);
    const correctKeys=correctOrder.map(i=>i.key);
    const shuffled=shuf([...fixedVals]);
    return {
      tp:'sort', ORDER, orderLabel, items:shuffled, correctKeys,
      stamp:'大小\n順番', sc:'st2',
      label:'TYPE 5 ─ 絶対値の大小順に並べる',
      qhtml:`次の数を、<strong>${orderLabel}</strong>に並べてください。`,
      qtext:`次の数を${orderLabel}に並べる: ${shuffled.map(i=>i.key).join(', ')}`,
      hint:ORDER==='asc'?'絶対値（0からの距離）が小さいものから順に選んでタップしよう。':'絶対値（0からの距離）が大きいものから順に選んでタップしよう。',
    };
  }

  const count=ri(3,5);
  const p=DC().decPl;
  const mandatory=['frac','decimal'];
  const extras=[];
  for(let i=mandatory.length;i<count;i++) extras.push(pickKind());
  const kindSlots=shuf([...mandatory,...extras]);
  const items=[];
  const absVals=new Set();

  for(const kind of kindSlots){
    let item; let ok=false;
    for(let t=0;t<60;t++){
      if(kind==='integer'){
        const absV=ri(1,M());
        if(absVals.has(absV)) continue;
        const sign=pick([-1,1]);
        item=makeItem('integer',sign*absV,null,null);
        item.absV=absV; ok=true; break;
      }else if(kind==='decimal'){
        const f=10**p;
        const absV=rd(ri(1,M()*f)/f,p);
        if(absVals.has(absV)||absV===0) continue;
        const sign=pick([-1,1]);
        item=makeItem('decimal',sign*absV,null,null);
        item.absV=absV; ok=true; break;
      }else{
        const fr=genReducedFrac(1);
        if(absVals.has(fr.val)) continue;
        const decStr=trimDec(rd(fr.val,p),p);
        const decV=parseFloat(decStr);
        if(Math.abs(fr.val-decV)<1e-9 && absVals.has(decV)) continue;
        const sign=pick([-1,1]);
        const sn=sign*fr.n;
        item=makeItem('frac',sign*fr.val,sn,fr.d);
        item.absV=fr.val; ok=true; break;
      }
    }
    if(ok){ absVals.add(item.absV); items.push(item); }
  }

  const correctOrder=[...items].sort((a,b)=>ORDER==='asc'? a.absV-b.absV : b.absV-a.absV);
  const correctKeys=correctOrder.map(i=>i.key);
  const shuffled=shuf([...items]);

  return {
    tp:'sort', ORDER, orderLabel, items:shuffled, correctKeys,
    stamp:'大小\n順番',sc:'st2',
    label:'TYPE 5 ─ 絶対値の大小順に並べる',
    qhtml:`次の数を、<strong>${orderLabel}</strong>に並べてください。`,
    qtext:`次の数を${orderLabel}に並べる: ${shuffled.map(i=>i.key).join(', ')}`,
    hint:ORDER==='asc'?'絶対値（0からの距離）が小さいものから順に選んでタップしよう。':'絶対値（0からの距離）が大きいものから順に選んでタップしよう。',
  };
}

function createSlotEl(it, pidx, slotIdx){
  const isFrac=it.kind==='frac';
  const el=document.createElement('div');
  el.className=isFrac?'sort-slot frac-slot':'sort-slot';
  el.dataset.pidx=String(pidx);
  el.onclick=()=>tapSlot(el);
  const badge=document.createElement('span');
  badge.className='slot-num';
  badge.textContent=String(slotIdx+1);
  el.appendChild(badge);

    const isNeg=it.n<0;
    const an=Math.abs(it.n);
    if(isNeg){
      const sign=document.createElement('span');
      sign.className='slot-sign'; sign.textContent='−';
      el.appendChild(sign);
    }
    const fracEl=document.createElement('span');
    fracEl.className='slot-frac-inner';
    fracEl.innerHTML=`<span class="fn">${an}</span><span class="fd">${it.d}</span>`;
    el.appendChild(fracEl);
  }else{
    const label=it.label||(it.kind==='decimal'?trimDec(it.val,DC().decPl):String(it.val));
    el.appendChild(document.createTextNode(label));
  }
  return el;
}

function tapPool(e){
  if(S.answered) return;
  const btn=e.target ? e.target.closest('.pool-btn') : e;
  if(!btn) return;
  if(btn.classList.contains('used')) return;
  const q=window._currentQ;
  const idx=parseInt(btn.dataset.idx);
  if(isNaN(idx) || !q.items[idx]) return;
  btn.classList.add('used'); btn.style.pointerEvents='none';
  const it=q.items[idx];
  const slots=_$('sort-slots');
  const slotIdx=slots.children.length;
  const el=createSlotEl(it, idx, slotIdx);
  slots.appendChild(el);
}

function tapSlot(slot){
  if(S.answered) return;
  const pidx=parseInt(slot.dataset.pidx);
  slot.remove();
  document.querySelectorAll('.sort-slot').forEach((s,i)=>{
    const b=s.querySelector('.slot-num');
    if(b) b.textContent=String(i+1);
  });
  const pb=document.getElementById('pool-'+pidx);
  if(pb){ pb.classList.remove('used'); pb.style.pointerEvents=''; }
}

function undoSort(){
  if(S.answered) return;
  const slots=_$('sort-slots');
  const last=slots.lastElementChild;
  if(!last) return;
  const pidx=parseInt(last.dataset.pidx);
  last.remove();
  const pb=document.getElementById('pool-'+pidx);
  if(pb){ pb.classList.remove('used'); pb.style.pointerEvents=''; }
}

function resetSort(){
  if(S.answered) return;
  _$('sort-slots').innerHTML='';
  document.querySelectorAll('.pool-btn').forEach(b=>{ b.classList.remove('used'); b.style.pointerEvents=''; });
}

function checkSort(){
  if(S.answered) return;
  const q=window._currentQ;
  const slots=[...document.querySelectorAll('.sort-slot')];
  if(slots.length!==q.items.length){
    _$('fb').innerHTML=`<div class="feedback ng">
      <div class="fb-head ng-h">⚠ まだ${q.items.length-slots.length}個残っています</div>
      <div class="fb-detail">すべての数を並べてから確認してください。</div>
    </div>`;
    return;
  }
  S.answered=true; S.total++;
  const enteredKeys=slots.map(s=>{
    const pidx=parseInt(s.dataset.pidx);
    return q.items[pidx].key;
  });
  const ok=JSON.stringify(enteredKeys)===JSON.stringify(q.correctKeys);
  slots.forEach((s,i)=>{
    const pidx=parseInt(s.dataset.pidx);
    const k=q.items[pidx].key;
    s.classList.add(k===q.correctKeys[i]?'slot-ok':'slot-ng');
    s.onclick=null;
  });
  document.querySelectorAll('.pool-btn').forEach(b=>{b.disabled=true;b.style.pointerEvents='none';});
  const cb=_$('confirm-btn'); if(cb) cb.disabled=true;
  if(ok){S.correct++;safeDivpCorrect('.q-card');}else S.wrong++;
  divpLog(ok,q.correctKeys.join(' → '),enteredKeys.join(' → '));
  const correctHTML=q.correctKeys.map((k,i)=>{
    const disp=fbAns(k);
    return `<span style="display:inline-flex;align-items:center;gap:2px">
      <span style="font-size:.7rem;color:var(--muted);margin-right:2px">${i+1}.</span>${disp}
    </span>`;
  }).join(' → ');
  showFB(ok,
    ok?`正解！ ${q.orderLabel}に正しく並べられました。`
      :`不正解。正しい順番は ${correctHTML} です。`);
  upScore();
  _$('next-btn').style.display='block';
}

function showFB(ok,msg){
  _$('fb').innerHTML=`<div class="feedback ${ok?'ok':'ng'}">
    <div class="fb-head ${ok?'ok-h':'ng-h'}">${ok?'✓ 正解！':'✗ 不正解'}</div>
    <div class="fb-detail">${msg}</div>
  </div>`;
}

function initZA(){
  document.querySelectorAll('.diff-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ ZA_setDiff(btn.dataset.d); });
  });
  document.querySelectorAll('.type-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ ZA_setMode(btn.dataset.m); });
  });
  gen();
  startDbRetry();   // ?retry=1 のときは取得でき次第、解き直しセットに切替
}

window.ZA_setDiff=setDiff;
window.ZA_setMode=setMode;
window.ZA_gen=gen;
window.ZA_toggleHint=toggleHint;
window.ZA_onChoice=onChoice;
window.ZA_checkMulti=checkMulti;
window.ZA_checkRange=checkRange;
window.ZA_checkCount=checkCount;
window.ZA_tapPool=tapPool;
window.ZA_tapSlot=tapSlot;
window.ZA_resetSort=resetSort;
window.ZA_undoSort=undoSort;
window.ZA_checkSort=checkSort;

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', initZA);
} else {
  initZA();
}

})();</script>
</body>
</html>
