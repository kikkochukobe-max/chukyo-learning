<script>
'use strict';
/* =====================================================
   utilities
===================================================== */
function G(a,b){a=Math.abs(a);b=Math.abs(b);while(b){const t=a%b;a=b;b=t;}return a;}
function lcm(a,b){return a/G(a,b)*b;}
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function rnz(a,b){let v=0,g=0;while(v===0&&g<99){v=ri(a,b);g++;}return v||1;}
function pick(arr){return arr[ri(0,arr.length-1)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=ri(0,i);const t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* fraction */
function F(n,d){
  d=(d===undefined)?1:d;
  if(d===0)d=1;
  if(d<0){n=-n;d=-d;}
  const g=G(n,d)||1;
  this.n=n/g; this.d=d/g;
}
F.int=function(k){return new F(k,1);};
F.prototype.add=function(o){return new F(this.n*o.d+o.n*this.d,this.d*o.d);};
F.prototype.mul=function(o){return new F(this.n*o.n,this.d*o.d);};
F.prototype.div=function(o){return new F(this.n*o.d,this.d*o.n);};
F.prototype.neg=function(){return new F(-this.n,this.d);};
F.prototype.eq=function(o){return this.n===o.n&&this.d===o.d;};
F.prototype.isZero=function(){return this.n===0;};
F.prototype.isInt=function(){return this.d===1;};
F.prototype.val=function(){return this.n/this.d;};

/* =====================================================
   term model  {c:F, ex, ey}
===================================================== */
function T(c,ex,ey){return {c:(c instanceof F)?c:F.int(c),ex:ex||0,ey:ey||0};}
function combineTerms(list){
  const map={};
  for(const t of list){
    const k=t.ex+','+t.ey;
    map[k]=map[k]?{c:map[k].c.add(t.c),ex:t.ex,ey:t.ey}:{c:t.c,ex:t.ex,ey:t.ey};
  }
  const out=Object.values(map).filter(t=>!t.c.isZero());
  out.sort((a,b)=>(b.ex-a.ex)||(b.ey-a.ey));
  return out;
}
function mulPoly(a,b){
  const out=[];
  for(const p of a)for(const q of b)out.push({c:p.c.mul(q.c),ex:p.ex+q.ex,ey:p.ey+q.ey});
  return combineTerms(out);
}
function termsEq(a,b){
  if(a.length!==b.length)return false;
  for(let i=0;i<a.length;i++){
    if(a[i].ex!==b[i].ex||a[i].ey!==b[i].ey||!a[i].c.eq(b[i].c))return false;
  }
  return true;
}

/* ---------- rendering ---------- */
function supHTML(v,e){return e?(v+(e>1?'<sup>'+e+'</sup>':'')):'';}
function varHTML(ex,ey){return supHTML('x',ex)+supHTML('y',ey);}
function varText(ex,ey){
  function s(v,e){return e?(v+(e===2?'²':e===3?'³':e>3?'^'+e:'')):'';}
  return s('x',ex)+s('y',ey);
}
function fracHTML(n,d){return '<span class="fr"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span>';}
function termsHTML(terms){
  if(!terms.length)return '0';
  let h='';
  terms.forEach(function(t,i){
    const neg=t.c.n<0, a=neg?t.c.neg():t.c, hasVar=!!(t.ex||t.ey);
    h+= i===0 ? (neg?'−':'') : (neg?' − ':' + ');
    if(a.isInt()){ if(!(a.n===1&&hasVar)) h+=a.n; }
    else h+=fracHTML(a.n,a.d);
    h+=varHTML(t.ex,t.ey);
  });
  return h;
}
function termsText(terms){
  if(!terms.length)return '0';
  let s='';
  terms.forEach(function(t,i){
    const neg=t.c.n<0, a=neg?t.c.neg():t.c, hasVar=!!(t.ex||t.ey);
    s+= i===0 ? (neg?'-':'') : (neg?'-':'+');
    if(a.isInt()){ if(!(a.n===1&&hasVar)) s+=a.n; }
    else s+=a.n+'/'+a.d;
    s+=varText(t.ex,t.ey);
  });
  return s;
}
/* one fraction over common denominator (for 分数モードの正答表示) */
function fracFormHTML(terms){
  let L=1;
  for(const t of terms)L=lcm(L,t.c.d);
  if(L===1)return termsHTML(terms);
  const num=terms.map(t=>T(t.c.n*(L/t.c.d),t.ex,t.ey));
  return fracHTML(termsHTML(num),L);
}
function fracFormText(terms){
  let L=1;
  for(const t of terms)L=lcm(L,t.c.d);
  if(L===1)return termsText(terms);
  const num=terms.map(t=>T(t.c.n*(L/t.c.d),t.ex,t.ey));
  return '('+termsText(num)+')/'+L;
}
function numDisp(n){return String(n).replace('-','−');}
function signCoef(k,v,first){
  const neg=k<0,m=Math.abs(k);
  return (first?(neg?'−':''):(neg?' − ':' + '))+(m===1&&v?'':m)+v;
}
function linEq(a,b,c){
  let h='',first=true;
  if(a){h+=signCoef(a,'x',first);first=false;}
  if(b){h+=signCoef(b,'y',first);first=false;}
  if(first)h+='0';
  return h+' = '+numDisp(c);
}
function linEqText(a,b,c){
  return linEq(a,b,c).replace(/ /g,'').replace(/−/g,'-');
}
/* 単項式表示：先頭以外で負なら（　）で包む */
function monoHTML(t,wrapNeg){
  const h=termsHTML([t]);
  return (wrapNeg&&t.c.n<0)?'('+h+')':h;
}
function monoText(t,wrapNeg){
  const s=termsText([t]);
  return (wrapNeg&&t.c.n<0)?'('+s+')':s;
}
/* Fの累乗 */
function Fpow(f,e){let r=F.int(1);for(let i=0;i<e;i++)r=r.mul(f);return r;}
/* 数の係数（整数or分数）を「かっこの前の数」として表示する。負は先頭に−。
   分数のときは括弧で包む（例 ÷(−5/6) や ×(−1/3) のような見た目に使う側で調整） */
function coefMul(f){
  const neg=f.n<0, a=neg?f.neg():f;
  if(a.isInt())return {html:(neg?'−':'')+a.n,text:(neg?'-':'')+a.n};
  return {html:(neg?'−':'')+fracHTML(a.n,a.d),text:(neg?'-':'')+a.n+'/'+a.d};
}
/* 分数の数（式の値の代入値・答え）を素朴に表示 */
function fnumHTML(f){return f.isInt()?numDisp(f.n):(f.n<0?'−':'')+fracHTML(Math.abs(f.n),f.d);}
function fnumText(f){return f.isInt()?String(f.n):f.n+'/'+f.d;}
/* 答え用: 符号付き指数の単項式を、負の指数は分母に回して1つの分数で表示。
   指数がすべて0以上なら従来どおり（分子に係数＋変数）。 */
function monoAnsHTML(t){
  if(t.ex>=0&&t.ey>=0)return termsHTML([t]);
  const neg=t.c.n<0, a=neg?t.c.neg():t.c;
  const numV=supHTML('x',Math.max(t.ex,0))+supHTML('y',Math.max(t.ey,0));
  const denV=supHTML('x',Math.max(-t.ex,0))+supHTML('y',Math.max(-t.ey,0));
  const num=(a.n===1&&numV)?numV:(a.n+numV);
  const den=(a.d>1?String(a.d):'')+denV;
  return (neg?'−':'')+fracHTML(num,den);
}
function monoAnsText(t){
  if(t.ex>=0&&t.ey>=0)return termsText([t]);
  const neg=t.c.n<0, a=neg?t.c.neg():t.c;
  const sv=function(v,e){return e>0?(v+(e>1?'^'+e:'')):'';};
  const numV=sv('x',Math.max(t.ex,0))+sv('y',Math.max(t.ey,0));
  const denV=sv('x',Math.max(-t.ex,0))+sv('y',Math.max(-t.ey,0));
  const num=(a.n===1&&numV)?numV:(a.n+numV);
  const den=(a.d>1?String(a.d):'')+denV;
  return (neg?'-':'')+'('+num+')/('+den+')';
}

/* =====================================================
   answer parser
===================================================== */
function normalizeInput(s){
  return (s||'')
    .replace(/[０-９ａ-ｚＡ-Ｚ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);})
    .replace(/（/g,'(').replace(/）/g,')')
    .replace(/＋/g,'+')
    .replace(/[－−ー―‐]/g,'-')
    .replace(/[×＊]/g,'*')
    .replace(/[÷／]/g,'/')
    .replace(/＾/g,'^')
    .replace(/²/g,'^2').replace(/³/g,'^3')
    .replace(/[＝=]/g,'=')
    .replace(/[\s　]+/g,'')
    .toLowerCase();
}
function perr(m){const e=new Error(m);e.parse=true;throw e;}

function parseAnswerExpr(raw){
  const s=normalizeInput(raw);
  if(!s)perr('答えを入力してね');
  if(s.indexOf('=')>=0)perr('「=」は入力せず、式だけを答えてね');
  const st={s:s,i:0,uns:false,unr:false};
  const rawTerms=[];
  parseSum(st,rawTerms);
  if(st.i<st.s.length)perr('「'+st.s[st.i]+'」のあたりの書き方を確認してね');
  const comb=combineTerms(rawTerms);
  if(comb.length<rawTerms.length)st.uns=true;
  return {terms:comb,uns:st.uns,unr:st.unr};
}
function readSign(st){
  let sg=1;
  while(st.s[st.i]==='+'||st.s[st.i]==='-'){
    if(st.s[st.i]==='-')sg=-sg;
    st.i++;
  }
  return sg;
}
function parseSum(st,rawOut){
  let sign=readSign(st);
  for(;;){
    const prod=parseProduct(st);
    for(const t of prod)rawOut.push({c:t.c.mul(F.int(sign)),ex:t.ex,ey:t.ey});
    const ch=st.s[st.i];
    if(ch==='+'||ch==='-'){sign=readSign(st);continue;}
    return;
  }
}
function parseFactor(st){
  const ch=st.s[st.i];
  if(ch>='0'&&ch<='9'||ch==='.'){
    let j=st.i;
    while(j<st.s.length&&/[0-9.]/.test(st.s[j]))j++;
    const tok=st.s.slice(st.i,j);st.i=j;
    if((tok.match(/\./g)||[]).length>1||tok==='.')perr('数の書き方を確認してね');
    let f;
    if(tok.indexOf('.')>=0){
      const p=tok.split('.');
      const whole=p[0]||'0', dec=p[1]||'';
      if(dec==='')perr('数の書き方を確認してね');
      f=new F(parseInt(whole+dec,10),Math.pow(10,dec.length));
    }else{
      f=F.int(parseInt(tok,10));
    }
    return {kind:'num',terms:[T(f,0,0)]};
  }
  if(ch==='x'||ch==='y'){
    st.i++;
    let e=1;
    if(st.s[st.i]==='^'){
      st.i++;
      const d=st.s[st.i];
      if(!/[1-9]/.test(d||''))perr('指数の書き方を確認してね（例：x^2）');
      e=parseInt(d,10);st.i++;
      if(e>8)perr('指数が大きすぎるよ');
    }
    return {kind:'var',terms:[T(1,ch==='x'?e:0,ch==='y'?e:0)]};
  }
  if(ch==='('){
    st.i++;
    const raw=[];
    parseSum(st,raw);
    if(st.s[st.i]!==')')perr('かっこが閉じていないよ');
    st.i++;
    const comb=combineTerms(raw);
    if(comb.length<raw.length)st.uns=true;
    return {kind:'paren',terms:comb};
  }
  if(ch===undefined)perr('式が途中で終わっているよ');
  perr('「'+ch+'」は使えない文字だよ');
}
function parseProduct(st){
  let val=null, idx=0, parenPolyAt=-1;
  for(;;){
    const f=parseFactor(st);
    if(f.kind==='paren'&&f.terms.length>1){
      if(idx>0||parenPolyAt>=0)st.uns=true;   /* 2(x+y) や (..)(..) は未整理 */
      parenPolyAt=idx;
    }else if(parenPolyAt>=0){
      st.uns=true;                             /* (x+y)x など、多項式かっこの後ろにかけ算 */
    }
    val=val?mulPoly(val,f.terms):combineTerms(f.terms);
    idx++;
    while(st.s[st.i]==='/'){
      st.i++;
      const g=parseFactor(st);
      /* ÷のうしろは「単項式1つ」（数、または変数をふくむ単項式）ならOK。
         かっこ内が2項以上の多項式でわるのは不可。変数でわると指数が減る（分母に回る）。 */
      if(g.terms.length!==1||g.terms[0].c.isZero()){
        perr('÷のうしろは 0 以外の数か単項式にしてね');
      }
      const dt=g.terms[0], d=dt.c;
      if(d.isInt()&&!dt.ex&&!dt.ey){           /* 数でわるときだけ「約分できる」判定 */
        let gg=Math.abs(d.n),allInt=true;
        for(const t of val){
          if(!t.c.isInt()){allInt=false;break;}
          gg=G(gg,Math.abs(t.c.n));
        }
        if(allInt&&gg>1)st.unr=true;
      }
      val=val.map(t=>({c:t.c.div(d),ex:t.ex-dt.ex,ey:t.ey-dt.ey}));
    }
    const ch=st.s[st.i];
    if(ch==='*'){st.i++;continue;}
    if(ch!==undefined&&/[0-9xy(.]/.test(ch))continue;
    break;
  }
  return val;
}
/* 数値（連立の解・式の値）用 */
function parseNumberAns(raw){
  const s=normalizeInput(raw);
  if(!s)perr('答えを入力してね');
  const m=s.match(/^(-?)(\d+)(?:\.(\d+))?(?:\/(-?\d+))?$/);
  if(!m)perr('数で答えてね（例：3、-2、1/2）');
  let f;
  if(m[3]!==undefined)f=new F(parseInt(m[2]+m[3],10),Math.pow(10,m[3].length));
  else f=F.int(parseInt(m[2],10));
  if(m[4]){
    const d=parseInt(m[4],10);
    if(d===0)perr('分母が0になっているよ');
    f=f.div(F.int(d));
  }
  if(m[1])f=f.neg();
  return f;
}

/* =====================================================
   generators
   各 gen(lv) → {html, text, cond?, params, answer, ansHTML, ansText}
===================================================== */
function exprPack(html,text,terms,params){
  return {html:html,text:text,params:params,
    answer:{type:'expr',terms:terms},
    ansHTML:termsHTML(terms),ansText:termsText(terms)};
}
function sysHTML(h1,h2){return '<span class="sys"><span class="rows"><span>'+h1+'</span><span>'+h2+'</span></span></span>';}
function sysPack(h1,h2,t1,t2,s,t,eqs,params){
  const p=params||{};p.eqs=eqs;p.sol=[s,t];
  return {html:sysHTML(h1,h2),text:t1+' ， '+t2,params:p,
    answer:{type:'sys',x:F.int(s),y:F.int(t)},
    ansHTML:'x = '+numDisp(s)+'，y = '+numDisp(t),
    ansText:'x='+s+', y='+t};
}
function det2(e1,e2){return e1[0]*e2[1]-e2[0]*e1[1];}
function linExprHTML(a,b){
  let h='',first=true;
  if(a){h+=signCoef(a,'x',first);first=false;}
  if(b){h+=signCoef(b,'y',first);first=false;}
  return first?'0':h;
}
function linExprText(a,b){return linExprHTML(a,b).replace(/ /g,'').replace(/−/g,'-');}
/* 小数係数（10分の1単位の整数で受け取る） */
function decCoef(k10,v,first){
  const neg=k10<0,m=Math.abs(k10);
  const cs=(m%10===0)?(m===10?'':String(m/10)):(m/10).toFixed(1);
  return (first?(neg?'−':''):(neg?' − ':' + '))+cs+v;
}
function decStr(n10){
  const v=n10/10;
  return numDisp(Number.isInteger(v)?String(v):v.toFixed(1));
}
function decEqHTML(a10,b10,c10){
  let h='',first=true;
  if(a10){h+=decCoef(a10,'x',first);first=false;}
  if(b10){h+=decCoef(b10,'y',first);first=false;}
  return h+' = '+decStr(c10);
}
function decEqText(a10,b10,c10){return decEqHTML(a10,b10,c10).replace(/ /g,'').replace(/−/g,'-');}
/* 小数第2位まで（100分の1単位の整数で受け取る）— 応用の小数連立用。末尾0は落とす（1.50→1.5, 0.25→0.25） */
function decStr2(n100){
  const v=n100/100;
  if(Number.isInteger(v))return numDisp(String(v));
  return numDisp(v.toFixed(2).replace(/0$/,''));
}
function decCoef2(k100,v,first){
  const neg=k100<0,m=Math.abs(k100);
  const cs=(m===100)?'':decStr2(m);
  return (first?(neg?'−':''):(neg?' − ':' + '))+cs+v;
}
function decEqHTML2(a100,b100,c100){
  let h='',first=true;
  if(a100){h+=decCoef2(a100,'x',first);first=false;}
  if(b100){h+=decCoef2(b100,'y',first);first=false;}
  return h+' = '+decStr2(c100);
}
function decEqText2(a100,b100,c100){return decEqHTML2(a100,b100,c100).replace(/ /g,'').replace(/−/g,'-');}

/* ---- STEP1 同類項 ---- */
function genDoruikou(lv){
  for(let g=0;g<60;g++){
    let raw;
    /* Lv3以上は分数係数を混ぜる（PDFテーマ2 3(3)(4)相当。½x−3/2y+x+⅓y など） */
    const frac=(lv>=3)&&Math.random()<(lv>=4?.55:.4);
    if(frac){
      const dens=lv>=4?[2,3,4,6]:[2,3,4];
      const fc=function(){return new F(rnz(-3,3),pick(dens));};
      raw=[T(fc(),1,0),T(fc(),1,0),T(fc(),0,1),T(fc(),0,1)];
      if(lv>=4&&Math.random()<.5){raw.push(T(fc(),0,0));raw.push(T(fc(),0,0));}
    }
    else if(lv===1)raw=[T(ri(1,5),1,0),T(rnz(-5,5),1,0),T(ri(1,5),0,1),T(rnz(-5,5),0,1)];
    else if(lv===2)raw=[T(rnz(-9,9),1,0),T(rnz(-9,9),1,0),T(rnz(-9,9),0,1),T(rnz(-9,9),0,1)];
    else if(lv===3){
      raw=[T(rnz(-6,6),2,0),T(rnz(-6,6),1,0),T(rnz(-6,6),2,0),T(rnz(-6,6),1,0)];
      if(Math.random()<.5)raw.push(T(rnz(-6,6),0,0));
    }else{ /* Lv4: 6項フル */
      raw=[T(rnz(-9,9),2,0),T(rnz(-9,9),1,0),T(rnz(-9,9),0,0),T(rnz(-9,9),2,0),T(rnz(-9,9),1,0),T(rnz(-9,9),0,0)];
    }
    shuffle(raw);
    const ans=combineTerms(raw);
    if(!ans.length||ans.length>=raw.length)continue;
    return exprPack(termsHTML(raw),termsText(raw),ans,{lv:lv});
  }
  return genDoruikou(1);
}
/* ---- STEP2/3 たし算・ひき算 ---- */
function poly2(lv){
  if(lv===1)return [[T(ri(1,6),1,0),T(ri(1,6),0,1)],[T(ri(1,6),1,0),T(rnz(-6,6),0,1)]];
  if(lv===2)return [[T(rnz(-7,7),1,0),T(rnz(-7,7),0,1)],[T(rnz(-7,7),1,0),T(rnz(-7,7),0,1)]];
  if(lv===3)return [[T(rnz(-8,8),2,0),T(rnz(-8,8),1,0),T(rnz(-8,8),0,0)],[T(rnz(-8,8),2,0),T(rnz(-8,8),1,0),T(rnz(-8,8),0,0)]];
  if(lv>=4&&Math.random()<.5){ /* 応用: 分数係数の加減（例 (½x+⅓y)+(¼x−⅚y)）*/
    const fc=function(){
      const den=pick([2,3,4,6]);
      const num=pick([1,2,3,4,5].filter(function(x){return x<den&&G(x,den)===1;}));
      return new F(pick([1,-1])*num,den);
    };
    return [[T(fc(),1,0),T(fc(),0,1)],[T(fc(),1,0),T(fc(),0,1)]];
  }
  return [[T(rnz(-12,12),2,0),T(rnz(-12,12),1,0),T(rnz(-12,12),0,0)],[T(rnz(-12,12),2,0),T(rnz(-12,12),1,0),T(rnz(-12,12),0,0)]];
}
function genTashizan(lv){
  for(let g=0;g<60;g++){
    const pr=poly2(lv),P=pr[0],Q=pr[1];
    const ans=combineTerms(P.concat(Q));
    if(!ans.length)continue;
    return exprPack('('+termsHTML(P)+') + ('+termsHTML(Q)+')',
      '('+termsText(P)+')+('+termsText(Q)+')',ans,{lv:lv});
  }
  return genTashizan(1);
}
function genHikizan(lv){
  for(let g=0;g<60;g++){
    const pr=poly2(lv),P=pr[0],Q=pr[1];
    const ans=combineTerms(P.concat(Q.map(u=>T(u.c.neg(),u.ex,u.ey))));
    if(!ans.length)continue;
    return exprPack('('+termsHTML(P)+') − ('+termsHTML(Q)+')',
      '('+termsText(P)+')-('+termsText(Q)+')',ans,{lv:lv});
  }
  return genHikizan(1);
}
/* ---- STEP4 数×多項式 ---- */
function genSuuBai(lv){
  let kF,P;
  if(lv===1){kF=F.int(ri(2,4));P=[T(ri(1,5),1,0),T(rnz(-5,5),0,1)];}
  else if(lv===2){kF=F.int(pick([-4,-3,-2,2,3,4]));P=[T(rnz(-6,6),1,0),T(rnz(-6,6),0,1)];}
  else if(lv===3){kF=F.int(pick([-5,-4,-3,-2,2,3,4,5]));P=[T(rnz(-5,5),1,0),T(rnz(-5,5),0,1),T(rnz(-5,5),0,0)];}
  else if(Math.random()<.5){ /* Lv4: 分数の乗数（PDFテーマ4 (7)(8)相当。½(4x−6y) など） */
    const den=pick([2,3,4]),num=pick([1,2,3].filter(function(x){return x<den&&G(x,den)===1;})),sg=pick([1,-1]);
    kF=new F(sg*num,den);
    P=[T(den*rnz(-3,3),1,0),T(den*rnz(-3,3),0,1),T(den*rnz(-2,2),0,0)];
  }
  else{kF=F.int(pick([-9,-8,-7,-6,6,7,8,9]));P=[T(rnz(-6,6),1,0),T(rnz(-6,6),0,1),T(rnz(-6,6),0,0)];}

/* ---- STEP5 多項式÷数 ---- */

/* ---- STEP6 分配してたし算・ひき算 ---- */

        return new F((signed?pick([1,-1]):1)*num,den);

    const qk=op==='-'?-qa:qa;

/* ---- STEP7 分数の形 ---- */
function genBunsuu(lv){

/* ---- STEP8 単項式のかけ算 ---- */
function genTanKake(lv){
  for(let g=0;g<60;g++){
    let t1,t2;
    if(lv===1){
      t1=T(ri(2,5),1,0);
      t2=Math.random()<.5?T(ri(2,5),0,1):T(ri(2,5),1,0);
    }else if(lv===2){
      const e1=pick([[1,0],[0,1]]),e2=pick([[1,0],[0,1]]);
      t1=T(rnz(-6,6),e1[0],e1[1]);t2=T(rnz(-6,6),e2[0],e2[1]);
    }else if(lv===3){
      t1=pick([T(rnz(-4,4),1,1),T(rnz(-4,4),2,0),T(rnz(-4,4),1,0)]);
      t2=pick([T(rnz(-4,4),1,0),T(rnz(-4,4),0,1),T(rnz(-4,4),1,1)]);
    }else if(Math.random()<.5){ /* Lv4: 分数係数（PDFテーマ7 3相当。⅓x×(−9x²) など） */
      const d=pick([2,3,4]);
      const va=pick([[1,0],[0,1],[2,0]]),vb=pick([[1,0],[0,1],[1,1]]);
      t1=T(new F(pick([1,-1]),d),va[0],va[1]);
      t2=T(d*rnz(-3,3),vb[0],vb[1]);
    }else{
      t1=pick([T(rnz(-6,6),1,1),T(rnz(-6,6),2,0),T(rnz(-6,6),0,2)]);
      t2=pick([T(rnz(-6,6),1,1),T(rnz(-6,6),1,0),T(rnz(-6,6),0,1)]);
    }
    if(t1.ex+t2.ex>3||t1.ey+t2.ey>3)continue;
    if(Math.abs(t1.c.n*t2.c.n)>(lv>=4?64:36))continue;
    const ans=mulPoly([t1],[t2]);
    return exprPack(monoHTML(t1,false)+' × '+monoHTML(t2,true),
      monoText(t1,false)+'*'+monoText(t2,true),ans,{lv:lv});
  }
  return genTanKake(1);
}
/* ---- STEP9 累乗のあるかけ算 ---- */
function genJijouKake(lv){
  for(let g=0;g<60;g++){
    let bc,sv,pw,t2;
    if(lv===1){bc=F.int(ri(2,3));sv=[1,0];pw=2;t2=T(ri(2,4),0,1);}
    else if(lv===2){bc=F.int(pick([-3,-2,2,3]));sv=pick([[1,0],[0,1]]);pw=2;
      t2=T(rnz(-4,4),sv[0]?0:1,sv[0]?1:0);}
    else if(lv===3){bc=F.int(pick([-3,-2,2,3]));sv=pick([[1,0],[0,1]]);pw=pick([2,2,3]);
      t2=pw===3?T(rnz(-4,4),0,0):pick([T(rnz(-3,3),1,0),T(rnz(-3,3),0,1),T(rnz(-3,3),1,1)]);}
    else{ /* Lv4: 3乗・分数係数の底（PDFテーマ7 3(3) (−2x)³, (½a)²×4a 相当） */
      pw=pick([2,3]);sv=pick([[1,0],[0,1]]);
      if(Math.random()<.4){
        const d=pick([2,3]),need=Math.pow(d,pw);
        bc=new F(pick([1,-1]),d);
        t2=T(need*pick([1,-1])*ri(1,2),pw===3?0:pick([0,1]),pw===3?0:pick([0,1]));
      }else{
        bc=F.int(pw===3?pick([-3,-2,2,3]):pick([-4,-3,-2,2,3,4]));
        t2=pw===3?T(rnz(-4,4),0,0):pick([T(rnz(-4,4),1,0),T(rnz(-4,4),0,1),T(rnz(-4,4),1,1)]);
      }
    }
    const sq=T(Fpow(bc,pw),sv[0]*pw,sv[1]*pw);
    if(sq.ex+t2.ex>3||sq.ey+t2.ey>3)continue;
    if(Math.abs(sq.c.n*t2.c.n)>(lv>=4?200:40))continue;
    const ans=mulPoly([sq],[t2]);
    if(ans.some(function(u){return !u.c.isInt();}))continue;
    const base=T(bc,sv[0],sv[1]);
    return exprPack('('+termsHTML([base])+')<sup>'+pw+'</sup> × '+monoHTML(t2,true),
      '('+termsText([base])+')^'+pw+'*'+monoText(t2,true),ans,{lv:lv});
  }
  return genJijouKake(1);
}
/* ---- STEP10 単項式のわり算 ---- */
function genTanWaru(lv){
  for(let g=0;g<60;g++){
    if(lv>=4&&Math.random()<.5){ /* Lv4: 分数係数の単項式でわる（PDFテーマ8 3相当。5xy÷⅓x, 4xy÷(−½x)） */
      const d=pick([2,3,4]),bv=pick([[1,0],[0,1]]);
      const B=T(new F(pick([1,-1]),d),bv[0],bv[1]);
      const A0=T(rnz(-5,5),bv[0]+ri(0,1),bv[1]+ri(0,1));
      const q2={c:A0.c.div(B.c),ex:A0.ex-B.ex,ey:A0.ey-B.ey};
      if(q2.ex<0||q2.ey<0)continue;
      if(A0.ex>3||A0.ey>3||(!A0.ex&&!A0.ey))continue;
      return exprPack(monoHTML(A0,false)+' ÷ '+monoHTML(B,true),
        monoText(A0,false)+'/'+monoText(B,true),[q2],{lv:lv});
    }
    let B,q;
    if(lv===1){B=T(ri(2,4),1,0);q=T(ri(2,5),ri(0,1),0);}
    else if(lv===2){
      const v=pick([[1,0],[0,1]]);
      B=T(pick([-5,-4,-3,-2,2,3,4,5]),v[0],v[1]);
      q=T(rnz(-5,5),ri(0,1),ri(0,1));
    }else if(lv===3){
      B=T(pick([-4,-3,-2,2,3,4]),ri(0,1),ri(0,1));
      if(!B.ex&&!B.ey)continue;
      q=T(rnz(-5,5),ri(0,1),ri(0,1));
    }else{
      B=T(pick([-6,-5,-4,-3,-2,2,3,4,5,6]),ri(0,1),ri(0,1));
      if(!B.ex&&!B.ey)continue;
      q=T(rnz(-6,6),ri(0,2),ri(0,1));
    }
    const A=mulPoly([q],[B])[0];
    if(!A||A.ex>3||A.ey>3)continue;
    if(Math.abs(A.c.n)>(lv>=4?96:48))continue;
    if(!A.ex&&!A.ey)continue;
    return exprPack(monoHTML(A,false)+' ÷ '+monoHTML(B,true),
      monoText(A,false)+'/'+monoText(B,true),[q],{lv:lv});
  }
  return genTanWaru(1);
}
/* ---- STEP11 かけ算・わり算の混合 ---- */
function genKakewari(lv){
  for(let g=0;g<80;g++){
    const pat=lv===1?0:ri(0,1);
    const cvar=pick([[0,0],[1,0],[0,1]]);
    const C=T(lv===1?ri(2,3):(lv>=4?pick([-4,-3,-2,2,3,4]):pick([-3,-2,2,3])),cvar[0],cvar[1]);
    if(pat===0){
      const q=T(lv===1?ri(2,4):(lv>=4?rnz(-6,6):rnz(-5,5)),ri(0,1),ri(0,1));
      if(!q.ex&&!q.ey)continue;
      const P=mulPoly([q],[C])[0];
      if(!P||P.ex>3||P.ey>3||Math.abs(P.c.n)>(lv>=4?96:48))continue;
      const divs=[];
      for(let d=2;d<=12;d++)if(Math.abs(P.c.n)%d===0&&Math.abs(P.c.n)/d<=12)divs.push(d);
      if(!divs.length)continue;
      let ac=pick(divs);if(P.c.n<0&&Math.random()<.5)ac=-ac;
      const ax=ri(0,P.ex),ay=ri(0,P.ey);
      const A=T(ac,ax,ay),B=T(P.c.n/ac,P.ex-ax,P.ey-ay);
      if(Math.abs(B.c.n)>12)continue;
      if(!A.ex&&!A.ey&&Math.abs(A.c.n)===1)continue;
      if(!B.ex&&!B.ey&&Math.abs(B.c.n)===1)continue;
      return exprPack(monoHTML(A,false)+' × '+monoHTML(B,true)+' ÷ '+monoHTML(C,true),
        monoText(A,false)+'*'+monoText(B,true)+'/'+monoText(C,true),[q],{lv:lv});
    }else{
      const q1=T(lv>=4?rnz(-5,5):rnz(-4,4),ri(0,1),lv>=4?ri(0,1):0);
      const B=T(lv>=4?rnz(-5,5):rnz(-4,4),lv>=4?ri(0,1):0,ri(0,1));
      const A=mulPoly([q1],[C])[0];
      const ans=mulPoly([q1],[B])[0];
      if(!A||!ans)continue;
      if(A.ex>3||A.ey>3||Math.abs(A.c.n)>(lv>=4?96:48))continue;
      if(ans.ex>3||ans.ey>3||Math.abs(ans.c.n)>(lv>=4?96:48))continue;
      if(!A.ex&&!A.ey)continue;
      if(!ans.ex&&!ans.ey)continue;
      return exprPack(monoHTML(A,false)+' ÷ '+monoHTML(C,true)+' × '+monoHTML(B,true),
        monoText(A,false)+'/'+monoText(C,true)+'*'+monoText(B,true),[ans],{lv:lv});
    }
  }
  return genTanWaru(lv);
}
/* ---- STEP12 式の値 ---- */
function genShikiNoAtai(lv){

      P=[T(rnz(-4,4),1,0),T(rnz(-4,4),0,1)];Q=[T(rnz(-4,4),1,0),T(rnz(-4,4),0,1)];}
    else if(lv===3){p=pick([-3,-2,2,3]);q=pick([-3,-2,2,3]);sF=F.int(rnz(-5,5));tF=F.int(rnz(-5,5));
      P=[T(rnz(-5,5),2,0),T(rnz(-5,5),0,1)];Q=[T(rnz(-5,5),2,0),T(rnz(-5,5),0,1)];}
    else if(Math.random()<.5){ /* Lv4: 分数の代入値（PDFテーマ10相当。x=⅓, y=−½） */
      p=pick([-3,-2,2,3]);q=pick([-3,-2,2,3]);
      sF=new F(pick([1,-1]),pick([2,3]));tF=new F(pick([1,-1]),pick([2,3]));
      P=[T(rnz(-4,4),1,0),T(rnz(-4,4),0,1)];Q=[T(rnz(-4,4),1,0),T(rnz(-4,4),0,1)];}
    else{p=pick([-4,-3,-2,2,3,4]);q=pick([-4,-3,-2,2,3,4]);sF=F.int(rnz(-6,6));tF=F.int(rnz(-6,6));
      P=[T(rnz(-6,6),2,0),T(rnz(-6,6),1,0)];Q=[T(rnz(-6,6),2,0),T(rnz(-6,6),0,1)];}
    const simp=combineTerms(
      P.map(function(u){return T(u.c.mul(F.int(p)),u.ex,u.ey);})
      .concat(Q.map(function(u){return T(u.c.mul(F.int(q)),u.ex,u.ey);})));
    if(simp.length<2)continue;

    if(lv===1){

      html=pd+'('+termsHTML(P)+')'+(q<0?' − ':' + ')+Math.abs(q)+'('+termsHTML(Q)+')';
      text=p+'('+termsText(P)+')'+(q<0?'-':'+')+Math.abs(q)+'('+termsText(Q)+')';
    }
    return {html:html,text:text,
      cond:'x = '+cs(sF)+'，y = '+cs(tF)+' のとき、次の式の値は？',

  return genShikiNoAtai(1);
}

/* ---- STEP 3つの単項式の乗除（PDFテーマ9）---- */
function genThreeMono(lv){
  for(let g=0;g<80;g++){
    const maxc=lv===1?6:(lv===2?9:(lv>=4?12:10));
    const rx=lv===1?ri(1,2):ri(0,3), ry=lv===1?0:ri(0,2);
    if(rx+ry===0)continue;
    const res={c:F.int(rnz(-maxc,maxc)),ex:rx,ey:ry};
    const ops=pick(lv===1?[['×','×'],['×','÷']]:[['×','×'],['×','÷'],['÷','×'],['÷','÷']]);
    const rmono=function(){
      let c;
      if(lv>=4&&Math.random()<.3)c=new F(pick([1,-1]),pick([2,3]));
      else c=F.int(rnz(-(lv>=3?5:4),(lv>=3?5:4)));
      return {c:c,ex:ri(0,lv===1?1:2),ey:ri(0,lv===1?1:2)};
    };
    const m2=rmono(), m3=rmono();
    if(m2.c.isZero()||m3.c.isZero())continue;
    /* result = (m1 op2 m2) op3 m3 を逆算して m1 を求める */
    const I=ops[1]==='×'
      ?{c:res.c.div(m3.c),ex:res.ex-m3.ex,ey:res.ey-m3.ey}
      :{c:res.c.mul(m3.c),ex:res.ex+m3.ex,ey:res.ey+m3.ey};
    const m1=ops[0]==='×'
      ?{c:I.c.div(m2.c),ex:I.ex-m2.ex,ey:I.ey-m2.ey}
      :{c:I.c.mul(m2.c),ex:I.ex+m2.ex,ey:I.ey+m2.ey};
    const all=[m1,m2,m3];
    if(all.some(function(m){return m.ex<0||m.ey<0||m.ex>3||m.ey>3;}))continue;
    if(m1.c.isZero()||(!m1.c.isInt()&&lv<4))continue;
    if(Math.abs(m1.c.n)>(lv>=4?24:16)||Math.abs(m2.c.n)>12||Math.abs(m3.c.n)>12)continue;
    const trivial=function(m){return !m.ex&&!m.ey&&m.c.isInt()&&Math.abs(m.c.n)===1;};
    if(trivial(m1)||trivial(m2)||trivial(m3))continue;
    const h=monoHTML(m1,false)+' '+ops[0]+' '+monoHTML(m2,true)+' '+ops[1]+' '+monoHTML(m3,true);
    const tx=monoText(m1,false)+(ops[0]==='×'?'*':'/')+monoText(m2,true)+(ops[1]==='×'?'*':'/')+monoText(m3,true);
    return exprPack(h,tx,[{c:res.c,ex:res.ex,ey:res.ey}],{lv:lv});
  }
  return genThreeMono(1);
}
/* ---- STEP8 累乗と乗除 ---- */
/* 基本・標準(lv1〜3): 単変数の累乗を1つふくむ3因数の乗除（整数・答えも整数の単項式）*/
function genJijouJoujo(lv){
  if(lv>=4)return genJijouJoujoAdv();   /* 応用は別ロジック（多変数の累乗・分数係数・分母に変数もあり）*/
  for(let g=0;g<200;g++){
    const pw=(Math.random()<(lv===1?.35:.45))?3:2;
    const pv=pick([[1,0],[0,1]]);
    const bco=(pw===3)?(lv===1?2:pick([-2,2])):(lv===1?pick([2,3]):pick([-3,-2,2,3]));
    const powBase=T(bco,pv[0],pv[1]);
    const powTerm={c:Fpow(F.int(bco),pw),ex:pv[0]*pw,ey:pv[1]*pw};
    const mono=function(){
      const c=lv===1?ri(2,4):rnz(-5,5);
      const v=pick([[0,0],[1,0],[0,1]]);
      return {c:F.int(c),ex:v[0],ey:v[1]};
    };
    const m2=mono(), m3=mono();
    const trivial=function(f){return !f.ex&&!f.ey&&f.c.isInt()&&Math.abs(f.c.n)===1;};
    if(m2.c.isZero()||m3.c.isZero()||trivial(m2)||trivial(m3))continue;
    if(m2.ex===m3.ex&&m2.ey===m3.ey&&m2.c.eq(m3.c))continue;   /* ×3x÷3x など冗長式を避ける */
    const slot=ri(0,2);
    const items=[]; let mi=0; const ms=[m2,m3];
    for(let s=0;s<3;s++)items.push(s===slot?{kind:'pow',term:powTerm}:{kind:'mono',term:ms[mi++]});
    if(items[0].kind==='mono'&&!items[0].term.ex&&!items[0].term.ey)continue;
    const ops=[pick(['×','÷']),pick(['×','÷'])];
    let val={c:items[0].term.c,ex:items[0].term.ex,ey:items[0].term.ey};
    for(let k=0;k<2;k++){
      const f=items[k+1].term;
      if(ops[k]==='×')val={c:val.c.mul(f.c),ex:val.ex+f.ex,ey:val.ey+f.ey};
      else val={c:val.c.div(f.c),ex:val.ex-f.ex,ey:val.ey-f.ey};
    }
    if(val.ex<0||val.ey<0||val.ex>3||val.ey>3)continue;
    if(!val.c.isInt())continue;
    if(val.c.isZero()||Math.abs(val.c.n)>24)continue;
    let h='',tx='';
    for(let s=0;s<3;s++){
      const it=items[s];
      if(s>0){h+=' '+ops[s-1]+' ';tx+=(ops[s-1]==='×'?'*':'/');}
      if(it.kind==='pow'){h+='('+termsHTML([powBase])+')<sup>'+pw+'</sup>';tx+='('+termsText([powBase])+')^'+pw;}
      else{h+=monoHTML(it.term,s>0);tx+=monoText(it.term,s>0);}
    }
    return exprPack(h,tx,[{c:val.c,ex:val.ex,ey:val.ey}],{lv:lv});
  }
  return genJijouJoujo(1);
}
/* 応用: 画像のような複雑な乗除（多変数の単項式の累乗・分数係数・答えの分母に変数もあり）*/
function genJijouJoujoAdv(){
  for(let g=0;g<400;g++){
    /* 累乗因数 (c・x^a・y^b)^pw : 底は多変数、係数は整数or分数（例 (2x³y)², (−3/2 x²y)³）*/
    const pw=pick([2,2,3]);
    let bc;
    if(Math.random()<.4){
      const den=pick([2,3,4]);
      let num; do{num=ri(1,5);}while(G(num,den)!==1);
      bc=new F(pick([1,-1])*num,den);
    }else bc=F.int(pick([-3,-2,2,3]));
    let ba=ri(0,3), bb=ri(0,3);
    if(ba+bb===0){ if(Math.random()<.5)ba=ri(1,3); else bb=ri(1,3); }
    if(ba*pw>6||bb*pw>6)continue;
    const powBase=T(bc,ba,bb);
    const powTerm={c:Fpow(bc,pw),ex:ba*pw,ey:bb*pw};
    /* 単項式因数（係数は整数or分数、指数0〜3。例 5/4 x⁴y³, −2/9 y², 4x²y）*/
    const mono=function(){
      let c;
      if(Math.random()<.5){
        const den=pick([2,3,4,6]);
        let num; do{num=ri(1,6);}while(G(num,den)!==1);
        c=new F(pick([1,-1])*num,den);
      }else c=F.int(pick([-9,-8,-6,-5,-4,-3,-2,2,3,4,5,6,8,9]));
      return {c:c,ex:ri(0,3),ey:ri(0,3)};
    };
    const monos=[mono(),mono(),mono()];
    if(monos.some(function(m){return m.c.isZero();}))continue;
    /* 70%は累乗因数を1つ入れる。30%は分数係数の単項式だけの乗除（画像②タイプ）*/
    const powSlot=(Math.random()<.7)?ri(0,2):-1;
    const items=[];
    for(let s=0;s<3;s++)items.push(s===powSlot?{kind:'pow',term:powTerm,base:powBase,pw:pw}:{kind:'mono',term:monos[s]});
    if(!items[0].term.ex&&!items[0].term.ey)continue;   /* 先頭が定数だけは避ける */
    let ops=[pick(['×','÷']),pick(['×','÷'])];
    if(ops[0]==='×'&&ops[1]==='×')ops[ri(0,1)]='÷';     /* 乗除の混合にする（最低1つは÷）*/
    let val={c:items[0].term.c,ex:items[0].term.ex,ey:items[0].term.ey};
    for(let k=0;k<2;k++){
      const f=items[k+1].term;
      if(ops[k]==='×')val={c:val.c.mul(f.c),ex:val.ex+f.ex,ey:val.ey+f.ey};
      else val={c:val.c.div(f.c),ex:val.ex-f.ex,ey:val.ey-f.ey};
    }
    if(val.c.isZero())continue;
    if(val.ex===0&&val.ey===0)continue;                 /* 定数だけの答えは避ける */
    if(Math.abs(val.ex)>6||Math.abs(val.ey)>6)continue;
    if(val.c.d>12)continue;
    const cv=Math.abs(val.c.n/val.c.d);
    if(cv<1/12||cv>40||Math.abs(val.c.n)>120)continue;
    let h='',tx='';
    for(let s=0;s<3;s++){
      const it=items[s];
      if(s>0){h+=' '+ops[s-1]+' ';tx+=(ops[s-1]==='×'?'*':'/');}
      if(it.kind==='pow'){h+='('+termsHTML([it.base])+')<sup>'+it.pw+'</sup>';tx+='('+termsText([it.base])+')^'+it.pw;}
      else{h+=monoHTML(it.term,s>0);tx+=monoText(it.term,s>0);}
    }
    return {html:h,text:tx,params:{lv:4},
      answer:{type:'expr',terms:[val]},
      ansHTML:monoAnsHTML(val),ansText:monoAnsText(val)};
  }
  return genJijouJoujoAdv();
}
/* ---- STEP 等式の変形（PDFテーマ11）---- */
function genHenkei(lv){
  const solveY=(lv>=3)?(Math.random()<.5):true;
  const tv=solveY?'y':'x', ov=solveY?'x':'y';
  let bT,bO,c;
  if(lv===1){bT=pick([1,-1]);bO=pick([1,2,3,4]);c=rnz(-8,8);}
  else if(lv===2){bT=pick([1,-1]);bO=pick([-5,-4,-3,-2,2,3,4,5]);c=rnz(-9,9);}
  else if(lv===3){bT=pick([-4,-3,-2,2,3,4]);bO=pick([-6,-5,-4,-3,-2,2,3,4,5,6]);c=rnz(-12,12);}
  else{bT=pick([-6,-5,-4,-3,-2,2,3,4,5,6]);bO=pick([-7,-6,-5,-4,-3,-2,2,3,4,5,6,7]);c=rnz(-14,14);}
  const ax=solveY?bO:bT, ay=solveY?bT:bO;
  const constT=new F(c,bT), coefT=new F(-bO,bT);
  const ans=combineTerms([T(constT,0,0),T(coefT,ov==='x'?1:0,ov==='y'?1:0)]);
  return {html:linEq(ax,ay,c),text:linEqText(ax,ay,c),
    cond:'次の等式を '+tv+' について解こう（'+tv+' = □ の □ を答えてね）',
    params:{lv:lv,solve:tv},
    answer:{type:'expr',terms:ans},
    ansHTML:tv+' = '+termsHTML(ans),ansText:tv+'='+termsText(ans)};
}

/* ---- STEP13 そのまま加減法 ---- */
function genSonomama(lv){
  for(let g=0;g<60;g++){
    const R=lv===1?5:(lv===2?6:(lv===3?9:10));
    const s=lv===1?ri(1,R):rnz(-R,R), t=lv===1?ri(1,R):rnz(-R,R);
    let e1,e2;
    if(lv===1&&Math.random()<.5){
      e1=[1,1,0];e2=[1,-1,0];
      if(Math.random()<.5){const w=e1;e1=e2;e2=w;}
    }else{
      const tgt=ri(0,1), k=ri(1,lv===1?2:(lv>=4?6:4)), sg=pick([1,-1]);
      const rc=()=>lv===1?ri(1,3):(lv>=4?rnz(-8,8):rnz(-5,5));
      if(tgt===0){e1=[k,rc(),0];e2=[k*sg,rc(),0];}
      else{e1=[rc(),k,0];e2=[rc(),k*sg,0];}
    }
    if(det2(e1,e2)===0)continue;
    e1[2]=e1[0]*s+e1[1]*t;e2[2]=e2[0]*s+e2[1]*t;
    if(Math.abs(e1[2])>(lv>=4?160:60)||Math.abs(e2[2])>(lv>=4?160:60))continue;
    return sysPack(linEq(e1[0],e1[1],e1[2]),linEq(e2[0],e2[1],e2[2]),
      linEqText(e1[0],e1[1],e1[2]),linEqText(e2[0],e2[1],e2[2]),s,t,[e1,e2],{lv:lv});
  }
  return genSonomama(1);
}
/* ---- STEP14 片方を何倍か ---- */
function genKatahou(lv){
  for(let g=0;g<60;g++){
    const R=lv===1?4:(lv===2?5:(lv===3?8:9));
    const s=lv===1?ri(1,R):rnz(-R,R), t=lv===1?ri(1,R):rnz(-R,R);
    const k=lv>=4?pick([2,3,4,5]):pick([2,3]), tgt=ri(0,1);
    const rc=()=>lv===1?ri(1,4):(lv>=4?rnz(-8,8):rnz(-5,5));
    let e1,e2;
    if(tgt===0){
      const a2=lv===1?ri(1,3):(lv>=4?rnz(-5,5):rnz(-3,3));
      e2=[a2,rc(),0];e1=[k*a2,rc(),0];
      if(e1[1]===k*e2[1])continue;
      if(Math.abs(e1[1])===Math.abs(e2[1]))continue;
    }else{
      const b2=lv===1?ri(1,3):(lv>=4?rnz(-5,5):rnz(-3,3));
      e2=[rc(),b2,0];e1=[rc(),k*b2,0];
      if(e1[0]===k*e2[0])continue;
      if(Math.abs(e1[0])===Math.abs(e2[0]))continue;
    }
    if(det2(e1,e2)===0)continue;
    e1[2]=e1[0]*s+e1[1]*t;e2[2]=e2[0]*s+e2[1]*t;
    if(Math.abs(e1[2])>(lv>=4?160:60)||Math.abs(e2[2])>(lv>=4?160:60))continue;
    const ord=Math.random()<.5;
    const A=ord?e1:e2,B=ord?e2:e1;
    return sysPack(linEq(A[0],A[1],A[2]),linEq(B[0],B[1],B[2]),
      linEqText(A[0],A[1],A[2]),linEqText(B[0],B[1],B[2]),s,t,[A,B],{lv:lv,k:k});
  }
  return genSonomama(lv);
}
/* ---- STEP15 両方を何倍か ---- */
function genRyouhou(lv){
  for(let g=0;g<60;g++){
    const R=lv===1?4:(lv===2?5:(lv===3?7:9));
    const s=lv===1?ri(1,R):rnz(-R,R), t=lv===1?ri(1,R):rnz(-R,R);
    const pr=shuffle(pick(lv>=4?[[3,4],[2,5],[3,5],[4,5],[4,7],[5,6],[3,7]]:[[2,3],[3,4],[2,5],[3,5],[4,5]]).slice());
    const tgt=ri(0,1);
    const sg1=lv===1?1:pick([1,-1]), sg2=pick([1,-1]);
    const rc=()=>lv===1?ri(1,4):(lv>=4?rnz(-8,8):rnz(-5,5));
    let e1,e2;
    if(tgt===0){e1=[pr[0]*sg1,rc(),0];e2=[pr[1]*sg2,rc(),0];
      if(Math.abs(e1[1])===Math.abs(e2[1]))continue;}
    else{e1=[rc(),pr[0]*sg1,0];e2=[rc(),pr[1]*sg2,0];
      if(Math.abs(e1[0])===Math.abs(e2[0]))continue;}
    if(det2(e1,e2)===0)continue;
    e1[2]=e1[0]*s+e1[1]*t;e2[2]=e2[0]*s+e2[1]*t;
    if(Math.abs(e1[2])>(lv>=4?180:70)||Math.abs(e2[2])>(lv>=4?180:70))continue;
    return sysPack(linEq(e1[0],e1[1],e1[2]),linEq(e2[0],e2[1],e2[2]),
      linEqText(e1[0],e1[1],e1[2]),linEqText(e2[0],e2[1],e2[2]),s,t,[e1,e2],{lv:lv});
  }
  return genSonomama(lv);
}
/* ---- STEP16 代入法 ---- */
function genDainyu(lv){
  for(let g=0;g<60;g++){
    const R=lv===1?4:(lv===2?5:(lv===3?6:8));
    const s=lv===1?ri(1,R):rnz(-R,R), t=lv===1?ri(1,R):rnz(-R,R);
    const form=(lv>=3&&Math.random()<.5)?'x':'y';
    const a=lv===1?ri(1,3):(lv>=4?rnz(-4,4):rnz(-3,3));
    const ad=a===1?'':(a===-1?'−':numDisp(a));
    const at=a===1?'':(a===-1?'-':String(a));
    let e1,h1,t1;
    if(form==='y'){
      const b=t-a*s;
      e1=[-a,1,b];
      h1='y = '+ad+'x'+(b?(b>0?' + '+b:' − '+(-b)):'');
      t1='y='+at+'x'+(b?(b>0?'+'+b:String(b)):'');
    }else{
      const b=s-a*t;
      e1=[1,-a,b];
      h1='x = '+ad+'y'+(b?(b>0?' + '+b:' − '+(-b)):'');
      t1='x='+at+'y'+(b?(b>0?'+'+b:String(b)):'');
    }
    const c=lv===1?ri(1,4):(lv>=4?rnz(-6,6):rnz(-5,5)), d=lv===1?ri(1,4):(lv>=4?rnz(-6,6):rnz(-5,5));
    const e2=[c,d,c*s+d*t];
    if(det2(e1,e2)===0)continue;
    if(Math.abs(e2[2])>(lv>=4?120:60))continue;
    return sysPack(h1,linEq(e2[0],e2[1],e2[2]),t1,linEqText(e2[0],e2[1],e2[2]),
      s,t,[e1,e2],{lv:lv,form:form});
  }
  return genSonomama(lv);
}
/* ---- STEP17 かっこのある連立 ---- */
function genKakko(lv){
  for(let g=0;g<60;g++){
    const R=lv===1?4:(lv===2?5:(lv===3?6:8));
    const s=lv===1?ri(1,R):rnz(-R,R), t=lv===1?ri(1,R):rnz(-R,R);
    const P=lv===1?ri(2,3):(lv>=4?pick([-4,-3,-2,2,3,4]):pick([-3,-2,2,3]));
    const m=pick([1,-1]), Q=lv>=4?rnz(-5,5):rnz(-4,4);
    const a1=P,b1=P*m+Q;
    if(!b1)continue;
    const c1=a1*s+b1*t;
    const Pd=P<0?'−'+(-P):String(P);
    const Qa=Math.abs(Q);
    const h1=Pd+'(x '+(m>0?'+':'−')+' y)'+(Q>0?' + ':' − ')+(Qa===1?'':Qa)+'y = '+numDisp(c1);
    const t1=P+'(x'+(m>0?'+':'-')+'y)'+(Q>0?'+':'-')+(Qa===1?'':Qa)+'y='+c1;
    const c=lv===1?ri(1,4):(lv>=4?rnz(-6,6):rnz(-5,5)), d=lv===1?ri(1,4):(lv>=4?rnz(-6,6):rnz(-5,5));
    const e1=[a1,b1,c1], e2=[c,d,c*s+d*t];
    if(det2(e1,e2)===0)continue;
    if(Math.abs(c1)>(lv>=4?120:60)||Math.abs(e2[2])>(lv>=4?120:60))continue;
    const ord=Math.random()<.5;
    const H=ord?[h1,linEq(c,d,e2[2])]:[linEq(c,d,e2[2]),h1];
    const TX=ord?[t1,linEqText(c,d,e2[2])]:[linEqText(c,d,e2[2]),t1];
    const EQ=ord?[e1,e2]:[e2,e1];
    return sysPack(H[0],H[1],TX[0],TX[1],s,t,EQ,{lv:lv});
  }
  return genSonomama(lv);
}
/* ---- STEP18 小数のある連立 ---- */
/* 応用: 小数第2位（100分の1・末尾5）をふくむ係数を多めに出す。
   係数は×100で「5の倍数」に限定するので、両辺×100→÷5 で扱いやすい整数連立になる。 */
function genShousuuAdv(){
  for(let g=0;g<80;g++){
    const R=8;
    const s=rnz(-R,R), t=rnz(-R,R);
    /* 75%で小数第2位あり(末尾5: 0.05,0.15,…)、25%で小数第1位まで(0.1,0.2,…)。×100整数で保持 */
    const coef=function(){return Math.random()<.75?pick([5,15,25,35,45,55]):pick([10,20,30,40,50]);};
    const a=coef(), b=coef()*pick([1,-1]);
    const a2=coef(), b2=coef()*pick([1,-1]);
    const e1=[a,b,a*s+b*t], e2=[a2,b2,a2*s+b2*t];   /* ×100スケール */
    if(det2(e1,e2)===0)continue;
    if(Math.abs(e1[2])>1000||Math.abs(e2[2])>1000)continue;   /* 定数 ≤ 10.00 */
    return sysPack(decEqHTML2(a,b,e1[2]),decEqHTML2(a2,b2,e2[2]),
      decEqText2(a,b,e1[2]),decEqText2(a2,b2,e2[2]),s,t,[e1,e2],{lv:4});
  }
  return genSonomama(4);
}
function genShousuu(lv){
  if(lv>=4)return genShousuuAdv();   /* 応用は小数第2位を多めに */
  for(let g=0;g<60;g++){
    const R=lv===1?5:(lv===2?6:(lv===3?8:9));
    const s=lv===1?ri(1,R):rnz(-R,R), t=lv===1?ri(1,R):rnz(-R,R);
    const a=ri(1,9), b=ri(1,9)*(lv===1?1:pick([1,-1]));
    const e1=[a,b,a*s+b*t];   /* ×10した整数形で保持 */
    let e2,h2,t2;
    if(lv>=2&&Math.random()<(lv>=4?1:(lv===3?.8:.5))){
      const a2=ri(1,9), b2=rnz(-9,9);
      e2=[a2,b2,a2*s+b2*t];
      h2=decEqHTML(a2,b2,e2[2]);t2=decEqText(a2,b2,e2[2]);
    }else{
      const c=rnz(-4,4), d=rnz(-4,4);
      e2=[c,d,c*s+d*t];
      h2=linEq(c,d,e2[2]);t2=linEqText(c,d,e2[2]);
    }
    if(det2(e1,e2)===0)continue;
    if(Math.abs(e1[2])>(lv>=4?150:90)||Math.abs(e2[2])>(lv>=4?150:90))continue;
    return sysPack(decEqHTML(a,b,e1[2]),h2,decEqText(a,b,e1[2]),t2,s,t,[e1,e2],{lv:lv});
  }
  return genSonomama(lv);
}
/* ---- STEP19 分数のある連立 ---- */
/* 分数の1式を作る。かっこ付き (ax+by)/L=R か、単純な x/p±y/q=e。
   {html,text,eq:[A,B,C]}（eq=分母を払った整数形）を返す。(s,t)で成り立つ。 */
function fracEqAdv(s,t){
  if(Math.random()<.55){
    /* かっこ: (ax+by)/L = R （Rは分数でもよい） */
    for(let g=0;g<40;g++){
      const L=pick([2,3,4,5,6]);
      const a=rnz(-4,4), b=rnz(-4,4);
      if(!a||!b)continue;
      if(a%L===0&&b%L===0)continue;   /* 約分で分母が消える(分数に見えない)のを避ける */
      const V=a*s+b*t;
      const Rf=new F(V,L);            /* 右辺（整数or分数） */
      if(Math.abs(Rf.n)>20)continue;
      return {html:fracHTML(linExprHTML(a,b),L)+' = '+fnumHTML(Rf),
              text:'('+linExprText(a,b)+')/'+L+'='+fnumText(Rf), eq:[a,b,V]};
    }
    return null;
  }
  /* 単純分数の項: x/p ± y/q = e （eは分数でもよい） */
  const p=pick([2,3,4,5,6]), q=pick([2,3,4,5,6]), sg=pick([1,-1]);
  const ef=new F(s,p).add(new F(sg*t,q));
  if(Math.abs(ef.n)>30)return null;
  const L=lcm(p,q);
  return {html:fracHTML('x',p)+(sg>0?' + ':' − ')+fracHTML('y',q)+' = '+fnumHTML(ef),
          text:'x/'+p+(sg>0?'+':'-')+'y/'+q+'='+fnumText(ef), eq:[L/p, sg*L/q, (L/p)*s+sg*(L/q)*t]};
}
/* 応用: 両方とも分数の式にする（かっこがあってもよい） */
function genBunsuuRAdv(){
  for(let g=0;g<150;g++){
    const s=rnz(-6,6), t=rnz(-6,6);
    if(Math.abs(s)<2||Math.abs(t)<2)continue;   /* 分数にしやすい ±2〜6 */
    const eq1=fracEqAdv(s,t), eq2=fracEqAdv(s,t);
    if(!eq1||!eq2)continue;
    if(det2(eq1.eq,eq2.eq)===0)continue;
    return sysPack(eq1.html,eq2.html,eq1.text,eq2.text,s,t,[eq1.eq,eq2.eq],{lv:4});
  }
  return genBunsuuR(3);
}
function genBunsuuR(lv){
  if(lv>=4)return genBunsuuRAdv();   /* 応用は両方とも分数 */
  for(let g=0;g<60;g++){
    const dens=lv===1?[2,3]:[2,3,4];
    const p=pick(dens);let q;do{q=pick(dens);}while(q===p);
    let s,t;
    if(lv===1){                       /* 基本: 定数（右辺）は整数（x/p, y/q が割り切れる） */
      const u=ri(1,3), v=ri(1,3);
      s=p*u; t=q*v;
    }else{                            /* 標準: 定数（右辺）は分数もあり */
      const rng=lv===2?4:5;
      s=rnz(-rng,rng); t=rnz(-rng,rng);
    }
    const op=lv===1?1:pick([1,-1]);
    const L=lcm(p,q);
    const ef=new F(s,p).add(new F(op*t,q));        /* 右辺 = s/p + op·t/q （分数の場合あり） */
    const e1=[L/p,op*L/q,(L/p)*s+op*(L/q)*t];      /* 分母を払った整数形 */
    const c=lv===1?ri(1,4):rnz(-4,4), d=lv===1?ri(1,4):rnz(-4,4);
    const e2=[c,d,c*s+d*t];
    if(det2(e1,e2)===0)continue;
    if(Math.abs(e2[2])>60||Math.abs(ef.n)>40)continue;
    const h1=fracHTML('x',p)+(op>0?' + ':' − ')+fracHTML('y',q)+' = '+fnumHTML(ef);
    const t1='x/'+p+(op>0?'+':'-')+'y/'+q+'='+fnumText(ef);
    return sysPack(h1,linEq(c,d,e2[2]),t1,linEqText(c,d,e2[2]),s,t,[e1,e2],{lv:lv});
  }
  return genSonomama(lv);
}
/* ---- A=B=C 表示ヘルパー（小数） ---- */
function fdec(f){const v=f.n/f.d;return v.toFixed(6).replace(/0+$/,'').replace(/\.$/,'');}
function isDecFriendly(terms){for(const t of terms){let d=t.c.d;while(d%2===0)d/=2;while(d%5===0)d/=5;if(d!==1)return false;}return true;}
function termsDecHTML(terms){
  if(!terms.length)return '0';
  let h='';
  terms.forEach(function(t,i){
    const neg=t.c.n<0, a=neg?t.c.neg():t.c, hasVar=!!(t.ex||t.ey);
    h+= i===0 ? (neg?'−':'') : (neg?' − ':' + ');
    const dv=fdec(a);
    if(!(dv==='1'&&hasVar))h+=dv;
    h+=varHTML(t.ex,t.ey);
  });
  return h;
}
function termsDecText(terms){return termsDecHTML(terms).replace(/ /g,'').replace(/−/g,'-');}
/* 1辺(多項式)を分数/小数/括弧のいずれかで表示。terms=combineTerms済み */
function abcStyle(terms){
  const styles=['frac','paren'];
  if(isDecFriendly(terms))styles.push('dec');
  const style=pick(styles);
  if(style==='frac')return {style:'frac',html:termsHTML(terms),text:termsText(terms)};
  if(style==='dec')return {style:'dec',html:termsDecHTML(terms),text:termsDecText(terms)};
  let L=1; for(const t of terms)L=lcm(L,t.c.d);
  if(L===1||L>12)return {style:'frac',html:termsHTML(terms),text:termsText(terms)};
  const num=terms.map(function(t){return T(t.c.n*(L/t.c.d),t.ex,t.ey);});
  return {style:'paren',html:fracHTML(termsHTML(num),L),text:'('+termsText(num)+')/'+L};
}
/* ---- A=B=C 標準: 3辺すべて多項式（定数だけの辺を作らない）---- */
function genAbcStd(){
  for(let g=0;g<150;g++){
    const s=rnz(-5,5), t=rnz(-5,5);
    const parts=[];
    for(let i=0;i<3;i++){
      const a=rnz(-3,3), b=rnz(-3,3);
      if(a===0&&b===0){i--;continue;}   /* 各辺は必ず文字を含む（定数のみ禁止）*/
      parts.push({a:a,b:b});
    }
    const c0=rnz(-4,4);
    const W=parts[0].a*s+parts[0].b*t+c0;
    parts[0].c=c0;
    parts[1].c=W-parts[1].a*s-parts[1].b*t;
    parts[2].c=W-parts[2].a*s-parts[2].b*t;
    if(parts.some(function(p){return Math.abs(p.c)>20;}))continue;
    const same=function(p,q){return p.a===q.a&&p.b===q.b&&p.c===q.c;};
    if(same(parts[0],parts[1])||same(parts[1],parts[2])||same(parts[0],parts[2]))continue;
    const e1=[parts[0].a-parts[1].a,parts[0].b-parts[1].b,parts[1].c-parts[0].c];
    const e2=[parts[1].a-parts[2].a,parts[1].b-parts[2].b,parts[2].c-parts[1].c];
    if(det2(e1,e2)===0)continue;
    const htmls=[],texts=[];
    for(const p of parts){
      const tm=combineTerms([T(p.a,1,0),T(p.b,0,1),T(p.c,0,0)]);
      htmls.push(termsHTML(tm)); texts.push(termsText(tm));
    }
    return {html:htmls.join(' = '),text:texts.join('='),
      params:{lv:3,eqs:[e1,e2],sol:[s,t]},
      answer:{type:'sys',x:F.int(s),y:F.int(t)},
      ansHTML:'x = '+numDisp(s)+'，y = '+numDisp(t),ansText:'x='+s+', y='+t};
  }
  return genAbc(1);
}
/* ---- A=B=C 応用: 小数・分数・括弧の多項式を混ぜる ---- */
function genAbcAdv(){
  for(let g=0;g<250;g++){
    const s=rnz(-4,4), t=rnz(-4,4);
    const rc=function(){return new F(rnz(-4,4),pick([2,3,4,5]));};
    const parts=[];
    for(let i=0;i<3;i++){
      const ax=Math.random()<.85?rc():F.int(0), ay=Math.random()<.85?rc():F.int(0);
      if(ax.isZero()&&ay.isZero()){i--;continue;}
      parts.push({ax:ax,ay:ay});
    }
    const sF=F.int(s), tF=F.int(t), c0=rc();
    const W=parts[0].ax.mul(sF).add(parts[0].ay.mul(tF)).add(c0);
    parts[0].c=c0;
    parts[1].c=W.add(parts[1].ax.mul(sF).neg()).add(parts[1].ay.mul(tF).neg());
    parts[2].c=W.add(parts[2].ax.mul(sF).neg()).add(parts[2].ay.mul(tF).neg());
    if(parts.some(function(p){return p.c.d>20||Math.abs(p.c.n)>60;}))continue;
    if(!parts.some(function(p){return !p.ax.isInt()||!p.ay.isInt()||!p.c.isInt();}))continue; /* 分数を必ず含む */
    const eqInt=function(pi,pj){
      const A=pi.ax.add(pj.ax.neg()), B=pi.ay.add(pj.ay.neg()), C=pj.c.add(pi.c.neg());
      const L=lcm(lcm(A.d,B.d),C.d);
      return [A.n*(L/A.d),B.n*(L/B.d),C.n*(L/C.d)];
    };
    const e1=eqInt(parts[0],parts[1]), e2=eqInt(parts[1],parts[2]);
    if(det2(e1,e2)===0)continue;
    if(e1[0]*s+e1[1]*t!==e1[2]||e2[0]*s+e2[1]*t!==e2[2])continue;
    const htmls=[],texts=[];
    for(const p of parts){
      const tm=combineTerms([T(p.ax,1,0),T(p.ay,0,1),T(p.c,0,0)]);
      const st=abcStyle(tm);
      htmls.push(st.html); texts.push(st.text);
    }
    return {html:htmls.join(' = '),text:texts.join('='),
      params:{lv:4,eqs:[e1,e2],sol:[s,t]},
      answer:{type:'sys',x:F.int(s),y:F.int(t)},
      ansHTML:'x = '+numDisp(s)+'，y = '+numDisp(t),ansText:'x='+s+', y='+t};
  }
  return genAbcStd();
}
/* ---- STEP20 A=B=C ---- */
function genAbc(lv){
  if(lv>=4)return genAbcAdv();     /* 応用: 小数・分数・括弧の多項式 */
  if(lv>=2)return genAbcStd();     /* 標準: 3辺すべて多項式（定数だけの辺なし）*/
  for(let g=0;g<80;g++){           /* 基本: A = B = 定数 */
    const R=lv===1?4:(lv===2?5:(lv===3?6:7));
    const s=lv===1?ri(1,R):rnz(-R,R), t=lv===1?ri(1,R):rnz(-R,R);
    const a1=lv===1?ri(1,3):(lv>=4?rnz(-4,4):rnz(-3,3)), b1=lv===1?ri(1,3):(lv>=4?rnz(-4,4):rnz(-3,3));
    const V=a1*s+b1*t;
    if(Math.abs(V)>(lv>=4?48:30))continue;
    const cand=[];
    for(let a2=-4;a2<=4;a2++)for(let b2=-4;b2<=4;b2++){
      if(a2===0&&b2===0)continue;
      if(a2===a1&&b2===b1)continue;
      if(a2*s+b2*t!==V)continue;
      if(a1*b2-a2*b1===0)continue;
      cand.push([a2,b2]);
    }
    if(!cand.length)continue;
    const c2=pick(cand);
    const eqs=[[a1,b1,V],[c2[0],c2[1],V]];
    return {html:linExprHTML(a1,b1)+' = '+linExprHTML(c2[0],c2[1])+' = '+numDisp(V),
      text:linExprText(a1,b1)+'='+linExprText(c2[0],c2[1])+'='+V,
      params:{lv:lv,eqs:eqs,sol:[s,t]},
      answer:{type:'sys',x:F.int(s),y:F.int(t)},
      ansHTML:'x = '+numDisp(s)+'，y = '+numDisp(t),
      ansText:'x='+s+', y='+t};
  }
  return genSonomama(lv);
}

/* =====================================================
   統合STEP用ジェネレータ
   関連の近い複数の出題タイプ(サブSTEP)を1つのSTEPに混在させる。
   ログの question_key は「実際に出たサブSTEPのキー」で残すので
   （srcKey を各サブの本来のキーにする）question_catalog はそのままでよい。
   makeRandomGen と違い、指定した数タイプだけを混ぜる。
   subs: [{key,name,at,gen,hint}, ...]
===================================================== */
function makeMixGen(subs){
  return function(lv,forPrint){
    const sub=subs[Math.floor(Math.random()*subs.length)];
    const q=sub.gen(lv,forPrint);
    q.at=sub.at;q.srcKey=sub.key;q.srcName=sub.name;q.hint=sub.hint;
    return q;
  };
}

}

      h+='<option value="'+m.key+'"'+(m.key===sel?' selected':'')+'>'+lbl+mark+'</option>';
    });
    h+='</select><button type="button" class="start-btn" data-unit="'+u.id+'">はじめる</button></div>'
      +'<div class="mode-ex" id="ex_'+u.id+'"></div></div>';
  }
  $('unitList').innerHTML=h;
  document.querySelectorAll('.mode-select').forEach(updateEx);
}
function updateEx(sel){
  const m=MODES.find(function(x){return x.key===sel.value;});
  const el=document.getElementById('ex_'+sel.dataset.unit);
  if(el&&m)el.textContent='れい：'+m.ex;
}
function showHome(){
  $('practice').hidden=true;$('home').hidden=false;
  $('backBtn').hidden=true;$('printBtn').hidden=true;
  renderHome();
}
function renderLvPick(){
  const el=$('lvPick');
  if(!el)return;
  el.innerHTML=BANDS.map(function(o){
    return '<button type="button" data-band="'+o.v+'" class="'+o.cls+(state.band===o.v?' on':'')+'">'+o.name+'</button>';
  }).join('');
}
function showPractice(key){
  state.key=key;
  $('home').hidden=true;$('practice').hidden=false;
  $('backBtn').hidden=false;$('printBtn').hidden=false;
  const m=curMode();
  $('pStepNo').textContent=m.rand?'★':'STEP '+m.step;
  $('pName').textContent=m.name;
  renderLvPick();
  newQuestion();
}
function curAt(){return (state.q&&state.q.at)||curMode().at;}
function inputsOf(){
  const at=curAt();
  if(at==='expr')return [$('inExpr')];
  if(at==='sys')return [$('inX'),$('inY')];
  return [$('inNum')];
}
function renderDots(){
  const st=state.modes[state.key];
  let h='';
  for(let i=0;i<CLEAR_N;i++)h+='<span'+(i<st.streak?' class="on"':'')+'></span>';
  h+='<span class="dlabel">連続'+Math.min(st.streak,99)+'</span>';
  $('pDots').innerHTML=h;
}
/* 幅が足りないときは式（qMain）のフォントを縮めて1行に収める。
   縮めすぎる場合（min未満）だけ折り返しを許可する。 */
function fitExpr(){
  const el=$('qMain'); if(!el)return;
  el.style.fontSize=''; el.style.whiteSpace='nowrap';
  el.style.textAlign='left';           /* 計測中は左寄せ（中央寄せだと左あふれがscrollWidthに載らない）*/
  const avail=el.clientWidth, content=el.scrollWidth;
  el.style.textAlign='';               /* CSSの中央寄せに戻す */
  if(avail>0&&content>avail+1){
    const base=parseFloat(getComputedStyle(el).fontSize);
    const target=base*(avail/content)*0.97, min=14;
    if(target<min){el.style.fontSize=min+'px';el.style.whiteSpace='normal';}
    else el.style.fontSize=target+'px';
  }
}
function newQuestion(){
  const m=curMode();
  state.q=m.gen(curLv());
  state.answered=false;
  buildPad(curAt());
  $('pLv').textContent=bandName(state.band);
  renderDots();
  $('qMain').innerHTML=state.q.html;
  fitExpr();
  const c=$('qCond');
  const src=m.rand?'【'+state.q.srcName+'】':'';
  if(src||state.q.cond){c.hidden=false;c.textContent=src+(state.q.cond?(src?'　':'')+state.q.cond:'');}
  else{c.hidden=true;c.textContent='';}
  ['fxMaru','fxBatsu','fxClear'].forEach(function(id){$(id).classList.remove('show');});
  /* 共通ハンコ（divp-correct-jh）を出している場合、.paper は再描画しないので手動で消す */
  try{var pp=document.querySelector('.paper');if(pp)pp.querySelectorAll('.divp-hanko,.divp-nice').forEach(function(el){el.remove();});}catch(e){}
  $('fb').innerHTML='';
  const at=curAt();
  $('ansExpr').hidden=at!=='expr';
  $('ansSys').hidden=at!=='sys';
  $('ansNum').hidden=at!=='num';
  inputsOf().forEach(function(el){el.value='';el.readOnly=false;});
  $('checkBtn').hidden=false;
  $('nextBtn').hidden=true;$('nextStepBtn').hidden=true;
  document.dispatchEvent(new CustomEvent('divp:nextQuestion'));
  if(window.matchMedia('(pointer:fine)').matches)inputsOf()[0].focus({preventScroll:true});
}

/* ---- keypad ---- */
function buildPad(at){
  const pad=$('pad');
  pad.classList.toggle('numpad',at!=='expr');
  const keys=at==='expr'
    ?['7','8','9','0','⌫','4','5','6','x','y','1','2','3','+','−','(',')','²','^','/','C']
    :['7','8','9','⌫','4','5','6','−','1','2','3','/','0','.','C'];
  let h='';
  for(const k of keys){
    const cls='key'+((k==='⌫'||k==='C')?' util':('+-−()²^/xy.'.indexOf(k)>=0?' op':''));
    h+='<button type="button" class="'+cls+'" data-k="'+k+'">'+k+'</button>';
  }
  pad.innerHTML=h;
}
function setCaret(el,pos){try{el.setSelectionRange(pos,pos);}catch(e){}}
function padPress(k){
  let el=activeInput;
  if(!el||el.offsetParent===null||el.readOnly)el=inputsOf()[0];
  if(!el||el.readOnly)return;
  const st=el.selectionStart==null?el.value.length:el.selectionStart;
  const en=el.selectionEnd==null?el.value.length:el.selectionEnd;
  if(k==='C')el.value='';
  else if(k==='⌫'){
    if(st===en&&st>0){el.value=el.value.slice(0,st-1)+el.value.slice(en);setCaret(el,st-1);}
    else{el.value=el.value.slice(0,st)+el.value.slice(en);setCaret(el,st);}
  }else{
    const ins=(k==='−')?'-':k;
    el.value=el.value.slice(0,st)+ins+el.value.slice(en);
    setCaret(el,st+ins.length);
  }
  if(window.matchMedia('(pointer:fine)').matches)el.focus({preventScroll:true});
}

/* ---- judge ---- */
function warnMsg(msg){$('fb').innerHTML='<span class="warn">'+msg+'</span>';}
function judge(){
  if(state.answered)return;
  const m=curMode(), q=state.q;
  try{
    let ok=false, userText='';
    const at=curAt();
    if(at==='expr'){
      const r=parseAnswerExpr($('inExpr').value);
      userText=normalizeInput($('inExpr').value);
      if(termsEq(r.terms,q.answer.terms)){
        if(r.uns){warnMsg('計算は合っているけど、まだ整理できるよ。かっこを外して、同類項をまとめた形で答えよう。');return;}
        if(r.unr){warnMsg('計算は合っているけど、まだ約分できるよ。');return;}
        ok=true;
      }
    }else if(at==='sys'){
      const x=parseNumberAns($('inX').value), y=parseNumberAns($('inY').value);
      userText='x='+normalizeInput($('inX').value)+', y='+normalizeInput($('inY').value);
      ok=x.eq(q.answer.x)&&y.eq(q.answer.y);
    }else{
      const v=parseNumberAns($('inNum').value);
      userText=normalizeInput($('inNum').value);
      ok=v.eq(q.answer.v);
    }
    finish(ok,userText);
  }catch(err){
    if(err&&err.parse){warnMsg(err.message);return;}
    throw err;
  }
}
function finish(ok,userText){
  const m=curMode(), q=state.q, st=state.modes[m.key];
  state.answered=true;
  inputsOf().forEach(function(el){el.readOnly=true;});
  $('checkBtn').hidden=true;
  sendDivp(ok,userText);
  if(ok){
    st.correct++;st.streak++;
    if(st.streak===CLEAR_N&&!st.cleared){
      st.cleared=true;
      $('fxClear').classList.add('show');
      $('fb').innerHTML='<span class="clearmsg">STEPクリア！　5問連続正解 ◎</span>';
      if(MODES.indexOf(m)<MODES.length-1)$('nextStepBtn').hidden=false;
    }else{
      if(!safeStamp('correct'))$('fxMaru').classList.add('show');
      $('fb').innerHTML='<span class="ok">せいかい！</span>';
    }
  }else{
    st.streak=0;
    if(!safeStamp('incorrect'))$('fxBatsu').classList.add('show');
    $('fb').innerHTML='<span class="ng">正解は <b>'+q.ansHTML+'</b></span><span class="hint">💡 '+(q.hint||m.hint)+'</span>';
  }
  renderDots();
  $('nextBtn').hidden=false;
}
/* 共通の正解ハンコ（divp-correct-jh の Divp.correct / Divp.incorrect）。
   未読込・ローカル起動時は false を返し、独自の○×演出にフォールバックする。 */
function safeStamp(kind){
  try{
    if(window.Divp){
      if(kind==='correct'&&typeof Divp.correct==='function'){Divp.correct('.paper',{text:'正解'});return true;}
      if(kind==='incorrect'&&typeof Divp.incorrect==='function'){Divp.incorrect('.paper');return true;}
    }
  }catch(e){}
  return false;
}
function sendDivp(ok,userText){
  try{
    if(window.Divp&&typeof window.Divp.answer==='function'){
      window.Divp.answer(!!ok,{
        question_key:(state.q&&state.q.srcKey)||state.key,
        question_params:state.q.params,
        question_text:(state.q.cond?state.q.cond+'　':'')+state.q.text,
        correct_answer:state.q.ansText,
        wrong_answer:ok?null:userText
      });
    }
  }catch(e){}
}

/* =====================================================
   print sheet
===================================================== */
function buildPrint(){
  const m=curMode();
  if(!m)return;
  const n=m.at==='sys'?10:20;
  const items=[];
  for(let i=0;i<n;i++){
    /* 基本=全問lv1 / 応用=全問lv4 / 標準=前半lv2・後半lv3で段階的に */
    const lv=FORCE_LV||(state.band===1?1:state.band===3?4:(i<n*.5?2:3));
    items.push(m.gen(lv,true));
  }
  const lbl=m.rand?'★':'STEP'+m.step;
  let h='<div class="psheet-head"><span class="t">中2計算プリント　'+lbl+'　'+m.name+'</span>'
    +'<span class="nm">名前（　　　　　　　　　）</span></div>';
  h+='<ol class="pgrid'+(m.at==='sys'?' sysgrid':'')+'">';
  items.forEach(function(q,i){
    h+='<li><span class="pno">('+(i+1)+')</span>'
      +(q.cond?'<span style="font-size:9.5pt">'+q.cond+'</span><br>':'')
      +q.html+'</li>';
  });
  h+='</ol><div class="pans"><h2>解答　'+lbl+'　'+m.name+'</h2><ol>';
  items.forEach(function(q,i){
    h+='<li>('+(i+1)+')　'+q.ansHTML+'</li>';
  });
  h+='</ol></div>';
  $('printArea').innerHTML=h;
  window.print();
}

/* =====================================================
   init
===================================================== */
const PROGRESS_API='/api/get_progress.php';
/* ログイン中ならDBから進捗を復元（answer_logs集計）。未ログイン・失敗時は黙ってスキップ。
   ランダム出題(★)はログを出典STEP名義で残すため、★自体のクリア状況は復元対象外。 */
function restoreProgress(){
  try{
    var uk=(window.DIVP_UNIT_KEY||'math_js2_keisan');
    fetch(PROGRESS_API+'?unit_key='+encodeURIComponent(uk),{credentials:'same-origin'})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(d){
        if(!d||!d.ok||!d.progress)return;
        var touched=false;
        MODES.forEach(function(m){
          var st=state.modes[m.key];
          if(m.subs){
            /* 統合STEP: 実ログのキー(サブSTEP)を合算して復元。
               レベルは合計correctから、クリアはサブが全部クリア済みのとき。
               連続数(streak)はまたぎ集計できないので復元しない。 */
            var corr=0,cleared=0,any=false;
            m.subs.forEach(function(k){
              var p=d.progress[k];if(!p)return;
              any=true;corr+=p.correct|0;if(p.cleared)cleared++;
            });
            if(!any)return;
            st.correct=Math.max(st.correct,corr);
            if(cleared>=m.subs.length)st.cleared=true;
            touched=true;
            return;
          }
          var p=d.progress[m.key];
          if(!p)return;
          st.correct=Math.max(st.correct,p.correct|0);
          st.streak=Math.max(st.streak,Math.min(p.streak|0,CLEAR_N));
          if(p.cleared)st.cleared=true;
          touched=true;
        });
        if(!touched)return;
        if(!$('home').hidden)renderHome();
        if(!$('practice').hidden){$('pLv').textContent=bandName(state.band);renderDots();}
      })
      .catch(function(){});
  }catch(e){}
}

function init(){
  if(FORCE_LV)state.band=FORCE_LV<=1?1:(FORCE_LV>=4?3:2);
  renderHome();
  restoreProgress();
  $('unitList').addEventListener('change',function(e){
    const s=e.target.closest('.mode-select');
    if(s)updateEx(s);
  });
  $('unitList').addEventListener('click',function(e){
    const b=e.target.closest('.start-btn');
    if(!b)return;
    const s=document.querySelector('.mode-select[data-unit="'+b.dataset.unit+'"]');
    if(s)showPractice(s.value);
  });
  $('lvPick').addEventListener('click',function(e){
    const b=e.target.closest('button[data-band]');
    if(!b)return;
    state.band=parseInt(b.dataset.band,10)||1;
    renderLvPick();
    newQuestion();
  });
  $('backBtn').addEventListener('click',showHome);
  $('printBtn').addEventListener('click',buildPrint);
  $('checkBtn').addEventListener('click',judge);
  $('nextBtn').addEventListener('click',newQuestion);
  $('nextStepBtn').addEventListener('click',function(){
    const i=MODES.indexOf(curMode());
    if(i<MODES.length-1)showPractice(MODES[i+1].key);
  });
  $('pad').addEventListener('click',function(e){
    const b=e.target.closest('.key');
    if(b)padPress(b.dataset.k);
  });
  document.addEventListener('focusin',function(e){
    if(e.target&&e.target.classList&&e.target.classList.contains('ans-in'))activeInput=e.target;
  });
  document.addEventListener('keydown',function(e){
    if($('practice').hidden)return;
    if(e.key==='Enter'){
      e.preventDefault();
      if(state.answered)$('nextBtn').click();
      else if(!$('checkBtn').hidden)judge();
    }
  });
  /* 画面幅が変わったら式を再フィット（回転・ウィンドウ変更） */
  window.addEventListener('resize',function(){if(!$('practice').hidden&&state.q)fitExpr();});
  /* 数式フォント(KaTeX)の読み込み完了後にも測り直す（初回のズレ防止） */
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){if(!$('practice').hidden&&state.q)fitExpr();});}
}

/* node テスト用エクスポート */
if(typeof module!=='undefined'&&module.exports){
  module.exports={MODES:MODES,F:F,T:T,combineTerms:combineTerms,mulPoly:mulPoly,
    termsEq:termsEq,termsText:termsText,termsHTML:termsHTML,
    fracFormText:fracFormText,parseAnswerExpr:parseAnswerExpr,
    parseNumberAns:parseNumberAns,normalizeInput:normalizeInput};
}
if(typeof document!=='undefined')init();
