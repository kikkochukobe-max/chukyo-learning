    { id: 'unit', label: '単位の変換（長さ・重さ・面積・時間・速さ）', short: '単位変換', cols: 2, gen: genUnitConversion },
    { id: 'speed', label: '速さの文章題', short: '速さ', cols: 1, gen: genSpeed },
    { id: 'geometry', label: '図形（角度・面積・体積・円周）', short: '図形', cols: 1, gen: genGeometry },
    { id: 'word', label: '文章題（割合・速さ・平均・単位量・面積・体積）', short: '文章題', cols: 1, gen: genWordProblem }
  ];

  const api = {
    Frac, gcd, decToFrac, fracToDec, isTerminating, roundDivFixed, sigFig2DivStr, shiftDec,
    fracToken, isNiceFrac, TYPES,
    gen: {
      genMisalignedDecimal, genComplementChain, genDecimalMultShifted, genDecimalDivShifted,
      genNonTerminatingDiv, gen25_125, genFractionAddSub, genFractionMulDiv, genFractionMixed,
      genFractionDecimalMixed, genUnitConversion, genWordProblem
    },
    R, pick, coin
  };

  if (typeof module !== 'undefined' && module.exports) module.exports = api;
  else root.KEISAN = api;

})(typeof window !== 'undefined' ? window : globalThis);
</script>
  <script>/* =========================================================================
   計算どぅする？ — UI ロジック（window.KEISAN を利用）
   ========================================================================= */
(function () {
  'use strict';
  const K = window.KEISAN;
  const TYPES = K.TYPES;

  /* 種別カラー（id順） */
  const COLOR = {
    misalign: '#3066BE', complement: '#1E9EAE', decmult: '#1FA774', decdiv: '#5FA12B',
    approxdiv: '#E0A40F', mul25: '#E87B1E', kufu2: '#B7791F', fracas: '#DB4F2E', fracmd: '#CE3D68',
    fracmix: '#9A4FB6', ratio: '#6457CF', unit: '#2C7DA8', speed: '#C56A3D', geometry: '#2E8F6E', word: '#7A6A55'
  };
  /* プリント：各種1問ずつ＝計12問 */
  const NUM_CIRCLE = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧', '⑨', '⑩', '⑪', '⑫', '⑬', '⑭', '⑮', '⑯', '⑰', '⑱', '⑲', '⑳'];

  const $ = (s, r = document) => r.querySelector(s);
  const esc = (s) => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

  /* ---------- トークン描画 ---------- */
  function fracHTML(n, d) {
    return `<span class="fr"><span class="fn">${esc(n)}</span><span class="fd">${esc(d)}</span></span>`;
  }
  function renderTokens(tokens) {
    let out = '';
    for (const tk of tokens) {
      if (tk.t === 'txt') out += `<span class="nm">${esc(tk.v)}</span>`;
      else if (tk.t === 'op') out += `<span class="op">${esc(tk.v === '-' ? '\u2212' : tk.v)}</span>`;
      else if (tk.t === 'paren') out += `<span class="pr">${esc(tk.v)}</span>`;
      else if (tk.t === 'frac') out += fracHTML(tk.n, tk.d);
      else if (tk.t === 'mix') out += `<span class="mx"><span class="mw">${esc(tk.w)}</span>${fracHTML(tk.n, tk.d)}</span>`;
      else if (tk.t === 'wp') out += `<span class="wp">${esc(tk.v)}</span>`;
      else if (tk.t === 'geo') out += `<span class="geo">${tk.svg}<span class="geo-q">${esc(tk.text)}</span></span>`;
      else if (tk.t === 'wpparts') {
        let inner = '';
        for (const pt of tk.parts) inner += pt.frac ? fracHTML(pt.frac[0], pt.frac[1]) : esc(pt.txt);
        out += `<span class="wp">${inner}</span>`;
      }
    }
    return out;
  }

  /* 小数の答えに併記する縦型分数（1以上は帯分数） */
  const DEC_FRAC_TYPES = new Set(['misalign', 'complement', 'decmult', 'decdiv', 'mul25', 'unit']);
  function fracTokenMixed(check) {
    const sign = check.n < 0 ? '-' : '';
    const n = Math.abs(check.n), d = check.d;
    if (d === 1) return { t: 'txt', v: String(check.n) };
    if (n > d) { const w = Math.floor(n / d), r = n - w * d; return { t: 'mix', w: sign + w, n: String(r), d: String(d) }; }
    return { t: 'frac', n: sign + n, d: String(d) };
  }
  function decFracToken(typeId, check) {
    if (!DEC_FRAC_TYPES.has(typeId)) return null;   // 分数答え・概数・文章題には付けない
    if (check.d === 1) return null;                 // 整数
    if (!K.isTerminating(check)) return null;       // すでに分数表示のもの
    if (check.d > 100) return null;                 // 分母が大きすぎる小数は省略
    return fracTokenMixed(check);
  }
  function answerHTML(p, typeId) {
    let html = renderTokens(p.ansTokens);
    const f = decFracToken(typeId, p.check);
    if (f) html += `<span class="dfrac">（${renderTokens([f])}）</span>`;
    return html;
  }

  /* ---------- 入力の解釈 → Frac ---------- */
  function parseAnswer(raw) {
    if (raw == null) return null;
    let s = String(raw).trim().replace(/／/g, '/').replace(/\s+/g, ' ');
    if (!s) return null;
    let m;
    if ((m = s.match(/^(-?\d+)\s+(\d+)\/(\d+)$/))) {           // 帯分数 "1 2/3"
      const d = +m[3]; if (!d) return null;
      const sg = +m[1] < 0 ? -1 : 1;
      return new K.Frac(sg * (Math.abs(+m[1]) * d + +m[2]), d);
    }
    if (s.indexOf('/') >= 0) {                                // 分数 "n/d"
      const mm = s.match(/(-?\d+)\s*\/\s*(-?\d+)/);
      if (mm && +mm[2] !== 0) return new K.Frac(+mm[1], +mm[2]);
      return null;
    }
    const dm = s.match(/-?\d+(\.\d+)?/);                       // 小数/整数（単位付き可）
    if (dm) return K.decToFrac(dm[0]);
    return null;
  }

  /* =====================================================================
     1問ずつエンジン（共通仕様）
       折りたたみメニューで出題内容を選ぶ → ランダム生成 → 答え合わせ
       → 共通エフェクト → 「次へ」ボタンの下に解説。
       problem = { tokens, ansTokens, check(Frac), instr?, memo?, explain }
     ===================================================================== */
  const state = { selId: 'all', cur: null, answered: false, correct: 0, total: 0 };
  window.__keisan = { state };  // テスト/スクショ自動化用の参照（本体動作には影響しない）
  let keyRouter = null;         // 現在の問題のキー入力ハンドラ（PC物理キーボード用）

  function pickType() {
    if (state.selId !== 'all') return TYPES.find(t => t.id === state.selId);
    return TYPES[Math.floor(Math.random() * TYPES.length)];
  }

  function loadProblem() {
    const t = pickType();
    state.cur = { t, p: t.gen() };
    state.answered = false;
    renderStage();
  }

  function fitQ(card) {
    const q = $('.q', card), fit = $('.qfit', card);
    if (!q || !fit) return;
    fit.style.transform = 'none';
    const avail = q.clientWidth, natural = fit.scrollWidth;
    if (natural > 0 && avail > 0 && natural > avail) fit.style.transform = 'scale(' + Math.max(0.5, (avail - 2) / natural) + ')';
  }

  function renderStage() {
    const { t, p } = state.cur;
    const stage = $('#stage');
    const instr = p.instr ? `<span class="instr">${esc(p.instr)}</span>` : '';
    const digits = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0]
      .map(n => `<button type="button" class="key" data-k="${n}">${n}</button>`).join('');
    const t0 = p.tokens[0] && p.tokens[0].t;
    const isText = (t0 === 'wp' || t0 === 'wpparts' || t0 === 'geo');
    const qInner = isText ? renderTokens(p.tokens) : `<span class="qfit">${renderTokens(p.tokens)}</span>`;
    stage.innerHTML =
      `<div class="card" style="--c:${COLOR[t.id]}">
         <div class="card-top"><span class="cat">${esc(t.short)}</span>${instr}</div>
         <div class="q">${qInner}</div>
         <div class="answer"><div class="disp" id="disp"></div></div>
         <div class="keypad" id="keypad">
           ${digits}
           <button type="button" class="key" data-k="dot">.</button>
           <button type="button" class="key k-util" data-k="back" aria-label="1字消す">⌫</button>
           <button type="button" class="key k-util k-frac" id="fracToggle" data-k="frac">分数</button>
         </div>
         <div class="actions">
           <button class="btn-next" type="button">次の問題 ➜</button>
           <button class="btn-check" type="button" data-k="check">こたえあわせ</button>
         </div>
         <div class="explain" hidden></div>
       </div>`;
    const card = $('.card', stage);
    const disp = $('#disp', card);
    const explainEl = $('.explain', card);
    const entry = { mode: 'dec', dec: '', num: '', den: '', part: 'num' };
    let locked = false;
    requestAnimationFrame(() => fitQ(card));

    function renderDisp() {
      if (entry.mode === 'dec') {
        disp.innerHTML = `<span class="dnum ${entry.dec ? '' : 'ph'}">${entry.dec ? esc(entry.dec) : '答えを入力'}</span>`;
      } else {
        disp.innerHTML =
          `<span class="fin">
             <button type="button" class="fin-box ${entry.part === 'num' ? 'active' : ''} ${entry.num ? '' : 'ph'}" data-part="num">${entry.num ? esc(entry.num) : '　'}</button>
             <span class="fin-bar"></span>
             <button type="button" class="fin-box ${entry.part === 'den' ? 'active' : ''} ${entry.den ? '' : 'ph'}" data-part="den">${entry.den ? esc(entry.den) : '　'}</button>
           </span>`;
        disp.querySelectorAll('.fin-box').forEach(b =>
          b.addEventListener('click', () => { if (locked) return; entry.part = b.dataset.part; renderDisp(); }));
      }
      const ft = $('#fracToggle', card);
      if (ft) { ft.textContent = entry.mode === 'dec' ? '分数' : '整数'; ft.classList.toggle('on', entry.mode === 'frac'); }
      const dot = card.querySelector('[data-k="dot"]');
      if (dot) dot.disabled = (entry.mode !== 'dec');
    }

    function answerString() {
      if (entry.mode === 'dec') return entry.dec;
      return (entry.num && entry.den) ? (entry.num + '/' + entry.den) : '';
    }

    function press(k) {
      if (locked) return;
      if (k === 'check') return grade();
      if (k === 'frac') {
        if (entry.mode === 'dec') { entry.mode = 'frac'; entry.num = ''; entry.den = ''; entry.part = 'num'; }
        else { entry.mode = 'dec'; entry.dec = ''; }
        return renderDisp();
      }
      if (k === 'back') {
        if (entry.mode === 'dec') entry.dec = entry.dec.slice(0, -1);
        else entry[entry.part] = entry[entry.part].slice(0, -1);
        return renderDisp();
      }
      if (k === 'dot') {
        if (entry.mode !== 'dec') return;
        if (entry.dec === '') entry.dec = '0.';
        else if (entry.dec.indexOf('.') < 0) entry.dec += '.';
        return renderDisp();
      }
      // 数字
      if (entry.mode === 'dec') { if (entry.dec.replace('.', '').length < 6) entry.dec += k; }
      else { if (entry[entry.part].length < 3) entry[entry.part] += k; }
      renderDisp();
    }

    function grade() {
      if (locked) return;
      const val = answerString();
      if (val === '') { disp.classList.remove('nudge'); void disp.offsetWidth; disp.classList.add('nudge'); return; }
      const guess = parseAnswer(val);
      const ok = !!(guess && guess.eq(p.check));
      state.total++; if (ok) state.correct++;
      updateScore();
      safeDivpAnswer(ok, t, p, val);
      addMark(card, ok ? 'maru' : 'batsu', ok ? '○' : '✕');
      if (ok) safeDivpCorrect(card);
      else { card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); }
      locked = true; state.answered = true;
      explainEl.innerHTML = explainHTML(p, t.id, ok);
      explainEl.hidden = false;
    }

    $('#keypad', card).addEventListener('click', (e) => {
      const b = e.target.closest('[data-k]'); if (b) press(b.dataset.k);
    });
    $('.btn-check', card).addEventListener('click', () => press('check'));
    $('.btn-next', card).addEventListener('click', loadProblem);

    // PC：物理キーボードでも入力できる
    keyRouter = (e) => {
      if (locked) { if (e.key === 'Enter') loadProblem(); return; }
      if (/^[0-9]$/.test(e.key)) { press(e.key); e.preventDefault(); }
      else if (e.key === '.') { press('dot'); e.preventDefault(); }
      else if (e.key === 'Backspace') { press('back'); e.preventDefault(); }
      else if (e.key === '/') { entry.mode === 'dec' ? press('frac') : (entry.part = 'den', renderDisp()); e.preventDefault(); }
      else if (e.key === 'Enter') { grade(); e.preventDefault(); }
    };

    renderDisp();
  }

  function explainHTML(p, typeId, ok) {
    const memo = p.memo ? `<span class="memo">${esc(p.memo)}</span>` : '';
    let h = `<div class="exp-answer"><span class="ans-key ${ok ? 'ok' : 'ng'}">${ok ? '○ 正解' : '答え'}</span>` +
      `<span class="ans">${answerHTML(p, typeId)}</span>${memo}</div>`;
    if (p.explain && p.explain.length) {
      h += `<div class="exp-title">かんがえ方</div>`;
      h += p.explain.map(line => `<div class="exp-line">${renderTokens(line)}</div>`).join('');
    }
    return h;
  }

  function updateScore() {
    const el = $('#score'); if (el) el.textContent = `正解 ${state.correct} / ${state.total}`;
  }
  function isTouch() { return ('ontouchstart' in window) || navigator.maxTouchPoints > 0; }

  /* 折りたたみメニュー */
  function buildMenu() {
    const wrap = $('#cat-chips');
    const mk = (id, label, color, active) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'chip' + (active ? ' active' : ''); b.dataset.id = id;
      if (color) b.style.setProperty('--c', color);
      b.textContent = label;
      b.addEventListener('click', () => {
        state.selId = id;
        wrap.querySelectorAll('.chip').forEach(x => x.classList.toggle('active', x.dataset.id === id));
        $('#selLabel').textContent = (id === 'all') ? 'ぜんぶ（ランダム）' : TYPES.find(t => t.id === id).label;
        closeMenu();
        loadProblem();
      });
      return b;
    };
    wrap.appendChild(mk('all', 'ぜんぶ（ランダム）', '#243241', true));
    TYPES.forEach(t => wrap.appendChild(mk(t.id, t.short, COLOR[t.id], false)));
    $('#menuBar').addEventListener('click', () => { $('#menuPanel').hidden ? openMenu() : closeMenu(); });
  }
  function openMenu() { $('#menuPanel').hidden = false; $('#menuBar').setAttribute('aria-expanded', 'true'); }
  function closeMenu() { $('#menuPanel').hidden = true; $('#menuBar').setAttribute('aria-expanded', 'false'); }

  /* 丸つけ（○ / ✕） */
  function clearMark(card) { const m = card.querySelector('.mbmark'); if (m) m.remove(); }
  function addMark(card, cls, ch) {
    clearMark(card);
    const s = document.createElement('span');
    s.className = 'mbmark ' + cls; s.textContent = ch;
    card.appendChild(s);
  }

  /* 学習記録：判定直後に1問=1行を送信（未ログイン・ローカル起動時は divp-core が黙ってスキップ）。
     divp-core.js 未読込の環境でも壊れないよう guard する（未組み込みツールと同じ思想）。
     問題は「機械用(params)」と「人間用(text/answer)」の二重表現で保存する。 */
  function plainText(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return (tmp.textContent || '').replace(/\s+/g, ' ').trim();
  }
  function safeDivpAnswer(ok, t, p, userVal) {
    if (!(window.Divp && typeof window.Divp.answer === 'function')) return;
    try {
      const qText = plainText(renderTokens(p.tokens));
      const aText = plainText(answerHTML(p, t.id));
      window.Divp.answer(ok, {
        question_key: t.id,                       // カテゴリID＝モード名をそのまま使う
        question_params: { q: qText, a: aText },  // 同一問題の判定キー（params_hash）
        question_text: qText,
        correct_answer: aText,
        wrong_answer: userVal,                    // 生徒が実際に入力した答え
      });
    } catch (e) { /* 記録失敗は本体動作に影響させない */ }
  }

  /* 共通の正解エフェクト：星バースト＋「正解！」。divp-core があれば Divp.correct() を使う */
  function safeDivpCorrect(card) {
    if (window.Divp && typeof window.Divp.correct === 'function') {
      try { window.Divp.correct(); return; } catch (e) { }
    }
    correctEffect(card);
  }
  const REDUCED = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  function correctEffect(card) {
    const fx = document.createElement('div'); fx.className = 'fx'; card.appendChild(fx);
    const label = document.createElement('div'); label.className = 'fx-label'; label.textContent = '正解！';
    fx.appendChild(label);
    if (!REDUCED) {
      const colors = ['#F4B400', '#ED6A28', '#E8453C', '#F26DAE', '#7E5BD0', '#2BA6A4', '#3FA45A'];
      const N = 14;
      for (let i = 0; i < N; i++) {
        const s = document.createElement('span'); s.className = 'fx-star'; s.textContent = '★';
        s.style.color = colors[i % colors.length]; fx.appendChild(s);
        const ang = Math.PI * 2 * i / N + (Math.random() * 0.5 - 0.25);
        const dist = 70 + Math.random() * 75;
        const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist;
        const rot = Math.random() * 720 - 360, size = 0.7 + Math.random() * 0.9;
        s.animate([
          { transform: 'translate(-50%,-50%) scale(.2)', opacity: 1 },
          { transform: `translate(calc(-50% + ${dx}px),calc(-50% + ${dy * .5}px)) scale(${size}) rotate(${rot * .5}deg)`, opacity: 1, offset: .55 },
          { transform: `translate(calc(-50% + ${dx}px),calc(-50% + ${dy + 46}px)) scale(${size * .9}) rotate(${rot}deg)`, opacity: 0 }
        ], { duration: 820 + Math.random() * 260, easing: 'cubic-bezier(.2,.7,.3,1)' });
      }
      label.animate([
        { transform: 'translate(-50%,-50%) scale(.3) rotate(-8deg)', opacity: 0 },
        { transform: 'translate(-50%,-50%) scale(1.12) rotate(3deg)', opacity: 1, offset: .4 },
        { transform: 'translate(-50%,-50%) scale(1) rotate(0)', opacity: 1, offset: .72 },
        { transform: 'translate(-50%,-62%) scale(1) rotate(0)', opacity: 0 }
      ], { duration: 1100, easing: 'ease-out' });
    }
    setTimeout(() => fx.remove(), REDUCED ? 700 : 1300);
  }

  /* =====================================================================
     B4 プリント
     ===================================================================== */
  function buildWorksheet() {
    const ws = $('#worksheet');
    const answers = [];
    let body = '';

    TYPES.forEach((t, ti) => {
      const c = COLOR[t.id];
      const no = ti + 1;
      const p = t.gen();
      answers.push({ no, p, tid: t.id });
      body +=
        `<div class="ws-item" style="--c:${c}">
           <div class="ws-cap"><span class="ws-no">${NUM_CIRCLE[ti]}</span><span class="ws-cap-l">${esc(t.label)}</span></div>
           <div class="ws-prob"><span class="ws-pno">(${no})</span> ${renderSheetProblem(p)}</div>
         </div>`;
    });

    const ans = answers.map(a => {
      const memo = a.p.memo ? `<span class="ak-memo">${esc(a.p.memo)}</span>` : '';
      return `<span class="ak-item"><b>${a.no}.</b> ${answerHTML(a.p, a.tid)}${memo}</span>`;
    }).join('');

    ws.innerHTML =
      `<div class="ws-top">
         <div class="ws-title">計算どぅする？<span class="ws-sub">けいさんプリント</span></div>
         <div class="ws-fields">
           <span class="ws-field">名前<i></i></span>
           <span class="ws-field">日づけ<i></i></span>
           <span class="ws-field ws-score">点数<i></i></span>
         </div>
       </div>
       <div class="ws-grid">${body}</div>
       <div class="ws-answers">
         <div class="ak-title">こたえ（計算どぅする？）</div>
         <div class="ak-list">${ans}</div>
       </div>`;
    fitWorksheet();
  }

  function renderSheetProblem(p) {
    const instr = p.instr ? `<span class="ws-instr">（${esc(p.instr)}）</span>` : '';
    let html = instr + renderTokens(p.tokens);
    const toks = p.tokens;
    if (toks[0].t === 'wp' || toks[0].t === 'wpparts' || toks[0].t === 'geo') {
      html += `<div class="ws-wpans">答え（　　　　　　　　）</div>`;
    } else {
      const last = toks[toks.length - 1];
      if (last.t === 'op' && last.v === '=') html += `<span class="ws-blank"></span>`;
    }
    return html;
  }

  // プレビューを画面幅に合わせて縮小（印刷時はCSSで zoom:1 に戻す）
  function fitWorksheet() {
    const ws = $('#worksheet');
    const scroll = $('.sheet-scroll');
    if (!ws || !scroll) return;
    ws.style.zoom = '1';
    const natural = ws.offsetWidth;             // 348mm をpxで
    const avail = scroll.clientWidth - 24;
    const z = Math.max(0.16, Math.min(1, avail / natural));
    ws.style.zoom = String(z);
  }

  /* =====================================================================
     画面の組み立て
     ===================================================================== */
  function wireButtons() {
    $('#btn-print').addEventListener('click', () => {
      buildWorksheet();
      $('#sheetOverlay').hidden = false;
      requestAnimationFrame(fitWorksheet);
    });
    $('#btn-sheet-print').addEventListener('click', () => window.print());
    $('#btn-sheet-new').addEventListener('click', buildWorksheet);
    $('#btn-sheet-close').addEventListener('click', () => { $('#sheetOverlay').hidden = true; });
    window.addEventListener('resize', () => { if (!$('#sheetOverlay').hidden) fitWorksheet(); const c = $('#stage .card'); if (c) fitQ(c); });
  }

  document.addEventListener('DOMContentLoaded', () => {
    const pb = $('#btn-print');
    if (pb) pb.textContent = `B4プリント（${TYPES.length}問）`;  // 実際の出題数に追従
    buildMenu();
    wireButtons();
    loadProblem();
    buildWorksheet();   // Ctrl+P 用に初期生成
    document.addEventListener('keydown', (e) => {
      if ($('#sheetOverlay') && !$('#sheetOverlay').hidden) return; // 印刷プレビュー中は無効
      if (keyRouter) keyRouter(e);
    });
  });
})();
</script>
