<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>100マス たし算れんしゅう | 中京個別指導学院</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --washi:#f8f4ec;
  --washi-deep:#efe8d9;
  --ink:#3a3226;
  --ink-soft:#7a7060;
  --sakura:#d76e8b;
  --sakura-deep:#c4526f;
  --leaf:#7ba05b;
  --line:#d9cfba;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:"Zen Maru Gothic",system-ui,sans-serif;
  background:var(--washi);
  color:var(--ink);
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
  display:flex;flex-direction:column;
  height:100svh;
}
.wrap{width:100%;max-width:430px;margin:0 auto;flex:1;display:flex;flex-direction:column;padding:6px 14px 12px}

/* ---- header ---- */
.top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px}
.title{font-weight:900;font-size:17px;letter-spacing:.04em;text-align:center}
.title small{font-size:11px;color:var(--ink-soft);font-weight:700;display:block;letter-spacing:.1em}
.timer{font-family:"Consolas","Menlo","Roboto Mono",monospace;
  font-variant-numeric:tabular-nums;font-weight:700;font-size:30px;color:var(--ink);
  text-align:right;justify-self:end;min-width:5.2ch}
.home-btn{font-family:inherit;font-size:20px;line-height:1;background:#fff;
  border:2px solid var(--line);border-radius:12px;padding:6px 10px;cursor:pointer;
  box-shadow:0 2px 0 var(--line)}
.home-btn:active{transform:translateY(2px);box-shadow:none}
.home-link{font-family:inherit;font-weight:900;font-size:15px;color:var(--ink-soft);
  background:none;border:none;cursor:pointer;padding:6px 10px;margin-top:2px}
.home-link:active{opacity:.6}

/* ---- progress ---- */
.progress{margin-top:8px}
.prog-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--ink-soft)}
.bar{height:8px;background:var(--washi-deep);border-radius:99px;margin-top:4px;overflow:hidden}
.bar i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--sakura),var(--sakura-deep));border-radius:99px;transition:width .25s}

/* ---- question ---- */
.stage{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:0;gap:8px;overflow:hidden;position:relative}
.q-h{display:flex;flex-direction:column;align-items:center;gap:8px;transform:translateY(2vh)}
.countdown{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:var(--washi);z-index:10;
  font-weight:900;font-size:110px;color:var(--sakura-deep);
}
.countdown.show{display:flex}
.countdown b{animation:cd .95s ease}
@keyframes cd{0%{transform:scale(1.6);opacity:0}30%{transform:scale(1);opacity:1}100%{opacity:1}}
.question{
  font-weight:900;font-size:min(15vw,62px);letter-spacing:.02em;
  display:flex;align-items:baseline;gap:.18em;font-variant-numeric:tabular-nums;
}
.answer-box{
  min-width:2.4em;padding:0 .15em;text-align:center;
  font-weight:900;font-size:min(17vw,68px);font-variant-numeric:tabular-nums;
  line-height:1.25;padding-bottom:8px;
  border-bottom:6px solid var(--line);color:var(--sakura-deep);
  transition:border-color .12s;
}
.answer-box.on{border-color:var(--sakura)}

/* ---- grid (masu) mode ---- */
.q-grid{display:none;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;
  width:min(42vw,168px);font-variant-numeric:tabular-nums}
.stage[data-mode="grid"] .q-h{display:none}
.stage[data-mode="grid"] .q-grid{display:grid;transform:translate(-16%,-2%)}
.q-grid .cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:min(8vw,38px)}
.q-grid .head{border:4px solid var(--ink-soft);color:var(--ink);background:#fff}
.q-grid .head.n{border-radius:0 4px 0 0;color:var(--leaf)}
.q-grid .head.m{border-radius:0 0 0 4px;color:var(--sakura-deep)}
.q-grid .corner{color:var(--ink-soft);font-size:min(6vw,26px);opacity:.5;border-radius:4px 0 0 0}
.q-grid .ans{border:4px solid var(--sakura);border-radius:0 0 4px 0;
  color:var(--sakura-deep);background:#fff8fa;
  min-width:0;padding:0;font-size:min(8vw,38px)}
.q-grid .ans.on{border-color:var(--sakura-deep)}
.stage.correct .q-grid .ans,.stage.correct .question{animation:pop .18s ease}
.stage.correct .question{animation:pop .18s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.07)}100%{transform:scale(1)}}
.correct-flash{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle,rgba(123,160,91,.22),transparent 70%);opacity:0;transition:opacity .15s}
.correct-flash.show{opacity:1}

/* ---- tenkey ---- */
.tenkey{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;margin-bottom:5vh}
.tenkey button{
  font-family:inherit;font-weight:900;font-size:28px;color:var(--ink);
  background:#fff;border:2px solid var(--line);border-radius:14px;
  padding:12px 0;box-shadow:0 2px 0 var(--line);cursor:pointer;
  transition:transform .05s;
  touch-action:none;user-select:none;-webkit-user-select:none;
}
.tenkey button:active{transform:translateY(2px);box-shadow:none}
.tenkey .fn{font-size:20px;color:var(--ink-soft);background:var(--washi-deep)}

/* ---- screens ---- */
.screen{flex:1;display:none;flex-direction:column}
.screen.show{display:flex}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center}
.big-btn{
  font-family:inherit;font-weight:900;font-size:22px;color:#fff;
  background:linear-gradient(180deg,var(--sakura),var(--sakura-deep));
  border:none;border-radius:16px;padding:16px 48px;
  box-shadow:0 4px 0 #a03e59;cursor:pointer;
}
.big-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #a03e59}
.big-btn.start{
  background:linear-gradient(180deg,#c07d8b,#b06d7b);
  box-shadow:0 5px 0 #935663;border-radius:20px;
  font-size:20px;padding:13px 40px;
  display:flex;align-items:center;gap:14px;letter-spacing:.12em;margin-top:2px;
}
.big-btn.start:active{transform:translateY(3px);box-shadow:0 2px 0 #935663}
.big-btn.start span{color:#f3dfe4;font-size:18px}
.mode-pick{display:flex;gap:8px;margin:2px 0 4px;z-index:1;position:relative}
.mode-btn{font-family:inherit;font-weight:900;font-size:14px;color:#a08fbf;
  background:#fff;border:2.5px solid #d9cdeb;border-radius:99px;padding:7px 16px;cursor:pointer}
.mode-btn.on{color:#fff;background:#b3a3d6;border-color:#b3a3d6;box-shadow:0 3px 0 #9787c2}
.mode-section{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:1px;margin-bottom:2px}
.mode-title{font-weight:900;font-size:14px;color:#9885bf;letter-spacing:.08em}
.mode-guide{font-weight:700;font-size:11px;color:#a99e93;margin-bottom:1px}
.mode-wrap{position:relative;display:flex;align-items:center}
.bubble{display:none;position:absolute;top:50%;transform:translateY(-50%);
  background:#fff;border:2.5px solid #b3a3d6;border-radius:12px;padding:6px 8px;
  box-shadow:0 3px 6px rgba(120,100,150,.18);z-index:2}
#modePick[data-sel="h"] #bubH{display:block}
#modePick[data-sel="grid"] #bubG{display:block}
.bubble-left{right:calc(100% + 12px)}
.bubble-right{left:calc(100% + 12px)}
.bubble::after{content:"";position:absolute;top:50%;margin-top:-7px;
  border:7px solid transparent}
.bubble-left::after{left:100%;border-left-color:#b3a3d6}
.bubble-right::after{right:100%;border-right-color:#b3a3d6}
.bubble::before{content:"";position:absolute;top:50%;margin-top:-6px;z-index:1;
  border:6px solid transparent}
.bubble-left::before{left:100%;border-left-color:#fff}
.bubble-right::before{right:100%;border-right-color:#fff}
.mini-h{display:flex;align-items:baseline;gap:2px;font-weight:900;font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums}
.mini-h span{color:var(--ink-soft)}
.mini-h u{text-decoration:none;border-bottom:3px solid var(--sakura);min-width:14px;display:inline-block}
.mini-g{display:grid;grid-template-columns:repeat(2,20px);grid-auto-rows:20px;font-weight:900;font-size:11px;font-variant-numeric:tabular-nums}
.mini-g .mc{display:flex;align-items:center;justify-content:center}
.mini-g .n{border:2px solid var(--ink-soft);border-radius:5px 5px 0 0;color:var(--leaf)}
.mini-g .m{border:2px solid var(--ink-soft);border-radius:5px 0 0 5px;color:var(--sakura-deep)}
.mini-g .a{border:2px solid var(--sakura);border-radius:0 5px 5px 0;background:#fff8fa}
.mini-g .corner{color:var(--ink-soft);opacity:.5;font-size:9px}
.desc{font-size:14px;font-weight:700;color:#8a7d73;line-height:1.7}
#scrStart .desc{
  position:relative;padding:10px 0;margin:3px 4px;
  border-top:3px dotted #c9b8e0;border-bottom:3px dotted #c9b8e0;
}
#scrStart .desc b{color:#cf8fa0;font-weight:900}
#scrStart .desc i{color:#9885bf;font-style:normal;font-weight:900}
.result-card{width:100%;padding:0 6px}
.result-card h2{font-size:34px;font-weight:900;color:var(--sakura-deep);margin-bottom:14px;text-align:center;
  text-shadow:2px 2px 0 #fff}
.result-row{display:flex;justify-content:space-between;align-items:baseline;font-weight:900;font-size:26px;padding:6px 0}
.result-row b{font-variant-numeric:tabular-nums;font-size:44px;color:var(--sakura-deep)}
.splits{margin-top:14px;font-size:17px;color:var(--ink-soft);font-weight:700;text-align:left}
.splits div{display:flex;justify-content:space-between;padding:2px 0;font-variant-numeric:tabular-nums}
.start-title{
  font-family:"Zen Maru Gothic",system-ui,sans-serif;
  font-weight:900;font-size:54px;line-height:1.1;letter-spacing:.02em;
  color:#d199a5;text-align:center;
  -webkit-text-stroke:6px #fff;paint-order:stroke fill;
  filter:drop-shadow(0 5px 3px rgba(150,110,120,.18));
  display:flex;flex-direction:column;align-items:center;gap:4px;
  animation:bounceIn .6s cubic-bezier(.34,1.56,.64,1);
}
.start-title em{
  font-style:normal;font-size:.46em;
  color:#fff;-webkit-text-stroke:0;background:#b3a3d6;border-radius:99px;
  padding:.08em .7em;box-shadow:0 3px 0 #9787c2;
  filter:none;
}
@keyframes bounceIn{0%{transform:rotate(-2deg) scale(.6);opacity:0}100%{transform:rotate(-2deg) scale(1);opacity:1}}
#scrStart{
  position:relative;
  background-color:#f7f0e6;
  background-image:
    linear-gradient(#ece3d5 1px, transparent 1px),
    linear-gradient(90deg, #ece3d5 1px, transparent 1px);
  background-size:34px 34px;
  border:2.5px solid #e6dccb;
  border-radius:26px;
  overflow:hidden;
}
#scrStart::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 50% 42%, transparent 34%, rgba(247,240,230,.85) 88%);
  pointer-events:none;
}
/* corner blobs */
.blob{position:absolute;z-index:0;pointer-events:none;}
.blob.lav{bottom:-24px;left:-30px;width:180px;height:150px;
  background:#ddd2ef;border-radius:48% 52% 60% 40%/55% 45% 55% 45%;transform:rotate(12deg)}
.blob.sage{bottom:-30px;right:-34px;width:200px;height:150px;
  background:#d3ddc7;border-radius:52% 48% 40% 60%/50% 55% 45% 50%;transform:rotate(-10deg)}
#scrStart .center{position:relative;z-index:1;gap:8px}
.deco-watch{
  width:84px;height:auto;
  animation:bob 2.6s ease-in-out infinite;
  filter:drop-shadow(0 4px 6px rgba(138,99,184,.25));
}
@keyframes bob{0%,100%{transform:rotate(-6deg) translateY(0)}50%{transform:rotate(-6deg) translateY(-8px)}}
.deco-num{
  position:absolute;font-weight:900;opacity:.55;
  font-size:26px;pointer-events:none;z-index:1;
  border-bottom:3px solid currentColor;padding-bottom:2px;line-height:1;
}
#scrEnd{
  position:relative;
  background-image:
    linear-gradient(#e2ded6 1px, transparent 1px),
    linear-gradient(90deg, #e2ded6 1px, transparent 1px);
  background-size:34px 34px;
  border-radius:14px;
  overflow:hidden;
}
#scrEnd::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 50% 45%, transparent 30%, var(--washi) 85%);
  pointer-events:none;
}
#scrEnd .center{position:relative;z-index:1}
.deco-petal{
  position:absolute;z-index:1;pointer-events:none;
  animation:sway 3.2s ease-in-out infinite;
}
@keyframes sway{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-7px) rotate(8deg)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---- 記録を見るボタン（ログイン時のみ表示）---- */
.records-btn{
  font-family:inherit;font-weight:900;font-size:14px;color:var(--sakura-deep);
  background:#fff;border:2.5px solid var(--sakura);border-radius:99px;
  padding:8px 20px;cursor:pointer;box-shadow:0 3px 0 rgba(196,82,111,.35);
  display:inline-flex;align-items:center;gap:6px;
}
.records-btn:active{transform:translateY(2px);box-shadow:none}
.records-btn[hidden]{display:none}

/* ---- 新記録バナー（結果画面）---- */
.record-badge{display:none}
.record-badge.show{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  margin:0 auto 14px;padding:12px 18px;max-width:100%;
  background:linear-gradient(180deg,#fff6d6,#ffe6a3);
  border:3px solid #f0c64b;border-radius:16px;
  box-shadow:0 4px 0 rgba(200,150,20,.35);
  animation:badgePop .5s cubic-bezier(.34,1.56,.64,1);
}
.record-badge .rb-emoji{font-size:30px;line-height:1}
.record-badge .rb-main{font-weight:900;font-size:21px;color:#b07d0a}
.record-badge .rb-sub{font-weight:700;font-size:12.5px;color:#8a6d1f;text-align:center}
@keyframes badgePop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}

/* ---- 記録一覧モーダル ---- */
.records-overlay{
  position:fixed;inset:0;z-index:1000;display:none;
  align-items:center;justify-content:center;padding:20px;
  background:rgba(58,50,38,.5);
}
.records-overlay.show{display:flex;animation:ovIn .2s ease-out}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.records-card{
  width:min(400px,92vw);max-height:82vh;overflow:auto;position:relative;
  background:var(--washi);border-radius:20px;border-top:7px solid var(--sakura);
  box-shadow:0 18px 50px rgba(0,0,0,.35);padding:24px 20px 26px;
}
.records-card h3{font-size:23px;font-weight:900;color:var(--sakura-deep);text-align:center}
.records-sub{font-size:12px;font-weight:700;color:var(--ink-soft);text-align:center;margin-top:4px;min-height:14px}
.records-close{
  position:absolute;top:8px;right:12px;background:transparent;border:none;
  font-size:28px;line-height:1;color:var(--ink-soft);cursor:pointer;padding:4px 8px;font-family:inherit;
}
.records-list{list-style:none;margin:16px 0 0;padding:0}
.records-list li{
  display:flex;align-items:center;gap:10px;padding:10px 8px;
  border-bottom:1.5px dashed var(--line);font-variant-numeric:tabular-nums;
}
.records-list li:last-child{border-bottom:none}
.records-list li.top{background:#fff8fa;border-radius:12px;border-bottom:none;margin-bottom:2px}
.records-list .rk{width:1.8em;text-align:center;font-weight:900;font-size:18px;color:var(--ink-soft);flex-shrink:0}
.records-list .tm{font-weight:900;font-size:22px;color:var(--sakura-deep);flex:1}
.records-list .mc{font-size:12px;font-weight:700;color:var(--ink-soft);flex-shrink:0}
.records-list .dt{font-size:12px;font-weight:700;color:var(--ink-soft);width:3.4em;text-align:right;flex-shrink:0}
.records-list .msg{display:block;text-align:center;color:var(--ink-soft);font-weight:700;padding:22px 8px;line-height:1.7;border:none}
</style>
</head>
<body data-unit-key="math_es_hyakumasu" data-theme="washi">
<script src="/assets/divp-header.js"></script>
<script src="/assets/divp-core.js"></script>
<div class="wrap">
  <div class="top" id="topBar" style="display:none">
    <button class="home-btn" id="btnHomePlay" aria-label="ホームに戻る">🏠</button>
    <div class="title">100マス たし算</div>
    <div class="timer" id="timer">0:00.0</div>
  </div>

  <!-- start -->
  <div class="screen show" id="scrStart">
    <div class="blob lav"></div>
    <div class="blob sage"></div>
    <span class="deco-num" style="top:14%;left:9%;transform:rotate(-10deg);color:#a894cf">7+8</span>
    <span class="deco-num" style="top:20%;right:7%;transform:rotate(8deg);color:#8fae7f">12+5</span>
    <div class="center">
      <svg class="deco-watch" viewBox="0 0 100 110" aria-hidden="true">
        <rect x="44" y="2" width="12" height="10" rx="3" fill="#b06d7b"/>
        <rect x="47" y="10" width="6" height="8" fill="#b06d7b"/>
        <line x1="74" y1="16" x2="83" y2="8" stroke="#b06d7b" stroke-width="6" stroke-linecap="round"/>
        <circle cx="50" cy="62" r="44" fill="#fff" stroke="#c58794" stroke-width="7"/>
        <circle cx="50" cy="62" r="33" fill="#fbf1f2"/>
        <g stroke="#c58794" stroke-width="3" stroke-linecap="round">
          <line x1="50" y1="31" x2="50" y2="38"/>
          <line x1="50" y1="86" x2="50" y2="93"/>
          <line x1="19" y1="62" x2="26" y2="62"/>
          <line x1="74" y1="62" x2="81" y2="62"/>
        </g>
        <line x1="50" y1="62" x2="50" y2="38" stroke="#b06d7b" stroke-width="5" stroke-linecap="round"/>
        <line x1="50" y1="62" x2="66" y2="70" stroke="#b06d7b" stroke-width="5" stroke-linecap="round"/>
        <circle cx="50" cy="62" r="4.5" fill="#b06d7b"/>
        <circle cx="38" cy="50" r="3" fill="#fff" opacity=".8"/>
      </svg>
      <h1 class="start-title"><span>スマホ</span><em>de</em><span>100マス</span></h1>
      <p class="desc">こたえを入力すると自動で次へすすむよ。<br>少し<b>2けた</b>の数も出るからね!<br>スタートを押したら<i>3秒</i>カウントしてスタートするよ!</p>
      <div class="mode-section">
        <div class="mode-title">ひょうじタイプ</div>
        <div class="mode-guide">すきな ひょうじを えらんでね</div>
        <div class="mode-pick" id="modePick" data-sel="h">
          <div class="mode-wrap">
            <div class="bubble bubble-left" id="bubH">
              <div class="mini mini-h"><b>12</b><span>+</span><b>7</b><u>&nbsp;</u></div>
            </div>
            <button class="mode-btn on" data-mode="h">よこ しき</button>
          </div>
          <div class="mode-wrap">
            <button class="mode-btn" data-mode="grid">100マス</button>
            <div class="bubble bubble-right" id="bubG">
              <div class="mini mini-g">
                <span class="mc corner">+</span><span class="mc n">7</span>
                <span class="mc m">12</span><span class="mc a">&nbsp;</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <button class="big-btn start" id="btnStart"><span>✦</span>スタート<span>✦</span></button>
      <button class="records-btn" id="btnRecords" hidden>🏅 きろくを見る</button>
    </div>
  </div>

  <!-- play -->
  <div class="screen" id="scrPlay">
    <div class="progress">
      <div class="prog-label"><span id="coolLabel">第1クール</span><span id="countLabel">1 / 100</span></div>
      <div class="bar"><i id="barFill"></i></div>
    </div>
    <div class="stage" id="stage" data-mode="h">
      <div class="q-h">
        <div class="question">
          <span id="qM">2</span><span>+</span><span id="qN">3</span>
        </div>
        <div class="answer-box" id="ansBox">&nbsp;</div>
      </div>
      <div class="q-grid">
        <div class="cell corner">+</div>
        <div class="cell head n" id="qNg">3</div>
        <div class="cell head m" id="qMg">2</div>
        <div class="cell ans answer-box" id="ansBoxG">&nbsp;</div>
      </div>
    </div>
    <div class="tenkey" id="tenkey">
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="C" class="fn">C</button><button data-k="0">0</button><button data-k="B" class="fn">⌫</button>
    </div>
  </div>

  <!-- result -->
  <div class="screen" id="scrEnd">
    <svg class="deco-petal" style="top:7%;left:9%" width="34" height="34" viewBox="0 0 24 24"><path d="M12 2C15 7 20 9 20 14a8 8 0 1 1-16 0C4 9 9 7 12 2z" fill="#e79ab0"/></svg>
    <svg class="deco-petal" style="top:12%;right:8%;animation-delay:.6s" width="26" height="26" viewBox="0 0 24 24"><path d="M12 2C15 7 20 9 20 14a8 8 0 1 1-16 0C4 9 9 7 12 2z" fill="#d76e8b"/></svg>
    <svg class="deco-petal" style="bottom:14%;left:11%;animation-delay:1.1s" width="28" height="28" viewBox="0 0 24 24"><path d="M12 2C15 7 20 9 20 14a8 8 0 1 1-16 0C4 9 9 7 12 2z" fill="#b0567c"/></svg>
    <svg class="deco-petal" style="bottom:9%;right:12%;animation-delay:1.7s" width="36" height="36" viewBox="0 0 24 24"><path d="M12 2C15 7 20 9 20 14a8 8 0 1 1-16 0C4 9 9 7 12 2z" fill="#f0b7c8"/></svg>
    <span class="deco-num" style="top:22%;left:6%;color:#d98aa5;font-size:22px;transform:rotate(-8deg)">100!</span>
    <span class="deco-num" style="top:26%;right:6%;color:#8f4a68;font-size:20px;transform:rotate(7deg)">☆</span>
    <div class="center">
      <div class="result-card">
        <div class="record-badge" id="recordBadge"></div>
        <h2>けっか</h2>
        <div class="result-row"><span>タイム</span><b id="resTime">-</b></div>
        <div class="result-row"><span>ミス</span><b id="resMiss">-</b></div>
        <div class="splits" id="resSplits"></div>
      </div>
      <button class="big-btn" id="btnRetry">もう一回</button>
      <button class="records-btn" id="btnRecordsEnd" hidden>🏅 きろくを見る</button>
      <button class="home-link" id="btnHomeEnd">🏠 ホームにもどる</button>
    </div>
  </div>
</div>
<div class="correct-flash" id="flash"></div>
<div class="countdown" id="countdown"><b id="cdNum">3</b></div>

<!-- じぶんの記録トップ10（ログイン時のみ） -->
<div class="records-overlay" id="recordsOverlay">
  <div class="records-card">
    <button class="records-close" id="recordsClose" type="button" aria-label="とじる">×</button>
    <h3>🏅 じぶんの ベスト10</h3>
    <div class="records-sub" id="recordsSub"></div>
    <ol class="records-list" id="recordsList"></ol>
  </div>
</div>

<script>
(function(){
  'use strict';
  var TOTAL = 100, PER_COOL = 10;
  var UNIT_KEY = 'math_es_hyakumasu';

  function shuffle(a){
    for(var i=a.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1)), t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }
  function range(lo,hi){var r=[];for(var v=lo;v<=hi;v++)r.push(v);return r;}
  function twoDistinctTens(){
    var t=shuffle(range(10,19));
    return [t[0],t[1]];
  }
  // 10個の値: 1桁(2〜9)8個すべて + 2桁2個 → シャッフル
  function buildSet(){
    return shuffle(range(2,9).concat(twoDistinctTens()));
  }

  var ms=[], ns=[], idx=0, miss=0, startT=0, splits=[], coolStart=0, running=false, input='';
  var rafId=null;

  var $=function(id){return document.getElementById(id);};
  var scrStart=$('scrStart'), scrPlay=$('scrPlay'), scrEnd=$('scrEnd');
  var qM=$('qM'), qN=$('qN'), ansBox=$('ansBox');
  var qMg=$('qMg'), qNg=$('qNg'), ansBoxG=$('ansBoxG');
  var coolLabel=$('coolLabel'), countLabel=$('countLabel'), barFill=$('barFill');
  var timerEl=$('timer'), stage=$('stage'), flash=$('flash');
  var countdown=$('countdown'), cdNum=$('cdNum');
  var mode='h', cdTimer=null, cdActive=false;

  function fmt(ms_){
    var s=ms_/1000, m=Math.floor(s/60), r=(s-m*60).toFixed(1);
    return m+':'+(r<10?'0':'')+r;
  }
  function tick(){
    if(!running)return;
    timerEl.textContent=fmt(Date.now()-startT);
    rafId=requestAnimationFrame(tick);
  }

  function build(){
    ms=buildSet();                       // mは10問ごと・2桁ちょうど2回
    ns=[];
    for(var c=0;c<TOTAL/PER_COOL;c++){
      ns=ns.concat(buildSet());          // 各クール: 1桁は重複なし・2桁2回
    }
  }

  function curM(){ return ms[Math.floor(idx/PER_COOL)]; }
  function curN(){ return ns[idx]; }
  function curAns(){ return curM()+curN(); }

  function show(scr){
    [scrStart,scrPlay,scrEnd].forEach(function(s){s.classList.remove('show');});
    scr.classList.add('show');
  }

  function renderQ(){
    qM.textContent=curM(); qN.textContent=curN();
    qMg.textContent=curM(); qNg.textContent=curN();
    input='';
    renderInput();
    coolLabel.textContent='第'+(Math.floor(idx/PER_COOL)+1)+'クール';
    countLabel.textContent=(idx+1)+' / '+TOTAL;
    barFill.style.width=(idx/TOTAL*100)+'%';
  }

  function renderInput(){
    var t=input===''?'\u00A0':input;
    ansBox.textContent=t; ansBox.classList.toggle('on', input!=='');
    ansBoxG.textContent=t; ansBoxG.classList.toggle('on', input!=='');
  }

  function start(){
    build();
    idx=0; miss=0; splits=[];
    document.getElementById('topBar').style.display='grid';
    stage.setAttribute('data-mode', mode);
    show(scrPlay);
    renderQ();
    timerEl.textContent='0:00.0';
    var c=3;
    countdown.classList.add('show');
    function step(){
      if(!cdActive)return;
      if(c===0){
        countdown.classList.remove('show');
        startT=Date.now(); coolStart=startT; running=true;
        cancelAnimationFrame(rafId); tick();
        return;
      }
      cdNum.textContent=c;
      cdNum.style.animation='none'; void cdNum.offsetWidth; cdNum.style.animation='';
      c--; cdTimer=setTimeout(step,1000);
    }
    cdActive=true; step();
  }

  function goHome(){
    running=false; cdActive=false;
    clearTimeout(cdTimer);
    cancelAnimationFrame(rafId);
    countdown.classList.remove('show');
    document.getElementById('topBar').style.display='none';
    show(scrStart);
  }

  function correctNext(){
    stage.classList.remove('correct'); void stage.offsetWidth;
    stage.classList.add('correct');
    flash.classList.add('show');
    setTimeout(function(){flash.classList.remove('show');},150);

    idx++;
    if(idx%PER_COOL===0){
      var now=Date.now();
      splits.push(now-coolStart);
      coolStart=now;
    }
    if(idx>=TOTAL){ finish(); return; }
    renderQ();
  }

  function finish(){
    running=false;
    cancelAnimationFrame(rafId);
    document.getElementById('topBar').style.display='none';
    var total=Date.now()-startT;
    $('resTime').textContent=fmt(total);
    $('resMiss').textContent=miss+' 回';
    var html='';
    for(var i=0;i<splits.length;i++){
      html+='<div><span>第'+(i+1)+'クール (+'+ms[i]+')</span><span>'+fmt(splits[i])+'</span></div>';
    }
    $('resSplits').innerHTML=html;
    hideRecordBadge();
    show(scrEnd);

    // タイムだけ記録する（未ログイン・ローカルでは黙ってスキップ）。
    // 正解エフェクトは付けない（タイムアタックの邪魔になるため）。
    if(window.Divp && typeof Divp.saveTime==='function'){
      Divp.saveTime({time_ms:total, miss_count:miss, meta:{mode:mode}})
        .then(function(res){
          if(!res || !res.ok) return;
          if(res.is_best) showRecordBadge('new', res.prev_best_ms);
          else if(res.is_first) showRecordBadge('first');
          refreshRecordsButtons();   // 記録が付いた＝ログイン済なので「きろくを見る」を出す
        })
        .catch(function(){});
    }
  }

  // ── 新記録バナー ─────────────────────────────────────────────
  function showRecordBadge(type, prevMs){
    var b=$('recordBadge'); if(!b) return;
    if(type==='new'){
      b.innerHTML='<span class="rb-emoji">🎉</span>'
        +'<span class="rb-main">新記録 おめでとう！</span>'
        +(prevMs!=null?'<span class="rb-sub">これまでのベスト '+fmt(prevMs)+' を こえたよ！</span>':'');
    }else{
      b.innerHTML='<span class="rb-emoji">✨</span>'
        +'<span class="rb-main">はじめての きろく！</span>'
        +'<span class="rb-sub">つぎは この タイムを こえよう！</span>';
    }
    b.className='record-badge show';
  }
  function hideRecordBadge(){
    var b=$('recordBadge'); if(b){ b.className='record-badge'; b.innerHTML=''; }
  }

  // ── 記録トップ10（ログイン時のみ）─────────────────────────────
  function refreshRecordsButtons(){
    var on = !!(window.Divp && typeof Divp.loggedIn==='function' && Divp.loggedIn());
    ['btnRecords','btnRecordsEnd'].forEach(function(id){
      var el=$(id); if(el) el.hidden=!on;
    });
  }
  function openRecords(){
    var ov=$('recordsOverlay'); if(!ov) return;
    var list=$('recordsList'), sub=$('recordsSub');
    list.innerHTML='<li class="msg">よみこみ中…</li>'; sub.textContent='';
    ov.classList.add('show');
    if(window.Divp && typeof Divp.listTimes==='function'){
      Divp.listTimes()
        .then(function(data){ renderRecords(data); })
        .catch(function(){ list.innerHTML='<li class="msg">よみこめませんでした</li>'; });
    }else{
      list.innerHTML='<li class="msg">よみこめませんでした</li>';
    }
  }
  function renderRecords(data){
    var list=$('recordsList'), sub=$('recordsSub');
    var items=(data && data.items)||[];
    if(!items.length){
      list.innerHTML='<li class="msg">まだ きろくが ないよ。<br>1回 やってみよう！</li>';
      sub.textContent='';
      return;
    }
    var medals=['🥇','🥈','🥉'], html='';
    for(var i=0;i<items.length;i++){
      var it=items[i], rk=medals[i]||(i+1);
      html+='<li'+(i===0?' class="top"':'')+'>'
        +'<span class="rk">'+rk+'</span>'
        +'<span class="tm">'+fmt(it.time_ms)+'</span>'
        +'<span class="mc">ミス '+it.miss_count+'</span>'
        +'<span class="dt">'+fmtDate(it.created_at)+'</span>'
        +'</li>';
    }
    list.innerHTML=html;
    var plays=(data && data.total_plays)||items.length;
    sub.textContent='これまで '+plays+'回 チャレンジ（速い じゅん）';
  }
  function fmtDate(s){
    var m=String(s||'').match(/^(\d{4})-(\d{2})-(\d{2})/);
    return m?(parseInt(m[2],10)+'/'+parseInt(m[3],10)):'';
  }
  function closeRecords(){ var ov=$('recordsOverlay'); if(ov) ov.classList.remove('show'); }

  function press(k){
    if(!running)return;
    if(k==='C'){ input=''; renderInput(); return; }
    if(k==='B'){ input=input.slice(0,-1); renderInput(); return; }
    if(!/^[0-9]$/.test(k))return;
    if(input.length>=2)return;
    input+=k;
    renderInput();
    var ans=String(curAns());
    if(input.length===ans.length){
      if(input===ans){
        correctNext();
      }else{
        miss++;
        input='';           // 不正解: 何も表示せず入力だけリセット
        renderInput();
      }
    }
  }

  // タッチ端末: changedTouches を全部処理＝2本指の同時押しも取りこぼさない
  $('tenkey').addEventListener('touchstart',function(e){
    var hit=false;
    for(var i=0;i<e.changedTouches.length;i++){
      var t=e.changedTouches[i];
      var el=(t.target&&t.target.closest)?t.target.closest('button'):null;
      // 指の座標直下も確認（target がずれる端末対策）
      if(!el){ var p=document.elementFromPoint(t.clientX,t.clientY); el=p&&p.closest?p.closest('button'):null; }
      if(el&&$('tenkey').contains(el)){ press(el.dataset.k); hit=true; }
    }
    if(hit)e.preventDefault();     // ダブルタップ判定・合成クリックを抑止
  },{passive:false});
  // マウス/ペンのみ（touch は上の touchstart が担当＝二重発火しない）
  $('tenkey').addEventListener('pointerdown',function(e){
    if(e.pointerType==='touch')return;
    var b=e.target.closest('button');
    if(!b)return;
    e.preventDefault();
    press(b.dataset.k);
  },{passive:false});
  document.addEventListener('keydown',function(e){
    if(/^[0-9]$/.test(e.key))press(e.key);
    else if(e.key==='Backspace')press('B');
    else if(e.key==='Escape')press('C');
  });
  $('modePick').addEventListener('click',function(e){
    var b=e.target.closest('.mode-btn'); if(!b)return;
    mode=b.dataset.mode;
    this.setAttribute('data-sel', mode);
    var btns=this.querySelectorAll('.mode-btn');
    for(var i=0;i<btns.length;i++)btns[i].classList.toggle('on',btns[i]===b);
  });
  $('btnStart').addEventListener('click',start);
  $('btnRetry').addEventListener('click',start);
  $('btnHomePlay').addEventListener('click',goHome);
  $('btnHomeEnd').addEventListener('click',goHome);

  // 記録一覧モーダル
  $('btnRecords').addEventListener('click',openRecords);
  $('btnRecordsEnd').addEventListener('click',openRecords);
  $('recordsClose').addEventListener('click',closeRecords);
  $('recordsOverlay').addEventListener('click',function(e){ if(e.target===this) closeRecords(); });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape' && $('recordsOverlay').classList.contains('show')) closeRecords();
  });

  // 共通処理の初期化（学習時間の計測・タイム記録・ログイン状態の取得）。
  // 正解エフェクト(divp-correct)は読み込まない＝タイムアタックの邪魔をしない。
  if(window.Divp && typeof Divp.init==='function'){
    try{ Divp.init(UNIT_KEY); }catch(e){}
  }
  // ログイン状態が確定したら「きろくを見る」ボタンの表示可否を決める
  if(window.Divp && typeof Divp.ready==='function'){
    Divp.ready().then(refreshRecordsButtons);
  }
})();
</script>
</body>
</html>
