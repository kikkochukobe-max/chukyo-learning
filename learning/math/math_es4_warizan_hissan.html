<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light">
<title>わり算のひっ算マスター｜中京個別指導学院</title>
<meta name="description" content="小学4・5年生向け わり算のひっ算（筆算）練習。整数・小数、けた数、あまりの有無が選べる。テンキー入力・印刷対応。中京個別指導学院（焼山・植田・長久手・神岡・一社・高針・吉根・志段味・有松）。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LearningResource",
  "name": "わり算のひっ算マスター",
  "educationalLevel": "小学4年生・5年生",
  "learningResourceType": "練習問題",
  "teaches": "わり算の筆算（整数・小数・あまり）",
  "provider": {
    "@type": "EducationalOrganization",
    "name": "中京個別指導学院",
    "areaServed": ["焼山","植田","長久手","神岡","一社","高針","吉根","志段味","有松"]
  }
}
</script>
<style>
:root{
  color-scheme:only light;   /* スマホの強制ダークモードでの自動反転を抑止 */
  /* ===== ブランド色（中京個別）。ここを変えれば全体の色を調整できます ===== */
  --brand:#16386b;          /* 中京個別 メインの紺 */
  --brand-dark:#0f2a52;
  --accent:#ef7d3e;         /* わり算アクセント（オレンジ） */
  --ink:#23303a;            /* 文字 */
  --paper:#fbf8f1;          /* 紙の白 */
  --line:#cdbfa6;           /* 筆算の罫線 */
  --grid:#ece3d1;           /* ノートの方眼 */
  --correct:#2f9e5b;
  --wrong:#e0533d;
  --soft:#fff;
  --cell:clamp(30px,12.5vw,46px);   /* 筆算1マスの大きさ */
  --keypad-h:clamp(42px,11.5vw,52px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{margin:0;padding:0;min-height:100%;background:linear-gradient(var(--paper),var(--paper)) fixed;}
body{margin:0;padding:0;}
body{
  font-family:"Zen Maru Gothic",system-ui,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:var(--ink);
  min-height:100dvh;
  background:
    linear-gradient(var(--grid) 1px,transparent 1px) 0 0/22px 22px,
    linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/22px 22px,
    linear-gradient(var(--paper),var(--paper)); /* 用紙は単色でなく画像扱い＝強制ダークで反転されない */
  -webkit-text-size-adjust:100%;
}

/* ===== 固定ヘッダー（中京個別） ===== */
header.brand{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--brand),var(--brand-dark));
  color:#fff;
  padding:8px clamp(10px,3vw,20px);
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
  border-bottom:3px solid #feb342;
}
.brand .logo{
  display:flex;align-items:center;gap:9px;text-decoration:none;color:#fff;
}
.brand .mark{
  width:34px;height:34px;border-radius:9px;flex:0 0 auto;
  background:var(--accent);color:#fff;font-weight:900;
  display:grid;place-items:center;font-size:18px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.15);
}
.brand .mark-img{width:36px;height:36px;flex:0 0 auto;object-fit:contain;display:block;}
.brand .name{font-weight:900;font-size:clamp(14px,4.2vw,18px);line-height:1.1;letter-spacing:.02em;}
.brand .name small{display:block;font-weight:500;font-size:.62em;opacity:.85;letter-spacing:.06em;}
.brand .tool{margin-left:auto;font-weight:700;font-size:clamp(12px,3.4vw,15px);
  background:rgba(255,255,255,.14);padding:5px 11px;border-radius:999px;white-space:nowrap;}

main{max-width:560px;margin:0 auto;padding:12px clamp(8px,3vw,16px) calc(3 * var(--keypad-h) + 50px + env(safe-area-inset-bottom));}

/* ===== 設定パネル ===== */
.panel{
  background:var(--soft);border:1.5px solid #e7dcc6;border-radius:16px;
  padding:11px 12px;margin-bottom:12px;box-shadow:0 2px 0 #efe6d4;
}
.panel h2{margin:0 0 9px;font-size:13px;font-weight:700;color:var(--brand);
  display:flex;align-items:center;gap:6px;}
.panel h2::before{content:"";width:7px;height:16px;background:var(--accent);border-radius:3px;}
.panel-h{cursor:pointer;-webkit-user-select:none;user-select:none;}
.fold-hint{margin-left:auto;font-size:11px;font-weight:700;color:#9a8b6f;display:inline-flex;align-items:center;gap:4px;}
.chev{display:inline-block;transition:transform .15s ease;}
.panel.collapsed h2{margin-bottom:0;}
.panel.collapsed .panel-body{display:none;}
.panel.collapsed .chev{transform:rotate(-90deg);}
.dd-hint{margin:0 0 8px;font-size:12px;font-weight:700;color:#b5601f;background:#fdeede;border:1px solid #f4d8bd;border-radius:9px;padding:6px 10px;display:inline-flex;gap:6px;align-items:center;}
.dd-hint b{color:var(--accent);font-size:16px;line-height:1;}
/* がい数モード：問題文ヒントと「がい数」入力欄 */
.round-hint{margin:0 0 10px;font-size:13px;font-weight:700;color:#1f5a8c;background:#e9f2fb;border:1px solid #bcd8f0;border-radius:9px;padding:7px 11px;}
.round-hint b{font-size:18px;color:#123;margin-right:4px;letter-spacing:.02em;}
.round-ans{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
.ra-label{font-size:15px;font-weight:800;color:var(--ink);}
.ra-cells{display:inline-flex;align-items:center;gap:3px;}
.ra-cells .ans-cell{display:inline-flex;align-items:center;justify-content:center;}
.ra-dot{font-weight:900;font-size:22px;line-height:1;color:var(--accent);padding:0 1px;align-self:flex-end;padding-bottom:2px;}
.row{display:flex;flex-wrap:wrap;gap:7px 8px;align-items:center;margin-bottom:9px;}
.row:last-child{margin-bottom:0;}
.row .lab{font-size:12px;font-weight:700;color:#6b5d44;min-width:62px;}
.seg{display:inline-flex;background:#f2ead9;border-radius:10px;padding:3px;gap:2px;}
.seg button{
  border:0;background:transparent;color:#7a6a4d;font-family:inherit;font-weight:700;
  font-size:13px;padding:6px 11px;border-radius:8px;cursor:pointer;transition:.12s;
}
.seg button.on{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(0,0,0,.12);}
.seg.acc button.on{background:var(--accent);color:#fff;}
.disabledOpt{opacity:.4;pointer-events:none;}

.actions{display:flex;gap:8px;margin-top:2px;}
.btn{
  flex:1;border:0;border-radius:13px;font-family:inherit;font-weight:900;
  font-size:15px;padding:12px;cursor:pointer;transition:.12s;
  box-shadow:0 3px 0 rgba(0,0,0,.16);
}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.16);}
.btn.primary{background:var(--accent);color:#fff;}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none;filter:grayscale(.5);}
.next-hint{font-size:12px;color:#9a8f78;font-weight:700;align-self:center;margin-right:auto;}
.btn.ghost{background:#fff;color:var(--brand);border:1.5px solid #d9ccb2;box-shadow:0 3px 0 #e7dcc6;flex:0 0 auto;padding:12px 14px;}

/* ===== 問題カード ===== */
.problem{
  background:var(--soft);border:1.5px solid #e7dcc6;border-radius:18px;
  padding:8px 10px 16px;box-shadow:0 2px 0 #efe6d4;
}
.qhead{display:flex;align-items:center;justify-content:flex-start;gap:10px;margin-bottom:2px;}
.qno{font-size:12px;font-weight:700;color:#fff;background:var(--brand);padding:3px 10px;border-radius:999px;}
.qexpr{font-size:clamp(20px,6.5vw,26px);font-weight:900;color:var(--ink);letter-spacing:.04em;}
.qexpr .op{color:var(--accent);margin:0 .18em;}

/* ===== 筆算 ===== */
.hissan-wrap{display:flex;justify-content:center;overflow-x:auto;padding:0 2px 2px;}
.hissan{display:flex;align-items:flex-start;}
.divisor-cell{
  display:grid;place-items:center;
  width:var(--cell);height:var(--cell);font-size:calc(var(--cell)*.6);font-weight:700;
}
.divisor-stack{display:flex;flex-direction:column;justify-content:flex-end;}
.divisor-strip{display:flex;}
/* 小数÷小数：除数を桁ごとに表示＋小数点ドラッグ */
.dec-div-strip{display:flex;}
.dec-div-cell{display:grid;place-items:center;width:var(--cell);height:var(--cell);font-size:calc(var(--cell)*.6);font-weight:700;color:var(--brand);}
.dec-faint{position:absolute;bottom:1px;font-weight:900;font-size:calc(var(--cell)*.6);color:rgba(40,48,58,.22);pointer-events:none;transform:translateX(-50%);}
.dec-ans{position:absolute;bottom:1px;font-weight:900;font-size:calc(var(--cell)*.6);color:var(--ink);pointer-events:none;transform:translateX(-50%);}
.dec-dot{position:absolute;bottom:-3px;width:26px;height:26px;display:grid;place-items:end center;cursor:grab;touch-action:none;transform:translateX(-50%);z-index:6;}
.dec-dot::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(239,125,62,.16);margin-bottom:4px;}
.dec-dot.correct::after{background:var(--correct);box-shadow:0 0 0 4px rgba(47,158,91,.20);}
.dec-dot.drag{cursor:grabbing;}
.hi-body{display:flex;flex-direction:column;}
.hi-q{display:grid;padding-left:9px;} /* 商の行（枠と桁を揃える） */
.hi-box{                                      /* 被除数〜計算（括弧の中身） */
  position:relative;
  border-top:2.5px solid var(--ink);          /* 上線 */
  padding-left:9px;
  background:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%209%2040'%20preserveAspectRatio='none'%3E%3Cpath%20d='M0,0C8,7,8,33,0,40'%20fill='none'%20stroke='%2323303a'%20stroke-width='2.5'/%3E%3C/svg%3E") 0 0/9px var(--cell) no-repeat; /* わる数との境界はカーブ（被除数1行ぶん） */
}
.hi-row{display:grid;}
.cell{
  width:var(--cell);height:var(--cell);
  display:grid;place-items:center;
  font-size:calc(var(--cell)*.6);font-weight:700;line-height:1;
}
.cell.fixed{color:var(--ink);}
.cell.brought{color:#b59a6a;position:relative;}
.cell.brought::after{content:"↓";position:absolute;top:-10px;font-size:11px;color:#cdb589;}
.cell.edit{
  cursor:pointer;border-radius:8px;background:#fdf6e8;border:1.5px dashed #d8c49a;
  color:var(--brand);transition:.1s;
}
.cell.edit.sel{background:#fff;border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(239,125,62,.18);}
.cell.edit.ok{background:#e7f6ec;border:1.5px solid var(--correct);color:var(--correct);}
.cell.edit.ng{background:#fdecea;border:1.5px solid var(--wrong);color:var(--wrong);}
.cell .ph{color:#cbb78f;font-weight:500;}
.underline{border-bottom:2.5px solid var(--ink);}

/* かけ算の途中で引く横線：積の行の下に引く */
.hi-row.lined{border-bottom:2.5px solid var(--ink);}

/* ===== 判定メッセージ ===== */
.verdict{min-height:26px;text-align:center;margin-top:12px;font-weight:900;font-size:15px;}
.next-wrap{display:flex;justify-content:flex-end;margin-top:10px;}
#btnNext{padding:10px 18px;font-size:15px;}
.verdict.good{color:var(--correct);}
.verdict.bad{color:var(--wrong);}
.verdict .small{display:block;font-weight:500;font-size:12px;color:#8a7a5e;margin-top:2px;}

/* ===== テンキー（下部固定） ===== */
.keypad{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:rgba(251,248,241,.97);backdrop-filter:blur(6px);
  border-top:1.5px solid #e2d6bf;
  padding:6px clamp(8px,3vw,16px) calc(6px + env(safe-area-inset-bottom));
}
.keypad-inner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.key{
  height:var(--keypad-h);border:0;border-radius:12px;background:#fff;
  font-family:inherit;font-weight:900;font-size:clamp(18px,5.5vw,24px);color:var(--brand);
  box-shadow:0 3px 0 #e0d4bc;cursor:pointer;transition:.08s;
}
.key:active{transform:translateY(2px);box-shadow:0 1px 0 #e0d4bc;}
.key.util{font-size:clamp(13px,4vw,16px);background:#f3ead8;color:#7a6a4d;}
.key.act{background:var(--accent);color:#fff;box-shadow:0 3px 0 #c75f25;font-size:clamp(13px,4vw,16px);line-height:1.05;}
.key.wide{grid-column:3/-1;}
.key.xkey{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;font-size:clamp(17px,5vw,21px);line-height:1;}
.key.xkey .ksub{font-size:9px;font-weight:700;opacity:.75;margin-top:1px;}

/* ===== SEO用の隠しテキスト ===== */
.seo{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}

/* ===== 印刷エリア（通常は非表示） ===== */
.print-area{display:none;}

@media print{
  @page{size:A4 portrait;margin:10mm 9mm;}
  header.brand,main,.keypad{display:none !important;}
  body{background:#fff;min-height:0 !important;}
  html{background:#fff;min-height:0 !important;}
  .print-area{display:block !important;}
  .sheet{position:relative;page-break-after:always;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sheet:last-child{page-break-after:auto;}
  .wm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:195mm;height:auto;opacity:.25;z-index:0;pointer-events:none;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .p-head{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid #16386b;padding-bottom:4px;margin-bottom:6px;}
  .p-school{font-size:12px;font-weight:800;color:#16386b;}
  .p-title{font-weight:900;font-size:21px;color:#16386b;margin-top:1px;}
  .p-sub{font-size:11px;color:#555;}
  .p-name{font-size:12px;white-space:nowrap;}
  .p-name span{display:inline-block;border-bottom:1px solid #000;min-width:180px;margin-left:6px;}
  .p-inst{position:relative;z-index:1;font-size:12px;color:#222;margin:0 0 8px;}
  .p-rexpr{font-weight:900;font-size:15px;margin-left:8px;}
  .p-grid{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:4mm 8mm;}
  .p-item{position:relative;z-index:1;border:none;border-radius:0;padding:2px 4px;height:60mm;box-sizing:border-box;overflow:hidden;}
  .p-no{font-weight:900;font-size:13px;background:#000;color:#fff;border-radius:5px;padding:1px 8px;display:inline-block;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .p-expr{font-weight:900;font-size:20px;margin:6px 0 4px;}
  .p-space{height:60mm;}
  /* 問題ページ：空の筆算フォーム（手書き用に大きめ） */
  .b-hissan{display:flex;align-items:flex-start;margin:10px 0 0 6px;}
  .b-left{display:flex;flex-direction:column;justify-content:flex-end;}
  .b-spacer{height:36px;}
  .b-divint{height:36px;display:grid;place-items:center;font-weight:700;font-size:24px;padding:0 6px;}
  .b-divstrip{display:flex;}
  .b-dcell{width:36px;height:36px;display:grid;place-items:center;font-weight:700;font-size:24px;}
  .b-body{display:flex;flex-direction:column;}
  .b-q{height:36px;}
  .b-box{border-top:2px solid #000;padding-left:9px;background:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%209%2036'%20preserveAspectRatio='none'%3E%3Cpath%20d='M0,0C8,6,8,30,0,36'%20fill='none'%20stroke='%23000000'%20stroke-width='2'/%3E%3C/svg%3E") 0 0/9px 36px no-repeat;}
  .b-dvrow{display:grid;}
  .b-cell{width:36px;height:36px;display:grid;place-items:center;font-weight:700;font-size:24px;}
  .b-space{height:30mm;}
  .b-dot{position:absolute;left:-3px;bottom:1px;font-weight:900;font-size:24px;}
  /* 答えページの筆算 */
  .ans .p-item{min-height:auto;height:auto;}
  .a-hissan{display:flex;align-items:flex-start;margin-top:6px;}
  .a-div{width:18px;height:18px;display:grid;place-items:center;font-weight:700;font-size:13px;}
  .a-divrow{display:flex;}
  .a-body{display:flex;flex-direction:column;}
  .a-q{display:grid;padding-left:6px;}
  .a-box{border-top:1.6px solid #000;padding-left:6px;background:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%206%2018'%20preserveAspectRatio='none'%3E%3Cpath%20d='M0,0C5,3,5,15,0,18'%20fill='none'%20stroke='%23000000'%20stroke-width='1.6'/%3E%3C/svg%3E") 0 0/6px 18px no-repeat;}
  .a-row{display:grid;}
  .a-cell{width:18px;height:18px;display:grid;place-items:center;font-size:13px;font-weight:700;}
  .a-row.lined{border-bottom:1.4px solid #000;}
  .a-ans{font-weight:900;font-size:13px;margin-top:4px;}
}
</style>
</head>
<body>

<header class="brand">
  <a class="logo" href="https://www.chukyokobetsu.com/" target="_blank" rel="noopener">
    <img class="mark-img" id="hdrLogo" alt="中京個別指導学院" />
    <span class="name">中京個別指導学院</span>
  </a>
  <span class="tool">わり算のひっ算</span>
</header>

<main>
  
  <section class="panel" aria-label="設定" id="panel">
    <h2 class="panel-h" id="panelToggle" role="button" tabindex="0" aria-expanded="true">
      <span>問題の設定</span>
      <span class="fold-hint">タップで開閉<span class="chev">▾</span></span>
    </h2>
    <div class="panel-body" id="panelBody">
    <div class="row">
      <span class="lab">数の種類</span>
      <div class="seg acc" id="segMode">
        <button data-mode="int" class="on">整数</button>
        <button data-mode="dec">小数</button>
        <button data-mode="round">がい数</button>
      </div>
    </div>
    <div class="row" id="rowIntDigits">
      <span class="lab">けた数</span>
      <div class="seg" id="segDigits">
        <button data-dv="2" data-dr="1" class="on">2÷1</button>
        <button data-dv="3" data-dr="1">3÷1</button>
        <button data-dv="4" data-dr="1">4÷1</button>
        <button data-dv="3" data-dr="2">3÷2</button>
        <button data-dv="4" data-dr="2">4÷2</button>
      </div>
    </div>
    <div class="row" id="rowDecDigits" style="display:none;">
      <span class="lab">小数の種類</span>
      <div class="seg" id="segDec">
        <button data-dtype="int" data-qd="1" data-dr="1" class="on">第1位 ÷1けた</button>
        <button data-dtype="int" data-qd="2" data-dr="1">第2位 ÷1けた</button>
        <button data-dtype="int" data-qd="1" data-dr="2">第1位 ÷2けた</button>
        <button data-dtype="dec">÷小数</button>
      </div>
    </div>
    <div class="row" id="rowRound" style="display:none;">
      <span class="lab">がい数</span>
      <div class="seg" id="segRound">
        <button data-round="sig2" class="on">上から2けた</button>
        <button data-round="dec1">小数第1位まで</button>
        <button data-round="ones">一の位まで</button>
      </div>
    </div>
    <div class="row" id="rowRem">
      <span class="lab">余り</span>
      <div class="seg" id="segRem">
        <button data-rem="none" class="on">無し</button>
        <button data-rem="has">有り</button>
        <button data-rem="any">両方</button>
      </div>
    </div>
    <div class="actions">
      <button class="btn primary" id="btnNew">新しい問題</button>
      <button class="btn ghost" id="btnPrint">プリント作成</button>
    </div>
    </div>
  </section>

  <section class="problem" aria-label="筆算">
    <div class="qhead">
      <span class="qno" id="qno">第1もん</span>
    </div>
    <div class="dd-hint" id="ddHint" style="display:none;">小数点（<b>・</b>）はドラッグで動かせます</div>
    <div class="round-hint" id="roundHint" style="display:none;"></div>
    <div class="hissan-wrap"><div class="hissan" id="hissan"></div></div>

/* ===================== 筆算コアロジック（検証済み） ===================== */
function computeSteps(digits, divisor){
  const n=digits.length, quotient={}, steps=[];
  let rem=0, started=false;
  for(let i=0;i<n;i++){
    const cur=rem*10+digits[i];
    const q=Math.floor(cur/divisor), prod=q*divisor, nr=cur-prod;
    if(q>0) started=true;
    if(started){ quotient[i]=q; steps.push({i,q,prod,prevRem:rem,rem:nr}); }
    rem=nr;
  }
  return {quotient,steps,finalRem:rem};
}
function placeRight(numStr,rightCol){
  const cells={};
  for(let k=0;k<numStr.length;k++){ cells[rightCol-(numStr.length-1)+k]=Number(numStr[k]); }
  return cells;
}
// 筆算の全行と入力順を生成。digits:被除数配列, divisor, point:小数桁(右からpoint桁が小数)
function buildLayout(digits,divisor,point,remPoint,opts){
  opts=opts||{};
  const n=digits.length;
  if(remPoint===undefined) remPoint=point;
  const {quotient,steps,finalRem}=computeSteps(digits,divisor);
  const rows=[]; const inputOrder=[];
  const firstCol = steps.length ? steps[0].i : n;
  // 商行：すべての位にマスを用意。答えが入らない先頭の位は ×
  const qcells={};
  for(let c=0;c<n;c++){
    if(quotient[c]!==undefined) qcells[c]={v:quotient[c],edit:true,kind:'q'};
    else if(c<firstCol) qcells[c]={v:'×',edit:true,kind:'qx'};
  }
  rows.push({kind:'quotient',cells:qcells});
  // 被除数行
  const dcells={};
  for(let c=0;c<n;c++) dcells[c]={v:digits[c],edit:false,kind:'dividend'};
  rows.push({kind:'dividend',cells:dcells});
  // 各ステップ
  for(let k=0;k<steps.length;k++){
    const s=steps[k];
    const placed=placeRight(String(s.prod),s.i);
    const pcols=Object.keys(placed).map(Number).sort((a,b)=>a-b);
    const pcells={}; for(const c of pcols) pcells[c]={v:placed[c],edit:true,kind:'p'};
    rows.push({kind:'product',cells:pcells,lined:true});
    if(k<steps.length-1){
      const next=steps[k+1];
      const d2={};
      if(s.rem!==0){ // 引いて0（最上位が0）になるときは書かない＝入力無し
        const dplaced=placeRight(String(s.rem),s.i);
        Object.keys(dplaced).map(Number).sort((a,b)=>a-b).forEach(c=>{ d2[c]={v:dplaced[c],edit:true,kind:'d'}; });
      }
      d2[next.i]={v:digits[next.i],edit:false,kind:'brought'};
      rows.push({kind:'diff',cells:d2});
    }else{
      // あまり：通常は先頭0＋小数点で表示。がい数(plainRem)は生の整数で右詰め。
      const remStr = opts.plainRem
        ? String(finalRem)
        : (finalRem===0 ? '0' : String(finalRem).padStart(remPoint+1,'0'));
      const rplaced=placeRight(remStr,n-1);
      const rcols=Object.keys(rplaced).map(Number).sort((a,b)=>a-b);
      const rc={}; for(const c of rcols) rc[c]={v:rplaced[c],edit:true,kind:'r'};
      rows.push({kind:'remainder',cells:rc});
    }
  }
  // 入力順：先頭の×（左から）→ step毎に 商→積→差
  for(let c=0;c<firstCol;c++){ if(qcells[c]) inputOrder.push({r:0,c}); }
  let prodIdx=2;
  for(let k=0;k<steps.length;k++){
    const s=steps[k];
    inputOrder.push({r:0,c:s.i});
    const pr=rows[prodIdx];
    Object.keys(pr.cells).map(Number).sort((a,b)=>a-b).forEach(c=>{ if(pr.cells[c].edit) inputOrder.push({r:prodIdx,c}); });
    const dr=rows[prodIdx+1];
    Object.keys(dr.cells).map(Number).sort((a,b)=>a-b).forEach(c=>{ if(dr.cells[c].edit) inputOrder.push({r:prodIdx+1,c}); });
    prodIdx+=2;
  }
  return {rows,inputOrder,n,quotient,finalRem,steps,point,remPoint,plainRem:!!opts.plainRem};
}

/* ===================== 問題生成 ===================== */
function randInt(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function digitsOf(s){ return String(s).split('').map(Number); }

function genInteger(dvDigits,drDigits,rem){
  const dvMin=Math.pow(10,dvDigits-1), dvMax=Math.pow(10,dvDigits)-1;
  const drMin=drDigits===1?2:11, drMax=drDigits===1?9:49;
  for(let t=0;t<3000;t++){
    const divisor=randInt(drMin,drMax);
    const dividend=randInt(dvMin,dvMax);
    if(dividend<divisor) continue;
    const r=dividend%divisor;
    if(rem==='none'&&r!==0) continue;
    if(rem==='has'&&r===0) continue;
    return {digits:digitsOf(dividend),divisor,point:0,expr:dividend+' ÷ '+divisor};
  }
  return null;
}
function fmtScaled(value,point){ // 末尾0を整理した小数（式・表示用）
  if(point<=0) return String(value);
  let s=String(value); while(s.length<=point) s='0'+s;
  const i=s.length-point; let r=s.slice(0,i)+'.'+s.slice(i);
  return r.replace(/0+$/,'').replace(/\.$/,'');
}
function fmtFixed(value,point){ // 小数点以下を point 桁で固定（筆算の列に一致）
  if(point<=0) return String(value);
  let s=String(value); while(s.length<=point) s='0'+s;
  const i=s.length-point; return s.slice(0,i)+'.'+s.slice(i);
}
// 小数 ÷ 整数（あまり対応）
function genDecimalInt(qdec,drDigits,rem){
  const drMin=drDigits===1?2:11, drMax=drDigits===1?9:19;
  const scale=Math.pow(10,qdec);
  for(let t=0;t<5000;t++){
    const divisor=randInt(drMin,drMax);
    const qScaled=randInt(scale,(drDigits===1?20:10)*scale-1); // 商>=1.0
    const base=qScaled*divisor;
    let r;
    if(rem==='none') r=0; else if(rem==='has') r=randInt(1,divisor-1); else r=randInt(0,divisor-1);
    const dvScaled=base+r;
    let dvStr=String(dvScaled); while(dvStr.length<=qdec) dvStr='0'+dvStr;
    const intPart=dvStr.slice(0,dvStr.length-qdec);
    const fracPart=dvStr.slice(dvStr.length-qdec);
    if(fracPart.replace(/0+$/,'').length===0) continue; // 被除数が整数化
    if(fracPart[fracPart.length-1]==='0') continue;      // 末尾0回避
    const disp=intPart+'.'+fracPart;
    return {digits:digitsOf(intPart+fracPart),divisor,point:qdec,expr:disp+' ÷ '+divisor};
  }
  return null;
}
// 小数 ÷ 小数（点を移して計算。あまり可。小数点はドラッグで移動）
function genDecimalDec(rem){
  for(let t=0;t<5000;t++){
    const Dr=randInt(2,29); if(Dr%10===0) continue;   // 除数(×10)。1.0/2.0系は除外
    const Q=randInt(2,12);
    let R; if(rem==='none') R=0; else if(rem==='has') R=randInt(1,Dr-1); else R=randInt(0,Dr-1);
    const S=Q*Dr+R; if(S%10===0) continue; if(S>999) continue; // 元の被除数を小数に・桁数制限
    const divDigits=[Math.floor(Dr/10),Dr%10];          // 0.8→[0,8], 2.4→[2,4]
    const dvDigits=digitsOf(S);
    const origDvDec=1, shift=1, shiftedDvDec=0;
    return {
      modeFlag:'decdec',
      digits:dvDigits, divisor:Dr,
      divDigits, divOrigDot:1, divTargetDot:2,
      dvOrigDot:dvDigits.length-origDvDec, dvTargetDot:(dvDigits.length-origDvDec)+shift,
      shift, qPoint:shiftedDvDec, remPoint:origDvDec, point:0,
      expr:fmtScaled(S,1)+' ÷ '+fmtScaled(Dr,1)
    };
  }
  return null;
}

// がい数（小数÷小数、商を四捨五入）。商は1けた整数（1.0〜9.x）に限定。
//  kind: 'sig2'=上から2けた / 'dec1'=小数第1位まで（どちらも小数第2位まで計算→第1位へ丸め）
//        'ones'=一の位まで（整数）（小数第1位まで計算→一の位へ丸め）
function trimNum(x){ let s=x.toFixed(2); return s.replace(/0+$/,'').replace(/\.$/,''); }
function genRound(kind){
  const cp = (kind==='ones') ? 1 : 2;        // 計算する小数桁（丸める位の1つ下まで）
  const roundPlace = (kind==='ones') ? 0 : 1; // 丸める位（0=一の位, 1=小数第1位）
  const POW=[1,10,100,1000];
  for(let t=0;t<6000;t++){
    const Dr=randInt(13,49); if(Dr%10===0) continue;        // 除数×10（整数）。x.0系は除外
    const aInt=randInt(100,999); if(aInt%100===0) continue; // 元の被除数×100（1.00〜9.99、整数除外）
    const N=aInt*POW[cp-1];                                  // 筆算の被除数（小数cpけたを整数化）
    const qScaled=Math.floor(N/Dr);                          // 商×10^cp
    const rem=N-qScaled*Dr;
    if(rem<1) continue;                                      // 末尾にあまりが出る形に限定
    const qval=qScaled/POW[cp];                              // 商の値
    if(qval<1||qval>=10) continue;                           // 商は1けた整数（1.0〜9.x）
    const rounded=Math.round(qval*POW[roundPlace])/POW[roundPlace];
    if(rounded<1||rounded>=10) continue;                     // 答えも1けた（10へ繰り上がりは除外）
    const roundStr = roundPlace===0 ? String(rounded) : rounded.toFixed(roundPlace);
    return {
      modeFlag:'round', roundKind:kind,
      digits:digitsOf(N), divisor:Dr, point:cp, remPoint:cp, plainRem:true,
      qScaled, finalRemVal:rem,
      roundStr, roundPlace,
      origA:aInt/100, origB:Dr/10,
      expr:trimNum(aInt/100)+' ÷ '+trimNum(Dr/10)
    };
  }
  return null;
}

/* ===================== 状態 ===================== */
const state={
  mode:'int',
  dv:2, dr:1,        // 整数: 被除数桁/除数桁
  decType:'int',     // 小数: 'int'=小数÷整数, 'dec'=小数÷小数, 'round'=がい数
  qd:1, decDr:1,     // 小数÷整数: 商の小数桁/除数桁
  roundKind:'sig2',  // がい数: 'sig2'=上から2けた, 'dec1'=小数第1位まで
  rem:'none',
  layout:null,
  prob:null,         // 現在の問題オブジェクト
  decDot:null,       // 小数÷小数: {div, dv} 小数点の現在位置(gap)
  problemNo:1,
  selIndex:0,        // 入力順インデックス
  inputs:{},         // "r,c" -> 入力文字
  checked:false,
};
function genCurrent(){
  if(state.mode==='int') return genInteger(state.dv,state.dr,state.rem);
  if(state.mode==='round') return genRound(state.roundKind);
  if(state.decType==='dec') return genDecimalDec(state.rem);
  return genDecimalInt(state.qd,state.decDr,state.rem);
}

/* ===================== 描画 ===================== */
const hissanEl=document.getElementById('hissan');
const qnoEl=document.getElementById('qno');
const verdictEl=document.getElementById('verdict');

function keyOf(r,c){ return r+','+c; }

const ANS_ROW=90;   // がい数の答えマス用の擬似行
function newProblem(){
  let p=genCurrent();
  if(!p){ p=genInteger(3,1,'none'); }
  state.prob=p;
  const isRound = p.modeFlag==='round';
  state.layout=buildLayout(p.digits,p.divisor,p.point,p.remPoint, isRound?{plainRem:true}:undefined);
  if(isRound){
    const rs=p.roundStr;                       // 例 "2.9" / "3"
    const ds=rs.replace('.','');               // 数字だけ "29" / "3"
    state.layout.ansCells={};
    for(let i=0;i<ds.length;i++){
      state.layout.ansCells[i]={v:ds.charAt(i),edit:true,kind:'ans'};
      state.layout.inputOrder.push({r:ANS_ROW,c:i});
    }
    state.layout.roundInfo={kind:p.roundKind, roundStr:rs};
  }
  state.divisor=p.divisor;
  state.expr=p.expr;
  state.inputs={};
  state.checked=false;
  state.selIndex=0;
  state.decDot = p.modeFlag==='decdec' ? {div:p.divOrigDot, dv:p.dvOrigDot, rem:state.layout.n} : null;
  render();
  // 最初の入力位置（最高位の商）へ
  selectIndex(0);
}

function render(){
  const L=state.layout;
  qnoEl.textContent='第'+state.problemNo+'問';

  // 筆算本体
  hissanEl.innerHTML='';
  const cols=L.n;
  const colTmpl='grid-template-columns:repeat('+cols+',var(--cell));';

  const p=state.prob;
  const isDD = p && p.modeFlag==='decdec';
  const ddHint=document.getElementById('ddHint');
  if(ddHint) ddHint.style.display = isDD ? '' : 'none';

  // 除数（左、被除数行の高さに合わせて下寄せ：商の1行ぶん下げる）
  const divWrap=document.createElement('div');
  divWrap.className='divisor-stack';
  const spacer=document.createElement('div'); spacer.style.height='calc(var(--cell) + 2.5px)'; // 商行ぶん（box上ボーダー分を補正）
  divWrap.appendChild(spacer);
  if(isDD){
    const strip=document.createElement('div'); strip.className='dec-div-strip';
    p.divDigits.forEach(d=>{ const dc=document.createElement('div'); dc.className='dec-div-cell'; dc.textContent=d; strip.appendChild(dc); });
    divWrap.appendChild(strip);
  }else{
    const strip=document.createElement('div'); strip.className='divisor-strip';
    String(state.divisor).split('').forEach(ch=>{ const dc=document.createElement('div'); dc.className='divisor-cell'; dc.textContent=ch; strip.appendChild(dc); });
    divWrap.appendChild(strip);
  }
  hissanEl.appendChild(divWrap);

  // 本体（商行 + 箱）
  const body=document.createElement('div'); body.className='hi-body';
  // 商行
  const qrow=document.createElement('div'); qrow.className='hi-q'; qrow.style.cssText=colTmpl;
  buildRowCells(qrow,L.rows[0],0,cols);
  body.appendChild(qrow);
  // 箱（被除数〜計算）
  const box=document.createElement('div'); box.className='hi-box';
  for(let r=1;r<L.rows.length;r++){
    const rowDiv=document.createElement('div');
    rowDiv.className='hi-row'+(L.rows[r].lined?' lined':'');
    rowDiv.style.cssText=colTmpl;
    buildRowCells(rowDiv,L.rows[r],r,cols);
    box.appendChild(rowDiv);
  }
  body.appendChild(box);
  hissanEl.appendChild(body);

  if(isDD){ drawDecDecPoints(p); }   // 小数÷小数：ドラッグ式の小数点
  else { drawDecimalPoints(); }      // それ以外：固定の小数点

  // がい数モードの問題文と「がい数」入力欄
  const roundHint=document.getElementById('roundHint');
  const roundAns=document.getElementById('roundAns');
  if(p && p.modeFlag==='round'){
    const lead = p.roundKind==='sig2' ? '上から2けたのがい数'
              : p.roundKind==='ones' ? '一の位まで（整数）のがい数'
              : '小数第1位までのがい数';
    if(roundHint){
      roundHint.innerHTML='<b>'+p.expr+'</b>　商は四捨五入して、'+lead+'で求めよう';
      roundHint.style.display='';
    }
    if(roundAns){
      roundAns.innerHTML='';
      const label=document.createElement('span'); label.className='ra-label'; label.textContent=lead+' ≒'; roundAns.appendChild(label);
      const wrap=document.createElement('span'); wrap.className='ra-cells';
      let di=0;
      for(const ch of p.roundStr){
        if(ch==='.'){ const dot=document.createElement('span'); dot.className='ra-dot'; dot.textContent='.'; wrap.appendChild(dot); }
        else { wrap.appendChild(makeEditCell(ANS_ROW,di,L.ansCells[di])); di++; }
      }
      roundAns.appendChild(wrap);
      roundAns.style.display='';
    }
  }else{
    if(roundHint) roundHint.style.display='none';
    if(roundAns){ roundAns.style.display='none'; roundAns.innerHTML=''; }
  }
  updateNextBtn();
}

// がい数の答えマス（筆算の外）。編集セルと同じ挙動（選択・入力・採点色）
function makeEditCell(r,c,cd){
  const cell=document.createElement('div');
  cell.className='cell edit ans-cell';
  cell.dataset.r=r; cell.dataset.c=c;
  const k=keyOf(r,c);
  const val=state.inputs[k];
  if(val!==undefined && val!=='') cell.textContent=val;
  else cell.innerHTML='<span class="ph">?</span>';
  if(state.checked && val!==undefined && val!==''){ cell.classList.add(String(val)===String(cd.v)?'ok':'ng'); }
  cell.addEventListener('click',()=>{ const idx=state.layout.inputOrder.findIndex(o=>o.r===r&&o.c===c); if(idx>=0) selectIndex(idx); });
  return cell;
}

function buildRowCells(rowDiv,rowData,r,cols){
  for(let c=0;c<cols;c++){
    const cd=rowData.cells[c];
    const cell=document.createElement('div');
    cell.style.gridColumn=(c+1);
    if(cd===undefined){ cell.className='cell'; cell.innerHTML='&nbsp;'; }
    else if(!cd.edit){
      cell.className='cell fixed'+(cd.kind==='brought'?' brought':'');
      cell.textContent=cd.v;
    }else{
      cell.className='cell edit';
      cell.dataset.r=r; cell.dataset.c=c;
      const k=keyOf(r,c);
      const val=state.inputs[k];
      if(val!==undefined && val!==''){ cell.textContent=val; }
      else { cell.innerHTML='<span class="ph">?</span>'; }
      if(state.checked && val!==undefined && val!==''){
        cell.classList.add(String(val)===String(cd.v)?'ok':'ng');
      }
      cell.addEventListener('click',()=>{
        const idx=state.layout.inputOrder.findIndex(o=>o.r===r&&o.c===c);
        if(idx>=0) selectIndex(idx);
      });
    }
    rowDiv.appendChild(cell);
  }
}

// 商と被除数（と小数あまり）に小数点（マスとマスの間に表示）
function drawDecimalPoints(){
  if(!state.layout.point) return;
  const L=state.layout;
  const dotCol=L.n-L.point; // この列の左に点
  const addDot=(target)=>{
    if(!target) return;
    const cell=target.children[dotCol];
    if(!cell) return;
    const dot=document.createElement('span');
    dot.textContent='.';
    dot.style.cssText='position:absolute;left:-3px;bottom:2px;font-weight:900;color:var(--accent);';
    cell.style.position='relative';
    cell.appendChild(dot);
  };
  addDot(hissanEl.querySelector('.hi-q'));                        // 商
  addDot(hissanEl.querySelector('.hi-box .hi-row'));             // 被除数（最初の行）
  // 小数のあまりがある場合は、あまり行（最後の行）にも点（がい数モードは生のあまりなので打たない）
  if(L.finalRem>0 && !L.plainRem){
    const rows=hissanEl.querySelectorAll('.hi-box .hi-row');
    addDot(rows[rows.length-1]);
  }
}

/* ===== 小数÷小数：ドラッグ式の小数点 ===== */
function gapXsOf(el){
  const cells=[...el.children].filter(c=>!c.classList||(!c.classList.contains('dec-dot')&&!c.classList.contains('dec-faint')&&!c.classList.contains('dec-ans')));
  const xs=cells.map(c=>c.offsetLeft);
  const last=cells[cells.length-1];
  xs.push(last.offsetLeft+last.offsetWidth);
  return xs;
}
function placeMark(el,cls,txt,xs,gap){
  const s=document.createElement('span'); s.className=cls; s.textContent=txt; s.style.left=xs[gap]+'px'; el.appendChild(s); return s;
}
function drawDecDecPoints(p){
  const strip=hissanEl.querySelector('.dec-div-strip');
  const rows=hissanEl.querySelectorAll('.hi-box .hi-row');
  const dvRow=rows[0];
  const remRow=rows[rows.length-1];
  if(!strip||!dvRow) return;
  strip.style.position='relative'; dvRow.style.position='relative';
  const divXs=gapXsOf(strip);
  const dvXs=gapXsOf(dvRow);
  // もともとの小数点（薄く）
  placeMark(strip,'dec-faint','.',divXs,p.divOrigDot);
  placeMark(dvRow,'dec-faint','.',dvXs,p.dvOrigDot);
  // あまりの小数点：自分で置く（ドラッグできる点のみ・補助マークなし）
  if(state.layout.finalRem>0 && remRow && remRow!==dvRow){
    remRow.style.position='relative';
    const remXs=gapXsOf(remRow);
    addDragDot(remRow,remXs,'rem',p.dvOrigDot);
  }
  // ドラッグできる小数点
  addDragDot(strip,divXs,'div',p.divTargetDot);
  addDragDot(dvRow,dvXs,'dv',p.dvTargetDot);
}
function addDragDot(el,xs,which,target){
  const dot=document.createElement('div');
  dot.className='dec-dot'+(state.decDot[which]===target?' correct':'');
  dot.style.left=xs[state.decDot[which]]+'px';
  el.appendChild(dot);
  let dragging=false;
  const nearest=(clientX)=>{ const r=el.getBoundingClientRect(); const x=clientX-r.left; let b=0,bd=1e9; xs.forEach((gx,i)=>{ const d=Math.abs(gx-x); if(d<bd){bd=d;b=i;} }); return b; };
  const apply=(g)=>{ state.decDot[which]=g; dot.style.left=xs[g]+'px'; dot.classList.toggle('correct',g===target); };
  dot.addEventListener('pointerdown',e=>{ dragging=true; dot.setPointerCapture(e.pointerId); dot.classList.add('drag'); e.preventDefault(); });
  dot.addEventListener('pointermove',e=>{ if(dragging) apply(nearest(e.clientX)); });
  const end=e=>{ if(!dragging) return; dragging=false; dot.classList.remove('drag'); try{dot.releasePointerCapture(e.pointerId);}catch(_){} apply(nearest(e.clientX)); };
  dot.addEventListener('pointerup',end);
  dot.addEventListener('pointercancel',end);
  return dot;
}
function decDotsCorrect(){
  const p=state.prob;
  if(!p||p.modeFlag!=='decdec'||!state.decDot) return true;
  if(state.decDot.div!==p.divTargetDot || state.decDot.dv!==p.dvTargetDot) return false;
  if(state.layout.finalRem>0 && state.decDot.rem!==p.dvOrigDot) return false;
  return true;
}

/* ===================== 入力操作 ===================== */
function selectIndex(idx){
  const L=state.layout;
  if(!L||!L.inputOrder.length) return;
  idx=Math.max(0,Math.min(idx,L.inputOrder.length-1));
  state.selIndex=idx;
  // 全セルから sel を外す（筆算の外の「がい数」マスも含めて document 全体）
  document.querySelectorAll('.cell.edit.sel').forEach(e=>e.classList.remove('sel'));
  const o=L.inputOrder[idx];
  const el=document.querySelector('.cell.edit[data-r="'+o.r+'"][data-c="'+o.c+'"]');
  if(el){ el.classList.add('sel'); el.scrollIntoView({block:'nearest',inline:'nearest'}); }
}
function inputDigit(d){
  const L=state.layout; if(!L) return;
  const o=L.inputOrder[state.selIndex];
  const k=keyOf(o.r,o.c);
  state.inputs[k]=d;
  state.checked=false; verdictEl.textContent=''; verdictEl.className='verdict';
  render();
  selectIndex(Math.min(state.selIndex+1,L.inputOrder.length-1));
}
function backspace(){
  const L=state.layout; if(!L) return;
  const o=L.inputOrder[state.selIndex];
  const k=keyOf(o.r,o.c);
  if(state.inputs[k]!==undefined && state.inputs[k]!==''){
    state.inputs[k]='';
  }else if(state.selIndex>0){
    state.selIndex--;
    const o2=L.inputOrder[state.selIndex];
    state.inputs[keyOf(o2.r,o2.c)]='';
  }
  state.checked=false; verdictEl.textContent=''; verdictEl.className='verdict';
  render();
  selectIndex(state.selIndex);
}
function checkAnswer(){
  const L=state.layout;
  let allFilled=true, allRight=true, wrongCount=0, calcWrong=false, ansWrong=false;
  for(const o of L.inputOrder){
    const cd = o.r===ANS_ROW ? (L.ansCells&&L.ansCells[o.c]) : L.rows[o.r].cells[o.c];
    if(!cd) continue;
    const val=state.inputs[keyOf(o.r,o.c)];
    if(val===undefined||val===''){ allFilled=false; allRight=false; (o.r===ANS_ROW?ansWrong=true:calcWrong=true); }
    else if(String(val)!==String(cd.v)){ allRight=false; wrongCount++; (o.r===ANS_ROW?ansWrong=true:calcWrong=true); }
  }
  state.checked=true;
  const dotsOK=decDotsCorrect();
  render();
  const isRound = state.prob && state.prob.modeFlag==='round';
  if(allRight && dotsOK){
    verdictEl.className='verdict good';
    verdictEl.innerHTML='せいかい！よくできました 💮<span class="small">「あたらしい問題」で次に進もう</span>';
    if(window.Divp && Divp.correct){ try{ Divp.correct(); }catch(e){} }
  }else if(isRound && !calcWrong && ansWrong){
    verdictEl.className='verdict bad';
    verdictEl.innerHTML='筆算はOK！がい数を見直そう<span class="small">四捨五入する位の1つ下の数字を見てね</span>';
  }else if(allRight && !dotsOK){
    verdictEl.className='verdict bad';
    verdictEl.innerHTML='計算はOK！小数点の位置を見直そう<span class="small">わる数が整数になるように右へ／わられる数も同じだけ／あまりはもとの位置に</span>';
  }else if(!allFilled){
    verdictEl.className='verdict bad';
    verdictEl.innerHTML='まだ空いているマスがあるよ<span class="small">あかいマスを見直してね</span>';
  }else{
    verdictEl.className='verdict bad';
    verdictEl.innerHTML='おしい！あかいマスをもう一度<span class="small">'+wrongCount+'マス ちがうよ</span>';
  }
}

/* ===================== テンキー / キーボード ===================== */
document.getElementById('keypad').addEventListener('click',e=>{
  const b=e.target.closest('.key'); if(!b) return;
  const k=b.dataset.k;
  if(k==='back') backspace();
  else if(k==='check') checkAnswer();
  else inputDigit(k);
});
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9'){ inputDigit(e.key); e.preventDefault(); }
  else if(e.key==='x'||e.key==='X'||e.key==='*'||e.key==='×'){ inputDigit('×'); e.preventDefault(); }
  else if(e.key==='Backspace'){ backspace(); e.preventDefault(); }
  else if(e.key==='Enter'){ checkAnswer(); e.preventDefault(); }
  else if(e.key==='ArrowRight'||e.key==='Tab'){ selectIndex(state.selIndex+1); e.preventDefault(); }
  else if(e.key==='ArrowLeft'){ selectIndex(state.selIndex-1); e.preventDefault(); }
});

/* ===================== 設定UI ===================== */
function bindSeg(id,fn){
  const seg=document.getElementById(id);
  seg.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b||b.classList.contains('disabledOpt')) return;
    seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    fn(b);
  });
}
function updateRemAvail(){
  // あまりは全モードで有効（整数・小数÷整数・小数÷小数）
  const rowRem=document.getElementById('rowRem');
  rowRem.classList.remove('disabledOpt');
  rowRem.style.opacity='1';
  rowRem.style.pointerEvents='auto';
}
bindSeg('segMode',b=>{
  state.mode=b.dataset.mode;
  const isInt=state.mode==='int', isDec=state.mode==='dec', isRound=state.mode==='round';
  document.getElementById('rowIntDigits').style.display=isInt?'':'none';
  document.getElementById('rowDecDigits').style.display=isDec?'':'none';
  document.getElementById('rowRound').style.display=isRound?'':'none';
  document.getElementById('rowRem').style.display=isRound?'none':'';   // がい数は余り設定なし
  updateRemAvail();
  state.problemNo=1; newProblem();
});
bindSeg('segDigits',b=>{ state.dv=+b.dataset.dv; state.dr=+b.dataset.dr; state.problemNo=1; newProblem(); });
bindSeg('segDec',b=>{
  state.decType=b.dataset.dtype;
  if(state.decType==='int'){ state.qd=+b.dataset.qd; state.decDr=+b.dataset.dr; }
  updateRemAvail();
  state.problemNo=1; newProblem();
});
bindSeg('segRound',b=>{ state.roundKind=b.dataset.round; state.problemNo=1; newProblem(); });
bindSeg('segRem',b=>{ state.rem=b.dataset.rem; state.problemNo=1; newProblem(); });

document.getElementById('btnNew').addEventListener('click',()=>{ state.problemNo++; newProblem(); });
document.getElementById('btnNext').addEventListener('click',()=>{ if(!state.checked) return; state.problemNo++; newProblem(); });
function updateNextBtn(){
  const b=document.getElementById('btnNext'); if(b) b.disabled=!state.checked;
  const h=document.getElementById('nextHint'); if(h) h.style.display=state.checked?'none':'';
}
document.getElementById('btnPrint').addEventListener('click',makePrint);

// 設定パネルの折りたたみ
(function(){
  const panel=document.getElementById('panel');
  const toggle=document.getElementById('panelToggle');
  const doToggle=()=>{
    const c=panel.classList.toggle('collapsed');
    toggle.setAttribute('aria-expanded', c?'false':'true');
  };
  toggle.addEventListener('click',doToggle);
  toggle.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); doToggle(); } });
})();

/* ===================== 印刷（A4縦 6問 + 裏に答え） ===================== */
function makePrint(){
  try{
  // 現在の設定で6問つくる
  const probs=[];
  for(let i=0;i<6;i++){
    let p=null;
    for(let t=0;t<50&&!p;t++){ p=genCurrent(); }
    if(!p) p=genInteger(3,1,'none');
    p.layout=buildLayout(p.digits,p.divisor,p.point,p.remPoint, p.modeFlag==='round'?{plainRem:true}:undefined);
    probs.push(p);
  }
  const today=new Date();
  const ymd=today.getFullYear()+'/'+(today.getMonth()+1)+'/'+today.getDate();
  const remLbl=state.rem==='none'?'・わりきれる':state.rem==='has'?'・あまりあり':'・あまりどちらも';
  const isRoundPrint=(state.mode==='round');
  const roundLead = state.roundKind==='sig2' ? '上から2けたのがい数'
                  : state.roundKind==='ones' ? '一の位まで（整数）のがい数'
                  : '小数第1位までのがい数';
  const modeLabel=isRoundPrint
    ? ('小数のわり算（がい数）　'+roundLead)
    : (state.mode==='int'
      ? (state.dv+'けた ÷ '+state.dr+'けた'+remLbl)
      : (state.decType==='dec'
          ? ('小数 ÷ 小数（点を移して計算'+remLbl+'）')
          : '小数 ÷ 整数（商 小数第'+state.qd+'位'+remLbl+'）'));

  const area=document.getElementById('printArea');
  const wm='<img class="wm" src="'+LOGO_SRC+'" alt="">';
  // --- 表：問題（空の筆算フォーム） ---
  let q='<div class="sheet"><div class="p-head"><div>'
    +'<div class="p-school">中京個別指導学院</div>'
    +'<div class="p-title">わり算のひっ算　練習プリント</div>'
    +'<div class="p-sub">'+modeLabel+'</div></div>'
    +'<div class="p-name">名前：<span></span></div></div>'
    +'<div class="p-inst">'+(isRoundPrint?('商は四捨五入して、'+roundLead+'で求めましょう。'):'つぎの わり算を ひっ算で しましょう。')+'</div>'
    +'<div class="p-grid">';
  probs.forEach((p,i)=>{
    q+='<div class="p-item"><span class="p-no">'+(i+1)+'</span>'
      +(p.modeFlag==='round' ? '<span class="p-rexpr">'+p.expr+'</span>' : '')
      +renderBlankHissan(p)+'</div>';
  });
  q+='</div></div>';

  // --- 裏：答え（完成した筆算） ---
  let a='<div class="sheet ans"><div class="p-head"><div>'
    +'<div class="p-school">中京個別指導学院</div>'
    +'<div class="p-title">わり算のひっ算　こたえ</div>'
    +'<div class="p-sub">'+modeLabel+'</div></div><div class="p-name">　</div></div><div class="p-grid">';
  probs.forEach((p,i)=>{
    a+='<div class="p-item"><span class="p-no">'+(i+1)+'</span>'
      +renderAnswerHissan(p)
      +'<div class="a-ans">'+answerText(p)+'</div></div>';
  });
  a+='</div></div>';

  area.innerHTML=wm+q+a;
  // 直後に印刷すると描画が間に合わず白紙になる端末があるため、描画確定を待つ
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ window.print(); }); });
  }catch(err){
    try{ console.error('print error',err); }catch(e){}
    alert('印刷の作成でエラーが発生しました:\n'+(err&&err.message?err.message:err));
  }
}
function renderBlankHissan(p){
  const L=p.layout; const n=L.n; const cw=36;
  const isDD=p.modeFlag==='decdec';
  const tmpl='grid-template-columns:repeat('+n+','+cw+'px);';
  let dvDotCol=-1, divDotCol=-1;
  if(isDD){ dvDotCol=p.dvOrigDot; divDotCol=p.divOrigDot; }
  else if(p.point>0){ dvDotCol=n-p.point; }
  // 除数
  let divHTML;
  if(isDD){
    let s='';
    for(let c=0;c<p.divDigits.length;c++){
      const dot=(divDotCol===c)?'<span class="b-dot">.</span>':'';
      s+='<div class="b-dcell" style="position:relative;">'+dot+p.divDigits[c]+'</div>';
    }
    divHTML='<div class="b-divstrip">'+s+'</div>';
  }else{
    let s=''; String(p.divisor).split('').forEach(ch=>{ s+='<div class="b-dcell">'+ch+'</div>'; });
    divHTML='<div class="b-divstrip">'+s+'</div>';
  }
  // 被除数（点つき）
  let dvCells='';
  for(let c=0;c<n;c++){
    const dot=(dvDotCol===c)?'<span class="b-dot">.</span>':'';
    const rel=(dvDotCol===c)?'position:relative;':'';
    dvCells+='<div class="b-cell" style="'+rel+'">'+dot+p.digits[c]+'</div>';
  }
  return '<div class="b-hissan"><div class="b-left"><div class="b-spacer"></div>'+divHTML+'</div>'
    +'<div class="b-body"><div class="b-q"></div>'
    +'<div class="b-box"><div class="b-dvrow" style="'+tmpl+'">'+dvCells+'</div><div class="b-space"></div></div>'
    +'</div></div>';
}
function answerText(p){
  const c=computeSteps(p.digits,p.divisor);
  let qs=''; let started=false;
  for(let col=0;col<p.digits.length;col++){ if(c.quotient[col]!==undefined) started=true; if(started) qs+=(c.quotient[col]??0); }
  if(qs==='') qs='0';
  if(p.modeFlag==='round'){
    return 'がい数 ≒ '+p.roundStr+'　（商 '+fmtFixed(Number(qs),p.point)+' あまり '+c.finalRem+'）';
  }
  const qP=(p.qPoint!==undefined)?p.qPoint:p.point;
  const rP=(p.remPoint!==undefined)?p.remPoint:p.point;
  let txt='答え '+fmtFixed(Number(qs),qP);
  if(c.finalRem>0) txt+=' あまり '+fmtFixed(c.finalRem,rP);
  return txt;
}
function renderAnswerHissan(p){
  const L=p.layout; const cols=L.n;
  const cw=18;
  const tmpl='grid-template-columns:repeat('+cols+','+cw+'px);';
  const isDD=p.modeFlag==='decdec';
  // 通常: 商・被除数・あまり 同じ点。小数÷小数: 商/被除数=移動後(点なし), あまり=元の位置
  const dvDot = isDD ? -1 : (L.point>0?(L.n-L.point):-1);
  const qDot  = isDD ? -1 : dvDot;
  const remDot= (L.finalRem>0 && !L.plainRem) ? (L.n-((p.remPoint!==undefined)?p.remPoint:p.point)) : -1;
  const lastRowIdx=L.rows.length-1;
  let divCells=''; String(p.divisor).split('').forEach(ch=>{ divCells+='<div class="a-div">'+ch+'</div>'; });
  let html='<div class="a-hissan"><div style="display:flex;flex-direction:column;justify-content:flex-end;">'
    +'<div style="height:'+cw+'px;"></div><div class="a-divrow">'+divCells+'</div></div><div class="a-body">';
  html+='<div class="a-q" style="'+tmpl+'">'+rowCellsHTML(L.rows[0],cols,qDot)+'</div>';
  html+='<div class="a-box">';
  for(let r=1;r<L.rows.length;r++){
    let dc=-1;
    if(r===1) dc=dvDot;
    else if(r===lastRowIdx && L.finalRem>0) dc=remDot;
    html+='<div class="a-row'+(L.rows[r].lined?' lined':'')+'" style="'+tmpl+'">'+rowCellsHTML(L.rows[r],cols,dc)+'</div>';
  }
  html+='</div></div></div>';
  return html;
}
function rowCellsHTML(rowData,cols,dotCol){
  let h='';
  for(let c=0;c<cols;c++){
    const cd=rowData.cells[c];
    const dot=(dotCol===c)?'<span style="position:absolute;left:-2px;bottom:0;font-weight:900;">.</span>':'';
    const rel=(dotCol===c)?'position:relative;':'';
    h+='<div class="a-cell" style="grid-column:'+(c+1)+';'+rel+'">'+dot+(cd!==undefined?cd.v:'')+'</div>';
  }
  return h;
}
