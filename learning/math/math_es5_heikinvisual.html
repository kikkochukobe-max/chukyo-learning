<script>
const BAR_COLORS = [
  '#3b82f6','#f59e0b','#10b981','#ef4444',
  '#8b5cf6','#ec4899','#06b6d4','#f97316',
  '#84cc16','#a78bfa','#34d399','#fb923c'
];
const UNITS  = ['点','cm','m','g','kg','人','本','個','冊','L','mL','回'];
const CHART_H = 128;
const TICK_N  = 5;

let screenCount = 0;

function niceMax(v) {
  if (v <= 0) return 10;
  const raw = v * 1.15;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  for (const s of [1, 2, 2.5, 5, 10]) {
    const c = Math.ceil(raw / (mag * s)) * mag * s;
    if (c >= raw) return c;
  }
  return Math.ceil(raw);
}
function calcScale(vals) {
  const pos = vals.filter(v => v > 0);
  if (!pos.length) return { base: 0, top: 10 };
  const mn = Math.min(...pos), mx = Math.max(...pos);
  const rng = mx - mn;
  if (rng === 0) return { base: 0, top: niceMax(mx) };
  const ratio = rng / mx;
  const liftFactor = Math.max(0, 0.6 - ratio * 1.5);
  const base = Math.max(0, mn - rng * 0.2) * liftFactor;
  const top  = mx + rng * 0.1;
  return { base, top };
}
function v2h(v, base, top) {
  if (v <= 0 || top <= base) return 4;
  return Math.max(Math.round(((v - base) / (top - base)) * CHART_H), 4);
}

function makeBar(i, h, color, label) {
  const wrap = document.createElement('div');
  wrap.className = 'bar-wrap';
  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.background = color;
  bar.style.height = h + 'px';
  const val = document.createElement('div');
  val.className = 'bar-value';
  val.textContent = label;
  bar.appendChild(val);
  const lbl = document.createElement('div');
  lbl.className = 'bar-label';
  lbl.textContent = (i + 1) + '番め';
  wrap.appendChild(bar);
  wrap.appendChild(lbl);
  return wrap;
}

function drawBars(id, vals, unit, showAvg, avgVal) {
  const chart = document.getElementById('chart-' + id);
  if (!chart) return;
  chart.innerHTML = '';

  const hasData = vals.some(v => v > 0);
  if (!hasData) {
    chart.innerHTML = '<div class="empty-chart">データを入力してね！</div>';
    return;
  }

  if (showAvg) {
    const { base, top } = calcScale([...vals, avgVal]);
    vals.forEach((v, i) =>
      chart.appendChild(makeBar(i, v2h(v, base, top), BAR_COLORS[i % BAR_COLORS.length], v + unit))
    );
    const hAvg = v2h(avgVal, base, top);
    setTimeout(() => {
      chart.querySelectorAll('.bar').forEach(bar => {
        bar.style.height = hAvg + 'px';
        const vEl = bar.querySelector('.bar-value');
        if (vEl) vEl.textContent = avgVal + unit;
      });
    }, 700);
  } else {
    const { base, top } = calcScale(vals);
    vals.forEach((v, i) => {
      const h = v > 0 ? v2h(v, base, top) : 4;
      chart.appendChild(makeBar(i, h, BAR_COLORS[i % BAR_COLORS.length], v > 0 ? v + unit : ''));
    });
  }
}

function buildScreenHTML(id) {
  const unitOpts = UNITS.map(u => `<option>${u}</option>`).join('');
  return `
    <div class="width-control">
      <label>幅</label>
      <input class="width-slider" type="range" min="280" max="900" value="500"
        oninput="setScreenWidth(${id}, this.value)">
      <span class="width-value" id="width-val-${id}">500px</span>
    </div>
    <div class="screen-header">
      <div class="screen-title"><div class="screen-num">${id}</div>画面 ${id}</div>
      <button class="delete-screen-btn" onclick="deleteScreen(${id})">✕ 削除</button>
    </div>
    <div class="screen-body">
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-input-${id}" onclick="setMode(${id},'input')">📊 データを入力する</button>
        <button class="mode-btn"        id="mode-avg-${id}"   onclick="setMode(${id},'avg')">🎯 平均がわかっている</button>
      </div>
      <div id="panel-input-${id}">
        <div class="setup-row">
          <div class="field-group">
            <div class="field-label">データの数</div>
            <input class="field-input" type="number" id="count-${id}" min="2" max="12" value="3">
          </div>
          <div class="field-group">
            <div class="field-label">単位</div>
            <select class="field-input" id="unit-${id}">${unitOpts}</select>
          </div>
          <div class="field-group" style="justify-content:flex-end">
            <button class="btn btn-primary" onclick="buildDataInputs(${id})">データ欄を作る</button>
          </div>
        </div>
        <div class="data-inputs" id="data-inputs-${id}"></div>
        <div class="actions">
          <button class="btn btn-success" onclick="calcAverage(${id})">📐 平均を出す！</button>
          <button class="btn btn-warning" onclick="resetScreen(${id})">↩ リセット</button>
        </div>
      </div>
      <div id="panel-avg-${id}" style="display:none">
        <div class="mode-desc">💡 データ数と平均を入力すると均等な棒グラフが表示されます</div>
        <div class="setup-row">
          <div class="field-group">
            <div class="field-label">データの数</div>
            <input class="field-input" type="number" id="avg-count-${id}" min="2" max="12" value="3" oninput="renderAvgChart(${id})">
          </div>
          <div class="field-group">
            <div class="field-label">単位</div>
            <select class="field-input" id="avg-unit-${id}" onchange="renderAvgChart(${id})">${unitOpts}</select>
          </div>
          <div class="field-group">
            <div class="field-label">平均</div>
            <input class="field-input" type="number" id="avg-value-${id}" min="0" step="any" placeholder="例：75" oninput="renderAvgChart(${id})">
          </div>
        </div>
      </div>
      <div class="chart-area">
        <div class="chart-inner" id="chart-${id}">
          <div class="empty-chart">データを入力してね！</div>
        </div>
      </div>
      <div id="result-${id}"></div>
    </div>
  `;
}

function addScreen() {
  screenCount++;
  const id  = screenCount;
  const div = document.createElement('div');
  div.className = 'screen'; div.id = 'screen-' + id;
  div.innerHTML = buildScreenHTML(id);
  document.getElementById('screensContainer').appendChild(div);
}
function deleteScreen(id) {
  const el = document.getElementById('screen-' + id);
  if (!el) return;
  el.style.transition = 'opacity 0.3s, transform 0.3s';
  el.style.opacity = '0'; el.style.transform = 'translateY(-10px)';
  setTimeout(() => el.remove(), 300);
}

function setMode(id, mode) {
  document.getElementById('panel-input-' + id).style.display = mode === 'input' ? '' : 'none';
  document.getElementById('panel-avg-'   + id).style.display = mode === 'avg'   ? '' : 'none';
  document.getElementById('mode-input-'  + id).classList.toggle('active', mode === 'input');
  document.getElementById('mode-avg-'    + id).classList.toggle('active', mode === 'avg');
  if (mode === 'input') resetScreen(id); else renderAvgChart(id);
}

function buildDataInputs(id) {
  const count = clamp(parseInt(document.getElementById('count-' + id).value) || 3, 2, 12);
  const con   = document.getElementById('data-inputs-' + id);
  con.innerHTML = '';
  for (let i = 1; i <= count; i++) {
    con.innerHTML += `
      <div class="data-input-wrap">
        <div class="data-num-label">${i}番め</div>
        <input class="data-input" type="number" id="d-${id}-${i}" min="0" step="any"
          style="border-color:${BAR_COLORS[(i-1) % BAR_COLORS.length]}"
          oninput="renderInputChart(${id})">
      </div>`;
  }
  document.getElementById('result-' + id).innerHTML = '';
  renderInputChart(id);
}
function getValues(id) {
  const count = clamp(parseInt(document.getElementById('count-' + id).value) || 3, 2, 12);
  const vals  = [];
  for (let i = 1; i <= count; i++) {
    const el = document.getElementById('d-' + id + '-' + i);
    vals.push(el ? (parseFloat(el.value) || 0) : 0);
  }
  return vals;
}
function renderInputChart(id) {
  drawBars(id, getValues(id), document.getElementById('unit-' + id).value, false, null);
}
function calcAverage(id) {
  const vals = getValues(id);
  if (vals.every(v => v === 0)) { alert('データを入力してください！'); return; }
  const sum      = vals.reduce((a, b) => a + b, 0);
  const avgExact = sum / vals.length;
  const avg      = Math.round(avgExact * 10) / 10;
  const unit     = document.getElementById('unit-' + id).value;
  drawBars(id, vals, unit, true, avg);
  showResult(id, avg, unit, Math.abs(avgExact - avg) > 1e-9, null, sum, vals.length);
}
function resetScreen(id) {
  document.querySelectorAll('[id^="d-' + id + '-"]').forEach(el => el.value = '');
  document.getElementById('result-' + id).innerHTML = '';
  renderInputChart(id);
}

function renderAvgChart(id) {
  const count = clamp(parseInt(document.getElementById('avg-count-' + id).value) || 3, 2, 12);
  const avg   = parseFloat(document.getElementById('avg-value-'  + id).value);
  const unit  = document.getElementById('avg-unit-' + id).value;
  const chart = document.getElementById('chart-'    + id);
  const res   = document.getElementById('result-'   + id);
  if (!avg || avg <= 0) {
    chart.innerHTML = '<div class="empty-chart">平均を入力してね！</div>';
    res.innerHTML = ''; return;
  }
  const { base, top } = calcScale([avg]);
  const h = v2h(avg, base, top);
  chart.innerHTML = '';
  for (let i = 0; i < count; i++)
    chart.appendChild(makeBar(i, h, BAR_COLORS[i % BAR_COLORS.length], avg + unit));
  showResult(id, avg, unit, false, Math.round(avg * count * 10) / 10);
}

function showResult(id, avg, unit, wasRound, total, sum, count) {
  const note  = wasRound ? '<div class="result-note">※小数第2位を四捨五入</div>' : '';
  const formula = (sum != null && count != null)
    ? `<div class="result-formula">(${sum}${unit} ÷ ${count})</div>`
    : '';
  const totEl = total !== null
    ? `<div class="result-item">
         <div class="result-label">合計</div>
         <div class="result-value green">${total}<span class="result-unit"> ${unit}</span></div>
       </div>` : '';
  document.getElementById('result-' + id).innerHTML = `
    <div class="result-box">
      <div class="result-item">
        <div class="result-label">📐 平均</div>${note}
        <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;">
          <div class="result-value">${avg}<span class="result-unit"> ${unit}</span></div>
          ${formula}
        </div>
      </div>${totEl}
    </div>`;
}

function setScreenWidth(id, w) {
  const el = document.getElementById('screen-' + id);
  if (el) el.style.setProperty('--screen-w', w + 'px');
  const lbl = document.getElementById('width-val-' + id);
  if (lbl) lbl.textContent = w + 'px';
}
function clamp(v, mn, mx) { return Math.min(Math.max(v, mn), mx); }

addScreen();
</script>
</body>
