<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分度器マスター｜半透明の分度器で角度をはかる練習</title>
<meta name="description" content="本物そっくりの半透明分度器をドラッグして回し、角度をはかる練習ができる小学生・中学生向け学習ツール。2つの目盛り（内側・外側）のどちらを読むかを光らせて教えてくれます。">
<meta name="divp-device" content="PC・タブレット推奨">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@500;700&family=Yomogi&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b3a4a;
    --paper:#fbf7ee;
    --paper2:#f3ecda;
    --line:#d9cfb6;
    --teal:#1f8a8a;          /* スケールA（0が右） */
    --teal-bright:#0bc1bd;
    --grape:#8a4fbf;         /* スケールB（0が左） */
    --grape-bright:#b163f0;
    --zero:#2aa84a;          /* 0の辺 */
    --read:#ff7a3d;          /* 読む辺 */
    --steel:#2f6fa8;         /* 分度器本体 */
    --gold:#f2b705;
    --ok:#2aa84a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html,body{height:100%;margin:0;}
  body{
    background:
      radial-gradient(circle at 20% 10%, #fffdf6 0%, transparent 55%),
      var(--paper);
    color:var(--ink);
    font-family:"Zen Kaku Gothic New",system-ui,sans-serif;
    -webkit-text-size-adjust:100%;
    overflow:hidden;
  }
  .bd-wrap{display:contents;}

  .bd-head{text-align:center;margin-bottom:6px;}
  .bd-head h1{
    font-family:"Zen Maru Gothic",sans-serif;font-weight:900;
    font-size:clamp(26px,6vw,40px);margin:0;letter-spacing:.02em;
    color:var(--steel);text-shadow:2px 2px 0 #fff,3px 3px 0 rgba(47,111,168,.18);
  }
  .bd-head p{margin:6px 0 0;font-size:14px;color:#7a6f57;font-weight:500;}

  /* ステップ表示 */
  .bd-steps{
    display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
    margin:0;
  }
  .bd-step{
    background:#fff;border:2px solid var(--line);border-radius:14px;
    padding:7px 12px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;
    box-shadow:0 2px 0 rgba(0,0,0,.05);transition:.25s;
  }
  .bd-step .n{
    width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
    color:#fff;font-family:"Zen Maru Gothic";font-weight:900;font-size:13px;
  }
  .bd-step.s1 .n{background:var(--zero);}
  .bd-step.s2 .n{background:var(--steel);}
  .bd-step.s3 .n{background:var(--read);}
  .bd-step.done{border-color:var(--ok);background:#f1fbf2;}
  .bd-step.done .n{background:var(--ok)!important;}
  .bd-step.active{transform:translateY(-2px);box-shadow:0 5px 12px rgba(47,111,168,.18);border-color:var(--steel);}

  /* 盤面 */
  .bd-stage{
    position:relative;background:var(--paper2);
    border:3px solid var(--ink);border-radius:18px;overflow:hidden;
    box-shadow:0 8px 0 rgba(43,58,74,.12),0 14px 30px rgba(43,58,74,.18);
    flex:1 1 auto;min-height:320px;
  }
  #bdSvg{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:default;user-select:none;}
  #bdFx{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:50;}
  .bd-yatta{
    position:fixed;left:50%;top:36%;transform:translate(-50%,-50%) scale(0);
    z-index:60;pointer-events:none;opacity:0;white-space:nowrap;
    font-family:"Zen Maru Gothic";font-weight:900;font-size:clamp(52px,15vw,130px);
    color:#FFC83D;-webkit-text-stroke:4px #fff;paint-order:stroke fill;
    filter:drop-shadow(0 5px 0 #E8930A) drop-shadow(0 10px 18px rgba(0,0,0,.30));
  }
  .bd-yatta.show{animation:bdYatta 1.9s cubic-bezier(.2,.8,.3,1) forwards;}
  @keyframes bdYatta{
    0%{transform:translate(-50%,-50%) scale(.2) rotate(-14deg);opacity:0;}
    14%{transform:translate(-50%,-50%) scale(1.18) rotate(5deg);opacity:1;}
    28%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;}
    72%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1.12) rotate(0deg);opacity:0;}
  }
  .bd-retry{
    position:fixed;left:50%;top:34%;transform:translate(-50%,-50%) scale(0);
    z-index:60;pointer-events:none;opacity:0;white-space:nowrap;
    font-family:"Zen Maru Gothic";font-weight:900;font-size:clamp(30px,8vw,64px);
    color:#f29d3d;-webkit-text-stroke:3px #fff;paint-order:stroke fill;
    filter:drop-shadow(0 4px 0 #d97f1f) drop-shadow(0 8px 16px rgba(0,0,0,.25));
  }
  .bd-retry.show{animation:bdRetry 2.0s cubic-bezier(.2,.8,.3,1) forwards;}
  @keyframes bdRetry{
    0%{transform:translate(-50%,-50%) scale(.4) rotate(6deg);opacity:0;}
    12%{transform:translate(-50%,-50%) scale(1.1) rotate(-3deg);opacity:1;}
    24%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;}
    74%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:0;}
  }

  /* 学校の固定ヘッダー */
  .bd-header{
    position:fixed;top:0;left:0;right:0;z-index:25;height:48px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:0 14px;text-decoration:none;color:#fff;pointer-events:auto;
    background:linear-gradient(90deg,#234b7a,#2f6fa8);
    box-shadow:0 2px 10px rgba(0,0,0,.22);
    font-family:"Zen Maru Gothic",sans-serif;
  }
  .bd-hbrand{font-weight:900;font-size:clamp(15px,3.8vw,21px);white-space:nowrap;letter-spacing:.02em;}
  .bd-hlink{font-weight:700;font-size:12px;background:rgba(255,255,255,.2);padding:6px 12px;border-radius:11px;white-space:nowrap;}
  .bd-hlink:hover{background:rgba(255,255,255,.32);}

  /* 固定オーバーレイUI（方眼の上に浮く） */
  .bd-ui{position:fixed;inset:0;z-index:10;pointer-events:none;}

  /* 上に浮くクラスタ（タイトル・モード切替・問題表示） */
  .bd-top{
    position:fixed;top:56px;left:0;right:0;
    display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
    padding:0 10px;pointer-events:none;flex-wrap:wrap;
  }
  .bd-top > *{pointer-events:auto;}
  .bd-title{
    background:rgba(255,255,255,.86);border:2px solid var(--line);border-radius:13px;
    padding:6px 12px;font-family:"Zen Maru Gothic";font-weight:900;color:var(--steel);
    font-size:clamp(14px,3vw,19px);white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.10);
  }

  /* 下に浮くカード（操作パネル） */
  .bd-bottom{
    position:fixed;left:50%;bottom:12px;transform:translateX(-50%);
    width:min(94vw,720px);
    background:rgba(255,255,255,.93);border:2px solid var(--line);border-radius:16px;
    box-shadow:0 8px 24px rgba(0,0,0,.16);
    padding:9px 12px 11px;display:flex;flex-direction:column;gap:7px;align-items:center;
    pointer-events:auto;
  }
  .bd-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;}
  .bd-exp{display:flex;flex-direction:column;gap:7px;align-items:center;width:100%;}
  .bd-exp.bd-hidden{display:none;}
  .bd-exptog{
    align-self:flex-start;background:none;border:none;color:var(--steel);
    font-family:"Zen Maru Gothic";font-weight:700;font-size:12px;cursor:pointer;
    padding:2px 8px;border-radius:8px;margin:-3px 0 0 -4px;
  }
  .bd-exptog:active{background:rgba(0,0,0,.06);}
  .bd-badge{
    background:var(--ink);color:#fff;
    font-family:"Zen Maru Gothic";font-weight:700;font-size:12px;
    padding:5px 10px;border-radius:10px;letter-spacing:.04em;white-space:nowrap;
    box-shadow:0 3px 10px rgba(0,0,0,.16);
  }

  /* 吹き出しヒント */
  .bd-hint{
    margin:0;min-height:0;max-width:720px;width:100%;
    background:#fff;border:2px dashed var(--steel);border-radius:14px;
    padding:7px 12px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px;
    color:var(--steel);
  }
  .bd-hint .ic{font-size:20px;flex:0 0 auto;}
  .bd-hint.good{border-style:solid;border-color:var(--ok);color:#1e7a37;background:#f2fbf3;}
  .bd-hint.warn{border-color:var(--read);color:#c5491a;background:#fff5ef;}

  /* 解答 */
  .bd-answer{
    display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;
    margin:0;
  }
  .bd-answer label{font-weight:700;font-size:16px;}
  #bdInput{
    width:96px;font-family:"Zen Maru Gothic";font-weight:900;font-size:26px;text-align:center;
    border:3px solid var(--steel);border-radius:12px;padding:6px 4px;color:var(--ink);
    background:#fff;outline:none;
  }
  #bdInput:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(242,183,5,.25);}
  #bdMakeInput{
    width:112px;font-family:"Zen Maru Gothic";font-weight:900;font-size:26px;text-align:center;
    border:3px solid var(--steel);border-radius:12px;padding:30px 8px;color:var(--ink);
    background:#fff;outline:none;
  }
  #bdMakeInput:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(242,183,5,.25);}
  .bd-unit{font-family:"Zen Maru Gothic";font-weight:900;font-size:24px;}

  .bd-btn{
    font-family:"Zen Maru Gothic";font-weight:700;font-size:15px;cursor:pointer;
    border:none;border-radius:13px;padding:11px 18px;color:#fff;transition:.15s;
    box-shadow:0 4px 0 rgba(0,0,0,.18);
  }
  .bd-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.18);}
  .bd-check{background:var(--ok);}
  .bd-reveal{background:var(--steel);}
  .bd-new{background:var(--gold);color:#5a4500;}

  .bd-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;}

  .bd-tools{
    display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;
    margin-top:8px;padding-top:8px;border-top:2px dotted var(--line);
  }
  .bd-seg{display:flex;background:#fff;border:2px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.10);}
  .bd-ico{width:1.25em;height:1.25em;vertical-align:-0.25em;margin-right:5px;}
  .bd-seg button{
    border:none;background:none;font-family:"Zen Kaku Gothic New";font-weight:700;
    font-size:13px;padding:8px 13px;cursor:pointer;color:#8a7d60;
  }
  .bd-seg button.on{background:var(--steel);color:#fff;}
  .bd-toggle{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:#6f6347;cursor:pointer;}
  .bd-toggle input{width:42px;height:24px;-webkit-appearance:none;appearance:none;background:#cfc6ad;border-radius:20px;position:relative;cursor:pointer;transition:.2s;outline:none;}
  .bd-toggle input:checked{background:var(--ok);}
  .bd-toggle input::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;}
  .bd-toggle input:checked::after{left:21px;}

  .bd-score{
    margin:0;text-align:center;font-weight:700;font-size:13px;color:#7a6f57;white-space:nowrap;
  }
  .bd-score b{font-family:"Zen Maru Gothic";color:var(--steel);font-size:18px;}

  /* 上部モード切り替え */
  .bd-topmode{display:flex;justify-content:center;margin:4px 0 12px;}
  .bd-seg-lg button{font-family:"Zen Maru Gothic";font-size:16px;padding:11px 22px;}
  .bd-seg-lg button.on{background:var(--gold);color:#5a4500;}

  /* つくるモード */
  .bd-makeout{
    display:flex;align-items:baseline;justify-content:center;gap:12px;margin:0;flex-wrap:wrap;
  }
  #bdMakeDeg{font-family:"Zen Maru Gothic";font-weight:900;font-size:clamp(34px,8vw,52px);color:var(--read);line-height:1;}
  .bd-degunit{font-family:"Zen Maru Gothic";font-weight:900;font-size:clamp(22px,5vw,32px);color:var(--read);}
  .bd-kind{
    font-family:"Zen Maru Gothic";font-weight:700;font-size:16px;color:#fff;background:var(--steel);
    padding:6px 14px;border-radius:12px;align-self:center;
  }
  .bd-opp{align-self:center;font-weight:700;font-size:14px;color:var(--steel);}
  .bd-opp b{font-family:"Zen Maru Gothic";font-size:17px;}
  .bd-drawtarget{
    display:flex;align-items:baseline;justify-content:center;gap:6px;
    font-family:"Zen Maru Gothic";font-weight:900;font-size:clamp(18px,4.5vw,24px);color:var(--ink);
  }
  .bd-drawtarget #bdDrawTarget{font-size:clamp(30px,7vw,46px);color:var(--read);line-height:1;}
  #bdDraw line,#bdDraw circle,#bdDraw text,#bdDraw path,#bdDraw g{pointer-events:none;}
  .bd-btn:disabled,#bdDrawTool button:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(0.3);}
  .bd-oppbtn{background:var(--steel);}
  .bd-oppbtn.on{background:var(--grape);}

  /* マップ操作ボタン */
  .bd-mapctl{position:fixed;right:8px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:11;pointer-events:auto;}
  .bd-mapctl button{
    width:40px;height:40px;border:2px solid var(--ink);border-radius:10px;background:#fff;
    font-family:"Zen Maru Gothic";font-weight:900;font-size:20px;color:var(--ink);cursor:pointer;
    box-shadow:0 2px 0 rgba(0,0,0,.12);line-height:1;padding:0;
  }
  .bd-mapctl button:active{transform:translateY(2px);box-shadow:0 0 0 rgba(0,0,0,.12);}

  .bd-foot{margin-top:10px;text-align:center;font-size:11px;color:#a99b7c;line-height:1.6;}

  /* SVGクラス */
  .scaleA text{fill:var(--teal);}
  .scaleB text{fill:var(--grape);}
  .dim{opacity:.13!important;}
  .glow{filter:drop-shadow(0 0 6px currentColor);}
  @keyframes bdPulse{0%,100%{opacity:1;}50%{opacity:.45;}}
  .bd-pulse{animation:bdPulse 1.1s ease-in-out infinite;}
</style>
</head>
<body>

  <!-- 学校の固定ヘッダー -->
  <a class="bd-header" href="https://chukyokobetsu.com" target="_blank" rel="noopener noreferrer">
    <span class="bd-hbrand">中京個別指導学院</span>
    <span class="bd-hlink">公式サイト →</span>
  </a>

  <!-- 全面の方眼キャンバス -->
  <svg id="bdSvg" viewBox="0 0 760 560" preserveAspectRatio="xMidYMid meet" aria-label="角度の盤面"></svg>

  <!-- 固定オーバーレイUI -->
  <div class="bd-ui">

    <!-- 上バー -->
    <div class="bd-top">
      <div class="bd-title">分度器マスター</div>
      <div class="bd-seg bd-seg-lg" id="bdAppMode">
        <button data-am="measure" class="on"><svg class="bd-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17 Q12 3 21 17 Z" fill="#cfe0ef" stroke="#2f6fa8" stroke-width="1.6" stroke-linejoin="round"/><line x1="3" y1="17" x2="21" y2="17" stroke="#2f6fa8" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="17" r="1.4" fill="#2f6fa8"/></svg>はかる</button>
        <button data-am="make"><svg class="bd-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20 L5 9 Q12 3.5 19 9 Z" fill="#ff5c5c" stroke="#b53030" stroke-width="1.2" stroke-linejoin="round"/><line x1="12" y1="20" x2="8.6" y2="8.2" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/><line x1="12" y1="20" x2="12" y2="6.4" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/><line x1="12" y1="20" x2="15.4" y2="8.2" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/><circle cx="12" cy="20" r="1.5" fill="#7a2020"/></svg>つくる</button>
        <button data-am="draw"><svg class="bd-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 3.5 L20.5 8.5 L9 20 L4 21 L5 16 Z" fill="#ffd23f" stroke="#b58900" stroke-width="1.3" stroke-linejoin="round"/><path d="M4 21 L5 16 L9 20 Z" fill="#3a3a3a"/><path d="M15.5 3.5 L20.5 8.5" stroke="#e07b39" stroke-width="2.4"/></svg>作図</button>
      </div>
      <div class="bd-badge" id="bdBadge">問題①</div>
    </div>

    <!-- 右の地図操作ボタン -->
    <div class="bd-mapctl">
      <button id="bdZoomIn" title="拡大">＋</button>
      <button id="bdZoomOut" title="縮小">−</button>
      <button id="bdRotL" title="左に回す">↺</button>
      <button id="bdRotR" title="右に回す">↻</button>
      <button id="bdZoomReset" title="もとに戻す">⟲</button>
    </div>

    <!-- 下バー：はかる -->
    <div class="bd-bottom" id="bdMeasurePanel">
      <button class="bd-exptog" id="bdMeasureToggle">せつめいをかくす ▾</button>
      <div class="bd-exp" id="bdMeasureExp">
        <div class="bd-steps" id="bdSteps">
          <div class="bd-step s1" id="bdStep1"><span class="n">1</span>中心を頂点に</div>
          <div class="bd-step s2" id="bdStep2"><span class="n">2</span>0の線を辺に</div>
          <div class="bd-step s3" id="bdStep3"><span class="n">3</span>目盛りを読む</div>
        </div>
        <div class="bd-hint" id="bdHint"><span class="ic">🎯</span><span id="bdHintTxt">分度器の中心を、角の頂点（緑とオレンジが交わる点）にドラッグして合わせよう。</span></div>
      </div>
      <div class="bd-row">
        <div class="bd-answer">
          <label for="bdInput">答え</label>
          <input id="bdInput" type="number" inputmode="numeric" min="0" max="360" placeholder="？">
          <span class="bd-unit">°</span>
          <button class="bd-btn bd-check" id="bdCheck">こたえあわせ</button>
        </div>
        <button class="bd-btn bd-reveal" id="bdReveal">読み方を見る</button>
        <button class="bd-btn bd-new" id="bdNew">つぎの問題 →</button>
        <div class="bd-seg" id="bdMode">
          <button data-rf="0" class="on">180°未満</button>
          <button data-rf="1">180°超え</button>
        </div>
        <label class="bd-toggle">
          <input type="checkbox" id="bdSupport" checked>
          <span>サポート</span>
        </label>
      </div>
    </div>

    <!-- 下バー：つくる -->
    <div class="bd-bottom" id="bdMakePanel" style="display:none">
      <button class="bd-exptog" id="bdMakeToggle">せつめいをかくす ▾</button>
      <div class="bd-exp" id="bdMakeExp">
        <div class="bd-makeout">
          <span id="bdMakeKind" class="bd-kind">鋭角</span>
          <span id="bdMakeDeg">60</span><span class="bd-degunit">°</span>
          <span id="bdMakeOpp" class="bd-opp" style="display:none">反対 <b>360 − 60 = 300°</b></span>
        </div>
        <div class="bd-hint good" id="bdMakeHint"><span class="ic"><svg class="bd-ico" viewBox="0 0 24 24" aria-hidden="true" style="margin:0;vertical-align:-0.2em"><path d="M12 20 L5 9 Q12 3.5 19 9 Z" fill="#ff5c5c" stroke="#b53030" stroke-width="1.2" stroke-linejoin="round"/><line x1="12" y1="20" x2="8.6" y2="8.2" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/><line x1="12" y1="20" x2="12" y2="6.4" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/><line x1="12" y1="20" x2="15.4" y2="8.2" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/><circle cx="12" cy="20" r="1.5" fill="#7a2020"/></svg></span><span>左の図の線の先（まる）をドラッグすると角がつくれます。右の図は同じ角を反対向きにした「右開き」。0の辺（緑）が右にある場合・左にある場合の両方を見くらべよう。</span></div>
      </div>
      <div class="bd-row">
        <div class="bd-answer">
          <label for="bdMakeInput">角度</label>
          <input id="bdMakeInput" type="number" inputmode="numeric" min="0" max="360" placeholder="例 120">
          <span class="bd-unit">°</span>
          <button class="bd-btn bd-reveal" id="bdOpen">0°から開く</button>
        </div>
        <button class="bd-btn bd-new" id="bdMakeRandom">ランダム 🎲</button>
        <button class="bd-btn bd-oppbtn" id="bdOppBtn">反対の角を見る</button>
      </div>
    </div>

    <div class="bd-bottom" id="bdDrawPanel" style="display:none">
      <button class="bd-exptog" id="bdDrawToggle">せつめいをかくす ▾</button>
      <div class="bd-exp" id="bdDrawExp">
        <div class="bd-drawtarget">この角をかこう → <span id="bdDrawTarget">70</span><span class="bd-degunit">°</span></div>
        <div class="bd-hint good" id="bdDrawHint"><span class="ic">✏️</span><span>① 分度器を線に合わせる → ② 鉛筆ボタンで角度の点に印 → ③ 定規ボタンで直線をひく → ④ こたえあわせ</span></div>
      </div>
      <div class="bd-row">
        <div class="bd-seg" id="bdDrawTool">
          <button data-dt="move" class="on">✋ 合わせる</button>
          <button data-dt="pencil">✏️ 鉛筆</button>
        </div>
        <button class="bd-btn bd-reveal" id="bdDrawRuler">📏 定規でひく</button>
        <button class="bd-btn bd-check" id="bdDrawCheck">こたえあわせ</button>
        <button class="bd-btn bd-new" id="bdDrawClear">けす</button>
        <button class="bd-btn bd-new" id="bdDrawNew">つぎの問題</button>
      </div>
    </div>

  </div>

  <canvas id="bdFx"></canvas>
  <div id="bdYatta" class="bd-yatta">せいかい！</div>
  <div id="bdRetry" class="bd-retry">もう一度考えてみよう</div>

<script>
(function(){
  "use strict";
  var SVGNS="http://www.w3.org/2000/svg";
  var svg=document.getElementById("bdSvg");
  var D2R=Math.PI/180;

  // ---- 盤面の定数 ----
  var VX=380, VY=280;     // 頂点（中央に置き、角はどの向きにも開ける）
  var R=205;              // 分度器の半径
  var RAYLEN=R+70;        // 辺の長さ（少し長め）
  var lblZero, lblQ, lblZeroC=[0,0], lblQC=[0,0];   // 「0」「?」バッジ（常に直立）

  // ---- 状態 ----
  var state={
    theta:60, gZero:-90, gRead:-30, zeroIsQ:true, end:0, scale:"A",
    px:600, py:478, rho:18,          // 分度器の中心位置・回転
    mode:null, grabDX:0, grabDY:0, startA:0, rho0:0,
    pointers:{}, gesture:null,
    centerOK:false, zeroOK:false, support:true, reflex:false,
    answer:60, answered:false, revealing:false,
    appMode:"measure", phi:60, fanDrag:false, fanAnim:null,
    phiA:0, phiB:60, fanDragArm:null, showOpp:false, expOpen:true, fanFull:false,
    drawTool:"move", drawDot:null, drawLine:false, drawChecked:false, drawDragging:false, drawAnim:null, drawTarget:70, drawLocked:false, drawPinned:false,
    vp:null, vpPointers:{}, vpPrev:null
  };
  var total=0;

  function norm(d){d%=360; if(d<0)d+=360; return d;}
  function el(tag,attrs){var e=document.createElementNS(SVGNS,tag);for(var k in attrs)e.setAttribute(k,attrs[k]);return e;}

  // 頂点へのスナップ
  function snapCenter(){
    var dx=state.px-VX, dy=state.py-VY;
    if(Math.sqrt(dx*dx+dy*dy)<26){ state.px=VX; state.py=VY; }
  }
  // 0の線が端(0/180)に来たら回転を吸着
  function snapRotation(){
    var a0=norm(state.rho-state.gZero);
    for(var k=0;k<2;k++){ var end=k?180:0;
      var diff=Math.abs(((a0-end+540)%360)-180);
      if(diff<6){ state.rho=norm(state.gZero+end); return; }
    }
  }
  // 触れている指の数からモードを決める（1本=移動 / 2本=回転＋移動）
  function refreshGesture(){
    var ids=Object.keys(state.pointers);
    if(ids.length>=2){
      var A=state.pointers[ids[0]], B=state.pointers[ids[1]];
      state.mode="transform";
      state.gesture={
        idA:ids[0], idB:ids[1],
        ang0:Math.atan2(B.y-A.y,B.x-A.x)/D2R,
        midx0:(A.x+B.x)/2, midy0:(A.y+B.y)/2,
        px0:state.px, py0:state.py, rho0:state.rho
      };
    }else if(ids.length===1){
      var P=state.pointers[ids[0]];
      state.mode="move";
      state.grabDX=P.x-state.px; state.grabDY=P.y-state.py;
    }else{
      state.mode=null; state.gesture=null;
    }
  }

  // ================= レイヤー =================
  // 方眼パターン（無限に見えるよう大きな矩形にタイル）
  var defs=el("defs",{});
  var pat=el("pattern",{id:"bdGridPat",width:38,height:38,patternUnits:"userSpaceOnUse"});
  pat.appendChild(el("path",{d:"M 38 0 L 0 0 0 38",fill:"none",stroke:"#e7ddc4","stroke-width":1}));
  defs.appendChild(pat); svg.appendChild(defs);

  // ビューポート（マップのように平行移動・拡大縮小）
  var gViewport=el("g",{id:"bdViewport"});
  svg.appendChild(gViewport);
  var gGrid=el("g",{}), gAngle=el("g",{}), gProtr=el("g",{id:"bdProtr"}), gFan=el("g",{id:"bdFan"}), gDraw=el("g",{id:"bdDraw"});
  gViewport.appendChild(gGrid); gViewport.appendChild(gAngle); gViewport.appendChild(gProtr); gViewport.appendChild(gFan); gViewport.appendChild(gDraw);
  gFan.style.display="none";
  gDraw.style.display="none";
  gGrid.appendChild(el("rect",{x:-4000,y:-4000,width:8000,height:8000,fill:"url(#bdGridPat)"}));

  function applyViewport(){ var m=state.vp; gViewport.setAttribute("transform","matrix("+m.a+","+m.b+","+m.c+","+m.d+","+m.e+","+m.f+")"); if(typeof updateUprightLabels==="function") updateUprightLabels(); }

  // ================= 分度器を一度だけ作る =================
  var protrTransform, sweepPath, sweepNum, scaleAg, scaleBg, baseLine, centerDot, knob;
  function localPt(a,r){ // スケール角a(0=右,180=左)・半径r → ローカル座標（ドームは上＝−y）
    return [r*Math.cos(a*D2R), -r*Math.sin(a*D2R)];
  }
  function buildProtractor(){
    // ドーム本体（半透明）— 弧をサンプリングして確実に上向きに
    var d="M "+R+" 0";
    for(var a=0;a<=180;a+=2){var p=localPt(a,R); d+=" L "+p[0].toFixed(2)+" "+p[1].toFixed(2);}
    d+=" Z";
    gProtr.appendChild(el("path",{d:d,fill:"rgba(47,111,168,0.12)",stroke:"var(--steel)","stroke-width":2.5,"class":"bd-body"}));
    // 内側の半円（読み取り基準の弧）
    var di="M "+(R-14)+" 0";
    for(var a2=0;a2<=180;a2+=2){var q=localPt(a2,R-14); di+=" L "+q[0].toFixed(2)+" "+q[1].toFixed(2);}
    gProtr.appendChild(el("path",{d:di,fill:"none",stroke:"rgba(47,111,168,0.35)","stroke-width":1}));

    // 目盛り
    var ticks=el("g",{});
    for(var deg=0;deg<=180;deg++){
      var len=(deg%10===0)?18:(deg%5===0)?12:7;
      var p1=localPt(deg,R), p2=localPt(deg,R-len);
      ticks.appendChild(el("line",{x1:p1[0].toFixed(2),y1:p1[1].toFixed(2),x2:p2[0].toFixed(2),y2:p2[1].toFixed(2),
        stroke:"#2f6fa8","stroke-width":(deg%10===0)?1.6:0.9,opacity:(deg%10===0)?0.85:0.55}));
    }
    gProtr.appendChild(ticks);

    // サポート用の光る弧（数字より下）
    sweepPath=el("path",{d:"",fill:"none",stroke:"var(--teal-bright)","stroke-width":9,"stroke-linecap":"butt",opacity:0});
    gProtr.appendChild(sweepPath);

    // スケールA（0が右） と スケールB（0が左）
    scaleAg=el("g",{"class":"scaleA"}); scaleBg=el("g",{"class":"scaleB"});
    for(var d2=0;d2<=180;d2+=10){
      var a=localPt(d2,R-34), b=localPt(d2,R-58);
      var tA=el("text",{x:a[0].toFixed(2),y:a[1].toFixed(2),"font-size":13,"font-family":"Zen Maru Gothic","font-weight":700,"text-anchor":"middle","dominant-baseline":"middle"});
      tA.textContent=d2; scaleAg.appendChild(tA);
      var tB=el("text",{x:b[0].toFixed(2),y:b[1].toFixed(2),"font-size":12,"font-family":"Zen Maru Gothic","font-weight":700,"text-anchor":"middle","dominant-baseline":"middle"});
      tB.textContent=(180-d2); scaleBg.appendChild(tB);
    }
    gProtr.appendChild(scaleBg); gProtr.appendChild(scaleAg);

    // 基線（0の線）
    baseLine=el("line",{x1:-R,y1:0,x2:R,y2:0,stroke:"var(--steel)","stroke-width":3});
    gProtr.appendChild(baseLine);
    // 両端の「0」マーク
    gProtr.appendChild(el("text",{x:R-14,y:-4,"font-size":11,"font-family":"Zen Maru Gothic","font-weight":900,"text-anchor":"end",fill:"#2f6fa8"})).textContent="0";
    gProtr.appendChild(el("text",{x:-(R-14),y:-4,"font-size":11,"font-family":"Zen Maru Gothic","font-weight":900,"text-anchor":"start",fill:"#2f6fa8"})).textContent="0";

    // 中心マーク（ここを頂点に合わせる）
    var c=el("g",{});
    c.appendChild(el("circle",{cx:0,cy:0,r:18,fill:"none",stroke:"#2f6fa8","stroke-width":1.4,opacity:.6}));
    c.appendChild(el("line",{x1:-22,y1:0,x2:22,y2:0,stroke:"#2f6fa8","stroke-width":1}));
    c.appendChild(el("line",{x1:0,y1:-22,x2:0,y2:22,stroke:"#2f6fa8","stroke-width":1}));
    centerDot=el("circle",{cx:0,cy:0,r:5,fill:"var(--steel)"});
    c.appendChild(centerDot);
    gProtr.appendChild(c);

    // サポートの数字
    sweepNum=el("text",{x:0,y:0,"font-size":26,"font-family":"Zen Maru Gothic","font-weight":900,"text-anchor":"middle","dominant-baseline":"middle",fill:"var(--teal)",stroke:"#fff","stroke-width":5,"paint-order":"stroke","opacity":0});
    gProtr.appendChild(sweepNum);

    // 回す つまみ
    knob=el("g",{style:"cursor:grab"});
    knob.appendChild(el("line",{x1:0,y1:-R,x2:0,y2:-R-22,stroke:"var(--steel)","stroke-width":3}));
    knob.appendChild(el("circle",{cx:0,cy:-R-30,r:16,fill:"var(--gold)",stroke:"#5a4500","stroke-width":2}));
    var kt=el("text",{x:0,y:-R-26,"font-size":9,"font-family":"Zen Maru Gothic","font-weight":900,"text-anchor":"middle",fill:"#5a4500"});
    kt.textContent="まわす"; knob.appendChild(kt);
    gProtr.appendChild(knob);

    // 本体に触れる（1本=移動 / 2本=回転＋移動）
    gProtr.addEventListener("pointerdown",function(e){
      if(state.revealing||state.mode==="rotate") return;
      e.stopPropagation();
      var pt=toContent(e);
      state.pointers[e.pointerId]={x:pt.x,y:pt.y};
      try{svg.setPointerCapture(e.pointerId);}catch(_){}
      refreshGesture();
    });
    // つまみドラッグ（マウス用の回転）
    knob.addEventListener("pointerdown",function(e){
      if(state.revealing) return;
      e.stopPropagation();
      var pt=toContent(e);
      state.mode="rotate";
      state.startA=Math.atan2(pt.y-state.py,pt.x-state.px)/D2R;
      state.rho0=state.rho;
      try{svg.setPointerCapture(e.pointerId);}catch(_){}
    });
  }

  function toContent(e){
    var p=svg.createSVGPoint(); p.x=e.clientX; p.y=e.clientY;
    return p.matrixTransform(gViewport.getScreenCTM().inverse());
  }
  function toViewBox(e){
    var p=svg.createSVGPoint(); p.x=e.clientX; p.y=e.clientY;
    return p.matrixTransform(svg.getScreenCTM().inverse());
  }

  window.addEventListener("pointermove",function(e){
    if(state.revealing||!state.mode) return;
    // つまみ回転（単一ポインタ）
    if(state.mode==="rotate"){
      var pt=toContent(e);
      var cur=Math.atan2(pt.y-state.py,pt.x-state.px)/D2R;
      state.rho=state.rho0+(cur-state.startA);
      snapRotation();
      update(); return;
    }
    if(!(e.pointerId in state.pointers)) return;
    var p=toContent(e); state.pointers[e.pointerId]={x:p.x,y:p.y};
    if(state.mode==="move"){
      var P=state.pointers[e.pointerId];
      state.px=P.x-state.grabDX; state.py=P.y-state.grabDY;
      snapCenter();
    }else if(state.mode==="transform"){
      var g=state.gesture, A=state.pointers[g.idA], B=state.pointers[g.idB];
      if(A&&B){
        var angNow=Math.atan2(B.y-A.y,B.x-A.x)/D2R;
        state.rho=g.rho0+(angNow-g.ang0);                 // 2本指のひねりで回転
        var mx=(A.x+B.x)/2, my=(A.y+B.y)/2;
        state.px=g.px0+(mx-g.midx0); state.py=g.py0+(my-g.midy0); // 中点の移動で平行移動
        snapCenter(); snapRotation();
      }
    }
    update();
  });
  function endPointer(e){
    if(state.mode==="rotate"){ state.mode=null; try{svg.releasePointerCapture(e.pointerId);}catch(_){} return; }
    if(e.pointerId in state.pointers){
      delete state.pointers[e.pointerId];
      try{svg.releasePointerCapture(e.pointerId);}catch(_){}
      refreshGesture();   // 2本→1本になったら移動モードへ（飛ばないよう基準を取り直す）
    }
  }
  window.addEventListener("pointerup",endPointer);
  window.addEventListener("pointercancel",endPointer);

  // ================= 問題生成 =================
  function pickMeasure(){ // 分度器が読む小さい角（5°きざみ）
    var arr=[]; for(var v=20;v<=170;v+=5)arr.push(v);
    return arr[(Math.random()*arr.length)|0];
  }
  function newProblem(){
    var m=pickMeasure();
    state.theta=m;                                   // 分度器で読み取る角（180°未満）
    state.answer=state.reflex?(360-m):m;             // 入力すべき答え
    // 0の辺は必ず水平。右向き(0°)=外側の目盛り(A) / 左向き(180°)=内側の目盛り(B) をランダムに
    var m2=state.theta;
    if(Math.random()<0.5){            // 0の辺は右向き、読む辺は右上
      state.gZero=0;   state.gRead=-m2;     state.end=0;   state.scale="A";
    }else{                            // 0の辺は左向き、読む辺は左上
      state.gZero=180; state.gRead=m2-180;  state.end=180; state.scale="B";
    }

    // 分度器を端っこに置き直す
    state.px=Math.random()<0.5?160:600; state.py=300; state.rho=(Math.random()*40-20);
    state.pointers={}; state.mode=null; state.gesture=null;
    state.answered=false; state.revealing=false;
    document.getElementById("bdInput").value="";
    document.getElementById("bdInput").disabled=false;
    document.getElementById("bdBadge").textContent="問題 "+(total+1)+"　"+(state.reflex?"180°超え":"180°未満");
    drawAngle();
    update();
    setHint("base");
  }

  function drawAngle(){
    while(gAngle.firstChild) gAngle.removeChild(gAngle.firstChild);
    var rz=[VX+RAYLEN*Math.cos(state.gZero*D2R), VY+RAYLEN*Math.sin(state.gZero*D2R)];
    var rr=[VX+RAYLEN*Math.cos(state.gRead*D2R), VY+RAYLEN*Math.sin(state.gRead*D2R)];
    function arcPath(a0,a1,rad,steps){
      var s="M "+(VX+rad*Math.cos(a0*D2R)).toFixed(1)+" "+(VY+rad*Math.sin(a0*D2R)).toFixed(1);
      for(var i=1;i<=steps;i++){var g=a0+(a1-a0)*i/steps;
        s+=" L "+(VX+rad*Math.cos(g*D2R)).toFixed(1)+" "+(VY+rad*Math.sin(g*D2R)).toFixed(1);}
      return s;
    }
    var sgn=(state.end===0)?-1:1;                 // 小さい角はドーム（上）側を通す向き
    var sw=sgn*state.theta;                        // 小さい角のスイープ（gZero→gZero+sw=gRead）
    var reflexSweep=-sgn*(360-state.theta);        // 優角のスイープ（反対回り）

    if(!state.reflex){
      // 小さい内角の弧
      gAngle.appendChild(el("path",{d:arcPath(state.gZero,state.gZero+sw,44,30),fill:"none",stroke:"#b9a97f","stroke-width":2}));
    }else{
      // はかる側（小さい角）はうすく点線
      gAngle.appendChild(el("path",{d:arcPath(state.gZero,state.gZero+sw,40,30),fill:"none",stroke:"#c9bb98","stroke-width":2,"stroke-dasharray":"4 4"}));
      // 求める優角（大きい側）を太く
      gAngle.appendChild(el("path",{d:arcPath(state.gZero,state.gZero+reflexSweep,60,100),fill:"none",stroke:"var(--read)","stroke-width":4,opacity:.85}));
    }

    // 辺
    gAngle.appendChild(el("line",{x1:VX,y1:VY,x2:rr[0],y2:rr[1],stroke:"var(--read)","stroke-width":5,"stroke-linecap":"round"}));
    gAngle.appendChild(el("line",{x1:VX,y1:VY,x2:rz[0],y2:rz[1],stroke:"var(--zero)","stroke-width":5,"stroke-linecap":"round"}));
    gAngle.appendChild(el("circle",{cx:VX,cy:VY,r:6,fill:"var(--ink)"}));

    // 「0」バッジ（合わせる辺の先）
    lblZeroC=[VX+RAYLEN*Math.cos(state.gZero*D2R), VY+RAYLEN*Math.sin(state.gZero*D2R)];
    lblZero=el("g",{});
    lblZero.appendChild(el("circle",{cx:0,cy:0,r:15,fill:"var(--zero)",stroke:"#fff","stroke-width":2.5}));
    var zt=el("text",{x:0,y:1,"font-size":17,"font-family":"Zen Maru Gothic","font-weight":900,"text-anchor":"middle","dominant-baseline":"middle",fill:"#fff"}); zt.textContent="0"; lblZero.appendChild(zt);
    gAngle.appendChild(lblZero);

    // 「?」バッジ（求める角の場所）
    lblQC = state.reflex
      ? [VX+96*Math.cos((state.gZero+reflexSweep/2)*D2R), VY+96*Math.sin((state.gZero+reflexSweep/2)*D2R)]
      : [VX+RAYLEN*Math.cos(state.gRead*D2R), VY+RAYLEN*Math.sin(state.gRead*D2R)];
    lblQ=el("g",{});
    lblQ.appendChild(el("circle",{cx:0,cy:0,r:15,fill:"var(--read)",stroke:"#fff","stroke-width":2.5}));
    var qt=el("text",{x:0,y:1,"font-size":17,"font-family":"Zen Maru Gothic","font-weight":900,"text-anchor":"middle","dominant-baseline":"middle",fill:"#fff"}); qt.textContent="?"; lblQ.appendChild(qt);
    gAngle.appendChild(lblQ);

    updateUprightLabels();
  }

  // 「0」「?」を画面に対して常に直立（地図を回転しても傾かない）
  function updateUprightLabels(){
    if(!state.vp) return;
    var d=Math.atan2(state.vp.b, state.vp.a)*180/Math.PI;   // ビューポートの回転角
    if(lblZero) lblZero.setAttribute("transform","translate("+lblZeroC[0].toFixed(1)+","+lblZeroC[1].toFixed(1)+") rotate("+(-d).toFixed(2)+")");
    if(lblQ) lblQ.setAttribute("transform","translate("+lblQC[0].toFixed(1)+","+lblQC[1].toFixed(1)+") rotate("+(-d).toFixed(2)+")");
  }

  // ================= 毎フレーム更新 =================
  function update(){
    gProtr.setAttribute("transform","translate("+state.px+","+state.py+") rotate("+state.rho+")");
    if(state.appMode==="draw") return;   // 作図モードは分度器を置くだけ
    // 整列の判定
    var dx=state.px-VX, dy=state.py-VY;
    state.centerOK=Math.sqrt(dx*dx+dy*dy)<3;
    var a0=norm(state.rho-state.gZero);
    var nearEnd = Math.min(Math.abs(((a0-0+540)%360)-180), Math.abs(((a0-180+540)%360)-180));
    state.zeroOK=state.centerOK && nearEnd<2.2;
    // ステップ表示
    document.getElementById("bdStep1").className="bd-step s1"+(state.centerOK?" done":(!state.zeroOK?" active":""));
    document.getElementById("bdStep2").className="bd-step s2"+(state.zeroOK?" done":(state.centerOK?" active":""));
    document.getElementById("bdStep3").className="bd-step s3"+(state.zeroOK?" active":"");
    // 中心マークの色
    centerDot.setAttribute("fill",state.centerOK?"var(--ok)":"var(--steel)");
    baseLine.setAttribute("stroke",state.zeroOK?"var(--ok)":"var(--steel)");
    baseLine.setAttribute("class",state.zeroOK?"bd-pulse":"");

    applySupport();
    if(!state.answered&&!state.revealing) updateLiveHint();
  }

  function endNow(){ // 今0の辺が合っている端（0 or 180）
    var a0=norm(state.rho-state.gZero);
    return (Math.abs(((a0-0+540)%360)-180) <= Math.abs(((a0-180+540)%360)-180))?0:180;
  }

  function applySupport(){
    // いったんリセット
    scaleAg.classList.remove("dim","bd-pulse","glow");
    scaleBg.classList.remove("dim","bd-pulse","glow");
    sweepPath.setAttribute("opacity",0);
    if(!state.revealing) sweepNum.setAttribute("opacity",0);

    if(!state.support) return;
    if(!state.zeroOK) return;

    var end=endNow();
    var aRead=norm(state.rho-state.gRead);
    if(aRead<1||aRead>179){ return; } // 読む辺がドーム外＝向きが逆
    var scaleUsed=(end===0)?"A":"B";
    var on = (scaleUsed==="A")?scaleAg:scaleBg;
    var off= (scaleUsed==="A")?scaleBg:scaleAg;
    on.classList.add("bd-pulse","glow");
    off.classList.add("dim");
    on.setAttribute("color", scaleUsed==="A"?"var(--teal)":"var(--grape)");

    // 0から読む辺までの光る弧
    var col = scaleUsed==="A"?"var(--teal-bright)":"var(--grape-bright)";
    sweepPath.setAttribute("stroke",col);
    var d="", n=24;
    for(var i=0;i<=n;i++){var a=end+(aRead-end)*i/n; var p=localPt(a,R-12); d+=(i?" L ":"M ")+p[0].toFixed(2)+" "+p[1].toFixed(2);}
    sweepPath.setAttribute("d",d);
    sweepPath.setAttribute("opacity",0.7);
  }

  // ================= ヒント文 =================
  function setHint(kind,msg,cls){
    var box=document.getElementById("bdHint"), txt=document.getElementById("bdHintTxt"), ic=box.querySelector(".ic");
    box.className="bd-hint"+(cls?(" "+cls):"");
    var map={base:"🎯",center:"🎯",zero:"📐",read:"🔢",flip:"🔄",good:"✅"};
    ic.textContent=map[kind]||"💡";
    txt.textContent=msg||defaultMsg(kind);
  }
  function defaultMsg(k){
    if(k==="base"||k==="center") return "分度器の中心を、角の頂点（緑とオレンジの交点）にドラッグして合わせよう。";
    if(k==="zero") return "2本の指で分度器をひねって（またはつまみを回して）、緑の「0」の辺に分度器の0の線をぴったり重ねよう。";
    if(k==="flip") return "向きが逆かも。分度器のまるい部分（弧）で角をおおうように回してみよう。";
    return "";
  }
  function updateLiveHint(){
    if(!state.centerOK){ setHint("center"); return; }
    if(!state.zeroOK){ setHint("zero"); return; }
    var aRead=norm(state.rho-state.gRead);
    if(aRead<1||aRead>179){ setHint("flip",null,"warn"); return; }
    var scaleUsed=endNow()===0?"A":"B";
    var color=scaleUsed==="A"?"青緑（うちがわ）":"むらさき（そとがわ）";
    var tail=state.reflex?" 読めたら 360°からひくよ。":"";
    if(state.support){
      setHint("read","ぴったり！ 緑の0からはじまる "+color+" の目盛りを、オレンジの辺までたどって読もう。"+tail,"good");
    }else{
      setHint("read","ぴったり！ 0の辺からはじまる目盛りを、オレンジの辺までたどって読もう。"+tail,"good");
    }
  }

  // ================= 解説アニメ =================
  function reveal(){
    if(state.revealing) return;
    state.revealing=true; state.mode=null;
    // 正しい位置へスナップ
    state.px=VX; state.py=VY; state.rho=norm(state.gZero+state.end);
    gProtr.setAttribute("transform","translate("+VX+","+VY+") rotate("+state.rho+")");
    state.centerOK=true; state.zeroOK=true;
    document.getElementById("bdStep1").className="bd-step s1 done";
    document.getElementById("bdStep2").className="bd-step s2 done";
    document.getElementById("bdStep3").className="bd-step s3 active";
    baseLine.setAttribute("stroke","var(--ok)"); centerDot.setAttribute("fill","var(--ok)");

    var scaleUsed=state.scale; // A or B
    var on=(scaleUsed==="A")?scaleAg:scaleBg, off=(scaleUsed==="A")?scaleBg:scaleAg;
    scaleAg.classList.remove("dim","bd-pulse","glow"); scaleBg.classList.remove("dim","bd-pulse","glow");
    on.classList.add("glow"); off.classList.add("dim");
    on.setAttribute("color", scaleUsed==="A"?"var(--teal)":"var(--grape)");
    var col=scaleUsed==="A"?"var(--teal-bright)":"var(--grape-bright)";
    sweepPath.setAttribute("stroke",col);
    sweepNum.setAttribute("fill", scaleUsed==="A"?"var(--teal)":"var(--grape)");

    var aReadFinal=norm(state.rho-state.gRead); // = theta or 180-theta
    var t0=null, dur=1000;
    function frame(ts){
      if(!t0)t0=ts; var p=Math.min((ts-t0)/dur,1);
      var aNow=state.end+(aReadFinal-state.end)*p;
      var d="", n=28;
      for(var i=0;i<=n;i++){var a=state.end+(aNow-state.end)*i/n; var pt=localPt(a,R-12); d+=(i?" L ":"M ")+pt[0].toFixed(2)+" "+pt[1].toFixed(2);}
      sweepPath.setAttribute("d",d); sweepPath.setAttribute("opacity",0.8);
      var val=(state.end===0)?aNow:(180-aNow);
      sweepNum.textContent=Math.round(val);
      var np=localPt(aNow,R+30);
      sweepNum.setAttribute("x",np[0].toFixed(1)); sweepNum.setAttribute("y",np[1].toFixed(1));
      sweepNum.setAttribute("opacity",1);
      if(p<1){requestAnimationFrame(frame);}else{
        sweepNum.textContent=state.theta;
        var clr=scaleUsed==="A"?"青緑":"むらさき";
        if(state.reflex){
          setHint("read","小さい方の角は "+state.theta+"°。180°を超える角だから、360° − "+state.theta+"° ＝ "+state.answer+"°！","good");
        }else{
          setHint("read","0の辺からはじまる "+clr+" の目盛りをたどると、オレンジの辺は "+state.theta+"° を指しているね。","good");
        }
        state.revealing=false;
      }
    }
    requestAnimationFrame(frame);
  }

  // ================= こたえあわせ =================
  function check(){
    var inp=document.getElementById("bdInput");
    var v=parseInt(inp.value,10);
    if(isNaN(v)){ setHint("read","まず数字を入れてね。","warn"); inp.focus(); return; }
    if(state.answered) return;
    var tol=2;
    total++;
    if(Math.abs(v-state.answer)<=tol){
      state.answered=true; inp.disabled=true;
      setHint("good","せいかい！ 🎉  この角は "+state.answer+"° だよ。","good");
      celebrate();
      reveal();
    }else if(state.reflex && Math.abs(v-state.theta)<=tol){
      setHint("read","それは小さい方の角だね。180°を超える角は 360°からひこう（360 − "+state.theta+"°）。","warn");
      showRetry();
    }else if(Math.abs(v-(180-state.theta))<=tol){
      setHint("read","おしい！ 反対側（0からはじまっていない方）の目盛りを読んでいるみたい。緑の0から数えてね。","warn");
      showRetry();
    }else{
      setHint("read","もう一度、緑の0の辺から目盛りを1つずつたどってみよう。","warn");
      showRetry();
    }
  }

  // ================= つくるモード（扇・左開き／右開き） =================
  var CY=320, CXL=200, CXR=560, RFAN=132, ARM=160;   // 2つの扇の中心・半径・うで
  var fanL, fanR;                                     // 左開き(操作可)・右開き(ミラー)
  function fpt(cx,cy,phi,r){ return [cx+r*Math.cos(phi*D2R), cy-r*Math.sin(phi*D2R)]; }

  function wedgePath(cx,cy,a0,sweep,r){
    var d="M "+cx+" "+cy, n=Math.max(2,Math.round(Math.abs(sweep)/3));
    for(var i=0;i<=n;i++){var p=fpt(cx,cy,a0+sweep*i/n,r); d+=" L "+p[0].toFixed(1)+" "+p[1].toFixed(1);}
    return d+" Z";
  }
  function arcPathF(cx,cy,a0,sweep,r){
    var n=Math.max(2,Math.round(Math.abs(sweep)/3)), p0=fpt(cx,cy,a0,r), s="M "+p0[0].toFixed(1)+" "+p0[1].toFixed(1);
    for(var i=1;i<=n;i++){var p=fpt(cx,cy,a0+sweep*i/n,r); s+=" L "+p[0].toFixed(1)+" "+p[1].toFixed(1);}
    return s;
  }

  function buildFan(){

  function classify(phi){
    var r=Math.round(phi);
    if(r<=0||r>=360) return r>=360?"一回転":"—";
    if(r===90) return "直角";
    if(r===180) return "直線（平角）";
    if(r<90) return "鋭角";
    if(r<180) return "鈍角";
    return "優角";
  }

  function drawOneFan(F,cx,cy,a0,signed,theta){
    F.wedge.setAttribute("d", wedgePath(cx,cy,a0,signed,RFAN));
    while(F.ribs.firstChild) F.ribs.removeChild(F.ribs.firstChild);
    var ribN=8;
    for(var k=0;k<=ribN;k++){ var q=fpt(cx,cy,a0+signed*k/ribN,RFAN*0.95);
      F.ribs.appendChild(el("line",{x1:cx,y1:cy,x2:q[0].toFixed(1),y2:q[1].toFixed(1)})); }
    var bAng=a0+signed;
    var pa=fpt(cx,cy,a0,ARM), pb=fpt(cx,cy,bAng,ARM);
    F.armA.setAttribute("x1",cx);F.armA.setAttribute("y1",cy);F.armA.setAttribute("x2",pa[0].toFixed(1));F.armA.setAttribute("y2",pa[1].toFixed(1));
    F.armB.setAttribute("x1",cx);F.armB.setAttribute("y1",cy);F.armB.setAttribute("x2",pb[0].toFixed(1));F.armB.setAttribute("y2",pb[1].toFixed(1));
    F.handleA.setAttribute("cx",pa[0].toFixed(1));F.handleA.setAttribute("cy",pa[1].toFixed(1));
    F.handleB.setAttribute("cx",pb[0].toFixed(1));F.handleB.setAttribute("cy",pb[1].toFixed(1));
    F.vertex.setAttribute("cx",cx);F.vertex.setAttribute("cy",cy);
    F.arc.setAttribute("d", arcPathF(cx,cy,a0,signed,40));
    var lab=fpt(cx,cy,a0+signed/2,64); F.arcLabel.setAttribute("x",lab[0].toFixed(1));F.arcLabel.setAttribute("y",lab[1].toFixed(1));
    F.arcLabel.textContent=Math.round(theta)+"°";
    F.name.setAttribute("x",cx); F.name.setAttribute("y",cy+44);
    if(state.showOpp && theta>0 && theta<360){
      var oppBase=bAng, oppSigned=(signed>=0?1:-1)*(360-theta);
      F.wedgeOpp.setAttribute("d", wedgePath(cx,cy,oppBase,oppSigned,RFAN)); F.wedgeOpp.style.display="";
      F.arcOpp.setAttribute("d", arcPathF(cx,cy,oppBase,oppSigned,28)); F.arcOpp.style.display="";
      var lo=fpt(cx,cy,oppBase+oppSigned/2,48); F.arcLabelOpp.setAttribute("x",lo[0].toFixed(1));F.arcLabelOpp.setAttribute("y",lo[1].toFixed(1));
      F.arcLabelOpp.textContent=Math.round(360-theta)+"°"; F.arcLabelOpp.style.display="";
    }else{
      F.wedgeOpp.style.display="none"; F.arcOpp.style.display="none"; F.arcLabelOpp.style.display="none";
    }
  }

  function drawFan(){
    var theta=state.fanFull?360:fanSweep();
    var phiA=state.phiA;
    var leftSigned = state.fanFull? 360 : theta;     // 左：CCW
    var rightSigned= state.fanFull?-360 : -theta;    // 右：ミラー(CW)
    drawOneFan(fanL, CXL, CY, phiA,     leftSigned,  theta);
    drawOneFan(fanR, CXR, CY, 180-phiA, rightSigned, theta);
    // パネル
    document.getElementById("bdMakeDeg").textContent=Math.round(theta);
    document.getElementById("bdMakeKind").textContent=classify(theta);
    var oppEl=document.getElementById("bdMakeOpp");
    if(oppEl){
      if(state.showOpp && theta>0 && theta<360){ oppEl.style.display=""; oppEl.querySelector("b").textContent="360 − "+Math.round(theta)+" = "+Math.round(360-theta)+"°"; }
      else oppEl.style.display="none";
    }
  }

  function animateFan(target){
    target=Math.max(0,Math.min(360,target));
    if(state.fanAnim) cancelAnimationFrame(state.fanAnim);
    state.phiA=0; state.fanFull=false;     // 基準を水平にそろえ、0°（とじた状態）から開く
    var t0=null, dur=1650;                  // 開くスピードはゆっくり
    function step(ts){ if(!t0)t0=ts; var p=Math.min((ts-t0)/dur,1);
      var e=1-Math.pow(1-p,3);              // ease-out
      var s=target*e;
      if(target>=360 && s>=359.5){ state.fanFull=true; state.phiB=0; }   // 一回転
      else { state.fanFull=false; state.phiB=norm(s); }
      drawFan();
      if(p<1){ state.fanAnim=requestAnimationFrame(step); } else { state.fanAnim=null; }
    }
    state.fanAnim=requestAnimationFrame(step);
  }

  // ================= 作図モード =================
  // 頂点O＝(VX,VY)。水平な基準線は右向き。ねらいの角を分度器で印→定規でひく→0から数えて答え合わせ。
  var dBase, dVertex, dV0, dRuler, dLine, dDot, dDotRing, dDotCross, dDotCtr, dCheckArc, dCheckNum, dCatcher, dBaseLabel, dComment;
  function fO(phi,r){ return [VX+r*Math.cos(phi*D2R), VY-r*Math.sin(phi*D2R)]; } // phi:右から上向き＋
  function arcO(from,to,r){
    var n=Math.max(2,Math.round(Math.abs(to-from)/3)), p0=fO(from,r), s="M "+p0[0].toFixed(1)+" "+p0[1].toFixed(1);
    for(var i=1;i<=n;i++){var p=fO(from+(to-from)*i/n,r); s+=" L "+p[0].toFixed(1)+" "+p[1].toFixed(1);}
    return s;
  }
  // 花丸：外側の花びら（ギザギザの丸）と内側のぐるぐる
  function flowerPath(cx,cy,R0,petals,amp){
    var d="", n=petals*22;
    for(var i=0;i<=n;i++){ var t=i/n, ang=2*Math.PI*t, r=R0+amp*Math.cos(petals*ang);
      var x=cx+r*Math.cos(ang), y=cy-r*Math.sin(ang); d+=(i===0?"M ":"L ")+x.toFixed(1)+" "+y.toFixed(1); }
    return d+" Z";
  }

    for(var i=0;i<=n;i++){ var t=i/n, ang=turns*2*Math.PI*t, r=rMax*t;
      var x=cx+r*Math.cos(ang+0.6), y=cy-r*Math.sin(ang+0.6); d+=(i===0?"M ":"L ")+x.toFixed(1)+" "+y.toFixed(1); }

  }

  // 鉛筆カーソル（先端が当たる点 = ホットスポット）
  var PEN_SVG="<svg xmlns='http://www.w3.org/2000/svg' width='30' height='30' viewBox='0 0 30 30'><path d='M19 3 L27 11 L12 26 L4 27 L5 19 Z' fill='#ffd23f' stroke='#b58900' stroke-width='1.6' stroke-linejoin='round'/><path d='M4 27 L5 19 L12 26 Z' fill='#3a2a20'/><path d='M19 3 L27 11' stroke='#e07b39' stroke-width='2.6'/></svg>";
  var PEN_CURSOR="url(\"data:image/svg+xml;utf8,"+encodeURIComponent(PEN_SVG)+"\") 4 27, crosshair";
  function setDotPos(x,y,pinned){

    dDot.setAttribute("transform","translate("+x.toFixed(1)+","+y.toFixed(1)+")");
    dDot.style.display=""; dDot.style.opacity=pinned?"1":"0.5";
    // 中の直径を頂点(=分度器の中心)へ向ける → 目盛りの線とつながり合わせやすい
    var ax=VX-x, ay=VY-y, al=Math.hypot(ax,ay)||1, ux=ax/al, uy=ay/al, L=13;
    dDotCross.setAttribute("x1",(ux*L).toFixed(1)); dDotCross.setAttribute("y1",(uy*L).toFixed(1));
    dDotCross.setAttribute("x2",(-ux*L).toFixed(1)); dDotCross.setAttribute("y2",(-uy*L).toFixed(1));
  }
  function previewDot(e){ var pt=toContent(e); setDotPos(pt.x,pt.y,false); }
  function placeDot(e){
    gProtr.style.display=""; dComment.style.display="none";   // 作業状態に戻す
    var pt=toContent(e);
    setDotPos(pt.x,pt.y,true);
    state.drawPinned=true;
    // 印を固定したら、引いた線・答え合わせはリセット
    dLine.style.display="none"; dRuler.style.display="none"; dCheckArc.style.display="none"; dCheckNum.style.display="none";
    state.drawLine=false; state.drawChecked=false;
    setDrawHint("印をつけたよ。「定規でひく」で頂点から直線をひこう。","good");
  }
  function drawAngleDeg(){ // 頂点Oから印への線が基準線(右)となす角 0..180
    if(!state.drawDot) return null;
    var vx=state.drawDot.x-VX, vy=state.drawDot.y-VY, len=Math.hypot(vx,vy);
    if(len<6) return null;
    return Math.acos(Math.max(-1,Math.min(1,(vx*1+vy*0)/len)))*180/Math.PI; // 右(+x)からの角
  }
  function drawScreenPhi(){ // 画面上向き＋のphi（弧/数字用）
    var vx=state.drawDot.x-VX, vy=state.drawDot.y-VY;
    return norm(Math.atan2(-(vy),vx)/D2R); // 上向き＋
  }
  function drawRuler(){
    if(!state.drawDot){ setDrawHint("先に「鉛筆」で角度の点に印をつけてね。","warn"); return; }
    var phi=drawScreenPhi(); var L=255;
    var tip=fO(phi,L);
    dLine.setAttribute("x1",VX); dLine.setAttribute("y1",VY);
    dLine.setAttribute("x2",tip[0].toFixed(1)); dLine.setAttribute("y2",tip[1].toFixed(1));
    dLine.style.display="";
    // 定規（うすい板）を線に沿って置く
    while(dRuler.firstChild) dRuler.removeChild(dRuler.firstChild);
    var degScreen=-phi; // SVG rotateは時計回り＋
    var g=el("g",{transform:"translate("+VX+","+VY+") rotate("+degScreen.toFixed(2)+")"});
    g.appendChild(el("rect",{x:-10,y:8,width:L+30,height:30,rx:6,fill:"rgba(120,180,210,0.28)",stroke:"rgba(47,111,168,0.6)","stroke-width":1.5}));
    for(var t=0;t<=L+20;t+=20){ g.appendChild(el("line",{x1:t,y1:8,x2:t,y2:(t%100===0?22:16),stroke:"rgba(47,111,168,0.6)","stroke-width":1})); }
    dRuler.appendChild(g); dRuler.style.display="";
    state.drawLine=true; state.drawChecked=false;
    setDrawHint("直線がひけたね。「こたえあわせ」で0°から数えてみよう。","good");
  }
  function checkDraw(){
    if(!state.drawLine){ setDrawHint("先に「定規でひく」で直線をひいてね。","warn"); return; }
    if(state.drawAnim) cancelAnimationFrame(state.drawAnim);
    var ang=drawAngleDeg(); if(ang==null){ return; }
    var phi=drawScreenPhi();
    var t0=null, dur=1300;
    dCheckArc.style.display=""; dCheckNum.style.display="";
    function step(ts){ if(!t0)t0=ts; var p=Math.min((ts-t0)/dur,1);
      var e=1-Math.pow(1-p,3); var cur=ang*e, curPhi=phi*e;
      dCheckArc.setAttribute("d", arcO(0,curPhi,48));
      var np=fO(curPhi/2,72);
      dCheckNum.setAttribute("x",np[0].toFixed(1)); dCheckNum.setAttribute("y",np[1].toFixed(1));
      dCheckNum.textContent=Math.round(cur)+"°";
      if(p<1){ state.drawAnim=requestAnimationFrame(step); }
      else { state.drawAnim=null; finishCheck(Math.round(ang)); }
    }
    state.drawAnim=requestAnimationFrame(step);
  }
  function finishCheck(measured){
    state.drawChecked=true;
    var diff=Math.abs(measured-state.drawTarget);
    if(diff===0){
      dCheckNum.setAttribute("fill","var(--ok)");
      // 分度器・定規を消して、できあがった角（基準線・ひいた線・印・角度）だけ残す
      gProtr.style.display="none";
      dRuler.style.display="none";
      dComment.style.display="";
      setDrawLocked(true);   // 合わせる・鉛筆・定規でひく を無効化
      setDrawHint("せいかい！ ねらいの "+state.drawTarget+"° ぴったりにかけたね！","good");
      celebrate();
    }else{
      dCheckNum.setAttribute("fill","var(--read)");
      var dir = measured>state.drawTarget ? "大きい" : "小さい";
      setDrawHint("はかると "+measured+"° で、ねらいより "+diff+"° "+dir+"よ。印を直して、ぴったり "+state.drawTarget+"° をめざそう。","warn");
      showRetry();
    }
  }
  function setDrawLocked(locked){
    state.drawLocked=locked;
    document.getElementById("bdDrawRuler").disabled=locked;
    [].forEach.call(document.querySelectorAll("#bdDrawTool button"),function(x){ x.disabled=locked; });
    if(locked) dCatcher.style.display="none";
    else dCatcher.style.display=(state.drawTool==="pencil")?"":"none";
  }
  function setDrawHint(msg,kind){
    var h=document.getElementById("bdDrawHint");
    h.className="bd-hint "+(kind==="warn"?"warn":"good");
    h.querySelector("span:last-child").textContent=msg;
  }
  function setDrawTool(t){
    state.drawTool=t;
    gProtr.style.display=""; dComment.style.display="none";   // 作業状態に戻す
    dCatcher.style.display=(t==="pencil")?"":"none";
    dCatcher.style.cursor=(t==="pencil")?PEN_CURSOR:"";       // 鉛筆カーソル
    [].forEach.call(document.querySelectorAll("#bdDrawTool button"),function(x){ x.classList.toggle("on",x.dataset.dt===t); });
    if(t==="pencil"){
      if(!(state.drawDot && state.drawPinned)){            // まだ印が無ければ先端にプレビュー表示
        state.drawPinned=false; setDotPos(VX+70, VY-70, false);
      }
      setDrawHint("鉛筆の先のしるしを、つくりたい角度の所へ動かして、クリック（タップ）でつけよう。","good");
    }else{
      setDrawHint("分度器を線(0°)と頂点に合わせよう。指でうごかし、2本指でまわせるよ。","good");
    }
  }
  function clearDraw(){
    state.drawDot=null; state.drawLine=false; state.drawChecked=false; state.drawPinned=false;
    if(state.drawAnim){ cancelAnimationFrame(state.drawAnim); state.drawAnim=null; }
    dDot.style.display="none"; dLine.style.display="none"; dRuler.style.display="none";
    dCheckArc.style.display="none"; dCheckNum.style.display="none"; dCheckNum.setAttribute("fill","var(--teal)");
    dComment.style.display="none"; gProtr.style.display="";
    setDrawLocked(false);   // 道具を再び有効化
  }
  function newDrawTarget(){
    clearDraw();
    state.drawTarget = 10*(2+Math.floor(Math.random()*15)); // 20..160 の10°きざみ
    document.getElementById("bdDrawTarget").textContent=state.drawTarget;
    // 分度器を少しずらして置く（合わせる練習）
    state.gZero=0; state.px=VX-10; state.py=VY-130; state.rho=6;
    gProtr.setAttribute("transform","translate("+state.px+","+state.py+") rotate("+state.rho+")");
    setDrawTool("move");
  }
  function snapProtractor(){
    state.px=VX; state.py=VY; state.rho=0;
    gProtr.setAttribute("transform","translate("+VX+","+VY+") rotate(0)");
  }

  // ================= モード切替 =================
  function setAppMode(m){
    state.appMode=m;
    var make=(m==="make"), draw=(m==="draw"), measure=(m==="measure");
    gFan.style.display=make?"":"none";
    gDraw.style.display=draw?"":"none";
    gAngle.style.display=measure?"":"none";
    gProtr.style.display=(measure||draw)?"":"none";   // 分度器は はかる・作図 で表示
    document.getElementById("bdSteps").style.display=measure?"":"none";
    document.getElementById("bdMeasurePanel").style.display=measure?"":"none";
    document.getElementById("bdMakePanel").style.display=make?"":"none";
    document.getElementById("bdDrawPanel").style.display=draw?"":"none";
    document.getElementById("bdBadge").textContent=make?"つくる":(draw?"作図":("問題 "+(total+1)+"　"+(state.reflex?"180°超え":"180°未満")));
    // モード切替時に分度器のドラッグ状態をリセット
    state.mode=null; state.pointers={};
    if(!measure) clearProtractorSupport();   // はかるモードの光るパス・目盛り強調を消す
    if(make){ drawFan(); }
    if(draw){ newDrawTarget(); }
    else { dCatcher.style.display="none"; state.drawTool="move"; state.drawDragging=false; }
    if(measure){ newProblem(); }
  }
  function clearProtractorSupport(){
    if(sweepPath) sweepPath.setAttribute("opacity",0);
    if(sweepNum) sweepNum.setAttribute("opacity",0);
    if(scaleAg){ scaleAg.classList.remove("dim","bd-pulse","glow"); }
    if(scaleBg){ scaleBg.classList.remove("dim","bd-pulse","glow"); }
  }

  // ================= パン・ズーム・回転（マップ操作） =================
  var ZMIN=0.4, ZMAX=4;
  function vpScale(){ return Math.hypot(state.vp.a, state.vp.b); }
  function clampFactor(f){ var cur=vpScale(); return Math.max(ZMIN/cur, Math.min(ZMAX/cur, f)); }
  function applyG(G){ state.vp=G.multiply(state.vp); applyViewport(); }
  function zoomAt(fx,fy,factor){ factor=clampFactor(factor);
    applyG(new DOMMatrix().translateSelf(fx,fy).scaleSelf(factor).translateSelf(-fx,-fy)); }
  function rotateAt(fx,fy,deg){
    applyG(new DOMMatrix().translateSelf(fx,fy).rotateSelf(deg).translateSelf(-fx,-fy)); }

  // 背景（=分度器や扇に当たらない部分）で操作
  svg.addEventListener("pointerdown",function(e){
    state.vpPointers[e.pointerId]=toViewBox(e);
    try{svg.setPointerCapture(e.pointerId);}catch(_){}
    state.vpPrev=null;
  });
  window.addEventListener("pointermove",function(e){
    if(!(e.pointerId in state.vpPointers)) return;
    state.vpPointers[e.pointerId]=toViewBox(e);
    var ids=Object.keys(state.vpPointers);
    if(ids.length===1){
      var c=state.vpPointers[ids[0]];
      if(state.vpPrev&&state.vpPrev.single){
        applyG(new DOMMatrix().translateSelf(c.x-state.vpPrev.x, c.y-state.vpPrev.y)); // 平行移動
      }
      state.vpPrev={single:true,x:c.x,y:c.y};
    }else if(ids.length>=2){
      var A=state.vpPointers[ids[0]], B=state.vpPointers[ids[1]];
      if(state.vpPrev&&state.vpPrev.dual){
        var oMx=(state.vpPrev.ax+state.vpPrev.bx)/2, oMy=(state.vpPrev.ay+state.vpPrev.by)/2;
        var nMx=(A.x+B.x)/2, nMy=(A.y+B.y)/2;
        var oAng=Math.atan2(state.vpPrev.by-state.vpPrev.ay, state.vpPrev.bx-state.vpPrev.ax);
        var nAng=Math.atan2(B.y-A.y, B.x-A.x);
        var dDeg=(nAng-oAng)*180/Math.PI;                              // ひねり＝回転
        var oD=Math.hypot(state.vpPrev.bx-state.vpPrev.ax, state.vpPrev.by-state.vpPrev.ay);
        var nD=Math.hypot(B.x-A.x, B.y-A.y);
        var dS=clampFactor(oD>0? nD/oD : 1);                            // 指の間隔＝拡大縮小
        // 指の動きにそって 平行移動＋回転＋拡大縮小 をまとめて適用
        applyG(new DOMMatrix().translateSelf(nMx,nMy).rotateSelf(dDeg).scaleSelf(dS).translateSelf(-oMx,-oMy));
      }
      state.vpPrev={dual:true, ax:A.x,ay:A.y, bx:B.x,by:B.y};
    }
  });
  function vpUp(e){ if(e.pointerId in state.vpPointers){ delete state.vpPointers[e.pointerId];
    try{svg.releasePointerCapture(e.pointerId);}catch(_){} state.vpPrev=null; } }
  window.addEventListener("pointerup",vpUp);
  window.addEventListener("pointercancel",vpUp);
  svg.addEventListener("wheel",function(e){
    e.preventDefault();
    var f=toViewBox(e); zoomAt(f.x,f.y, e.deltaY<0?1.12:1/1.12);
  },{passive:false});

  // ================= 正解エフェクト（カラフルな星） =================
  var fx=document.getElementById("bdFx"), fxCtx=fx.getContext("2d");
  var fxParts=[], fxRunning=false, fxLast=0;
  var STAR_COLORS=["#FFD93D","#FF6BAA","#4DD0E1","#7CE07C","#B388FF","#FF9F4D","#FF5C5C","#FFE066","#5CE1E6"];
  function fxResize(){ var dpr=Math.min(window.devicePixelRatio||1,2);
    fx.width=Math.floor(innerWidth*dpr); fx.height=Math.floor(innerHeight*dpr);
    fxCtx.setTransform(dpr,0,0,dpr,0,0); }
  function drawStar(r,points,inner){
    fxCtx.beginPath();
    for(var i=0;i<points*2;i++){ var rad=(i%2===0)?r:r*inner; var a=Math.PI*i/points-Math.PI/2;
      var x=Math.cos(a)*rad, y=Math.sin(a)*rad; i===0?fxCtx.moveTo(x,y):fxCtx.lineTo(x,y);}
    fxCtx.closePath();
  }
  function fxMake(x,y,vx,vy,decay){
    return {x:x,y:y,vx:vx,vy:vy,rot:Math.random()*6.28,vrot:(Math.random()-0.5)*0.32,
      size:7+Math.random()*13,color:STAR_COLORS[(Math.random()*STAR_COLORS.length)|0],
      life:1,decay:decay,tw:Math.random()*6.28,pts:(Math.random()<0.5?5:4)};
  }
  function celebrate(){
    fxResize();
    var y=document.getElementById("bdYatta");          // 「せいかい！」をドーンと表示
    y.classList.remove("show"); void y.offsetWidth; y.classList.add("show");
    var cx=innerWidth/2, cy=innerHeight*0.42;
    for(var i=0;i<80;i++){ var ang=Math.random()*Math.PI*2, sp=2.5+Math.random()*8;
      fxParts.push(fxMake(cx,cy,Math.cos(ang)*sp,Math.sin(ang)*sp-(2+Math.random()*3),0.006+Math.random()*0.006)); }
    for(var j=0;j<34;j++){ // 上から舞い降りる
      fxParts.push(fxMake(Math.random()*innerWidth,-20-Math.random()*120,(Math.random()-0.5)*2,1+Math.random()*2.5,0.004+Math.random()*0.004)); }
    if(!fxRunning){ fxRunning=true; fxLast=performance.now(); requestAnimationFrame(fxStep); }
  }
  function showRetry(){   // 不正解のとき方眼紙の上に「もう一度考えてみよう」
    var r=document.getElementById("bdRetry");
    r.classList.remove("show"); void r.offsetWidth; r.classList.add("show");
  }
  function fxStep(ts){
    var dt=Math.min((ts-fxLast)/16.67,2.2); fxLast=ts;
    fxCtx.clearRect(0,0,innerWidth,innerHeight);
    for(var i=fxParts.length-1;i>=0;i--){
      var p=fxParts[i];
      p.vy+=0.13*dt; p.vx*=Math.pow(0.99,dt);
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot+=p.vrot*dt; p.tw+=0.22*dt; p.life-=p.decay*dt;
      if(p.life<=0 || p.y>innerHeight+50){ fxParts.splice(i,1); continue; }
      var tw=0.72+0.28*Math.sin(p.tw);
      fxCtx.save();
      fxCtx.globalAlpha=Math.max(0,Math.min(1,p.life));
      fxCtx.translate(p.x,p.y); fxCtx.rotate(p.rot); fxCtx.scale(tw,tw);
      fxCtx.shadowColor=p.color; fxCtx.shadowBlur=14; fxCtx.fillStyle=p.color;
      drawStar(p.size,p.pts,0.45); fxCtx.fill();
      fxCtx.shadowBlur=0; fxCtx.globalAlpha*=0.95; fxCtx.fillStyle="rgba(255,255,255,0.92)";
      drawStar(p.size*0.42,p.pts,0.45); fxCtx.fill();
      fxCtx.restore();
    }
    if(fxParts.length>0){ requestAnimationFrame(fxStep); }
    else { fxRunning=false; fxCtx.clearRect(0,0,innerWidth,innerHeight); }
  }

  // ================= 操作 =================
  document.getElementById("bdCheck").addEventListener("click",check);
  document.getElementById("bdReveal").addEventListener("click",reveal);
  document.getElementById("bdNew").addEventListener("click",newProblem);
  document.getElementById("bdInput").addEventListener("keydown",function(e){if(e.key==="Enter")check();});
  document.getElementById("bdSupport").addEventListener("change",function(e){state.support=e.target.checked; update();});
  document.getElementById("bdMode").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b)return;
    [].forEach.call(this.querySelectorAll("button"),function(x){x.classList.remove("on");});
    b.classList.add("on"); state.reflex=(b.dataset.rf==="1"); newProblem();
  });
  document.getElementById("bdAppMode").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b)return;
    [].forEach.call(this.querySelectorAll("button"),function(x){x.classList.remove("on");});
    b.classList.add("on"); setAppMode(b.dataset.am);
  });
  document.getElementById("bdOpen").addEventListener("click",function(){
    var v=parseInt(document.getElementById("bdMakeInput").value,10);
    if(!isNaN(v)) animateFan(v);
  });
  document.getElementById("bdMakeInput").addEventListener("keydown",function(e){
    if(e.key==="Enter"){ var v=parseInt(this.value,10); if(!isNaN(v)) animateFan(v); }
  });
  document.getElementById("bdMakeRandom").addEventListener("click",function(){
    animateFan(5+((Math.random()*350)|0));
  });
  document.getElementById("bdOppBtn").addEventListener("click",function(){
    state.showOpp=!state.showOpp;
    this.classList.toggle("on",state.showOpp);
    this.textContent=state.showOpp?"反対の角をかくす":"反対の角を見る";
    drawFan();
  });
  // 説明部分の折りたたみ（方眼を広く使う）
  function setExp(open){
    state.expOpen=open;
    document.getElementById("bdMeasureExp").classList.toggle("bd-hidden",!open);
    document.getElementById("bdMakeExp").classList.toggle("bd-hidden",!open);
    document.getElementById("bdDrawExp").classList.toggle("bd-hidden",!open);
    var t=open?"せつめいをかくす ▾":"せつめいを出す ▸";
    document.getElementById("bdMeasureToggle").textContent=t;
    document.getElementById("bdMakeToggle").textContent=t;
    document.getElementById("bdDrawToggle").textContent=t;
  }
  document.getElementById("bdMeasureToggle").addEventListener("click",function(){ setExp(!state.expOpen); });
  document.getElementById("bdMakeToggle").addEventListener("click",function(){ setExp(!state.expOpen); });
  document.getElementById("bdDrawToggle").addEventListener("click",function(){ setExp(!state.expOpen); });
  // 作図モードの配線
  document.getElementById("bdDrawTool").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b)return; setDrawTool(b.dataset.dt);
  });
  document.getElementById("bdDrawRuler").addEventListener("click",drawRuler);
  document.getElementById("bdDrawCheck").addEventListener("click",checkDraw);
  document.getElementById("bdDrawClear").addEventListener("click",function(){ clearDraw(); setDrawHint("けしたよ。もう一度、鉛筆で印をつけよう。","good"); });
  document.getElementById("bdDrawNew").addEventListener("click",newDrawTarget);
  // マップ操作ボタン（viewBoxの中心まわり）
  document.getElementById("bdZoomIn").addEventListener("click",function(){ zoomAt(380,280,1.25); });
  document.getElementById("bdZoomOut").addEventListener("click",function(){ zoomAt(380,280,1/1.25); });
  document.getElementById("bdRotL").addEventListener("click",function(){ rotateAt(380,280,-15); });
  document.getElementById("bdRotR").addEventListener("click",function(){ rotateAt(380,280,15); });
  document.getElementById("bdZoomReset").addEventListener("click",function(){ state.vp=new DOMMatrix(); applyViewport(); });

  // ================= 起動 =================
  state.vp=new DOMMatrix();
  buildProtractor();
  buildFan();
  buildDraw();
  applyViewport();
  newProblem();
  drawFan();
})();
</script>
</body>
</html>
