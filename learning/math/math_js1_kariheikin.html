<script>
let mode = 'basic', level = 'easy';
let prob = null, solVisible = false, answered = false;
let stats = { ok:0, all:0, streak:0 };

/* ---------- Divp 学習記録連携 ---------- */
// question_params には問題オブジェクト prob を丸ごと保存する（全てJSON化できる値のみ）。
// 解き直し時は保存した params をそのまま render／送り返すことで params_hash が一致し、
// 2連続正解の mastered 判定が成立する。※このJSON形式を変えると既存pending行とハッシュが合わなくなる。
let dbRetryQueue = null;
const KH_SUBS = ['basic', 'applied', 'reference'];   // question_key に使うサブタイプ
function safeDivpCorrect(sel) {
  if (window.Divp && typeof Divp.correct === 'function') { try { Divp.correct(sel); } catch(e) {} }
}
function safeDivpIncorrect(sel) {
  if (window.Divp && typeof Divp.incorrect === 'function') { try { Divp.incorrect(sel); } catch(e) {} }
}
function dbParams(p) {
  if (!p._dbParams) {
    const c = {}; for (const k in p) { if (k.charAt(0) !== '_') c[k] = p[k]; }
    p._dbParams = c;
  }
  return p._dbParams;
}
function khQText(p) {
  if (p.sub === 'reference') return `${p.ctx.name}（基準値型）：${refQLabel(p)}`;
  if (p.sub === 'basic')     return `${p.ctx.plural}の平均を仮平均 ${fmt(p.A)}${p.ctx.unit} で求める`;
  return `${p.ctx.plural}の平均が ${fmt(p.mean)}${p.ctx.unit} のときの □ を求める`;
}
function divpLog(ok, correctStr, wrongStr) {
  try {
    if (!(window.Divp && typeof Divp.answer === 'function') || !prob) return;
    Divp.answer(ok, {
      question_key:   prob.sub,
      question_params: dbParams(prob),
      question_text:  khQText(prob),
      correct_answer: correctStr,
      wrong_answer:   wrongStr,
    });
  } catch(e) { /* オフラインでも演習は継続 */ }
}
// list_retries.php の pending から question_params を取り出し再出題キューに積む
function startDbRetry() {
  if (!/[?&]retry=1/.test(location.search)) return;
  if (!(window.Divp && typeof Divp.getRetries === 'function')) return;
  Divp.getRetries().then(items => {
    const queue = [];
    (items || []).forEach(it => {
      const p = it.question_params;
      if (!p || !p.ctx || !KH_SUBS.includes(p.sub)) return;   // 未知/古い形式は再出題不可
      p._dbParams = Object.assign({}, p);   // 保存時と同一の params を送り返す（params_hash一致のため）
      queue.push(p);
    });
    if (queue.length) {
      dbRetryQueue = queue;
      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('problemScreen').classList.remove('hidden');
      document.getElementById('backBtn').classList.add('show');
      stats = { ok:0, all:0, streak:0 };
      updateScore();
      next();
    }
  });
}

function r2(v) { return Math.round(v * 100) / 100; }
function r1(v) { return Math.round(v * 10)  / 10;  }
function fmt(v) {
  if (Number.isInteger(v)) return String(v);
  return parseFloat(v.toFixed(2)).toString();
}
function rnd(a, b) { return a + Math.random() * (b - a); }
function sgn(v)    { return v >= 0 ? '+' : ''; }
function approx(a, b) { return Math.abs(a - b) < 0.005; }

function genVals(ctx, isEasy) {
  const n = 4 + Math.floor(Math.random() * 3);
  const [mn, mx] = isEasy
    ? [ctx.easyMin, ctx.easyMax]
    : [ctx.normMin,  ctx.normMax];
  return Array.from({length: n}, () =>
    isEasy ? Math.round(rnd(mn, mx)) : r1(rnd(mn, mx))
  );
}

function calcProb(ctx, vals, isEasy) {
  const A = isEasy ? ctx.easyBase : ctx.normBase;
  const n = vals.length;
  const diffs   = vals.map(v => r2(v - A));
  const sumDiff = r2(diffs.reduce((a,b) => a+b, 0));
  const avgDiff = r2(sumDiff / n);
  const mean    = r2(A + avgDiff);
  return { A, n, diffs, sumDiff, avgDiff, mean };
}

function has2Dec(v) { return Math.abs(v - r1(v)) > 0.001; }

function shouldRetry(p) {
  const isEasy = (level === 'easy');
  if (p.sub === 'applied') {
    if (isEasy  && !Number.isInteger(p.mean)) return true;
    if (!isEasy && has2Dec(p.mean))           return true;
  }
  if (p.sub === 'basic') {
    if (has2Dec(p.answer) && Math.random() > 0.03) return true;
  }
  if (p.sub === 'reference' && p.qType === 'mean') {
    if (has2Dec(p.answer) && Math.random() > 0.03) return true;
  }
  return false;
}

function genProb() {
  let p;
  if (mode === 'reference') {
    p = genReference();
  } else {
    let tries = 0;
    do {
      p = _genProb();
      tries++;
      if (tries > 80) break;
    } while (shouldRetry(p));
  }
  p.level = level;   // 再出題時に同じ難易度でバッジ表示するため question_params に含める
  return p;
}

function _genProb() {
  const isEasy = (level === 'easy');
  const ctx  = CTX[Math.floor(Math.random() * CTX.length)];
  const vals = genVals(ctx, isEasy);
  const { A, n, diffs, sumDiff, avgDiff, mean } = calcProb(ctx, vals, isEasy);

  const subtype = (mode === 'practice')
    ? (() => { const r = Math.random(); return r < 0.333 ? 'basic' : r < 0.667 ? 'applied' : 'reference'; })()
    : mode;

  if (subtype === 'reference') return genReference();
  if (subtype === 'basic') {
    return { type: mode, sub:'basic', ctx, vals, n, A, diffs, sumDiff, avgDiff, mean, answer: mean };
  } else {
    const hi = 1 + Math.floor(Math.random() * (n - 2));
    const knownDiffs  = diffs.filter((_,i) => i !== hi);
    const sumKnown    = r2(knownDiffs.reduce((a,b) => a+b, 0));
    const totalNeeded = r2(n * (mean - A));
    const hiddenDiff  = r2(totalNeeded - sumKnown);
    return { type: mode, sub:'applied', ctx, vals, n, A, diffs, sumDiff, avgDiff, mean,
      hi, hiddenVal: vals[hi], knownDiffs, sumKnown, totalNeeded, hiddenDiff,
      answer: vals[hi] };
  }
}

function genReference() {
  const isEasy = (level === 'easy');
  const ctx = REFCTX[Math.floor(Math.random() * REFCTX.length)];
  const n = 4 + Math.floor(Math.random() * 3);
  const who = ctx.who.slice(0, n);
  const baseIdx = Math.floor(Math.random() * n);
  const baseVal = ctx.baseVals[Math.floor(Math.random() * ctx.baseVals.length)];
  const dr = isEasy ? ctx.easyDiff : ctx.normDiff;
  const qTypes = ['value', 'diff', 'mean'];
  const qType = qTypes[Math.floor(Math.random() * qTypes.length)];
  let diffs, vals, sumDiff, avgDiff, mean;
  let tries = 0;
  do {
    diffs = who.map((_,i) => {
      if (i === baseIdx) return 0;
      let d;
      do { d = isEasy ? Math.round(rnd(-dr, dr)) : r1(rnd(-dr, dr)); } while (d === 0);
      return d;
    });
    sumDiff = r2(diffs.reduce((a,b) => a+b, 0));
    avgDiff = r2(sumDiff / n);
    mean    = r2(baseVal + avgDiff);
    tries++;
    if (tries > 200) break;
  } while (qType === 'mean' && has2Dec(mean));

  vals = diffs.map(d => r2(baseVal + d));
  let answer, targetIdx, idx1, idx2;
  const nonBase = [...Array(n).keys()].filter(i => i !== baseIdx);

  if (qType === 'value') {
    targetIdx = nonBase[Math.floor(Math.random() * nonBase.length)];
    answer = vals[targetIdx];
  } else if (qType === 'diff') {
    const shuffled = [...nonBase].sort(() => Math.random() - .5);
    idx1 = shuffled[0]; idx2 = shuffled[1];
    answer = r2(Math.abs(vals[idx1] - vals[idx2]));
  } else {
    answer = mean;
  }

  return { type:'practice', sub:'reference', ctx, who, vals, diffs,
    baseIdx, baseVal, n, sumDiff, avgDiff, mean,
    qType, answer, targetIdx, idx1, idx2 };
}

function next() {
  solVisible = false;
  if (dbRetryQueue && dbRetryQueue.length) {
    // ?retry=1: 保存時と全く同じ問題を再出題する
    prob = dbRetryQueue.shift();
    if (prob.level) level = prob.level;
  } else {
    try {
      prob = genProb();
    } catch(e) {
      console.error('genProb error:', e);
      prob = null;
      return;
    }
  }
  answered = false;
  renderProb();
  renderWork();
  window.scrollTo({top:0, behavior:'smooth'});

  if (!eq) return;
  const showing = eq.classList.toggle('show');
  btn.textContent = showing ? '💡 ヒントを隠す' : '💡 ヒントを見る';
}

function chk(id, expected) {
  const el = document.getElementById(id);
  if (!el || el.value === '') { el && el.classList.remove('ok','ng'); return; }
  const v = parseFloat(el.value);
  el.classList.toggle('ok', approx(v, expected));
  el.classList.toggle('ng', !approx(v, expected));
}

function checkAns() {
  if (answered) return;
  const val = parseFloat(document.getElementById('finalAns').value);
  if (isNaN(val)) { alert('答えを入力してください'); return; }
  answered = true; stats.all++;
  const ok = approx(val, prob.answer);
  if (ok) { stats.ok++; stats.streak++; } else { stats.streak = 0; }
  updateScore();

  // 学習記録に送信（正解ならjh用ハンコも出す）。未ログイン・ローカルでは黙ってスキップ
  if (ok) safeDivpCorrect('#workCard'); else safeDivpIncorrect('#workCard');
  divpLog(ok, `${fmt(prob.answer)}${prob.ctx.unit}`, document.getElementById('finalAns').value);

  const fb = document.getElementById('feedback');
  document.getElementById('fb-ico').textContent = ok ? '🎉' : '😅';
  document.getElementById('fb-ttl').textContent = ok ? '正解！' : '不正解';
  document.getElementById('fb-ttl').className = 'fb-ttl ' + (ok ? 'ok' : 'ng');
  document.getElementById('fb-det').textContent = ok
    ? `${fmt(prob.answer)}${prob.ctx.unit}　すばらしい！`
    : `正解は ${fmt(prob.answer)}${prob.ctx.unit} です。解説で確認しよう。`;
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ng');

  const ans = document.getElementById('finalAns');
  if (ans) { ans.disabled = true; ans.classList.add(ok ? 'ok' : 'ng'); }
  buildSol();
  document.getElementById('actionRow').classList.remove('hidden');
}

function buildSol() {
  const p = prob;
  let html = '<h4>📝 解説</h4>';

  if (p.sub === 'reference') {
    const bwho = p.who[p.baseIdx];
    if (p.qType === 'value') {
      html += SS(1, `${bwho}の値（基準値）に${p.who[p.targetIdx]}との差を足す`,
        `${fmt(p.baseVal)} + (${sgn(p.diffs[p.targetIdx])}${fmt(p.diffs[p.targetIdx])}) = <span class="sol-ans">${fmt(p.answer)}${p.ctx.unit}</span>`);
    } else if (p.qType === 'diff') {
      const d1=p.diffs[p.idx1], d2=p.diffs[p.idx2], v1=p.vals[p.idx1], v2=p.vals[p.idx2];
      html += SS(1, `${p.who[p.idx1]}と${p.who[p.idx2]}それぞれの値を求める`,
        `${p.who[p.idx1]}： ${fmt(p.baseVal)} + (${sgn(d1)}${fmt(d1)}) = ${fmt(v1)}\n${p.who[p.idx2]}： ${fmt(p.baseVal)} + (${sgn(d2)}${fmt(d2)}) = ${fmt(v2)}`);
      html += SS(2, '差を求める（大きい方 − 小さい方）',
        `${fmt(Math.max(v1,v2))} − ${fmt(Math.min(v1,v2))} = <span class="sol-ans">${fmt(p.answer)}${p.ctx.unit}</span>`);
    } else {
      const diffStr = p.diffs.map(d=>sgn(d)+fmt(d)).join(' ');
      html += SS(1, `${bwho}の値を仮平均として差の合計・平均を求める`,
        `差の合計： ${diffStr} = ${fmt(p.sumDiff)}\n差の平均： ${fmt(p.sumDiff)} ÷ ${p.n} = ${fmt(p.avgDiff)}`);
      html += SS(2, `平均 ＝ 基準値 ＋ 差の平均`,
        `${fmt(p.baseVal)} + (${fmt(p.avgDiff)}) = <span class="sol-ans">${fmt(p.answer)}${p.ctx.unit}</span>`);
    }
  } else if (p.sub === 'basic') {
    const diffsLines = p.vals.map((v,i) =>
      `${p.ctx.who[i]}： ${fmt(v)} − ${fmt(p.A)} = ${sgn(p.diffs[i])}${fmt(p.diffs[i])}`
    ).join('\n');
    html += SS(1, '各データから仮平均を引いて差を求める', diffsLines);
    html += SS(2, '差の合計を求める', p.diffs.map(d=>sgn(d)+fmt(d)).join(' ') + ' = ' + fmt(p.sumDiff));
    html += SS(3, `差の平均を求める（÷ ${p.n}）`, `${fmt(p.sumDiff)} ÷ ${p.n} = ${fmt(p.avgDiff)}`);
    html += SS(4, '平均を求める（仮平均 ＋ 差の平均）',
      `${fmt(p.A)} + (${fmt(p.avgDiff)}) = <span class="sol-ans">${fmt(p.answer)}${p.ctx.unit}</span>`);
  } else if (p.sub === 'applied') {
    const diffsLines = p.vals.map((v,i) => {
      if (i === p.hi) return `${p.ctx.who[i]}： □ − ${fmt(p.A)} = □の差`;
      return `${p.ctx.who[i]}： ${fmt(v)} − ${fmt(p.A)} = ${sgn(p.diffs[i])}${fmt(p.diffs[i])}`;
    }).join('\n');
    html += SS(1, 'わかっているデータの差を確認する', diffsLines);
    const avgNeeded = fmt(r2(p.mean - p.A));
    const terms = p.vals.map((_,i) => {
      if (i === p.hi) return (i === 0 ? '' : '+') + '<span style="color:var(--orange);font-weight:700">□</span>';
      return i === 0 ? fmt(p.diffs[i]) : (sgn(p.diffs[i]) + fmt(p.diffs[i]));
    }).join(' ');
    const fracHtml = `<div style="display:inline-flex;align-items:center;gap:10px;font-family:'Source Code Pro',monospace;font-size:.95rem">
      <div class="frac"><div class="num">${terms}</div><div class="den">${p.n}</div></div>
      <span>＝ ${avgNeeded}</span>
    </div>`;
    html += `<div class="sol-step"><div class="sol-num">2</div><div class="sol-cnt">次の方程式が成り立つ<div class="sol-fml" style="padding:10px 14px">${fracHtml}</div></div></div>`;
    html += SS(3, '□の差を求める（分子を整理する）',
      `□の差 = ${p.n} × ${avgNeeded} − (${p.diffs.filter((_,i)=>i!==p.hi).map(d=>sgn(d)+fmt(d)).join(' ')})\n　　= ${fmt(p.totalNeeded)} − (${fmt(p.sumKnown)}) = ${fmt(p.hiddenDiff)}`);
    html += SS(4, '□の値を求める（仮平均 ＋ □の差）',
      `${fmt(p.A)} + (${fmt(p.hiddenDiff)}) = <span class="sol-ans">${fmt(p.answer)}${p.ctx.unit}</span>`);
  }
  document.getElementById('solution').innerHTML = html;
}
function SS(n, title, fml) {
  return `<div class="sol-step"><div class="sol-num">${n}</div><div class="sol-cnt">${title}<div class="sol-fml">${fml}</div></div></div>`;
}

function toggleSol() {
  solVisible = !solVisible;
  const sol = document.getElementById('solution');
  const btn = document.querySelector('.sol-toggle');
  if (sol) sol.classList.toggle('hidden', !solVisible);
  if (btn) btn.textContent = solVisible ? '📝 解説を閉じる' : '📝 解説を見る';
}
function updateScore() {
  document.getElementById('sc-ok').textContent  = stats.ok;
  document.getElementById('sc-all').textContent = stats.all;
  document.getElementById('sc-st').textContent  = stats.streak;
}

startDbRetry();   // ?retry=1 のときは取得でき次第、解き直しセットに切り替える
</script>
