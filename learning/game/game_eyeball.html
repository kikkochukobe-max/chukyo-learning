<style>
:root{
  color-scheme:light;
  --bg:#F1EAD8; --bg2:#FCFAF3; --panel:#FFFFFF; --panel2:#EAF0F7; --line:#D9DFEA;
  --ink:#22394F; --muted:#6F7E92;
  --cyan:#1BA8A0; --lime:#4FA63B; --coral:#EE5A66; --amber:#F4B12B; --violet:#7B5CE6; --pink:#E25CA6;
  --g1:#2E7DD1; --g2:#3FA84E; --g3:#7B5CE6; --g4:#EE5A66; --g5:#F4A41E; --g6:#E25CA6;
  --header:#D9743C; --guide:#5A4632;
  --shadow:0 14px 34px rgba(34,57,90,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overflow:hidden;overscroll-behavior:none;color-scheme:light;background:#F1EAD8}
body{
  background:
    linear-gradient(rgba(150,108,66,.07) 1px, transparent 1px) 0 0/27px 27px,
    linear-gradient(90deg, rgba(150,108,66,.07) 1px, transparent 1px) 0 0/27px 27px,
    var(--bg);
  color:var(--ink);
  font-family:"Zen Maru Gothic",system-ui,sans-serif;
  overflow:hidden;
  touch-action:manipulation;
}
.app{height:100%;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.btn{
  font-weight:700;border-radius:16px;padding:14px 22px;font-size:18px;
  background:#fff;color:var(--ink);border:1.5px solid var(--line);box-shadow:0 2px 0 rgba(34,57,90,.06);
  transition:transform .08s ease, filter .15s ease; user-select:none;
}
.btn:active{transform:translateY(2px) scale(.99)}
.btn.primary{background:linear-gradient(180deg,#EE9B3E,#E07B27);color:#fff;border-color:transparent;text-shadow:0 1px 2px rgba(120,60,10,.25)}
.btn.warn{background:linear-gradient(180deg,var(--coral),#e23b4b);color:#fff;border-color:transparent}
.btn.gold{background:linear-gradient(180deg,var(--amber),#e89a17);color:#3a2a02;border-color:transparent}
.btn.lime{background:linear-gradient(180deg,#56B83F,#3f9a2c);color:#fff;border-color:transparent}
.btn.ghost{background:transparent;box-shadow:none}
.btn.big{font-size:clamp(22px,3.4vw,40px);padding:22px 40px;border-radius:22px}
.pill{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;
  padding:7px 14px;border-radius:999px;background:var(--panel);border:1.5px solid var(--line)}

/* ===== HUB ===== */
.hub{flex:1;overflow:auto;padding:clamp(18px,3vw,42px)}
.hub-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:clamp(18px,3vw,34px);flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:6px}
.brand .kicker{color:var(--muted);font-weight:700;letter-spacing:.18em;font-size:13px}
.brand h1{font-family:"Zen Maru Gothic",system-ui,sans-serif;font-weight:900;font-size:clamp(32px,5.6vw,70px);line-height:1.04;margin:0;
  background:linear-gradient(115deg,#C85A28,#E68F26 50%,#D85740);
  -webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.02em}
.brand .sub{color:var(--muted);font-size:clamp(14px,1.6vw,20px);font-weight:500}
.toolbar{display:flex;gap:10px;flex-wrap:wrap}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(14px,1.8vw,24px)}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
.card{
  position:relative;border-radius:26px;padding:clamp(18px,2vw,30px);min-height:200px;
  background:#fff;border:1.5px solid var(--line);box-shadow:0 6px 18px rgba(34,57,90,.08);
  overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;
  transition:transform .12s ease, border-color .2s ease, box-shadow .2s ease; text-align:left;
}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.card:active{transform:translateY(0) scale(.99)}
.card .no{font-family:"Mochiy Pop One";font-size:clamp(40px,4.5vw,64px);line-height:1;opacity:.9}
.card .ic{position:absolute;right:14px;top:10px;font-size:clamp(52px,7vw,88px);opacity:.22;filter:saturate(1.2)}
.card h2{margin:8px 0 4px;font-size:clamp(20px,2.3vw,30px);font-weight:900}
.card p{margin:0;color:var(--muted);font-size:clamp(13px,1.4vw,16px);line-height:1.5}
.card .go{align-self:flex-start;margin-top:14px}
.card .accent{position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:26px 0 0 26px}
.card .glow{position:absolute;right:-60px;bottom:-80px;width:220px;height:220px;border-radius:50%;filter:blur(20px);opacity:.20}

/* ===== GAME SHELL ===== */
.game{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);z-index:20}
.game.show{display:flex}
.topbar{display:flex;align-items:center;gap:12px;padding:12px clamp(12px,2vw,24px);
  border-bottom:1.5px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(8px);flex-wrap:wrap}
.topbar .title{font-weight:900;font-size:clamp(17px,2vw,24px);display:flex;align-items:center;gap:10px}
.topbar .title .dot{width:14px;height:14px;border-radius:50%}
.topbar .spacer{flex:1}
.gwrap{flex:1;position:relative;overflow:hidden;touch-action:none}
.stage{position:absolute;inset:0;display:flex;flex-direction:column}
canvas{display:block;touch-action:none}
.hint{color:var(--muted);font-size:clamp(13px,1.5vw,17px)}
.bigreadout{font-family:"Mochiy Pop One"}

/* control rows inside games */
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px clamp(12px,2vw,24px);
  border-top:1.5px solid var(--line);background:rgba(255,255,255,.85)}
.seg{display:inline-flex;background:#fff;border:1.5px solid var(--line);border-radius:14px;overflow:hidden}
.seg button{padding:10px 16px;font-weight:700;color:var(--muted);font-size:15px}
.seg button.on{background:var(--header);color:#fff}
/* 時間ぴったり：電子黒板用の拡大クラス */
.seg.x3{border-radius:28px;flex-wrap:wrap}
.seg.x3 button{font-size:45px;padding:30px 48px}
.btn.tb2{font-size:clamp(44px,6.8vw,80px);padding:44px 80px;border-radius:30px}
.hint.x2{font-size:clamp(26px,3vw,34px)}

/* ===== RESULT OVERLAY ===== */
.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(34,57,90,.42);backdrop-filter:blur(4px);z-index:30;padding:18px}
.overlay.show{display:flex;animation:pop .25s ease}
.overlay.peek{background:transparent;backdrop-filter:none;align-items:flex-end;animation:none}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.result{background:#fff;border:1.5px solid var(--line);
  border-radius:28px;padding:clamp(20px,3vw,40px);max-width:min(94vw,1080px);width:100%;text-align:center;box-shadow:var(--shadow)}
.result .medal{font-size:46px}
.result .score{font-family:"Mochiy Pop One";font-size:clamp(56px,11vw,104px);line-height:1;margin:6px 0;color:var(--header)}
.result .label{font-weight:900;font-size:clamp(20px,3vw,30px);margin-bottom:6px}
.result .detail{color:var(--muted);font-size:clamp(22px,2.4vw,32px);line-height:1.6;margin:8px 0 18px}
.result .detail.big{font-size:clamp(66px,7.2vw,96px);line-height:1.35}
.result .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(40px);
  background:var(--header);color:#fff;border:none;padding:12px 22px;border-radius:14px;
  font-weight:700;opacity:0;transition:.25s;z-index:50;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* misc */
.center{display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;gap:14px}
.target-chip{font-family:"Mochiy Pop One";font-size:clamp(30px,5vw,64px);color:var(--ink)}
.kv{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
.kv > div{background:var(--panel);border:1.5px solid var(--line);border-radius:14px;padding:10px 16px;min-width:120px}
.kv .k{color:var(--muted);font-size:13px;font-weight:700}
.kv .v{font-family:"Mochiy Pop One";font-size:26px}
input[type=range]{accent-color:var(--cyan)}
.num{font-variant-numeric:tabular-nums}

/* ===== 参加者システム ===== */
.turnpill{display:none;align-items:center;gap:8px;font-weight:800;font-size:clamp(14px,1.8vw,18px);
  padding:8px 16px;border-radius:999px;background:linear-gradient(180deg,var(--cyan),#1fbdb3);color:#04201e;border:none}
.turnpill b{font-weight:900}
.hubturn{display:none;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:clamp(14px,2vw,24px);
  padding:14px 20px;border-radius:18px;background:linear-gradient(160deg,var(--panel2),var(--panel));
  border:1.5px solid var(--line);font-size:clamp(16px,2vw,22px)}
.hubturn b{font-family:"Mochiy Pop One";color:var(--cyan);font-size:1.25em}
.hubturn .muted{color:var(--muted);font-size:.8em;font-weight:600}
.modal{position:fixed}
.result.wide{max-width:540px}
.reg-title{font-family:"Mochiy Pop One";font-size:clamp(24px,4vw,34px);margin-bottom:14px}
.reg-count{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;font-weight:800;font-size:18px}
.reg-count .btn{padding:8px 18px;font-size:22px}
.reg-num{font-family:"Mochiy Pop One";font-size:34px;min-width:54px}
.reg-list{display:flex;flex-direction:column;gap:10px;max-height:46vh;overflow:auto;margin-bottom:18px;padding:2px}
.reg-row{display:flex;align-items:center;gap:8px}
.reg-idx{width:34px;height:34px;flex:none;border-radius:50%;background:var(--panel2);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-family:"Mochiy Pop One"}
.reg-input{flex:1;min-width:0;font-family:inherit;font-size:18px;font-weight:700;color:var(--ink);
  background:var(--bg2);border:1.5px solid var(--line);border-radius:12px;padding:12px 14px}
.reg-input:focus{outline:none;border-color:var(--cyan)}
.btn.mini{padding:10px 12px;font-size:16px;border-radius:12px}
.btn.mini.on{background:var(--cyan);color:#04201e;border-color:transparent;font-weight:900}
.lb-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;max-height:54vh;overflow:auto}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;
  background:var(--bg2);border:1.5px solid var(--line);text-align:left}
.lb-row.turn{border-color:var(--cyan);background:linear-gradient(160deg,rgba(52,225,214,.12),var(--bg2))}
.lb-rank{font-size:22px;min-width:42px;text-align:center}
.lb-name{flex:1;font-weight:800;font-size:18px}
.lb-name small{color:var(--cyan);font-weight:700;font-size:13px}
.lb-score{font-family:"Mochiy Pop One";font-size:26px;color:var(--lime)}
.lb-score small{font-size:14px;color:var(--muted);margin-left:2px}
.lb-plays{color:var(--muted);font-size:13px;min-width:42px;text-align:right}
.lb-det{grid-template-columns:1fr auto 1fr auto;gap:4px 14px;padding:4px 16px 12px 52px;text-align:left;font-size:14px;color:var(--muted)}
.lb-det b{color:var(--ink);font-weight:800}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>
<div class="app">
  <!-- HUB -->
  <main class="hub" id="hub">
    <div class="hub-head">
      <div class="brand">
        <div class="kicker">電子黒板で遊ぶ・ペン/タッチ対応</div>
        <h1>目分量アリーナ</h1>
        <div class="sub">目・手・タイミングの精度で競う 6番勝負。チームでも個人でも。</div>
      </div>
      <div class="toolbar">
        <button class="btn ghost" id="regBtn">👥 参加者登録</button>
        <button class="btn primary" id="battleBtn">⚔️ バトル開始</button>
        <button class="btn ghost" id="lbBtn">📊 結果を見る</button>
        <button class="btn ghost" id="fsBtn">⛶ 全画面</button>
      </div>
    </div>
    <div class="hubturn" id="hubTurn"></div>
    <div class="grid" id="grid"></div>
  </main>

  <!-- GAME SHELL -->
  <section class="game" id="game">
    <div class="topbar">
      <button class="btn" id="backBtn">← ゲーム選択</button>
      <div class="title"><span class="dot" id="gDot"></span><span id="gTitle">ゲーム</span></div>
      <div id="turnPill" class="turnpill"></div>
      <div class="spacer"></div>
      <div id="gTools" class="toolbar"></div>
    </div>
    <div class="gwrap" id="gwrap"></div>
  </section>
</div>
<div class="toast" id="toast"></div>

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}

function medalFor(s){ if(s>=95)return['🏆','パーフェクト級！']; if(s>=85)return['🥇','名人！']; if(s>=70)return['🥈','お見事']; if(s>=50)return['🥉','まずまず']; return['💪','ドンマイ！']; }
function scoreColor(s){ if(s>=85)return getCss('--lime'); if(s>=60)return getCss('--cyan'); if(s>=40)return getCss('--amber'); return getCss('--coral'); }

/* =========================================================================
   参加者（ターン制）システム — 全ゲーム共通
   ========================================================================= */
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const Players={ list:[], turn:0, active:false };
let Teams=[]; // 合算チーム（複数作成可）: {name, members:[playerIndex...]}
let CurrentChallenge='';   // スコア内訳に使うラベル
let BattleForce=null;      // {gid, mode?, shape?}（バトルでゲーム設定を固定）
const BATTLE_EVENTS=[
  {gid:'precision', label:'角度',     force:{gid:'precision',mode:'angle'}},
  {gid:'precision', label:'長さ',     force:{gid:'precision',mode:'length'}},
  {gid:'shapes',    label:'正三角形', force:{gid:'shapes',shape:'triangle'}},
  {gid:'shapes',    label:'正方形',   force:{gid:'shapes',shape:'square'}},
  {gid:'shapes',    label:'円',       force:{gid:'shapes',shape:'circle'}},
  {gid:'copy',      label:'文字写し', force:null},
  {gid:'maze',      label:'イライラ棒', force:null},
  {gid:'timer',     label:'時間ピッタリ', force:{gid:'timer'}},
  {gid:'fukuwarai', label:'福笑い',   force:null},
];
const Battle={ active:false, seq:[], stage:0 };

function playersCurrent(){ return (Players.active && Players.list.length) ? Players.list[Players.turn] : null; }
function playersRecord(score){
  if(!Players.active || !Players.list.length) return null;
  const i=Players.turn, pl=Players.list[i], g=clamp(round(score),0,100);
  pl.total+=g; pl.plays++; pl.log.push({label:CurrentChallenge||'プレイ', score:g});
  if(!Battle.active) Players.turn=(i+1)%Players.list.length; // バトル中はbattleNextが進める
  return {name:pl.name, gained:g, total:pl.total, nextName: Battle.active?null:Players.list[Players.turn].name};
}
function refreshTurnPill(){ const p=$('#turnPill'); if(!p)return; const c=playersCurrent();
  if(!c){ p.style.display='none'; return; } p.style.display='inline-flex';
  if(Battle.active){ const st=Battle.seq[Battle.stage]; p.innerHTML=`⚔️ ${Battle.stage+1}/${Battle.seq.length} ${esc(st.label)}・<b>${esc(c.name)}</b>さん`; }
  else p.innerHTML=`▶ <b>${esc(c.name)}</b> さんの番`; }
function refreshHubTurn(){ const h=$('#hubTurn'); if(!h)return; const c=playersCurrent();
  if(c && !Battle.active){ h.style.display='flex'; h.innerHTML=`▶ いまの番は <b>${esc(c.name)}</b> さん <span class="muted">（${Players.list.length}人で対戦中・ゲームを選んでね）</span>`; }
  else h.style.display='none'; }

/* ---- バトルモード ---- */
function gameById(id){ return GAMES.find(g=>g.id===id); }
function battleStart(){
  if(!Players.active || !Players.list.length){ toast('先に参加者を登録してね'); openRegistration(); return; }
  openBattleSetup();
}
function startBattleWith(seq){
  if(!seq || !seq.length){ toast('種目を1つ以上えらんでね'); return; }
  Battle.active=true; Battle.seq=seq.slice(); Battle.stage=0; Players.turn=0;
  toast('バトル開始！①「'+seq[0].label+'」'); battleLaunch();
}
function openBattleSetup(){
  if(!Players.active || !Players.list.length){ openRegistration(); return; }
  let items = BATTLE_EVENTS.map(e=>({...e, on:true}));
  const ov=el('div','overlay modal show'); const box=el('div','result wide');
  box.appendChild(el('div','reg-title','⚔️ バトルの種目をえらぶ'));
  box.appendChild(el('div','detail',`${Players.list.length}人で対戦。選んだ種目を上から順に、各種目を全員が1回ずつプレイ→自動で次の種目へ進みます。`));
  const list=el('div','reg-list');
  function render(){ list.innerHTML='';
    let n=0;
    items.forEach((it,i)=>{ const r=el('div','reg-row');
      const tg=el('button','btn mini'+(it.on?' on':'')); tg.textContent=it.on?'✓':'　'; tg.style.width='44px';
      tg.onclick=()=>{ it.on=!it.on; render(); };
      if(it.on)n++;
      const nm=el('div','reg-input'); nm.style.cssText='display:flex;align-items:center;cursor:default'; nm.textContent=(it.on?(items.slice(0,i+1).filter(x=>x.on).length)+'. ':'　 ')+it.label; if(!it.on)nm.style.opacity='.4';
      const up=el('button','btn mini','▲'); up.onclick=()=>{ if(i>0){[items[i-1],items[i]]=[items[i],items[i-1]];render();} };
      const dn=el('button','btn mini','▼'); dn.onclick=()=>{ if(i<items.length-1){[items[i+1],items[i]]=[items[i],items[i+1]];render();} };
      r.appendChild(tg);r.appendChild(nm);r.appendChild(up);r.appendChild(dn); list.appendChild(r);
    });
  }
  render(); box.appendChild(list);
  const row=el('div','row');
  const start=el('button','btn primary','このバトルを開始 →'); start.onclick=()=>{ const seq=items.filter(x=>x.on).map(x=>({gid:x.gid,label:x.label,force:x.force})); if(!seq.length){toast('種目を1つ以上えらんでね');return;} ov.remove(); startBattleWith(seq); };
  const cancel=el('button','btn ghost','閉じる'); cancel.onclick=()=>ov.remove();
  row.appendChild(start);row.appendChild(cancel);
  box.appendChild(row); ov.appendChild(box); document.body.appendChild(ov);
}
function battleLaunch(){ const st=Battle.seq[Battle.stage];
  CurrentChallenge=st.label; BattleForce=st.force; openGame(gameById(st.gid)); }
function battlePeek(){ let t=(Players.turn+1)%Players.list.length, s=Battle.stage;
  if(t===0)s++; if(s>=Battle.seq.length)return{done:true};
  return {done:false, name:Players.list[t].name, label:Battle.seq[s].label}; }
function battleNext(){ const t=(Players.turn+1)%Players.list.length;
  Players.turn=t; if(t===0)Battle.stage++;
  if(Battle.stage>=Battle.seq.length){ battleFinish(); return; }
  battleLaunch(); }
function battleFinish(){ Battle.active=false; BattleForce=null; backToHub(); openLeaderboard(true); }

function openRegistration(){
  let count = Players.list.length || 4;
  let names = Players.list.length ? Players.list.map(p=>p.name) : [];
  const ov=el('div','overlay modal show'); const box=el('div','result wide');
  box.appendChild(el('div','reg-title','👥 参加者登録'));
  const cRow=el('div','reg-count');
  const lbl=el('span',null,'人数'); const minus=el('button','btn','－'); const cNum=el('div','reg-num',String(count)); const plus=el('button','btn','＋');
  cRow.appendChild(lbl);cRow.appendChild(minus);cRow.appendChild(cNum);cRow.appendChild(plus);
  box.appendChild(cRow);
  const hintEl=el('div','detail','名前を入れて、▲▼で順番を決めてね（空欄は自動で名前が付きます）'); box.appendChild(hintEl);
  const listWrap=el('div','reg-list'); box.appendChild(listWrap);
  function sync(){ listWrap.querySelectorAll('.reg-input').forEach((inp,i)=>names[i]=inp.value); }
  function render(){ listWrap.innerHTML='';
    for(let i=0;i<count;i++){ const r=el('div','reg-row');
      const idx=el('div','reg-idx',String(i+1));
      const inp=el('input','reg-input'); inp.type='text'; inp.placeholder='プレイヤー'+(i+1); inp.value=names[i]||''; inp.maxLength=12;
      const up=el('button','btn mini','▲'); up.onclick=()=>{ if(i>0){ sync(); [names[i-1],names[i]]=[names[i],names[i-1]]; render(); } };
      const dn=el('button','btn mini','▼'); dn.onclick=()=>{ if(i<count-1){ sync(); [names[i+1],names[i]]=[names[i],names[i+1]]; render(); } };
      r.appendChild(idx);r.appendChild(inp);r.appendChild(up);r.appendChild(dn); listWrap.appendChild(r);
    } }
  minus.onclick=()=>{ if(count>2){ sync(); count--; cNum.textContent=count; render(); } };
  plus.onclick=()=>{ if(count<20){ sync(); count++; cNum.textContent=count; render(); } };
  render();
  const row=el('div','row');
  const shuf=el('button','btn ghost','順番シャッフル'); shuf.onclick=()=>{ sync(); for(let i=count-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[names[i],names[j]]=[names[j],names[i]];} render(); };
  const cancel=el('button','btn ghost','閉じる'); cancel.onclick=()=>ov.remove();
  function doRegister(){ sync(); Players.list=[]; Teams=[]; for(let i=0;i<count;i++){ const nm=(names[i]||'').trim()||('プレイヤー'+(i+1)); Players.list.push({name:nm,total:0,plays:0,log:[]}); }
    Players.turn=0; Players.active=true; Battle.active=false; BattleForce=null; buildHub(); refreshHubTurn(); refreshTurnPill(); }
  const regOnly=el('button','btn','登録だけ'); regOnly.onclick=()=>{ doRegister(); ov.remove(); toast('登録完了！'+Players.list[0].name+'さんから！'); };
  const toBattle=el('button','btn primary','⚔️ 種目をえらぶ →'); toBattle.onclick=()=>{ doRegister(); ov.remove(); openBattleSetup(); };
  row.appendChild(shuf);row.appendChild(cancel);row.appendChild(regOnly);row.appendChild(toBattle);
  box.appendChild(row); ov.appendChild(box); document.body.appendChild(ov);
}

function openLeaderboard(final){
  const ov=el('div','overlay modal show'); const box=el('div','result wide');
  box.appendChild(el('div','reg-title', final?'🏆 さいしゅう結果':'📊 とちゅう経過（点数の内訳はタップ）'));
  if(!Players.active || !Players.list.length){
    box.appendChild(el('div','detail','まだ参加者がいません。「参加者登録」から登録してね。'));
  } else {
    const ranked=Players.list.map((p,i)=>({p,i})).sort((a,b)=>b.p.total-a.p.total);
    const list=el('div','lb-list');
    ranked.forEach(({p,i},rank)=>{ const isTurn=(!Battle.active && !final && i===Players.turn);
      const wrap=el('div',null);
      const r=el('div','lb-row'+(isTurn?' turn':'')); r.style.cursor='pointer';
      const medal=['🥇','🥈','🥉'][rank]||('<span style="color:var(--muted);font-weight:800">'+(rank+1)+'位</span>');
      r.innerHTML=`<span class="lb-rank">${medal}</span><span class="lb-name">${esc(p.name)}${isTurn?' <small>◀ 次の番</small>':''}</span><span class="lb-score">${p.total}<small>点</small></span><span class="lb-plays">▾${p.plays}回</span>`;
      const det=el('div','lb-det'); det.style.display='none';
      det.innerHTML = p.log.length ? p.log.map(e=>`<span>${esc(e.label)}</span><b>${e.score}</b>`).join('') : '<span>まだプレイなし</span>';
      r.onclick=()=>{ det.style.display = det.style.display==='none'?'grid':'none'; };
      wrap.appendChild(r); wrap.appendChild(det); list.appendChild(wrap);
    });
    box.appendChild(list);
  }
  const row=el('div','row');
  const close=el('button','btn primary','とじる'); close.onclick=()=>ov.remove(); row.appendChild(close);
  if(Players.active && Players.list.length){
    const comb=el('button','btn ghost','➕ メンバー合算'); comb.onclick=()=>{ ov.remove(); openCombine(); }; row.appendChild(comb);
    let armed=false; const reset=el('button','btn ghost','スコアをリセット');
    reset.onclick=()=>{ if(!armed){armed=true;reset.textContent='もう一度押すと0に戻す';return;} Players.list.forEach(p=>{p.total=0;p.plays=0;p.log=[];});Players.turn=0;ov.remove();refreshHubTurn();refreshTurnPill();toast('スコアをリセットしました'); };
    const re=el('button','btn ghost','参加者を変更'); re.onclick=()=>{ ov.remove(); openRegistration(); };
    let armed2=false; const clr=el('button','btn ghost','参加者リセット');
    clr.onclick=()=>{ if(!armed2){armed2=true;clr.textContent='もう一度押すと全消去';return;} Players.list=[];Players.turn=0;Players.active=false;Teams=[];Battle.active=false;BattleForce=null;ov.remove();refreshHubTurn();refreshTurnPill();toast('参加者をリセットしました'); };
    row.appendChild(reset);row.appendChild(re);row.appendChild(clr);
  } else {
    const reg=el('button','btn ghost','参加者登録へ'); reg.onclick=()=>{ ov.remove(); openRegistration(); }; row.appendChild(reg);
  }
  box.appendChild(row); ov.appendChild(box); document.body.appendChild(ov);
}

function teamStats(members){ let tot=0; const byLabel={};
  members.forEach(i=>{ const p=Players.list[i]; if(!p)return; tot+=p.total; p.log.forEach(e=>{byLabel[e.label]=(byLabel[e.label]||0)+e.score;}); });
  return {tot,byLabel}; }
function openCombine(){
  const ov=el('div','overlay modal show'); const box=el('div','result wide');
  box.appendChild(el('div','reg-title','➕ メンバー合算（チーム）'));
  box.appendChild(el('div','detail','メンバーを選んで「チームを作る」。チームは何個でも作れます。'));

  // 既存チーム一覧（合計の高い順）
  const teamsWrap=el('div','lb-list'); box.appendChild(teamsWrap);
  // 新規チーム作成エリア
  const sel=new Set();
  box.appendChild(el('div','label','新しいチーム'));
  const nameInp=el('input','reg-input'); nameInp.type='text'; nameInp.placeholder='チーム名（任意）'; nameInp.maxLength=12; nameInp.style.marginBottom='8px';
  box.appendChild(nameInp);
  const picker=el('div','lb-list'); box.appendChild(picker);
  Players.list.forEach((p,i)=>{ const r=el('label','lb-row'); r.style.cursor='pointer';
    const cb=el('input'); cb.type='checkbox'; cb.style.cssText='width:22px;height:22px;flex:none;accent-color:var(--cyan)';
    cb.onchange=()=>{ cb.checked?sel.add(i):sel.delete(i); r.classList.toggle('turn',cb.checked); updatePreview(); };
    const nm=el('span','lb-name',esc(p.name)); const sc=el('span','lb-score',p.total+'<small>点</small>');
    r.appendChild(cb);r.appendChild(nm);r.appendChild(sc); picker.appendChild(r);
  });
  const preview=el('div','detail','（メンバーを選んでね）'); preview.style.margin='4px 0 10px'; box.appendChild(preview);
  function updatePreview(){ if(!sel.size){preview.textContent='（メンバーを選んでね）';return;}
    const {tot}=teamStats([...sel]); preview.innerHTML=`合計 <b style="color:var(--lime)">${tot}</b> 点（${[...sel].map(i=>esc(Players.list[i].name)).join('＋')}）`; }
  const mkRow=el('div','row');
  const makeBtn=el('button','btn primary','このメンバーでチームを作る ➕');
  makeBtn.onclick=()=>{ if(!sel.size){toast('メンバーを選んでね');return;}
    const nm=(nameInp.value||'').trim()||('チーム'+(Teams.length+1));
    Teams.push({name:nm, members:[...sel]});
    sel.clear(); nameInp.value=''; picker.querySelectorAll('input').forEach(c=>c.checked=false); picker.querySelectorAll('.lb-row').forEach(r=>r.classList.remove('turn'));
    updatePreview(); renderTeams(); toast('「'+nm+'」を作成'); };
  mkRow.appendChild(makeBtn); box.appendChild(mkRow);

  function renderTeams(){ teamsWrap.innerHTML='';
    if(!Teams.length){ teamsWrap.appendChild(el('div','detail','まだチームがありません。下で作成してね。')); return; }
    const ranked=Teams.map((t,idx)=>({t,idx,...teamStats(t.members)})).sort((a,b)=>b.tot-a.tot);
    ranked.forEach((e,rank)=>{ const medal=['🥇','🥈','🥉'][rank]||('<span style="color:var(--muted);font-weight:800">'+(rank+1)+'</span>');
      const wrap=el('div',null);
      const r=el('div','lb-row'); r.style.cursor='pointer';
      const mem=e.t.members.map(i=>esc(Players.list[i]?Players.list[i].name:'?')).join('・');
      r.innerHTML=`<span class="lb-rank">${medal}</span><span class="lb-name">${esc(e.t.name)} <small style="color:var(--muted);font-weight:600">${mem}</small></span><span class="lb-score">${e.tot}<small>点</small></span>`;
      const del=el('button','btn mini','✕'); del.style.flex='none'; del.onclick=(ev)=>{ev.stopPropagation(); Teams.splice(e.idx,1); renderTeams();};
      r.appendChild(del);
      const det=el('div','lb-det'); det.style.display='none';
      det.innerHTML=Object.entries(e.byLabel).map(([k,v])=>`<span>${esc(k)}</span><b>${v}</b>`).join('')||'<span>記録なし</span>';
      r.onclick=()=>{ det.style.display=det.style.display==='none'?'grid':'none'; };
      wrap.appendChild(r); wrap.appendChild(det); teamsWrap.appendChild(wrap);
    });
  }
  renderTeams();

  const row=el('div','row');
  const close=el('button','btn primary','とじる'); close.onclick=()=>ov.remove();
  const back=el('button','btn ghost','結果へ戻る'); back.onclick=()=>{ ov.remove(); openLeaderboard(); };
  if(Teams.length){ let armed=false; const clr=el('button','btn ghost','全チーム消去'); clr.onclick=()=>{ if(!armed){armed=true;clr.textContent='もう一度で全消去';return;} Teams=[]; renderTeams(); clr.textContent='全チーム消去'; armed=false; }; row.appendChild(close);row.appendChild(back);row.appendChild(clr); }
  else { row.appendChild(close);row.appendChild(back); }
  box.appendChild(row); ov.appendChild(box); document.body.appendChild(ov);
}

/* レスポンシブcanvas（CSSピクセル座標で描ける） */
function makeCanvas(parent){
  const c=el('canvas'); c.style.width='100%'; c.style.height='100%'; c.style.display='block'; c.style.touchAction='none'; parent.appendChild(c);
  c.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
  c.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  const ctx=c.getContext('2d');
  function fit(){
    const r=c.getBoundingClientRect();
    const dpr=Math.min(window.devicePixelRatio||1,2);
    c.width=Math.max(1,Math.round(r.width*dpr));
    c.height=Math.max(1,Math.round(r.height*dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  const api={c,ctx,fit,onResize:null,W:()=>c.getBoundingClientRect().width,H:()=>c.getBoundingClientRect().height};
  // 表示サイズが変わったら（フォント読込・レイアウト変化・URLバー開閉・回転など）
  // バッファを合わせ直して再描画。これで縦横比のズレ（伸び）を防ぐ。
  if(window.ResizeObserver){ let lw=0,lh=0,scheduled=false;
    const ro=new ResizeObserver(()=>{ if(scheduled)return; scheduled=true;
      requestAnimationFrame(()=>{ scheduled=false; const r=c.getBoundingClientRect();
        if(Math.abs(r.width-lw)<0.5 && Math.abs(r.height-lh)<0.5) return; lw=r.width; lh=r.height;
        fit(); if(typeof api.onResize==='function'){try{api.onResize();}catch(e){}} }); });
    ro.observe(c); api._ro=ro; }
  return api;
}
/* ポインタ座標（要素ローカル, CSSピクセル） */
function localPos(elm,e){const r=elm.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top};}

/* 幾何ヘルパ */
function pointSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay; const len2=dx*dx+dy*dy||1e-6;
  let t=((px-ax)*dx+(py-ay)*dy)/len2; t=clamp(t,0,1);
  return Math.hypot(px-(ax+dx*t),py-(ay+dy*t));
}
function resample(pts,n){
  if(pts.length<2)return pts.slice();
  let total=0; for(let i=1;i<pts.length;i++)total+=dist(pts[i-1].x,pts[i-1].y,pts[i].x,pts[i].y);
  const step=total/(n-1); const out=[pts[0]]; let d=0,i=1,prev=pts[0];
  while(out.length<n && i<pts.length){
    const seg=dist(prev.x,prev.y,pts[i].x,pts[i].y);
    if(d+seg>=step){ const t=(step-d)/seg; const np={x:prev.x+(pts[i].x-prev.x)*t,y:prev.y+(pts[i].y-prev.y)*t};
      out.push(np); prev=np; d=0;
    } else { d+=seg; prev=pts[i]; i++; }
  }
  while(out.length<n)out.push(pts[pts.length-1]);
  return out;
}

/* =========================================================================
   結果オーバーレイ（精度ゲージ）— ゲーム1〜3,6で共用
   ========================================================================= */
function showResult(parent,{score,label,detail,buttons,ghost,noRecord,bigDetail}){
  score=clamp(round(score),0,100);
  const ov=el('div','overlay show');
  const box=el('div','result');
  const [med,mlabel]=medalFor(score);
  box.appendChild(el('div','medal',med));
  const gaugeC=el('canvas'); gaugeC.width=600; gaugeC.height=340; gaugeC.style.width='min(440px,82vw)'; gaugeC.style.height='auto'; gaugeC.style.margin='0 auto';
  box.appendChild(gaugeC);
  const sEl=el('div','score','0'); box.appendChild(sEl);
  box.appendChild(el('div','label',label||mlabel));
  if(detail)box.appendChild(el('div',bigDetail?'detail big':'detail',detail));
  // 参加者モード：スコアを加算して順番を進める
  const rec = noRecord ? null : playersRecord(score);
  if(rec){ const t=el('div','detail'); t.style.cssText='color:var(--ink);font-weight:700';
    if(Battle.active){ const pk=battlePeek();
      t.innerHTML = pk.done
        ? `🏅 <b>${esc(rec.name)}</b> に +${rec.gained}点（合計 <b style="color:var(--lime)">${rec.total}</b>）<br>これで全ステージ終了！`
        : `🏅 <b>${esc(rec.name)}</b> に +${rec.gained}点（合計 <b style="color:var(--lime)">${rec.total}</b>）<br>つぎは「${esc(pk.label)}」<b style="color:var(--cyan)">${esc(pk.name)}</b>さん`;
    } else {
      t.innerHTML=`🏅 <b>${esc(rec.name)}</b> に +${rec.gained}点（合計 <b style="color:var(--lime)">${rec.total}</b>）<br>つぎは <b style="color:var(--cyan)">${esc(rec.nextName)}</b> さんの番`;
    }
    box.appendChild(t); refreshTurnPill(); refreshHubTurn();
  }
  const row=el('div','row');
  if(Battle.active && rec){
    const pk=battlePeek();
    const cmp=(buttons||[]).find(b=>b.text==='重ねて見る');
    const nb=el('button','btn primary', pk.done?'結果発表 →':'つぎへ →'); nb.onclick=()=>{ov.remove(); battleNext();}; row.appendChild(nb);
    if(cmp){ const cb=el('button','btn ghost','重ねて見る'); cb.onclick=()=>{ov.remove(); if(cmp.onClick)cmp.onClick(); showPeek(parent, pk.done?'結果発表 →':'つぎへ →', battleNext);}; row.appendChild(cb); }
    const lb2=el('button','btn ghost','とちゅう経過'); lb2.onclick=()=>{ov.remove(); openLeaderboard();}; row.appendChild(lb2);
    const qb=el('button','btn ghost','バトル中断'); qb.onclick=()=>{ov.remove(); Battle.active=false; BattleForce=null; backToHub();}; row.appendChild(qb);
  } else if(rec){
    // 参加者モード（個別ゲーム）：採点後は次のプレイヤーへ進む
    const primary = (buttons && buttons[0]) ? buttons[0] : {onClick:null};
    const nb=el('button','btn primary','つぎの人へ →'); nb.onclick=()=>{ov.remove(); primary.onClick&&primary.onClick();}; row.appendChild(nb);
    const cmp=(buttons||[]).find(b=>b.text==='重ねて見る');
    if(cmp){ const cb=el('button','btn ghost','重ねて見る'); cb.onclick=()=>{ov.remove(); if(cmp.onClick)cmp.onClick(); showPeek(parent, 'つぎの人へ →', primary.onClick);}; row.appendChild(cb); }
    const rb=el('button','btn ghost','結果を見る'); rb.onclick=()=>{ov.remove(); openLeaderboard();}; row.appendChild(rb);
  } else {
    (buttons||[]).forEach(b=>{const bt=el('button','btn '+(b.cls||''),b.text); bt.onclick=()=>{ov.remove(); b.onClick&&b.onClick();}; row.appendChild(bt);});
  }
  box.appendChild(row);
  ov.appendChild(box); parent.appendChild(ov);

  // ゲージ描画＋針アニメ
  const gx=gaugeC.getContext('2d'); const col=scoreColor(score);
  let shown=0; const t0=performance.now();
  function draw(now){
    const p=clamp((now-t0)/900,0,1); const ease=1-Math.pow(1-p,3);
    shown=score*ease; gx.clearRect(0,0,600,340);
    const cx=300,cy=300,R=240;
    gx.lineCap='round';
    gx.beginPath(); gx.arc(cx,cy,R,Math.PI,TAU); gx.lineWidth=36; gx.strokeStyle='rgba(34,57,90,.13)'; gx.stroke();
    gx.beginPath(); gx.arc(cx,cy,R,Math.PI,Math.PI+Math.PI*(shown/100)); gx.lineWidth=36; gx.strokeStyle=col; gx.stroke();
    const ang=Math.PI+Math.PI*(shown/100);
    gx.beginPath(); gx.moveTo(cx,cy); gx.lineTo(cx+Math.cos(ang)*(R-12),cy+Math.sin(ang)*(R-12)); gx.lineWidth=10; gx.strokeStyle='#22394F'; gx.stroke();
    gx.beginPath(); gx.arc(cx,cy,16,0,TAU); gx.fillStyle='#22394F'; gx.fill();
    sEl.textContent=round(shown); sEl.style.color=col;
    if(p<1)requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
  if(ghost)ghost();
  return ov;
}

/* =========================================================================
   ① 角度・長さ精度バトル
   ========================================================================= */
reg({
  id:'precision', no:'01', ic:'📐', color:'--g1', name:'角度・長さ精度バトル',
  desc:'指定された角度や長さを目分量で。ズレがそのままスコアに。',
  mount(){

    wrap.firstChild.appendChild(top);

    });

    const cwrap=el('div',null); cwrap.style.cssText='flex:1;min-height:0;position:relative';
    top.appendChild(cwrap);
    const cv=makeCanvas(cwrap);

    const ctrls=el('div','controls');
    const targetChip=el('div','target-chip','—');
    const hint=el('div','hint','頂点からドラッグして線を引こう');
    const left=el('div',null,''); left.style.cssText='display:flex;align-items:center;gap:14px;flex-wrap:wrap';
    left.appendChild(seg); left.appendChild(targetChip);
    ctrls.appendChild(left);
    const sp=el('div',null);sp.style.flex='1';ctrls.appendChild(sp);
    ctrls.appendChild(hint);
    const redoLbl=el('div','pill','書き直し のこり2回');
    const clearBtn=el('button','btn','けす'); const scoreBtn=el('button','btn primary','採点する');
    ctrls.appendChild(redoLbl); ctrls.appendChild(clearBtn); ctrls.appendChild(scoreBtn);
    top.appendChild(ctrls);

    let vertex={x:0,y:0}, refA={x:0,y:0}, refB={x:0,y:0}; // length基準線
    let userPts=[], drawing=false, locked=false;
    const MAX_REDO=2; let redosLeft=MAX_REDO, committed=false;
    function updateRedo(){ redoLbl.textContent='書き直し のこり'+redosLeft+'回'; redoLbl.style.opacity=redosLeft>0?'1':'.45'; }

    function layout(){ cv.fit(); const W=cv.W(),H=cv.H();
      vertex={x:W*0.5,y:H*0.5};
      refA={x:W*0.30,y:H*0.45}; refB={x:W*0.30+refLen,y:H*0.45};
      redraw();
    }
    function newRound(){
      mode = (modeSel==='mix') ? pick(['angle','length']) : modeSel;
      locked=false; userPts=[]; redosLeft=MAX_REDO; committed=false; updateRedo();
      if(mode==='angle'){ let a=round(rnd(20,340)/5)*5; if(a>=170&&a<=190)a=(Math.random()<.5?160:200); target=a; targetChip.innerHTML=`目標 <span style="color:var(--g1)">${target}°</span>`; hint.textContent='頂点からドラッグ→「採点する」。180°より大きい角は下側に引いてね';}
      else { target=pick([0.5,0.7,1.5,2,2.5,3,3.5,4]); targetChip.innerHTML=`基準の <span style="color:var(--g1)">×${target}</span> の長さ`; hint.textContent='基準の◯倍を1本→「採点する」。引き直しOK';}
      layout();
    }

    function redraw(){
      const g=cv.ctx,W=cv.W(),H=cv.H(); g.clearRect(0,0,W,H);
      if(mode==='angle'){
        // 固定の基準辺（右方向）
        g.strokeStyle='rgba(34,57,90,.55)'; g.lineWidth=12; g.lineCap='round';
        const _blen=Math.max(160,Math.min(W*0.5-220,780));
        g.beginPath(); g.moveTo(vertex.x,vertex.y); g.lineTo(vertex.x+_blen,vertex.y); g.stroke();
        // 左回り（反時計回り）の向き矢印：頂点がない側＝基準辺の先端に配置して、頂点からのドラッグの邪魔にならないようにする
        (function(){ const cx=vertex.x+_blen, cy=vertex.y; // 頂点がない方の端
          const r=120, a0=-26*Math.PI/180, a1=-70*Math.PI/180, N=22;
          g.save(); g.strokeStyle=getCss('--g1'); g.lineWidth=12; g.lineCap='round'; g.lineJoin='round';
          g.beginPath();
          for(let i=0;i<=N;i++){ const ang=a0+(a1-a0)*i/N, x=cx+Math.cos(ang)*r, y=cy+Math.sin(ang)*r; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
          g.stroke();
          const ap=a0+(a1-a0)*(N-1)/N;
          const ax=cx+Math.cos(a1)*r, ay=cy+Math.sin(a1)*r; // 弧の終点
          let dx=ax-(cx+Math.cos(ap)*r), dy=ay-(cy+Math.sin(ap)*r); const L=Math.hypot(dx,dy)||1; dx/=L; dy/=L; // 終点の進行方向
          const ex=ax+dx*21, ey=ay+dy*21; // 三角形の先端を弧の終端より少し前にずらす
          const rot=(x,y,d)=>{const rr=d*Math.PI/180,c=Math.cos(rr),s=Math.sin(rr);return {x:x*c-y*s,y:x*s+y*c};};
          const b1=rot(-dx,-dy,26), b2=rot(-dx,-dy,-26), al=45;
          g.fillStyle=getCss('--g1');
          g.beginPath(); g.moveTo(ex,ey); g.lineTo(ex+b1.x*al,ey+b1.y*al); g.lineTo(ex+b2.x*al,ey+b2.y*al); g.closePath(); g.fill();
          g.fillStyle=getCss('--g1'); g.font='800 39px "Zen Maru Gothic"'; g.textAlign='center'; g.textBaseline='middle';
          g.fillText('左回り', cx+Math.cos(-102*Math.PI/180)*(r+60), cy+Math.sin(-102*Math.PI/180)*(r+60));
          g.restore();
        })();
        dot(g,vertex.x,vertex.y,getCss('--g1'));
        label(g,'頂点',vertex.x-45,vertex.y+72);
      } else {
        g.strokeStyle='rgba(34,57,90,.7)'; g.lineWidth=18; g.lineCap='round';
        g.beginPath(); g.moveTo(refA.x,refA.y); g.lineTo(refB.x,refB.y); g.stroke();
        label(g,'基準 ×1',refA.x,refA.y-48);
      }
      if(userPts.length>1){
        g.strokeStyle=getCss('--g1'); g.lineWidth=5; g.lineCap='round';
        g.beginPath(); g.moveTo(userPts[0].x,userPts[0].y); for(const p of userPts)g.lineTo(p.x,p.y); g.stroke();
      }
    }
    function drawGrid(g,W,H){ g.strokeStyle='rgba(46,95,143,.08)'; g.lineWidth=1;
      for(let x=0;x<W;x+=48){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();}
      for(let y=0;y<H;y+=48){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke();} }
    function dot(g,x,y,c){g.fillStyle=c;g.beginPath();g.arc(x,y,24,0,TAU);g.fill();}
    function label(g,t,x,y){g.fillStyle='rgba(34,57,90,.65)';g.font='600 45px "Zen Maru Gothic"';g.fillText(t,x,y);}

    // 入力
    const c=cv.c;
    function down(e){ if(locked)return;
      if(committed){ if(redosLeft<=0){ toast('書き直しは2回までだよ。採点してね'); return; } redosLeft--; committed=false; updateRedo(); }
      c.setPointerCapture(e.pointerId); drawing=true; const p=localPos(c,e);
      if(mode==='angle'){ userPts=[{x:vertex.x,y:vertex.y},p]; } else { userPts=[p,p]; } redraw();}
    function move(e){ if(!drawing)return; const p=localPos(c,e);
      if(mode==='angle'){ userPts=[{x:vertex.x,y:vertex.y},p]; } else { userPts=[userPts[0],p]; } redraw();}
    function up(e){ if(!drawing)return; drawing=false;
      const b=userPts[0], a=userPts[userPts.length-1];
      if(userPts.length>=2 && Math.hypot(a.x-b.x,a.y-b.y)>12) committed=true; }
    c.addEventListener('pointerdown',down); c.addEventListener('pointermove',move); c.addEventListener('pointerup',up); c.addEventListener('pointercancel',up);
    clearBtn.onclick=()=>{ if(locked)return;
      if(committed){ if(redosLeft<=0){ toast('書き直しは2回までだよ。採点してね'); return; } redosLeft--; committed=false; updateRedo(); }
      userPts=[]; redraw(); };
    scoreBtn.onclick=()=>{ if(locked)return; if(userPts.length<2){toast('まず線を引いてね');return;} locked=true; evaluate(); };

    function drawProtractor(g,R,alpha,lower){
      const vx=vertex.x, vy=vertex.y, s=lower?1:-1;
      g.save(); g.globalAlpha=alpha;
      g.beginPath(); g.moveTo(vx,vy); if(lower) g.arc(vx,vy,R,0,Math.PI,false); else g.arc(vx,vy,R,Math.PI,Math.PI*2,false); g.closePath();
      g.fillStyle='rgba(46,95,143,.07)'; g.fill();
      g.beginPath(); if(lower) g.arc(vx,vy,R,0,Math.PI,false); else g.arc(vx,vy,R,Math.PI,Math.PI*2,false); g.lineWidth=2; g.strokeStyle='rgba(46,95,143,.55)'; g.stroke();
      g.beginPath(); g.moveTo(vx-R,vy); g.lineTo(vx+R,vy); g.lineWidth=1.5; g.strokeStyle='rgba(46,95,143,.4)'; g.stroke();
      g.textAlign='center'; g.textBaseline='middle';
      for(let d=0; d<=180; d+=10){
        const ang=s*d*Math.PI/180, major=(d%30===0); const r2=R-(major?17:9);
        g.beginPath(); g.moveTo(vx+Math.cos(ang)*R,vy+Math.sin(ang)*R); g.lineTo(vx+Math.cos(ang)*r2,vy+Math.sin(ang)*r2);
        g.lineWidth=major?2:1; g.strokeStyle='rgba(46,95,143,'+(major?'.7':'.4')+')'; g.stroke();
        if(major){ const tr=R-31; g.fillStyle='rgba(46,95,143,.85)'; g.font='600 13px "Zen Maru Gothic"';
          g.fillText(d, vx+Math.cos(ang)*tr, vy+Math.sin(ang)*tr); }
      }
      g.restore();
    }
    function sweepMeasure(measureDeg, lower, caption, done){
      const g=cv.ctx; const s=lower?1:-1; const targetScreenAng=s*measureDeg*Math.PI/180; const ccw=targetScreenAng<0;
      const R=Math.min(cv.W()*0.30-8, cv.H()*0.36, 200); const arcR=R*0.58;
      const t0=performance.now(), SET=440, SWEEP=1750;
      function frame(now){
        const e=now-t0; redraw();
        if(e<SET){ const a=clamp(e/SET,0,1); drawProtractor(g,R,1-Math.pow(1-a,3),lower); requestAnimationFrame(frame); return; }
        drawProtractor(g,R,1,lower);
        const st=clamp((e-SET)/SWEEP,0,1); const ease=st<.5?2*st*st:1-Math.pow(-2*st+2,2)/2;
        const curAng=targetScreenAng*ease, curDeg=measureDeg*ease;
        g.save();
        g.beginPath(); g.moveTo(vertex.x,vertex.y); g.arc(vertex.x,vertex.y,arcR,0,curAng,ccw); g.closePath();
        g.fillStyle='rgba(52,225,214,.22)'; g.fill();
        g.beginPath(); g.arc(vertex.x,vertex.y,arcR,0,curAng,ccw); g.lineWidth=4; g.lineCap='round'; g.strokeStyle=getCss('--g1'); g.stroke();
        g.beginPath(); g.moveTo(vertex.x,vertex.y); g.lineTo(vertex.x+Math.cos(curAng)*R,vertex.y+Math.sin(curAng)*R); g.lineWidth=3; g.strokeStyle=getCss('--g1'); g.stroke();
        const mid=curAng/2, lx=vertex.x+Math.cos(mid)*(R+26), ly=vertex.y+Math.sin(mid)*(R+26);
        g.fillStyle='#22394F'; g.font='800 30px "Mochiy Pop One"'; g.textAlign='center'; g.textBaseline='middle';
        g.fillText(round(curDeg)+'°', lx, ly);
        g.restore();
        if(st<1) requestAnimationFrame(frame); else { if(caption) caption(); setTimeout(done, caption?1000:380); }
      }
      requestAnimationFrame(frame);
    }
    function evaluate(){
      if(mode==='angle'){
        const a=userPts[userPts.length-1];
        const meas=(Math.atan2(-(a.y-vertex.y),(a.x-vertex.x))*180/Math.PI+360)%360; // 0..360（基準辺＝右, 上回りで計測）
        let err=Math.abs(meas-target); err=Math.min(err,360-err);
        const score=clamp(100-err*1.5,0,100);
        const detail=`目標 ${target}° / あなた ${meas.toFixed(1)}°（ズレ ${err.toFixed(1)}°）`;
        const reflex=meas>180;
        const ghost=()=>{ const g=cv.ctx; const r=Math.min(cv.W()*0.4,240); const ang=-target*Math.PI/180;
          g.strokeStyle=getCss('--lime'); g.setLineDash([8,8]); g.lineWidth=3;
          g.beginPath(); g.moveTo(vertex.x,vertex.y); g.lineTo(vertex.x+Math.cos(ang)*r,vertex.y+Math.sin(ang)*r); g.stroke(); g.setLineDash([]); };
        const finish=()=>{ ghost(); showResult(wrap,{score,label:'スコア（100点満点）',detail,bigDetail:true,buttons:[
          {text:'もう一度',cls:'primary',onClick:newRound},
          {text:'閉じる',cls:'ghost',onClick:()=>{locked=false;redraw();}}
        ]}); };
        if(reflex){
          const opp=360-meas; // 分度器で測れる「反対の角」
          const caption=()=>{ const g=cv.ctx; g.save(); g.textAlign='center'; g.textBaseline='middle';
            g.font='800 13px "Zen Maru Gothic"'; g.fillStyle='rgba(34,57,90,.7)'; g.fillText('反対の角を測って 360° から引く', cv.W()/2, cv.H()*0.10);
            g.font='800 30px "Mochiy Pop One"'; g.fillStyle='#22394F';
            g.fillText(`360° − ${round(opp)}° = ${round(meas)}°`, cv.W()/2, cv.H()*0.10+34); g.restore(); };
          sweepMeasure(opp, true, caption, finish);
        } else {
          sweepMeasure(meas, false, null, finish);
        }
      } else {
        const lenU=dist(userPts[0].x,userPts[0].y,userPts[1].x,userPts[1].y);
        const ratio=lenU/refLen; const errPct=Math.abs(ratio-target)/target*100;
        const score=clamp(100-errPct*1.4,0,100);
        const detail=`目標 ×${target} / あなた ×${ratio.toFixed(2)}（${errPct.toFixed(0)}%ズレ）`;
        const ghost=()=>{ const g=cv.ctx; g.strokeStyle=getCss('--lime'); g.setLineDash([8,8]); g.lineWidth=4;
          const tx=refA.x, ty=refA.y+50; g.beginPath(); g.moveTo(tx,ty); g.lineTo(tx+refLen*target,ty); g.stroke(); g.setLineDash([]);
          g.fillStyle=getCss('--lime'); g.font='600 14px "Zen Maru Gothic"'; g.fillText('正解の長さ',tx,ty-10); };
        ghost();
        showResult(wrap,{score,label:'スコア（100点満点）',detail,bigDetail:true,buttons:[
          {text:'もう一度',cls:'primary',onClick:newRound},
          {text:'閉じる',cls:'ghost',onClick:()=>{locked=false;redraw();}}
        ]});
      }
    }

    const onResize=()=>layout();
    window.addEventListener('resize',onResize); cv.onResize=layout;
    newRound();
    return ()=>{window.removeEventListener('resize',onResize);};
  }
});

    clearBtn.onclick=()=>{if(locked)return;
      if(committed){ if(redosLeft<=0){ toast('書き直しは2回までだよ。採点してね'); return; } redosLeft--; committed=false; updateRedo(); }
      pts=[];redraw();};
    scoreBtn.onclick=()=>{if(locked)return;if(pts.length<8){toast('もう少し大きく描いてね');return;}locked=true;evaluate();};

    function centroid(P){let x=0,y=0;for(const p of P){x+=p.x;y+=p.y;}return {x:x/P.length,y:y/P.length};}
    function evaluate(){
      const P=resample(pts,72); const ct={x:cv.W()/2,y:cv.H()/2};
      const radii=P.map(p=>dist(p.x,p.y,ct.x,ct.y)); const R=radii.reduce((a,b)=>a+b,0)/radii.length;
      // 閉じ具合
      const closeGap=dist(pts[0].x,pts[0].y,pts[pts.length-1].x,pts[pts.length-1].y);
      const perim=(()=>{let s=0;for(let i=1;i<P.length;i++)s+=dist(P[i-1].x,P[i-1].y,P[i].x,P[i].y);return s;})();
      const closePenalty=clamp(closeGap/(perim||1)*180,0,40);
      let score,ghost;
      if(shape==='circle'){
        const mean=R; const dev=radii.reduce((a,r)=>a+Math.abs(r-mean),0)/radii.length;
        score=clamp(100-(dev/mean)*320 - closePenalty,0,100);
        ghost=()=>{const g=cv.ctx;g.strokeStyle=getCss('--lime');g.setLineDash([9,9]);g.lineWidth=3;g.beginPath();g.arc(ct.x,ct.y,mean,0,TAU);g.stroke();g.setLineDash([]);};
      } else {
        const n=SIDES[shape];
        // 正n角形は「重心→頂点(外接半径)」が「重心→外周の平均距離」より大きい。
        // K = 平均外周半径 / 外接半径（正三角形≒0.690, 正方形≒0.812）。これで正しい大きさに直す。
        const K=({3:0.690,4:0.812})[n]||1; const baseR=R/K;

        const rot = (n===4) ? Math.PI/4 : 0;

        ghost=()=>{const g=cv.ctx;const poly=regPoly(ct,bestR,n,rot);g.strokeStyle=getCss('--lime');g.setLineDash([9,9]);g.lineWidth=3;g.beginPath();g.moveTo(poly[0].x,poly[0].y);for(const q of poly)g.lineTo(q.x,q.y);g.closePath();g.stroke();g.setLineDash([]);};

      function showCompare(){ redraw(); ghost(); const g=cv.ctx;
        g.save(); g.fillStyle=getCss('--lime'); g.beginPath(); g.arc(ct.x,ct.y,5,0,TAU); g.fill();
        g.font='700 16px "Zen Maru Gothic"'; g.textAlign='left'; g.fillText('緑の点線が正解の形',16,30); g.restore(); }
      showCompare();
      hint.textContent='緑の点線が正解の形。図形ボタンでもう一度。';
      showResult(wrap,{score,label:NAME[shape]+'の精度',detail:`緑の点線が「正解の形」。「重ねて見る」で自分の線と比べられるよ。`,buttons:[
        {text:'もう一度',cls:'lime',onClick:newRound},
        {text:'重ねて見る',cls:'ghost',onClick:showCompare}
      ]});
    }
    function regPoly(ct,R,n,rot){const o=[];for(let i=0;i<n;i++){const a=rot - Math.PI/2 + i*TAU/n;o.push({x:ct.x+Math.cos(a)*R,y:ct.y+Math.sin(a)*R});}return o;}

    const onResize=()=>layout();window.addEventListener('resize',onResize);cv.onResize=layout;layout();newRound();
    return ()=>window.removeEventListener('resize',onResize);
  }
});

    function renderPencilInto(dstG,s){

      for(let p=0;p<2;p++){ const c2=sp.slice(); for(let i=0;i<sp.length;i++) sp[i]=(c2[Math.max(0,i-1)]+c2[i]+c2[Math.min(sp.length-1,i+1)])/3; }

    // 採点：お題とコピーをそれぞれ粗いグリッドの「塗り」に変換し IoU で比較（多少のズレに寛容）
    function maskGrid(drawFn,W,H,GW){
      const off=document.createElement('canvas');off.width=W;off.height=H;const g=off.getContext('2d');

      const SZ=200, scale=SZ/sz, gapR=SZ*1.02;        // 参照系の文字サイズ（固定）

      const usr=maskGrid((g,w,h)=>{g.strokeStyle='#fff';

      const f1=(recall+prec>0)?2*recall*prec/(recall+prec):0;
      const raw=iou*0.6 + f1*0.4;
      const t=clamp((raw-0.16)/0.42,0,1); // 0.16以下=0点、0.58以上=満点に正規化
      return clamp(Math.pow(t,1.3)*100,0,100); // べき乗で中位を引き離して差をつける

    const onResize=()=>layout();window.addEventListener('resize',onResize); refCv.onResize=layout; copyCv.onResize=layout;

    return ()=>{window.removeEventListener('resize',onResize); stopBattle();};
  }
});

        if(k===nCols-1) gh=Math.max(gh*0.5, tol+8); // ゴール手前の縦棒は口を半分に
        const slideSp=(k===nCols-2)?(0.715/3):0.715;                  // ゴール手前から2番目は動きを1/3に
        const slide=(fh*0.30)*Math.sin(slideSp*mV*tm+phase*1.6);      // すき間が上下に動く
        let gc = (k===1) ? ((y0+y1)/2 + ((fh/2)-gh-6)*Math.sin(slideSp*mV*tm+phase*1.6)) : (bottom ? (y1 - gapV*0.7 + slide) : (y0 + gapV*0.7 + slide));
        if(k===nCols-2){ const p=clampN(gc,y0,y1); const edge=1-2*Math.min(p-y0,y1-p)/fh; gh=Math.max(gh*0.55*(1-0.45*edge), tol+8); } // 口を狭く、上端/下端ほどさらに狭く
        gc=clampN(gc, y0+gh+6, y1-gh-6);
        const gt=clampN(gc-gh,y0,y1), gb=clampN(gc+gh,y0,y1);
        if(gt-y0>1) walls.push({kind:'seg',x1:vx,y1:y0,x2:vx,y2:gt});
        if(y1-gb>1) walls.push({kind:'seg',x1:vx,y1:gb,x2:vx,y2:y1});
      }
      // 横レール：手前のレーンは3本・ゴール側は4本。長さは1.4倍を基本に、小画面では詰まらない上限にクランプ。
      // 左右の壁へ交互に寄せてスライドさせ、常に片側の通り道を確保（詰み防止）。ゴール側ほど速い。
      const travelH=cw*0.18, minChan=2*(tol+3)+12;
      const baseLen=Math.min(cw*0.588, cw-travelH-minChan), ampV=fh*0.035;
      for(let i=1;i<nCols-1;i++){

        const N=goalLane?4:3;       // ゴール側は4本、その手前は3本
        const fs=goalLane?1.5:1.0;  // ゴール側レーンは横棒の動き1.5倍
        const barLen=goalLane?Math.min(baseLen*1.3, cw-minChan-8):baseLen; // ゴール直前は長さ1.3倍
        const trav=goalLane?(cw-barLen-2):travelH;                          // ゴール直前は壁から壁まで大きく横スライド
        for(let j=0;j<N;j++){
          const hy=y0+fh*(j+1)/(N+1) + ampV*Math.sin(1.04*fs*mH*tm+i+j);
          const s=0.5+0.5*Math.sin(1.17*fs*mH*tm+i*0.7+j*1.9);
          if(j%2===0){ const xL=lx+trav*s; walls.push({kind:'seg',x1:xL,y1:hy,x2:xL+barLen,y2:hy}); } // 左寄り（右が開く）
          else       { const xR=rx-trav*s; walls.push({kind:'seg',x1:xR-barLen,y1:hy,x2:xR,y2:hy}); } // 右寄り（左が開く）
        }
      }
      const sr=clampN(Math.min(fw,fh)*0.09,24,36); // Lv3はスタート/ゴールを2倍に（狙いやすく）
      const start={x:x0+fw*0.05,y:cy,r:sr};
      const goal={x:x1-fw*0.045,y:cy,r:Math.max(26,sr*1.05)};
      return {walls,start,goal,cx,cy,R:Math.min(W,H)*0.43,dr:30,wallThick,tol,bounds:{x0,y0,x1,y1}};
    }

    function reset(){attempt=1;state='idle';elapsed=0;status.textContent='スタート地点をタッチ';status.style.color='';tEl.textContent='⏱ 0.00s';layout();}
    // 2回目のチャレンジへ（記録はまだ。同じ人がもう一度スタートから）
    function retry2(){attempt=2;state='idle';elapsed=0;status.textContent='2回目！スタート地点をタッチ';status.style.color='';tEl.textContent='⏱ 0.00s';layout();}
    function layout(){cv.fit();rebuild();}
    function rebuild(){const W=cv.W(),H=cv.H();const L=LEVELS[lvl];maze=(L.rect?buildRectMaze(W,H,t):buildMaze(W,H,L,t));start=maze.start;goal=maze.goal;draw();}
    function draw(){const g=cv.ctx,W=cv.W(),H=cv.H();g.clearRect(0,0,W,H);

        const grad=g.createLinearGradient(0,0,0,H);
        grad.addColorStop(0,'#F4F6F8');grad.addColorStop(.4,'#C2C9D0');grad.addColorStop(.55,'#959DA7');grad.addColorStop(.72,'#B7BFC8');grad.addColorStop(1,'#646C76');

          trace(); g.strokeStyle='rgba(64,72,82,.5)'; g.lineWidth=maze.wallThick+3; g.stroke();   // ふち（影）
          trace(); g.strokeStyle=grad; g.lineWidth=maze.wallThick; g.stroke();                     // 金属
        }
      }
      ring(g,start.x,start.y,start.r,getCss('--lime'),'START');
      ring(g,goal.x,goal.y,goal.r,getCss('--amber'),'GOAL');

    }
    function ring(g,x,y,r,col,txt){g.beginPath();g.arc(x,y,r,0,TAU);g.fillStyle=col;g.globalAlpha=.18;g.fill();g.globalAlpha=1;g.lineWidth=4;g.strokeStyle=col;g.stroke();
      g.fillStyle=col;g.font='800 13px "Zen Maru Gothic"';g.textAlign='center';g.fillText(txt,x,y-r-8);g.textAlign='left';}

    let pen=null;
    function down(e){const p=localPos(c,e);pen=p;

        else {toast('STARTの円から始めてね');} }
    }
    function move(e){pen=localPos(c,e);if(state!=='run')return; check(); }
    function leave(){ if(state==='run'){ fail('ペンが離れた！'); } }
    function check(){
      if(dist(pen.x,pen.y,goal.x,goal.y)<=goal.r){ win(); return; }
      const b=maze.bounds;
      if(b){ if(pen.x<b.x0-maze.tol||pen.x>b.x1+maze.tol||pen.y<b.y0-maze.tol||pen.y>b.y1+maze.tol){ fail('外に出た！'); return; } }
      else if(Math.hypot(pen.x-maze.cx,pen.y-maze.cy) > maze.R+maze.dr*0.55){ fail('外に出た！'); return; }
      let dmin=1e9; for(const w of maze.walls){ const d=dWall(pen.x,pen.y,w); if(d<dmin)dmin=d; }
      if(dmin < maze.tol){ fail('壁にタッチ！'); }
    }
    function win(){state='cleared';elapsed=(performance.now()-startTime)/1000;status.textContent='クリア！🎉';status.style.color=getCss('--lime');
      const score=clamp(100-elapsed*4,40,100);

        {text:'同じ面でもう一度',cls:'primary',onClick:reset},{text:'閉じる',cls:'ghost',onClick:reset}]});
    }
    function fail(msg){state='failed';status.textContent='アウト：'+msg;status.style.color=getCss('--coral');

      const g=cv.ctx;g.fillStyle='rgba(255,93,108,.25)';g.fillRect(0,0,cv.W(),cv.H());

        setTimeout(()=>{ showResult(wrap,{score:0,noRecord:true,label:'1回目アウト',detail:msg+' もう1回チャレンジできるよ！',buttons:[
          {text:'2回目にチャレンジ →',cls:'primary',onClick:retry2}]}); },250);
      } else {
        setTimeout(()=>{ showResult(wrap,{score:0,label:'感電！',detail:msg+' STARTからやり直そう。',buttons:[
          {text:'やり直す',cls:'warn',onClick:reset}]}); },250);
      }
    }
    c.addEventListener('pointerdown',down);c.addEventListener('pointermove',move);
    c.addEventListener('pointerup',leave);c.addEventListener('pointercancel',leave);c.addEventListener('pointerleave',leave);

    function loop(){t=performance.now()/1000;
      if(state==='run'){tEl.textContent='⏱ '+((performance.now()-startTime)/1000).toFixed(2)+'s';}
      if(LEVELS[lvl].rot||LEVELS[lvl].pulse||LEVELS[lvl].gates||LEVELS[lvl].rect){rebuild();} else {draw();} // 動く面は毎フレーム再構築
      if(state==='run')check();
      raf=requestAnimationFrame(loop);
    }
    const onResize=()=>layout();window.addEventListener('resize',onResize); cv.onResize=layout;
    layout();reset();raf=requestAnimationFrame(loop);
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',onResize);};
  }
});

      const cand=[{x:ctr.x-hw*1.45,y:ctr.y},{x:ctr.x+hw*1.45,y:ctr.y},{x:ctr.x-hw*2.0,y:ctr.y},{x:ctr.x+hw*2.0,y:ctr.y},relToDisp(0.32,0.62),relToDisp(0.68,0.62),relToDisp(0.5,0.5),relToDisp(0.5,0.8)];
      const cols=[];for(const pt of cand){const s=dispToSrc(pt.x,pt.y);const sx=clamp(Math.round(s.sx*srcScale),0,srcC.width-1),sy=clamp(Math.round(s.sy*srcScale),0,srcC.height-1);const d=srcCtx.getImageData(sx,sy,1,1).data;cols.push([d[0],d[1],d[2]]);}
      cols.sort((a,b)=>(b[0]+b[1]+b[2])-(a[0]+a[1]+a[2]));const top=cols.slice(0,Math.max(2,Math.round(cols.length/2)));
      let r=0,g=0,bl=0;for(const c of top){r+=c[0];g+=c[1];bl+=c[2];}return [Math.round(r/top.length),Math.round(g/top.length),Math.round(bl/top.length)];}catch(e){return [233,201,168];}}
    function buildPhotoAssets(){if(!photoImg)return;
      for(const p of PARTS){const c=relToDisp(p.rx,p.ry);const hw=p.bw*face.w/2,hh=p.bh*face.w/2;p.skin=localSkin(p);
        const s0=dispToSrc(c.x-hw,c.y-hh),s1=dispToSrc(c.x+hw,c.y+hh);const sw=Math.max(2,s1.sx-s0.sx),sh=Math.max(2,s1.sy-s0.sy);
        const oc=document.createElement('canvas');oc.width=Math.max(16,Math.round(p.bw*face.w*2));oc.height=Math.max(16,Math.round(p.bh*face.w*2));
        const og=oc.getContext('2d');try{og.drawImage(photoImg,s0.sx,s0.sy,sw,sh,0,0,oc.width,oc.height);}catch(e){}
        og.globalCompositeOperation='destination-in';og.save();og.translate(oc.width/2,oc.height/2);og.scale(oc.width/2,oc.height/2);
        const mg=og.createRadialGradient(0,0,0,0,0,1);mg.addColorStop(0,'#fff');mg.addColorStop(.72,'#fff');mg.addColorStop(1,'rgba(255,255,255,0)');
        og.fillStyle=mg;og.beginPath();og.arc(0,0,1,0,TAU);og.fill();og.restore();og.globalCompositeOperation='source-over';
        photoParts[p.key]={url:oc.toDataURL(),bw:p.bw,bh:p.bh};}
    }
    function eraseFeature(g,p){const ctr=relToDisp(p.rx,p.ry),hw=p.bw*face.w/2*1.08,hh=p.bh*face.w/2*1.08;const c=p.skin||[233,201,168];
      g.save();g.translate(ctr.x,ctr.y);g.scale(hw,hh);const grad=g.createRadialGradient(0,0,0,0,0,1);grad.addColorStop(0,`rgb(${c[0]},${c[1]},${c[2]})`);grad.addColorStop(.78,`rgb(${c[0]},${c[1]},${c[2]})`);grad.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
      g.fillStyle=grad;g.beginPath();g.arc(0,0,1,0,TAU);g.fill();g.restore();}

    function drawBase(){const g=baseCv.ctx;note.style.display=illust?'':'none';g.clearRect(0,0,baseCv.W(),baseCv.H());
      if(photoImg){
        g.save();g.beginPath();g.ellipse(face.cx,face.cy,face.w/2,face.h/2,0,0,TAU);g.clip();
        if(photoImg.complete&&photoImg.naturalWidth){const f=photoFit();g.drawImage(photoImg,f.x0,f.y0,f.dw,f.dh);}else{g.fillStyle='#F2E2CE';g.fillRect(face.cx-face.w/2,face.cy-face.h/2,face.w,face.h);}
        if(!illust&&calibrated&&!calib.active&&!showRef){for(const p of PARTS)eraseFeature(g,p);} // お手本中は元の顔を消さない
        g.restore();
        g.lineWidth=3;g.strokeStyle='rgba(34,57,90,.4)';g.beginPath();g.ellipse(face.cx,face.cy,face.w/2,face.h/2,0,0,TAU);g.stroke();
        if(calib.active){g.strokeStyle=getCss('--coral');g.setLineDash([6,5]);g.lineWidth=2;for(const p of PARTS){const ctr=relToDisp(p.rx,p.ry),hw=p.bw*face.w/2,hh=p.bh*face.w/2;g.beginPath();g.ellipse(ctr.x,ctr.y,hw,hh,0,0,TAU);g.stroke();}g.setLineDash([]);}
        if(showRef)drawRefOverlay();
        return;
      }
      g.save();g.translate(face.cx,face.cy);g.fillStyle='#FFE0A3';g.beginPath();g.ellipse(0,0,face.w/2,face.h/2,0,0,TAU);g.fill();g.strokeStyle='rgba(0,0,0,.12)';g.lineWidth=2;g.beginPath();g.ellipse(0,0,face.w/2,face.h/2,0,0,TAU);g.stroke();g.restore();
      if(showRef)drawRefOverlay();
    }
    function computeTargets(){targets={};for(const p of PARTS){const rx=illust?TARGETS[p.key].rx:p.rx,ry=illust?TARGETS[p.key].ry:p.ry;const c=relToDisp(rx,ry);targets[p.key]={x:c.x,y:c.y};}}
    // お手本（100点になる状態）。写真・リアル福笑いとも「完全な元の顔」を表示して継ぎ目なく見せる。
    function drawRefOverlay(){ if(calib.active)return; const g=baseCv.ctx;
      if(illust && origImg && origImg.complete && origImg.naturalWidth){ // のっぺらぼうの上に完全な顔を重ねて表示
        g.save(); g.beginPath(); g.ellipse(face.cx,face.cy,face.w/2,face.h/2,0,0,TAU); g.clip();
        const f=photoFit(); g.drawImage(origImg,f.x0,f.y0,f.dw,f.dh); g.restore();
      }
      // ラベル（白フチ付きで読めるように）
      g.save(); g.font='800 18px "Zen Maru Gothic"'; g.textAlign='left'; g.textBaseline='top';
      g.lineWidth=4; g.strokeStyle='rgba(255,255,255,.92)'; g.strokeText('お手本（これが100点）',14,12);
      g.fillStyle=getCss('--lime'); g.fillText('お手本（これが100点）',14,12); g.restore();
    }

    function partAsset(key){
      if(illust){const asp=partAspect[key]||0.6;const w=PART_BW[key]*face.w;return {url:PART_IMG[key],w,h:w*asp};}
      if(photoParts[key]){return {url:photoParts[key].url,w:face.w*photoParts[key].bw,h:face.w*photoParts[key].bh};}
      return null;
    }
    function makeNode(p){const n=el('div',null);
      n.style.cssText='position:absolute;line-height:1;user-select:none;touch-action:none;cursor:grab;transform:translate(-50%,-50%)';
      const a=partAsset(p.key);
      if(a){const im=el('img');im.src=a.url;im.draggable=false;im.style.cssText='width:100%;height:100%;object-fit:contain;display:block;pointer-events:none';n.appendChild(im);}
      else{n.textContent=p.label;}
      n.dataset.key=p.key;board.appendChild(n);
      let dragging=false,off={x:0,y:0};
      n.addEventListener('pointerdown',e=>{dragging=true;n.setPointerCapture(e.pointerId);n.style.cursor='grabbing';n.style.zIndex=10;const r=board.getBoundingClientRect();off={x:e.clientX-(parseFloat(n.style.left)+r.left),y:e.clientY-(parseFloat(n.style.top)+r.top)};});
      n.addEventListener('pointermove',e=>{if(!dragging)return;const r=board.getBoundingClientRect();n.style.left=(e.clientX-r.left-off.x)+'px';n.style.top=(e.clientY-r.top-off.y)+'px';});
      const end=()=>{dragging=false;n.style.cursor='grab';};n.addEventListener('pointerup',end);n.addEventListener('pointercancel',end);
      return n;
    }
    function clearNodes(){for(const k in nodes)nodes[k].remove();nodes={};}
    function n_size(key){const n=nodes[key];if(!n)return;const a=partAsset(key);
      if(a){n.style.width=a.w+'px';n.style.height=a.h+'px';n.style.fontSize='';}else{n.style.width='';n.style.height='';n.style.fontSize=Math.max(34,face.w*0.16)+'px';}}
    function rebuildNodes(){clearNodes();for(const p of PARTS){nodes[p.key]=makeNode(p);n_size(p.key);}}
    function setNode(key,x,y){const n=nodes[key];if(n){n.style.left=x+'px';n.style.top=y+'px';}}
    function placeNodesScattered(){if(!Object.keys(nodes).length)rebuildNodes();const W=baseCv.W(),H=baseCv.H();
      const spots=[[0.10,0.16],[0.90,0.16],[0.08,0.5],[0.92,0.5],[0.16,0.86],[0.84,0.86]];
      PARTS.forEach((p,i)=>{const s=spots[i%spots.length];setNode(p.key,W*s[0],H*s[1]);n_size(p.key);});}

    scrambleBtn.onclick=()=>{if(calib.active)return;const W=baseCv.W(),H=baseCv.H();for(const p of PARTS)setNode(p.key,rnd(W*0.08,W*0.92),rnd(H*0.08,H*0.92));};
    refBtn.onclick=()=>{ if(calib.active){toast('先にパーツの位置を決めてね');return;} showRef=!showRef;
      refBtn.classList.toggle('lime',showRef); refBtn.textContent=showRef?'お手本を消す':'💯 お手本を見る';
      for(const k in nodes) nodes[k].style.display = showRef ? 'none' : ''; // お手本中は置いたパーツを隠す
      drawBase(); };

    let handles={};
    const calLabels={browL:'左まゆ',browR:'右まゆ',eyeL:'左目',eyeR:'右目',nose:'鼻',mouth:'口'};
    function clearHandles(){for(const k in handles){handles[k].c.remove();handles[k].r.remove();}handles={};}
    function repositionHandle(p){const H=handles[p.key];if(!H)return;const ctr=relToDisp(p.rx,p.ry);
      H.c.style.left=ctr.x+'px';H.c.style.top=ctr.y+'px';H.r.style.left=(ctr.x+p.bw*face.w/2)+'px';H.r.style.top=(ctr.y+p.bh*face.w/2)+'px';}
    function makeHandle(p){
      const c=el('div',null,calLabels[p.key]);c.dataset.handle=p.key;
      c.style.cssText='position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;background:rgba(226,92,166,.95);border:2px solid #fff;border-radius:999px;padding:6px 11px;box-shadow:0 3px 8px rgba(0,0,0,.35);touch-action:none;cursor:grab;z-index:12;white-space:nowrap';
      const rz=el('div',null,'⤡');rz.dataset.resize=p.key;
      rz.style.cssText='position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;background:rgba(34,57,90,.92);border:2px solid #fff;border-radius:9px;touch-action:none;cursor:nwse-resize;z-index:13';
      board.appendChild(c);board.appendChild(rz);handles[p.key]={c,r:rz};
      let dragC=false,offC={x:0,y:0};
      c.addEventListener('pointerdown',e=>{dragC=true;c.setPointerCapture(e.pointerId);c.style.cursor='grabbing';const r=board.getBoundingClientRect();const ctr=relToDisp(p.rx,p.ry);offC={x:e.clientX-(r.left+ctr.x),y:e.clientY-(r.top+ctr.y)};});
      c.addEventListener('pointermove',e=>{if(!dragC)return;const r=board.getBoundingClientRect();const x=e.clientX-r.left-offC.x,y=e.clientY-r.top-offC.y;p.rx=(x-(face.cx-face.w/2))/face.w;p.ry=(y-(face.cy-face.h/2))/face.h;repositionHandle(p);drawBase();});
      const endC=()=>{dragC=false;c.style.cursor='grab';};c.addEventListener('pointerup',endC);c.addEventListener('pointercancel',endC);
      let dragR=false;
      rz.addEventListener('pointerdown',e=>{dragR=true;rz.setPointerCapture(e.pointerId);e.stopPropagation();});
      rz.addEventListener('pointermove',e=>{if(!dragR)return;const r=board.getBoundingClientRect();const ctr=relToDisp(p.rx,p.ry);const hw=Math.abs((e.clientX-r.left)-ctr.x),hh=Math.abs((e.clientY-r.top)-ctr.y);p.bw=clamp(2*hw/face.w,0.08,0.72);p.bh=clamp(2*hh/face.w,0.05,0.6);repositionHandle(p);drawBase();});
      const endR=()=>{dragR=false;};rz.addEventListener('pointerup',endR);rz.addEventListener('pointercancel',endR);
    }
    function startCalibration(){illust=false;calibrated=false;calib.active=true;clearNodes();clearHandles();
      for(const p of PARTS)makeHandle(p);for(const p of PARTS)repositionHandle(p);
      cutBtn.style.display='';doneBtn.style.display='none';scrambleBtn.style.display='none';recutBtn.style.display='none';
      status.textContent='位置をドラッグ・角の⤡で大きさ調節 →「切り出し」';drawBase();}
    function doCut(){clearHandles();calib.active=false;calibrated=true;buildPhotoAssets();computeTargets();drawBase();rebuildNodes();placeNodesScattered();
      cutBtn.style.display='none';doneBtn.style.display='';scrambleBtn.style.display='';recutBtn.style.display='';
      status.textContent='切り出したパーツを顔に置こう（元の位置が正解）';}
    cutBtn.onclick=doCut;
    recutBtn.onclick=()=>{if(usePhoto&&photoImg)startCalibration();};

    function setupIllust(){illust=true;photoImg=baseImg;calibrated=false;calib.active=false;clearHandles();
      recutBtn.style.display='none';cutBtn.style.display='none';doneBtn.style.display='';scrambleBtn.style.display='';
      computeTargets();drawBase();rebuildNodes();placeNodesScattered();status.textContent='パーツを顔に置いて完成させよう！';}

    function photoMode(){clearHandles();
      if(usePhoto){illust=false;
        if(!photoImg||photoImg===baseImg){photoImg=null;calibrated=false;photoParts={};recutBtn.style.display='none';cutBtn.style.display='none';doneBtn.style.display='';scrambleBtn.style.display='';status.textContent='顔写真を選んでね';fileIn.value='';fileIn.click();}
        else if(!calibrated){startCalibration();}
        else{calib.active=false;recutBtn.style.display='';cutBtn.style.display='none';doneBtn.style.display='';scrambleBtn.style.display='';drawBase();rebuildNodes();placeNodesScattered();status.textContent='パーツを顔に置こう';}
      }else{illust=true;recutBtn.style.display='none';cutBtn.style.display='none';doneBtn.style.display='';scrambleBtn.style.display='';
        if(baseImg.complete&&baseImg.naturalWidth)setupIllust();else{photoImg=baseImg;drawBase();status.textContent='読み込み中…';}}
    }
    fileIn.onchange=e=>{const f=e.target.files[0];if(!f)return;status.textContent='写真を読み込み中…';
      const fr=new FileReader();
      fr.onload=()=>{const img=new Image();
        img.onload=()=>{photoImg=img;illust=false;const md=1000,sc=Math.min(1,md/Math.max(img.width,img.height));srcC.width=Math.max(1,Math.round(img.width*sc));srcC.height=Math.max(1,Math.round(img.height*sc));srcScale=sc;srcCtx.drawImage(img,0,0,srcC.width,srcC.height);for(const p of PARTS){p.rx=p.drx;p.ry=p.dry;p.bw=kindBox[p.kind].bw;p.bh=kindBox[p.kind].bh;}doCut();status.textContent='パーツを顔に置こう（ズレてたら「切り出し直す」で微調整）';};
        img.onerror=()=>{status.textContent='写真を読み込めませんでした（JPG/PNGでお試しを）';};
        img.src=fr.result;};
      fr.onerror=()=>{status.textContent='写真を読み込めませんでした';};
      fr.readAsDataURL(f);};

    doneBtn.onclick=()=>{
      if(calib.active){toast('先にパーツの位置を決めてね');return;}
      const rows=[]; let total=0, cnt=0;
      for(const p of PARTS){const n=nodes[p.key];if(!n)continue;const x=parseFloat(n.style.left),y=parseFloat(n.style.top);const t=targets[p.key];const d=dist(x,y,t.x,t.y);total+=d;cnt++;rows.push((calLabels[p.key]||p.label)+' '+Math.round((d/face.w)*100)+'%');}
      const avg=total/(cnt||1),norm=avg/face.w,score=clamp(100-norm*220,0,100);
      // のっぺらぼう＋置いたパーツを見本(元の顔)に精密に重ね、各パーツの位置ズレで採点
      const detail='見本とのズレ（顔の幅に対する％・小さいほど正解）：<br>'+rows.join('　/　');
      showResult(wrap,{score,label:'福笑い 完成度',detail,bigDetail:true,buttons:[
        {text:'もう一度',cls:'primary',onClick:()=>{showRef=false;refBtn.classList.remove('lime');refBtn.textContent='💯 お手本を見る';for(const k in nodes)nodes[k].style.display='';drawBase();placeNodesScattered();}},
        {text:'閉じる',cls:'ghost'}]});
    };

    const onResize=()=>layoutFace();window.addEventListener('resize',onResize);baseCv.onResize=layoutFace;
    illust=true;layoutFace();if(baseImg.complete&&baseImg.naturalWidth)setupIllust();
    return ()=>{window.removeEventListener('resize',onResize);clearNodes();clearHandles();};
  }
});

/* =========================================================================
   ルーター & ハブ描画
   ========================================================================= */
let cleanup=null;
function openGame(g){
  if(cleanup){try{cleanup();}catch(e){}} cleanup=null;
  $('#gwrap').innerHTML='';
  $('#hub').style.display='none';
  const sec=$('#game');sec.classList.add('show');
  $('#gTitle').textContent=g.no+'  '+g.name;
  $('#gDot').style.background=getCss(g.color);
  $('#gTools').innerHTML='';
  refreshTurnPill();
  cleanup=g.mount()||null;
}
function backToHub(){ if(cleanup){try{cleanup();}catch(e){}} cleanup=null;
  if(Battle.active){ Battle.active=false; BattleForce=null; }
  $('#game').classList.remove('show'); $('#gwrap').innerHTML=''; $('#hub').style.display='block'; refreshHubTurn();
}
$('#backBtn').onclick=backToHub;

function buildHub(){
  const grid=$('#grid');grid.innerHTML='';
  GAMES.forEach(g=>{
    const card=el('button','card');
    const col=getCss(g.color);
    card.innerHTML=`
      <div class="accent" style="background:${col}"></div>
      <div class="glow" style="background:${col}"></div>
      <div class="ic">${g.ic}</div>
      <div class="no" style="color:${col}">${g.no}</div>
      <div>
        <h2>${g.name}</h2>
        <p>${g.desc}</p>
      </div>
      <span class="btn go" style="background:${col};color:#fff;border:none;text-shadow:0 1px 2px rgba(0,0,0,.25)">遊ぶ →</span>`;
    card.onclick=()=>{ if(!Battle.active){ BattleForce=null; CurrentChallenge=g.name; } openGame(g); };
    grid.appendChild(card);
  });
}
buildHub();
</script>
