<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>auth.php 動作確認</title>
<style>
  body { font-family: sans-serif; max-width: 480px; margin: 40px auto; }
  label { display: block; margin-top: 12px; }
  input, select { width: 100%; padding: 6px; box-sizing: border-box; }
  button { margin-top: 16px; padding: 8px 16px; }
  pre { background: #f4f4f4; padding: 12px; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<h1>auth.php 動作確認</h1>
<form id="form">
  <label>種別
    <select name="actor_type">
      <option value="teacher">teacher（講師・管理者）</option>
      <option value="student">student（生徒）</option>
      <option value="guardian">guardian（保護者）</option>
    </select>
  </label>
  <label>ログインID
    <input type="text" name="login_id" required>
  </label>
  <label>パスワード
    <input type="password" name="password" required>
  </label>
  <button type="submit">ログインを試す</button>
</form>
<h2>結果</h2>
<pre id="result">（まだ実行していません）</pre>

<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const body = {
    actor_type: form.actor_type.value,
    login_id: form.login_id.value,
    password: form.password.value,
  };
  const resultEl = document.getElementById('result');
  resultEl.textContent = '送信中...';
  try {
    const res = await fetch('auth.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(body),
    });
    const text = await res.text();
    let display = text;
    try {
      display = JSON.stringify(JSON.parse(text), null, 2);
    } catch (_) {}
    resultEl.textContent = `HTTP ${res.status}\n\n${display}`;
  } catch (err) {
    resultEl.textContent = '通信エラー: ' + err;
  }
});
</script>
</body>
</html>
